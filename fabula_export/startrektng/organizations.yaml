- fabula_uuid: ger_organization_5f1fbdf8aa35
  global_id: ger_organization_5f1fbdf8aa35
  canonical_name: Selay Delegation
  description: The Selay Delegation represents a reptilian alien group characterized
    by deep-seated hostility toward their rivals, the Antican delegation. Arriving
    aboard the USS Enterprise amidst a fragile peace mission, they embody entrenched
    diplomatic tension and suspicion, complicating efforts to maintain order and facilitate
    resolution between hostile species. This faction is involved in volatile diplomatic
    encounters marked by covert hostility and sabotage against the Antican delegates.
    Their presence triggers escalating tension, including mistaken violent attacks
    and missing delegates linked to bloody security incidents, positioning the Selay
    Delegation as antagonistic players deeply entwined in fragile interspecies relations
    and internal security crises.
  sphere_of_influence: Galactic Politics
  season_appearances:
