- fabula_uuid: ger_organization_a5de8992176d
  global_id: ger_organization_a5de8992176d
  canonical_name: Klingon Culture
  description: Klingon cultural traditions form the bedrock of heritage and identity,
    encompassing mythic stories like the legend of Kahless, warrior ethos, and martial
    rituals. These traditions are transmitted through honor tales (e.g., Kahless's
    story), scent-hunting rituals, and battle hymns like *Bagh Da tuHmoh*. They manifest
    in ritual hunts, youth defiance, and elders' support for revival, while also driving
    conflict by pitting heritage revival against survival in hybrid settlements (e.g.,
    Klingon-Romulan colonies). Key figures include Worf (transmitter of traditions),
    Toq (awakened by heritage), Ba'el (inspired youth), L'Kor (supportive elder),
    and the old Klingon woman (revival advocate). These traditions challenge colonial
    peace and fuel cultural fractures, as seen in the tension between Romulan pacifism
    and Klingon warrior values.
  sphere_of_influence: Socio‑cultural and martial order governing Klingon interpersonal
    obligation, honor enforcement, ritual conflict resolution, and cross‑cultural
    interactions with Starfleet and other entities
  season_appearances:
