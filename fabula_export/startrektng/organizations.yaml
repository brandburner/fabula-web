  canonical_name: USS Lantree
  description: The USS Lantree was a Federation starship that suffered total crew
    loss due to a rapid-aging contagion outbreak, serving as the first known casualty
    of the biohazard crisis. Its destruction establishes the contagion's lethal potential
    and Starfleet's urgent containment protocol dilemma. The ship's fate becomes a
    critical reference point for the Enterprise crew's escalating crisis response,
    demonstrating the pathogen's ability to devastate an entire starship complement
    before proper countermeasures can be implemented.
