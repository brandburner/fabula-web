- fabula_uuid: ger_organization_48782eabb521
  global_id: ger_organization_48782eabb521
  canonical_name: Ux-Mal Entities
  description: 'Ancient alien prisoners from the Ux-Mal star system, originally confined
    to a moon penal colony. Non-corporeal beings capable of possessing Enterprise
    crew members (Data, Troi, O''Brien) via energy rings. They orchestrate a violent
    takeover of the *Enterprise-D* during a shuttle crash and storm, seizing bridge
    control, storming Ten Forward, and taking hostages (Keiko and Molly O''Brien).
    Their demands include retrieval of remains from the *Essex* crash site, backed
    by ruthless tactics: stunning crew, disabling systems, psychological manipulation
    exploiting personal bonds, and transporter overrides to escape. Internal paranoia
    and fractures in their unity are exploited by Picard, who sows doubt among the
    possessed hosts. Ultimately, their bluff of lethal violence is exposed, and they
    abandon their vessels after the crew demonstrates willingness to sacrifice themselves,
    accepting transport back to containment.'
  sphere_of_influence: Non-Corporeal Alien Prisoners and Possession-Based Ship Hijackers
  season_appearances:
  - 5
  local_uuids:
    1: org_2294dbe0bd58
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e6bee573ddb8
  global_id: ger_organization_e6bee573ddb8
  canonical_name: V'Shar
  description: V'Shar deploys undercover agents like T'Paal to infiltrate mercenary
    operations and investigate Vulcan isolationist extremists. T'Paal boards the ship
    to track the stolen Stone of Gol fragment and prevent its reassembly into a psionic
    resonator that could assassinate the Vulcan Council with a single thought. Agents
    commit to extreme measures, including destroying the vessel and all aboard, to
    neutralize the interstellar threat.
  sphere_of_influence: Vulcan Security and Counter-Extremism
  season_appearances:
