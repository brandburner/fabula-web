  canonical_name: House Duras (Klingon Civil War Faction)
  description: A Klingon faction led by the Duras lineage, including Lursa and B'Etor,
    during the Klingon Civil War against Gowron. Known for their aggressive tactics—such
    as honor-bound assaults and suicidal charges (e.g., ramming Birds of Prey into
    a star's corona)—they rely on external support, particularly from Romulan warships,
    to challenge Gowron's leadership. Their actions escalate the civil war, force
    Klingon-Federation alliances (e.g., Worf) to confront divided loyalties, and position
    them as key players whose victory hinges on external intervention. The faction's
    leadership is characterized by ruthlessness, betrayal, and a willingness to trade
    Klingon loyalty for military aid, as seen in their alliance with Romulan commander
    Sela.
