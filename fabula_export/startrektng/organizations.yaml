- fabula_uuid: ger_organization_3fc1595f8733
  global_id: ger_organization_3fc1595f8733
  canonical_name: Enterprise Security Team (Security Department, USS Enterprise)
  description: |-
    The **USS Enterprise Security Team** is the primary security organization aboard the USS Enterprise, responsible for maintaining shipboard order during crises. Directed by officers such as Worf, the team deploys detachments of human guards to enforce protocols, using phasers, foot chases, and force fields to contain threats. Key incidents include:
      - **Sickbay Outburst**: Confining violent threats like Jono’s aggression under Worf’s command.
      - **Ten Forward Mutiny**: Attempting to halt Gillespie’s unrest in Ten Forward, though the panicked crowd disarms and overwhelms the guards, exposing operational limits during psychological crises (e.g., Tyken’s Rift-induced panic).
      - **Intruder Pursuits**: Chasing intruders (e.g., Data) through corridors, though advanced adversaries (e.g., force field traps) may neutralize them temporarily.
      The team’s effectiveness is strained by mass unrest, psychological crises, and resource limitations, particularly during high-stress scenarios like those induced by Tyken’s Rift.
  sphere_of_influence: Starship Internal Security and Diplomatic Incident Response
