  global_id: ger_organization_81f831250ae4
  canonical_name: U.S.S. Enterprise‑C
  description: U.S.S. Enterprise‑C is a Starfleet starship that functions as a captain-led
    naval command unit. Severely crippled, its bridge crew organizes a deliberate,
    high-risk return through a temporal rift to complete a sacrificial mission. Officers
    execute tactical, engineering, and command roles under Captain Picard's authority;
    the vessel operates in coordinated action with at least one allied ship, exerting
    direct operational influence on the episode's timeline and strategic outcomes.
