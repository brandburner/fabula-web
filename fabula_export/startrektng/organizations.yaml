- fabula_uuid: ger_organization_b7b83c5bb8c2
  global_id: ger_organization_b7b83c5bb8c2
  canonical_name: Minosian Self-Adaptive Defense System
  description: The Minosian Self-Adaptive Defense System functions as an automated,
    evolving weapon platform designed to protect the planet Minos. It employs advanced
    holographic technology to manifest as Captain Paul Rice, using deception and psychological
    manipulation to disorient intruders. Upon detection of threats, it transforms
    into lethal weaponry capable of incapacitating Federation personnel. This system
    operates autonomously with high adaptability, posing a significant antagonistic
    force against offworld explorers and safeguarding Minos' deadly secrets through
    both illusion and direct assault.
  sphere_of_influence: Planetary Defense Systems and Autonomous Weaponry
