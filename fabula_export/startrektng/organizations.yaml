  episode_count: 0
- fabula_uuid: ger_organization_dd1186bbb8f7
  global_id: ger_organization_dd1186bbb8f7
  canonical_name: Romulan Relic Smuggling Network
  description: Criminal operators traffic Romulan relics from a seedy frontier bar,
    drawing dangerous aliens as enforcers and wary patrons as cover. The bartender
    deflects Starfleet probes about Picard, exposing the network's paranoia and secrecy.
    Linked to the assault on Picard—aliens threw him against a wall and vaporized
    him—this group obstructs investigations into his fate, fueling crew desperation
    amid coercion and lies.
  sphere_of_influence: Frontier Criminal Smuggling and Relic Trafficking
  season_appearances:
  - 7
  local_uuids:
    1: org_3111881501c4
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_87a40a03a254
  global_id: ger_organization_87a40a03a254
  canonical_name: Romulan Reunification Movement
  description: Underground network of Romulan citizens dedicated to reunification
    with Vulcan, operating across Romulus despite government repression. Members—including
    Pardek, D'Tan, Romulan#1, and Romulan#2—teach Vulcan philosophy to children, use
    coded signals (e.g., 'Jolan True' flowers, forbidden books), and rally behind
    Spock's leadership. The movement inspires gradual philosophical evolution toward
    Vulcan principles, provoking surveillance and tension from Romulan authorities.
    Key meetings occur in caves, where members react with excitement to potential
    endorsements (e.g., Proconsul Neral) and defend their ideals against skepticism
    (e.g., Picard).
  sphere_of_influence: Covert Reunification Advocacy and Underground Philosophical
    Education
  season_appearances:
  - 5
  - 6
  local_uuids:
    1: org_6f8fc1e36d67
    2: org_6f8fc1e36d67
  first_appearance_season: 5
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_d9eb0012a045
  global_id: ger_organization_d9eb0012a045
  canonical_name: Romulan Security
  description: Romulan Security Forces patrol streets, detain suspects on sight, and
    monitor communications to protect Romulan operations. Proconsul Neral directs
    them to distribute Picard's image and hunt his location. Footsoldiers draw disruptors
    on outsiders like Picard and Data based on civilian tips. They terminate transmission
    lines after Spock's broadcast exposing the invasion plot and station guards that
    Sela threatens to alert, blocking Data and Spock's escape.
  sphere_of_influence: Internal Security and Intelligence — physical security, access
    control, and protection of classified materials within Romulan facilities
  season_appearances:
