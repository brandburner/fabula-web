- fabula_uuid: ger_organization_48a6c52977ca
  global_id: ger_organization_48a6c52977ca
  canonical_name: Judge Advocate General (JAG)
  description: 'Consolidated: The Judge Advocate General (JAG) — commonly referred
    to as the Office of the Judge Advocate General or JAG — is Starfleet''s formal
    military-legal branch and adjudicatory body. It issues authoritative legal findings
    (such as initial determinations about the status of individuals or property that
    launch high-profile hearings), directs prosecutorial action, frames courtroom
    agendas, and administers military justice through sector offices and designated
    JAG officers. The office functions as the institutional legal springboard that
    both prosecution and defense must address within Starfleet judicial processes.'
  sphere_of_influence: Military Legal Authority and Judicial Oversight within Starfleet
  season_appearances:
