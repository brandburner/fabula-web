  global_id: ger_organization_692a390f9be9
  canonical_name: Valt Minor
  description: 'Valt Minor governs a planetary faction warring with Krios for centuries.
    Chancellor Alrik leads negotiations, accepting Kamala as mate-gift to cement treaty.
    Focuses on trade pacts and tech swaps, dismissing rituals as secondary to stability.
    Contrasts Kriosian symbolism; views Kamala transactionally. Role: Pragmatic peace
    partner aboard Enterprise, enabling Ceremony of Reconciliation.'
  sphere_of_influence: Planetary Governance and Interstate Diplomacy
  season_appearances:
  - 5
