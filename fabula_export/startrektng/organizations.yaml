  canonical_name: Tilonus Institute for Mental Disorders
  description: Tilonus Institute for Mental Disorders runs Ward Forty-seven as an
    asylum that confines Riker and subjects him to psychological manipulation. Doctor
    Syrus directs attendants and guards to deploy fabricated narratives, clinical
    gaslighting, and armed escorts that dismantle inmates' realities. Staff drain
    neuro-somatic energy through control tactics, serving as a front for Tilonians'
    plot against Starfleet.
