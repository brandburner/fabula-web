- fabula_uuid: ger_organization_c838665a65cb
  global_id: ger_organization_c838665a65cb
  canonical_name: Stellar Dynamics Lab (Enterprise Department)
  description: Stellar Dynamics Lab operates as a specialized department aboard the
    Enterprise-D, focused on stellar research instrumentation and upgrades. Crew members
    cite it as responsible for installing new modules on flux spectrometers, which
    delays the ship's luminosity studies for the Typhon Expanse mission. This maintenance
    work forces senior staff to postpone diagnostics amid emerging threats, underscoring
    the lab's direct impact on operational timelines and scientific priorities.
  sphere_of_influence: Starship Stellar Dynamics Research and Sensor Maintenance
  season_appearances:
