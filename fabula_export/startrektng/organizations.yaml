- fabula_uuid: ger_organization_5ee2ac5e3a28
  global_id: ger_organization_5ee2ac5e3a28
  canonical_name: Ship's Crew
  description: A collective of vessel-operating personnel responsible for day-to-day
    navigation, systems upkeep, onboard security, and routine management of the ship.
    Presented as an experienced, self-sufficient cohort—vernacularly called 'these
    old boys'—they maintain operational control and resist external interference.
    Their internal hierarchy includes designated security staff, and their competence
    underpins disputes about protagonist intervention.
  sphere_of_influence: Shipboard Operations and Security; Vessel Management and Crew
    Governance
  season_appearances:
  - 1
  local_uuids:
