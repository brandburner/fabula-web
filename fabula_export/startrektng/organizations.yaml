- fabula_uuid: ger_organization_d3b5c56f6ad0
  global_id: ger_organization_d3b5c56f6ad0
  canonical_name: Velara III Terraforming Station
  description: The Velara III Terraforming Station operates as a specialized facility
    dedicated to the planetary terraforming of Velara III. Overseen by Project Director
    Kurt Mandl and his team, the station undertakes environmental transformation efforts
    while maintaining a secretive and strained atmosphere. The organization is structured
    around scientific and engineering personnel tasked with modifying the planet,
    but internal tensions and hidden dangers suggest complex challenges beneath the
    surface, drawing investigative scrutiny from external Federation agents.
  sphere_of_influence: Planetary Terraforming and Environmental Engineering
  season_appearances:
