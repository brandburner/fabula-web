- fabula_uuid: ger_organization_5f39309d2d25
  global_id: ger_organization_5f39309d2d25
  canonical_name: Stargazer Court-Martial (Starfleet Tribunal)
  description: 'The Stargazer Court-Martial functions as the Starfleet judicial tribunal
    that investigated and formally prosecuted the command of the USS Stargazer, culminating
    in Captain Jean-Luc Picard’s removal from command. In the processed material it
    appears as a precedent-setting military legal proceeding: adversarial prosecution
    led by figures like Philippa Louvois, formal adjudication by a Starfleet tribunal,
    and institutional consequences that shape personnel records, reputations, and
    later rights-based litigation. The tribunal’s methods combine military law, bureaucratic
    authority, and public humiliation, and its outcome continues to influence the
    psychological and tactical posture of affected officers.'
  sphere_of_influence: Military Judicial Authority and Personnel Accountability (Starfleet
    legal proceedings and precedent-setting tribunals)
  season_appearances:
