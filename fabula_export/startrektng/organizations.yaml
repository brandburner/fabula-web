  episode_count: 0
- fabula_uuid: ger_organization_5ad609eb7676
  global_id: ger_organization_5ad609eb7676
  canonical_name: The Borg
  description: The Borg function as a collective hive-mind that assimilates other
    species into its unified network through technological integration. A crashed
    vessel carries an injured adolescent member, prompting crew debate over aid amid
    fears of a homing signal summoning reinforcements. Their history includes destroying
    the El-Aurians and enforcing the mantra 'Resistance is futile.' The adolescent's
    loneliness and fractured recitation reveal emerging individuality within the collective's
    rigid programming.
  sphere_of_influence: Interstellar Hostile Threat and Tactical Targeting
  season_appearances:
  - 2
  - 3
  - 5
  - 6
  local_uuids:
