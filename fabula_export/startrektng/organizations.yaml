  description: 'An unidentified Klingon Bird-of-Prey acting as an armed adversary
    to the USS Enterprise‑D. The vessel functions as a hostile Klingon military unit:
    it engages in direct combat, employs cloaking capabilities, and is crewed by unnamed
    Klingon officers. In the processed scene the ship becomes enveloped by a shimmering
    anomaly, re‑cloaks, and departs with no sensor returns, forcing the Enterprise
    into emergency command and defensive action.'
