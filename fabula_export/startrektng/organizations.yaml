- fabula_uuid: ger_organization_a6a4a7dc268f
  global_id: ger_organization_a6a4a7dc268f
  canonical_name: Calamarain
  description: The Calamarain are an extrinsic alien species acting as a hostile military
    or paramilitary force in this episode. They mount direct attacks on the Enterprise,
    emit detectable surges of energy, and actively pursue or seek vengeance against
    the entity Q. Their actions create an external strategic and moral pressure on
    the crew, functioning both as an immediate battlefield threat and as an environmental/energetic
    factor that shapes tactical decisions aboard the starship.
  sphere_of_influence: Extraterrestrial Hostile Military/Paramilitary Force and Environmental
    Energetic Threat
