  global_id: ger_organization_54d20906c6b3
  canonical_name: The Grizzelas
  description: The Grizzelas function as a neutral, third‑party arbitration body invoked
    under the referenced treaty. In the presented events they are named formally by
    Picard pursuant to subsection D.3 to adjudicate disputes; their recognized hibernation
    cycle serves as a legal basis to suspend treaty enforcement, creating a temporary
    abeyance used strategically by calling parties.
