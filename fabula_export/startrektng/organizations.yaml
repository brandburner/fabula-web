  description: The USS Grissom functions as a Starfleet starship stationed near the
    Sigma Erani system. Riker names it as a backup supplier of hytritium when the
    Enterprise faces shortages during the transfer from Kivas Fajo's Jovis. Crews
    position it as a reliable resource ally, ready to provide critical materials without
    direct involvement in the primary operation.
