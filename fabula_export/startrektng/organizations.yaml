  episode_count: 0
- fabula_uuid: ger_organization_72ca9452bb58
  global_id: ger_organization_72ca9452bb58
  canonical_name: Cardassian Obsidian Order
  description: Gul Madred leads Obsidian Order interrogators who deploy chemical serums,
    psychological manipulation, and physical torment to break prisoners like Captain
    Picard. A med tech administers neural drugs during questioning on personal details
    and Minos Korva defenses. Tactics include dehumanization, false claims of Enterprise
    destruction, and offers of comfort for cooperation. Guards enforce restraint and
    suspension. Gul Lemec interrupts, exposing Madred's deceptions and signaling strategic
    shifts. Methods plunder Hebitian artifacts and defend Cardassian militarism as
    population salvation.
  sphere_of_influence: Clandestine Intelligence and Prisoner Interrogation
  season_appearances:
