  description: A collective class of external adversaries who, across nine millennia
    of galactic interaction, have treated the Zakdorn species as strategically supreme
    and thus avoid direct military confrontation. They function primarily through
    deterrent avoidance rather than open warfare; no single command, location, or
    formal designation is provided in the current material, and their influence derives
