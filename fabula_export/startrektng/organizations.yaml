- fabula_uuid: ger_organization_adee59167255
  global_id: ger_organization_adee59167255
  canonical_name: Simulated Borg
  description: The Simulated Borg runs as a holodeck program recreating Data's traumatic
    Borg encounter from his real assimilation ordeal. Data escalates the simulation's
    lethality to trigger an emotional response like his prior rage, commanding holographic
    drones that ignore his flat 'Stop' repetitions. Geordi intervenes, blocking the
    safety override to prevent Data's destruction and exposing their rift over reckless
    experimentation. Riker’s red alert cuts the session short, linking the virtual
    threat to the real Borg crisis.
  sphere_of_influence: Holodeck Trauma Recreation and Combat Simulation
