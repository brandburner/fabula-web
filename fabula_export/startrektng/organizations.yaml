- fabula_uuid: ger_organization_bffb22b75267
  global_id: ger_organization_bffb22b75267
  canonical_name: Trapped Alien Vessel
  description: Crew of the Trapped Alien Vessel sits stranded in the Tyken's Rift,
    their ship immobilized by the anomaly. They reach out telepathically to Counselor
    Troi through cryptic messages that haunt her nightmares, embedding pleas like
    'one moon circles' tied to hydrogen's atomic structure. Desperate for escape,
    the aliens plan a controlled hydrogen-calendenium detonation and hold position
    until the Enterprise signals 'Now!'. Data and Troi decode their intent, forging
    an alliance where the Enterprise supplies hydrogen for a mutual breakout from
    the rift's grip.
  sphere_of_influence: Interstellar Distress Signaling and Rift Escape Operations
