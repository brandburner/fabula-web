  global_id: ger_organization_3e891e4b6d3a
  canonical_name: R'uustai (Klingon Bonding Ritual)
  description: R'uustai operates as a formal Klingon bonding ritual that converts
    shared loss into an active, enforceable familial bond through tangible ceremonial
    acts. In the processed material the rite includes sash placement, candle lighting,
    and an uttered vow honoring mothers; it transmutes private grief into obligation
    and belonging, establishing social responsibilities and emotional anchoring between
    participants within Klingon kinship norms.
  sphere_of_influence: Klingon Cultural Kinship and Ceremonial Practice
  season_appearances:
