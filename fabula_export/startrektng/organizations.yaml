- fabula_uuid: ger_organization_b19f3d994251
  global_id: ger_organization_b19f3d994251
  canonical_name: The Ship (Bridge Crew / Vessel)
  description: A starboard command vessel whose bridge crew coordinates on-board repairs,
    manages external diplomatic communications, and organizes tactical away teams
    during emergent incidents. Commanded by senior officers present (including Picard,
    Riker, Worf, Troi, Data, and Geordi as communications), the vessel functions as
    a mobile crisis-response and investigative platform, projecting authority, dispatching
    personnel, and serving as the immediate operational hub in politically fraught
    situations.
  sphere_of_influence: Starship Operations, Tactical Crisis Response, and Diplomatic
    Communications
  season_appearances:
  - 3
  local_uuids:
