  episode_count: 1
- fabula_uuid: ger_organization_3924e7d4e5b8
  global_id: ger_organization_3924e7d4e5b8
  canonical_name: The Aldeans
  description: The Aldeans constitute the indigenous population of the cloaked planet
    Aldea, a highly advanced but dying civilization suffering from severe chromosomal
    damage causing sterility, physical decline, and a failing societal structure.
    Led by figures such as Radue and Duana, they defend their planet with an impenetrable
    shield and have abducted Federation children as leverage in negotiations demanding
    compensation. Their actions stem from desperation to preserve their species, blending
    hostile defense with tragic humanitarian urgency. They operate as a sovereign
    entity with a hierarchical leadership engaged in tense diplomatic and tactical
    conflicts with Starfleet representatives, notably Captain Picard and Doctor Crusher,
    who mediate communications and seek a resolution to the crisis involving their
    abducted children.
  sphere_of_influence: Planetary Defense, Diplomatic Negotiation, and Genetic Survival
    of a Dying Civilization
  season_appearances:
  - 1
  local_uuids:
    1: organization_8a589d898b04
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_11b39891b7eb
  global_id: ger_organization_11b39891b7eb
  canonical_name: The Archive
  description: The Archive operates as an ancient alien intelligence that mounts direct
    assaults on the Enterprise. It locks the ship with an unbreakable tractor beam
    and pumps escalating energy pulses through the hull to threaten structural failure.
    It seizes control of ship systems, converting the bridge into an alien temple
    via a transformation program. Crew members like Geordi access this program, inputting
    the Masaka symbol—revealed by Ihat's sacrifice—to counter the takeover, despite
    Troi's distrust of its hostile personalities.
  sphere_of_influence: Extraterrestrial Ship Immobilization and Systemic Transformation
  season_appearances:
  - 7
  local_uuids:
    1: org_25ef3b686165
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_7cd4b2fd438c
  global_id: ger_organization_7cd4b2fd438c
  canonical_name: The Board
  description: The Board acts as an institutional authority overseeing the actions
    and wellbeing of Paul Manheim, exercising judgment on his decisions and advising
    on his treatment and containment. It functions as a supervisory body with the
    power to dictate Manheim's location and care, reflecting a structured organization
    vested with governance over scientific and security matters related to interdimensional
    research crises. The Board maintains influence through advisory roles and evaluative
    judgments, indicating a formalized hierarchy concerned with managing the risks
    and ethical considerations of Manheim’s unstable breakthroughs.
  sphere_of_influence: Institutional Governance and Oversight of Scientific Research
    and Security
  season_appearances:
  - 1
  local_uuids:
