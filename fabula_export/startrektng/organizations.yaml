- fabula_uuid: ger_organization_babd832b41ae
  global_id: ger_organization_babd832b41ae
  canonical_name: The Resolution
  description: The Resolution enforces ritual suicide on Kaelon II at age 60, declaring
    lives beyond that point without value or meaning. This cultural mandate compels
    Timicin to end his life despite scientific contributions, sparking Lwaxana Troi's
    desperate opposition. It functions as a societal institution that prioritizes
    collective expectations over individual longevity, blocking personal relationships
    and medical interventions like those Timicin pursues on the Enterprise.
  sphere_of_influence: Kaelonian Ritual Suicide Enforcement
  season_appearances:
  - 4
  local_uuids:
