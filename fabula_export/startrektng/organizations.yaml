  global_id: ger_organization_6758504281f3
  canonical_name: The Braves
  description: 'The Braves appear as a named baseball team invoked by a twentieth‑century
    survivor who seeks familiar televised entertainment. Within the processed material
    the organization functions purely as a cultural and media reference: a communal
    identity broadcast on television that anchors displaced civilians’ memories and
    provides emotional comfort. The scene supplies no information about roster, ownership,
    league affiliation, or internal hierarchy; the team operates as a social touchstone
    rather than an operational actor in the narrative.'
  sphere_of_influence: Cultural and Professional Sports — 20th‑Century Baseball Entertainment
    and Media Presence
