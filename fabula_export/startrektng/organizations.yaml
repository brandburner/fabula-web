- fabula_uuid: ger_organization_0737b5801252
  global_id: ger_organization_0737b5801252
  canonical_name: Rogue Starfleet Faction (Captain Benjamin Maxwell's Crew)
  description: Captain Benjamin Maxwell leads this rogue Starfleet faction aboard
    the Phoenix. Chief O'Brien previously served under Maxwell. The group sparks conflict
    by attacking Cardassian targets, risking war between the Federation and Cardassians.
    Enterprise crew hunts them amid joint operations with Gul Macet, treating the
    faction as the primary antagonist and source of interstellar tension.
  sphere_of_influence: Rogue Military Operations and Interstellar Provocation
  season_appearances:
