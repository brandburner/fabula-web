  episode_count: 0
- fabula_uuid: ger_organization_c63bdd2a58b7
  global_id: ger_organization_c63bdd2a58b7
  canonical_name: Galactic Zoological Catalog
  description: A centralized interstellar registry and reference compendium for cataloging
    known life-forms and species. In the current material it functions as an authoritative
    source medical staff consult for species identification and taxonomic data; Pulaski
    cites it to explain the absence of any record for Anya’s form. No internal hierarchy
    or operational procedures appear in this material beyond its role as an informational
    repository.
  sphere_of_influence: Interstellar Taxonomy and Biological Reference (Species Cataloging
    and Medical Reference)
  season_appearances:
  - 2
  local_uuids:
