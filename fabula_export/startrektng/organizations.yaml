  global_id: ger_organization_da2265b4d2d3
  canonical_name: Duras Sisters (Lursa and B'Etor)
  description: Lursa and B'Etor lead illegal mining operations that target a magnesite
    deposit on Kalla Three in the Kalla system. They acquire mining equipment through
    illicit channels and plan to sell the extracted ore in the Ufandi system. Their
    activities directly threaten Worf's family interests, position them as primary
    antagonists, and drive the Enterprise crew's investigation, intel-gathering from
    Quark, and tactical bait using destroyed ore to expose their location.
  sphere_of_influence: Illegal Mining and Ore Trafficking
