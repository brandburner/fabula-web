  canonical_name: The Wall Street Journal
  description: The Wall Street Journal appears as a print‑era financial newspaper
    that Ralph consults to verify dates, market activity, and stock holdings. In this
    material it operates chiefly as an authoritative temporal and financial information
    source and as a cultural touchstone linking 21st‑century material concerns to
    the 24th‑century setting. The episode depicts its role in providing market data
    and historical continuity; no internal hierarchy or operational structure is shown.
  sphere_of_influence: Financial Journalism and Cultural Reference
