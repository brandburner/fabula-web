- fabula_uuid: ger_organization_313ab178d1b8
  global_id: ger_organization_313ab178d1b8
  canonical_name: Ligonian Culture
  description: Ligonian Culture represents the intricate social framework that governs
    concepts of honor, politeness, and ceremonial ritual within the Ligonian people.
    This cultural system shapes diplomatic negotiations and public interactions, imposing
    strict codes that influence political maneuvers and interpersonal conduct during
    high-stakes events such as Lutan's banquet. The Ligonian Culture acts as the invisible
    architect behind social order and conflict resolution, defining the boundaries
    within which honor must be publicly satisfied and disputes are ritualistically
    addressed.
  sphere_of_influence: Galactic Politics and Diplomatic Traditions
  season_appearances:
