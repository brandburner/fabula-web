  canonical_name: Federation Research Team (Tilonus Four)
  description: Specialized scientific research team stranded on Tilonus Four after
    the Prime Minister's assassination; their evacuation is the primary mission objective
    in *Frame of Mind* (S6E21). Distinct from Starfleet's surveillance or security
    operations.
  sphere_of_influence: Scientific Research on Unstable Planets
