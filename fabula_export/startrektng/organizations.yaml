  global_id: ger_organization_af24c4802a09
  canonical_name: Explorer Ship Charybdis
  description: The Explorer Ship Charybdis functions as a deep‑space exploration vessel
    whose telemetry feeds and mission logs anchor a pivotal mystery. Commanded by
    Colonel Stephen Richey, the ship operates with a formal chain of command and routine
    scientific/operational reporting. Its sudden telemetry failure and lost status
    link the crew's fate to anomalous hotel data, transforming the vessel from a routine
    research platform into a central investigatory and moral locus in the episode.
  sphere_of_influence: Deep‑Space Exploration and Mission Operations
