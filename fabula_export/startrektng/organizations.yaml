  episode_count: 1
- fabula_uuid: ger_organization_1a8b915ae8f5
  global_id: ger_organization_1a8b915ae8f5
  canonical_name: Tal Shiar
  description: Romulan Empire's elite intelligence and secret police agency, operating
    independently of the military chain of command. Specializes in surveillance, psychological
    coercion, and elimination of threats to internal security. Overrides military
    authority and answers directly to Romulan political leadership.
  sphere_of_influence: Romulan Imperial Intelligence and Internal Security
  season_appearances:
