- fabula_uuid: ger_organization_b69a4ac2d897
  global_id: ger_organization_b69a4ac2d897
  canonical_name: Stellar Physicists
  description: The Stellar Physicists operate as a specialized science team aboard
    the USS Enterprise, conducting research on stellar phenomena. They demand priority
    access to the thermal imaging array amid the ship's crisis, sparking a direct
    conflict with the planetary evolution team. Data observes the dispute on the bridge
    and proposes a coin flip to resolve it, but Beverly Crusher's interruption leaves
    the issue unsettled. This clash reveals fraying crew discipline under pressure.
  sphere_of_influence: Stellar Physics Research aboard the USS Enterprise
  season_appearances:
