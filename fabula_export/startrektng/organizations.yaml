  canonical_name: Dewan Culture
  description: 'Dewan Culture denotes a distinct linguistic and cultural community
    whose language serves as a comparative reference point in efforts to reconstruct
    an ancient Iconian root. In the current material Dewan functions as a source of
    lexical data rather than an active polity: Starfleet linguists (Data, Picard)
    invoke Dewan lexical parallels to triangulate historical relationships, implying
    a preserved corpus or remembered vocabulary used for archaeolinguistic forensics
    and cultural provenance.'
  sphere_of_influence: Linguistic Heritage and Comparative Archaeolinguistics; cultural-linguistic
    reference used in historical reconstruction
