- fabula_uuid: ger_organization_bc42a2dfcc4d
  global_id: ger_organization_bc42a2dfcc4d
  canonical_name: Rekag
  description: Rekag deploys battle cruisers to ambush vessels like the *Dorian*,
    powering weapons before retreating from *Enterprise* detection. They retaliate
    against Seronia after shuttle losses, fueling broken ceasefires and town attacks
    by sympathizers. Rekag refuses negotiations on Seronian territory, escalating
    a war that endangers Federation shipping routes and demands diplomatic intervention.
  sphere_of_influence: Regional Military Aggression and Seronia Conflict
  season_appearances:
  - 6
  local_uuids:
