  episode_count: 0
- fabula_uuid: ger_organization_7a7da524551c
  global_id: ger_organization_7a7da524551c
  canonical_name: Federation Archeology Council
  description: The Federation Archaeological Survey (also referred to as the Federation
    Archeology Council or simply the Archaeology Council) is a Federation entity responsible
    for cataloging ancient sites across Federation space, including the Debrune ruins
    on Barradas Three. Their records detail planetary historical features and provide
    critical context for anomalous energy signals. The organization's work is referenced
    by senior staff (Riker, Data, Geordi, Worf) during mission planning in the Observation
    Lounge, aiding interpretation of archaeological sites' significance amid urgent
    operations. The entity enforces protocols related to archaeological research and
    site access, though its primary function remains historical documentation and
    analysis.
  sphere_of_influence: Federation Archaeological Cataloguing and Historical Site Documentation
  season_appearances:
