  description: The People of Bre'el Four are the civilian population inhabiting the
    world Bre'el Four, numbering in the millions and serving as the primary at-risk
    stakeholder in the episode. Their threatened survival drives Starfleet's tactical
    choices and moral urgency. No formal governing body, military structure, or leadership
    is shown; they function narratively as a broad civilian constituency whose existence
    imposes life-and-death constraints on the Enterprise crew's decisions and responses.
