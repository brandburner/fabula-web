- fabula_uuid: ger_organization_ee7c193da718
  global_id: ger_organization_ee7c193da718
  canonical_name: Koinonian Forces (Koinonian Wars-era)
  description: A historical belligerent collective associated with the Koinonian Wars,
    identified here as the origin era for advanced wartime devices. Representing wartime
    military and paramilitary actors, these forces developed covert weaponry—including
    stealthy subspace detonators—and operated with methods suited to sabotage, clandestine
    emplacement, and deceptive battlefield practices. Their presence functions as
    a historical provenance for recovered ordnance in the current investigation.
  sphere_of_influence: Historical Military Conflict and Wartime Ordnance Origins;
    Covert Weapons Development and Deployment
  season_appearances:
  - 3
  local_uuids:
