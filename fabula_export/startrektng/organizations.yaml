  episode_count: 1
- fabula_uuid: ger_organization_17b669d9f157
  global_id: ger_organization_17b669d9f157
  canonical_name: Neo-Transcendentalists
  description: 'A historical philosophical movement cited in archival analysis to
    account for the Mariposa passengers'' contradictory cargo choices, blending primitive
    artisanal goods with advanced electronics. In the current material the group functions
    as an explanatory ideology rather than an active institution: no leadership, membership
    rolls, or organized activities are shown, only a cultural rationale invoked by
    investigators.'
  sphere_of_influence: Cultural and Philosophical Ideology — Motivational Influence
    on Migration and Material Culture
  season_appearances:
  - 2
  local_uuids:
    1: organization_49709925f43b
  first_appearance_season: 2
