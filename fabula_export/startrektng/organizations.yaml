  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_83861583bd02
  global_id: ger_organization_83861583bd02
  canonical_name: Chrysalian Delegation
  description: The Chrysalian Delegation is a sovereign Chrysalia political faction
    and diplomatic body that pursues strict neutrality and long-term peace as its
    defining policy. Represented in high-stakes interstellar bargaining by agents
    such as Devinoni Ral, the delegation wields moral and procedural leverage—invoking
    ten generations of nonbelligerence—to secure strategic assets and influence outcomes.
    The Chrysalians exercise internal discipline (recalling and holding negotiators
    accountable), transact with other polities, and function as a decisive stakeholder
    in wormhole governance disputes.
  sphere_of_influence: Interstellar Diplomacy and Sovereign Governance
  season_appearances:
  - 3
  local_uuids:
    1: organization_ba55b28058fd
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_fad3ec25817e
  global_id: ger_organization_fad3ec25817e
  canonical_name: Clan Tralesta
  description: Clan Tralesta is a named familial clan within the Gatherer community
    invoked as the source of a long-standing vendetta. A member, Yuta, openly claims
    Tralesta affiliation to justify a targeted killing of Volnoth, converting private
    retribution into a public diplomatic crisis. The clan functions as a focal point
    for honor-based grievance and retributive motive; the episode shows its name carrying
    decisive social weight but does not depict formal institutional structure or leadership
    beyond being cited to legitimize violent action.
  sphere_of_influence: Clan-based vendetta; covert biological operations and assassination
    with direct impact on interstellar diplomacy and political stability
  season_appearances:
