- fabula_uuid: ger_organization_442584c8e6d0
  global_id: ger_organization_442584c8e6d0
  canonical_name: Enterprise Security (Security Teams)
  description: 'Enterprise Security functions as the USS Enterprise''s internal security
    force: organized, mission-ready security teams embedded within the ship''s chain
    of command. They mobilize at the direction of the ship''s senior officers (here,
    Chief of Security Worf), secure sensitive spaces such as transporter rooms, execute
    apprehension or reception of incoming persons, perform crowd and access control,
    and coordinate with bridge command and technical personnel to translate tactical
    and diplomatic orders into immediate physical enforcement. Their methods combine
    military-style hierarchy, rapid-deployment standing teams, and close operational
    integration with command and engineering elements during high-stakes incidents.'
  sphere_of_influence: Shipboard Security and Force Protection (Starfleet internal
    law enforcement and tactical response)
