  global_id: ger_organization_a13edee8c375
  canonical_name: European Hegemony
  description: A historical political and spacefaring authority identified as the
    originator and registered owner of the centuries‑old distress beacon recovered
    by the Enterprise. Active in recorded beacon use between 2123–2190, the Hegemony
    functioned as an administrative power that managed colonial launches, long‑range
    distress communications, and archival identifiers; its apparent disappearance
    frames the episode's central mystery and provides critical temporal context.
  sphere_of_influence: Historical Interstellar Colonial Governance and Long‑Range
    Distress Communications
