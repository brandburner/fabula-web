- fabula_uuid: ger_organization_b3f78ddc45d2
  global_id: ger_organization_b3f78ddc45d2
  canonical_name: Shipboard Families and Dependents
  description: Shipboard Families and Dependents are the non-combatant civilians aboard
    the vessel—spouses, children, and other dependents—treated as a vulnerable population
    during crises. The bridge directs their assembly on odd-numbered decks for protection,
    triage, sealing of non-operational areas, and prioritized evacuation. They possess
    no internal command hierarchy; senior ship officers assume protective authority
    and coordinate medical and logistical measures on their behalf.
  sphere_of_influence: Onboard Civilian Welfare, Emergency Triage, and Evacuation
  season_appearances:
