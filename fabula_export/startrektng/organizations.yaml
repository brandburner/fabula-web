  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_201146cca866
  global_id: ger_organization_201146cca866
  canonical_name: First Unit
  description: First Unit operates as a formal subgroup within the society of Aldea,
    tasked with managing abducted Federation children by assigning them to talent-based
    social units and overseeing their forced assimilation. It functions as a rigid
    organizational structure designed to fracture original family bonds, impose new
    social identities, and maintain control through designated leadership, exemplified
    by Wesley's coerced role as leader. First Unit acts as both an administrative
    and sociocultural mechanism enforcing Aldea’s survival-driven policies, balancing
    authoritarian order with emerging tensions and resistance among the children.
  sphere_of_influence: Child Assimilation and Social Structuring within Aldea
  season_appearances:
  - 1
  local_uuids:
    1: organization_e09a961dbdf7
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_3fedb1a8ad2d
  global_id: ger_organization_3fedb1a8ad2d
  canonical_name: Foreign Investors
  description: A vague, unspecified group of outside purchasers who acquire the Royale
    hotel at the novel's end for $12.5 million. They act as a lawful exit mechanism
    that Riker identifies and intends to exploit through a property sale; their activity
    is limited to market acquisition and legal transfer. The group's internal structure,
    nationality, corporate identity, motivations, and agents remain entirely unspecified
    in the current material, rendering them primarily a narrative plot device that
    facilitates the protagonists' escape rather than a fully developed organization
    within the story world.
  sphere_of_influence: Commercial Acquisition and Investment (Property Acquisition/Corporate
    Purchase)
