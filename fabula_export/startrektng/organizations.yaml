- fabula_uuid: ger_organization_7accd4c5c88a
  global_id: ger_organization_7accd4c5c88a
  canonical_name: Fajo's Collection
  description: Kivas Fajo curates a private hoard of unique and rare artifacts on
    Beta Agni II, kidnapping Data via shuttle sabotage and Varria's deception to claim
    him as a possession. From his den, Fajo imposes ruthless control, treating items
    as extensions of his will. Data's resistance exposes limits. The crew uncovers
    the scheme during the hytritium crisis, marking the collection as a direct Starfleet
    antagonist.
  sphere_of_influence: Illicit Acquisition and Possession of Rare Artifacts
  season_appearances:
