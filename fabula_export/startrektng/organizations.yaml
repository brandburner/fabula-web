- fabula_uuid: ger_organization_fe1cabee5e19
  global_id: ger_organization_fe1cabee5e19
  canonical_name: USS Potemkin
  description: The USS Potemkin is a Starfleet starship that serves as a critical
    logistical hub in inter-ship medical emergencies. During Worf's paralysis crisis,
    it dispatches Dr. Toby Russell via transporter to the USS Enterprise, coordinates
    the transfer of her specialized medical equipment, and facilitates transporter
    operations between the two vessels. Its role underscores Starfleet's collaborative
    response to onboard medical emergencies, particularly amid tensions between Dr.
    Beverly Crusher and Dr. Toby Russell.
  sphere_of_influence: Starfleet Vessel Operations and Personnel Transport
