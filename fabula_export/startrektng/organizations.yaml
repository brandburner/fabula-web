  global_id: ger_organization_695ed5a0c5fd
  canonical_name: Earth Government (Board of Governors)
  description: The Earth Government, also referred to as the Board of Governors, funds
    and directs the Atlantis project, a scientific research initiative where Louis
    serves a key role. This governing body seeks a proven leader (specifically Jean-Luc
    Picard) to replace current management, contrasting with Starfleet by offering
    a path rooted in Earth-based innovation and research access. The Board of Governors
    embodies an alternative career path for Picard, catalyzing his internal conflict
    between family obligations and Starfleet duties amid his post-trauma vulnerability.
  sphere_of_influence: Civilian Scientific Research Oversight
