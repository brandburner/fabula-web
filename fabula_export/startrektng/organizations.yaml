  canonical_name: Utopia Planitia Drafting Office
  description: Utopia Planitia Drafting Office functions as the facility that stores,
    manages, and reproduces development-stage prototype schematics. In the processed
    material it is explicitly identified as the source/provider of a prototype schematic
    Geordi requests be recreated in Holodeck Three. The office operates as a technical
    drafting and archival arm of the broader Utopia Planitia shipyard complex, interfacing
    with Starfleet engineering personnel and computerized systems to support prototype
    testing, iterative design, and secure transfer of engineering data.
