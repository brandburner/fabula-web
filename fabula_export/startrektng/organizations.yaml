  global_id: ger_organization_ab47564ed419
  canonical_name: Dixon Hill Private Investigations
  description: Dixon Hill Private Investigations runs as a 1940s-style detective agency
    inside the Enterprise holodeck program. Dixon Hill heads the firm from an office
    with a door sign reading the name in reverse. Secretary Madeline controls access
    from the outer office, clashing with intruders like Guinan over appointments.
    The agency sets the stage for Picard's mystery probe amid simulation glitches
    and temporal anomalies.
