  canonical_name: Federation Astrophysical Survey
  description: Specialized scientific division under the United Federation of Planets,
    focused on astrophysical data collection and celestial anomaly research. Operates
    as a *subordinate arm* of the UFP, executing routine sensor logging and research
    protocols (e.g., comet scans).
