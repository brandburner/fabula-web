- fabula_uuid: ger_organization_02088698d8d5
  global_id: ger_organization_02088698d8d5
  canonical_name: Enterprise Away Team (Riker-led Landing Party)
  description: Starfleet officers from the USS Enterprise-D, led by Commander Riker,
    Counselor Troi, and Lieutenant Geordi La Forge, conduct a planetary survey of
    the Genome Colony. They challenge the colonists' eugenics program, voicing surprise
    at the selective breeding of eight generations, skepticism toward claims of perfection,
    and defiance against isolationist dogma. Geordi directly confronts elder Benbeck's
    elitism, while Troi's bond with Conor tests her objectivity. Their pushback forces
    the colony to defend its ideology, escalating tensions and previewing Starfleet's
    potential intervention to align the society with Federation ethics.
  sphere_of_influence: 'Starfleet field operations: tactical landing parties, on-world
    investigations, close-quarters reconnaissance, emergency retrievals, and ship-directed
    rapid-response operations in contested or sensitive space'
