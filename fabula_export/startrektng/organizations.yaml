  episode_count: 0
- fabula_uuid: ger_organization_85066ab84f81
  global_id: ger_organization_85066ab84f81
  canonical_name: Stellar Cartography
  description: A formal **department** aboard the USS Enterprise-D, distinct from
    generic scientific roles or ad-hoc teams. Led by Lieutenant Commander Nella Daren,
    with named officers (Richardson, Deng) and operational authority over ship-wide
    resources. Directly involved in field missions and tactical modifications during
    crises (e.g., Bersallis Three).
  sphere_of_influence: Starship Stellar Research, Experimentation, and Field Operations
