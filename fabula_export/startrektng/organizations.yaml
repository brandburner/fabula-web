  description: Mars Station functions as a Mars-based engineering installation that
    houses Utopia Planitia's drafting rooms and technical archives. It holds restricted
    prototype schematics (for example, a development-stage prototype schematic from
    drafting room five), acts as a repository and design authority for advanced engineering
    artifacts, and provides controlled access to those schematics for authorized shipboard
    systems and personnel during urgent technical operations.
