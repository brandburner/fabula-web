- fabula_uuid: ger_organization_16e162ba42db
  global_id: ger_organization_16e162ba42db
  canonical_name: The Institute
  description: The Institute is a scientific research institution previously employing
    Professor Paul Manheim, where advanced experimental work on dimensional phenomena
    was conducted. Its role centers on cutting-edge scientific investigation into
    interdimensional energies and related technologies. The organization maintains
    a structured research environment that deeply influences narrative developments
    by linking Manheim's mysterious disappearance and hazardous experiments to broader
    dimensional threats encountered by the Enterprise crew.
  sphere_of_influence: Advanced Scientific Research and Experimental Dimensional Physics
  season_appearances:
  - 1
  local_uuids:
