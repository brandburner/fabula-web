  canonical_name: USS Enterprise-D (NCC-1701-D)
  description: "\n  The USS Enterprise-D (NCC-1701-D) is Captain Picard's flagship,\
    \ a Galaxy-class starship trapped in Tyken's Rift for ten days with failing power\
    \ reserves and unanswered distress signals. The crew experiences severe REM sleep\
    \ deprivation, hallucinations, and psychological strain, while life support systems\
    \ degrade. Key events include:\n  - **Crisis Management**: Data serves as acting\
    \ captain, diverting life support to the warp core to power an escape attempt\
    \ and authorizing Troi's risky telepathic probe via cortical stimulator.\n  -\
    \ **Survival Hub**: The ship functions as the central survival hub amid crew dysfunction,\
    \ with Picard recording the crisis from the Observation Lounge.\n  - **Telepathic\
    \ Threat**: Troi interrogates survivor Hagan in Sickbay, decoding his repeated\
    \ phrases as deliberate telepathic signals from Rift entities, confirming an external\
    \ engineered threat.\n  - **Escape**: Data later pilots the ship free toward Starbase\
    \ 220, relieving the exhausted team (Picard, Crusher, Troi) for rest.\n  The narrative\
    \ emphasizes the ship's dual role as both a physical and psychological battleground\
    \ during the crisis.\n  "
