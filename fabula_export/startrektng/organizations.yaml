  episode_count: 1
- fabula_uuid: ger_organization_9ddbcf14b02e
  global_id: ger_organization_9ddbcf14b02e
  canonical_name: Vulcan Government (High Command)
  description: 'The central governing body of Vulcan, encompassing both political
    and military leadership (referred to as the ''High Command'' in military/policy
    contexts). It rules Vulcan and represents its people, who maintain generations
    of distrust toward Romulans. The government responds cautiously to Proconsul Neral''s
    reunification endorsement, as warned by Spock. Romulan commander Sela targets
    it with deception: a holographic Spock and forged peace speech trick Vulcan into
    welcoming an invasion fleet disguised as a peace envoy. This ploy aims to install
    a puppet ''new Vulcan government'' under Romulan control, undermining Vulcan sovereignty.
    Historical tensions are evident in debates like Sarek''s support versus Spock''s
    opposition during the Cardassian War.'
  sphere_of_influence: Planetary Governance and Reunification Diplomacy
  season_appearances:
  - 5
  - 5
  local_uuids:
    1: org_a1089859de2d
    2: org_6d9f35cbc8ba
  first_appearance_season: 5
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_37989427e593
  global_id: ger_organization_37989427e593
  canonical_name: Vulcan High Command
  description: The Vulcan High Command dispatches Ambassador T'Pel as its diplomatic
    representative to the Enterprise for negotiations. T'Pel asserts authority through
    her stoic demeanor, formal protocol adherence, and abrupt dismissal of Commander
    Riker, prioritizing Vulcan discipline over Starfleet customs. Data notes her presence
    highlights contrasts between Vulcan logic and human emotionality. Her actions
    project governmental control in interstellar talks, foreshadowing clashes with
    Federation collaboration.
  sphere_of_influence: Vulcan Diplomatic Authority and Governance
  season_appearances:
  - 4
  - 6
  local_uuids:
    1: org_139df1f067ad
    2: org_139df1f067ad
  first_appearance_season: 4
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_e202f73aafbd
  global_id: ger_organization_e202f73aafbd
  canonical_name: Vulcan Science Academy
  description: The Vulcan Science Academy stands as a prestigious Vulcan institution
    specializing in subspace morphology and advanced scientific research. T’Pan directs
    it after fifteen years in the role, and her affiliation bolsters her authority
    when she questions Reyga’s metaphasic shield technology. Panelists and Beverly
    Crusher reference the academy to underscore T’Pan’s expertise during evaluations
    of high-risk stellar experiments.
  sphere_of_influence: Vulcan Advanced Scientific Research and Subspace Expertise
  season_appearances:
  - 6
  local_uuids:
    1: org_c4fb5bf85616
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_0481e316d872
  global_id: ger_organization_0481e316d872
  canonical_name: Vulcan Security (Vulcan Authorities)
  description: "\n  **Vulcan Security** (also referred to as **Vulcan Authorities**)\
    \ serves as Vulcan's official law enforcement and intelligence body, responsible\
    \ for domestic security, counterintelligence, and the management of legal fallout\
    \ from interstellar incidents involving off-world suspects. Directed by Minister\
    \ Satok, the organization operates with broad authority, including:\n  - **Domestic\
    \ Security**: Dismantling extremist plots threatening Vulcan society (e.g., isolationist\
    \ movements).\n  - **Intelligence Operations**: Deploying undercover agents (e.g.,\
    \ Tallera, who posed as T'Paal) to probe internal threats.\n  - **Custody and\
    \ Detention**: Holding captured mercenaries and off-world suspects in temporary\
    \ detention (e.g., following Starfleet's neutralization of a psionic resonator).\n\
    \  - **Operational Legitimacy**: Collaborating with Starfleet (e.g., during Riker's\
    \ undercover check) while navigating bureaucratic hurdles.\n\n  The organization's\
    \ dual nomenclature—**Vulcan Security** (internal operational name) and **Vulcan\
    \ Authorities** (external/legal reference)—reflects its dual role as both an enforcement\
    \ agency and a bureaucratic entity managing interstellar legal matters. Picard,\
    \ Data, and Riker acknowledge its role in post-mission debriefs, emphasizing its\
    \ capacity to secure high-stakes assets (e.g., resonators) independently of Starfleet\
    \ aid.\n  "
  sphere_of_influence: Vulcan Internal Security and Counter-Extremism
  season_appearances:
  - 7
  local_uuids:
    1: org_285b153ab16e
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_cae76ade358e
  global_id: ger_organization_cae76ade358e
  canonical_name: Vulcan Society
  description: Vulcan society upholds rigid cultural norms centered on logic and emotional
    suppression. Sarek embodies these expectations by disapproving Spock's emotional
    approach to the reunification mission with Romulus. This framework fuels Spock's
    internal conflict, as he grapples with familial disapproval and weighs logic against
    his human-influenced empathy. The society's influence manifests in personal relationships
    and philosophical debates over emotional vulnerability versus pure reason.
  sphere_of_influence: Vulcan Cultural Norms and Logical Discipline
  season_appearances:
  - 5
  local_uuids:
    1: org_0d3bc8c3fa4d
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3ad053625981
  global_id: ger_organization_3ad053625981
  canonical_name: Vulcans
  description: Vulcans are presented here as a species-level cultural and biological
    baseline invoked to contrast Romulan development. Speakers use Vulcan traits—logic,
    restraint, and a distinct social evolution—to highlight how Romulans diverged
    in temperament and strategy. The material supplies no Vulcan institutions, hierarchy,
    or operational activity; Vulcans function solely as comparative context for diplomatic
    and psychological profiling.
  sphere_of_influence: Interstellar Cultural and Species Reference — diplomatic and
    psychological profiling contexts
  season_appearances:
  - 1
  - 3
  local_uuids:
