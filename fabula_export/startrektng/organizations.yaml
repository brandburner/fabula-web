- fabula_uuid: ger_organization_3179a292c1bf
  global_id: ger_organization_3179a292c1bf
  canonical_name: Federation Outposts
  description: A decentralized network of Starfleet-operated frontier installations
    and orbital support facilities maintained by the United Federation of Planets.
    These outposts perform logistics, reconnaissance, regional security, emergency
    response, and diplomatic/forward-presence functions along contested borders such
    as the Neutral Zone. In the current material several outposts have been annihilated
    and are explicitly cited as targets and forensic evidence of a mounting external
    threat, linking them operationally to Starfleet command and regional defense coordination.
  sphere_of_influence: Federation Frontier Defense, Orbital Support, Regional Security
    Coordination, and Emergency Response
