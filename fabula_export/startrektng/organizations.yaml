  episode_count: 1
- fabula_uuid: ger_organization_4ee01c321a00
  global_id: ger_organization_4ee01c321a00
  canonical_name: Minosian Automated Weapon System
  description: The Minosian Automated Weapon System operates as a hostile, self-defending
    technological entity embedded within the surface defenses of planet Minos. It
    employs sophisticated holographic deception, creating a false Captain Paul Rice
    hologram to lure and trap away teams. Upon exposure, it reveals lethal automated
    weaponry that immobilizes targets with advanced containment technology, such as
    an impenetrable lucinium cube. Acting autonomously, it aggressively defends its
    territory against intruders, representing a non-sentient but strategically dangerous
    antagonist force hostile to Federation personnel.
  sphere_of_influence: Planetary Defense and Automated Hostile Security Systems
  season_appearances:
  - 1
  local_uuids:
