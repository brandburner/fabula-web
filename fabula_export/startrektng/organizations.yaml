  canonical_name: Radical Factions (Peliar Zel Conflict)
  description: Radical factions drive the violent escalation between Peliar Zel's
    Alpha and Beta moons, turning a diplomatic crisis into an existential threat.
    Governor Leka warns Odan against shuttle travel to the surface, citing their active
    involvement and readiness to deploy force against targets. These groups heighten
    tensions that demand urgent mediation from Federation ambassador Odan, operating
    amid the planet's unstable orbit and brewing hostilities.
  sphere_of_influence: Insurgent Violence in Peliar Zel Inter-Moon Conflict
  season_appearances:
