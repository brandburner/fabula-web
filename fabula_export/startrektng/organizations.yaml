  episode_count: 0
- fabula_uuid: ger_organization_28974572fcb6
  global_id: ger_organization_28974572fcb6
  canonical_name: Team of Officers (Shuttle Bay Control Booth)
  description: A small, operational control‑booth team charged with executing final
    launch‑readiness procedures for the shuttle bay's experimental egg‑shaped unit.
    They receive and acknowledge commands from the Commander, run checklist verifications,
    and actuate systems that convert authorization into actual deployment. Functioning
    as allied technical crew, they maintain direct control over launch interfaces
    and immediate safety protocols during the critical pre‑launch sequence.
  sphere_of_influence: Launch Operations and Shuttle Bay Control
  season_appearances:
  - 3
  local_uuids:
