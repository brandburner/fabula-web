- fabula_uuid: ger_organization_4acecc0ccc82
  global_id: ger_organization_4acecc0ccc82
  canonical_name: Romulan Senate
  description: The Romulan Senate governs Romulus through legislative sessions and
    adjournments that free senators like Pardek for clandestine reunification talks
    in areas like the Krocton Segment. Proconsul Neral represents its authority, endorsing
    Vulcan peace publicly while plotting invasion via a fake envoy with Sela. Recalls
    interrupt diplomacy, and public disillusionment grows over Klingon War failures
    and Federation clashes. Security patrols the capital against intruders like Picard
    and Data. Internal divisions pit reformists against traditionalists, fueling underground
    movements and interstellar deceptions.
  sphere_of_influence: Romulan Legislative Governance and Political Deception
  season_appearances:
  - 5
  - 6
  local_uuids:
