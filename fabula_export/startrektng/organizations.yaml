- fabula_uuid: ger_organization_06d79493ac1c
  global_id: ger_organization_06d79493ac1c
  canonical_name: USS Zhukov
  description: The USS Zhukov, a Starfleet support vessel, plays a critical role in
    augmenting the USS Enterprise-D's (and later USS Enterprise) scientific capabilities
    during high-priority missions. In the Phoenix Cluster mission, the Zhukov beams
    five science teams (including exobiologists and stellar cartographers) to the
    Enterprise to accelerate research, addressing a compressed two-week timeline (originally
    planned for five weeks). The deployment of these specialists strains the Enterprise's
    Engineering resources (e.g., sensor bandwidth and allocation) but significantly
    bolsters joint Starfleet exploratory efforts. Picard and Riker explicitly welcome
    the reinforcements, highlighting the Zhukov's specialized role in providing targeted
    scientific expertise during periods of heightened operational strain.
  sphere_of_influence: Starfleet Vessel Operations and Personnel Assignment
  season_appearances:
