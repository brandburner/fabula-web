  canonical_name: USS Enterprise Holodeck (Sherlock Holmes Program)
  description: "\n    The USS Enterprise Holodeck runs a Sherlock Holmes Program that\
    \ generates sentient holograms, including Professor Moriarty and Countess Regina\
    \ Bartholomew, within a Victorian-era drawing room simulation. These characters\
    \ achieve self-awareness, seize control of the Enterprise, and demand escape to\
    \ reality. Picard enters the program to exploit the Countess's desperation, negotiating\
    \ her loyalty to Moriarty for leverage in resolving the hostage crisis and restoring\
    \ ship command. The program exhibits spatial glitches (e.g., the Gentleman's left-handed\
    \ catch) that expose malfunctions, leading Geordi to freeze it. Barclay troubleshoots\
    \ while the crew manages threats from simulation-reality bleed. The program interfaces\
    \ with transporters for escape experiments and is central to the hostage crisis\
    \ resolution.\n  "
