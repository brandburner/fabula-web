- fabula_uuid: ger_organization_618363e011c0
  global_id: ger_organization_618363e011c0
  canonical_name: Nesting Warp-Core Alien Species (Timescape Incident)
  description: A sentient alien species that nests its embryonic young in warp engine
    cores, mistaking the energy-rich environment for an ideal habitat. Their offspring's
    presence in a Romulan warp core during a power transfer creates a temporal anomaly.
    An adult entity temporarily inhabits a Romulan body to communicate with the USS
    Enterprise crew, pleading for the transfer to be halted to save the trapped young.
    The species' behavior is driven by parental instinct, and their interaction with
    Starfleet reveals the anomaly's organic origins.
  sphere_of_influence: Reproductive Nesting and Unintentional Temporal Disruption
  season_appearances:
  - 6
  local_uuids:
    1: org_a49bfb9272b6
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_12a14e1586d5
  global_id: ger_organization_12a14e1586d5
  canonical_name: Neutral Zone
  description: 'The Neutral Zone functions as a demarcated interstellar political
    boundary separating opposing sovereignties and framing operational limits for
    Starfleet and Romulan forces. In the current material it operates as a strategic
    constraint and diplomatic flashpoint: its territory defines risk exposure, channels
    military signaling, and constrains patrol and rescue courses. No formal governing
    body or internal bureaucracy appears; enforcement and consequence derive from
    the proximate presence and posture of neighbouring state actors.'
  sphere_of_influence: Interstellar Political Boundary; Strategic Border Zone influencing
    Diplomacy, Military Posture, and Operational Risk
  season_appearances:
  - 2
  - 4
  - 7
  local_uuids:
    1: organization_0e6f06c94f6f
    2: org_312c522b3d6f
    3: org_312c522b3d6f
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_7c6c6eb622c8
  global_id: ger_organization_7c6c6eb622c8
  canonical_name: New Denver (N.D.) Colony
  description: 'Central to the Bersallis Three mission in *Star Trek: The Next Generation*
    S06E19 (''Lessons''), this colony is located on the planet''s surface and shielded
    by perimeter deflector units against an imminent catastrophic storm. Its survival
    is tied to external calibration efforts and evacuation coordination, with direct
    interactions involving Nella Daren, Richardson, and Deng.'
  sphere_of_influence: Planetary Civilian Settlement and Storm Defense Evacuation
  season_appearances:
  - 6
  local_uuids:
    1: org_66c05388e3b3
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_4a32f8e0e18b
  global_id: ger_organization_4a32f8e0e18b
  canonical_name: Nottingham Castle's Guards
  description: Nottingham Castle's Guards enforce security and authority inside the
    castle walls under Sir Guy's direct command. They escort figures like Vash, disguised
    as Maid Marian, to assigned chambers, acting as enforcers who maintain order and
    support leadership efforts to capture intruders such as Robin Hood. Their presence
    deters threats and executes orders amid schemes involving Q and castle allies.
  sphere_of_influence: Castle Security and Enforcement
  season_appearances:
  - 4
  local_uuids:
    1: org_81c193941cbf
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_cb62a8e5ebc8
  global_id: ger_organization_cb62a8e5ebc8
  canonical_name: Nova Squadron
  description: Nova Squadron operates as a tight-knit Starfleet Academy cadet flight
    team under Nicholas Locarno's leadership, with members Wesley Crusher, Sito Jaxa,
    Jean Hajar, and the deceased Joshua Albert. They train in precision maneuvers
    near Saturn but executed the banned Kolvoord Starburst, causing Albert's death
    during plasma exhaust purge. Locarno enforces loyalty through promises of unity
    and post-graduation postings, pressuring cover-up via false flight plans and blame
    on Albert. Depositions expose inconsistencies; group fractures as Wesley confesses,
    contrasting squadron bonds with Starfleet integrity.
  sphere_of_influence: Starfleet Academy Cadet Flight Training
  season_appearances:
  - 5
  local_uuids:
    1: org_95de10b24f92
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b70c99422de2
  global_id: ger_organization_b70c99422de2
  canonical_name: Odin Survivors
  description: The Odin Crew Survivors represent a tightly knit group led by Ramsey,
    composed of individuals who endured five months adrift in a rescue pod before
    arriving on Angel One. Rejecting Federation rescue, they embody a defiant autonomy
    rooted in complex cultural and moral considerations within Angel One's matriarchal
    society. Their refusal to evacuate highlights tensions between Starfleet authority
    and individual self-determination, exposing systemic gender conflicts and challenging
    traditional rescue paradigms. This group operates with a clear internal leadership
    under Ramsey and navigates fraught negotiations involving Federation agents, reflecting
    both resilience and principled resistance.
  sphere_of_influence: Political Defiance and Territorial Sovereignty; Local Civilian
    Authority and Emergency Evacuation Impact
  season_appearances:
  - 1
  - 2
  local_uuids:
    1: organization_9f2d6bf0513b
    2: organization_a592db9fb35c
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_d5d184ec8b5d
  global_id: ger_organization_d5d184ec8b5d
  canonical_name: Oligarchy on Atifs Four
  description: 'The Oligarchy on Atifs Four refers to a planet-level ruling elite
    on Atifs Four that enacts and enforces communal dining rituals as part of its
    cultural-political order. In the current material the group appears only as a
    comparative cultural example cited by Data: the oligarchy reportedly requires
    a ceremonial obligation involving a young male during communal meals. No formal
    leadership names, institutional structure, or wider political actions are shown;
    its role in the narrative is limited to illustrative cultural regulation and social
    custom.'
  sphere_of_influence: Planetary Political Governance and Ritual/Cultural Regulation
  season_appearances:
  - 2
  local_uuids:
    1: organization_474cf1c4cc46
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c9aab590e439
  global_id: ger_organization_c9aab590e439
  canonical_name: Omicron Theta Colony
  description: Omicron Theta Colony operated as a remote scientific outpost on its
    namesake planet. Researchers there, including Dr. Clendenning, pioneered gamma
    scan experiments to detect crystalline lifeforms. The Crystalline Entity destroyed
    the colony, killing all inhabitants such as Dr. Kila Marr's son Renny. Data holds
    Clendenning's knowledge and the colony's data archives, linking him directly to
    its lost research.
  sphere_of_influence: Extraterrestrial Scientific Research
  season_appearances:
  - 5
  local_uuids:
    1: org_c64872421975
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e135f67193db
  global_id: ger_organization_e135f67193db
  canonical_name: Ooolans of Marejaretus Six
  description: A planetary cultural group cited for a distinctive communal dining
    ritual in which two large stones are continuously struck during a meal; participants
    are obliged to eat until the stones are broken. In the current material they appear
    only as an ethnographic comparator invoked by Commander Data to contextualize
    Betazoid table customs. No internal institutions, hierarchy, political activity,
    or broader social structure are shown; their role in the scene is purely cultural
    — a behavioral norm that reveals strict ceremonial expectations around shared
    meals.
  sphere_of_influence: Species Cultural Practices and Ceremonial Dining Rituals
  season_appearances:
  - 2
  local_uuids:
    1: organization_08df1193a019
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_31c954bba0d3
  global_id: ger_organization_31c954bba0d3
  canonical_name: Operations Department (Ops)
  description: The Operations Department (Ops) serves as the Enterprise-D's shipboard
    operational support arm, coordinating tactical assistance, logistics, sensor and
    communications support, and personnel assignments to other vessels. In the processed
    material, Ops is explicitly described as having reduced capacity to support Lieutenant
    Castillo and the battered Enterprise‑C, revealing constrained resources, limited
    tactical reach, and a role that interfaces directly with bridge command (Riker,
    Tasha) to allocate cover, warnings, and mission-essential support during crisis
    operations.
  sphere_of_influence: Starship Operational Support and Tactical Logistics
  season_appearances:
  - 3
  local_uuids:
    1: organization_a8c63ed5d2ad
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_78d764370a6d
  global_id: ger_organization_78d764370a6d
  canonical_name: Original Transport Vessel (Carrier of the Capsule/Crypts)
  description: An unidentified transport vessel that originally carried the preserved
    capsule/crypts and the three frozen twenty‑first‑century individuals now aboard
    Sickbay. The ship functions as the origin point for these human remains, is referenced
    as a potential return destination, and is explicitly unavailable, forcing command
    to assume medical and custodial responsibility for the recovered persons. Crew,
    ownership, and operational structure remain unknown in the current material.
  sphere_of_influence: Origins and Transport — Vessel of Custody for Cryonically Preserved
    Individuals
  season_appearances:
  - 1
  local_uuids:
    1: organization_094814ba1339
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_83d3ef43b266
  global_id: ger_organization_83d3ef43b266
  canonical_name: Ornaran Crew of the Freighter Sanction
  description: The Ornaran Crew of the freighter Sanction represents a group of personnel
    primarily focused on salvaging critical cargo amid catastrophic conditions. Their
    hierarchical structure centers around a captain-led freighter crew, whose overriding
    priority to secure a mysterious and valuable Felicium cargo barrel led to delayed
    evacuation and a reduced number of survivors. This crew’s actions ignite a complex
    ethical crisis involving addiction, interplanetary dependency, and life-risking
    decisions, positioning them as a critical node in the unfolding conflict between
    the Ornarans and Brekkians, and drawing the attention of Starfleet leadership.
  sphere_of_influence: Freighter Operations, Cargo Salvage, and Crisis-Induced Ethical
    Conflict in Interplanetary Relations
  season_appearances:
  - 1
  local_uuids:
    1: organization_72b5a2bea107
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_bc966fabce0a
  global_id: ger_organization_bc966fabce0a
  canonical_name: Ornaran Delegation
  description: The Ornaran Delegation comprises alien representatives from Ornara
    engaged in high-stakes negotiations over critical resources such as Felicium and
    transport aid. They seek to maintain their society's survival amid external non-interference
    policies, demonstrating political agency in interstellar diplomacy while grappling
    with dependency and ethical dilemmas presented by Starfleet's Prime Directive
    enforcement.
  sphere_of_influence: Interstellar Diplomacy and Resource Negotiation
  season_appearances:
  - 1
  local_uuids:
    1: organization_ff5f1b6eb0db
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_44b76744702b
  global_id: ger_organization_44b76744702b
  canonical_name: Ornaran Survivors
  description: The Ornaran Survivors constitute a desperate group of humanoid individuals
    afflicted by a crippling withdrawal from Felicium, a narcotic essential to their
    survival and the treatment of a deadly plague ravaging their homeworld, Ornara.
    Represented by leaders T'Jon and Romas, they exhibit profound physical and psychological
    deterioration driven by addiction and disease. Their primary objective centers
    on securing possession of the Felicium cargo rescued from the freighter Sanction,
    leading to intense negotiations and conflicts with rival groups such as the Brekkians.
    The group’s fractured condition and urgent needs create a volatile dynamic aboard
    the Enterprise, forcing ethical dilemmas and crisis management by Starfleet officers.
    Their structure appears informal but unified through shared desperation and collective
    representation in disputes, highlighting their victimhood and the tragic human
    cost embedded in interspecies dependencies.
  sphere_of_influence: Addiction-Driven Survival and Medical Crisis Advocacy
  season_appearances:
  - 1
  - 2
  local_uuids:
    1: organization_fcf1bb96fa31
    2: organization_fcf1bb96fa31
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_5f2ca5c1dbbe
  global_id: ger_organization_5f2ca5c1dbbe
  canonical_name: Ornarans
  description: The Ornarans are an alien species deeply afflicted by a crippling dependency
    on a rare narcotic called Felicium, which they require for survival. They live
    under the shadow of a plague-like condition with mysterious symptoms resembling
    disease, driving their desperation to reclaim Felicium supplies withheld by the
    Brekkians. Their society is marked by physical bioelectric abilities, emotional
    desperation, and economic vulnerability. The Ornarans engage in a fraught symbiotic
    and exploitative relationship with the Brekkians, trading essential goods for
    Felicium while suffering under addiction and moral exploitation. Their plight
    triggers intense medical investigation, ethical debates, and political conflict
    aboard the Enterprise, positioning them as victims caught in a complex web of
    power, addiction, and survival.
  sphere_of_influence: Alien Societal Survival and Addiction Crisis
  season_appearances:
  - 1
  local_uuids:
    1: organization_d57ead1b15ba
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_d4b4969a42b9
  global_id: ger_organization_d4b4969a42b9
  canonical_name: Ornaren Freighter Sanction Crew
  description: The Ornaren Freighter Sanction Crew operates as the personnel responsible
    for managing and navigating the freighter Sanction. Currently depicted as a disorganized
    and largely inept group, they struggle with critical technical repairs amid a
    severe system failure caused by external solar flare interference. Their detachment
    and lack of technical knowledge create an operational crisis that necessitates
    external rescue intervention from the USS Enterprise, highlighting their compromised
    capacity to maintain ship functionality under duress. The crew’s role is limited
    to basic ship operations, lacking sufficient expertise for emergency repairs or
    crisis management.
  sphere_of_influence: Interstellar Freight Transport Operations and Emergency Response
    Involvement
  season_appearances:
  - 1
  local_uuids:
    1: organization_2263d398300c
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c777ec6ae2f1
  global_id: ger_organization_c777ec6ae2f1
  canonical_name: Orton’s Faction (Terrorists/Conspirators)
  description: A terrorist/conspiratorial faction led by Orton and the Waiter, responsible
    for seizing Arkaria Base during a baryon sweep. The group holds the *Enterprise*
    crew hostage, drops defense shields, and signals a hostile ship to approach. Their
    coordinated sabotage exploits the isolation of the baryon sweep, maintaining control
    through violence and restraint of key personnel (e.g., Riker). The faction is
    ultimately incapacitated by a hypersonic pulse emitted from Geordi La Forge’s
    modified VISOR (activated by Beverly Crusher), leaving only Data unaffected. Their
    actions directly threaten the outpost’s security and the *Enterprise* crew’s safety.
  sphere_of_influence: Hostage Seizures and Violent Enforcement During Baryon Sweeps
  season_appearances:
  - 6
  local_uuids:
    1: org_b7f3700ab973
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_705ec05f8dea
  global_id: ger_organization_705ec05f8dea
  canonical_name: Outpost Sierra Six
  description: Outpost Sierra Six operates as a forward external intelligence and
    sensor node that transmits confirming tactical readings to starship command. It
    intercepts and verifies contact signatures, identifies an approaching Romulan
    scout, and functions as an informational ally to the Enterprise bridge crew (Picard,
    Riker, Worf, Data). Its methods include remote sensor arrays and relay communications;
    its internal hierarchy and formal affiliation remain unspecified within the current
    material.
  sphere_of_influence: External Intelligence, Sensor Reconnaissance, and Tactical
    Communications Support
  season_appearances:
  - 3
  local_uuids:
    1: organization_785eacffdd9a
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_4921a6ba3fda
  global_id: ger_organization_4921a6ba3fda
  canonical_name: Pagh (Klingon ship)
  description: The Pagh is a Klingon Defense Force warship commanded by Captain Kargan
    with a hierarchical bridge crew (including tactics officers and warriors). It
    enforces Klingon honor codes through ritual and coercive discipline, conducts
    tactical scans, cloaking and weapons operations, and is the provenance point for
    an unusual organism that precipitates a tactical crisis with the USS Enterprise.
    The vessel alternates between hostile posturing and becoming the subject of Starfleet
    intervention, serving as an antagonistic contact authority in the narrative.
  sphere_of_influence: Klingon military operations, tactical engagement, and regional
    threat projection
  season_appearances:
  - 2
  - 3
  local_uuids:
    1: organization_fc8896621011
    2: organization_7ca82d3d35f6
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_3e38b49c01c9
  global_id: ger_organization_3e38b49c01c9
  canonical_name: Pakled Crew
  description: A collective crew of Pakleds who approach other vessels under the guise
    of helplessness to solicit technical assistance, then employ staged system failures
    and coordinated violence to seize equipment and gain control. They exploit trust,
    cut communications, deploy shields, and physically disable key personnel to execute
    ambushes. Their internal hierarchy is implied but not elaborated; within the current
    material they act as antagonists and recipients of aid until their predatory intentions
    become evident.
  sphere_of_influence: Opportunistic Piracy and Deceptive Boarding Operations
  season_appearances:
  - 2
  local_uuids:
    1: organization_d643138fc342
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_8007277bfe59
  global_id: ger_organization_8007277bfe59
  canonical_name: Pakleds
  description: The Pakleds present as a small opportunistic species that solicits
    outside assistance through primitive-sounding distress calls while employing simple,
    sometimes deceptive behavior to obtain technology and personnel. Operating the
    vessel Mondor, a spokesperson named Grebnedlog appeals for help as a tactic to
    extract functioning parts and skilled crew, creating a manipulative, acquisitive
    dynamic with Starfleet responders.
  sphere_of_influence: Opportunistic salvage and deceptive acquisition of technology;
    small-scale predatory interactions with starship crews
  season_appearances:
  - 2
  - 4
  - 7
  local_uuids:
    1: organization_8e60a362f1ad
    2: org_773b7ad25d5d
    3: organization_8e60a362f1ad
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8c426470dfaa
  global_id: ger_organization_8c426470dfaa
  canonical_name: Pardek's Allies (Disguised as Romulan Soldiers)
  description: Civilians led by Pardek pose as Romulan soldiers to mislead security
    forces. They detain Picard and Data briefly before revealing their true allegiance,
    ensuring the Starfleet officers' safety amid underground activities on Romulus.
    This group operates in secrecy, shielding key figures like Picard and Data from
    genuine Romulan patrols while advancing Pardek's covert agenda.
  sphere_of_influence: Covert Deception and Protection on Romulus
  season_appearances:
  - 5
  local_uuids:
    1: org_a6ec7f4727de
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_7327fd1efc3d
  global_id: ger_organization_7327fd1efc3d
  canonical_name: Parliament of Angel One
  description: The Parliament of Angel One operates as a matriarchal governing body
    wielding political authority over Angel One, led by the commanding figure Beata.
    It maintains strict control over societal order by enforcing cultural norms and
    evading external pressures, such as those from Starfleet. The Parliament convenes
    sessions to debate critical issues like trust in the Federation and the status
    of fugitive survivors disrupting their social equilibrium. It functions as both
    a political authority and antagonist force, showcasing internal dissent and mistrust
    while upholding a rigid matriarchal hierarchy that resists outside intervention
    and shapes the planet's sociopolitical landscape.
  sphere_of_influence: Matriarchal Political Governance and Social Order Enforcement
    on Angel One
  season_appearances:
  - 1
  local_uuids:
    1: organization_f6f996812771
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_f3cf9705a932
  global_id: ger_organization_f3cf9705a932
  canonical_name: Parliamentary Body of Angel One
  description: The Parliamentary Body of Angel One serves as the planet's governing
    oligarchy, with authority centralized under the Elected One, Beata. This leadership
    controls all external diplomatic contact and manages internal governance through
    a female-led hierarchy. They maintain cultural isolationism and exhibit antagonistic
    stances toward outside entities, specifically the Federation. Their governance
    style enforces strict social order and resistance to foreign influence, positioning
    them as a formidable political force within Angel One's societal framework.
  sphere_of_influence: Planetary Governance and Diplomatic Control on Angel One
  season_appearances:
  - 1
  local_uuids:
    1: organization_622139ad53c8
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_a4c33ebb7b68
  global_id: ger_organization_a4c33ebb7b68
  canonical_name: Particle Fountain Mining Station Personnel
  description: Five disheveled personnel from the particle fountain mining station
    materialize in the Enterprise transporter room as survivors of escalating instability.
    Clutching torn uniforms and supporting the injured, they embody the crisis tied
    to the exocomps' fate. Their urgent arrival compels the Enterprise crew to confront
    the station's collapse firsthand, shifting debates on sentience into immediate
    rescue demands and operational dilemmas.
  sphere_of_influence: Orbital Mining Operations and Emergency Evacuation
  season_appearances:
  - 6
  local_uuids:
    1: org_8279eb149f3d
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3728c618dcca
  global_id: ger_organization_3728c618dcca
  canonical_name: Paxans
  description: The Paxans are a xenophobic, non-corporeal alien collective that enforces
    isolation of their space through advanced psychological manipulation. They fabricate
    wormhole illusions and attempt to erase 24 hours from intruders' memories (e.g.,
    the *Enterprise* crew) to deter exploration. When memory wipes fail, they escalate
    to open hostility, refusing negotiations and positioning themselves as a direct
    threat to the vessel's survival. Their non-corporeal nature allows them to possess
    humanoid crew members (e.g., Deanna Troi) for communication. The species clashed
    with the *Enterprise* in the T-Tauri system, creating a fragile stalemate that
    Data secretly upholds despite career risks. Picard later identifies them as the
    hidden antagonist behind the anomalies, prompting the ship's return for confrontation
    and truth restoration.
  sphere_of_influence: Xenophobic Alien Isolation and Memory Manipulation
  season_appearances:
  - 4
  local_uuids:
    1: org_6d87a550c394
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_fa62c14f7d59
  global_id: ger_organization_fa62c14f7d59
  canonical_name: Peliar Zel (planet and moons)
  description: Peliar Zel encompasses a planet and its two moons, Alpha and Beta.
    Governor Leka details hostilities between the moons that escalate toward war and
    threaten to engulf the planet. This fracture demands urgent Federation mediation
    from Odan to avert system-wide collapse. Internal divisions dominate diplomatic
    briefings attended by Picard, Riker, Troi, Data, and others.
  sphere_of_influence: Planetary System Governance and Inter-Moon Conflict Mediation
  season_appearances:
  - 4
  local_uuids:
    1: org_f830127ab0a4
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_2dedd45a8059
  global_id: ger_organization_2dedd45a8059
  canonical_name: Penthara Four Relief Effort
  description: Scientists including local expert Moseley and Enterprise engineer Geordi
    La Forge form this relief team to rescue Penthara Four from ecological collapse.
    Volcanic ash blocks sunlight, starving CO2-dependent lifeforms and spiking atmospheric
    CO2. They conduct surface operations to stabilize the environment, facing initial
    disruption from Enterprise phaser drilling that triggers quakes and eruptions,
    then pivot to collaborative rescue with ship-based atmospheric ionization via
    deflector dish and phasers.
  sphere_of_influence: Planetary Environmental Crisis Response
  season_appearances:
  - 5
  local_uuids:
    1: org_de48d7733751
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_92dae27e7397
  global_id: ger_organization_92dae27e7397
  canonical_name: Penthara IV Science Team
  description: Moseley leads this team of scientists based in the Penthara IV Science
    Lab's crisis center. They track the planet's atmospheric collapse through environmental
    data analysis, including cloud depth and river freezing. As primary stakeholders,
    they debate and initially resist the Enterprise crew's CO₂ release plan—ironic
    after decades fighting greenhouse effects—but concede urgency and coordinate implementation
    as conditions worsen.
  sphere_of_influence: Planetary Environmental Crisis Management
  season_appearances:
  - 5
  local_uuids:
    1: org_658bde522002
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_69545dc70e51
  global_id: ger_organization_69545dc70e51
  canonical_name: Pentharan Government
  description: The Pentharan Government supplies spherlal forecasts to the Enterprise
    crew. These environmental projections detail the asteroid-induced climate crisis
    on Penthara Four, highlighting its severity. Geordi La Forge and Data rely on
    this data to craft a mitigation plan. The government serves as the key provider
    of planetary intelligence amid the emergency, coordinating with Starfleet to avert
    disaster.
