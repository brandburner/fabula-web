  description: Data and Lore, android brothers created by Noonien Soong, form The
    Sons of Soong as a destructive alliance declared in a Borg hall. Data invokes
    their shared legacy while Lore halts a Borg attack on Federation captives. Together,
    they pledge to annihilate the Federation, formalizing Data's emotional corruption
    and defection from Starfleet amid Borg approval screams. This partnership positions
    them as a unified antagonistic force threatening galactic stability.
