  episode_count: 0
- fabula_uuid: ger_organization_c8867e1b0345
  global_id: ger_organization_c8867e1b0345
  canonical_name: The Progenitors
  description: The Progenitors stand as the ancient architects behind the Custodian
    computer, a sophisticated and enigmatic technology crucial to Aldea's secret infrastructure.
    Their legacy endures through the Custodian's ongoing operation, which profoundly
    influences Aldean cultural practices and societal control. As creators of this
    pivotal system, The Progenitors represent a lost civilization whose advanced engineering
    underpins present-day Aldea's hidden technological power, shaping the planet's
    guarded knowledge and restricted access protocols.
  sphere_of_influence: Ancient Technological Engineering and Cultural Legacy
  season_appearances:
