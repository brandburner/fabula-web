  description: An unorganized civilian population of human colonists residing on Tau
    Cygna Five, numbering approximately fifteen thousand and settled despite lethal
    hyperonic radiation. They become the subject of a Sheliak territorial claim under
    the Treaty of Armens and the immediate catalyst for the Enterprise's diplomatic,
    moral, and operational response. The group shows no formal governance in the processed
    material; their survival compels Federation negotiation, investigation, and potential
    evacuation actions.
