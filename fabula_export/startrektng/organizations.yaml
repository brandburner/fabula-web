- fabula_uuid: ger_organization_4d5bbc273245
  global_id: ger_organization_4d5bbc273245
  canonical_name: Romulan Intelligence
  description: Romulan Intelligence uses code prefixes in subspace transmissions to
    Barolian vessels for covert coordination. Sequence 1400 ties directly to Proconsul
    Neral’s announcement, exposing a conspiracy driving Romulan invasion schemes.
    Picard and Data detect it amid Klingon tensions, marking it as the antagonist
    force behind deceptive plots.
  sphere_of_influence: Romulan Covert Intelligence Operations
  season_appearances:
  - 5
  local_uuids:
    1: org_fd0d9fdf09fb
  first_appearance_season: 5
