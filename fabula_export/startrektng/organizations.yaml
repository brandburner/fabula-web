- fabula_uuid: ger_organization_6583cf577113
  global_id: ger_organization_6583cf577113
  canonical_name: Fugitives from the Eugenics Wars
  description: A cohort of twenty‑first‑century genetic war refugees identified by
    origin rather than formal structure. Within the current material they function
    as a hypothesized clandestine actor that may have deliberately concealed a centuries‑old
    Terran ship to evade detection. Their goals appear survival and evasion; methods
    imply covert concealment and long‑term secrecy. Organizational hierarchy, membership,
    and broader activities remain unspecified and uncertain.
  sphere_of_influence: Covert Exile Survivors — Concealment Operations and Long‑term
    Evasion
  season_appearances:
