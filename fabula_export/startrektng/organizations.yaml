- fabula_uuid: ger_organization_84bd8bf17699
  global_id: ger_organization_84bd8bf17699
  canonical_name: Cardassian Central Command
  description: Cardassian Central Command oversees military officers such as Gul Macet
    and Glinn Telle in joint operations with Starfleet. Glinn Telle accessed Enterprise
    weapon systems without authorization, breaching trust. Gul Macet publicly rebuked
    Telle despite her claims of innocence, signaling command's effort to distance
    the delegation from the incident and preserve diplomatic standing amid rising
    tensions with the Enterprise crew.
  sphere_of_influence: Cardassian Military Discipline and Diplomatic Delegations
  season_appearances:
