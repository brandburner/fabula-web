- fabula_uuid: ger_organization_d16737d2b651
  global_id: ger_organization_d16737d2b651
  canonical_name: Starship Decius
  description: The Starship Decius functions as a Romulan warbird that serves as the
    departure point for Ambassador Tomalak's transporter beam to the USS Enterprise.
    Tomalak materializes from this vessel in a diplomatic first, crossing Neutral
    Zone barriers to exchange greetings with Picard and Riker. The ship's role highlights
    Romulan efforts to signal changing relations, with its crew facilitating the transport
    under the neutral oversight of the Enterprise's transporter chief. Troi notes
    shifts in Romulan posture, tying the Decius directly to fragile trust-building
    amid past hostilities like Nelvana Three.
  sphere_of_influence: Romulan Naval Diplomacy
  season_appearances:
  - 4
  local_uuids:
