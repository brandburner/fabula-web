  episode_count: 1
- fabula_uuid: ger_organization_f214e29fdebc
  global_id: ger_organization_f214e29fdebc
  canonical_name: Atlantis Project Team
  description: The Atlantis Project Team directs an underwater research effort probing
    ancient submerged sites. Louis ranks among 200 supervisors coordinating operations.
    During a vineyard walk with Picard, Louis highlights the project's technical challenges,
    sparking Picard's detailed questions and his offer to review studies—moves that
    position him for potential leadership amid his Starfleet doubts.
  sphere_of_influence: Underwater Archaeological Research
  season_appearances:
  - 4
  local_uuids:
    1: org_d94a447b748e
  first_appearance_season: 4
