  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0fc71f99b2ca
  global_id: ger_organization_0fc71f99b2ca
  canonical_name: Ship's Pool
  description: Ship's Pool functions as an informal, shipboard wagering collective
    centered in Ten-Forward where crew members place bets on competitive contests
    and personnel performance. It lacks formal hierarchy or legal sanction, settling
    stakes through social enforcement and reputation. The pool stages spontaneous
    wagers tied to games (notably Strategema), amplifies rivalry and morale effects,
    and intervenes in public social dynamics — Worf's heavy wager on Riker illustrates
    its capacity to raise stakes and shape interpersonal consequences aboard the Enterprise.
  sphere_of_influence: Shipboard Social Gambling and Crew Social Dynamics
  season_appearances:
  - 2
  local_uuids:
    1: organization_a0d474c62c31
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1fa9a2a0da7a
  global_id: ger_organization_1fa9a2a0da7a
  canonical_name: Ship's Security Detail (USS Enterprise-D)
  description: A shipboard security force organized and led at the scene by the Chief
    of Security to enforce custody, protect medical facilities, and preserve overall
    ship safety. Units establish visual contact with detainees, secure Sickbay access
    points, coordinate with medical staff, and implement orders from the command chain.
    Their actions prioritize internal enforcement and protective operations during
    crises, balancing individual care against broader tactical and diplomatic risks.
  sphere_of_influence: Shipboard Security and Custodial Enforcement (internal protective
    force aboard the starship)
  season_appearances:
