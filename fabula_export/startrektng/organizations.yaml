- fabula_uuid: ger_organization_aca482fca0a8
  global_id: ger_organization_aca482fca0a8
  canonical_name: J'naii Authorities
  description: The J'naii Authorities (also referred to as 'the J'naii') are the governing
    body of the J'naii civilization, enforcing rigid societal norms that criminalize
    distinct gender identities and relationships across gender lines. Their laws are
    enforced by representatives such as Krite, who arrest individuals like Soren for
    violating these prohibitions through relationships (e.g., with Riker). The Authorities
    assert absolute control over their society, dismiss external intervention, and
    position themselves as the central antagonistic force in conflicts between personal
    freedoms and institutional oppression. Their norms directly shape the emotional
    and narrative outcomes of the *Enterprise* crew's mission, including Riker's forced
    separation from Soren and the crew's tense departure from J'naii orbit.
  sphere_of_influence: J’naii Societal Norm Enforcement and Civil Arrest Authority
