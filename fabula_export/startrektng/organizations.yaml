- fabula_uuid: ger_organization_33311caabdc4
  global_id: ger_organization_33311caabdc4
  canonical_name: U.S.S. Essex (Daedalus-class Starship)
  description: The U.S.S. Essex, a Daedalus-class Starfleet vessel commanded by Captain
    Bryce Shumar, vanished over two centuries ago during an unknown mission. Now a
    derelict hulk orbiting the moon Mab-Bu Six, it broadcasts a subspace distress
    signal with a matching transponder signature. Enterprise sensors detect no life
    signs aboard due to electromagnetic interference, yet the signal draws Picard's
    crew into investigation amid Troi's empathic detection of survivors on the surface.
  sphere_of_influence: Historical Starfleet Vessel Operations
