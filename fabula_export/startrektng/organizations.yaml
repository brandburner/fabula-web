  global_id: ger_organization_9e4f7d5c96cf
  canonical_name: Multiversal Enterprise Collective (Quantum Fissure Incursion)
  description: A chaotic multiversal phenomenon involving *hundreds* of *Enterprise*
    starships from parallel realities, materializing through a quantum fissure into
    the prime sector. Acts as an unintentional antagonist, destabilizing local reality
    and forcing high-risk countermeasures (e.g., potential erasure of Worf). The collective
    is the *mechanism* enabling the transmission from the Borg-conquered Federation,
    but it is not the same entity.
  sphere_of_influence: Multiversal Starship Incursion and Quantum Fissure Catalysis
  season_appearances:
