  global_id: ger_organization_ac1f23e36c78
  canonical_name: Earthmen
  description: Earthmen denotes the culturally referenced grouping of human males
    originating from Earth, invoked here as a social and demographic identity rather
    than a formal institution. In the processed material they operate rhetorically—Mrs.
    Troi toasts their reputed pan‑galactic charm—shaping interpersonal expectations
    and signaling Earthly affiliation. No internal hierarchy appears; the group functions
    as a gendered cultural stereotype that colors social interaction and humor.
  sphere_of_influence: Social and Cultural Identity; Gendered Behavioral Patterns
