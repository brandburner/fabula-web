- fabula_uuid: ger_organization_6cb492d349a0
  global_id: ger_organization_6cb492d349a0
  canonical_name: Shiralea VI Colony
  description: Shiralea VI Colony operates as a holodeck-programmed society where
    free spirits celebrate joy, contradiction, and absurdity. Inhabitants including
    the Juggler, Poet, Wind Dancer, Fire Artist, and Young Couple host activities
    like laughing hours, mudbaths, fire sculptures, and nonsensical arguments resolved
    by phrases such as 'The higher, the fewer.' Lwaxana Troi disrupts routines playfully,
    while Alexander Rozhenko embraces its values, using the colony as a foil to the
    Enterprise's rigid order and a catalyst for his growth.
  sphere_of_influence: Holodeck-Simulated Cultural Society of Joy and Absurdity
  season_appearances:
