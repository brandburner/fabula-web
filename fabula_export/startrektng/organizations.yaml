  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_300c62e2a17f
  global_id: ger_organization_300c62e2a17f
  canonical_name: Terellian Freight & Logistics Corporation
  description: A permanent interstellar freight company with a history of operational
    failures, including the abandonment of a derelict freighter that stranded survivor
    Anna for seven years. Highlighted in the context of Picard's shuttle crash, underscoring
    corporate negligence in interstellar logistics.
  sphere_of_influence: Interstellar Cargo Freight Transport
  season_appearances:
  - 7
  local_uuids:
