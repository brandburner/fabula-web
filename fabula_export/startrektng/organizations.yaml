  global_id: ger_organization_b348ece32d1b
  canonical_name: Utopia Planitia Starfleet Shipyard
  description: Federation-affiliated Starfleet shipyard in the *Utopia Planitia system*,
    exclusively tied to Federation starship construction (e.g., *Enterprise-D*). Institutionally
    distinct as a *Starfleet* facility with **no ties to neutral or non-Federation
