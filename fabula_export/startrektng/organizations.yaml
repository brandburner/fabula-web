- fabula_uuid: ger_organization_920993ec15e0
  global_id: ger_organization_920993ec15e0
  canonical_name: Mintakan People
  description: The Mintakan People form the indigenous cultural community touched
    by Federation contact in the episode. Their social fabric revolves around ancestral
    traditions and an emergent veneration of a Federation 'Overseer.' Observed activities
    include communal worship, deference to elders, and negotiation of new meanings
    for unfamiliar technology. No formal political apparatus is shown beyond elder
    influence; they are the ethical and cultural subject of Starfleet officers' intervention
    and pedagogical efforts to restore agency.
  sphere_of_influence: Local Cultural and Religious Life; Societal Development
  season_appearances:
