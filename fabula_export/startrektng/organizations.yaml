  global_id: ger_organization_c8d9af520a2d
  canonical_name: Ramsey Cult
  description: The Ramsey Cult is a dissident group led by Ramsey whose ideology fundamentally
    challenges the matriarchal order of Angel One. Rather than face execution, its
    members undergo exile to a remote region of Angel One, where they are permitted
    to continue preaching their heretical beliefs without threatening societal stability.
    This group's existence and ideology serve as a focal point for political tension,
    forcing the governing authorities to balance suppression with pragmatic containment
    to avoid social upheaval. The cult operates under Ramsey's leadership, with a
    following committed to spreading dissenting views despite official opposition.
  sphere_of_influence: Sociopolitical Dissent and Ideological Subversion on Angel
    One
  season_appearances:
