  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_2b4f40b80572
  global_id: ger_organization_2b4f40b80572
  canonical_name: Gamelan Four Government
  description: Chairman Songi represents the Gamelan Four government, which governs
    the planet amid a radiation crisis from a derelict waste vessel trapped in its
    gravity well. The body presses the Enterprise crew for urgent aid in disposal
    operations through the Meltasion Asteroid Belt, prioritizing planetary survival.
    Their stakes heighten mission tension, positioning them as a desperate ally reliant
    on Starfleet intervention while the Enterprise faces concurrent shuttle emergencies.
  sphere_of_influence: Colonial Governance and Crisis Response
  season_appearances:
  - 4
  local_uuids:
    1: org_8fbeb21b12c1
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8945deb13264
  global_id: ger_organization_8945deb13264
  canonical_name: Gamelan Four Miners
  description: The Gamelan Four Miners endure a radiation crisis on their planet from
    a derelict waste ship trapped in its gravity well. Strapped for resources, they
    urgently plead for Enterprise assistance to attach thrusters, tow the vessel through
    the Meltasion Asteroid Belt, and avert catastrophe. Worf relays their desperation
    to Riker, positioning the miners as vulnerable allies whose survival demands Starfleet's
    technical intervention amid overlapping emergencies.
  sphere_of_influence: Planetary Mining and Crisis Response
  season_appearances:
  - 4
  local_uuids:
