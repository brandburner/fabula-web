- fabula_uuid: ger_organization_97579654b83a
  global_id: ger_organization_97579654b83a
  canonical_name: Klingon-Controlled Space
  description: Klingon-Controlled Space administers territories with rigid bureaucracy
    enforced by Zakdorn quartermasters like Klim Dokachin at Surplus Depot Zed-One-Five.
    Dokachin dismisses Riker's direct request for intelligence on the Vulcan ship
    T'Pau without an appointment, compelling the Enterprise crew to pivot to Troi's
    diplomatic approach. This structure obstructs Starfleet operations, forcing adaptations
    amid mission urgency.
  sphere_of_influence: Bureaucratic Territorial Administration
  season_appearances:
  - 5
  local_uuids:
    1: org_833d087fe49b
  first_appearance_season: 5
