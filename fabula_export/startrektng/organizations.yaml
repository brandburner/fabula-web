  global_id: ger_organization_f23289c96779
  canonical_name: Mystery Vessel
  description: An unidentified vessel launching coordinated phaser-like attacks against
    structures in an old city near Farpoint, serving as a hostile force opposing the
    away team led by Riker and Data. Its sudden, aggressive assault reveals a lethal
    and unknown enemy with advanced weaponry, heightening the stakes of the mission.
    The vessel operates with stealth and unexpected aggression, creating a critical
