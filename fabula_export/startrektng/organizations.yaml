  global_id: ger_organization_d7a709163367
  canonical_name: Klingon High Council
  description: Klingon High Council governs the Klingon Empire as its central legislative
    and administrative body. It reviews interstellar incidents, processes intelligence
    from Federation allies like Starfleet, and oversees personnel abroad. Distinct
    from military forces, council members such as K'Tal authorize Klingon vessels
    and mission support. Picard directs Worf to contact them after Chancellor Gowron
    withholds aid due to political grudges, positioning the council as a key alternative
    for securing Empire resources.
