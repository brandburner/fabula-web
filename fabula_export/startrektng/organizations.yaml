  global_id: ger_organization_8679a5ea0353
  canonical_name: Cambridge University
  description: Cambridge University employs Lt. Cmdr. Data as Lucasian Professor in
    a residence once occupied by Sir Isaac Newton. Its campus bio-metrics lab conducts
    neurographic scans to probe Picard's temporal shifts and Irumodic Syndrome symptoms.
    Data leverages the institution's prestige and scientific facilities to assist
    former Starfleet colleagues, providing advanced academic resources amid skepticism
    over Picard's claims.
  sphere_of_influence: Prestigious Higher Education and Biomedical Research
  season_appearances:
