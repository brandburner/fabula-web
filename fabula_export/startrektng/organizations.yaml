  canonical_name: Holodeck System
  description: The Holodeck System constructs a dimly lit rehearsal hall mimicking
    a Klingon outpost from Firstborn, where Data recites Prospero’s renunciation of
    magic. It spawns an unscripted locomotive that roars toward Picard and Data, prompting
    them to dive aside. Picard’s direct termination command to the computer fails,
