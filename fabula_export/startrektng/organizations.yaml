- fabula_uuid: ger_organization_9e08bd7ccf93
  global_id: ger_organization_9e08bd7ccf93
  canonical_name: T'Ong (Klingon Battle Cruiser)
  description: 'T''Ong is a Klingon battle cruiser acting as an antagonistic military
    vessel in the current material. It employs cloaking and sudden offensive action
    against the USS Enterprise, operates under an elderly Klingon captain with a first
    officer and crew, and ultimately yields command through Klingon cultural ritual:
    Worf asserts authority, K''Ehleyr is installed to take the ship, and the cruiser
    departs under escort. Its methods combine naval warfare, cloaking tactics, and
    formalized Klingon command transfer.'
  sphere_of_influence: Klingon Military Operations and Naval Warfare; Tactical Warship
    Engagements and Cultural Command Authority
  season_appearances:
