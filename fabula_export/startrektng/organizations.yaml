  global_id: ger_organization_be789ccf19c8
  canonical_name: Primary School Science Fair Winners
  description: Three children—shy Marissa, earnest Jay Gordon, and energetic Patterson—represent
    their primary school as science fair winners recognized for scientific projects.
    Counselor Troi introduces them on the Enterprise bridge for an educational tour
    of hydroponics and astrophysics labs. Captain Picard hosts reluctantly, highlighting
    the group's role in fostering young curiosity amid Starfleet operations. Lieutenant
    Monroe and Ensign Mandel assist, framing the visit as reward and mentorship opportunity.
  sphere_of_influence: Youth Science Education and Recognition
