  canonical_name: Enterprise Crew (Allies)
  description: Temporary, episode-specific alliance formed by Worf and Deanna Troi
    to resolve a corrupted Wild West holodeck scenario in S6E08 ('A Fistful of Datas').
    Composition includes main crew (Worf, Troi) and holodeck NPCs (Eli Hollander,
    his henchmen), explicitly distinct from permanent USS Enterprise-D institutional
    teams like the Security Team.
