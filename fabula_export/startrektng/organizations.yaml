- fabula_uuid: ger_organization_c1066db1a860
  global_id: ger_organization_c1066db1a860
  canonical_name: Mordanite Soldiers
  description: The Mordanite Soldiers serve as the militarized forces loyal to Governor
    Karnas, controlling the tunnels beneath Mordan IV. They act as the primary antagonist
    faction opposing the Starfleet away team during the hostage crisis. These soldiers
    enforce Karnas's orders with lethal intent, engaging in ambushes and firefights
    to maintain local control and support the governor's vendetta. Their role is pivotal
    in the escalating conflict and the enforcement of the hostage situation within
    the underground tunnels.
  sphere_of_influence: Local Military Control and Hostage Enforcement
