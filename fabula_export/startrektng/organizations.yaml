  global_id: ger_organization_bbf144b3484a
  canonical_name: USS Yamato
  description: The USS Yamato operates as a Starfleet deep‑space vessel whose sudden
    disintegration and catastrophic crew losses become a narrative catalyst. Yamato's
    ship logs yield forensic evidence tying an Iconian probe/program to systemic failures,
    and her fate frames the crisis confronting the Enterprise. Functioning within
    Starfleet's hierarchical fleet structure and described as a sister ship to the
    Enterprise, Yamato serves both as precedent for contagion risk and as the emotional
    touchstone driving investigative and command responses.
  sphere_of_influence: Starfleet deep‑space operations and crisis response; shipboard
    forensic precedent for interstellar contagion incidents
