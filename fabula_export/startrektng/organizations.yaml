- fabula_uuid: ger_organization_b621f11a448b
  global_id: ger_organization_b621f11a448b
  canonical_name: Cardassian Union
  description: "\n      The **Cardassian Union** (also referred to as the **Cardassian\
    \ Empire** in historical and Bajoran contexts) is a *militaristic and expansionist\
    \ polity* that commands **Galor-class warships** and is led by **Guls** (e.g.,\
    \ Nador). Its actions include:\n      - **Surveillance and espionage**: Reprogramming\
    \ the Federation's **Argus Array** to monitor sites like **Deep Space Five** and\
    \ **Utopia Planitia**, as well as conducting *overwhelming naval assaults* that\
    \ breach hulls, cripple deflectors, and annihilate strategic assets (e.g., the\
    \ Argus Array).\n      - **Border conflicts**: Challenging *Enterprise*-class\
    \ incursions within **three light-years of their territory** and exploiting tactical\
    \ disarray to launch attacks, including *calculated assaults* that compel Starfleet\
    \ retreats.\n      - **Counterintelligence**: Probing for Federation spying activities\
    \ with veiled threats, destroying opposing vessels in escalated confrontations,\
    \ and employing *clandestine intelligence operations* (e.g., neural drugs, sensory\
    \ deprivation).\n      - **Historical oppression**: Formerly ruled **Bajor** as\
    \ an occupying force, sparking Bajoran hostility toward the Federation post-liberation.\
    \ This legacy is referenced in **quantum-altered realities**, where Bajor rejects\
    \ Federation overtures.\n      - **Perceptual shifts**: In alternate timelines,\
    \ Cardassian crew occupy *Enterprise* bridge stations, signaling collaborations\
    \ or perceptual anomalies.\n\n      The Union/Empire asserts **territorial dominance**\
    \ and engages in **both overt military operations** (e.g., naval assaults, border\
    \ conflicts) and **covert intelligence activities** (e.g., espionage, interrogation)\
    \ against **Starfleet**, reflecting its dual role as a **military power** and\
    \ a **historical oppressor** in Bajoran narratives.\n      "
  sphere_of_influence: Interstellar Military Operations and Fragile Alliance Diplomacy
  season_appearances:
