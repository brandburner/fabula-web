  episode_count: 1
- fabula_uuid: ger_organization_98b488b88b3f
  global_id: ger_organization_98b488b88b3f
  canonical_name: Atlec Faction
  description: The Atlec Faction emerges as Debin's militant group engaged in a tense
    standoff aboard the Enterprise, demanding the surrender of the rogue trader Okona.
    Their antagonistic posturing fuels interstellar tensions until Okona's unconventional
    mediation reveals hidden personal connections between faction heirs, forcing a
    reluctant reconciliation. This faction operates as an authoritative bloc within
    its planetary system, demonstrating willingness to enforce demands through confrontation
    but ultimately adhering to traditional familial resolutions when core relationships
    are exposed.
  sphere_of_influence: Planetary Security and Familial Honor Enforcement
  season_appearances:
  - 2
  local_uuids:
    1: organization_c2a3abb878b9
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_850787db4014
  global_id: ger_organization_850787db4014
  canonical_name: Atrean Geological Team
  description: Pran Tainer and N.D. Atrean geologist lead the team in Atrea's magma
    pocket, where they configure infusion units to prevent core solidification and
    secure the planet's survival. Enterprise crew extracts them after a cave-in leaves
    Pran injured, but they urge immediate return despite transporter hazards. Data
    volunteers to assist, highlighting their critical expertise and partnership with
    the ship in high-risk stabilization efforts.
  sphere_of_influence: Planetary Core Stabilization and Geological Field Operations
  season_appearances:
  - 7
  local_uuids:
    1: org_699e9eda6704
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_c19eb23237dc
  global_id: ger_organization_c19eb23237dc
  canonical_name: Atrean Government
  description: Government of the planet Atrea, facing imminent uninhabitability due
    to gravitational instability. Summoned the *USS Enterprise* for a high-stakes
    planetary rescue mission involving phaser-drilling and plasma-injection. Interacted
    directly with Captain Picard, Geordi La Forge, Data, and geologists Juliana and
    Pran Tainer in the Observation Lounge.
  sphere_of_influence: Planetary Governance and Geological Crisis Response
  season_appearances:
  - 7
  local_uuids:
    1: org_f5c5c7741884
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_98a67fd7ceee
  global_id: ger_organization_98a67fd7ceee
  canonical_name: Aurelian Freighter Sanction Crew
  description: The Aurelian Freighter Sanction Crew comprises personnel operating
    aboard the Ornaran freighter Sanction, currently facing a critical system failure
    amid hostile environmental conditions such as solar flares. The crew demonstrates
    disorganized and ineffective command under Captain T'Jon, struggling with basic
    ship maintenance and emergency protocols. Their primary objective centers on managing
    the vessel's integrity and survival, but internal confusion and lack of preparedness
    undermine coordinated efforts. The crew's distress and operational collapse necessitate
    external intervention, highlighting vulnerabilities in freighter operations within
    hazardous space environments.
  sphere_of_influence: Freighter Operations and Emergency Response within Ornaran
    Space
  season_appearances:
  - 1
  local_uuids:
    1: organization_f355f4e4033d
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_dffe3ca60b83
  global_id: ger_organization_dffe3ca60b83
  canonical_name: Away Reserve Team
  description: The Away Reserve Team functions as an ad hoc planetary search-and-rescue
    unit assembled from Enterprise personnel to execute rapid, high-risk extracraft
    rescue operations. It locates and extracts survivors, forces entry through damaged
    infrastructure, performs on-site triage and stabilization, and transfers casualties
    to Sickbay. Observed actions include breaching a jammed door in a flooded corridor,
    treating injured civilians, and recovering the deceased. Command appears to derive
    from senior bridge officers on scene and it operates in direct support of shipboard
    medical and mission command.
  sphere_of_influence: Planetary Search-and-Rescue and Emergency Response; Tactical
    Extracraft Rescue Support
  season_appearances:
  - 2
  local_uuids:
    1: organization_6988f96dfaf5
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0f43f3ec3a8e
  global_id: ger_organization_0f43f3ec3a8e
  canonical_name: Bajoran Customs
  description: Bajoran customs require placing the family name before the personal
    name, prompting Ensign Ro to correct Captain Picard when he addresses her as 'Laren'
    instead of 'Ro'. Ro asserts this preference to affirm her heritage and resist
    Starfleet assimilation. The practice exposes friction between Bajoran identity
    and Federation norms, as Ro prioritizes cultural pride over conformity during
    her tense ready room confrontation with Picard and Riker.
  sphere_of_influence: Cultural Naming Practices and Heritage Preservation
  season_appearances:
  - 5
  local_uuids:
    1: org_08f19018033f
  first_appearance_season: 5
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_a2b95127da6e
  global_id: ger_organization_a2b95127da6e
  canonical_name: Bajoran Government
  description: In this fractured timeline, the Bajoran Empire (synonymous with the
    Bajoran Government) overthrew the Cardassian Empire and adopted a hostile stance
    toward the Federation. Bajoran warships—operating under imperial authority—attacked
    the *Enterprise-D* without provocation, crippling its power systems and destabilizing
    a quantum fissure. Riker's reports confirm their escalating aggression, including
    the destruction of Federation property, positioning them as antagonists whose
    actions threaten Starfleet operations and multiversal stability.
  sphere_of_influence: Hostile Planetary Governance and Military Aggression
  season_appearances:
  - 6
  - 7
  local_uuids:
    1: org_6cc595e7ef0b
    2: org_e291530a21ce
  first_appearance_season: 6
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_793ee8686b57
  global_id: ger_organization_793ee8686b57
  canonical_name: Bajoran Meeting
  description: Planned gathering of Bajoran representatives for diplomatic discussions
    that Collins reports never materialized. Ro's unauthorized transport to the surface
    coincides with the no-show, amplifying Starfleet tensions amid Cardassian-Bajoran
    hostilities. Picard responds with urgent transport orders and armed security,
    treating the failed meeting as a spark for broader conflict escalation.
  sphere_of_influence: Bajoran Diplomatic Outreach
  season_appearances:
  - 5
  local_uuids:
    1: org_0294ab671641
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_09d9e240b71d
  global_id: ger_organization_09d9e240b71d
  canonical_name: Bajoran Militant Group
  description: A Bajoran militant organization led by Orta, which operates as a splinter
    faction with roots in Bajoran grievances against Cardassian oppression. The group
    is framed by Cardassians as the perpetrators of the Solarion Four attack, though
    their ships lack warp capability, making such a distant attack impossible. Picard
    and Ro investigate, ultimately clearing their name through evidence (Orta's testimony
    and subspace relay data) that exposes a Cardassian false-flag operation. The group's
    actions are portrayed as a sympathetic response to generations of neglect, though
    their militant tactics position them as antagonists. They emerge as indirect allies
    of the Federation amid broader Bajor-Cardassian tensions.
  sphere_of_influence: Militant Advocacy for Bajoran Displaced Populations
  season_appearances:
  - 5
  local_uuids:
    1: org_6841be387832
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_9d64362219f4
  global_id: ger_organization_9d64362219f4
  canonical_name: Bajoran Refugee Camps
  description: Bajoran refugee camps on Valo Two shelter displaced Bajorans facing
    desperation from Cardassian occupation. Keeve Falor leads one camp with pragmatic
    but abrasive authority. Inhabitants teeter on violence, ready to martyr themselves
    amid volatility. Ro identifies these camps as mission-critical sites for contacts
    like Falor, balancing potential alliances against explosive risks that threaten
    Federation away teams.
  sphere_of_influence: Bajoran Refugee Housing and Militant Communities
  season_appearances:
  - 5
  local_uuids:
    1: org_aeaaa75d7870
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_39ee4164f919
  global_id: ger_organization_39ee4164f919
  canonical_name: Bajoran Refugees and Settlers
  description: Group of displaced Bajoran civilians aboard a vessel escorted by the
    *Enterprise* toward Valo III. Cardassians label them as terrorists and demand
    their surrender, creating a diplomatic standoff in neutral space. Their protection
    becomes a flashpoint for Federation-Cardassian tensions, with Gul Dolak's ultimatum
    testing Starfleet's commitment to non-interference principles. The group's presence
    aboard the *Enterprise* also exposes internal divisions, particularly through
    Lieutenant Ro Laren's Bajoran heritage and her conflicted loyalties. The incident
    underscores the lingering consequences of the Cardassian occupation of Bajor and
    the moral complexities of post-war neutrality.
  sphere_of_influence: Civilian Displacement and Protection in Bajoran-Cardassian
    Conflict
  season_appearances:
  - 5
  local_uuids:
    1: org_6324d65bcc0f
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3ce0e3559ebe
  global_id: ger_organization_3ce0e3559ebe
  canonical_name: Bajoran Ship
  description: A Bajoran spacecraft observed disengaging from the *Enterprise* during
    the quantum crisis. Monitored by the *Enterprise* bridge crew as a background
    element; no active role in the anomaly resolution or Riker-Picard reunion.
  sphere_of_influence: Bajoran Starship Navigation and Communications
  season_appearances:
  - 7
  local_uuids:
    1: org_e3bd8d0c4f60
  first_appearance_season: 7
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_d34cb2ee7bd0
  global_id: ger_organization_d34cb2ee7bd0
  canonical_name: Bajoran Vessel Crew
  description: The Bajoran Vessel Crew commands an older carrier bound for Valo III,
    restricted to half-impulse speed, which necessitates a Starfleet escort from the
    Enterprise. They deliver terse audio acknowledgments to Picard's hails, withhold
    visual contact, and coordinate navigation through Ensign Ro. This crew embodies
    Bajoran caution toward Starfleet amid fragile trust and broader tensions with
    Cardassians.
  sphere_of_influence: Bajoran Transport Operations
  season_appearances:
  - 5
  local_uuids:
    1: org_ae675f062ac4
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b9a89521045a
  global_id: ger_organization_b9a89521045a
  canonical_name: Bajorans
  description: Ro Laren embodies Bajoran heritage that fuels Picard's objections to
    her Enterprise assignment. Her role in the Garon Two incident, where she disobeyed
    orders leading to civilian deaths, exemplifies risks tied to Bajoran loyalties.
    Admiral Kennelly pushes her transfer anyway, exposing tensions between Bajoran
    interests and Starfleet operations. These interests create subtextual conflict,
    positioning Bajorans as a group whose priorities challenge Federation missions.
  sphere_of_influence: Cultural Cover for Undercover Infiltration
  season_appearances:
  - 5
  - 7
  local_uuids:
    1: org_c9c2157a6d06
    2: org_9c9f96339244
  first_appearance_season: 5
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_2d4678459ed1
  global_id: ger_organization_2d4678459ed1
  canonical_name: Bandi
  description: The Bandi, led by the station administrator Groppler Zorn, are the
    native alien inhabitants of the planet hosting Farpoint Station. They serve as
    the station’s operators and custodians, exhibiting a secretive culture marked
    by reluctance to expand their starbase beyond their homeworld. Their involvement
    in complex diplomatic negotiations, including tense interactions with Starfleet
    and veiled threats of alliance with the Ferengi, underscores their strategic caution
    and vulnerability. The Bandi city suffers bombardment amidst ongoing conflict,
    heightening their role as a faction caught between mystery, political intrigue,
    and survival.
  sphere_of_influence: Galactic Diplomacy and Territorial Custodianship
  season_appearances:
  - 1
  local_uuids:
    1: organization_3433bebb3166
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_5a09915cc799
  global_id: ger_organization_5a09915cc799
  canonical_name: Barkonian Villagers
  description: The Barkonian villagers form a tight-knit rural community on Barkon
    IV, gathered in their town square, where healer Talur instructs children on classical
    elements as the basis of matter. They confront radiation poisoning from Data's
    crashed probe fragments, as seen when Garvin collapses with burn lesions. Talur
    applies herbal remedies and a primitive microscope but fails to diagnose, exposing
    the limits of their traditional medicine. The villagers barter metals with outsiders,
    observe Data's (as Jayden) superhuman strength with shock, and initially follow
    blacksmith Skoran in accusing him of causing their sickness. Feverish and desperate,
    they hunt him as a demonic 'ice-man,' spear him dead in the town square, yet unknowingly
    drink the cure he doses into their well, securing their survival through his sacrifice.
    Data's push for empirical analysis directly challenges their authority and beliefs,
    positioning the villagers as a group in crisis, reliant on communal roles like
    teachers, apprentices, and healers amid emerging scientific scrutiny.
  sphere_of_influence: Rural Planetary Village / Community Survival and Outsider Persecution
  season_appearances:
  - 7
  local_uuids:
    1: org_47f7fcac6bb0
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_dbeb6216921d
  global_id: ger_organization_dbeb6216921d
  canonical_name: Barolian Trade Network
  description: The Barolian Trade Network (also referred to as 'Barolian Traders')
    is a commercial organization operating interstellar trade routes, including near
    Galorndon Core. Their vessels are known to engage in routine commercial exchanges
    with Romulans, positioning them as neutral parties in the region. One Barolian
    vessel received a covert Romulan subspace transmission with coded intelligence
    (sequence 1400), which was later decoded by Data. K’Vada highlights their extensive
    trade with Romulans, suggesting potential espionage cover and drawing scrutiny
    from the Federation and Klingons amid fragile alliances and threats to Vulcan.
    No internal structure of the organization has been revealed, but their activities
    escalate tensions and suspicions in the region.
  sphere_of_influence: Interstellar Trade and Commerce
  season_appearances:
  - 5
  local_uuids:
    1: org_71528bc774b9
  first_appearance_season: 5
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_e89dc9c6cc8b
  global_id: ger_organization_e89dc9c6cc8b
  canonical_name: Barzan People
  description: A small, technologically limited humanoid polity that commissioned
    an unmanned probe whose wormhole data catalyzes interstellar diplomacy and contestation.
    They originate and provide the positional and scientific data about the Barzan
    wormhole, lack manned deep-space capability, and appear as a negotiating party
    seeking resources and alliances. Their probe's readings drive tactical caution
    aboard the Enterprise and become a focal point for Ferengi provocation and alleged
    Federation back-channel deals, positioning the Barzans as remote data providers
    and politically contested stakeholders rather than direct spacefaring power brokers.
  sphere_of_influence: Interstellar Negotiation and Scientific Data Provision (remote/non-manned
    stakeholders)
  season_appearances:
  - 3
  local_uuids:
    1: organization_506c03f66750
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_30179c59f46e
  global_id: ger_organization_30179c59f46e
  canonical_name: Barzan Society
  description: The Barzan Society constitutes the planetary political community of
    Barzan, organized under civilian leadership and represented by Premier Bhavani.
    It seeks formal independence and technological assistance to secure survival and
    self-determination, pursuing multilateral diplomacy and legal recognition. In
    the current crisis it acts as stakeholder and beneficiary in wormhole negotiations,
    balancing sober appeals for sovereignty against external commercial and political
    pressures.
  sphere_of_influence: Planetary Self-Governance and Interstellar Diplomacy
  season_appearances:
  - 3
  local_uuids:
    1: organization_fe3b85378081
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_b682710cbc71
  global_id: ger_organization_b682710cbc71
  canonical_name: Base Crew (Starbase — Tholian Attack)
  description: The Base Crew denotes the collective personnel assigned to a Federation
    starbase that endured a devastating Tholian assault. They performed starbase operations,
    logistics, maintenance, and local defense; the entire cohort died in the attack,
    establishing them as narrative victims whose annihilation defines Kyle Riker’s
    singular survival, shapes Pulaski’s recollections, and raises the stakes around
    Starfleet’s strategic and moral response.
  sphere_of_influence: Starbase Operations and Personnel; Casualty Impact on Starfleet
    Strategic and Moral Decisions
  season_appearances:
  - 2
  local_uuids:
    1: organization_e5958f39eca8
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0a33ed796d0d
  global_id: ger_organization_0a33ed796d0d
  canonical_name: Benzite People
  description: 'The Benzite People denote the species-level cultural group invoked
    to explain Ensign Mendon’s ingratiating eagerness and characteristic bluntness.
    Within the presented material they function as a cultural reference rather than
    a formal institution: a set of social norms and behavioral predispositions that
    shape interpersonal interactions, provoke cross-cultural friction aboard the Enterprise,
    and inform crew expectations and protocol enforcement.'
  sphere_of_influence: Species Cultural Traits and Social Behavior (Interpersonal
    Norms)
  season_appearances:
  - 2
  local_uuids:
    1: organization_ed819e6de235
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1763c39c3837
  global_id: ger_organization_1763c39c3837
  canonical_name: Benzite Regulatory Tradition
  description: A Benzite cultural regulatory tradition that governs scientific disclosure,
    internal review, and incident-reporting norms among Benzite practitioners. It
    privileges on-the-spot, comprehensive local analysis and verification before external
    notification, enforcing compliance via social and professional custom rather than
    formal bureaucracy. In the presented material, this tradition compels Ensign Mendon
    to delay Starfleet incident reporting until a full Benzite analysis is complete,
    creating cross-cultural procedural friction with Starfleet operational requirements
    and shipboard safety priorities.
  sphere_of_influence: Cultural Procedural Norms Governing Scientific Reporting and
    Disclosure
  season_appearances:
  - 2
  local_uuids:
    1: organization_0f9420b37a85
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_fc600fa500ad
  global_id: ger_organization_fc600fa500ad
  canonical_name: Bersallin Colonists
  description: Federation civilians on **Bersallis Three**, facing destruction from
    an **advancing firestorm**. Their evacuation is a **high-stakes humanitarian mission**
    in *Lessons*, marked by **eight crew deaths**, **urgent perimeter risks**, and
    **Picard’s personal emotional strain** due to concurrent missions. The group’s
    survival is a defining success of the episode, contrasting with the moral ambiguity
    of *Chain of Command*.
  sphere_of_influence: Planetary Civilian Evacuation and Rescue
  season_appearances:
  - 6
  local_uuids:
    1: org_9451c3e64bab
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_1d85379fe249
  global_id: ger_organization_1d85379fe249
  canonical_name: Beta Moon (Peliar Zel)
  description: Beta Moon (Peliar Zel) suffers severe environmental damage from Alpha
    Moon's extraction of the planet's magnetic energy, triggering health crises across
    its population. Leaders accuse Alpha Moon of intentional genocide and prepare
    for war. Representative Lathal Bine engages Enterprise mediation, showing greater
    receptivity than Alpha counterparts and signaling potential cooperation if trust
    builds through figures like Odan or Riker.
  sphere_of_influence: Inter-Moon Energy Dispute and Diplomacy
  season_appearances:
  - 4
  local_uuids:
    1: org_343ed69e1bc8
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8dfd81ea8f2c
  global_id: ger_organization_8dfd81ea8f2c
  canonical_name: Betazed Trade Agreements Conference
  description: A biennial diplomatic event hosted on Betazed, serving as a neutral
    platform for interstellar trade negotiations. Acts as a setting for diplomatic
    tensions and cultural clashes, particularly involving the Ferengi Alliance and
    Starfleet officers (e.g., Picard, Riker). Does not possess agency or persistence
    beyond its scheduled occurrences.
  sphere_of_influence: Interstellar Trade Negotiations and Diplomacy
  season_appearances:
  - 3
  local_uuids:
    1: org_601331f07e8c
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_687c83a1ae4d
  global_id: ger_organization_687c83a1ae4d
  canonical_name: Betazed Trade Delegation to the Enterprise-D Conference
  description: Represents Betazed in a trade conference aboard the *Enterprise-D*,
    led by Ambassador Reittan Grax and including Lwaxana Troi. Focuses on Betazoid
    telepathic perspectives and cultural agency, contrasting with Ferengi commercialism.
  sphere_of_influence: Interstellar Trade Diplomacy and Cultural Representation
  season_appearances:
  - 3
  local_uuids:
    1: org_1dde5c69f304
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_e7f85f8a7afa
  global_id: ger_organization_e7f85f8a7afa
  canonical_name: Betazoid People
  description: The Betazoid People embody an ancient cultural tradition central to
    their identity and social structure, notably including the practice of genetic
    bonding as a lifelong commitment. This cultural imperative shapes personal relationships
    and social expectations within Betazoid society, influencing individual destinies
    and interactions with other species. Their customs resonate deeply in personal
    and diplomatic contexts, exemplified by Counselor Troi’s arranged genetic bond,
    underscoring the complex interplay of tradition, duty, and emotion in their cultural
    fabric.
  sphere_of_influence: Cultural Traditions and Social Customs
  season_appearances:
  - 1
  - 2
  local_uuids:
    1: organization_8995b473b823
    2: organization_8995b473b823
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_5fbc3cf4446b
  global_id: ger_organization_5fbc3cf4446b
  canonical_name: Betazoid Tradition
  description: The Betazoid Tradition encompasses cultural practices rooted in the
    heritage of the Betazoid people, including the sacred genetic bonding ritual that
    deeply influences personal decisions and societal obligations. This tradition
    shapes emotional and familial dynamics, compelling individuals like Counselor
    Deanna Troi to honor ancestral commitments despite personal conflicts and love
    entanglements.
  sphere_of_influence: Betazoid Cultural Heritage and Social Customs
  season_appearances:
  - 1
  local_uuids:
    1: organization_a7e785972d53
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_4ac0afb6e28f
  global_id: ger_organization_4ac0afb6e28f
  canonical_name: Betazoids
  description: Betazoids wield empathic abilities that Starfleet debates for operational
    roles. Admiral Satie pushes Sabin Genestra to surveil Lieutenant Tarses and uncover
    sabotage threats, stressing reliability. Captain Picard counters that such use
    exceeds counseling applications like Counselor Troi's, raising ethical barriers
    to invasive intuition in investigations. This clash exposes tensions between security
    needs and crew privacy on the Enterprise.
  sphere_of_influence: Empathic Investigation and Counseling
  season_appearances:
  - 4
  local_uuids:
    1: org_ee791d9b0eb7
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_ee5ea44af73f
  global_id: ger_organization_ee5ea44af73f
  canonical_name: Bironi
  description: The Bironi pursue peace negotiations mediated by Ambassador Alkar aboard
    the Enterprise. A Bironi warship approaches and triggers yellow alert, escalating
    tensions during the mission. Picard delays the Bironi leg of talks amid security
    concerns. Alkar insists on continuing despite the warship's presence, underscoring
    the Bironi's role as a key faction alongside others in fragile diplomatic efforts
    that demand immediate Enterprise support.
  sphere_of_influence: Interstellar Peace Negotiations and Naval Military Operations
  season_appearances:
  - 6
  local_uuids:
    1: org_37569066f8e6
  first_appearance_season: 6
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_435d12372ee6
  global_id: ger_organization_435d12372ee6
  canonical_name: Board of Patrons (Sisters of Hope Infirmary Governance Committee)
  description: Administrative governing body of the Sisters of Hope Infirmary, responsible
    for oversight of staff, institutional policies, and operational decisions. Distinct
    from the infirmary itself, which is the 19th-century charity hospital providing
    medical care.
  sphere_of_influence: Charity Hospital Administrative Governance
  season_appearances:
  - 6
  local_uuids:
    1: org_c3c4984d3d88
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_424da550da63
  global_id: ger_organization_424da550da63
  canonical_name: Bolians
  description: Haro declares herself a Bolian from Bolarus Nine during introductions
    among captives. Tholl dismisses this with 'Yes, that would follow,' linking to
    expected Bolian traits like youthfulness. Esoqq questions imprisoning a 'child,'
    amplifying the stereotype. Bolians appear as a species marked by interstellar
    perceptions of naivety or juvenile appearance, evident only through prisoner reactions—no
    structure, goals, or activities shown.
  sphere_of_influence: Species Cultural Perception
  season_appearances:
  - 3
  local_uuids:
    1: org_8b887113632e
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_2b74ce4189be
  global_id: ger_organization_2b74ce4189be
  canonical_name: Bonapartist Soldiers
  description: An antagonistic force masquerading as Bonapartist soldiers, these sentries
    exhibit monstrous features beneath authentic uniforms, combining historical military
    imagery with unnatural horror. They serve as hostile guards in a secret bivouac,
    signaling a sinister threat that escalates the conflict tension through their
    eerie presence and inhuman behavior.
  sphere_of_influence: Military/Paramilitary Operations with Supernatural Elements
  season_appearances:
  - 1
  local_uuids:
    1: organization_0e607ee7c128
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_f0ad4a383c21
  global_id: ger_organization_f0ad4a383c21
  canonical_name: Boraalan Community (Village on Boraal II)
  description: The Boraalan Community, also referred to as the Boraalan Village, is
    a relocated group of pre-warp Boraalans who initially survived in cavern shelters
    on Boraal II, shielded by Nikolai's deflector technology. Led by Vorin and Kateras,
    the community confronts outsiders like Worf while grappling with ethical tensions
    surrounding Nikolai's presence and his claim of brotherhood. Nikolai, posing as
    one of them, manipulates their trust through prophecies, ultimately leading them
    to unwittingly relocate to Vacca Six under the guise of divine salvation. The
    community's need for cultural continuity is fulfilled through Nikolai's role as
    chronicler and his decision to raise his child with Dobara among them.
  sphere_of_influence: Pre-Warp Refugee Community Integration and Cultural Preservation
  season_appearances:
  - 7
  local_uuids:
    1: org_078519a24d8e
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_acfeda4cdaad
  global_id: ger_organization_acfeda4cdaad
  canonical_name: Borg (Lore’s New Breed)
  description: A faction of Borg drones granted individuality and emotion by Lore,
    functioning as his loyal enforcers during his rebellion in *Descent, Part II*
    (S7E1). Operates independently of the traditional Borg Collective and is destroyed
    by the episode’s end.
  sphere_of_influence: Aggressive Interstellar Raids and Cybernetic Ambushes
  season_appearances:
  - 7
  local_uuids:
    1: org_61bca1e0140b
  first_appearance_season: 7
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_8cd869c5f38c
  global_id: ger_organization_8cd869c5f38c
  canonical_name: Borg (New Breed)
  description: A factional subgroup of the Borg collective, distinct from traditional
    drones, characterized by individualistic tactics, loyalty to Lore, and a targeted
    campaign against Data and the Federation. Central to the plot of *Descent, Part
    I/II*.
  sphere_of_influence: Aggressive Interstellar Raids and Cybernetic Ambushes
  season_appearances:
  - 6
  local_uuids:
    1: org_61bca1e0140b
  first_appearance_season: 6
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_45cc9de22968
  global_id: ger_organization_45cc9de22968
  canonical_name: Borg Collective
  description: The Borg Collective operates as a unified hive-mind of cybernetically
    enhanced drones connected via subspace links, functioning as one consciousness.
    It assimilates ships, crews, and technology into its network, overwhelming foes
    with numbers, adaptive shields, and pursuit. Key actions include destroying the
    Starfleet fleet at Wolf 359 and assimilating Captain Picard as Locutus. Admiral
    Satie invokes Picard's assimilation to question his loyalty and fitness for command
    during an inquiry aboard the Enterprise. The Collective uses a hierarchy with
    root command nodes for defense, navigation, and communications, vulnerable to
    internal disruptions like regeneration overrides.
  sphere_of_influence: Cybernetic Assimilation and Interstellar Conquest
  season_appearances:
  - 4
  - 5
  - 7
  local_uuids:
    1: org_f8d4ca5e9332
    2: org_586f1e12ce3a
    3: organization_70fd9b0ad71f
  first_appearance_season: 4
  tier: anchor
  episode_count: 5
- fabula_uuid: ger_organization_38774b61cdc7
  global_id: ger_organization_38774b61cdc7
  canonical_name: Borg Rescue Vessel
  description: A Borg-operated vessel dispatched to retrieve Hugh from his crash site
    and return him to the Collective. Picard warns Hugh of its approach within three
    hours, creating urgency for his choice between asylum on the Enterprise and reassimilation.
    The vessel enforces the Collective's control over its former members, acting as
    an antagonistic extension of Borg authority. Hugh's decision to return to the
    site ensures the crew's safety from potential retaliation.
  sphere_of_influence: Borg Reclamation and Retrieval Operations
  season_appearances:
  - 5
  local_uuids:
    1: org_50baba7b6393
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_fc4661825164
  global_id: ger_organization_fc4661825164
  canonical_name: Borg-Conquered Federation (Alternate Timeline)
  description: A single alternate reality where the Federation has been entirely subjugated
    by the Borg, leaving only scattered resistance forces (e.g., Alternate Riker's
    *Enterprise*). Acts as a narrative warning of the Federation's potential downfall,
    distinct from the broader multiversal incursion event.
  sphere_of_influence: Interstellar Governance and Anti-Borg Resistance
  season_appearances:
  - 7
  local_uuids:
    1: org_440f2a48caec
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_0591ac52f3a8
  global_id: ger_organization_0591ac52f3a8
  canonical_name: Bre'el Four (Planet/Settlement)
  description: 'Bre''el Four functions as a civilian planetary community confronting
    an acute geophysical emergency: its orbiting moon has moved into a perilous perigee,
    threatening widespread devastation. The settlement contains noncombatant populations
    and local administrators who attempt ad hoc coordination of relief but primarily
    act as the beneficiary of the Enterprise''s emergency rescue, technical mitigation,
    and humanitarian assistance.'
  sphere_of_influence: Planetary Civilian Welfare and Emergency Disaster Response
    (Beneficiary of Interstellar Rescue Operations)
  season_appearances:
  - 3
  local_uuids:
    1: organization_41e923eccfed
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_6a7426221198
  global_id: ger_organization_6a7426221198
  canonical_name: Bre'el Four Planetary Delegation
  description: The Bre'el Four Planetary Delegation acts as the official collective
    of Bre'el Four's government representatives and scientific specialists (including
    scientist Garin). In the processed material they appear as the affected-party
    requesters of aid, providing precise scientific assessments of a catastrophic
    orbital threat, reporting projected planetary impacts, and liaising with external
    authorities (the Enterprise command) to solicit emergency intervention and technical
    assistance.
  sphere_of_influence: Planetary Emergency Representation, Scientific Consultation,
    and Interstellar Aid Requests
  season_appearances:
  - 3
  local_uuids:
    1: organization_d59801b4ba27
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_ce567808a1b9
  global_id: ger_organization_ce567808a1b9
  canonical_name: Bre'el Four Science Station
  description: Bre'el Four Science Station operates as a local scientific outpost
    and monitoring facility near the unfolding crisis. The station gathers and relays
    technical and observational data, and in the current material it functions as
    an external ally and informational resource contacted by the Enterprise for real‑time
    collaboration. No formal internal hierarchy or command relationship to Starfleet
    is shown; its role is limited to scientific support and local expertise during
    the emergency.
  sphere_of_influence: Local Scientific Research and Crisis Data Support
  season_appearances:
  - 3
  local_uuids:
    1: organization_96c2ad8f76ca
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_d891fd6a9891
  global_id: ger_organization_d891fd6a9891
  canonical_name: Breen
  description: 'Data names the Breen as prime suspects in the Vico''s destruction.
    They maintain outposts across the sector, positioning them to launch surprise
    attacks. Their battle tactics align precisely with forensic traces: high-energy
    weapons that mimic internal explosions, no transporter or docking signatures.
    Picard lists them alongside Romulans and Klingons as capable of cloaked assaults,
    marking the Breen as aggressive players in regional conflicts who evade standard
    detection.'
  sphere_of_influence: Sector Military Operations and Cloaked Assaults
  season_appearances:
  - 5
  local_uuids:
    1: org_e8fb3311ab30
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_26270e9bcea5
  global_id: ger_organization_26270e9bcea5
  canonical_name: Brekkian Consortium
  description: The Brekkian Consortium wields control over the Felicium trade, exploiting
    the Ornarans' addiction to maintain economic dominance. They manipulate Federation
    principles, particularly the Prime Directive, to evade responsibility while enforcing
    their narcotic monopoly. Operating through calculated diplomacy and strategic
    denial of alternatives, the Consortium prioritizes profit over the wellbeing of
    dependent populations, embodying a cold, systemic exploitation masked as reluctant
    generosity.
  sphere_of_influence: Interstellar Narcotics Trade and Economic Exploitation
  season_appearances:
  - 1
  local_uuids:
    1: organization_4e3f94b7f172
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_e5c6310f4b90
  global_id: ger_organization_e5c6310f4b90
  canonical_name: Brekkian Merchants
  description: The Brekkian Merchants operate as a commercially driven trading faction
    specializing in valuable and scarce commodities such as Felicium, a critical medicine.
    Represented by agents Sobi and Langor, they assert legal and economic ownership
    over their cargo, prioritizing profit even amid humanitarian crises. Their role
    in the current conflict highlights their willingness to enforce economic claims
    aggressively, positioning them as antagonists against the Ornarans, whose desperate
    plight clashes with the merchants' mercantile interests.
  sphere_of_influence: Interstellar Commercial Trade and Economic Ownership
  season_appearances:
