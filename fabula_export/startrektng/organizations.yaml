- fabula_uuid: ger_organization_3466c4b0d250
  global_id: ger_organization_3466c4b0d250
  canonical_name: Ligonian Government
  description: The Ligonian Government governs the alien civilization of Ligon II,
    asserting authority through culturally ritualistic practices that shape their
    political and social interactions. It stands as an adversarial force within interstellar
    relations, notably engaging in hostile acts such as the abduction of Lieutenant
    Yar by its leader Lutan. The government exercises influence through a blend of
    political ambition and ritualized conflict, demanding diplomatic negotiation while
    embodying a society governed by complex tradition and personal power struggles.
  sphere_of_influence: Galactic Politics and Cultural Diplomacy
  season_appearances:
  - 1
  local_uuids:
