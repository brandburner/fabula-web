- fabula_uuid: ger_organization_f1ea82f60ba9
  global_id: ger_organization_f1ea82f60ba9
  canonical_name: Romulan Vessel Crew
  description: A Romulan military contingent serving aboard the crashed vessel, acting
    as both surviving crew and a tactical bargaining chip. They operate under a disciplined
    chain of command implied by military posture, prioritize ship and personnel survival,
    and project diplomatic leverage by virtue of their injured survivor and wreckage.
    Their presence catalyzes custody disputes, security responses, and potential escalation
    with Federation officers, creating immediate interstellar diplomatic and military
    tension.
  sphere_of_influence: Interstellar Military Presence and Diplomatic Leverage
  season_appearances:
