  global_id: ger_organization_dd9e6cc47b32
  canonical_name: Ferengi Council
  description: An *institutional governing body* in Ferengi society, invoked by Daimon
    Prak as a *legal authority* to interpret Federation actions as acts of war. Unlike
    operational crews, the Council does not engage in direct tactical actions but
    serves as a *metaphorical tool* for political pressure and justification of aggression.
  sphere_of_influence: Ferengi Political Authority on Interstate Conflicts
