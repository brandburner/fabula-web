  global_id: ger_organization_607ac3d1c338
  canonical_name: Theoretical Propulsion Group (Galaxy-Class Starships)
  description: The Theoretical Propulsion Group (Galaxy-Class Starships) is a specialized
    Starfleet research and engineering body charged with developing and documenting
    propulsion theory and design for Galaxy-class starships. In the current material
    it appears as the institutional author of technical files and archived voice logs
    (Dr. Leah Brahms), providing authoritative analysis, archival records, and design
    guidance that front-line engineers consult during complex propulsion failures.
    The group operates as a technical stewardship unit within Starfleet engineering,
    supplying theoretical frameworks, diagnostic references, and institutional affiliation
    for individual researchers.
  sphere_of_influence: Starfleet propulsion research and engineering; starship design
    authority for Galaxy-class vessels
