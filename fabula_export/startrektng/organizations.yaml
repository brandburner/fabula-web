- fabula_uuid: ger_organization_2b5fc1a47fd0
  global_id: ger_organization_2b5fc1a47fd0
  canonical_name: Federation Starbases
  description: A network of Federation orbital installations that provide communications,
    logistics, medical support, and emergency coordination for Starfleet operations.
    These outposts operate under Starfleet/Federation jurisdiction as staffed command-and-support
    hubs, relaying tactical transmissions, accepting damaged vessels, coordinating
    evacuations, and hosting repair or medical teams. In the current crisis multiple
    starbases have lost all contact, marking them as affected infrastructure and signaling
    a region‑wide disruption that complicates command situational awareness and response
    options.
  sphere_of_influence: 'Federation Orbital Infrastructure: Communications, Emergency
