  description: A visiting starship under Picard's command that functions as the immediate
    on-scene authority and potential rescuer. It encountered an armed warship, offered
    refuge and assistance to the Uxbridges and other colonists, and exerts operational,
    humanitarian, and security judgment through its command and crew (notably Picard
