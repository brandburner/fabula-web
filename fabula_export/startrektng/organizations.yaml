  description: 'Transporter Operations oversees the shipboard transporters: the hardware,
    software, and assigned personnel responsible for beaming crew and materiel. In
    this episode they appear as a tactical system and organizational target—systems
    and personnel are specifically targeted by an intruding energy, and engineering
    issues orders to take transporters offline. They operate within ship engineering
    and coordinate closely with security and bridge command during crises.'
