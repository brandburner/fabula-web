  global_id: ger_organization_9e6942e0a4ff
  canonical_name: Sir Guy’s Retinue (Soldiers)
  description: Sir Guy’s retinue comprises soldiers who serve as his personal enforcers
    in this medieval setting. They burst into Maid Marian’s chamber with Sir Guy,
    seize Picard after Vash disarms him and offers him as a 'wedding gift,' and carry
    out the arrest. These soldiers embody the antagonist force, upholding Sir Guy's
    authority through direct action and armed intervention during the betrayal.
  sphere_of_influence: Personal Enforcement and Custody Operations
