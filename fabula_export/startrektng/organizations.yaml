  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8d4fb23553ff
  global_id: ger_organization_8d4fb23553ff
  canonical_name: Menthars
  description: 'Survey: I compile references that repeatedly name the Menthars as
    an ancient faction that fought the Promellians to mutual extinction and as the
    agents who conceal Aceton assimilators in floating debris to create lethal booby
    traps. Plan: Treat the Menthars as a single canonical entity combining a wartime
    civilization and a tactical booby-trap doctrine. Execute: The Menthars operate
    as an ancient militarized society whose strategic goal, as evidenced here, was
    battlefield denial and destructive attrition — they deploy Aceton assimilators
    hidden among wreckage to siphon ship energy and convert it into lethal radiation.
    Structure and methods remain largely inferential: no internal hierarchy appears
    in the current material, but actions imply organized engineering capability, deliberate
    concealment tactics, and knowledge of energy-harvesting/weaponized Aceton technology.
    Relationship: The Menthars stand as historical antagonists to the Promellians
    and function as the explanatory cause of the Promellian wreck''s defensive systems
    encountered by the Enterprise crew. Validation and confidence: The corpus consistently
    ties the Menthars to both the extinction battle and the booby-trap mechanism;
    remaining uncertainties include their political structure, cultural motives beyond
    tactical denial, and whether ''Menthars'' names a species, polity, or military
    faction (confidence ~0.85).'
  sphere_of_influence: Ancient Militarized Civilization and Tactical Weaponization
    of Space Debris (historical antagonists; battlefield-denial technology deployment)
  season_appearances:
  - 3
  - 4
  local_uuids:
    1: organization_e4d2b63d0a4b
    2: org_7000ee339e7b
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_1f743f690edd
  global_id: ger_organization_1f743f690edd
  canonical_name: Mexican State (Independence from Spain)
  description: The Mexican State (Independence from Spain) appears as a historical
    national actor that secured sovereignty through armed rebellion against colonial
    rule. In the current material it functions solely as a precedent cited by DATA
    to argue that violent insurrection has produced political change when peaceful
    options exhausted. The episode provides no internal institutional detail beyond
    its role as an example of anti-colonial state formation and rupture from Spanish
    imperial authority.
  sphere_of_influence: National Independence, Anti-Colonial Revolt and Political Transformation
  season_appearances:
  - 3
  local_uuids:
    1: organization_8ecde606313f
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0fef8dc33a58
  global_id: ger_organization_0fef8dc33a58
  canonical_name: Mikulak
  description: The Mikulak (pluralized as 'Mikulaks' in some references) is an organization
    that donates tissue samples to the *USS Enterprise* for transport to **Nahmi IV**,
    where the samples are critical to halting the spread of **Correllium Fever**.
    Their contribution is logged by Captain Picard as vital to the medical mission.
    The samples, stored in the cargo bay, are handled by engineering teams including
    **Geordi La Forge, Miles O'Brien, and Reginald Barclay**, but a malfunction in
    the anti-grav units threatens the shipment, underscoring the fragility and importance
    of the donation. The Mikulak represent external allies aiding planetary health
    crises through interstellar scientific collaboration.
  sphere_of_influence: Interstellar Medical Donations and Disease Containment
  season_appearances:
  - 3
  local_uuids:
    1: org_18ce9273bd50
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b68ea1335e09
  global_id: ger_organization_b68ea1335e09
  canonical_name: Mineral Shop in Chinatown
  description: The Mineral Shop in Chinatown operates as a retail outlet in 1893 San
    Francisco, stocking minerals that attract Data's inquiries into mining operations
    and geological records. Clemens identifies it as a lesser-known stop on Data's
    research trail, citing Data's presence and questions as evidence of suspicious
    covert activities. These visits bolster Clemens' accusations during confrontations
    in Data's quarters, framing the shop as a key node linking Data's 19th-century
    movements to broader timeline threats from the crew's mission.
  sphere_of_influence: 19th-Century Mineral Retail and Geological Inquiry Hub
  season_appearances:
  - 6
  local_uuids:
    1: org_76fa5ac9618b
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b69e57b7e669
  global_id: ger_organization_b69e57b7e669
  canonical_name: Mining Settlement on Pentarus
  description: The Mining Settlement on Pentarus functions as a resource extraction
    colony on the planet's surface. Workers extract minerals and maintain subspace
    communications with passing Starfleet ships. They contact the Enterprise bridge
    to report Captain Picard's shuttle as overdue and request an immediate search
    mission. This urgent plea forces Commander Riker to weigh it against the radioactive
    waste vessel crisis threatening Gamelan Four, amplifying crew tensions between
    duty to the captain and planetary safety.
  sphere_of_influence: Planetary Resource Extraction and Emergency Communications
  season_appearances:
  - 4
  local_uuids:
