  canonical_name: Seronia
  description: The *planetary nation* of Seronia, engaged in an interstellar war with
    Rekag. Distinct from its diplomatic contingents (e.g., the Seronian Delegation
    aboard the *Enterprise*), which operate as subsets of this broader political entity.
