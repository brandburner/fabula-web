  episode_count: 0
- fabula_uuid: ger_organization_f9d26a66e0d1
  global_id: ger_organization_f9d26a66e0d1
  canonical_name: Romulan Battle Bridge Crew
  description: The Romulan Battle Bridge Crew operates as the shipboard military command
    team aboard a Romulan warship’s combat bridge. They man tactical consoles, raise
    weapons, initiate emergency protocols, and coordinate sensor and damage-control
    responses during catastrophic events. On-scene officer Taris and her officers
    direct defensive maneuvers while the crew executes automated Iconian/computer
    alerts. They function as an antagonistic, hierarchical unit prioritizing vessel
    survival, tactical denial, and immediate containment or extraction decisions.
  sphere_of_influence: Romulan Star Navy Shipboard Command, Tactical Defense, and
    Emergency Bridge Operations
  season_appearances:
  - 2
  local_uuids:
    1: organization_651f745a82c2
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_244a74d13607
  global_id: ger_organization_244a74d13607
  canonical_name: Romulan Colony Guard (Khitomer Prison Colony)
  description: Local enforcement unit of middle-aged Romulans stationed in the Klingon
    colony (e.g., Khitomer survivors' prison). Directly suppresses Klingon culture
    and heritage through on-the-ground tactics, such as interrupting confrontations
    and maintaining the colony's facade of peace. Hesitates when faced with unexpected
    threats (e.g., Worf's arrival). Operates under the authority of the Romulan High
    Command but is not synonymous with it.
  sphere_of_influence: Colony Oversight and Security Enforcement
  season_appearances:
  - 6
  local_uuids:
    1: org_229d8484acf1
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_89f46991c88e
  global_id: ger_organization_89f46991c88e
  canonical_name: Romulan Contingent
  description: The Romulan Contingent operates as a militarized force representing
    Romulan interests, manifesting as a hostile external actor near the Neutral Zone.
    Their presence heightens geopolitical tensions, threatening regional stability
    and complicating delicate diplomatic efforts. Though direct leadership structure
    remains unelaborated, their actions exert significant pressure on Starfleet and
    allied parties, positioning them as a formidable antagonist force within the contested
    borderlands.
  sphere_of_influence: Military Operations and Strategic Threats in the Neutral Zone
  season_appearances:
  - 1
  local_uuids:
    1: organization_413ea5f4f0b3
  first_appearance_season: 1
