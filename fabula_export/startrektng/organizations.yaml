  episode_count: 1
- fabula_uuid: ger_organization_41b6ae28d534
  global_id: ger_organization_41b6ae28d534
  canonical_name: Gatherers
  description: The Gatherers operate as a nomadic, clan-based marauder culture exiled
    from Acamar that survives by raiding, scavenging advanced technology, and holding
    transient encampments (notably in the Hromi Cluster). They organize under local
    leaders (Brull, Chorgan and others) rather than a centralized government, enforce
    claims through custom and violence, and resist formal amnesty. Their methods include
    organized ambushes, ritualized bargaining, public tests of authority, and clandestine
    violence — the death of Volnoth is executed via a bespoke, targeted bio-agent
    during a fragile parley.
  sphere_of_influence: Frontier banditry, raiding, and destabilizing local diplomacy
    in fringe systems (nomadic tribal/marauder influence across the Hromi Cluster
    and Acamar periphery)
  season_appearances:
  - 3
  local_uuids:
    1: organization_63f818d387c6
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_812328444d95
  global_id: ger_organization_812328444d95
  canonical_name: Gemarians
  description: The Gemarians join the Dachlyds in a contentious trade dispute on Gemaris
    V, where Captain Picard mediates a mutually beneficial agreement after two grueling
    weeks. Troi labels both groups incredibly stubborn, a trait that stalls talks
    and drains Picard through prolonged haggling. Their role underscores the friction
    in interstellar commerce, demanding Federation diplomats to broker deals amid
    unyielding positions.
  sphere_of_influence: Interstellar Trade Negotiations
  season_appearances:
  - 3
  local_uuids:
    1: org_1f26333a4178
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_cbd64c96cba9
  global_id: ger_organization_cbd64c96cba9
  canonical_name: Geological Society
  description: The Geological Society maintains 19th-century archives of geological
    records and mining operations. Samuel Clemens identifies Data's repeated visits
    and inquiries there—alongside other institutions—as evidence of a suspicious research
    pattern tied to future technology and temporal schemes. Clemens leverages these
    details to challenge Data's cover story, marking the Society as a pivotal source
    in his escalating accusations against the crew's mission.
  sphere_of_influence: 19th-Century Geological Records and Mining Research
  season_appearances:
  - 6
  local_uuids:
