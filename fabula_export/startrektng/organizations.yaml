  canonical_name: Mordanite Forces
  description: The Mordanite Forces operate as a militarized faction fiercely loyal
    to Governor Karnas. They orchestrate and enforce the hostage crisis on Mordan
    IV, engaging in direct combat with opposing away teams and implementing Karnas'
    strategic demands. Their presence signifies the antagonistic military power controlling
    the tunnels beneath Mordan IV, embodying themes of vengeance and political coercion
    within this volatile conflict.
  sphere_of_influence: Military Control and Hostage Enforcement on Mordan IV
