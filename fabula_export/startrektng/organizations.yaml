  episode_count: 1
- fabula_uuid: ger_organization_6018d9b91b5e
  global_id: ger_organization_6018d9b91b5e
  canonical_name: Cardassian Delegation
  description: The Cardassian Delegation deploys agents like Daro to foster rapport
    with Starfleet personnel aboard the Enterprise through social invitations to Ten-Forward
    and discussions praising Picard while probing Starfleet technology and operations.
    Daro frames these overtures as shared professional interests, but O’Brien rebuffs
    them, citing La Forge for technical talks and Picard for operations. This approach
    generates tension, reflecting Cardassian motives amid Maxwell’s rogue actions
    and O’Brien’s war-forged distrust. The delegation operates as a diplomatic probe
    in confined settings like turbolifts.
  sphere_of_influence: Interstellar Diplomatic Probing and Intelligence Gathering
  season_appearances:
  - 4
  local_uuids:
    1: org_deb81ecf0eb8
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_2f4738847bbc
  global_id: ger_organization_2f4738847bbc
  canonical_name: Cardassian Fleet
  description: The Cardassian fleet conceals itself in the McAllister Nebula to stage
    an invasion of Minos Korva. Captain Jellico identifies them as an imminent threat
    and secures Starfleet approval for a preemptive strike using anti-matter mines
    launched from the USS Enterprise. Data calculates their 17-hour window before
    nebula conditions force movement. Jellico frames the action as defensive necessity,
    overriding crew objections from Beverly Crusher and Geordi La Forge, who question
    the evidence and morality. Their positioning drives the Enterprise into high-stakes
    confrontation amid fractured command loyalties.
  sphere_of_influence: Invasion Preparation and Nebula Naval Operations
  season_appearances:
  - 6
  local_uuids:
    1: org_af46d4cee4df
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_32fc0311f7c5
  global_id: ger_organization_32fc0311f7c5
  canonical_name: Cardassian Government/Delegation
  description: The Cardassian government or official delegation pressing charges against
    detained mercenaries for actions tied to the covert mission that neutralized their
    psionic resonator installation. Picard notes they join other worlds in this pursuit,
    establishing their standing as interstellar legal claimants. Their involvement
    underscores direct stakes in the operation's fallout, demanding accountability
    through formal proceedings amid *Enterprise* crew debriefs. **Note:** This entity
    represents the Cardassian **state or diplomatic body**, not military forces.
  sphere_of_influence: Interstellar Legal Claims and Territorial Accountability
  season_appearances:
  - 7
  local_uuids:
    1: org_331b4659102c
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_20548e3adf7b
  global_id: ger_organization_20548e3adf7b
  canonical_name: Cardassian Military
  description: The Cardassian military commands warships that ambush Federation starships
    such as the Enterprise without provocation. Crews under its direction launch sudden
    attacks, forcing Picard and his bridge officers into defensive firefights amid
    shield activations and power failures. This aggression disrupts diplomatic efforts,
    escalates tensions with the Federation, and validates warnings of Cardassian rearmament,
    casting the military as the primary antagonist in border confrontations.
  sphere_of_influence: Interstellar Military Aggression and Border Warfare
