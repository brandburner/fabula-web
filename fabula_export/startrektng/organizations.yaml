  canonical_name: Seronian Delegation (Enterprise Mediation)
  description: A *diplomatic contingent* of Seronia, led by Liva, operating aboard
    the *Enterprise* during peace negotiations with Rekag. Distinct from the broader
    Seronian nation, this group employs aggressive security tactics (e.g., armed sentries,
    planetary shields) to enforce leverage in mediation.
