- fabula_uuid: ger_organization_8ea97dceda9b
  global_id: ger_organization_8ea97dceda9b
  canonical_name: Cavern Rebel Camp
  description: A local insurgent faction occupying a cavern-based encampment, implicitly
    led by the figure known as Finn. The group runs a makeshift infirmary treating
    grievously wounded patients, arms and indoctrinates youth, secures supplies (including
    stolen medical gear), and maintains sentries and militia security. They operate
    with an informal command structure of leaders, supply operatives, and guards,
    functioning simultaneously as a humanitarian refuge for insurgents and a hostile,
    politically charged force opposing Starfleet and local authorities.
  sphere_of_influence: Local Insurgent Operations and Guerrilla Camp Governance
