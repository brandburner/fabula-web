  canonical_name: Tanugan Research Laboratory
  description: Tanugan Research Laboratory operates as a Tanugan-owned scientific
    facility whose staff (including Dr. Apgar, Tayna, and Manua) carry out laboratory
    work that becomes the subject of external scrutiny. The laboratory functions as
    the source location for a Starfleet inspection and a forensically precise holodeck
    reconstruction, positioning the lab as both an operational research site and the
    focal evidence source in an active investigation.
  sphere_of_influence: Private Scientific Research and Site of Incident Investigation
