  canonical_name: Federation Colonists (Minos Korva)
  description: Federation civilians on **Minos Korva (McAllister Nebula)**, threatened
    by a strategic/military conflict (preemptive strike) rather than environmental
    peril. Their protection is the moral impetus for the *Enterprise*’s actions in
    *Chain of Command, Part II*, tying to Cardassian-Federation tensions and command
    ethics.
  sphere_of_influence: Federation Civilian Colonial Defense
