  canonical_name: Klingon Assassins
  description: A small, violent cadre of Klingon operatives who execute targeted killings
    in service of a Klingon political conspiracy. In the current material they appear
    as a two-person strike team that ambushes and brutally wounds Kurn, acting as
    an antagonistic, covert enforcement arm likely hired or directed by Duras. Their
    hierarchy, formal affiliation, and broader network remain unspecified in the scene.
  sphere_of_influence: Covert political violence and assassination within Klingon
