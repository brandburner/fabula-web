  global_id: ger_organization_0fa925033645
  canonical_name: The Borg (Rogue Individualistic Faction)
  description: A fractured, vengeful Borg sub-faction that operates independently
    of the traditional Collective, targeting Starfleet officers by rank and species
    with personalized assaults. Emerges in later *Star Trek* narratives as a distinct
    antagonist force.
  sphere_of_influence: Rogue Cybernetic Assaults and Targeted Individual Warfare
