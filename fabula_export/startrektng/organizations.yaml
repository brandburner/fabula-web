  global_id: ger_organization_b96fc895e2e3
  canonical_name: U.S.S. Intrepid
  description: Starfleet vessel where Sergey Rozhenko served during his enlisted career
    before retirement. Sergey recalls his assignment aboard with pride and nostalgia
    while introducing himself to O'Brien in the Enterprise transporter room. The ship
    connects Sergey's Starfleet past to O'Brien's service, fostering shared identity
    among retired and active personnel. References highlight Sergey's transition from
    enlisted chief to raising an officer like Worf.
  sphere_of_influence: Starfleet Vessel Operations and Enlisted Service
