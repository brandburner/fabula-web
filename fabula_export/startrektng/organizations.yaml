- fabula_uuid: ger_organization_49e759df587b
  global_id: ger_organization_49e759df587b
  canonical_name: Music Group (Harpists)
  description: 'A small ensemble of harpists contracted or attached to the Edo council
    chamber to supply live music and ambient entertainment during ritual revelry.
    Their visible role is strictly performative: they shape atmosphere, cue social
    interactions, and reinforce ceremonial tone around council gatherings. No internal
    hierarchy or administrative structure is shown in the material; they operate as
    ceremonial accompanists tied to the council’s public rituals rather than as a
    political actor, and their presence supports diplomats’ and participants’ social
    performance without exercising authority.'
  sphere_of_influence: Ceremonial Performing Arts and Cultural Entertainment within
    Edo Council Rituals
