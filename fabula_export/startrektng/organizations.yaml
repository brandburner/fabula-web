- fabula_uuid: ger_organization_155d2250a44d
  global_id: ger_organization_155d2250a44d
  canonical_name: Federation Anthropological Field Team — Duck Blind Outpost
  description: A three-person, Federation‑sponsored anthropological field team assigned
    to a concealed 'duck blind' observation post for close‑range study of preindustrial
    cultures. The team (Barron, Palmer, and Warren) conducts covert, in‑situ observation
    under strict noninterference protocols, relying on remote support from an Enterprise‑class
    vessel and standing rapid‑extraction procedures. Within the current material the
    group is explicitly identified by Data as the Federation team investigating the
    Koinonians — described as the first Federation opportunity to study them — and
    its activities intersect Starfleet command priorities and Prime Directive constraints.
    The team's presence also registers as a cultural vector, with Federation artifacts
    and games noted in shipboard classrooms, linking field research to broader cultural
    exchange and influence.
  sphere_of_influence: Anthropological Field Research and Covert Cultural Observation;
    Federation‑sponsored scientific exploration and noninterference operations
  season_appearances:
  - 3
  local_uuids:
