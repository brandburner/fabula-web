  global_id: ger_organization_4f051e8ef66a
  canonical_name: Duras Faction (Klingon Political Faction)
  description: A Klingon political faction centered on Duras that pursues advancement
    and secrecy through patronage and covert violence. The group uses offers of rank
    and safety to buy loyalty, and deploys hidden assassins to eliminate threats or
    enforce obedience, operating as a ruthless antagonist force within Klingon internal
    power struggles and familial rivalries. Leadership compels compliance by blending
    political promises with clandestine enforcement.
  sphere_of_influence: Klingon Internal Political Power, Covert Enforcement, and Familial
