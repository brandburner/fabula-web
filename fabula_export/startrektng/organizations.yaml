- fabula_uuid: ger_organization_2128cbaad1d0
  global_id: ger_organization_2128cbaad1d0
  canonical_name: Romulan (Affiliation)
  description: A Romulan political-military affiliation representing an external state
    actor whose presence imposes diplomatic and security consequences. In the current
    encounter a wounded Romulan in uniform demands immediate audience, framing the
    arrival as urgent intelligence delivery or deliberate provocation. The group's
    visible trappings convey state authority; implied activities include diplomatic
    contact, intelligence exchange, and operations that can escalate into interstellar
    conflict.
  sphere_of_influence: Foreign State Military and Intelligence Influence; Interstellar
    Diplomacy and Security
  season_appearances:
