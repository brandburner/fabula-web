  canonical_name: Iyaaran Government
  description: Centralized Iyaaran authority body conducting a **systematic cultural
    exchange program** with the USS *Enterprise*, represented by **three ambassadors
    (Loquel, Byleth, Voval)**. Uses **deliberate provocation, staged abductions, and
