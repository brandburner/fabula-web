  episode_count: 1
- fabula_uuid: ger_organization_be21101cdb8f
  global_id: ger_organization_be21101cdb8f
  canonical_name: Romulan Pacifist Ideals (Colony Governance System)
  description: The Romulan Pacifist Ideals represent a governing philosophy enforced
    by Tokath and Gi’ral in the Klingon-Romulan colony, prioritizing peace and harmony
    above Klingon warrior traditions. This system suppresses cultural practices like
    ritual kills, battle songs, and traditional Klingon weaponry (e.g., bat'leth,
    Jinaq amulets, daggers, armor), while fostering survival through pacifism and
    isolation. The ideals are embodied by youth like Toq and Ba’el, who are assigned
    to monitor outsiders and enforce compliance. Worf and Toq challenge this order
    by reintroducing Klingon honor traditions—such as presenting a fresh kill and
    singing *Bagh Da tuHmoh*—which rally the younger generation against elder control.
    The ideals act as an antagonist force, creating tension between imposed tranquility
    and the resurgent Klingon warrior ethos, ultimately fracturing the hybrid society's
    fragile coexistence.
  sphere_of_influence: Pacifist Ideology Enforcement and Cultural Suppression in Klingon-Romulan
    Colony
  season_appearances:
  - 6
  local_uuids:
    1: org_8ea7f7cd9299
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_5660a23f978f
  global_id: ger_organization_5660a23f978f
  canonical_name: Romulan Patrol Ships
  description: The Romulan Border Patrols, operating as the external security arm
    of Romulan forces, are tasked with patrolling borders to detect and neutralize
    threats that could expose hidden outposts (e.g., the Klingon-Romulan Colony).
    They include both ground-based patrols and patrol ships, which are deployed to
    track and intercept vessels like the escaped Yridian ship that spied on the colony.
    Tokath and other Romulan leaders rely on them to maintain isolation amid interstellar
    tensions. Their operations are distinct from internal security forces like the
    Romulan Guard, which oversee the colony itself.
  sphere_of_influence: Romulan Border Surveillance and Secrecy Enforcement
  season_appearances:
  - 4
  - 6
  local_uuids:
    1: org_5d0094529fcd
    2: org_43f655d4b23e
