  global_id: ger_organization_bb1a027cef7d
  canonical_name: Mordan IV Dissident Terrorist Group
  description: This dissident terrorist group operates on the planet Mordan IV, holding
    Federation Ambassador Hawkins and his staff hostage in a high-stakes political
    crisis. The group refuses negotiation with local authorities, instead demanding
    a Federation negotiator, specifically Admiral Jameson, highlighting the intense
    conflict rooted in decades of civil war on Mordan IV. Their actions challenge
    Federation authority and escalate tensions, positioning them as a critical antagonist
    force in the region.
  sphere_of_influence: Galactic Politics and Insurgent Conflict
  season_appearances:
