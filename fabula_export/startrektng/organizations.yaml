- fabula_uuid: ger_organization_72411d0d6502
  global_id: ger_organization_72411d0d6502
  canonical_name: Tarellian Survivors
  description: The Tarellian Survivors are a dying alien species whose plague-afflicted
    ship approaches the planet Haven, posing an existential viral threat. Long thought
    extinct, they embody a profound moral conflict for the Federation, caught between
    the imperative to contain a lethal contagion and the ethical mandate to preserve
    life. Central to the narrative, they are both victims and sources of danger, receiving
    aid through the intervention of Wyatt, a prophesied healer who embraces his destiny
    to cure and protect them, transforming their plight into a story of sacrifice,
    hope, and cosmic connection.
  sphere_of_influence: Interstellar Humanitarian Crisis and Ethical Dilemma
  season_appearances:
  - 1
  local_uuids:
    1: organization_8f576723632a
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_b1423c4e082a
  global_id: ger_organization_b1423c4e082a
  canonical_name: Tau Cygna Five Colony
  description: A human colonial settlement led by Gosheven that asserts ancestral
    ownership and refuses enforced evacuation. The community relies on town meetings
    and centralized elder authority, yet exhibits fissures as lieutenants Haritath
    and Kentor waver and Ard'rian conspires with outsiders to organize a covert evacuation.
    The colony operates as a local civic body and contested territorial stakeholder
    whose fate becomes entangled in a high-stakes legal and diplomatic dispute between
    the Federation (Enterprise officers) and the Sheliak.
  sphere_of_influence: Local Civilian Governance and Territorial Stakeholder with
    Diplomatic Implications
  season_appearances:
  - 3
  local_uuids:
