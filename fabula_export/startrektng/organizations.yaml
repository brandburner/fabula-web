  global_id: ger_organization_fe0a839bdc04
  canonical_name: Trauma Teams
  description: Trauma Teams operate as distributed, shipboard emergency medical response
    units tasked with rapid triage, stabilization, and transport of casualties across
    multiple decks. They function as mobile medic squads and triage coordinators that
    plug into Sickbay operations, improvising low‑tech interventions when automated
    systems fail. Observed activities include responding to dozens of simultaneous
    emergency calls, sustaining continuous field care under severe personnel and equipment
    strain, and supporting Sickbay staff during mass‑casualty events.
  sphere_of_influence: Shipboard Emergency Medical Response and Triage
  season_appearances:
