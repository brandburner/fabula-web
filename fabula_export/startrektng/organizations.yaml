  description: A formal diplomatic body within the United Federation of Planets invoked
    to mediate interstate disputes and coordinate multilateral responses. In the current
    material, Finn designates the Federation Counsel as the mediator for talks between
    Rutia and its opposing party and links the Counsel to conditions involving embargoes
    and sanctions, implying it convenes negotiation forums and liaises with Starfleet
    and other Federation organs to implement diplomatic pressure.
