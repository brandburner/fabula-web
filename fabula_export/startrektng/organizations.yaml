  global_id: ger_organization_4b324bf48825
  canonical_name: Duras Family Faction
  description: The Duras Family Faction challenges Gowron's leadership as the primary
    internal threat within Klingon politics. Their opposition leaves Gowron's flagship
    vulnerable, forcing reliance on Federation support from the USS Enterprise. Lursa,
    B'Etor, and Toral lead this antagonist group, exploiting leadership crises to
    seize power amid tensions with external forces like the Romulan Empire.
  sphere_of_influence: Klingon Internal Power Struggles
