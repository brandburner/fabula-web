- fabula_uuid: ger_organization_7fca39286fb2
  global_id: ger_organization_7fca39286fb2
  canonical_name: Ship's Children
  description: A shipboard cohort comprising the children raised aboard the vessel,
    Ship's Children function as an informal social and educational community that
    receives guardianship, schooling, and cultural integration from senior officers.
    Referenced as the placement destination for Bringloidi children, this group serves
    practical childcare, peer socialization, and assimilation into shipboard norms
    under ship authority and caregiver oversight.
  sphere_of_influence: Shipboard Childcare, Education, and Social Integration
  season_appearances:
