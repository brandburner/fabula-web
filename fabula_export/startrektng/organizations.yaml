  episode_count: 0
- fabula_uuid: ger_organization_c4c5475dc146
  global_id: ger_organization_c4c5475dc146
  canonical_name: The Law
  description: A diffuse institutional legal framework comprising statutes, courts,
    precedents, and recognized procedures that confers, refuses, or shapes personhood
    and enforceable rights. Characters plan to invoke it as a strategic 'legal fiction'
    to secure recognition of non‑flesh entities. It functions through counsel, filings,
    and adjudication, intersecting with private law firms, governmental polity, and
    military institutions to convert moral and philosophical claims into formal, enforceable
    status.
  sphere_of_influence: Legal and Judicial Authority (Personhood, Rights, and Institutional
    Recognition)
  season_appearances:
