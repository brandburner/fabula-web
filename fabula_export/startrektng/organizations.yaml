  global_id: ger_organization_126e1b0f9bc3
  canonical_name: Earth Station McKinley
  description: Riker reports Earth Station McKinley signals readiness to refit the
    Enterprise, linking it to Starfleet's post-Borg fleet repairs. Shelby reinforces
    its role as the designated site for the ship's overhaul, ensuring operational
    readiness. This station coordinates major logistical efforts, handling vessel
    refurbishment amid broader recovery operations.
