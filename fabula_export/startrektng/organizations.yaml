- fabula_uuid: ger_organization_9a8af9a7a00a
  global_id: ger_organization_9a8af9a7a00a
  canonical_name: The Q Continuum
  description: The Q Continuum embodies an omnipotent, godlike collective whose members
    possess limitless power and cosmic authority. It serves as the origin and source
    of the entity known as Q, who acts as a capricious antagonist challenging humanity
    and the USS Enterprise crew through existential trials and manipulations. This
    collective enforces cosmic wagers and moral tests, punishing defiance with harsh
    penalties such as banishment to a void-like penalty box. The Continuum's influence
    extends over the fabric of reality, offering and withdrawing godlike powers while
    fundamentally questioning human resilience, morality, and evolution.
  sphere_of_influence: Cosmic-Level Judicial and Social Governance over Omnipotent
    Entities (Q), including disciplinary enforcement and oversight of member conduct
