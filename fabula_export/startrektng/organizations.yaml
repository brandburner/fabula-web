  global_id: ger_organization_4655a703f2a0
  canonical_name: Team Seven (Propulsion Group)
  description: Team Seven functions as a specialized sub-team within the Galaxy-class
    propulsion group, credited on Dr. Leah Brahms' identification and embedded authorial
    metadata in starship design logs. The group appears responsible for detailed propulsion
    design, diagnostics, and authoring of subsystem schematics; it operates under
    broader engineering hierarchy and interfaces directly with shipboard engineering
    personnel and archived design voice-logs.
  sphere_of_influence: Starship Propulsion Engineering and Design (Shipboard Technical
    Sub-team)
  season_appearances:
