  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_51da0ba450d1
  global_id: ger_organization_51da0ba450d1
  canonical_name: Zakdorn (Federation Surplus Depot Operators)
  description: The Zakdorn operate a Federation surplus depot on Qualor Two, overseeing
    storage, distribution, and logistical support for excess Starfleet equipment (e.g.,
    deflector arrays, deuterium shipments). Their operations serve as a critical resource
    for Starfleet missions, including investigations into anomalies (e.g., USS Tripoli's
    disappearance) and covert activities tied to Romulan interests. Key personnel
    include Dokachin (quartermaster), who coordinates shipments and faces scrutiny
    for deception. The depot's activities are conducted under heightened security
    and surveillance pressures, particularly during time-sensitive objectives linked
    to Commander Riker's investigations and Captain Picard's covert work.
  sphere_of_influence: Federation Surplus Equipment Logistics
  season_appearances:
  - 5
  local_uuids:
    1: org_6d8e0d8a91f4
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a1ecbdbcc9e1
  global_id: ger_organization_a1ecbdbcc9e1
  canonical_name: Zakdorn Bureaucracy (Quartermaster Service)
  description: The Zakdorn Bureaucracy, operating through its **Quartermaster Service**,
    oversees administrative functions at facilities such as **Surplus Depot Zed-One-Five
    (Qualor Two)** in Klingon/Romulan-controlled space. This organization enforces
    rigid protocols, exemplified by **Klim Dokachin**, a Zakdorn quartermaster who
    embodies its bureaucratic rigidity by rejecting direct requests (e.g., from Commander
    Riker) for information on decommissioned vessels like the **Vulcan ship *T'Pau***
    without formal appointments. The bureaucracy acts as a gatekeeper, controlling
    access to restricted files, coordinates, and salvage operations, thereby creating
    operational delays and tensions for Starfleet officers. Its role extends to managing
    logistics in junkyards and salvage yards, where decaying vessels (e.g., *T'Pau*
    in **section 18-gamma-12**) are stored. The Zakdorn’s vanity, ego, and resistance
    to authority force Starfleet to navigate formal channels or employ alternative
    strategies (e.g., empathic negotiation by Counselor Troi) to bypass bureaucratic
    obstacles.
  sphere_of_influence: Surplus Depot Administration and Protocol Enforcement
  season_appearances:
  - 5
  local_uuids:
    1: org_9caf2520b193
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_45c4d269a784
  global_id: ger_organization_45c4d269a784
  canonical_name: Zalkonian Leadership (Zalkonians)
  description: The oppressive governing regime of Zalkon, led by Commander Sunad,
    which systematically persecutes and murders transfigurants to maintain power and
