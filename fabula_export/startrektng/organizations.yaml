- fabula_uuid: ger_organization_57c84720e88d
  global_id: ger_organization_57c84720e88d
  canonical_name: Romulan Warbird *Khazara* Crew (Commander Toreth's Command)
  description: The military crew of the Imperial Romulan Warbird *Khazara*, led by
    Commander Toreth, serves as the Romulan Star Empire's primary contingent aboard
    their vessel. The crew—including the Pilot, officers, and Sub-Commander N'Vek—enforces
    Toreth's authority by executing traitor N'Vek (a dramatic internal purge) and
    guarding captive Deanna Troi (posing as Tal Shiar operative Major Rakal). Their
    actions reflect institutional distrust of intelligence agencies (e.g., the Tal
    Shiar) and uphold shipboard hierarchy during a defection crisis, prioritizing
    command loyalty over mission secrecy. The crew's hierarchical structure and imperial
    discipline create tension during high-stakes maneuvers toward the Kaleb sector,
    particularly in their interactions with Troi and Tal Shiar operatives like Major
    Rakal.
  sphere_of_influence: Romulan Star Navy Shipboard Operations and Imperial Loyalty
    Enforcement
  season_appearances:
  - 6
  local_uuids:
    1: org_e37dd7591f87
  first_appearance_season: 6
