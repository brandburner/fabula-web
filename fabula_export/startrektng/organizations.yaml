- fabula_uuid: ger_organization_ea929c592ad4
  global_id: ger_organization_ea929c592ad4
  canonical_name: Ullian Delegation
  description: 'The Ullian Delegation (also referred to as ''the Ullians'') is a telepathic
    diplomatic group visiting the USS Enterprise, comprising three key members: **Tarmin**
    (leader), **Inad** (moderator), and **Jev** (conflicted member). They specialize
    in telepathic memory extraction and exploration, which they demonstrate through
    guided sessions (e.g., with Keiko O''Brien) and unauthorized probes (e.g., on
    Troi, Riker, and Crusher), sparking ethical debates and crew fascination. Internal
    divisions emerge: Tarmin aggressively pushes boundaries, while Jev publicly rebukes
    violations—later revealed to be a facade, as Jev secretly weaponizes telepathy
    to induce comas in crew members, framing Tarmin. Their planetary visits (e.g.,
    Hurada Three, Nel III) correlate with unexplained comas masked as Iresine Syndrome,
    transforming them from diplomatic guests into prime suspects. Tarmin admits the
    delegation’s history of ''memory rape,'' a practice Jev revived, culminating in
    moral confrontation and confinement to quarters by Picard.'
  sphere_of_influence: Telepathic Diplomacy and Memory Retrieval
  season_appearances:
