- fabula_uuid: ger_organization_0682a21a02ea
  global_id: ger_organization_0682a21a02ea
  canonical_name: State of Daled Four
  description: The State of Daled Four (commonly referenced as Daled Four) is a sovereign
    planetary polity represented in the episode by heir/envoy Salia and guardian Anya.
    It functions as an interstellar diplomatic actor with hereditary succession, ceremonial
    diplomatic privileges, and a protective retinue; its protocols and protective
    oversight generate formal friction with Starfleet personnel during contact and
    relocation operations.
  sphere_of_influence: Planetary Governance and Interstellar Diplomacy
  season_appearances:
