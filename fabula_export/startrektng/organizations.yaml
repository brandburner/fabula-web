  description: Hayseed leads Knight, Gunslinger, Flappers, and Man in the Grey Flannel
    Suit as a unified mob in the holodeck train's salon car. They block Data, Troi,
    and Worf from the engine room exit, with Hayseed declaring 'you ain’t goin nowhere.'
