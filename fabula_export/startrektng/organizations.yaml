  global_id: ger_organization_1a8e3637550c
  canonical_name: Stargazer (Starship)
  description: 'A Starfleet vessel invoked here as a matter of institutional memory:
    the Stargazer''s earlier court-martial operates as a cited legal precedent within
    military-legal deliberations. The ship functions as an operational command node
    with a clear chain of command; its disciplinary record now informs JAG reasoning
    and Starfleet definitions of duty, responsibility, and the legal status of contested
    persons.'
  sphere_of_influence: Starfleet Operational Command and Disciplinary Legal Precedent
