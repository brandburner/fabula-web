  global_id: ger_organization_76b68441ff6f
  canonical_name: Mordan IV Terrorists
  description: A desperate and lethal faction holding hostages on Mordan IV, refusing
    any negotiation except directly with Admiral Mark Jameson. Their violent brinkmanship
    drives the crisis, forcing high-stakes, personal negotiations that threaten lives
    and expose complex political and emotional tensions within the Federation command.
  sphere_of_influence: Hostage Crisis and Terrorist Activity on Mordan IV
