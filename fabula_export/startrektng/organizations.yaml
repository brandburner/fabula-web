  canonical_name: USS Hathaway
  description: USS Hathaway is a Federation/Starfleet vessel presented as an older,
    crippled ship central to a tactical simulation and rescue scenario. The ship houses
    roughly forty crewmembers and fields a skeleton bridge team; it lacks full offensive
    capability in the scenario and requires external support from USS Enterprise for
    rescue/towing and repairs. Narrative details describe emergency engineering attention
    to its archaic Avidyne engines, temporary transfer of command (Commander Riker
    in a trial command role), and narrative stakes including a coveted onboard secret
    and hostile interest. The consolidated description covers both the ship-as-platform
    and its status as a vulnerable strategic prize within the episode's crisis.
