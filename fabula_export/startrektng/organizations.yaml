  episode_count: 1
- fabula_uuid: ger_organization_c9a3b1ed7cde
  global_id: ger_organization_c9a3b1ed7cde
  canonical_name: Energy Beings of the FGC-47 Nebula
  description: Isabella represents these energy beings from the FGC-47 nebula. They
    dispatch her to judge humanity's threat level by observing adult restrictions
    on children, such as the Enterprise crew's limits on Clara. Deeming humans cruel,
    they drain the ship's energy through shield failures and flickering lights. Picard
    defends protective rules as care rooted in experience. Clara's friendship plea
    prompts Isabella's hesitation and dematerialization, easing the immediate threat
    but leaving instability.
  sphere_of_influence: Interstellar Civilization Assessment and Energy Disruption
