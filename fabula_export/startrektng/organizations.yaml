  canonical_name: Federation Colony on Rana IV
  description: A civilian settlement established under Federation auspices on the
    planet Rana IV, home to approximately 11,000 inhabitants. The colony functions
    as a local, nonmilitary community whose distress signal triggers external Starfleet
    intervention. In the presented material it operates as a victim community and
    the focal point of a rescue and investigation, with no internal command structure
    shown beyond communal identity.
  sphere_of_influence: Federated Colonial Civilian Community — Local civil society
