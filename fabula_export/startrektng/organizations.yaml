- fabula_uuid: ger_organization_a4c6af426790
  global_id: ger_organization_a4c6af426790
  canonical_name: Nenebek
  description: Dirgo pilots the modified Nenebek shuttlecraft, which crashes on Lambda
    Paz and strands survivors. He asserts captaincy over its wreckage, source of vital
    supplies, sparking clashes with Picard. Wesley backs Picard, exposing Dirgo's
    instability. The shuttle's failure drives the group's desert survival efforts
    and fragile command structure.
  sphere_of_influence: Civilian Shuttlecraft Transport and Salvage
  season_appearances:
  - 4
  local_uuids:
