- fabula_uuid: ger_organization_b0717df1322f
  global_id: ger_organization_b0717df1322f
  canonical_name: Government of Mariposa (Mariposa polity)
  description: Mariposa functions as the planetary polity whose governmental authority
    is exercised publicly through the Government of Mariposa, diplomatically represented
    by Prime Minister Wilson Granger. In the processed material the polity initiates
    formal diplomatic contact with the USS Enterprise, issues invitations and protocols
    for visitation, and convenes a high‑level meeting in which population-level biological
    facts (cloning) drive an ethical, political and public-health crisis. This consolidated
    entity represents the same sovereign planetary government described across sources.
  sphere_of_influence: Planetary Governance and Interstellar Diplomacy
  season_appearances:
  - 2
  local_uuids:
    1: organization_66531067a243
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c71818de53e6
  global_id: ger_organization_c71818de53e6
  canonical_name: Governments of Seven Other Worlds
  description: Picard states the mercenaries face charges from about seven other worlds.
    These planetary governments assert legal jurisdiction over the mercenaries' actions
    in the undercover mission. They coordinate post-mission prosecutions, amplifying
    political repercussions. Their involvement enforces accountability across interstellar
    borders, targeting Satok and associates after mission resolution. This collective
    action binds the operation to broader legal frameworks beyond Federation oversight.
  sphere_of_influence: Multi-Planetary Judicial Prosecution
  season_appearances:
  - 7
  local_uuids:
    1: org_7edf455b7888
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_54617e8e8140
  global_id: ger_organization_54617e8e8140
  canonical_name: Gowron's Faction
  description: Gowron's faction claims one of the Klingons killed in the bombing.
    Beverly identifies this victim as separate from the Duras-aligned suicide bomber
    whose implanted explosive caused the blast. The distinction underscores Gowron's
    group as political rivals targeted in the violent contest over K'mpec's succession.
    Riker learns this amid rising evidence of factional betrayal within Klingon ranks.
  sphere_of_influence: Klingon Succession Politics
  season_appearances:
  - 4
  local_uuids:
    1: org_d41babdcb59a
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b738b90e9f65
  global_id: ger_organization_b738b90e9f65
  canonical_name: Groppler's People
  description: Groppler's People comprise the inhabitants associated with Farpoint
    Station, living under the leadership of Groppler Zorn. They are deeply affected
    by the exploitation at Farpoint and the entity’s attacks connected to the imprisoned
    lifeform beneath the station. Their plight highlights themes of captivity, suffering,
    and the struggle for dignity amid external interference and moral reckoning.
  sphere_of_influence: Farpoint Station Local Population and Socio-Political Dynamics
  season_appearances:
  - 1
  local_uuids:
    1: organization_1afffa70c40e
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c87621b472dd
  global_id: ger_organization_c87621b472dd
  canonical_name: Guardians of Boreth
  description: A secretive Klingon religious order known as the **Guardians of Boreth**,
    composed of members such as Koroth and Torin. This group waited centuries for
    Kahless's return, believing his presence was essential to restore faith, honor,
    and unity to the Klingon Empire amid political chaos. In a desperate bid to fulfill
    prophecy, they cloned Kahless's body, implanted authentic memories, and deployed
    him as a messiah figure. Their deception was justified as a necessary means to
    preserve Klingon honor and hope during a crisis. The scheme was ultimately exposed
    when Koroth confessed the truth after Kahless's defeat in a ritual duel, revealing
    the manipulative nature of their actions.
  sphere_of_influence: Klingon Empire Spiritual Revival and Unification
  season_appearances:
  - 6
  local_uuids:
    1: org_fba47544cccc
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_197c0eafac43
  global_id: ger_organization_197c0eafac43
  canonical_name: Guests of the Royale
  description: A collective of the Royale's inhabitants—patrons, apparent staff, and
    scripted participants—who enact the hotel's social rituals and function as primary
    information nodes for investigative teams. They answer with automated civility
    that operates as procedural language and, at times, an entrapment mechanism. Their
    speech and behavior follow embedded protocols tied to the hotel's control systems,
    making them both sources of clues and components of the construct's coercive logic.
  sphere_of_influence: Constructed hospitality social control and scripted interaction
    within the Royale (localized information control and ritualized engagement)
  season_appearances:
  - 2
  local_uuids:
    1: organization_7a1ab858d26c
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_9fb6c1e00cca
  global_id: ger_organization_9fb6c1e00cca
  canonical_name: Haakona (Romulan Cruiser)
  description: 'The Haakona is a named Romulan Star Empire warship commanded by Sub‑Commander
    Taris. In the current material it acts as an antagonistic military vessel: cloaking
    and uncloaking near a contested sector, hailing the USS Enterprise with threats,
    and engaging in tactical action (including firing on a planet‑launched probe).
    Its command structure centers on Taris, and it operates as a forward instrument
    of Romulan border posture and tactical enforcement.'
  sphere_of_influence: Romulan Military Naval Operations; Neutral Zone Border Enforcement
    and Tactical Engagement
  season_appearances:
  - 2
  local_uuids:
    1: organization_fb640af4fd2f
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1101600eb45b
  global_id: ger_organization_1101600eb45b
  canonical_name: Hall of Records
  description: The Hall of Records serves as a 19th-century San Francisco institution
    housing geological, mining, and historical archives accessible for public inquiries.
    Data visits it to probe records on local mining operations and technological developments,
    actions Clemens tracks and cites as proof of anomalous future knowledge. These
    inquiries fuel Clemens' accusations of timeline interference, positioning the
    Hall as a key node in his investigative chain linking Data's movements across
    era-specific sites.
  sphere_of_influence: 19th-Century Municipal Historical and Geological Records
  season_appearances:
  - 6
  local_uuids:
    1: org_bd5e04795baa
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e8aa4e21bde4
  global_id: ger_organization_e8aa4e21bde4
  canonical_name: Hekaran Government
  description: The Hekaran Government governs the Hekaras system, including Hekaras
    Two. Riker contacts them during the USS Fleming investigation; they confirm only
    a Ferengi trader passed through recently, ruling out local encounters and directing
    suspicion elsewhere. Their traffic records aid Starfleet's search in the hazardous
    Hekaras Corridor.
  sphere_of_influence: Hekaras System Governance and Traffic Oversight
  season_appearances:
  - 7
  local_uuids:
    1: org_070904580837
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b3f47865e2c2
  global_id: ger_organization_b3f47865e2c2
  canonical_name: Hekaran Scientific Research Group
  description: 'A group of Hekaran scientists, led by Serova and her brother Rabal,
    who investigate the destabilizing effects of warp fields on subspace, which they
    believe trigger catastrophic gravitational shifts threatening their homeworld,
    Hekaras. Their research is initially discredited but gains validation through
    extreme measures: Serova deliberately overloads the *Fleming*''s warp core, creating
    a subspace rift that traps the ship and costs her life. This radical act—while
    proving their theory—exposes ethical rifts within the group and draws the attention
    of Starfleet, including the *Enterprise*, which intervenes to rescue the trapped
    crew. The group''s methods and leadership are marked by controversy, grief (particularly
    for Rabal), and a desperate urgency to save their planet.'
  sphere_of_influence: Warp Drive Subspace Research and Planetary Crisis Intervention
  season_appearances:
  - 7
  local_uuids:
    1: org_54b76913134f
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_063d34d85187
  global_id: ger_organization_063d34d85187
  canonical_name: Hekaras Two
  description: Rabal represents Hekaras Two, the region's sole inhabited world, where
    leaders push Starfleet to ban warp travel in the Corridor to halt subspace damage.
    Residents stand ready to scrap warp drive entirely, accepting Federation isolation
    to enforce safety. This conviction drives Serova and Rabal's defiance of Enterprise
    protocols, prioritizing planetary survival over interstellar ties.
