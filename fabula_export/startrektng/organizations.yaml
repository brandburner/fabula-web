- fabula_uuid: ger_organization_3e315ba86008
  global_id: ger_organization_3e315ba86008
  canonical_name: Ligonian Delegation
  description: The Ligonian Delegation serves as the official diplomatic representation
    of Ligon II, led by Lutan and accompanied by his guards and advisor Hagon. This
    delegation engages in tense negotiations and cultural exchanges with Starfleet,
    embodying Ligonian customs and political interests while navigating complex interpersonal
    and diplomatic conflicts that intertwine honor, cultural codes, and emerging personal
    obsessions.
  sphere_of_influence: Galactic Diplomacy and Cultural Relations
  season_appearances:
