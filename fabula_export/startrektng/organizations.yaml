  global_id: ger_organization_7d3d177ca9fa
  canonical_name: Caldonian Delegation
  description: A sovereign diplomatic mission representing the state of Caldonia within
    multilateral negotiations. The delegation functions as Caldonia's formal negotiating
    body, led by delegate Leyor, empowered to cast votes and transfer sovereign assets.
    In the processed material it abruptly withdraws from proceedings and legally transfers
    its contested Trillium 323 to the Chrysalians, upending Federation leverage.
  sphere_of_influence: Interstellar Diplomacy and Sovereign Resource Control
