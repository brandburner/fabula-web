  description: A *political faction* within the Klingon Empire, distinct from military
    ranks. This group opposes modernist loyalists and is central to the civil war
    narrative in *Rightful Heir*, deploying a warship in an orbital standoff. Their
    ideology is tied to Kahless’s return and the Empire’s unity crisis.
