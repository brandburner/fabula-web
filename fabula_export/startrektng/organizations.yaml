  global_id: ger_organization_eaecdcd9ccf1
  canonical_name: Ferengi Pirates (Salvage Alliance)
  description: Rogue Ferengi faction led by Daimon Lurin, operating *independently*
    of the Ferengi Alliance. Their actions—including the seizure of the *USS Enterprise*—are
    *explicitly disavowed* by the official Ferengi government, confirming their status
    as outlaws.
  sphere_of_influence: Interstellar Piracy and Starship Salvage
