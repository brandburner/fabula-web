  global_id: ger_organization_fe18112394b6
  canonical_name: Klingon Cruiser P'rang
  description: Klingon Cruiser P'rang operates as a Klingon Defense Force warship
    dispatched to perform escort, containment, and repatriation duties. In the current
    material it is named as the arriving escort that will accompany the surrendered
    vessel T'Ong home. The cruiser functions under Klingon hierarchical command aboard
    a battlecruiser, employs a mix of ceremonial authority and coercive naval posture,
    and coordinates with Klingon officers (notably Worf and K'Ehleyr) and Starfleet
    actors to enforce custody and safe passage.
  sphere_of_influence: Klingon military naval operations; regional escort, containment,
