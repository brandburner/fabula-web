- fabula_uuid: ger_organization_da6ec4b7965f
  global_id: ger_organization_da6ec4b7965f
  canonical_name: Shipboard Security (Starship Security Department)
  description: A shipboard security department responsible for preserving order aboard
    a starship. Charged with removing unauthorized intruders, enforcing command decisions,
    and executing defensive and administrative measures as directed by senior officers.
    Operates as a hierarchical department embedded in ship operations and bridge security,
    coordinating with command staff and tactical personnel; answers crew and passenger
    alerts, dispatches uniformed guards to investigate disturbances, and prioritizes
    rapid containment and physical intervention. In the current material a responding
    guard is knocked unconscious during a passenger-provoked altercation, highlighting
    their role as both a stabilizing presence and a potential point of escalation.
  sphere_of_influence: Shipboard Law Enforcement and Tactical Security Operations
