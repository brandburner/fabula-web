- fabula_uuid: ger_organization_39017d2eeff6
  global_id: ger_organization_39017d2eeff6
  canonical_name: Sikla Medical Facility
  description: Sikla Medical Facility functions as a hospital on Malcor III where
    doctors treat patients including the injured Federation officer Commander Riker.
    Doctor Berel refuses Security Minister Krola's order to revive Riker prematurely
    for interrogation, citing his medical oath. Medical staff prioritize ethical standards
    over political demands, making the facility a focal point for clashes between
    healthcare principles and governmental authority.
  sphere_of_influence: Malcorian Medical Healthcare
  season_appearances:
