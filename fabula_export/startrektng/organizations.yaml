- fabula_uuid: ger_organization_eae4cc178f86
  global_id: ger_organization_eae4cc178f86
  canonical_name: Kataan Council (Leadership)
  description: The governing body of the planet Kataan during its ecological crisis,
    known as the **Kataan Council** or **Kataan Leadership**. This institution is
    represented by the **Administrator**, who engages with citizens like **Kamin**—a
    scientist tracking solar movements with a sextant—to address the planet's impending
    supernova. The Council's policies are shaped by a **secret two-year-old plan**
    to mitigate the crisis, though they withhold details from the public to prevent
    societal collapse. Their actions generate institutional pressure, positioning
    them as either allies or obstacles to local efforts like evacuation or preservation
    initiatives.
  sphere_of_influence: Planetary Governance and Ecological Crisis Management
