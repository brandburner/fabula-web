- fabula_uuid: ger_organization_66db7994a7b1
  global_id: ger_organization_66db7994a7b1
  canonical_name: The Overseer (the Picard)
  description: 'A mythic cultural and ideological authority invoked by community members
    to demand punishment and enforce social conformity. The Overseer functions as
    a vague but powerful exemplum rather than a formal institution: speakers summon
    its name to justify immediate retribution, to stoke fear, and to pressure leaders
    into decisive action. Its ''operations'' consist of ritualized accusation, moral
    leverage, and the threat of collective sanction. The Overseer shapes decision-making,
    fractures leadership coalitions, and acts as an ideological antagonist without
    a visible hierarchy or physical agents in the current material.'
  sphere_of_influence: Cultural and Ideological Authority / Social Control and Communal
    Justice
  season_appearances:
  - 3
  local_uuids:
