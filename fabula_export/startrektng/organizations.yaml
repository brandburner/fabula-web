  canonical_name: The Troi Entourage
  description: The Troi Entourage functions as a personal retinue and supporting party
    accompanying Mrs. Deanna Troi during shipboard diplomatic and social engagements.
    On-screen they arrive with her on the transporter pad, remain present during a
    high-stakes exposure of hooded Antedians, and act as allied companions (including
    attendants such as Homn). No formal hierarchy, mandate, or institutional structure
    is shown; their purpose is personal accompaniment, social support, and representation
    alongside the dignitary they escort.
