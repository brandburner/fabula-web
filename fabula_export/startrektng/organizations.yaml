  episode_count: 0
- fabula_uuid: ger_organization_0881a8f60f79
  global_id: ger_organization_0881a8f60f79
  canonical_name: Melona Colony
  description: Melona Colony operates as a Federation civilian settlement on a frontier
    planet, housing colonists who face annihilation from the Crystalline Entity's
    energy beam. The attack reduces structures to dust and exposes skeletal remains,
    forcing survivors including Riker, Beverly Crusher, and Carmen Davila into a cave
    refuge with dwindling air. This devastation propels the Enterprise to warp nine,
    positioning the colony as the crisis epicenter and catalyst for the crew's pursuit
    of the Entity.
  sphere_of_influence: Federation Colonial Settlement
  season_appearances:
  - 5
  local_uuids:
    1: org_4636fad5338e
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b43f25cfe26e
  global_id: ger_organization_b43f25cfe26e
  canonical_name: Melthusian Captains
  description: Melthusian Captains command vessels that probe hazardous space regions.
    Bela Tyken, one such captain, first detected the Tyken’s Rift, a energy-draining
    spatial anomaly disrupting sleep and ship functions. He named it and logged details
    on its effects plus an escape method involving a controlled anicium-yurium explosion.
    Enterprise crew accesses these logs for insights, though they lack resources to
    apply the solution.
  sphere_of_influence: Deep Space Exploration and Anomaly Documentation
  season_appearances:
  - 4
  local_uuids:
