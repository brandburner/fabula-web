- fabula_uuid: ger_organization_8e73707aeac7
  global_id: ger_organization_8e73707aeac7
  canonical_name: Native American Tribal Council of Dorvan V
  description: The Native American Tribal Council of Dorvan V leads a community of
    relocated Native Americans who claim the planet as their sacred homeland, the
    first world to welcome them after Earth's betrayals and historical displacements.
    Anthwara heads the council, with Wakasa voicing sharp challenges. They reject
    Starfleet's offers of alternative worlds, prompted by Cardassian territorial demands,
    during tense Enterprise negotiations with Picard and Troi. Their stance fuses
    spiritual conviction—Dorvan V chose them—with outright defiance of Federation
    orders, escalating conflict over cultural survival versus interstellar treaty
    obligations.
  sphere_of_influence: Tribal Governance and Indigenous Spiritual Sovereignty
