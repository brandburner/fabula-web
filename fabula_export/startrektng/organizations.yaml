  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_fb4671d8a194
  global_id: ger_organization_fb4671d8a194
  canonical_name: The Royale Hotel
  description: The Royale Hotel is a deliberately curated, self-contained hospitality
    environment that stages a simulated Vegas experience while functioning as an engineered
    containment and narrative-manipulation system. It preserves and stages frozen
    set pieces and long-preserved human remains (notably a preserved corpse in an
    American spacesuit), operates via scripted staff and rehearsed inhabitants, severs
    or interferes with external communications, and uses architectural/ritual mechanisms
    to disarm, confuse, and entrap visiting parties.
  sphere_of_influence: Simulated Hospitality Environment, Containment, and Narrative
    Control
  season_appearances:
  - 2
  local_uuids:
