- fabula_uuid: ger_organization_30856793d213
  global_id: ger_organization_30856793d213
  canonical_name: Stargazer Court‑Martial Prosecution Panel
  description: A Starfleet-appointed military prosecution team convened to try officers
    in the Stargazer court-martial. Functioning as the adversarial legal body, the
    panel assembled senior legal officers and prosecutors who pressed Captain Jean‑Luc
    Picard relentlessly over a multi-day proceeding. They operate under Starfleet's
    judicial framework, wield institutional authority to pursue disciplinary outcomes,
    shape career trajectories, and enforce compliance with military law. In the current
    material they serve primarily as a source of past legal trauma and institutional
    pressure that informs Picard's tactical and moral decisions regarding later disputes
    over Data's status.
  sphere_of_influence: Military Judicial Prosecution and Court‑Martial Proceedings
    within Starfleet
  season_appearances:
  - 2
  local_uuids:
    1: organization_44958fab7cd7
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_ab15415be6b1
  global_id: ger_organization_ab15415be6b1
  canonical_name: Starship (the Ship)
  description: A shipboard governing authority that defines and enforces official
    systems, protocols, and conduct aboard the vessel. It operates through a clear
    chain of command centered on the ship's captain, who authoritatively controls
    access to communications consoles and institutional resources. The organization
    balances procedural enforcement with onboard welfare, intervening in disputes,
    limiting personal use of official systems, and shaping moral and social norms
    among passengers and crew through both rulemaking and discretionary, compassionate
    leadership.
  sphere_of_influence: Shipboard Governance and Authority — enforcement of onboard
    protocols, resource access control, and command-based social order
  season_appearances:
