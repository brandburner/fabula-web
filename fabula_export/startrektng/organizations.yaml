  global_id: ger_organization_6bc26dd41e41
  canonical_name: Space Bureau (Malcor III)
  description: The Space Bureau (Malcor III) directs Malcor III's scientific and exploratory
    efforts. Mirasta Yale holds the position of Minister and drives first contact
    with the Federation. This organization channels diplomatic exchanges during the
    crisis sparked by Riker's exposure, overriding Chancellor's routines and forcing
    high-level engagement with Picard. It anchors Malcor's response to interstellar
    visitors amid political fragility.
  sphere_of_influence: Scientific Exploration and First Contact Diplomacy
