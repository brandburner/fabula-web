  episode_count: 0
- fabula_uuid: ger_organization_05b002a89e1a
  global_id: ger_organization_05b002a89e1a
  canonical_name: Ship Security Personnel
  description: A disciplined shipboard security detachment responsible for protecting
    the crew, enforcing duty-of-care and Starfleet procedure, and containing onboard
    threats. Under bridge command they move to full alert to execute shipwide lockdowns,
    seal shuttlebays, and disable transporters and turbolifts. They secure corridors
    and sensitive spaces, provide physical intervention during breaches, and coordinate
    with command, engineering, and medical teams as the vessel's primary tactical
    containment and emergency response force.
  sphere_of_influence: Shipboard Security and Tactical Containment (Starfleet vessel
    operations)
  season_appearances:
  - 3
  local_uuids:
    1: organization_157b03dfe3f4
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_adfdc9a6c4d6
  global_id: ger_organization_adfdc9a6c4d6
  canonical_name: Ship Security Team
  description: Ship Security Team functions as the starship's onboard law‑enforcement
    and force‑protection unit, tasked with guarding detainees, securing sensitive
    compartments (notably the transporter room), and containing violent threats. During
    the transporter breakout they confront fugitive Roga Danar, employ phaser fire,
    and execute coordinated close‑quarters restraint alongside senior bridge officers
    (Riker, Worf). Their visible methods combine ranged stun weapons, physical takedown,
    and ad hoc team tacklings, operating under ship command authority to enforce containment
    and shipboard order.
  sphere_of_influence: Shipboard Security and Law Enforcement (Force Protection, Detention,
    and Tactical Containment)
  season_appearances:
  - 3
  local_uuids:
