- fabula_uuid: ger_organization_f437cc944865
  global_id: ger_organization_f437cc944865
  canonical_name: Klingon Homeworld
  description: K'mtar urges the Enterprise crew to travel to the Klingon homeworld
    to secure additional evidence tied to the assassination attempt on Worf and the
    disputed Duras dagger. This site holds records or resources that could confirm
    Lursa and B'Etor's involvement or expose the plot's true origins, including details
    on Lursa's pregnancy known only to her sister. K'mtar positions the homeworld
    as essential for resolving suspicions around his own distractions and the sisters'
    denials, highlighting its role as a hub for authoritative Klingon investigative
    materials amid political intrigue.
