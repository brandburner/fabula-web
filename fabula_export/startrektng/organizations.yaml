- fabula_uuid: ger_organization_d66f699f5f94
  global_id: ger_organization_d66f699f5f94
  canonical_name: Medical Staff
  description: Berel directs the Medical Staff to administer calmatives that silence
    Nilrem after his outburst about Riker. They enforce a full lockdown of the medical
    wing, post 24/7 security guards, and conduct searches of medical records to verify
    patient identities. Their actions support Berel's efforts to conceal treatment
    of alien patients like Riker and Crusher, shielding the facility from reputational
    damage amid rising xenophobia.
  sphere_of_influence: Medical Facility Operations and Containment
  season_appearances:
