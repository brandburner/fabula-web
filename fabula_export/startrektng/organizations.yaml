  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_333a484b5320
  global_id: ger_organization_333a484b5320
  canonical_name: Government of Barzan
  description: The Government of Barzan is the planetary polity represented by Premier
    Bhavani in the episode. It claims ownership of a newly visible Barzan Wormhole
    and treats that wormhole as a negotiable strategic asset, deploying diplomatic
    theatre and official envoys to bargain its terms. The government operates through
    a premier-level executive and engages external negotiators and political theatre
    to extract value, making it a focal point of interstellar contention.
  sphere_of_influence: Interstellar Diplomacy and Strategic Asset Control (Planetary
    Governance over a Wormhole)
  season_appearances:
  - 3
  local_uuids:
    1: organization_a5e7c406bce2
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_b47917f8c497
  global_id: ger_organization_b47917f8c497
  canonical_name: Government of Betazed
  description: The Government of Betazed is the planet's formal political authority
    that issues diplomatic mandates, claims entitlement for accredited representatives
    (including Lwaxana Troi), and dispatches envoys to interstellar conferences. It
    operates through official channels that shape protocol, personnel deployment,
    and Betazoid participation in regional political forums.
  sphere_of_influence: Interstellar Diplomacy and Planetary Governance
  season_appearances:
  - 2
  - 3
  - 7
  local_uuids:
