  global_id: ger_organization_96e41b12d78f
  canonical_name: Former Tilonian Government
  description: 'Government of **Tilonus Four**, collapsed due to the assassination
    of its Prime Minister, leading to planetary anarchy and stranding of a Federation
    research team. Central to *Star Trek: TNG* S6E21 (''Frame of Mind'').'
  sphere_of_influence: Planetary Governance on Tilonus Four
