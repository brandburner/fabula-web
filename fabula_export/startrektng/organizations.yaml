- fabula_uuid: ger_organization_c704cf49f76a
  global_id: ger_organization_c704cf49f76a
  canonical_name: Sheliak
  description: Sheliak operates as a rigid, treaty‑enforcing alien corporate authority
    that leverages legalistic strictures and uncompromising ultimatums to extract
    compliance from other polities. In the current material they press a binding treaty
    claim against the Federation, act as negotiating adversaries, and apply diplomatic
    and contractual pressure that forces technical and ethical gambits. Their methods
    emphasize formalism, corporate hierarchy, and inhuman consistency rather than
    conciliatory politics; they function as an antagonist whose presence reshapes
    strategic and engineering priorities.
  sphere_of_influence: Interstellar Treaty Enforcement and Corporate Diplomacy
  season_appearances:
  - 3
  local_uuids:
    1: organization_c6695ca4ffa0
  first_appearance_season: 3
