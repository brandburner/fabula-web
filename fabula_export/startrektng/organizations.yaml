  canonical_name: N.D. Crewmembers
  description: A loosely defined contingent of shipboard personnel labeled in production
    as 'N.D. Crewmembers.' They function as background social and operational support
    aboard the vessel, appearing in Ten-Forward as ambient presence, witnesses, and
    occasional auxiliary personnel. They express collective preferences (for example,
    favoring the viewport), stand by during scene-specific activities, and exhibit
    no shown hierarchy or formal command structure.
