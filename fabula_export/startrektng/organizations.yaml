- fabula_uuid: ger_organization_c37cd07dcedb
  global_id: ger_organization_c37cd07dcedb
  canonical_name: Ferengi Government (Ferengi Alliance)
  description: 'The Ferengi Government (also referred to as ''Ferengi Authorities'')
    serves as the central governing and law enforcement body of the Ferengi civilization,
    responsible for enforcing the Rules of Acquisition and maintaining systemic profit-driven
    norms. It functions as both a bureaucratic entity (handling inquiries about ranks/authority)
    and a disciplinary arm (punishing rogue actions). In *Star Trek: The Next Generation*
    (e.g., ''Bloodlines''), the government''s internal debates over amendments to
    the Rules of Acquisition create bureaucratic delays, while its law enforcement
    branch (''Authorities'') acts as a unifying force that suppresses individualistic
    disruptions (e.g., Daimon Bok''s vengeance). The government''s structure is revealed
    through Picard''s attempts to verify Bok''s authority and the crew''s fear of
    Authority intervention, which compels compliance with profit motives.'
  sphere_of_influence: Ferengi Official Authority Verification and Rule-Making Bureaucracy
