- fabula_uuid: ger_organization_ebc0a433a231
  global_id: ger_organization_ebc0a433a231
  canonical_name: Tyken's Rift
  description: Tyken's Rift traps the Enterprise crew in an anomalous cosmic void
    that absorbs deflector array energy, blocking escape attempts. It manifests psychological
    torment as a hallucinatory space targeting Deanna Troi's empathic vulnerabilities,
    where a disembodied voice taunts her with warnings of 'eyes in the dark' and 'one
    moon circles.' This assault foreshadows the crew's descent into madness, positioning
    the Rift as their primary antagonist amid deepening isolation.
  sphere_of_influence: Cosmic Trapping and Psychological Assault
