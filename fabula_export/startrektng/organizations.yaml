- fabula_uuid: ger_organization_75c49f728550
  global_id: ger_organization_75c49f728550
  canonical_name: Koinonian Archaeological Survey Team
  description: A small expeditionary corps of archaeologists tasked with surveying
    the scarred Koinonian world, identifying cultural markings, cataloging surface
    features, and producing field reports. They operate as a modular field research
    unit with principal investigators and away-team operatives, relying on orbital
    imagery and on-site surveys. In the current material they supply the primary on-scene
    data that prompts Starfleet's emergency extraction and medical response, and they
    maintain an informational channel to bridge command.
  sphere_of_influence: Expeditionary Archaeological Field Research and Cultural Survey;
    Scientific Data Provision for Starfleet Operations
  season_appearances:
