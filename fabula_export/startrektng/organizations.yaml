  episode_count: 1
- fabula_uuid: ger_organization_e610d71d0957
  global_id: ger_organization_e610d71d0957
  canonical_name: Robin Hood's Merry Men
  description: 'Q transports Picard and senior crew into Sherwood Forest costumes,
    assigning them roles as Robin Hood''s Merry Men: Picard leads as Robin Hood, Riker
    as Little John, Worf as Will Scarlett (initially resisting), Geordi as Alan-a-Dale,
    Data as Friar Tuck. The group evades Sir Guy''s ambush, with Worf injured in defense,
    then waits in the forest to support Vash''s rescue amid Q''s deadly game. Their
    coerced structure tests Picard''s command and loyalties.'
  sphere_of_influence: Simulated Medieval Outlaw Resistance
  season_appearances:
  - 4
