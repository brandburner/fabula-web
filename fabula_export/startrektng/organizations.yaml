  first_appearance_season: 6
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_7c4f04368f90
  global_id: ger_organization_7c4f04368f90
  canonical_name: Zakdorn
  description: The Zakdorn constitute a cultural and species faction defined by rigorous
    strategic doctrine and ritualized tests of intellectual and command superiority.
    They dispatch master strategists — exemplified by Sirna Kolrami — to observe,
    critique, and stage competitive gauntlets that assess opponents’ tactical imagination
    and moral resolve. Zakdorn methods emphasize cold analytical evaluation, public
    challenge, and time‑limited trials that expose perceived weaknesses and assert
    cultural primacy in interstellar contests.
  sphere_of_influence: Interstellar Strategic Culture and Tactical Competition; cultural
    adjudication of leadership and warfare strategy
  season_appearances:
  - 2
  local_uuids:
