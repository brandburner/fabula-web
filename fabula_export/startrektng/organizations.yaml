  episode_count: 1
- fabula_uuid: ger_organization_5991cf9bd0de
  global_id: ger_organization_5991cf9bd0de
  canonical_name: Takara
  description: Jo'Bril, Takaran scientist, fakes death via physio-stasis—cellular
    control mimicking demise—to steal Reyga's metaphasic shield prototype during shuttle
    autopsy. He sabotages the experiment to discredit Reyga, then plans to deliver
    the device to Takara for weaponization. This benefits his homeworld, positioning
    Takara as motive force behind the betrayal amid Beverly Crusher's shuttle confrontation
    near the sun's corona.
  sphere_of_influence: Technological Theft and Planetary Weapon Development
  season_appearances:
