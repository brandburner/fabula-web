  global_id: ger_organization_ded00432b225
  canonical_name: French Uniformed Animal Soldiers
  description: A hostile militia composed of animal soldiers clad in French revolutionary-era
    uniforms, armed with muskets and bayonets. They launch a brutal ambush against
    the Enterprise bridge crew in a desert environment, serving as antagonistic forces
    that provoke significant casualties and catalyze a dramatic power escalation in
    Commander Riker.
  sphere_of_influence: Hostile Military Operations
