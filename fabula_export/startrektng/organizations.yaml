  episode_count: 2
- fabula_uuid: ger_organization_9774506e823a
  global_id: ger_organization_9774506e823a
  canonical_name: Romulan High Command
  description: Romulan High Command directs warbird deployments to locate and salvage
    USS Pegasus debris in the Devolin system, aiming to exploit the ship's advanced
    technology. Pressman reveals a Starfleet Intelligence operative embedded within
    the command who leaked details of the salvage operation, alerting Enterprise to
    the Romulans' active search. This hierarchical body commands military assets and
    maintains internal intelligence networks, positioning it as the primary antagonist
    fueling the mission's urgency through covert recovery efforts.
  sphere_of_influence: Romulan Political-Military Governance and Internal Security
    (personnel control, censorship, strategic oversight)
  season_appearances:
