- fabula_uuid: ger_organization_38a7ae72b33f
  global_id: ger_organization_38a7ae72b33f
  canonical_name: Prosecution (Legal Party)
  description: The Prosecution functions as the formal legal party arguing that Data
    constitutes property rather than a person. Represented in the hearing by Riker
    and Maddox, the group marshals evidence, stages forensic demonstrations (including
    structural tests and tactile inspections), and pursues an adversarial courtroom
    strategy that reduces Data to engineered components. Operating within judicial
    procedures, the Prosecution directly opposes the Defense and Starfleet advocates,
    exerts coercive rhetorical and demonstrative pressure on witnesses, and acts as
    the primary antagonistic force driving the trial's moral and procedural stakes.
  sphere_of_influence: Judicial Prosecution and Courtroom Advocacy in Civil/Property
    Litigation
  season_appearances:
