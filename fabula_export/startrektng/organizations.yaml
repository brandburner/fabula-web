  global_id: ger_organization_da9ea7963d7b
  canonical_name: Unspecified Alien Faction
  description: Hostile aliens detect a vulnerability in the Enterprise's defenses
    and activate transporters to beam aboard, materializing in Main Engineering to
    target the warp core. They bypass raised shields amid systems failure, prompt
    red alert, security teams, and crew scramble from bridge to engineering. Their
    precise strike escalates the subspace rift crisis into direct shipboard combat,
    positioning them as strategic saboteurs with advanced intrusion tech.
  sphere_of_influence: Intraship Boarding and Critical Systems Sabotage
