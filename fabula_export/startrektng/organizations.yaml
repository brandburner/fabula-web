- fabula_uuid: ger_organization_9c83be33e6a0
  global_id: ger_organization_9c83be33e6a0
  canonical_name: Duras's Faction
  description: |-
    Duras's Faction is a Klingon political faction led by Duras, actively engaged in the violent Klingon Rite of Succession following K'mpec's death. They employ calculated acts of sabotage and assassination to undermine rivals and advance Duras's power grab. Key tactics include:
      1. **Sabotage**: Triggering explosions (e.g., in K'mpec's quarters during the Rite of Succession ceremony) to derail legitimate proceedings and inflame hostilities between rival factions (e.g., Duras vs. Gowron).
      2. **Assassination**: Deploying surgically implanted suicide bombers (e.g., forearm-wound bombers uncovered by Beverly Crusher via dynascans) to eliminate Klingon delegates and implicate Duras in the violence, blending Klingon honor suicides with precise surgical tactics.
      Their actions systematically undermine the legitimacy of the succession process, escalate political tensions, and position Duras as a dominant (if controversial) figure in the power struggle.
  sphere_of_influence: Klingon Internal Political Power, Covert Enforcement, and Familial
    Loyalties
