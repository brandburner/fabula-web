- fabula_uuid: ger_organization_768d01981bcc
  global_id: ger_organization_768d01981bcc
  canonical_name: Kelsey's Terrorist Cell (Enterprise Saboteurs)
  description: A ruthless terrorist cell led by Kelsey, hijacking the *USS Enterprise-D*
    during a baryon sweep evacuation under the guise of technical crew. The group—comprising
    Kelsey, Kiros (her enforcer), Neil, Pomet, Satler, Devor, Orton, and the Waiter—systematically
    disabled critical systems by severing fiber-optic cables in ODN junction boxes,
    wielding laser-welders, and bypassing the magnetic containment conduit. Their
    primary objective was to steal trilithium resin for destructive purposes, despite
    exposure risks and escalating threats. Key events include Satler's death during
    a confrontation with Picard in a Jefferies tube, the sabotage of a field diverter,
    Neil's execution by Kiros, and the group's relocation of the resin to Ten Forward
    after Picard's identity was unmasked. The cell operates with a clear hierarchy,
    prioritizes profit over ideology, and demonstrates ruthless efficiency, including
    holding crew hostage and executing their own members to protect the operation.
  sphere_of_influence: Starship Sabotage and Trilithium Theft
  season_appearances:
