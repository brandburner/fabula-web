  global_id: ger_organization_f2c62ea1e6ea
  canonical_name: T'lli Betans
  description: The T'lli Betans maintain scheduled diplomatic engagements with the
    USS Enterprise. Captain Picard proposes delaying their meeting to investigate
    sentient two-dimensional lifeforms pulling the ship toward a cosmic string fragment
    via graviton field. This obligation underscores the crew's broader Starfleet duties,
    which compete with the immediate scientific crisis demanding priority attention.
  sphere_of_influence: Interstellar Diplomatic Obligations
  season_appearances:
