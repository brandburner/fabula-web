  episode_count: 0
- fabula_uuid: ger_organization_dbee6647b662
  global_id: ger_organization_dbee6647b662
  canonical_name: Fifth House of Betazed
  description: A hereditary noble house on Betazed that anchors lineage, ceremonial
    authority, and social rank. The Fifth House supplies formal titles and sacred
    regalia—cited here as the Sacred Chalice of Riix and the Holy Rings of Betazed—and
    establishes Lwaxana Troi's claim to ambassadorial status and cultural legitimacy.
    Its internal hierarchy centers on hereditary heirs and ceremonial holders whose
    standing confers diplomatic weight in interpersonal and interstellar encounters,
    shaping how its members enter and disrupt official proceedings.
  sphere_of_influence: Betazoid Nobility, Ceremonial Authority, and Diplomatic Legitimacy
  season_appearances:
  - 2
  local_uuids:
