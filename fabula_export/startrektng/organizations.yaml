- fabula_uuid: ger_organization_fc68abda831c
  global_id: ger_organization_fc68abda831c
  canonical_name: Starbase 133 Command
  description: Starbase 133 Command operates as the central authority for Starbase
    133, managing records of personnel movements and security protocols. Picard orders
    Data to contact them to confirm Dr. Quaice's whereabouts after his unrecorded
    departure from the Enterprise, probe for enemies he may have acquired, and check
    for intercepted requests. They provide external validation of travel logs and
    potential threats, enabling the crew to cross-reference ship data amid discrepancies
    in Beverly Crusher's account.
  sphere_of_influence: Starfleet Starbase Administration and Security Verification
  season_appearances:
