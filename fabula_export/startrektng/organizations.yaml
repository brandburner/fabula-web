- fabula_uuid: ger_organization_23e0164c4ff1
  global_id: ger_organization_23e0164c4ff1
  canonical_name: Klingon Cultural and Warrior Traditions
  description: A systemic framework encompassing all Klingon cultural and warrior
    traditions, including but not limited to rituals like the First Rite of Ascension,
    public festivals (e.g., Kot'baval), and enforcement mechanisms (e.g., figures
    like K'mtar). This entity represents the **overarching cultural and institutional
    norms** that govern Klingon society, rather than any single ritual or event.
  sphere_of_influence: Klingon Ritual Combat, Festivals, and Warrior Identity Enforcement
  season_appearances:
