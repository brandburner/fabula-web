  episode_count: 0
- fabula_uuid: ger_organization_59dd0a9f8869
  global_id: ger_organization_59dd0a9f8869
  canonical_name: Mintakan Life Forms
  description: The Mintakan Life Forms constitute an indigenous population detected
    by shipboard sensors whose cultural practices and biosignatures are obscured by
    karst terrain and thallium-rich bedrock. They operate as a local community with
    distinct cultural integrity vulnerable to external interference; Starfleet classifies
    them as subject to strict cultural-protection concerns because rescue or contact
    could catastrophically contaminate their social and ecological systems.
  sphere_of_influence: Planetary Indigenous Community / Cultural Heritage and Environmental
    Integrity
