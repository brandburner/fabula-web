- fabula_uuid: ger_organization_6d5da15b1e43
  global_id: ger_organization_6d5da15b1e43
  canonical_name: Klingon Medical Division
  description: The Klingon Medical Division directs medical practices in Klingon society,
    guided by cultural values that favor death over survival for patients with severe
    neurological trauma. Beverly Crusher contacts them about Worf's paralysis; they
    confirm Klingons typically allow such patients to die, yielding almost no research
    into these conditions. Beverly and Dr. Toby Russell criticize this bias as primitive,
    arguing it blocks treatment progress and highlights clashes between Klingon honor
    codes and Federation medicine.
  sphere_of_influence: Klingon Medical Practice and Neurological Trauma Care
  season_appearances:
