- fabula_uuid: ger_organization_d90af9fea3e3
  global_id: ger_organization_d90af9fea3e3
  canonical_name: Federation Parliament
  description: The Federation Parliament serves as the central political and diplomatic
    authority of the Federation, coordinating interstellar governance and diplomatic
    missions such as the strategic outreach to Angel One. It represents the collective
    interests of member worlds and Starfleet initiatives, managing fragile peace and
    political stability amid complex cultural tensions. Exercising cautious diplomacy,
    it directs the USS Enterprise’s missions and external political engagements, embodying
    a commitment to peaceful relations and the hope of expanding Federation membership
    while navigating ideological resistance and delicate alliances.
  sphere_of_influence: Interstellar Diplomacy and Governance
