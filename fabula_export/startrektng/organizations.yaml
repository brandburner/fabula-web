  canonical_name: Tholians
  description: The Tholians appear in the current material as an antagonistic extraterrestrial
    faction referenced during tactical discussion and simulation. A 'Tholian vessel'
    serves as the opposing force in a recalled battle scenario used to illustrate
    Commander Riker’s unpredictability. They operate as hostile opponents to Starfleet
    assets; their motives, internal structure, and broader history remain unspecified
