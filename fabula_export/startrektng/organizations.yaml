  global_id: ger_organization_e34dc8ec4331
  canonical_name: Trill
  description: The Trill operate as a species with a symbiotic biology where hosts
    join with long-lived symbionts carrying accumulated memories and experiences.
    Odan belongs to the Trill, and they respond to the crisis by dispatching a new
    host within forty hours to receive Odan's symbiont. This action preserves the
    symbiont's viability and the diplomatic knowledge it holds, revealing their structured
    cultural practices around symbiosis essential for continuity and mission success.
  sphere_of_influence: Symbiosis Management and Host Provision
  season_appearances:
