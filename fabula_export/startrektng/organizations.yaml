  canonical_name: Tanuga Four Research Station
  description: Tanuga Four Research Station functions as an off-world scientific outpost
    focused on experimental physics. It receives sensitive materials (notably dicosilium)
    and hosts Dr. Nel Apgar's Krieger Wave trials, operated by a research team under
    Apgar's leadership. The station uses transporter logistics for supply and personnel
    transfers. Its abrupt destruction during a transporter power drain converts the
    facility from a research site into the central incident and primary locus of an
    ensuing Starfleet criminal and technical inquiry.
  sphere_of_influence: Scientific Research and Experimental Physics; Station Operations
    and Logistics
