  global_id: ger_organization_fcb8e7a1aab1
  canonical_name: USS Berlin
  description: The USS Berlin is a Starfleet vessel operating near the Neutral Zone,
    positioned as a strategic military asset facing imminent threat from Romulan forces.
    It serves as both a tactical frontline defense and a temporal benchmark in critical
    mission planning, underscoring the urgency in Starfleet's response to hostile
    aggression. Its presence directly impacts crew decisions involving medical research
    timelines and border security measures, highlighting its role as a linchpin in
    interstellar defense operations.
  sphere_of_influence: Interstellar Military Operations and Border Defense
