- fabula_uuid: ger_organization_2771dbbbf561
  global_id: ger_organization_2771dbbbf561
  canonical_name: Central Security (Malcor)
  description: |-
    Central Security (Malcor) serves as the primary crisis response authority on Malcor, tasked with handling threats such as alien infiltrations and violent civil unrest. The organization operates under institutional oversight, with its interventions often delayed or blocked by political considerations (e.g., Berel's attempts to shield Riker from scrutiny). Their mandate includes:
      - **Alien Threat Response**: Investigating and neutralizing perceived extraterrestrial threats (e.g., Riker's physiology).
      - **Civil Unrest Mitigation**: Deploying to restore order during violent incidents (e.g., xenophobic mob attacks).
      - **Institutional Enforcement**: Acting as an external enforcer capable of seizing control in crises, though their effectiveness is constrained by bureaucratic or political interference (e.g., Berel's lockdown orders). Their failures in rapid deployment highlight systemic fractures in Malcorian governance.
  sphere_of_influence: Malcorian Crisis Response and Security Enforcement
  season_appearances:
  - 4
  local_uuids:
    1: org_a1a605dfe5f3
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e59546814d18
  global_id: ger_organization_e59546814d18
  canonical_name: Cerberus II
  description: Cerberus II is a shadowy alien system known for its secret indigenous
    rejuvenation therapy that defies conventional medical understanding. The organization
    harnesses this experimental treatment, which rapidly reverses aging, playing a
    pivotal role in covert medical advancements and high-stakes strategic gambits
    within the interstellar domain.
  sphere_of_influence: Experimental Medical Technology and Strategic Military Operations
  season_appearances:
  - 1
  local_uuids:
