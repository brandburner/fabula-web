  episode_count: 0
- fabula_uuid: ger_organization_a39e6d4c97ce
  global_id: ger_organization_a39e6d4c97ce
  canonical_name: Romulan Counterintelligence
  description: Romulan Counterintelligence deploys Proconsul Neral to hunt unauthorized
    intruders on Romulus. Neral uncovers Captain Picard's covert arrival through classified
    intelligence, summons Senator Pardek to probe for collaboration, and commands
    security forces to circulate Picard's likeness for swift capture. This organization
    tracks disguised threats with calculated precision, mobilizing resources to safeguard
    Romulan security and dismantle external plots like Picard's alliance with Pardek
    and Spock.
  sphere_of_influence: Romulan Counterintelligence and Intruder Tracking
  season_appearances:
  - 5
  local_uuids:
    1: org_5ce3e52f55fb
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_26feb6b7de25
  global_id: ger_organization_26feb6b7de25
  canonical_name: Romulan Cyberneticists
  description: 'An informal cohort of Romulan technical specialists focused on cybernetics
    and the examination of synthetic lifeforms. In the current material they appear
    as a referenced group rather than an established institutional body: Setal invokes
    them as experts who would eagerly dissect or study an android like Data, framed
    as a threatening, coercive presence. No formal hierarchy, location, or organizational
    structure is specified; their methods imply invasive technical examination and
    intelligence-driven interest.'
  sphere_of_influence: Specialized Cybernetic Research and Coercive Technical Examination
  season_appearances:
  - 3
  local_uuids:
    1: organization_d37e3952467c
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c382b128a1ac
  global_id: ger_organization_c382b128a1ac
  canonical_name: Romulan Dissidents
  description: Romulan dissidents oppose the current Romulan government through covert
    actions on Romulus. Armed members patrol the capital's gleaming streets, intercept
    disguised Federation operatives Picard and Data, and escort them to a hidden cave
    where Spock waits. Possibly Senator Pardek's operatives, they function as underground
    allies, enabling secret rendezvous amid regime threats and navigating high-stakes
    intrigue with precision.
  sphere_of_influence: Covert Anti-Government Operations on Romulus
  season_appearances:
  - 5
  local_uuids:
    1: org_7b007c81e1d8
  first_appearance_season: 5
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0a0f9739973c
  global_id: ger_organization_0a0f9739973c
  canonical_name: Romulan Fleet
  description: 'The Romulan Fleet acts as the Romulan polity''s principal military
    naval force, responsible for fleet deployments, tactical planning, and the operation
    of warbird-class starships. In the processed material it functions as the primary
    external antagonist: its reported strengths, locations, and tactical plans—along
    with technical details of engines, weapons, and cloaking systems—constitute the
    contested intelligence Admiral Alidar Jarok supplies. Command-level officers (admirals)
    direct fleet disposition, and the fleet''s inferred capabilities and movements
    directly shape Federation strategic decisions and treaty-risk calculations.'
  sphere_of_influence: Interstellar Military Operations and Strategic Threat Assessment
  season_appearances:
  - 3
  local_uuids:
    1: organization_5518cebedd97
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0eeea43c5260
  global_id: ger_organization_0eeea43c5260
  canonical_name: Romulan Government
  description: The Romulan Government (also referred to as 'Romulan Leadership') is
    the dominant political power structure on Romulus, characterized by entrenched
    isolationism and resistance to reunification efforts. It treats underground movements
    like the reunification initiative as a serious threat, branding reformers such
    as Senator Pardek as radicals. The government deploys messengers to issue urgent
    summonses, pulling key figures like Spock into its operations, and drives political
    machinations—including invasion plots—that disrupt reunification efforts. While
    it occasionally makes abrupt peace gestures, these are often insincere, masking
    its skepticism and surveillance of reformist activities. Its actions foster internal
    rifts, complicating covert missions (e.g., Spock’s) and external diplomatic efforts
    (e.g., Picard’s search in the Krocton Segment). The government’s control over
    political and covert activities underscores its role as a primary antagonist force,
    disrupting personal interactions and emotional reflections through its demands
    for engagement in its conspiracies.
  sphere_of_influence: Romulan Political Governance and Internal Security
  season_appearances:
  - 5
  local_uuids:
    1: org_f6df6c26880d
  first_appearance_season: 5
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_ce366f4d8613
  global_id: ger_organization_ce366f4d8613
  canonical_name: Romulan Guard
  description: Romulan Guards/Security Forces secure the perimeter of the Romulan
    prison camp amid dense jungle terrain. They deploy detection systems that force
    Worf to beam in 30 kilometers away, as Shrek warns. Their vigilance blocks direct
    approaches, positioning them as a tactical barrier against infiltrators seeking
    imprisoned Klingons. Shrek highlights their role during shuttlecraft briefings,
    underscoring the need for stealth in Worf's mission. This entity represents the
    broader Romulan security apparatus, including both ground-based guards and associated
    security infrastructure.
  sphere_of_influence: Romulan Prison Camp Perimeter Security and Detection
  season_appearances:
  - 5
  - 6
  local_uuids:
    1: org_ed2f94e4a9d7
    2: org_7faa5d532bf5
  first_appearance_season: 5
