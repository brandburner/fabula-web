- fabula_uuid: ger_organization_3af12f38d457
  global_id: ger_organization_3af12f38d457
  canonical_name: Starship Repulse
  description: A Starfleet vessel previously commanded by Doctor Pulaski and currently
    under the command of Captain Taggert. The Repulse serves as a key Starfleet asset
    with a documented chain of command and operational history, demonstrated through
    its role in personnel transfers and the professional backgrounds of its officers.
    Its mention in relation to both Taggert and Pulaski establishes it as a nexus
    for character backstories and interpersonal dynamics within Starfleet's operational
    framework.
  sphere_of_influence: Starfleet deep-space operations and personnel deployment
  season_appearances:
