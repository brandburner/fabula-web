  global_id: ger_organization_bd97e1414e1d
  canonical_name: Enterprise (Ship/Crew)
  description: The Enterprise operates as a Starfleet starship command unit led by
    Captain Picard, with senior officers executing command, engineering, security,
    medical, and diplomatic functions. The vessel projects Starfleet authority through
    operational missions and routine shipboard governance, while also mediating cross-cultural
    tensions among crew and guests—evident when the captain hosts formal hospitality
    that exposes Klingon-human honor conflicts and forces officers to adjudicate loyalty,
    etiquette, and morale.
  sphere_of_influence: Starfleet starship command and operations; shipboard governance,
