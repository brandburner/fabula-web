- fabula_uuid: ger_organization_e8011d1ec74a
  global_id: ger_organization_e8011d1ec74a
  canonical_name: Federation Starship Enterprise
  description: The Federation Starship Enterprise deploys its crew—Captain Picard,
    Counselor Troi, Lieutenant Commander Data, and Lieutenant Worf—to Ventax Two.
    They challenge Ardra's claims of godlike authority and her 1,000-year contract
    enforcing tyranny over the Ventaxians. Picard leads the investigation with skeptical
    questioning, while the crew supports through presence and analysis, positioning
    the ship as an allied investigative force. Their actions counter Ardra's psychological
    dominance and bureaucratic intimidation, paving the way for arbitration to nullify
    her hold and restore planetary freedom.
  sphere_of_influence: Starfleet Starship Command, Onboard Governance, Personnel Welfare,
    and Institutional Authority
