  global_id: ger_organization_f1748245711e
  canonical_name: USS Enterprise Crew (Under Risa Game Mind-Control)
  description: 'The USS Enterprise crew, comprising officers such as Riker, Worf,
    Picard, Beverly Crusher, O''Brien, and Robin Lefler, operates under hierarchical
    Starfleet command. During the Risa game''s mind-control influence, the crew undergoes
    a dramatic transformation: they become cold, detached, and rigidly protocol-driven,
    suppressing individuality for the sake of ship stability. This includes deflecting
    Wesley Crusher''s greetings, forcibly restraining him on the bridge to activate
    a hypnotic laser, and pursuing him to enforce isolation. Data''s beacon disrupts
    their trance, exposing the external influence''s grip on their actions and temporarily
    restoring their autonomy. The narrative highlights their collective subjugation
    and the psychological toll on Wesley, who is left in solitary survival as a result.'
  sphere_of_influence: Starfleet Starship Operations and Security
