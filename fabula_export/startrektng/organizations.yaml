- fabula_uuid: ger_organization_4b58d4dc53df
  global_id: ger_organization_4b58d4dc53df
  canonical_name: Ferengi Customs
  description: Reyga’s Ferengi family enforces customs that bar autopsies, as Picard
    explains to Crusher. These rituals treat invasive exams as violations, blocking
    Starfleet probes into Reyga’s death despite her murder suspicions. The family
    upholds obligations over external demands, forcing Crusher to pursue scans instead.
    This stance exposes Ferengi priorities—ritual purity over forensic truth—straining
    Enterprise diplomacy and medicine.
  sphere_of_influence: Ritual Obligations and Autopsy Prohibitions
  season_appearances:
