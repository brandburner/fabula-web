- fabula_uuid: ger_organization_916a7cb6907a
  global_id: ger_organization_916a7cb6907a
  canonical_name: Tactical Department
  description: The Tactical Department functions as a shipboard combat and weapons-control
    division responsible for targeting, weapons deployment, fire coordination, and
    immediate defensive/offensive engagement. In the provided material it executes
    bridge-issued weapons orders, coordinates phaser and torpedo salvos, and maintains
    firing solutions while holding course under Klingon attack. The department answers
    through the bridge chain of command, interfaces with engineering and command staff,
    and its absence on a crippled vessel noticeably degrades combat capability.
  sphere_of_influence: Shipboard Combat Operations and Weapons Control within Starfleet
    vessel command
  season_appearances:
