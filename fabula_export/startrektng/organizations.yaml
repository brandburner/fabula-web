  canonical_name: Sisters of Hope Infirmary (19th-Century Charity Hospital)
  description: 19th-century San Francisco charity hospital treating women and marginalized
    patients, serving as a front for Devidian operations. Includes staff, patients,
    and operational challenges, overseen by the Board of Patrons.
  sphere_of_influence: 19th-Century Charity Healthcare and Devidian Infiltration Hub
