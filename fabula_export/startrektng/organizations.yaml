- fabula_uuid: ger_organization_3a27b171a19c
  global_id: ger_organization_3a27b171a19c
  canonical_name: Treaty of Algeron
  description: 'The Treaty of Algeron is a formal interstellar agreement between the
    United Federation of Planets and the Romulan Star Empire that establishes the
    Neutral Zone and forbids Federation warship transit into Romulan-held space. It
    functions as a legal and diplomatic constraint rather than a standing enforcement
    body: signatory governments and their diplomatic channels uphold its terms, and
    breaches convert a legal instrument into a flashpoint for political crisis and
    military escalation. In the current material the Enterprise''s intentional transit
    is framed as a deliberate violation, making the treaty the immediate source of
    legal, moral, and strategic conflict and forcing command-level decisions about
    trust, caution, and the risk of all-out war.'
  sphere_of_influence: Interstellar Diplomacy and Boundary Law; Neutral Zone Enforcement
  season_appearances:
  - 3
  local_uuids:
    1: organization_336aa0700ac7
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_60a908006ccb
  global_id: ger_organization_60a908006ccb
  canonical_name: Trilithium Thieves
  description: 'Orton and the Waiter infiltrate Arkaria Base as conspirators for the
    trilithium thieves. They launch an ambush during reception: Waiter shoots Geordi
    unconscious and targets Hutchinson; Orton kills Hutchinson and subdues the room.
    The group forces Riker, Data, Troi, and survivors into hostage submission at phaser
    point. This marks their shift from covert trilithium sabotage to direct violence,
    driving the antagonist conflict.'
  sphere_of_influence: Trilithium Sabotage and Hostage-Taking at Arkaria Base
  season_appearances:
