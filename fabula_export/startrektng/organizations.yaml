  global_id: ger_organization_8ca3084b95a9
  canonical_name: Rana Four Colony
  description: A small colonial community located on Rana IV whose residents include
    retired botanists originally from the aquatic city New Martim Vaz on Earth. The
    colony functions as a local, agriculture- and botany-centered settlement; it issued
    a distress call that prompted a Starfleet away team investigation. No formal hierarchy
    is shown in the current material; the colony operates as a communal residential
    node and the primary affected community and source of conflict in the scene.
  sphere_of_influence: Colonial Agricultural/Botanical Community and Local Civil Organization
  season_appearances:
