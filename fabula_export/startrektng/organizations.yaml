  global_id: ger_organization_e7c92261aa78
  canonical_name: Federation Starship Bozeman (Soyuz-class, 23rd Century)
  description: The Federation Starship Bozeman, a Soyuz-class vessel commanded by
    Captain Bateson, hails the Enterprise after temporal displacement from 2278. Its
    crew believes the current year remains 2278 and reacts with confusion to the Enterprise's
    advanced 24th-century technology. Bateson accepts Picard's invitation to board
    and discuss the anomaly, marking the ship as a key player in resolving the timeline
    disruption alongside the Enterprise crew.
  sphere_of_influence: 23rd-Century Starfleet Vessel Operations and Temporal Incident
    Response
