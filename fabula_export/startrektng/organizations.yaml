- fabula_uuid: ger_organization_25e0dad2a8e7
  global_id: ger_organization_25e0dad2a8e7
  canonical_name: Solari Resistance Factions
  description: A constellation of interrelated militant and political groups that
    sustain a centuries-long feud and localized civil conflict. In the current material
    their branches operate on Daled Four, split into opposing camps whose rivalry
    produced Salia's parents and motivated plans to raise her as a unifying figure.
    The factions lack a single, centralized command, favoring regional warlords and
    councils; they pursue territorial and ideological dominance through coercion and
    intermittent cease-fire negotiations, functioning as the background antagonist
    force shaping local diplomacy.
  sphere_of_influence: Regional armed political factions and civil conflict management,
    primarily influencing Daled Four's domestic politics and neighboring diplomatic
    relations
