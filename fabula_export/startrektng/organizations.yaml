  global_id: ger_organization_1a2a614af8fc
  canonical_name: Ramsey's Followers
  description: Ramsey's Followers constitute a faction on Angel One representing a
    burgeoning social movement challenging the matriarchal regime. Subject to imminent
    execution, they symbolize the unstoppable force of societal change and political
    evolution within a rigid authoritarian order. Their group identity is defined
    by their association with Ramsey, whose leadership galvanizes opposition to the
    current power structure, provoking political tension and moral dilemmas among
    ruling elites and external observers alike.
  sphere_of_influence: Societal Reform and Political Resistance within Angel One
  season_appearances:
