- fabula_uuid: ger_organization_5f0bc4029287
  global_id: ger_organization_5f0bc4029287
  canonical_name: Coalition
  description: The Coalition rules one side of Turkana IV's sunken pyramid underground
    city, locked in bitter conflict with the Alliance faction. Led by Hayne, its members
    raid rivals for supplies like synthale, wield proximity detectors in combat, and
    negotiate with the Enterprise crew for phasers to rescue captured personnel. Ishara
    Yar joined after her parents' deaths, viewing it as family amid cadre-driven violence.
    Once gaining police powers from collapsed government, the group now pursues power
    through manipulation, intelligence gathering on Starfleet, and invasion plans
    backed by 3,000 troops. Injured fighters flee threats while leaders exploit outsiders
    for advanced weapons.
  sphere_of_influence: Territorial Militancy and Factional Warfare on Turkana IV
  season_appearances:
  - 4
  local_uuids:
    1: org_5fcc41b0ffa0
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_0ab9376b511d
  global_id: ger_organization_0ab9376b511d
  canonical_name: Coalition of Madena VI
  description: The Coalition of Madena VI represents a successful planetary alliance
    flourishing under a binding peace treaty—an interstellar diplomatic achievement
    in contrast to the episode's rogue elements. While details remain sparse in this
    context, their existence as a model of stable cohabitation underscores Starfleet's
    mission of fostering galactic cooperation through diplomacy. The organization
    serves as an unspoken counterpoint to the negotiations and tensions surrounding
    Captain Okona's arrival.
  sphere_of_influence: Interstellar Treaty Governance and Diplomatic Relations
  season_appearances:
  - 2
  local_uuids:
    1: organization_c90c366bbea7
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_a0da47e9c526
  global_id: ger_organization_a0da47e9c526
  canonical_name: Colonists
  description: A subterranean human settlement of roughly two hundred people organized
    under an informally recognized colony leader. The community prioritizes cultural
    continuity and isolationist norms; recently it has faced a prior subterranean
    catastrophe and now an acute environmental threat (impending stellar flares) that
    requires urgent evacuation, triage, and burn treatment coordinated with Starfleet.
    Interactions with Starfleet away teams (notably the USS Enterprise in the source
    material) produce on‑the‑ground conflict as humanitarian rescue efforts collide
    with local authority and cultural protocol.
  sphere_of_influence: Local Civilian Settlement; Emergency Humanitarian Evacuation
    and Civilian Survival
  season_appearances:
  - 1
  - 2
  - 3
  local_uuids:
    1: organization_3425f1c986e7
    2: organization_bddb9a273ab2
    3: organization_59a34d5cd19d
  first_appearance_season: 1
