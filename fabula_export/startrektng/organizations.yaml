  episode_count: 0
- fabula_uuid: ger_organization_ff544ad82ea7
  global_id: ger_organization_ff544ad82ea7
  canonical_name: Terraformers of the Velara III Project
  description: The Terraformers of the Velara III Project constitute a specialized
    team charged with altering the ecological and environmental conditions on the
    planet Velara III to make it habitable. Their operations involve large-scale terraforming
    efforts that have profound ecological impacts, including the inadvertent destruction
    of a delicate saline environment sustaining a newly discovered silicon-based intelligent
    life form. The organization operates under a project director and includes engineers,
    scientists, and support personnel. Internal conflict arises from concealed knowledge
    about indigenous life, complicating their mission and positioning them as central
    agents in the emerging interspecies conflict. Their role pivots from purely scientific
    terraforming to a contested struggle involving ethical considerations and survival.
  sphere_of_influence: Planetary Ecological Engineering and Terraforming Operations
  season_appearances:
  - 1
  local_uuids:
    1: organization_5d515ad76bfc
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_2e0033070e9f
  global_id: ger_organization_2e0033070e9f
  canonical_name: Terrellian Passenger Transport Fleet
  description: A temporary fleet of five ships commanded by Androna, carrying sick
    and dying passengers toward the anomaly's 'Light' in *All Good Things...* (S7E25).
    Operates in direct conflict with Starfleet's warnings and Romulan threats, embodying
    themes of desperation and defiance.
  sphere_of_influence: Civilian Interstellar Passenger Transport Amid Humanitarian
    Crisis
  season_appearances:
  - 7
  local_uuids:
