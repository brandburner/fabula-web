- fabula_uuid: ger_organization_0d13c3cacd95
  global_id: ger_organization_0d13c3cacd95
  canonical_name: Federation-Klingon Strategic Alliance
  description: A **defensive strategic partnership** between the United Federation
    of Planets and the Klingon Empire (under Gowron) to counter external threats,
    particularly Romulan interference in the Klingon civil war. Employed tactical
    measures like Geordi La Forge’s tachyon detection grid and a Starfleet border
    blockade to expose cloaked Romulan vessels.
  sphere_of_influence: Interstellar Strategic Partnership and Mutual Defense
