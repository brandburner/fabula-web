  global_id: ger_organization_f9c9809fe299
  canonical_name: Enterprise Medical Personnel
  description: Enterprise medical personnel diagnose and treat crew members struck
    by unexplained comas, including Deanna Troi and William Riker. Picard orders them
    informed of the comas' true cause—psychic attacks by an Ullian telepath—to guide
    their medical response. They operate from sickbay, supporting the bridge crew's
    investigation by stabilizing patients and providing clinical insights into the
    anomalous symptoms.
  sphere_of_influence: Starship Medical Diagnosis and Treatment
