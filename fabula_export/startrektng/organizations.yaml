  episode_count: 1
- fabula_uuid: ger_organization_bc0956e94471
  global_id: ger_organization_bc0956e94471
  canonical_name: Klingon-Romulan Coexistence Colony on Remote Planet
  description: A hidden settlement of Khitomer survivors and Romulans ruled by Tokath,
    where Romulan guards enforce a facade of peace while Klingon youth secretly preserve
    their culture through forbidden rituals, tools, and defiance. Serves as the primary
    setting for *Birthright, Part II*, exploring cultural survival under occupation.
  sphere_of_influence: Romulan-Enforced Cultural Suppression in Isolated Settlement
  season_appearances:
  - 6
  local_uuids:
    1: org_a4f7705d3bac
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_bdebe61e592a
  global_id: ger_organization_bdebe61e592a
  canonical_name: Klingons
  description: Picard identifies Klingons as a prime suspect in the Vico's destruction.
    Their signature disrupter weapons match the forensic residue, and battle tactics
    align with Timothy's description of a boarding party assault. Cloaked ships explain
    the lack of transporter or docking traces. This positions Klingons as aggressive
    interstellar warriors capable of precise, devastating raids, despite their alliance
    with the Federation.
  sphere_of_influence: Interstellar Warfare and Raiding Operations
  season_appearances:
