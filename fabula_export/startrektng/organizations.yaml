  global_id: ger_organization_4b5fc994c514
  canonical_name: Picard's Covert Team
  description: Picard leads a covert team on an unauthorized mission to destroy a
    Cardassian metagenic weapon installation. The group draws from Enterprise personnel,
    including Beverly Crusher, Worf, and others. Captain Jellico, Picard's temporary
    replacement, offers clandestine aid by launching a class five probe near the Cardassian
    border. This probe delivers telemetry on the installation's layout, sharpening
    the team's intelligence for the high-stakes operation amid strained command dynamics.
