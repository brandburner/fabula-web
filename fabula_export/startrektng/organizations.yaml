- fabula_uuid: ger_organization_7cfb7e1a1afe
  global_id: ger_organization_7cfb7e1a1afe
  canonical_name: Ferengi
  description: A collective of Ferengi traders and merchants operating under the broader
    Ferengi Alliance, known for profit-driven activities in hazardous regions such
    as the Hekaras Corridor. Includes Daimon Prak's group, which was disabled by a
    verteron pulse in the subspace corridor and exploited a crisis for profit by bargaining
    engineering repairs for access to sensor logs. Suspected of hijacking the USS
    *Fleming* to steal its cargo of bio-mimetic gel—a high-value medical resource—due
    to their opportunistic exploitation of vulnerable ships in dangerous territories.
    Their actions introduce deliberate sabotage risks alongside environmental hazards,
    prompting Starfleet's heightened readiness for potential conflicts. The Ferengi
    Alliance's traders are framed as a threat driven by commerce over caution, with
    their profit motives directly tied to the disappearance of the *Fleming* and its
    cargo.
  sphere_of_influence: Interstellar Covert Conflict and Economic Opportunism
