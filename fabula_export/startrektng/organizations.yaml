  global_id: ger_organization_540d4a37330e
  canonical_name: Marta Community
  description: The Marta Community functions as a fabricated cultural group on Malcor
    III, designed to support Federation undercover operations. Riker adopts the alias
    Rivas Jakara within this group to infiltrate Malcorian society and monitor developments
    ahead of first contact. It masks his true identity and activities, enabling covert
    surveillance without arousing suspicion from local authorities like Chancellor
    Durken or Minister Krola.
  sphere_of_influence: Cultural Cover for Pre-Contact Intelligence
