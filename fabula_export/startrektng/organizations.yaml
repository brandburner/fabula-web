- fabula_uuid: ger_organization_3275c95f9aae
  global_id: ger_organization_3275c95f9aae
  canonical_name: Qualor Two Shipyard
  description: Qualor Two Shipyard handles starship decommissioning, as seen with
    the T'Pau, and reallocates components like its navigational deflector to vessels
    such as the Tripoli on the yard's outer rim. Quartermaster Dokachin oversees operations,
    while the yard's tracking systems monitor ship locations. Enterprise crew scrutiny
    reveals these activities tie into the T'Pau's disappearance and hints at a cover-up
    linked to Ferengi wreckage.
  sphere_of_influence: Starship Decommissioning and Component Redistribution
