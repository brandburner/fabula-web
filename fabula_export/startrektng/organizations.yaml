  canonical_name: Federation Colony Beta Agni II (Tricyanate Contamination Site)
  description: A civilian outpost under Federation governance, depicted solely as
    the victim of tricyanate sabotage in *The Most Toys* (S3E22). Lacks independent
    leadership or narrative agency; serves as a plot catalyst for the *Enterprise*'s
    intervention. Distinct from the Federation as a governing body.
