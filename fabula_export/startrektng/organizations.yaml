  canonical_name: Unnamed Ship (Referenced as 'This Ship')
  description: 'A mission-bearing starship (narratively the same vessel identified
    elsewhere as the USS Enterprise (NCC-1701-D)) that acts as the institutional authority
    aboard: it supplies transport, medical and security platforms for diplomatic missions
    (Transporter Room, Sickbay), stages containment and clinical assessment of delegates,
    and channels chain-of-command decisions through the captain and bridge officers.
    This consolidation merges a redundant canonicalization of the Enterprise into
    the unnamed-ship representation to be later unified under the primary Enterprise
    canonical UUID.'
