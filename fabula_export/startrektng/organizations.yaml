- fabula_uuid: ger_organization_1b2d9ced94fd
  global_id: ger_organization_1b2d9ced94fd
  canonical_name: Ventax Two Science Team
  description: Led by Dr. Clark, this team of scientists staffs the Ventax Two science
    station, conducting research amid rising planetary unrest. A violent mob breaches
    their facility, forcing Clark to send a desperate, fragmented transmission to
    the Enterprise. Picard orders an emergency beam-out, but transporters lock only
    on Clark, leaving the rest trapped and their survival uncertain. Their crisis
    escalates Picard's mission to expose Ardra and reveals Starfleet's intervention
    limits.
  sphere_of_influence: Planetary Science Research and Exploration
  season_appearances:
  - 4
  local_uuids:
    1: org_484938c5b017
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_07e4cf0e74ac
  global_id: ger_organization_07e4cf0e74ac
  canonical_name: Ventaxian Government
  description: The Ventaxian Government (also referred to as *Ventaxian Society*)
    is the governing body of Ventax II, an agrarian civilization that abandoned advanced
    technology a millennium ago following societal collapse from overcrowding, pollution,
    war, starvation, and disease. The population believes they sold their souls to
    Ardra in exchange for salvation, a contract that remains central to their legal
    and political systems. The government operates through a council and constitution
    under the leadership of Acost Jared, though its authority is increasingly challenged
    by the arbitration crisis over the ancient contract with Ardra. The society interprets
    natural phenomena (e.g., tremors) as omens of Ardra’s return, and their self-reliant
    laws are deeply tied to this belief system. Recent events, including the taking
    of Federation hostages, reflect their psychological strain and desperation amid
    the ruins of their civilization.
  sphere_of_influence: Planetary Governance and Societal Administration
  season_appearances:
  - 4
  local_uuids:
    1: org_e1dece021704
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_f77fe8cd7f11
  global_id: ger_organization_f77fe8cd7f11
  canonical_name: Ventaxian Legal System
  description: The Ventaxian Legal System forms the judicial framework on Ventax II,
    complete with precedents such as Akul K'Ton vs. Garv Etes and arbitration processes.
    Picard and Data exploit its loopholes to challenge Ardra's deity claims, aiming
    to force her into a legal confrontation that exposes her fraud. Stranded without
    the Enterprise, they depend on this system to outmaneuver her supernatural pretensions
    through strategy and legal maneuvering.
  sphere_of_influence: Planetary Judicial Arbitration and Dispute Resolution
  season_appearances:
  - 4
  local_uuids:
    1: org_816ff02520c5
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e114614f73bc
  global_id: ger_organization_e114614f73bc
  canonical_name: Ventaxians
  description: The Ventaxians (also referred to as the Ventaxian Population) are the
    civilian inhabitants of Ventax II, bound by a thousand-year-old contract that
    Ardra seeks to enforce. Her return instills terror, reducing them to a subservient
    mass that grovels at her demands for resource accounting and exhibits fear that
    underscores their complicity in her psychological hold. Their actions—such as
    seizing Federation hostages—stem from this subservience, exposing their reliance
    on Ardra's claimed divine authority. Jared serves as their representative, embodying
    their deference and clashing with Picard's defiance at the Athenium, highlighting
    their role as manipulated subordinates rather than active resistors.
  sphere_of_influence: Civilian Populace of Ventax II
  season_appearances:
  - 4
  local_uuids:
    1: org_ffe5c5677976
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_832bd1fb3cc3
  global_id: ger_organization_832bd1fb3cc3
  canonical_name: Vico
  description: The Vico functioned as a starship destroyed by a gravitational wavefront,
    sparing only Timothy as survivor. His repressed memories surface amid the Enterprise's
    identical crisis, where Data extracts details to connect the Vico's annihilation
    to the present distortion's origins. Crew members witness Timothy's terror, highlighting
    the ship's role in past deep-space hazards that now inform current survival efforts.
  sphere_of_influence: Deep Space Starship Operations
  season_appearances:
  - 5
  local_uuids:
    1: org_8c7065054e43
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a9d98b77fad7
  global_id: ger_organization_a9d98b77fad7
  canonical_name: Village Elders
  description: The Village Elders govern the Barkonian village through scheduled meetings
    with residents like Garvin. Garvin mentions his plan to meet them that evening
    after escorting daughter Gia to school, positioning them as central authorities
    in this Renaissance-era community. They maintain leadership amid disruptions from
    outsiders such as the malfunctioning Data, who arrives carrying a hazardous container
    and emitting strange noises.
  sphere_of_influence: Village Governance
  season_appearances:
  - 7
  local_uuids:
    1: org_9b1c7efe73cf
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_6670e7029684
  global_id: ger_organization_6670e7029684
  canonical_name: Violent Mob on Ventax Two
  description: A violent mob of locals on Ventax Two, driven by fear, desperation,
    or Ardra's influence, breaches the Starfleet science station during the planet's
    structural collapse. The mob overruns the facility, filling it with smoke, noise,
    and chaos, and traps the science team—including Dr. Clark—inside. Their assault
    disrupts Picard's emergency beam-out, locking transporters onto Clark alone and
    stranding the rest of the team. The mob's actions escalate the crisis, indirectly
    threaten Starfleet personnel, and force the *Enterprise* crew to abandon transporter-based
    rescue efforts in favor of alternative solutions, such as interrogation or direct
    intervention.
  sphere_of_influence: Civil Unrest and Violent Disruption on Ventax Two
  season_appearances:
  - 4
  local_uuids:
    1: org_aa1ee619b94b
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_08a85c124d46
  global_id: ger_organization_08a85c124d46
  canonical_name: Vorgons (27th Century)
  description: Time-traveling organization from the 27th century that operates as
    both self-proclaimed guardians and opportunistic criminals in temporal conflicts
    over dangerous relics. Their agents, including Ajur and Boratus, first approach
    Picard in his quarters under the guise of failed security officers charged with
    protecting the Tox Uthat, a star-destabilizing weapon. They deliver warnings about
    the Uthat's dangers while subtly manipulating Picard by praising his wisdom and
    implying his actions align with predestined history. Later, the same group ambushes
    Picard in a Risan lobby to seize the Uthat as future property, exposing their
    criminal intent. Picard counters by destroying the artifact via transporter explosion,
    killing Ajur and forcing their retreat. This duality reveals the Vorgons as a
    morally ambiguous faction entangled in temporal conflicts, deploying time-displacement
    technology for their objectives.
  sphere_of_influence: 27th-Century Temporal Security and Artifact Retrieval
  season_appearances:
  - 3
  local_uuids:
    1: org_662b1261fc63
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_ebfa6acdd905
  global_id: ger_organization_ebfa6acdd905
  canonical_name: Vulcan Council
  description: The Vulcan Council dispatches members to archaeology symposia, such
    as the reception in Ten Forward, to engage Starfleet officers like Picard in discussions
    on excavations. This representative participates professionally amid the crew,
    highlighting the Council's oversight of Vulcan archaeological interests and its
    integration into interstellar scholarly events that affirm Picard's expertise.
  sphere_of_influence: Vulcan Archaeological and Cultural Oversight
  season_appearances:
  - 4
  local_uuids:
    1: org_c9bf98717d15
  first_appearance_season: 4
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_8dd880547b7e
  global_id: ger_organization_8dd880547b7e
  canonical_name: Vulcan Extremist Movement (Isolationists)
  description: Radical Vulcan faction advocating for total isolation from alien races;
    distinct from mainstream Vulcan society and the Vulcan Council. Their actions
    include artifact theft and a plot to assassinate the Vulcan Council using the
    Stone of Gol.
  sphere_of_influence: Vulcan Isolationist Extremism
  season_appearances:
  - 7
  local_uuids:
