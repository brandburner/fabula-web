  global_id: ger_organization_49cb5a2ad958
  canonical_name: U.S.S. Bozeman
  description: The U.S.S. Bozeman operates as a Soyuz-class Federation starship launched
    in 2278. Captain Bateson leads its crew, who hail the Enterprise-D after the temporal
    loop breaks. Bateson's team mistakes the advanced Galaxy-class ship for a vessel
    from their era, sparking confusion over design differences and temporal shifts.
    This interaction forces Picard to invite Bateson aboard, turning the Bozeman into
    a temporally displaced ally that escalates the crisis through era-spanning confrontation.
