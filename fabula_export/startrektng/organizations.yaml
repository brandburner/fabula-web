  global_id: ger_organization_befd44d46aec
  canonical_name: Shipboard Security Contingent
  description: A shipboard enforcement contingent responsible for on‑board containment,
    interception, and tactical response. Observed deploying full teams to shuttlebays
    to intercept a fleeing suspect, coordinating with bridge and engineering officers,
    and operating under ship command authority. Functions as the vessel's immediate
    defensive and security response force, using armed teams and posted containment
    positions to protect crew and assets.
