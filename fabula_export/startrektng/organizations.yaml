  global_id: ger_organization_456a78b7d9f6
  canonical_name: Senate of Angosia
  description: The Senate of Angosia functions as the planet's legislative assembly
    and symbolic civic center. It convenes deliberative sessions and stages diplomatic
    ceremonies in its rotunda, projects Angosian civic identity, and maintains an
    administrative security detail. During the described event the Senate serves as
    the focal venue for political theater and crisis management, interacting directly
    with the executive office (Prime Minister Nayrok) and external actors (Starfleet
    officers) when security and diplomatic imperatives collide.
  sphere_of_influence: Planetary Legislative Governance and Diplomatic Ceremonial
    Venue
