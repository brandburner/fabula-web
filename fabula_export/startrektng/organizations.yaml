- fabula_uuid: ger_organization_c2e07563d9e0
  global_id: ger_organization_c2e07563d9e0
  canonical_name: Mek'ba
  description: Mek'ba is a formally sanctioned Klingon ritualized adjudication invoked
    and ordered by the Chancellor and High Council to resolve personal and political
    challenges. Conducted publicly in the Great Hall under council authority, the
    Mek'ba confers legitimacy on combat or challenge procedures, elevates disputes
    into binding ritual proceedings, and shapes political outcomes. It operates through
    prescriptive ceremonial rules, council oversight, and named participants (challenger,
    champion, accused), and can transform private vendettas into state-sanctioned
    confrontations with high stakes.
  sphere_of_influence: Klingon ritual adjudication and political legitimacy within
    High Council governance
  season_appearances:
  - 3
  local_uuids:
