  episode_count: 1
- fabula_uuid: ger_organization_aceaa28b0ccf
  global_id: ger_organization_aceaa28b0ccf
  canonical_name: Romulan Invasion Fleet
  description: The Romulan Invasion Fleet comprises three stolen Vulcan ships that
    Sela deploys toward Vulcan, disguised as a peace envoy to enable infiltration
    and conquest. This antagonist force exploits Vulcan trust in their own vessels
    and a holographic Spock deception, marking a bold escalation in Romulan aggression
    against Vulcan sovereignty.
  sphere_of_influence: Covert Naval Invasion Operations
  season_appearances:
  - 5
  local_uuids:
    1: org_b68f47216594
  first_appearance_season: 5
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_98e190ac1a07
  global_id: ger_organization_98e190ac1a07
  canonical_name: Romulan Military
  description: Sela commands guards from the Romulan Military in pursuits of Picard,
    Spock, and Data inside Romulan offices. They storm locations to capture fugitives,
    deploy disruptors in ambushes, and protect invasion operations. Sela reveals their
    imminent attack on Vulcan tied to Spock's reunification announcement, marking
    them as the antagonist force driving conflict through direct action and strategic
    threats.
  sphere_of_influence: Romulan Military Pursuit and Invasion Operations
  season_appearances:
  - 5
  local_uuids:
    1: org_b2f4542dccc7
  first_appearance_season: 5
