- fabula_uuid: ger_organization_fd3551ed9dcd
  global_id: ger_organization_fd3551ed9dcd
  canonical_name: Federation Medical Corps
  description: The Federation Medical Corps is a specialized division of Starfleet
    responsible for deploying medical vessels (e.g., the *USS Pasteur*) to address
    interstellar health emergencies, including humanitarian aid missions and covert
    operations in restricted space. It operates under rare permissions to cross hostile
    borders (e.g., Klingon territory) and serves as a logistical tool for Starfleet
    when direct access is denied. Notable missions include the Terrellian Plague outbreak
    on Romulus and evasive maneuvers against Klingon cruisers while upholding Federation
    protection values. The Corps interacts closely with senior Starfleet personnel
    (e.g., Jean-Luc Picard, Data) and faces challenges like system failures, casualties
    (e.g., Chilton's death), and temporal threats.
  sphere_of_influence: Interstellar Emergency Medical Deployments and Restricted-Space
    Humanitarian Missions
