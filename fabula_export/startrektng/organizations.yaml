  canonical_name: USS Enterprise (NCC-1701-D)
  description: |-
    The USS Enterprise-D is a *Galaxy*-class Starfleet starship under the command of Captain Jean-Luc Picard, serving as the primary setting for *Star Trek: The Next Generation*. It is a multi-purpose vessel central to the series' narrative, featuring:
      - **Structural Threats**: Repeated crises from Invidium residue, warp core malfunctions, and systemic failures (e.g., requiring liquid nitrogen injections at -200°C).
      - **Key Facilities**: Includes the holodeck (for training with holographic crew members) and the warp core (managed by Engineering).
      - **Crew Dynamics**: Captain Picard, Commander Riker, Lieutenant Commander Data, Lieutenant Commander Geordi La Forge, and Lieutenant Reginald Barclay coordinate responses to crises, balancing personal duties with ship-wide emergencies.
      - **Mission Context**: Operates as a microcosm of Starfleet’s problem-solving ethos, with episodes highlighting crew ingenuity, leadership, and teamwork under pressure. The ship’s survival often hinges on high-stakes repairs (e.g., cargo bay operations) and the Computer Voice’s countdowns to collapse.
      - **Engineering Team**: Led by Geordi La Forge, this team collaborates under extreme pressure to diagnose and resolve catastrophic systems failures (e.g., during the Invidium contamination crisis in *Hollow Pursuits*).
  sphere_of_influence: Shipboard Security and Tactical Response; internal protection
