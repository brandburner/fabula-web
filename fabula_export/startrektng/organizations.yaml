- fabula_uuid: ger_organization_e57c7d702176
  global_id: ger_organization_e57c7d702176
  canonical_name: Enterprise Security Squad
  description: 'Enterprise Security Squad functions as the USS Enterprise’s on-board
    emergency response unit called upon to render immediate assistance during shipboard
    crises. In the processed material they appear only as an implied responder: Riker
    attempts to contact ‘security’ for emergency aid when assaulted, positioning the
    Squad as the designated rapid-rescue and containment resource under bridge authority
    and as a potential ally to medical and command personnel. Their absence from the
    scene highlights their role as out-of-shot tactical support whose mobilization
    would alter immediate rescue and containment options.'
  sphere_of_influence: Starship Internal Security and Emergency Response
