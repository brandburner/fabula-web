  global_id: ger_organization_c5adff0dd5f3
  canonical_name: Tripoli Landing Party
  description: The Tripoli Landing Party represents the original human colonists who
    first discovered the android Data on the barren planet Tripoli. This group uncovered
    Data alongside a mysterious signal device and left behind crucial logs and artifacts.
    Their urgent concealment of these discoveries beneath the harsh landscape reflects
    their determination to protect their legacy and the knowledge of Data’s origins.
    Though long gone, their actions drive the current investigation, revealing layers
    of mystery about the colonists’ fate and the genesis of Data’s existence.
  sphere_of_influence: Historical Human Colonization and Android Origins
  season_appearances:
