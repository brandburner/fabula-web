  episode_count: 1
- fabula_uuid: ger_organization_b37de7cda7ad
  global_id: ger_organization_b37de7cda7ad
  canonical_name: Romulan Warships
  description: Romulan Warships are state-directed Romulan naval vessels tasked with
    patrol, interdiction, and the projection of Romulan territorial interests. In
    the present material they are reported as the alleged attackers of the Enterprise‑C,
    responsible for severe battle damage and casualties. They operate as a coordinated
    military force that uses covert tactics and rapid strike actions to control contested
    space and force tactical responses from opposing fleets.
  sphere_of_influence: Interstellar Military Force and Border Interdiction
  season_appearances:
  - 3
  local_uuids:
    1: organization_473c097bfc82
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_8a724cedfb1c
  global_id: ger_organization_8a724cedfb1c
  canonical_name: Romulan-Klingon Alliance
  description: An **offensive military pact** between the Romulan Star Empire and
    the Duras family faction of the Klingon Empire, aimed at overthrowing Gowron and
    seizing power. Commanded by Sela and the Duras sisters (Lursa, B’Etor), it channels
    Romulan fleets to support Duras’ bid for the Klingon throne, directly opposing
    the Federation-Klingon Alliance.
  sphere_of_influence: Military Intervention in Klingon Civil War
  season_appearances:
  - 5
  local_uuids:
    1: org_be1277b2c4c0
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_2d175d558d29
  global_id: ger_organization_2d175d558d29
  canonical_name: Romulans / Romulan Empire
  description: The Romulan polity (commonly referenced as the Romulans or the Romulan
    Empire) is a sovereign, secrecy‑oriented, militarized interstellar state projecting
    power along the Neutral Zone through outposts, cloaked cruisers, and covert probes.
    In the material they appear as a strategic antagonist that employs clandestine
    technology and calibrated probing to test Federation responses and heighten geopolitical
    tension; diplomatic and military channels (e.g., Commander Tebok, Sub‑Commander
    Thei) indicate hierarchical command and conditional engagement rather than immediate
    open war.
  sphere_of_influence: Military operations and covert probing at the Neutral Zone;
    interstellar diplomacy and strategic threat projection
  season_appearances:
  - 1
  - 2
  local_uuids:
    1: organization_9d314d16b921
    2: organization_9d314d16b921
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3da33da1d80e
  global_id: ger_organization_3da33da1d80e
  canonical_name: Romulus
  description: Romulus sends a peace envoy to Vulcan under escort by three Vulcan
    ships that cross the Neutral Zone, tying into Ambassador Spock's reunification
    efforts. Enterprise crew members Worf, Riker, Geordi, and Troi suspect Romulan
    deception behind the vessels, citing historical tensions and the shaky peace with
    the Federation. Geordi fails to verify ship signatures, fueling distrust. Riker
    orders interception despite Picard's standing orders, highlighting Romulus's role
    in volatile interstellar diplomacy.
  sphere_of_influence: Romulan Diplomacy and Governance
  season_appearances:
  - 5
  local_uuids:
    1: org_c0851e7fe26e
  first_appearance_season: 5
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_8a303d099a11
  global_id: ger_organization_8a303d099a11
  canonical_name: Rossa Family
  description: Admiral Connaught Rossa invokes the Rossa Family as a Starfleet lineage
    committed to galactic peace. Tragedies like the deaths of Connor and Moira heighten
    its emotional pull. The family claims Jeremiah—raised as Jono by Talarians—as
    the last heir, demanding he embrace human heritage over adopted identity and fulfill
    inherited duties amid his crisis.
  sphere_of_influence: Starfleet Familial Legacy and Galactic Peace Service
  season_appearances:
  - 4
  local_uuids:
    1: org_aebd6185f8db
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_93130f82177c
  global_id: ger_organization_93130f82177c
  canonical_name: Royale Casino Staff
  description: The Royale Casino operates as a luxury casino-hotel that stages scripted
    gaming events and curates inhabitant behavior to enforce predetermined outcomes.
    Staffed by dealers and house operatives, the institution uses procedural rules,
    choreographed tempos, and controlled signals to manufacture narratives at gaming
    tables, shaping both social dynamics and investigatory evidence. In the processed
    material it functions as an antagonistic commercial venue whose practices conceal
    manipulation and serve as a focal point for undercover discovery and escape planning.
  sphere_of_influence: Commercial Gaming Operations and House Rule Enforcement; On‑floor
    Security and Payout Adjudication
  season_appearances:
  - 2
  local_uuids:
    1: organization_d47e20235c76
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1fc74637715e
  global_id: ger_organization_1fc74637715e
  canonical_name: Royale Room Service Protocol
  description: The Royale Room Service Protocol functions as the hotel’s automated
    housekeeping and civility-enforcement system. It places scripted telephone offers
    and courteous prompts to shape guest conduct, encodes ritual politeness as binding
    procedural rules, and initiates designated responses when occupants deviate. Acting
    as an instrument of the Royale’s internal logic, it weaponizes hospitality language
    to corral, punish, or redirect behavior within the environment.
  sphere_of_influence: Automated Hospitality Operations and Behavioral Control within
    the Royale Hotel Environment
  season_appearances:
  - 2
  local_uuids:
    1: organization_3b0e171d97fe
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_6c855bbf4174
  global_id: ger_organization_6c855bbf4174
  canonical_name: Ruling Council
  description: The Ruling Council functions as a formal, seat-based governing body
    that allocates political representation among competing clans and polities and
    adjudicates interclan disputes. In the current material it operates as an authoritative
    advisory organ whose judgments travel through senior agents (such as Admiral Haden)
    to influence Starfleet officers and captains. The Council issues risk assessments
    and credibility warnings, shapes diplomatic strategy, and stands at the center
    of high-stakes bargaining over influence, representation, and contested security
    incidents.
  sphere_of_influence: Interstellar Diplomacy and Governance; Political Adjudication
    and Advisory Authority
  season_appearances:
  - 3
  local_uuids:
    1: organization_18d8eec97826
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c5617cb50a0d
  global_id: ger_organization_c5617cb50a0d
  canonical_name: Rutian Emergency Services
  description: Rutian Emergency Services functions as the local first‑responder organization
    responsible for rapid medical aid, casualty extraction, and on‑scene crisis containment
    in Rutian civic spaces. In the current material they appear as an implied, arriving
    force—audible by wailing vehicles—serving as the municipal emergency responders
    who supplement plaza security and stabilize chaotic incidents.
  sphere_of_influence: Local Emergency Response, Medical Triage, and Crisis Management
  season_appearances:
  - 3
  local_uuids:
    1: organization_2516e401e18b
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_edec424edc83
  global_id: ger_organization_edec424edc83
  canonical_name: Rutian Government
  description: The Rutian Government operates as the planetary civil authority that
    administers law, custody, and diplomatic representation for Rutia. In this episode
    it appears as the oppressive political power the Ansata oppose and as the object
    of Finn's strategy to force concessions. It holds custody claims, controls local
    resources, and shapes external negotiation dynamics through formal and coercive
    channels.
  sphere_of_influence: Planetary Governance and Diplomatic Authority (local political
    control, custody, and negotiation leverage)
  season_appearances:
  - 3
  local_uuids:
    1: organization_243355496e4c
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_6b8108962931
  global_id: ger_organization_6b8108962931
  canonical_name: Rutian Local Authorities
  description: Rutian Local Authorities operate as the municipal law-enforcement and
    public-safety organization responsible for incident response within Rutian civic
    spaces. In the processed material they deploy uniformed officers to secure bomb
    sites, establish perimeters, clear plazas, and interact with visiting Starfleet
    personnel. Their operating logic privileges public order, scene control, and information
    containment, and their tactical methods include crowd management, cordoning, and
    questioning. They present as a local police apparatus with on-scene command and
    rank-driven decision-making.
  sphere_of_influence: Local Public Safety and Law Enforcement (Municipal/Rutian plaza
    security and crowd control)
  season_appearances:
  - 3
  local_uuids:
    1: organization_76938b945bd1
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_9c9cd54126e1
  global_id: ger_organization_9c9cd54126e1
  canonical_name: Rutian Medics
  description: Rutian Medics are local medical responders operating in the Rutian
    plaza, arriving to triage, stabilize, and treat civilians after an Ansata bomb
    detonation. They act as on-scene humanitarian first responders whose presence
    directly affects tactical decisions by visiting Starfleet personnel, prompting
    a delayed extraction to prioritize civilian care. The group appears municipal
    or volunteer in nature with no explicit hierarchical structure shown, focused
    on immediate lifesaving aid and coordination with nearby allied teams.
  sphere_of_influence: Local Emergency Medical Response and Civilian Triage
  season_appearances:
  - 3
  local_uuids:
    1: organization_b972a8efd3d5
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_7a74219e0c61
  global_id: ger_organization_7a74219e0c61
  canonical_name: Rutian Police
  description: The Rutian Police operate as the local planetary law-enforcement body
    responsible for maintaining public order on Rutia. In the processed material they
    enforce mass detentions, filling detention cells and rounding up civilians, and
    mobilize as an armed security force during an emergency blackout. They act in
    coordination with—or are perceived to be cooperating with—Federation/Starfleet
    authorities during crisis operations, and they intervene in violent confrontations,
    at times covering armed actors as those actors attempt to access weapons. The
    group's internal hierarchy is not shown; their methods emphasize rapid, forceful
    crowd control and tactical deployment.
  sphere_of_influence: Planetary/Local Law Enforcement and Public Security
  season_appearances:
  - 3
  local_uuids:
    1: organization_b78257519e85
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_2d72f14e1a4e
  global_id: ger_organization_2d72f14e1a4e
  canonical_name: Rutian Security
  description: Rutian Security serves as the city‑state’s primary political security
    apparatus, tasked with public order, protective details, crowd control, arrests,
    and crisis negotiation. On scene it deploys uniformed guards and a named Director
    (Alexana Devos) who exerts formal authority, coordinates with visiting Starfleet
    officers, constrains external responders, and directs detentions and political
    negotiations during incidents, blending law‑enforcement tactics with overt political
    control.
  sphere_of_influence: Local political security, law enforcement, protective services,
    and crisis management — with authority to shape diplomatic interactions and negotiate
    with interstellar actors.
  season_appearances:
  - 3
  local_uuids:
    1: organization_e6a67f4b8b94
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_f1b65b763f3a
  global_id: ger_organization_f1b65b763f3a
  canonical_name: Rutian Team
  description: Rutian Team operates as an external field sensor reconnaissance unit
    that monitors energetic anomalies and hostile movements. In the current material
    they detect a faint nuclear vibration tied to terrorist movements and supply the
    initial telemetry Geordi cites. Their role is allied observational support, relaying
    remote sensor data to Starfleet officers; no internal hierarchy or formal institutional
    affiliation is specified within the scene.
  sphere_of_influence: Field Sensor Reconnaissance and External Observational Support
  season_appearances:
  - 3
  local_uuids:
    1: organization_3d5faf4fdd20
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_84f750945f85
  global_id: ger_organization_84f750945f85
  canonical_name: Rutians
  description: Rutians operate as a local ethnopolitical community that functions
    both as a civilian population and an organized local authority. They receive medical
    supplies (including Federation instruments removed from local dispensaries), sustain
    civilian casualties in the conflict, and field guards or security personnel who
    detain suspects and enforce communal order. Narratively they occupy the opposing
    political side to agents like Finn and stand apart from official Federation alliances,
    serving as victims, civic defenders, and a focal point for contested legitimacy.
  sphere_of_influence: Local Political Community, Civil Authority, and Public Order
    (Regional Sociopolitical and Security Influence)
  season_appearances:
  - 3
  local_uuids:
    1: organization_c4f00313da37
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_9caa6ff9b5fa
  global_id: ger_organization_9caa6ff9b5fa
  canonical_name: Salenite Miners (of Pentarus Five)
  description: Salenite Miners of Pentarus Five work the planet's extraction sites,
    harvesting the critical mineral salenite essential to their operations. Deep divisions
    among members erupt into disputes that demand neutral mediation, pulling Captain
    Picard and Wesley Crusher from the Enterprise for an urgent intervention. Their
    volatile dynamics mark them as a key source of conflict in the sector.
  sphere_of_influence: Salenite Mining Operations and Labor Disputes
  season_appearances:
  - 4
  local_uuids:
    1: org_6642da11fd98
  first_appearance_season: 4
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0bbd5ebc65d0
  global_id: ger_organization_0bbd5ebc65d0
  canonical_name: Satarrans
  description: |-
    The Satarrans are a covert antagonist organization engaged in a hidden war against the Lysians. They deploy specialized agents (e.g., MacDuff) to infiltrate Starfleet crews, particularly aboard vessels like the USS Enterprise. Their modus operandi involves psychological manipulation, memory wipes, and engineered paranoia to deceive crews into executing false orders—such as destroying Lysian warships or Central Command targets. The Satarrans exploit mission uncertainties and interstellar tensions to advance their agenda, operating as a shadowy force that thrives on deception and misdirection. Their methods include:
      - **Infiltration**: Embedding agents (e.g., MacDuff) within Starfleet crews.
      - **Psychological Warfare**: Inducing paranoia and memory gaps to obscure their true motives.
      - **Strategic Deception**: Pushing for aggressive actions (e.g., attacking Lysian ships) under false pretenses.
      - **Exploitation of Conflict**: Leveraging existing tensions between the Lysians and Starfleet to achieve their goals.
  sphere_of_influence: Covert Military Manipulation and Interstellar Sabotage
  season_appearances:
  - 5
  local_uuids:
    1: org_59a4169a29d9
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_87f470178010
  global_id: ger_organization_87f470178010
  canonical_name: Saturn’s Navigational Control System
  description: Saturn’s Navigational Control System oversees spacecraft traffic near
    Saturn through satellite sensors that perform routine sweeps. It captured clear
    imagery of Nova Squadron flying in a non-standard formation seven seconds after
    their disputed Yeager loop maneuver near Titan. This evidence, presented during
    the Starfleet Academy inquiry by Captain Satelk, directly contradicted Nicholas
    Locarno’s testimony and the squadron members' accounts, forcing Wesley Crusher
    to confront the cover-up.
  sphere_of_influence: Planetary Navigational Monitoring and Spacecraft Surveillance
  season_appearances:
  - 5
  local_uuids:
    1: org_f8ccb1a36e8a
  first_appearance_season: 5
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_928b24478b34
  global_id: ger_organization_928b24478b34
  canonical_name: Savage Disguised Hostile Force
  description: A hostile force masquerading in antiquated French-style military uniforms
    but comprised of savage, non-human creatures. This entity operates as an antagonist
    threat, launching surprise attacks against away teams and employing deceptive
    appearances to mask its true nature, escalating conflicts with supernatural and
    tactical challenges.
  sphere_of_influence: Hostile Military Engagements and Deceptive Tactical Operations
  season_appearances:
  - 1
  local_uuids:
    1: organization_4de3446f79de
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_754009a8980d
  global_id: ger_organization_754009a8980d
  canonical_name: Science One
  description: Science One functions as a dynamic operational designation assumed
    by the Enterprise's science officer during critical anomaly reporting. Rather
    than a formal department, it represents a temporary bridge-to-engineering communication
    protocol where astrophysical observations demand immediate engineering response.
    Data invokes this callsign when sensors detect phenomena that defy conventional
    readings, establishing an urgent data relay channel between scientific analysis
    and technical diagnostics. The designation activates during moments when standard
    command hierarchies would delay essential information flow.
  sphere_of_influence: Bridge-Based Scientific Observation and Engineering Liaison
  season_appearances:
  - 2
  local_uuids:
    1: organization_676bb12d01c6
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_b78ea353a29a
  global_id: ger_organization_b78ea353a29a
  canonical_name: Science Station Tango Sierra
  description: Science Station Tango Sierra represents the Federation's bleeding-edge
    pharmaceutical research facility—a desperate fortress of science standing between
    galactic catastrophe and survival. This specialized station houses the biochemical
    expertise, viral synthesis protocols, and manufacturing capacity necessary to
    transmute deadly plague samples into humanity's salvation. The installation operates
    under the highest clearance protocols, functioning as both research crucible and
    production facility where 512 plague modules will undergo transformation into
    millions of life-saving antidote doses. The station's urgency permeates every
    deck, every lab, every breath—aware that the Enterprise races toward them carrying
    not just samples, but the compressed weight of entire civilizations' survival.
  sphere_of_influence: Biomedical Research and Viral Countermeasure Production
  season_appearances:
  - 2
  local_uuids:
    1: organization_b777974d0805
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_afab533b863b
  global_id: ger_organization_afab533b863b
  canonical_name: Science Vessel Crew of S.S. Tsiolkovsky
  description: The Science Vessel Crew of S.S. Tsiolkovsky comprises the personnel
    aboard the research ship S.S. Tsiolkovsky, engaged in scientific exploration and
    data gathering in deep space. They become central to an emergent crisis when their
    vessel emits chaotic distress transmissions, culminating in an explosion and apparent
    loss of life, prompting an urgent investigation and rescue operation by the Enterprise.
  sphere_of_influence: Deep Space Scientific Exploration and Emergency Response
  season_appearances:
  - 1
  - 2
  local_uuids:
    1: organization_de42954eb8c8
    2: organization_de42954eb8c8
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_d2b2d86bdf6b
  global_id: ger_organization_d2b2d86bdf6b
  canonical_name: Scientific Community
  description: Reyga faces skepticism and prejudice from the Scientific Community
    over his metaphasic shield, rooted in his Ferengi identity. Beverly Crusher identifies
    jealousy, citing Dr. T’Pan's attitude as emblematic. This group resists unproven
    innovations from outsiders, blocking acceptance despite potential breakthroughs.
    Beverly faults their closed-mindedness, which isolates Reyga and heightens tensions
    around his test.
  sphere_of_influence: Scientific Peer Review and Technology Validation
  season_appearances:
  - 6
  local_uuids:
    1: org_08349a72a31e
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3b77ae779d26
  global_id: ger_organization_3b77ae779d26
  canonical_name: Scientists of Bilana Three
  description: Scientists of Bilana Three pioneer propulsion innovations, chief among
    them the Soliton Wave—a breakthrough method to propel starships inside a stable
    energy wave generated by an accompanying vessel. They orchestrate early tests
    of this technology and extend invitations to Starfleet ships like the Enterprise
    for observation and participation. Their work promises to transform interstellar
    travel by enabling safer, faster journeys through hazardous nebulae and contested
    space, marking a historic leap akin to Zefram Cochrane's warp drive.
  sphere_of_influence: Experimental Propulsion Technology Development
  season_appearances:
  - 5
  local_uuids:
    1: org_0a7202fcefe8
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_034d63404298
  global_id: ger_organization_034d63404298
  canonical_name: Sector Relief and Salvage Task Force
  description: An ad‑hoc coalition of external vessels in the local sector mobilized
    to support an urgent salvage and relief operation. Under tactical direction from
    Riker and vectored by Worf, these ships rendezvous with the Enterprise to provide
    reinforcement, towing, and salvage capabilities aimed at moving a rogue ferrous
    moon. The group operates as a pragmatic, mission‑focused task force coordinating
    with Enterprise command to augment tractor‑beam power and manpower during the
    emergency.
  sphere_of_influence: Interstellar Emergency Salvage and Sector‑Level Relief Operations
  season_appearances:
  - 3
  local_uuids:
    1: organization_3304225c85a2
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_401d4a6296fd
  global_id: ger_organization_401d4a6296fd
  canonical_name: Sector Twenty-Three
  description: Sector Twenty-Three functions as a Starfleet administrative jurisdiction
    that houses regional offices and legal authorities, including the Judge Advocate
    General office occupied by Phillipa Louvois. It serves as a bureaucratic locus
    for personnel records, administrative oversight, and regional legal adjudication
    within Starfleet’s hierarchical structure, anchoring individual officers to institutional
    command channels and procedural authority.
  sphere_of_influence: Starfleet Regional Administration and Military Legal Authority
  season_appearances:
  - 2
  local_uuids:
    1: organization_4df64f99f06b
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_a2aa07240419
  global_id: ger_organization_a2aa07240419
  canonical_name: Security Team Two
  description: Security Team Two functions as a specialized security unit aboard the
    starship, tasked with maintaining order, overseeing shipboard investigations,
    and responding swiftly to emergent threats. Their role becomes critical when they
    discover a blood puddle and a missing delegate near the Selay Quarters, signaling
    their active involvement in crisis detection, internal security, and investigative
    operations during high-stakes diplomatic missions.
  sphere_of_influence: Starship Security and Crisis Response
