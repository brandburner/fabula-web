  global_id: ger_organization_42b210f7ef38
  canonical_name: Federation Colony, Galen Four
  description: Federation Colony, Galen Four operates as a civilian outpost in Federation
    space. Jeremiah Rossa was born there, and his parents died in a Talarian raid
    that orphaned him. The colony anchors his backstory, exposing vulnerabilities
    of frontier settlements to external attacks. Crew discussions link the raid's
    trauma to Jeremiah's resistance toward women and need for male mentorship, underscoring
    the colony's role in shaping personal histories amid interstellar conflicts.
  sphere_of_influence: Federation Frontier Settlement
