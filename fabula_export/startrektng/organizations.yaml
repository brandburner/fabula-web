  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_d2718a2d0c75
  global_id: ger_organization_d2718a2d0c75
  canonical_name: Government of Angosia
  description: Angosia's sovereign government, represented here by Nayrok, asserts
    diplomatic and security authority over criminal custody and cross-border incidents.
    It pursues formal custody claims, exerts political pressure on visiting starships,
    and relies on diplomatic channels and implied security forces to protect national
    interests and enforce its laws.
  sphere_of_influence: Sovereign Governance, Interstellar Diplomacy, and Security/Custody
    Enforcement
  season_appearances:
  - 3
  local_uuids:
