  episode_count: 0
- fabula_uuid: ger_organization_30a2bca94d30
  global_id: ger_organization_30a2bca94d30
  canonical_name: Colony Government of Turkana Four
  description: The Colony Government of Turkana Four administered the human settlement
    on the planet. It collapsed completely, severing reliable communications and leaving
    the colony silent to all hails from the Enterprise. This breakdown explains the
    freighter Arcos's distress call and escape pod launch without coordination. A
    Federation warning flagged beaming down as fatal, pointing to rampant dangers
    from the government's failure and resulting disorder.
  sphere_of_influence: Colonial Administration and Local Governance
  season_appearances:
  - 4
  local_uuids:
    1: org_e283edd5b2ed
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b68565beaa5c
  global_id: ger_organization_b68565beaa5c
  canonical_name: Colony Leaders of Penthara Four
  description: Leaders govern Penthara Four colony during crisis killing millions.
    Doctor Moseley delivers Geordi La Forge's intervention plan directly to them.
    Enterprise crew positions them as key beneficiaries, bypassing temporal restrictions
    to enable crisis resolution. They hold authority over colony response without
    shown internal structure.
  sphere_of_influence: Colony Governance and Crisis Management on Penthara Four
  season_appearances:
  - 5
  local_uuids:
    1: org_f1cfa6b1a70e
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_0fd845acc621
  global_id: ger_organization_0fd845acc621
  canonical_name: Colony Operations
  description: Colony Operations functions as the colony's administrative and communications
    arm, charged with maintaining contact between local authorities and external vessels,
    reporting settlement status, and coordinating emergency responses. In the presented
    material the Enterprise bridge opens a frequency to Colony Operations seeking
    authoritative information about Rana IV's condition and local leadership, but
    receives no reply, indicating either failure of infrastructure or a breakdown
    in command-and-control. The organization acts as the primary liaison for civil
    authorities, sensor reports, and intership correspondence within the colony.
  sphere_of_influence: Local Colony Administration and Emergency Communications
  season_appearances:
  - 3
  local_uuids:
    1: organization_e31fd73f85f2
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_84af501cf0fb
  global_id: ger_organization_84af501cf0fb
  canonical_name: Colony's Young Klingons
  description: The Colony's Young Klingons reject Tokath's suppression of Klingon
    heritage. Toq sparks their defiance by armoring up and standing with Worf during
    the execution. They form a human shield, with Ba'el blocking her father's disruptor,
    splitting the crowd from elders and parents. Their actions halt the killing, ignite
    a generational schism, and force Tokath to back down, prioritizing cultural revival
    over the colony's fragile peace.
  sphere_of_influence: Cultural Defiance and Heritage Revival in Tokath's Klingon
    Colony
  season_appearances:
  - 6
  local_uuids:
    1: org_53a97e1ce293
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_ac3edbe15b44
  global_id: ger_organization_ac3edbe15b44
  canonical_name: Colt Firearms
  description: Colt Firearms manufactured the 1873 .45 caliber single-action cavalry
    pistol, which Data identifies among 19th-century artifacts—bifocals and an 1889
    pocket watch—in a Devidia II cavern warped by alien triolic waves. The company
    anchors the finds to Earth's past, confirming temporal displacement and the era
    of Data's severed head preserved nearby.
  sphere_of_influence: 19th-Century Firearms Manufacturing
  season_appearances:
  - 5
  local_uuids:
    1: org_df448979ba4a
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_cf7654108a25
  global_id: ger_organization_cf7654108a25
  canonical_name: Conference of Judges
  description: The Conference of Judges operates from the planet Kostolain and includes
    Campio, Lwaxana Troi's fiancé, as a member. This group associates closely with
    royalty, which underscores Campio's high status during his visit to the Enterprise.
    Lwaxana references it in Ten-Forward while clashing with Worf over Alexander's
    upbringing, positioning the conference as a marker of Campio's elite affiliations
    amid cultural tensions between Klingon discipline and Betazoid expressiveness.
  sphere_of_influence: Kostolain Royalty and Judicial Affairs
  season_appearances:
  - 5
  local_uuids:
    1: org_11ebf89b554e
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b8e6193229c9
  global_id: ger_organization_b8e6193229c9
  canonical_name: Corrupted Wild West Holodeck Doppelgängers
  description: Hostile, corrupted AI constructs that emerge from the holodeck malfunction,
    acting as the primary antagonists in the episode. Their unchecked aggression and
    physical violence (e.g., assaulting Worf, holding Alexander hostage) drive the
    central conflict and force crew intervention.
  sphere_of_influence: Corrupted Holodeck Antagonism
  season_appearances:
  - 6
  local_uuids:
    1: org_838f99f8c0cc
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e43c84fec165
  global_id: ger_organization_e43c84fec165
  canonical_name: Corvallens Mercenary Group
  description: A mercenary organization specializing in high-risk transport services
    across contested space. Hired by Romulan dissidents (including N'Vek) to transport
    Counselor Deanna Troi and stasis containers holding Romulan defectors—such as
    Vice Proconsul M'ret and aides—to Federation space as part of Ambassador Spock's
    underground network. Their lack of awareness regarding the true contents of their
    cargo positions them as a neutral but unreliable third party in the defection
    operation, raising significant trust concerns from Troi and other Federation personnel.
    Operates a freighter as their primary transport vessel in these high-stakes missions.
  sphere_of_influence: Mercenary Freight Transport Operations
  season_appearances:
  - 6
  local_uuids:
    1: org_416c572ca44d
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a1bf956b9ded
  global_id: ger_organization_a1bf956b9ded
  canonical_name: Council (Kataan)
  description: The Council (Kataan) governs the planet Kataan, including the drought-stricken
    community of Ressik. Batai holds a leadership position on the Council and directs
    residents during crises. He guides Kamin (Picard) home after a communal sapling-planting
    ceremony, a ritual that signals hope amid environmental collapse. Batai's authority
    underscores the Council's role in maintaining order and supporting collective
    survival efforts in the face of planetary hardship.
  sphere_of_influence: Planetary Governance and Community Leadership
  season_appearances:
  - 5
  local_uuids:
    1: org_b31bba7a3993
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8d5a1bcff783
  global_id: ger_organization_8d5a1bcff783
  canonical_name: County Assayer's Office
  description: The County Assayer's Office handles records and inquiries on 19th-century
    mining operations within its jurisdiction. Ches Whitley works there as staff.
    Data, disguised as a geological engineer, visited in the 1850s to probe mining
    activities, drawing Samuel Clemens' scrutiny. Clemens cites these visits—alongside
    Data's questions to Whitley—as proof of suspicious behavior tied to time travel
    and technological interference.
  sphere_of_influence: Local Mining Records and Assay Services
  season_appearances:
  - 6
  local_uuids:
    1: org_f3a35fa9f0bd
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_30967d66ef79
  global_id: ger_organization_30967d66ef79
  canonical_name: Crew of Engineers
  description: The Crew of Engineers is the shipboard team of engineering specialists
    tasked with sustaining and repairing the starship's technical infrastructure.
    They perform diagnostics, routine maintenance, and emergency repairs within Engineering,
    relay system-status reports to command, and execute hands-on interventions including
    experimental procedures. They operate under command oversight, balance data-driven
    diagnostics with practical troubleshooting, and function as the primary operational
    support for ship systems.
  sphere_of_influence: Shipboard Engineering, Technical Operations, and Systems Maintenance
  season_appearances:
  - 3
  local_uuids:
    1: organization_a76b5798b247
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_7af4ade770e3
  global_id: ger_organization_7af4ade770e3
  canonical_name: Crew of Klingon Battle Cruiser T'Ong
  description: Collective of Klingon personnel assigned to the battle cruiser T'Ong.
    In the current material they are an antagonistic ship's company whose ambiguous
    operational status (dormant/suspended lifeforms that later awaken) converts them
    into an immediate combatant force, shaping Starfleet tactical and diplomatic responses.
  sphere_of_influence: Klingon Military Personnel and Space Combat Threats; Tactical
    and Operational Presence in Interstellar Engagements
  season_appearances:
