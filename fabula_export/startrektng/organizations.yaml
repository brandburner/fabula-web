  global_id: ger_organization_0bc54cc72fba
  canonical_name: Enterprise's Attack Force
  description: A specialized Starfleet tactical unit deployed from the USS *Enterprise-D*
    to intercept Maquis convoys near the Demilitarized Zone. Operates under direct
    command of Captain Picard, Lieutenant Worf, and Commander Data, with a focus on
    avoiding friendly fire during engagements.
  sphere_of_influence: Starfleet Tactical Interdiction Operations
