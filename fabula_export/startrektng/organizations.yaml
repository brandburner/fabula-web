  description: A Romulan military warbird element representing the Romulan Star Empire's
    armed forces in this encounter. The vessel performs aggressive border-enforcement
    and power-projection actions—crossing the Neutral Zone, pursuing a scout, and
    inflicting damage that creates a humanitarian crisis. Observed methods include
    pursuit, threatening posture, and engagement that severs communications. Hierarchy
    is implied as a state naval/military asset acting in opposition to the Federation
    and directly causing the episode's central conflict.
