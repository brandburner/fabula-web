- fabula_uuid: ger_organization_3bfe51cc95a7
  global_id: ger_organization_3bfe51cc95a7
  canonical_name: Prytt Alliance (Faction of Kesprytt Three)
  description: The Prytt Alliance (also referred to as 'Prytt,' 'Prytt Government,'
    or 'Prytt Security Ministry') is the reclusive, xenophobic faction on Kesprytt
    Three that controls shielded territory blocking Enterprise sensors. As the ruling
    government, they enforce strict isolationist policies through a **Security Ministry**
    led by Minister Lorin, which detains Federation personnel (e.g., Picard and Crusher)
    on charges of conspiring with the Kes. The Ministry employs invasive methods,
    including neural implants (transceivers) to extract thoughts/memories, armed guards
    in dark prison cells, and severed communications to enforce control. Additionally,
    the Alliance deploys advanced technology such as tractor beams generating antigraviton
    particles to sabotage transporters, diverting Picard and Crusher mid-beam and
    causing their disappearance. Their actions—ranging from psychological intrusion
    to military threats—mark them as deliberate antagonists. The Federation's exclusion
    of Prytt from integration plans, in favor of the progressive Kes faction, forces
    reliance on Ambassador Mauric as an intermediary and heightens Picard's moral
    dilemma.
  sphere_of_influence: Shielded Territorial Control and Hostile Interference Operations
  season_appearances:
  - 7
  local_uuids:
    1: org_b03bf3420946
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_92f26e6c92c7
  global_id: ger_organization_92f26e6c92c7
  canonical_name: Q's Conjured Mariachi Band
  description: An ephemeral musical ensemble conjured and controlled directly by Q
    to serve as a theatrical device and psychological instrument. The troupe materializes
    and dissolves at Q's command, providing celebratory spectacle, emotional modulation,
    and narrative misdirection aboard the Enterprise. It has no independent hierarchy
    or persistence, functions solely as an extension of Q's will, and interacts with
    crew members to shape mood, humanize an android, and underline Q's capricious
    authority.
  sphere_of_influence: Theatrical Conjuration, Emotional Modulation, and Psychological
    Influence aboard Starfleet Vessels
