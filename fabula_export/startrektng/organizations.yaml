- fabula_uuid: ger_organization_23171bf50e84
  global_id: ger_organization_23171bf50e84
  canonical_name: Zhukov Science Teams
  description: Five science teams from the USS Zhukov beamed aboard the Enterprise
    to advance the Phoenix Cluster mission's research objectives. Their sudden arrival
    overloads ship resources and compresses the five-week schedule into two weeks.
    Picard and Riker coordinate accommodations amid operational strain. These teams
    bolster the joint Starfleet effort, integrating with Enterprise personnel like
    Data and Worf for data collection and analysis.
  sphere_of_influence: Extragalactic Research Expeditions
  season_appearances:
