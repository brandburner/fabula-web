  global_id: ger_organization_7aca308fe84f
  canonical_name: Tsiolkovsky Crew
  description: The Tsiolkovsky Crew represents the personnel aboard the starship Tsiolkovsky
    who fell victim to a deliberate sabotage resulting in catastrophic decompression
    and environmental control failures. This tragedy led to multiple crew members
    freezing to death in space, marking them as central victims in a sinister plot
    that escalates tensions and threatens the broader starship community.
  sphere_of_influence: Starship Operations and Crew Welfare
