  episode_count: 1
- fabula_uuid: ger_organization_06399ee5e225
  global_id: ger_organization_06399ee5e225
  canonical_name: The Court (Judicial Tribunal)
  description: The Court acts as the formal judicial tribunal charged with adjudicating
    legal disputes and declaring the legal status of entities brought before it. Presided
    over by Judge Phillipa in this matter, it assembles counsel, witnesses, and expert
    testimony, evaluates competing legal and moral claims, and issues binding rulings
    — here overturning a property framing and declaring that Data, while a machine,
    is not property, thereby establishing a precedent for artificial personhood and
    reshaping legal treatment of synthetic life.
  sphere_of_influence: Judicial Adjudication and Legal Determinations on Personhood
    and Property
  season_appearances:
  - 2
  local_uuids:
    1: organization_c9ba549b387f
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_65bea48b105f
  global_id: ger_organization_65bea48b105f
  canonical_name: The Elected One
  description: The Elected One represents the highest matriarchal authority on Angel
    One, embodied by Beata, who exercises political and social control over the planet's
    governance. This leadership figure commands local agents, such as Trent, to enforce
    summons and maintain order, embodying the cultural sovereignty and hierarchical
    power structure that governs Angel One society. The Elected One's role intersects
    with external entities like Starfleet, creating a tense diplomatic dynamic during
    critical events.
  sphere_of_influence: Planetary Governance and Matriarchal Authority on Angel One
  season_appearances:
