  global_id: ger_organization_32505cb57c49
  canonical_name: The Warship (Homicidal Spaceship)
  description: An autonomous, lethal spaceborne combat vessel that has returned to
    the system after previously confronting the Enterprise. It functions as the immediate
    antagonist force, capable of direct violent engagement and implicated in causing
    psychic trauma to nearby individuals. Its internal hierarchy and provenance remain
    unknown, presenting as a single hostile platform used to justify orbital containment
    and defensive posture.
