- fabula_uuid: ger_organization_d8b0062db902
  global_id: ger_organization_d8b0062db902
  canonical_name: The Continuum (Q Continuum)
  description: An extracosmic collective of omnipotent beings that functions as a
    social, judicial, and supervisory authority for its members. It exercises disciplinary
    power—exiling or stripping an individual of abilities—and monitors anomalous conduct.
    The Continuum adjudicates breaches of its norms through internal superiors and
    agents, exerts bureaucratic oversight that its members fear, and influences events
    indirectly by restoring or withholding powers to manage reputational and procedural
    consequences.
  sphere_of_influence: Cosmic-Level Judicial and Social Governance over Omnipotent
    Entities (Q), including disciplinary enforcement and oversight of member conduct
  season_appearances:
