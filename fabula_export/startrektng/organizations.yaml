  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_42ed37541433
  global_id: ger_organization_42ed37541433
  canonical_name: Klingon Survivors
  description: The Klingon Survivors constitute a group of Klingon individuals recently
    rescued from a perilous situation deep within the Batris corridor, where debris
    blockade threatened their safety. They represent a vulnerable contingent transitioning
    from battlefield peril to recovery and cultural crisis management aboard the Enterprise.
    Their survival and welfare have become a focal point for Starfleet officers, notably
    Captain Picard and Lieutenant Worf, who demonstrate both medical oversight and
    diplomatic engagement. This group acts as a symbol of Klingon endurance amid adversity
    and a nexus for unresolved tensions between Klingon culture and Federation protocols.
  sphere_of_influence: Survivor Recovery and Emergency Evacuation Operations within
    Interstellar Crisis Zones
  season_appearances:
  - 1
  local_uuids:
    1: organization_fb4916f4fced
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_035703f6f4ef
  global_id: ger_organization_035703f6f4ef
  canonical_name: Klingon Transport Ship
  description: 'Klingon-affiliated vessel involved in the handover of Vulcan artifacts
    to Baran''s mercenary ship in the Hyralan Sector, directly tied to the assassination
    plot against Picard in *Star Trek: The Next Generation* S7E5 (*Gambit, Part II*).'
  sphere_of_influence: Interstellar Artifact Transport and Logistical Support
  season_appearances:
