  global_id: ger_organization_43ec2e13e9f5
  canonical_name: Planetary Evolution Team
  description: The Planetary Evolution Team serves as a specialized scientific unit
    aboard the Enterprise, dedicated to planetary development studies. Team members
    demand priority access to the thermal imaging array amid the ship's crisis, clashing
    with stellar physicists over this shared resource. Data reports their dispute
    to the bridge crew, where Geordi suggests flipping a coin for resolution, exposing
    fraying cooperation among Enterprise departments.
