- fabula_uuid: ger_organization_c7f3eb14c84e
  global_id: ger_organization_c7f3eb14c84e
  canonical_name: USS Brattain (Starfleet)
  description: The USS Brattain was a Starfleet starship that encountered catastrophic
    psychological collapse while trapped in the Tyken’s Rift. Its crew succumbed to
    extreme isolation, sleep deprivation, and paranoia, leading to violent mutiny,
    self-inflicted deaths, and mass madness. Autopsies confirmed widespread psychological
    trauma, and the sole survivor, Andrus Hagan (a catatonic Betazoid science advisor),
    provided fragmented telepathic insights into the rift’s horrors. The ship’s fate
    became a cautionary symbol—Gillespie later invoked it to warn against repeating
    the Brattain’s tragic collapse under similar conditions, while the *Enterprise*
    investigated the rift’s shared hallucinations and crew deterioration as a direct
    consequence of the Brattain’s disaster.
  sphere_of_influence: Starfleet Exploration and Scientific Operations
  season_appearances:
  - 4
  local_uuids:
