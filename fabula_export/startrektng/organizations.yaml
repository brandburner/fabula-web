  global_id: ger_organization_0dceef2dc30d
  canonical_name: Enterprise-class Vessels (Past, Present, Future)
  description: Collective of three Enterprise-class starships (past, present, and
    future timelines) operating in synchronized formation to breach the Devron anomaly.
    Focuses on **ship-wide technical challenges**, **multi-vessel coordination**,
    and **physical distortions** (e.g., warp shell overlaps, core breaches) rather
    than individual crew dynamics.
  sphere_of_influence: Starfleet Multitemporal Starship Coordination and Anomaly Containment
