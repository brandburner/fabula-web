  global_id: ger_organization_8aca73f19b98
  canonical_name: Caldos Colony
  description: 'A fully developed terraforming colony in the *Star Trek* universe,
    featured in *Star Trek: The Next Generation* (S07E14, ''Sub Rosa''). Governed
    by Governor Maturin, it is tied to technical crises (weather control systems),
    cultural heritage (Scottish design), and interactions with the *Enterprise-D*
    crew (Picard, Crusher, Troi).'
  sphere_of_influence: Federation Terraforming and Colonial Administration
