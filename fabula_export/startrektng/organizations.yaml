- fabula_uuid: ger_organization_395b59305233
  global_id: ger_organization_395b59305233
  canonical_name: Central Province (Malcor III)
  description: Central Province operates as a regional administrative division on
    Malcor III, integral to the planet's decentralized political structure. Durken
    lists a delegate meeting at 4.3 in his schedule, confirming direct engagement
    between provincial representatives and the Chancellor on governance matters. This
    setup reveals Durken's broad oversight of subnational entities, blending routine
    bureaucracy with higher diplomacy amid emerging crises.
  sphere_of_influence: Regional Political Administration on Malcor III
  season_appearances:
