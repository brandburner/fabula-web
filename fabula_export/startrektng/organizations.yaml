  description: A **sentient species specializing in psychological warfare and neuro-somatic
    energy extraction**, operating **multiple manipulation systems** (including the
    Tilonian Hospital/Asylum) across Starfleet targets. Led by Administrator Suna,
    they deploy **broad-scale abductions, neural damage, and fabricated realities**
