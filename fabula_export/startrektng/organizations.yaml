  canonical_name: Angosian Police Force
  description: 'The Angosian Police Force functions as the planet’s primary law‑enforcement
    body responsible for public order, counter‑terror response, and civic policing.
    In the present material they appear as both information source and instrument
    of state action: their activity feeds into executive briefings, their records
    and recovered devices supply investigative leads, and uniformed officers execute
    mass ID checks, round‑ups, and detentions in public spaces. They operate alongside
    and under municipal authorities, coordinating with executive security while also
    serving as an explicit target and casualty locus in the wider political conflict.'
  sphere_of_influence: Planetary Law Enforcement and Internal Security (public order,
    counter‑terror operations, civic policing)
  season_appearances:
  - 3
  local_uuids:
    1: organization_614c48284dc7
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0b858f95d4fc
  global_id: ger_organization_0b858f95d4fc
  canonical_name: Angosian Security
  description: Angosian Security functions as the Republic of Angosia’s internal security
    and custodial authority, enforcing state sovereignty, reclaiming detainees, and
    shutting down external intervention. It acts on direct orders from the prime minister,
    dispatches transport assets to seize prisoners, and asserts jurisdiction to terminate
    diplomatic debate. Observed methods include rapid retrieval operations, custodial
    transfer, and leveraging political authority to compel compliance from foreign
    vessels. Its role in the material positions it as an antagonist custodial power
    that frames humanitarian options as matters of domestic law and national security.
  sphere_of_influence: State Internal Security and Custodial Enforcement (Angosia)
    — Domestic sovereignty, prisoner retrieval, and custody operations
  season_appearances:
  - 3
  local_uuids:
    1: organization_912843446ecb
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_3f1c315b928d
  global_id: ger_organization_3f1c315b928d
  canonical_name: Angosian Senate
  description: The Angosian Senate operates as Angosia's central legislative authority,
    responsible for hosting diplomatic delegations, framing national policy, and adjudicating
    contentious domestic programs. Senators convene in a rotunda under a Prime Ministerial
    leadership, deploy security measures, and make decisions affecting veterans, resettlement
    policy, and the state's moral accountability to petitioners and the populace.
  sphere_of_influence: National Legislative Governance and Public Policy (Civil Affairs,
    Veteran Resettlement, Domestic Security)
  season_appearances:
  - 3
  local_uuids:
    1: organization_58d021b76fc3
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_428e198a0657
  global_id: ger_organization_428e198a0657
  canonical_name: Angosian Society
  description: The Angosian Society operates as Angosia's prevailing social and political
    authority that defines acceptable behavior, designates threats, and enforces penalties.
    In the provided material it appears implicated in systemic conditioning—using
    counselors to recruit and groom volunteers—and in justifying the detention of
    returned agents by labeling them dangers. The society exerts both informal social
    control and formalized coercive influence over incarceration and public narratives,
    creating tensions with external authorities such as Starfleet.
  sphere_of_influence: Planetary Social Governance, Judicial Authority, and Political
    Influence (Angosia)
  season_appearances:
  - 3
  local_uuids:
    1: organization_8bf2b80561f0
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_7b3c382e7710
  global_id: ger_organization_7b3c382e7710
  canonical_name: Angosian Transport (Angosia)
  description: An Angosian-operated transport vessel and its diplomatic delegation
    from Angosia, observed as the immediate recipient of fugitive Roga Danar. The
    organization functions as a transport and diplomatic carrier providing extraterritorial
    harboring and reception; its onboard hierarchy includes a named representative
    (Wagnor), officers, and crew. Its activities in this event convert a security
    pursuit into a political and containment crisis.
  sphere_of_influence: Interstellar Transport and Diplomatic Reception; extraterritorial
    harboring with political/diplomatic implications
  season_appearances:
  - 3
  local_uuids:
    1: organization_c191b3c0393e
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_765a886c451a
  global_id: ger_organization_765a886c451a
  canonical_name: Ansata
  description: Ansata operates as a fanatical separatist insurgency that employs terrorism
    and covert inter‑dimensional technology to pursue political ends. On record here
    the group claims responsibility (or is widely suspected) for bombings, kidnappings
    and mass casualty attacks, uses a scanner‑defying armband/inverter that enables
    dimensional jumps, and accepts sacrificial martyrdom among its ranks. Ansata maintains
    clandestine subterranean bases, cultivates sympathizers and demonstrators, and
    fields both adult operatives and indoctrinated youth. Its methods blend guerrilla
    violence, sabotage, and high‑risk experimental transit tech that maims users,
    placing it in direct antagonism with local authorities and Starfleet investigators.
  sphere_of_influence: Separatist Insurgency, Terrorism, and Interdimensional Sabotage
  season_appearances:
  - 3
  local_uuids:
    1: organization_f3158346f6be
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_18ea77e2fe67
  global_id: ger_organization_18ea77e2fe67
  canonical_name: Antedian Delegation
  description: A delegation from the world Antedia that masquerades as diplomatic
    envoys while operating as a covert assassination cell. Members present aboard
    the Enterprise appear as hooded delegates but conceal ultritium explosives in
    their robes, prepared for suicide attacks to sabotage a peace mission. Organizationally
    they operate as a small, compartmentalized strike group embedded within a formal
    diplomatic cover, employing deception, infiltration, and sacrificial tactics to
    achieve political disruption against rival parties and Federation intermediaries.
  sphere_of_influence: Covert assassination operations and diplomatic sabotage within
    interstellar diplomatic exchanges
  season_appearances:
  - 2
  local_uuids:
    1: organization_f6526d3d07be
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_fdfd711fd9a1
  global_id: ger_organization_fdfd711fd9a1
  canonical_name: Antican Delegation
  description: The Antican Delegation represents a carnivorous alien species known
    for their hostile relations with the Selay species. Recently beamed aboard the
    USS Enterprise during a Federation peace mission, they serve as a critical source
    of diplomatic tension. Marked by deep-seated hostility and mutual suspicion, the
    Anticans embody a significant obstacle to peace efforts, their presence fueling
    volatile confrontations that challenge the Enterprise crew's role as mediators.
    Their status as Federation candidates adds complexity to the fragile negotiations,
    embodying deep-seated enmity that complicates interstellar negotiations and threatens
    fragile alliances.
  sphere_of_influence: Galactic Politics
  season_appearances:
  - 1
  local_uuids:
    1: organization_e107e8a597c5
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_4c79c3af4b69
  global_id: ger_organization_4c79c3af4b69
  canonical_name: Arabs
  description: An ethnic and cultural community invoked here through a single traditional
    proverb about the horse — "Allah gathered the south wind and made the horse."
    Within the processed material the Arabs operate as a repository of oral legend
    and symbolic authority, supplying mythic resonance and cultural texture rather
    than organizational structure, hierarchy, or active agency in events.
  sphere_of_influence: Cultural Traditions and Folklore (Arabic Cultural Heritage
    and Oral Legend)
  season_appearances:
  - 2
  local_uuids:
    1: organization_2e18e336954c
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_569e1fab48ae
  global_id: ger_organization_569e1fab48ae
  canonical_name: Archaeologists
  description: Archaeologists function as the expeditionary survey team that identify
    Koinonian markings and relay those findings directly to the bridge, triggering
    command-level decisions. They perform on-site cultural and material analysis,
    act as a primary information source for the starship’s mission planners, and operate
    as a coordinated field unit rather than a formalized military command, shaping
    the immediate tactical and investigative response.
  sphere_of_influence: Archaeological Survey, Field Research, and Expeditionary Information
    Support
  season_appearances:
  - 3
  local_uuids:
    1: organization_814a3a77f651
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1704efd6f76b
  global_id: ger_organization_1704efd6f76b
  canonical_name: Archaeology Council
  description: The Archaeology Council credentials professionals in archaeological
    pursuits, positioning members like Vash to join excavations such as those on Tagus
    III. Picard probes Vash's membership, prompting her evasive 'more or less' reply
    that casts doubt on her true allegiance. She leverages the affiliation to explain
    her Enterprise presence, suggesting the council functions as both legitimate authority
    and potential pretext amid professional and personal tensions.
  sphere_of_influence: Archaeological Research and Professional Accreditation
  season_appearances:
  - 4
  local_uuids:
    1: org_1082be9a9754
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8082cbe128c0
  global_id: ger_organization_8082cbe128c0
  canonical_name: Archaeology Officers
  description: A small specialist contingent of shipboard archaeology officers assigned
    to the vessel as scientific personnel. In the processed material they appear as
    non-medical crewmembers who observe and stand witness during a medical emergency,
    suggesting duties in cultural research, artifact study, and consultative roles
    aboard missions. Their hierarchy and broader institutional affiliations remain
    unspecified in the scene; they function here primarily as specialist witnesses
    and part of the ship’s scientific complement.
  sphere_of_influence: Shipboard Archaeology and Cultural Research; Scientific Specialist
    Support aboard Starfleet Vessels
  season_appearances:
  - 3
  local_uuids:
    1: organization_1f6fc77c2c71
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_e8f07036e2ed
  global_id: ger_organization_e8f07036e2ed
  canonical_name: Arcos Crew
  description: The Arcos crew consists of missing Federation crewmen stranded on the
    lawless planet Turkana IV. Their rescue drives the Enterprise away team's primary
    mission objective. Riker overrides Worf's safety concerns for Dr. Crusher by stressing
    the crewmen's potential need for immediate medical aid amid threats like rape
    gangs and violence. The team beams down armed with phasers set to maximum stun
    to locate and extract them.
  sphere_of_influence: Stranded Federation Personnel Rescue
  season_appearances:
  - 4
  local_uuids:
    1: org_a066cb602e73
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_83ab3d86da7b
  global_id: ger_organization_83ab3d86da7b
  canonical_name: Aries
  description: Aries operates as a Starfleet vessel. Mendez stole a shuttle from it
    before disappearing on Tarchannen Three, where the craft crash-landed amid the
    planet's influence that transformed him. Recovery of the shuttle during the away
    team's investigation directly implicates the Aries in the pattern of crew vanishings,
    underscoring its role in the crisis affecting Starfleet personnel exposed to the
    alien phenomenon.
  sphere_of_influence: Starfleet Vessel Operations
  season_appearances:
  - 4
  local_uuids:
    1: org_fd6ce2dbee0f
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_deb1507cea84
  global_id: ger_organization_deb1507cea84
  canonical_name: Arkaria Base
  description: Arkaria Base coordinates Enterprise evacuation efforts during the baryon
    sweep, receiving updates on personnel transfer delays from decks seven and eight.
    Beverly requests medical storage units from the base to preserve living tissue
    samples, but the base lacks them, prompting Picard to repurpose a stasis unit
    from the astrophysics lab. Technicians like Kelsey report task completion to the
    base, indicating oversight of onboard technical procedures tied to the trilithium
    reactor.
  sphere_of_influence: Federation Starbase Evacuation Coordination and Medical Logistics
  season_appearances:
  - 6
  local_uuids:
    1: org_2f8596597778
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_2245a760271c
  global_id: ger_organization_2245a760271c
  canonical_name: Assembled Klingon Audience (Great Hall)
  description: A gathered body of Klingon spectators and bystanders assembled in the
    Great Hall to witness and adjudicate matters of honor through public ritual. Comprised
    of supernumeraries, bystanders, and influential figures (including Council Members
    and family representatives), the audience enforces social consequences via visible
    reaction, creates ceremonial pressure that elevates private disputes to communal
    adjudication, and functions as an informal institution of public accountability
    in Klingon honor culture. Their responses directly shape political stakes during
    challenges and trials.
  sphere_of_influence: Ceremonial Public Adjudication and Social Enforcement of Honor
    within Klingon Political Rituals
  season_appearances:
  - 3
  local_uuids:
    1: organization_05f670045844
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_664b3d70b42e
  global_id: ger_organization_664b3d70b42e
  canonical_name: Assembled Klingon Crowd
  description: A massed public audience of Klingon citizens gathered in the Great
    Hall who act as collective social enforcers. They echo and amplify the High Council's
    judgments by vocally expressing disgust and ritually turning their backs to effect
    discommendation. Lacking formal internal hierarchy, they operate under council
    influence to uphold cultural norms, preserve imperial stability, and socially
    ostracize individuals deemed dishonored.
  sphere_of_influence: Klingon societal enforcement and ritual sanction within imperial
    governance
  season_appearances:
  - 3
  local_uuids:
    1: organization_cad8fc6031e6
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_aae84ffbed24
  global_id: ger_organization_aae84ffbed24
  canonical_name: Astral-Five Annex
  description: Astral-Five Annex serves as a dedicated archival annex tasked with
    receiving, cataloging, and preserving recovered audiovisual materials and historical
    artifacts. In the scene, ship command instructs the annex to log and schedule
    retrieval of an ancient Promellian captain's message, indicating it functions
    as an archival sub-unit within a larger records network, maintains chain-of-custody,
    and advises command on access and retrieval protocols.
  sphere_of_influence: Shipboard Archival Repository and Records Management
  season_appearances:
  - 3
  local_uuids:
    1: organization_6030158a3cc4
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_4defede16bad
  global_id: ger_organization_4defede16bad
  canonical_name: Asylum Staff
  description: Distinct from Medical Staff; focuses on **inmate control through psychological
    manipulation and physical enforcement**, including coordinated actions with Mavik
    and guards to provoke and sedate inmates. Central to the asylum’s thematic role
    as a **mental prison**.
  sphere_of_influence: Psychological Containment and Institutional Control in Asylums
  season_appearances:
