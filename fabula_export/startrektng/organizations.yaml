  global_id: ger_organization_7a6e8525cde8
  canonical_name: Franciscan Holy Order
  description: The Franciscan Holy Order is a historical religious institution renowned
    for its vows of poverty, humility, and service. Within the current narrative context,
    it functions symbolically, referenced through Q’s friar disguise to mock themes
    of humility and spiritual testing, highlighting the tension between divine power
    and human restraint.
  sphere_of_influence: Religious Symbolism and Spiritual Allegory
