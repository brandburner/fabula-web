  global_id: ger_organization_318d0e7fbd83
  canonical_name: Enterprise-D Damage Control Teams
  description: Enterprise-D Damage Control Teams function as shipboard emergency repair
    and casualty-mitigation units operating within the vessel's command hierarchy.
    Ordered from the bridge to specific decks during combat, they execute immediate
    hull and systems repairs, firefighting, life-support stabilization, and on-site
    medical triage. Organized as deck-assigned squads, they act under tactical direction
    to contain damage and preserve crew and mission-critical systems.
  sphere_of_influence: Shipboard Emergency Damage Repair and Casualty Mitigation
