  canonical_name: Starfleet Security (USS Enterprise)
  description: The official security organization aboard the USS Enterprise, responsible
    for maintaining order, safety, and compliance with Starfleet protocols during
    crises. Operates under Starfleet command but is deployed specifically to the Enterprise.
    Guards respond to alerts (e.g., Data's alert about Ensign Peeples' assault on
    Geordi in Engineering), restrain individuals, and escort them to medical facilities.
    In high-stress scenarios (e.g., Tyken's Rift-induced panic), guards may struggle
    with disorientation or be overpowered by frenzied crew members, reflecting the
    strain of psychological crises on security operations. The team uses standard
    Starfleet security protocols, including phaser deployment and force field containment,
    though effectiveness varies based on situational factors.
