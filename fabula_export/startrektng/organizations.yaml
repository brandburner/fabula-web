- fabula_uuid: ger_organization_f4a72c6fd740
  global_id: ger_organization_f4a72c6fd740
  canonical_name: Starship (the vessel)
  description: A shipboard institutional authority represented by the starship itself,
    responsible for sustaining order, enforcing onboard rules, and enabling operational
    command. The vessel's institutional framework vests authority in the captain and
    bridge officers, designates communication panels as channels for official business,
    and imposes expectations of self-control among crew and guests. The ship's norms
    and systems justify command decisions and prioritize strategic duty over personal
    solace when crises demand it.
  sphere_of_influence: Shipboard Governance and Operational Command — mission priority,
    personnel access control, and enforcement of onboard protocols
