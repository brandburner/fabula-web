  global_id: ger_organization_2b31425b4a03
  canonical_name: Q's Game Participants
  description: Picard, Vash, and the Enterprise crew comprise Q's game participants,
    compelled to enact roles in his Robin Hood scenario on a medieval planet. Q imposes
    identities like outlaws and heroes, escalating stakes through executions and duels.
    The crew disguises as monks for diversions, Data triggers explosions, and Picard
    duels Sir Guy to rescue Vash. They resist Q's taunts, coordinate interventions,
    and demonstrate loyalty amid forced heroism.
  sphere_of_influence: Forced Role-Playing in Q's Historical Simulations
