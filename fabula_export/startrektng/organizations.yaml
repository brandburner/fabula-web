  global_id: ger_organization_17f3e1fa7a6c
  canonical_name: Essex (NCC-173)
  description: The Essex (NCC-173) functions as a Daedalus-class Starfleet starship
    with a crew of 229. Captain Bryce Shumar commands the vessel under Admiral Uttan
    Narsu at Starbase 12. Lost centuries ago, its details surface in Troi's fabricated
    identity during an alien entity's deception. Picard exposes inconsistencies in
    the claimed history, including crew size and command links, highlighting the ruse's
    flaws.
  sphere_of_influence: Starfleet Starship Operations
  season_appearances:
