  first_appearance_season: 6
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_98d96f5ba954
  global_id: ger_organization_98d96f5ba954
  canonical_name: Crew of the USS Enterprise
  description: |-
    The crew of the USS Enterprise (NCC-1701-D) operates under Captain Picard's command, consisting of key officers including:
      - **First Officer William Riker** (leads away teams, coordinates crisis responses)
      - **Lt. Commander Data** (ops officer, investigates Devidia II anomalies, encounters silver-gray entities)
      - **Lt. Commander Worf** (tactical officer)
      - **Lt. Commander Geordi La Forge** (chief engineer)
      - **Counselor Deanna Troi** (counselor, participates in away missions)
      The crew detects triolic waves, temporal disturbances, and Devidia II anomalies while managing internal tensions (e.g., Picard's protective exclusion of Data). They respond to crises such as Romulan sabotage, warp core threats, and alien predation (e.g., silver-gray entities consuming energy, ophidian encounters). The group conducts away missions (e.g., recovering Data's gear at crash sites), coordinates responses to temporal vortex cutoffs, and maintains cohesion through Starfleet hierarchy and shared duties amid grief (e.g., memorials in Ten Forward for lost comrades). Their operations reflect routine bridge duties, shock reactions to materializations, and adaptive problem-solving under peril.
  sphere_of_influence: Starship Command, Operations, Personnel Management, and Crew
    Welfare
  season_appearances:
  - 3
  - 4
  - 6
  local_uuids:
    1: organization_683aaa5a4088
    2: org_5d9a0273f183
    3: org_f97414e25dc2
  first_appearance_season: 3
  tier: anchor
  episode_count: 22
- fabula_uuid: ger_organization_af49910f22b6
  global_id: ger_organization_af49910f22b6
  canonical_name: Crew of the USS Enterprise (NCC-1701-C)
  description: Crew of the USS Enterprise (NCC-1701-C), a Starfleet starship under
    Captain Garrett. They operate as a hierarchical shipboard military unit responsible
    for starship operations, defense, and mission execution. In the processed material
    they receive orders to return to a doomed past to engage Klingon forces and restore
    the timeline, knowingly accepting likely sacrifice. The crew executes combat and
    command duties, follows Starfleet doctrine, and balances strategic orders with
    urgent, personal stakes among officers and enlisted personnel.
  sphere_of_influence: Starfleet Starship Operations, Defensive Combat, and Temporal
    Restoration Missions
  season_appearances:
  - 3
  local_uuids:
    1: organization_411014ad9b12
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_2e4b7885f8ff
  global_id: ger_organization_2e4b7885f8ff
  canonical_name: Crew of the USS Yosemite (Transporter Crisis Survivors)
  description: 'The crew of the *USS Yosemite*, who experienced a catastrophic ship
    explosion and subsequent transporter anomaly during *Star Trek: TNG* S6E2 (*Realm
    of Fear*). Their rescue by the *Enterprise-D* crew (Barclay, Worf, Beverly Crusher)
    is a central plot beat, involving a molecular dispersion anomaly and emergency
    extraction. Includes at least one identified survivor (the crewmember materialized
    by Barclay).'
  sphere_of_influence: Starfleet Starship Crew Operations and Emergency Transporter
    Rescue
  season_appearances:
  - 6
  local_uuids:
    1: org_0af90715adce
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_18052eba6b6c
  global_id: ger_organization_18052eba6b6c
  canonical_name: Crystalline Entity
  description: The Crystalline Entity chases the Kallisko transport ship and annihilates
    it in a swift, merciless strike that rips through defenses. Data confirms its
    position and retreat from the Enterprise bridge. This departure asserts dominance
    over survivors, amplifying crew helplessness against its unstoppable power. No
    internal structure visible; it operates as a solitary interstellar predator.
  sphere_of_influence: Interstellar Predatory Destruction
  season_appearances:
  - 5
  local_uuids:
    1: org_27501a2ca3da
  first_appearance_season: 5
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_e8151ad8368d
  global_id: ger_organization_e8151ad8368d
  canonical_name: Cybernetics Conference
  description: A professional convening and technical exposition where researchers
    and industry representatives present, demonstrate, and disseminate advances in
    cybernetics. In the current material it functions as the origin point for the
    submicron matrix-transfer technology and as the forum where Data first began programming
    transfer protocols. No formal hierarchical governance is depicted; the conference
    operates as a scholarly-industry forum and a locus for technology diffusion and
    early adoption.
  sphere_of_influence: Advanced Cybernetics Research and Technology Dissemination
  season_appearances:
  - 3
  local_uuids:
    1: organization_40a3215ba7fa
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_54befce3b7de
  global_id: ger_organization_54befce3b7de
  canonical_name: Cytherians
  description: The Cytherians comprise an alien race of explorers based at the galaxy's
    center who never leave their home system. They deploy instructional probes that
    guide compatible individuals like Barclay to their location, transforming them
    temporarily to enable travel. Holographic representatives display detached, clinical
    curiosity while cataloging visitors' traits and confirming peaceful goals of knowledge
    exchange and cultural interaction. They transported the Enterprise for direct
    engagement, aligning their mission with Federation exploration.
  sphere_of_influence: Galactic Exploration and Knowledge Exchange
  season_appearances:
  - 4
  local_uuids:
    1: org_b25c2ca25004
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_1898fae5112d
  global_id: ger_organization_1898fae5112d
  canonical_name: Dachlyds
  description: The Dachlyds participate in interstellar trade agreements, clashing
    with the Gemarians in a dispute Picard mediated on Gemaris V over two weeks. Their
    stubborn nature matches the Gemarians', prolonging negotiations and draining Picard's
    reserves. Troi highlights this trait as key to the mission's grueling demands,
    which leave the captain visibly exhausted upon his return to the Enterprise bridge.
  sphere_of_influence: Interstellar Trade Negotiations
  season_appearances:
  - 3
  local_uuids:
    1: org_88782a37aa35
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3bb664f53005
  global_id: ger_organization_3bb664f53005
  canonical_name: Damage Control Team Alpha
  description: Damage Control Team Alpha functions as a shipboard emergency repair
    and response unit assembled to address catastrophic systems damage. The team performs
    hands-on damage assessment, localized repairs, and stabilization work (notably
    on Engineering level three) under direction from senior engineering officers.
    Activated and summoned by Geordi during a crisis on the Enterprise‑C, the team
    operates alongside medical triage and command personnel to preserve ship integrity,
    enable continuing operations, and support possible evacuation decisions. Its structure
    appears operationally subordinate to the ship's engineering chain of command and
    organized for rapid damage-limitation tasks during battle or catastrophic failure.
  sphere_of_influence: Starship Damage Control and Emergency Repair Operations
  season_appearances:
  - 3
  local_uuids:
    1: organization_10555c7f321f
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_5e447187e4eb
  global_id: ger_organization_5e447187e4eb
  canonical_name: Daystrom Institute
  description: The Daystrom Institute is a prestigious Federation research facility
    specializing in advanced engineering, starship design, and scientific analysis.
    It operates as a legitimate academic institution, training and certifying experts,
    maintaining alumni records, and providing Starfleet with consultations on complex
    problems. The Institute is also involved in evaluating high-value artifacts and
    technologies, such as the Tox Uthat—a star-destabilizing artifact—which Vash initially
    presents as a donation for noble research purposes before admitting her intent
    to profit from its sale. The Institute's field annexes are known to evaluate projects
    like android research logs, and it contrasts with commercial entities (e.g., Sovak)
    in its approach to acquiring such artifacts. Despite its academic reputation,
    the Institute's willingness to engage in transactions involving destructive or
    historically significant items is highlighted by Vash's interactions with it.
  sphere_of_influence: Advanced Engineering Research, Academic Credentialing, and
    Starfleet Technical Consultancy
  season_appearances:
  - 3
  - 3
  local_uuids:
    1: organization_04869b9da255
    2: org_04869b9da255
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_02450c51467a
  global_id: ger_organization_02450c51467a
  canonical_name: Debrune
  description: The Debrune operated as an ancient civilization that built and maintained
    an outpost on Barradas Three around 2,000 years ago. Riker, Data, Geordi, and
    Worf reference their ruins during mission planning in the Observation Lounge.
    These ruins anchor the planet's historical profile and link to anomalous energy
    signals that draw the Enterprise away team, fueling speculation about hidden bases
    or ships amid the crisis.
  sphere_of_influence: Ancient Planetary Outposts and Archaeological Ruins
  season_appearances:
  - 7
  local_uuids:
    1: org_7be0bebd6188
  first_appearance_season: 7
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_084986f575ad
  global_id: ger_organization_084986f575ad
  canonical_name: Deep Space Nine (DS9)
  description: Deep Space Nine (DS9) functions as Dr. Julian Bashir's home station,
    where he serves as Chief Medical Officer. Its computer systems prove inferior
    to the USS Enterprise's, demanding days to analyze devices like the Gamma Quadrant
    artifact that Enterprise equipment processes rapidly. Bashir voices frustration
    with these limitations, spurring his push to leverage Enterprise resources for
    faster breakthroughs in medical research.
  sphere_of_influence: Space Station Medical Operations and Research
  season_appearances:
  - 6
  local_uuids:
    1: org_074c088b203e
  first_appearance_season: 6
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_4f9f168f0bff
  global_id: ger_organization_4f9f168f0bff
  canonical_name: Defense Counsel (legal party)
  description: A courtroom advocacy party assembled to contest a JAG finding and argue
    that the android officer Data qualifies as a person. The group functions as the
    defense in Starfleet judicial proceedings, marshaling moral and evidentiary arguments,
    calling for full personnel records to humanize the defendant, and opposing the
    prosecution’s engineering-focused characterization. Representation includes senior
    Starfleet officers acting as counsel; the entity operates ad hoc within military-legal
    protocols rather than as a standing bureaucratic department.
  sphere_of_influence: Judicial Advocacy within Starfleet Military Law and Court Proceedings
  season_appearances:
  - 2
  local_uuids:
    1: organization_7030241333b5
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_9dce9513edd2
  global_id: ger_organization_9dce9513edd2
  canonical_name: Delegates (Collective)
  description: A loose coalition of diplomatic delegates gathered to receive and evaluate
    the Enterprise's wormhole exploration data. They operate as a stakeholder audience
    whose confidence or skepticism directly affects political negotiations and credibility
    contests. Lacking a formal internal hierarchy in the material, membership includes
    national representatives (for example, Premier Bhavani) and other accredited parties
    who act as immediate arbiters of trust and influence operational decisions.
  sphere_of_influence: Diplomatic Stakeholder Audience for Interstellar Exploration
    Data and Wormhole Negotiations
  season_appearances:
  - 3
  local_uuids:
    1: organization_2142fd67c926
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_02a1f8cf5792
  global_id: ger_organization_02a1f8cf5792
  canonical_name: Dessican Authorities
  description: Dessican Authorities claim jurisdiction over deaths in their territory,
    including Captain Picard's, as Admiral Chekote affirms to Riker. Riker brands
    them corrupt and untrustworthy, arguing this taints any investigation they lead.
    His push for an independent Starfleet probe highlights their role as an external
    barrier, forcing Enterprise command to seek detached duty and bypass local control
    amid grief-driven resolve.
  sphere_of_influence: Dessican Legal Jurisdiction and Investigative Oversight
