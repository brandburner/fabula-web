  global_id: ger_organization_6bf49e47ba02
  canonical_name: Tanugan Security Force
  description: The Tanugan Security Force operates as a planetary security and investigative
    authority represented aboard the station by a designated Chief Investigator. In
    the current material it deploys a lead investigator, Krag, to assert external
    jurisdiction, conduct forensic inquiries into a transporter/reactor incident,
    and apply institutional pressure to uncover causes. Its observable structure centers
    on a chief investigative officer empowered to board facilities, gather evidence,
    and challenge local operational accounts, creating formal tension with station
    commanders.
  sphere_of_influence: Planetary Security and External Investigative Authority (forensic
    investigation, law enforcement oversight, interjurisdictional inquiry)
  season_appearances:
