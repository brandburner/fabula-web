  episode_count: 0
- fabula_uuid: ger_organization_4dc690059b17
  global_id: ger_organization_4dc690059b17
  canonical_name: Mintakans
  description: An indigenous cultural community inhabiting Mintaka Three, the Mintakans
    organize through village-level institutions such as communal assemblies and designated
    roles (for example a recordkeeper). Their observable practices include sundial-based
    recordkeeping, ritual claim-making over strangers, and collective decision-making
    led by figures like Nuria and Liko. As subjects of covert anthropological observation
    and inadvertent deification of an outsider called the Picard, they drive the episode's
    Prime Directive and rescue dilemmas.
  sphere_of_influence: Local cultural and social order on Mintaka Three; subject of
    anthropological observation and Prime Directive ethical concern
