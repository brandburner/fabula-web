  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_ca873de000b0
  global_id: ger_organization_ca873de000b0
  canonical_name: Koinonians
  description: The Koinonians are an extinct intelligent civilization whose material
    and energy branches once inhabited a scarred world. Archaeological teams identify
    them through surface markings and orbital imagery; shipboard analysis links their
    multi‑generational wars to planetary devastation. Surviving energy‑forms spawned
    later phenomena—apparitions and life‑like constructs—that shape contemporary crises
    and moral dilemmas for investigators. The Koinonians function here as a cultural
    and causal locus, providing historical context and the origin story for hazardous
    remnants encountered by the crew.
  sphere_of_influence: Ancient Civilization and Cultural Legacy; Archaeological Subject
    and Source of Metaphysical/Anomalous Phenomena
  season_appearances:
  - 3
  local_uuids:
    1: organization_457b8c0ef876
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_b63575dfcfd3
  global_id: ger_organization_b63575dfcfd3
  canonical_name: Kostolain
  description: Kostolain maintains rigid patrician decorum through strict protocol
    and formal traditions. Minister Campio and Protocol Master Erko represent this
    culture aboard the Enterprise, rejecting Lwaxana Troi's cheek kiss and Picard's
    handshake in favor of bows to avoid premature familiarity. Erko enforces these
    rules, highlighting Kostolain's unyielding structure in diplomatic exchanges like
    marriage alliances and underscoring clashes with expressive Betazoid norms.
  sphere_of_influence: Diplomatic Protocol and Cultural Formality
  season_appearances:
  - 5
  local_uuids:
    1: org_d2212b35d462
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a61dcb77e670
  global_id: ger_organization_a61dcb77e670
  canonical_name: Kot'baval Festival
  description: The Kot'baval Festival hosts street operas on Klingon outposts where
    performers enact tyrant Molor's defeats through ritualized mok'bara combats with
    bat'leths. Crowd members like Worf join to display skill and honor, pulling reluctant
    youth such as Alexander into the fray. Molor adjusts intensity for safety, yielding
    symbolically to build pride. Worf leverages the event to embed traditions and
    values, exposing father-son rifts over identity amid cheering throngs and watchful
    observers.
  sphere_of_influence: Klingon Cultural Festivals and Ritual Combat Performances
  season_appearances:
  - 7
  local_uuids:
    1: org_55b58ff85e84
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_44cccdf36fe5
  global_id: ger_organization_44cccdf36fe5
  canonical_name: Kreechta (Ferengi warship)
  description: Kreechta is a named Ferengi warship commanded by Bractor that functions
    as an opportunistic, coercive antagonist. In the material it issues ultimatums
    (including a ten‑minute ultimatum), threatens and blockades the crippled Hathaway,
    engages in weapons duels with Starfleet vessels, and is the perceptual target
    of a Federation deception. Kreechta operates within Ferengi command structures
    and advances Ferengi objectives through intimidation, tactical engagement, readiness
    to board, and information‑seizure attempts.
  sphere_of_influence: Ferengi Naval Warfare and Opportunistic Hostile Operations
  season_appearances:
  - 2
  local_uuids:
    1: organization_0fc62f5d0eef
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_734882bcbeb4
  global_id: ger_organization_734882bcbeb4
  canonical_name: Krios
  description: Krios is a politically and culturally complex interstellar power that
    pursues peace with Valt Minor through ritualistic diplomacy and biological engineering,
    following centuries of conflict rooted in a historical love triangle between brothers.
    Their strategy involves sending Kamala, an engineered empathic metamorph, as a
    'gift' to Chancellor Alrik of Valt Minor to secure a peace treaty and trade agreements,
    with the mating ceremony (Finiis'ral) at the holographic Temple of Akadar serving
    as a symbolic and binding ritual. Ambassador Briam represents Krios but operates
    under strict customs, including Kamala's confinement, to safeguard the treaty.
    Krios's reliance on arranged unions and biological manipulation clashes with Federation
    principles on autonomy, as demonstrated when Picard retains Kamala aboard the
    *Enterprise*, disrupting Krios's strategy and exposing underlying tensions in
    the alliance.
  sphere_of_influence: Interplanetary Diplomacy and Cultural Enforcement
  season_appearances:
  - 5
  local_uuids:
    1: org_0655cec9745a
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_26974ff6f52a
  global_id: ger_organization_26974ff6f52a
  canonical_name: Krios-Valt Minor Peace Negotiations
  description: 'The Krios-Valt Minor peace negotiations hinge on a bonding ceremony
    that binds Kamala, the Kriosian emissary of peace raised in isolation for this
    duty, to Alrik of Valt Minor. Captain Picard practices Kriosian customs on the
    holodeck to fulfill his diplomatic role, exposing tensions between duty and personal
    attachment. Kamala''s confession reveals the ceremony''s cost: her newfound self-awareness
    sacrificed for planetary stability after decades of conflict.'
  sphere_of_influence: Interplanetary Diplomacy
  season_appearances:
  - 5
  local_uuids:
    1: org_f34c23b2f429
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_637329b04a93
  global_id: ger_organization_637329b04a93
  canonical_name: Kriosian Independence Movement (Kriosian Rebels)
  description: A Kriosian separatist organization pursuing independence from the Klingon
    Empire through armed resistance and political agitation. The group is accused
    by Governor Vagh and Romulan agent Kell of receiving Federation support (phaser
    rifles, medical aid), though Starfleet denies involvement. The movement's activities—both
    genuine and fabricated (e.g., the staged assassination of Vagh)—escalate tensions
    between the Federation and Klingon Empire, threatening diplomatic relations. Despite
    their physical absence from scenes, their actions serve as a catalyst for interstellar
    conflict.
  sphere_of_influence: Separatist Insurgency on Krios
  season_appearances:
  - 4
  local_uuids:
    1: org_4b6584604bb2
  first_appearance_season: 4
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_340f7806f4c1
  global_id: ger_organization_340f7806f4c1
  canonical_name: Kriosian-Valt Minor Alliance
  description: Ambassador Briam represents Krios and Chancellor Alrik represents Valt
    Minor in forging the Kriosian-Valt Minor Alliance through a peace treaty and ceremony
    aboard the Enterprise. Briam warns Picard of its fragility and dire consequences
    from delays. Ferengi demands by Par Lenor disrupt negotiations, but Picard reschedules
    them and deploys Geordi to maintain momentum. The alliance drives diplomatic tension
    as Picard balances duty against personal distractions.
  sphere_of_influence: Interplanetary Peace Negotiations
  season_appearances:
  - 5
  local_uuids:
    1: org_bdc222a5b4b4
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e0b846b0d3d0
  global_id: ger_organization_e0b846b0d3d0
  canonical_name: Ktarians
  description: The Ktarians are an antagonistic organization that orchestrates a conspiracy
    to dominate Starfleet through a mind-control device disguised as an addictive
    game. Led by their representative, Etana Jol, they direct infected Enterprise
    crew members—Picard, Riker, Worf, Crusher, La Forge, and Troi—to distribute the
    device to the *Endeavor*, Starbase 67, and Starfleet Academy. The Ktarians operate
    from their own vessel, where Etana Jol commands a crew that unleashes the mind-control
    game, causing shipwide chaos and rebellion aboard the *Enterprise*. After tactical
    defeat, the Ktarians' vessel is seized by the *Enterprise* and hauled to Starbase
    82 for further investigation.
  sphere_of_influence: Interstellar Mind Control and Subjugation
  season_appearances:
  - 5
  local_uuids:
    1: org_ac666acf189b
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_dd0c850ca72c
  global_id: ger_organization_dd0c850ca72c
  canonical_name: Kurn's Squadron
  description: 'Kurn commands this Klingon military squadron, which arrives amid heavy
    fire on Gowron’s cruiser from the Duras family’s Bird of Prey. The squadron repels
    the attackers, restores Gowron’s shields and disruptors, and shifts battle momentum
    decisively. Kurn declares their loyalty: ''We come to defend the Empire... and
    to follow the banner of Gowron.'' This action bolsters Gowron’s leadership in
    the civil war and stirs Worf’s pride on the bridge, underscoring fraternal bonds
    amid divided loyalties.'
  sphere_of_influence: Klingon Imperial Fleet Combat Operations
  season_appearances:
  - 4
  local_uuids:
    1: org_3ab100e68d1b
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b89811b78e00
  global_id: ger_organization_b89811b78e00
  canonical_name: Legaran Delegation
  description: Represents the **Legarans**, a mysterious alien species, in critical
    treaty negotiations with the Federation aboard the *Enterprise-D*. Led by Ambassador
    Sarek, their cooperation is vital, but Sarek's Bendii Syndrome risks the mission.
    Picard's intervention and a mind-meld stabilize Sarek, ensuring the treaty's success.
  sphere_of_influence: Interstellar Diplomacy and Treaty Negotiations
  season_appearances:
  - 3
  local_uuids:
    1: org_681f2789e107
  first_appearance_season: 3
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_fd6211f3d7d4
  global_id: ger_organization_fd6211f3d7d4
  canonical_name: Legation of Unity
  description: The diplomatic arm representing Straleb, known formally as the Legation
    of Unity, serves as their enforcement wing in interstellar conflicts. Under Kushell's
    leadership, they aggressively demand Okona's extradition from the Enterprise,
    prioritizing honor-based justice over negotiation. Their confrontational stance
    escalates tensions with Starfleet, revealing a militaristic approach to diplomacy
    that serves Straleb's uncompromising agenda.
  sphere_of_influence: Interstellar Diplomatic Aggression and Nationalistic Enforcement
  season_appearances:
  - 2
  local_uuids:
    1: organization_45524f325daa
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_cc99b3966653
  global_id: ger_organization_cc99b3966653
  canonical_name: Lemma Two
  description: Lemma Two operates as a sister facility to the primary research site,
    tasked with generating scattering fields to dissipate experimental warp phenomena
    like the Soliton wave. Crew directs the wave there to terminate the propulsion
    test safely, preventing uncontrolled spread. This setup positions Lemma Two as
    a key collaborator in Starfleet experiments, handling termination to enforce safety
    protocols amid risks demonstrated by the test ship's explosion.
  sphere_of_influence: Warp Experiment Termination and Safety Protocols
  season_appearances:
  - 5
  local_uuids:
    1: org_b7b7272bb5f3
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_e8324d31a103
  global_id: ger_organization_e8324d31a103
  canonical_name: Lenarians
  description: Hostile species responsible for the ambush in *Tapestry* (S6E15) that
    killed Captain Picard using a compressed teryon beam. Interacts with Riker, Worf,
    and Sickbay staff during the attack.
  sphere_of_influence: Extraterrestrial Ambush Attacks and Energy Weapon Assaults
  season_appearances:
  - 6
  local_uuids:
    1: org_09bddb19efce
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_35690e4326dc
  global_id: ger_organization_35690e4326dc
  canonical_name: Ligon II
  description: Ligon II stands as a tradition-bound planet governed by rigid cultural
    customs and patriarchal values, where the leader Lutan negotiates vaccine sharing
    under strict conditions respecting local traditions. The planet's lethal ritual
    combat is a central cultural event, reflecting deep social tensions and shaping
    critical diplomatic and ethical conflicts with outsiders such as Starfleet officers.
  sphere_of_influence: Galactic Cultural Traditions and Diplomacy
  season_appearances:
  - 1
