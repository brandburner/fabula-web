  global_id: ger_organization_77cf0d7c0614
  canonical_name: Mizarians
  description: A **species-level entity** representing the Mizarians as a whole, encompassing
    their cultural identity (peace, logic, intellectual superiority), collective interactions
    (e.g., clashes with Chalnoth), and narrative role as a target of Esoqq's mockery.
    Distinct from organizational subdivisions like the Mizarian Public Service.
