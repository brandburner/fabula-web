- fabula_uuid: ger_organization_5dca55321e71
  global_id: ger_organization_5dca55321e71
  canonical_name: Starbase 212
  description: 'Starbase 212 operates as a Federation starbase with dual functions:
    (1) a merit-based assignment hub for Starfleet personnel seeking autonomous career
    advancement (e.g., Aquiel Uhnari''s reassignment), and (2) a regional search-and-rescue
    support hub positioned near Klingon space to facilitate covert operations and
    rapid response initiatives. The starbase contrasts with flagship service on the
    *Enterprise-D* by emphasizing routine operations and professional growth opportunities,
    while also serving as a critical support node for Enterprise-D missions (e.g.,
    coordinating the search for Lieutenant Keith Rocha''s missing shuttle). Its strategic
    location enables it to avoid diplomatic incidents while aiding in investigations,
    such as the phaser residue analysis confirming Aquiel Uhnari''s death at Relay
    Station 47.'
  sphere_of_influence: Federation Starbase Personnel Reassignments and Operational
    Support
  season_appearances:
  - 6
  local_uuids:
    1: org_8f143cf87baf
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_5a3774852b74
  global_id: ger_organization_5a3774852b74
  canonical_name: Starbase 336
  description: Starbase 336 serves as a Federation orbital command and communications
    node that accepts automated tactical transmissions, originates sector alerts,
    and relays intelligence to nearby starships. In the current material it receives
    the Klingon battlecruiser T'Ong's automated signal and issues the alert that notifies
    the USS Enterprise. The installation functions as an early-warning and coordination
    hub, staffed to evaluate incoming transmissions, generate situational reports,
    and communicate recommended actions to vessel command. Its operational profile
    implies a staffed operations center with communications officers, intelligence
    analysts, and liaison authority to interface with Starfleet command and responding
    ships.
  sphere_of_influence: Federation Orbital Support, Command Communications, Early Warning
    and Intelligence Relay
  season_appearances:
  - 2
  local_uuids:
    1: organization_031e816fe85d
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_ea1d5f2269ca
  global_id: ger_organization_ea1d5f2269ca
  canonical_name: Starbase 416
  description: Starbase 416 (also known as Starbase Four-One-Six) is a Federation
    starbase specializing in advanced medical facilities, particularly for treating
    severe parasitic infections such as those caused by cove palm fruit. It serves
    as a critical healthcare destination for Starfleet crews in remote space sectors,
    with the USS *Enterprise* diverting there as the nearest capable facility during
    medical emergencies. The base's role is highlighted during the emergency involving
    Willie Potts, where Beverly Crusher emphasizes the urgency of arrival within 24-36
    hours. Picard and senior staff reference it as the original heading for the *Enterprise*,
    underscoring its importance as a vital operational support outpost in crises.
  sphere_of_influence: Federation Starbase Medical Services
  season_appearances:
  - 4
  local_uuids:
    1: org_a9de860e2cf2
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_7b17af95da6e
  global_id: ger_organization_7b17af95da6e
  canonical_name: Starbase 514
  description: Starbase 514 monitors communications with Starfleet research vessels
    like the USS Vico operating near the Black Cluster. It detects the sudden loss
    of contact, reports the incident to Starfleet Command, and triggers the USS Enterprise's
    high-priority investigation mission into the derelict wreckage. This outpost serves
    as the critical first link in the alert chain, bridging routine oversight with
    emergency response protocols amid sensor-distorting anomalies.
  sphere_of_influence: Starfleet Deep-Space Communications Monitoring and Incident
    Reporting
  season_appearances:
