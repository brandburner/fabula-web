  global_id: ger_organization_ad7a1821e22b
  canonical_name: Quadra Sigma III Enemy Soldiers
  description: This group represents a primitive yet brutal hostile force operating
    on the barren plains of Quadra Sigma III. They aggressively advance on the away
    team, serving as antagonists in a tense confrontation where their presence triggers
    a drastic shift in the stakes, culminating in Riker's acquisition of immense power
    to protect his crew.
