  canonical_name: Holographic Musketeers
  description: Barclay's holographic projections of Enterprise crew members—Holo-Picard,
    Holo-Data, Holo-Geordi, Holo-Riker, and Holo-Wesley—form this mock musketeer group
    inside the holodeck. They challenge the real crew to a duel, parodying authority
    figures through exaggerated swordplay and taunts. As extensions of Barclay's fantasy
