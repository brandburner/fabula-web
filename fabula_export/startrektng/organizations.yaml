  global_id: ger_organization_b4c668e87700
  canonical_name: Klingon Battlecruisers
  description: A coordinated squadron of Klingon battlecruisers acting as an immediate
    hostile naval force. In this episode they close on the USS Enterprise, converting
    a moral dilemma into an urgent tactical crisis by projecting combat power and
    forcing the Enterprise command to assume battle alert. Their observed behavior
    indicates military intent, coordinated movement, and command-level orders to intercept
    or engage the starship; they function as an antagonistic Klingon naval contingent
    opposing the Enterprise crew.
