- fabula_uuid: ger_organization_1a72762d826e
  global_id: ger_organization_1a72762d826e
  canonical_name: Resort Staff (Risa)
  description: Resort Staff on Risa provide guest services at the planet's luxury
    resorts. Joval works as an employee who offers direct assistance to visitors like
    Picard. Staff integrate Risa's cultural practices, such as the Horga'hn statue,
    into guest experiences. These elements persist as central dynamics even during
    Sovak's violent confrontation with Picard on the lanai, positioning staff as facilitators
    of relaxation amid interstellar intrigue.
  sphere_of_influence: Risan Hospitality and Cultural Services
  season_appearances:
