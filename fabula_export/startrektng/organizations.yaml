- fabula_uuid: ger_organization_21afd0583947
  global_id: ger_organization_21afd0583947
  canonical_name: Sickbay Medical Staff
  description: Sickbay Medical Staff operate as the Enterprise's on‑board clinical
    team under Dr. Pulaski's leadership. They deliver routine treatment, emergency
    triage, and surgical or procedural support; in the current scenes they constitute
    Pulaski's authorized medical backup, asserting the capability to perform a replacement
    procedure locally and formally backing Pulaski's medical order to the commanding
    officer. They act as both a functional healthcare unit and a source of clinical
    authority within shipboard command decisions.
  sphere_of_influence: Shipboard Medical Care and Emergency Medical Support
