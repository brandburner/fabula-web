  episode_count: 1
- fabula_uuid: ger_organization_1ac0e93aca13
  global_id: ger_organization_1ac0e93aca13
  canonical_name: Kenzie Rebellion
  description: The Kenzie Rebellion is referenced as an armed insurgent movement that
    achieved concrete political change; characters invoke it as a historical example
    when debating the ethical and practical efficacy of political violence. The current
    material presents the Kenzie Rebellion only as a precedent—no internal hierarchy,
    leadership, or tactics are detailed—but it functions narratively as a touchstone
    for assessing when violent resistance produces policy outcomes.
  sphere_of_influence: Armed Insurrection and Political Change (historical precedent;
    moral exemplar in debates over political violence)
