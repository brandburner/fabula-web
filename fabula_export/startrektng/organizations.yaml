  canonical_name: USS Enterprise-D Security Tactical Division
  description: The USS Enterprise (NCC-1701-D) Security Department functions as the
    shipboard security and tactical unit charged with preserving crew safety and safeguarding
    critical systems. In the present incident it dispatches security personnel to
    the transporter room, physically engages an invasive glowing energy intelligence,
    and operates under bridge command authority while coordinating with operations
    and engineering staff. Standard kinetic and phaser tactics are employed but prove
    ineffective against the ship‑draining energy form, revealing limitations in force
    options against unconventional threats.
  sphere_of_influence: Shipboard Security and Tactical Response; internal protection
