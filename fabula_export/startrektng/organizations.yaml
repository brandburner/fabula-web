  episode_count: 1
- fabula_uuid: ger_organization_66a34dbc04b5
  global_id: ger_organization_66a34dbc04b5
  canonical_name: Klingon Vessel Patakt
  description: 'The Klingon Vessel Patakt appears as an external Klingon military
    ship that initiates a priority security transmission to the USS Enterprise. In
    the processed material it functions as an external military actor and potential
    security threat: a security officer aboard Patakt contacts Starfleet, prompting
    heightened readiness, Worf''s deployment, and immediate tactical responses by
    Enterprise crew.'
  sphere_of_influence: Interstellar Military Contact and Security Operations (Klingon
    external military vessel interacting with Starfleet)
