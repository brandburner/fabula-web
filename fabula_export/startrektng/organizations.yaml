  canonical_name: Earth (Member World of the United Federation of Planets)
  description: Earth serves as the twenty-first-century survivors' homeworld and a
    member world of the United Federation of Planets. Within the processed material
    it functions as the origin point for revived people, a source of cultural identity
    and legal-political affiliation, and a referent in conflicts over property, citizenship,
    and integration into Federation systems.
  sphere_of_influence: Planetary governance and cultural origin; representation within
