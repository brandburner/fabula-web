- fabula_uuid: ger_organization_fcdab9233dab
  global_id: ger_organization_fcdab9233dab
  canonical_name: Enterprise Battle Cruiser Section
  description: The Enterprise Battle Cruiser Section serves as the tactical combat
    segment of the USS Enterprise, tasked with engaging threats during critical missions.
    Operated by key crew members including Geordi La Forge, Worf, Solis, and Lian,
    this section coordinates ship defenses and offensive maneuvers, maintaining readiness
    in high-stakes situations such as encounters with cloaked attackers near strategic
    locations like Minos. It functions as an integrated combat unit within the starship's
    larger command structure, emphasizing rapid response, tactical coordination, and
    crew cohesion under pressure.
  sphere_of_influence: Starship Tactical Combat and Defense Operations
