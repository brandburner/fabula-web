- fabula_uuid: ger_organization_b2fe68edd357
  global_id: ger_organization_b2fe68edd357
  canonical_name: Taguan Authorities
  description: Taguan authorities enforce planetary laws that protect ancient ruins
    from unauthorized digging. Picard warns Vash that they pose a severe threat if
    they catch her excavating sites, which elevates risks to her activities and compels
    his Starfleet intervention. They function as an implied antagonist force, heightening
    external stakes in the conflict between Vash's adventurism and official regulations.
  sphere_of_influence: Planetary Law Enforcement and Cultural Site Protection
  season_appearances:
  - 4
  local_uuids:
    1: org_001524ff65b2
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_03befb8450b4
  global_id: ger_organization_03befb8450b4
  canonical_name: Taguan Law Enforcement
  description: Taguan Law Enforcement enforces long-standing legal restrictions that
    have sealed off Tagus III for over a century. They prohibit unauthorized access
    to the planet, creating barriers that Q's offer to Picard directly challenges.
    Picard recognizes these rules as binding, weighing the ethical cost of violation
    amid Q's provocative gifts. Their authority underscores planetary sovereignty
    and control over restricted zones.
  sphere_of_influence: Planetary Law Enforcement and Access Control
  season_appearances:
  - 4
  local_uuids:
    1: org_30da1b9e2c2d
  first_appearance_season: 4
