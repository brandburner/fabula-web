  episode_count: 1
- fabula_uuid: ger_organization_a0bc397965ff
  global_id: ger_organization_a0bc397965ff
  canonical_name: Straleb Faction
  description: The Straleb Faction emerges as a political-military group aligned with
    Kushell, demanding Captain Okona's surrender during diplomatic tensions aboard
    the Enterprise. Their confrontational stance against Okona and insistence on formal
    protocols reveal a faction deeply entrenched in strict governance traditions.
    As Kushell's faction opposes Riker's sympathies, their actions expose rigid ideological
    divisions suppressed beneath surface civility. This militant faction operates
    as power brokers in the region, willing to enforce their demands through coercion
    when challenged—though their exact command structure remains opaque beyond Kushell's
    visible leadership.
  sphere_of_influence: Regional Armed Political Faction
  season_appearances:
  - 2
  local_uuids:
    1: organization_66643f72567b
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_a55753d10875
  global_id: ger_organization_a55753d10875
  canonical_name: Swarm of Alien Creatures
  description: Multiple alien entities similar to the vacuum-resilient creature attached
    to the Enterprise's hull form the Swarm of Alien Creatures. They emerge coordinately
    from the asteroid field and advance toward the starship, detected by sensors as
    just ten minutes away. This unified antagonist force overwhelms the ship's two-second
    phaser limit on auxiliary power, shifting the crisis from containment to imminent
    survival confrontation.
  sphere_of_influence: Coordinated Extraterrestrial Assault
  season_appearances:
