  global_id: ger_organization_7d5b635c96c8
  canonical_name: Tkon Empire
  description: The Tkon Empire stands as an ancient, long-extinct galactic civilization
    whose vast reach once spanned multiple star systems. Revered and feared for its
    immense power, the empire’s legacy endures through enigmatic star maps, advanced
    forcefield technology, and the mysterious Portal Guardian on the clouded planet
    Gamma Tauri IV. Its history and downfall fuel the existential crisis faced by
    the Enterprise crew and their Ferengi adversaries, framing a narrative of lost
    glory, cultural clash, and the struggle for survival and understanding amid relics
    of a forgotten age.
  sphere_of_influence: Ancient Galactic Civilization and Legacy
