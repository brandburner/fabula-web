- fabula_uuid: ger_organization_7f9fe7b0a81a
  global_id: ger_organization_7f9fe7b0a81a
  canonical_name: Enterprise Ship Security
  description: Enterprise Ship Security functions as the USS Enterprise’s onboard
    law-enforcement and tactical containment unit, charged with protecting crew, securing
    sensitive compartments, and executing shipboard containment protocols. Under bridge
    authority it deploys standing patrols, posts guards, raises deck forcefields,
    reactivates systems (e.g., turbolifts) as tactical bait, and conducts directed
    apprehension using phasers and physical restraint. The unit coordinates closely
    with bridge command (Picard, Riker), the Chief of Security (Worf), operations
    and engineering (Data, Geordi, engineering crewmembers), and medical staff to
    translate command intent into immediate defensive and interdiction actions during
    shipwide breaches.
  sphere_of_influence: Shipboard Security, Tactical Response, and Containment Operations
    aboard a Starfleet vessel
