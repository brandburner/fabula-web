  global_id: ger_organization_76e22f3cfe58
  canonical_name: Spain
  description: Spain is referenced as the historical colonial metropole that governed
    territories from which the Mexican State later achieved independence. In the current
    material Spain appears only as an exemplar of imperial political authority whose
    rule provoked anti-colonial rebellion; it is invoked as background historical
    actor rather than an active participant in the episode.
