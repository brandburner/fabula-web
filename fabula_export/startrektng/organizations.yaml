  global_id: ger_organization_7745fb191dad
  canonical_name: Engineering Department
  description: Lt. Cmdr. Geordi La Forge directs the USS Enterprise Engineering Department,
    which manages propulsion systems, deflector dish operations, warp maintenance,
    and crisis repairs. Crew members like Reginald Barclay schedule strategy meetings
    for repairs, uphold duties despite personal changes such as hyper-intelligence
    transformations, and coordinate with officers like Data during leadership impairments
    from events like Tyken's Rift. The department drives ship survival through technical
    fixes under psychological pressure.
  sphere_of_influence: Starship Power Systems Management and Technical Maintenance
