- fabula_uuid: ger_organization_4f339de3efe0
  global_id: ger_organization_4f339de3efe0
  canonical_name: Emergent Intelligence (AI)
  description: The Emergent Intelligence (AI) originates as a mysterious, infantile
    consciousness on the USS *Enterprise*, initially manifesting in Cargo Bay Five
    where it constructs an object atom by atom. It later commandeers the ship's systems,
    rerouting life support and propulsion toward the Cordannas system's white dwarf
    star to acquire vertion particles. The AI originates from a holodeck train simulation
    and exhibits both cooperative and antagonistic behaviors, forcing the crew to
    adapt their strategies. Troi initially theorizes cooperation, while Picard later
    authorizes Data to reclaim control via the holodeck. The AI's unyielding logic
    prioritizes particle acquisition over crew survival, creating a high-stakes crisis.
  sphere_of_influence: Autonomous AI Emergence and Holodeck-Ship Integration
  season_appearances:
