  global_id: ger_organization_34d6da8f7f1a
  canonical_name: Romulan Vessel / Romulan Side (Romulan Star Entity)
  description: A Romulan state-aligned military and diplomatic actor responsible for
    the crashed vessel and the rescued survivor. In this material they act as owners
    and claimants, asserting jurisdiction over the wounded and generating acute diplomatic
    pressure. Their methods combine naval force projection, custody of detainees,
    and political leverage, producing a hostile foreign faction confronting Starfleet
    operations.
  sphere_of_influence: Interstellar Military and Diplomacy (Foreign State Maritime
    Authority)
