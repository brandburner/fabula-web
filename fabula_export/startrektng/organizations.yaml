  global_id: ger_organization_28eb0e4bb688
  canonical_name: Valtese Delegation
  description: Valtese Delegation drives peace treaty with Krios through a bonding
    ceremony that honors their customs and rituals. Kamala pushes forward despite
    Ambassador Briam's coma delaying the conference, as Picard must notify them of
    the postponement. Their stake ties the mission's timeline to her two-day bonding
    window, blending diplomacy with cultural mandates.
