  global_id: ger_organization_5e3f016d803d
  canonical_name: USS Fleming Crew
  description: The USS Fleming crew becomes trapped in a subspace rift caused by Serova's
    warp core overload on the Hekaran ship. With failing shields limiting their survival
    to 12 hours, the Enterprise crew prioritizes their rescue despite impossible warp
    entry conditions. The crew is successfully evacuated to the Enterprise before
    its distortion wave escape attempt, transitioning from primary victims to protected
    passengers during the crisis. The rescue operation is complicated by moral dilemmas—balancing
    Rabal's grief over Serova with Geordi's scientific warnings about the rift's accelerating
    instability—while Picard directs the Enterprise crew to execute a non-warp rescue
    mission.
  sphere_of_influence: Starfleet Starship Emergency Evacuation and Survival Operations
