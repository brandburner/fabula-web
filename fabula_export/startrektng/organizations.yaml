- fabula_uuid: ger_organization_6d25f210d03d
  global_id: ger_organization_6d25f210d03d
  canonical_name: Ligonian Hosts
  description: The Ligonian Hosts embody the alien cultural institution enforcing
    the deadly ritual combat customs on Ligon II. They orchestrate and maintain the
    lethal ceremonial combat framework, providing poison-tipped weapons and overseeing
    the ritual combat arena. Their presence signals the inevitable violent challenge
    that tests honor, strength, and allegiance, positioning them as a critical antagonist
    force deeply woven into the planet's social structure and narrative conflict.
  sphere_of_influence: Cultural Enforcement and Ritual Combat
  season_appearances:
  - 1
  local_uuids:
    1: organization_753042c3fedb
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c0e9a1b0a700
  global_id: ger_organization_c0e9a1b0a700
  canonical_name: Ligonian Leadership Council
  description: The Ligonian Leadership Council, led by Lutan and his First One Yareena
    alongside Hagon, functions as the highest cultural authority on Ligon. This council
    upholds and enforces an ancient ritualistic honor code that governs societal disputes
    through formalized combat and ceremonial customs. They wield authority over ritual
    combat rules, orchestrating deadly contests as public resolutions to conflicts,
    embodying the intersection of tradition, power, and law within Ligonian society.
  sphere_of_influence: Ligonian Cultural Governance and Ritual Combat Enforcement
  season_appearances:
  - 1
  local_uuids:
    1: organization_1df41f72cc6e
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_64f67a114436
  global_id: ger_organization_64f67a114436
  canonical_name: Ligonian Society
  description: The Ligonian Society governs the cultural and social order of the Ligonian
    people, enforcing a strict code of honor and ritualistic behavior that shapes
    political power and personal conduct. Under the leadership of Lutan, this society
    imposes traditional customs that dictate negotiations and interactions, especially
    surrounding the possession and release of the vaccine. The society's rigid honor
    codes create profound conflicts with the Federation crew, embodying a clash between
    ritualistic tradition and Starfleet diplomacy, and driving key narrative tensions
    through challenges to authority and personal dignity.
  sphere_of_influence: Cultural Governance and Ritualistic Honor in Ligonian Politics
  season_appearances:
  - 1
  local_uuids:
    1: organization_899d4f144d04
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_ad09e5d74dda
  global_id: ger_organization_ad09e5d74dda
  canonical_name: Ligonian Spectators
  description: The Ligonian Spectators form a culturally significant group within
    Ligonian society, serving as engaged observers and participants in ritual combat
    events. Their reactions and adherence to tradition exert substantial social pressure,
    influencing the conduct and consequences of these deadly cultural rites. Their
    outrage at breaches of custom marks them as key enforcers of societal norms and
    custodians of Ligonian ritual heritage.
  sphere_of_influence: Cultural Ritual Enforcement and Social Norms within Ligonian
    Society
  season_appearances:
  - 1
  local_uuids:
    1: organization_0354b09ede5a
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_f3f84fae55cc
  global_id: ger_organization_f3f84fae55cc
  canonical_name: Ligonian Supporters
  description: Ligonian Supporters form the culturally and politically aligned faction
    rallying around Lutan during a pivotal gift ceremony and subsequent cultural confrontation.
    They embody the traditional authority backing Lutan's claim over Lieutenant Yar,
    standing as key antagonists opposing Federation intervention and intensifying
    the rift between Ligonian customs and Federation law during a critical treaty
    negotiation.
  sphere_of_influence: Ligonian Cultural and Political Authority
  season_appearances:
  - 1
  local_uuids:
    1: organization_460650ab6b6d
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_d42c8abbef15
  global_id: ger_organization_d42c8abbef15
  canonical_name: Ligonians
  description: The Ligonians constitute a rigidly honor-bound alien faction led by
    figures such as Lutan and Hagon. They enforce strict ceremonial customs rooted
    in ancient tradition, often clashing culturally and politically with Starfleet
    values. Their role as both hosts of traditional ceremonies and antagonists challenging
    Federation principles drives intense diplomatic and ideological conflict, especially
    surrounding contested issues like the abduction of Lieutenant Tasha Yar and the
    delivery of a life-saving vaccine. Their influence spans cultural tradition, territorial
    control, and power struggles that threaten interstellar cooperation and survival.
  sphere_of_influence: Cultural Tradition and Interstellar Diplomacy
  season_appearances:
  - 1
  local_uuids:
    1: organization_52ce55ba918b
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_520919d1f544
  global_id: ger_organization_520919d1f544
  canonical_name: Lore's Cult
  description: Lore's Cult controls Data through an emotional chip that overrides
    his ethics, forcing him to prepare destructive experiments on Geordi La Forge
    in a Borg laboratory. Data positions Geordi for neural net irradiation to advance
    Lore's ideology of emotional corruption and anti-Starfleet antagonism. Geordi's
    appeal—recalling their Devala Lake mishap—triggers Data's resistance; he halts
    the procedure citing anomalous readings, his head tilt betraying internal conflict
    between the cult's directives and his core programming. The cult operates as an
    antagonist force, subjugating androids for human experimentation.
  sphere_of_influence: Android Subjugation and Neural Experimentation
  season_appearances:
  - 7
  local_uuids:
    1: org_f9c9477b829e
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_c32b7d40cc10
  global_id: ger_organization_c32b7d40cc10
  canonical_name: Lornack Clan
  description: The Lornack Clan functions as a hereditary, kin-based faction within
    the Gatherer polity, defining ritual rights, burial claims, and inter-clan standing.
    Members (e.g., Volnoth, Penthor‑Mul, Chorgan) appear as stakeholders in fragile
    peace negotiations and as historical actors in an eighty-year-old massacre that
    sparked a Tralesta vendetta. The clan operates through customary authority rather
    than formal institutions, suffers targeted violence including engineered biological
    assassinations, and thus occupies both cultural and political fault lines in ongoing
    diplomatic and forensic investigations.
  sphere_of_influence: Clan-based Cultural Authority and Diplomatic Stakeholding;
    target of inter-clan vendetta and political violence
  season_appearances:
  - 3
  local_uuids:
    1: organization_6729337504f8
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_75cc97f2e606
  global_id: ger_organization_75cc97f2e606
  canonical_name: Lumarian Customs
  description: A **specific subset of Lumerian culture** focused exclusively on **autopsy
    prohibitions** and their diplomatic implications. This custom is invoked to **block
    invasive examinations**, as demonstrated by Picard’s denial of Beverly Crusher’s
    request on Maylor’s corpse, and serves as a **mechanism for conflict** between
    Lumerian traditions and Starfleet medical priorities.
  sphere_of_influence: Cultural and Religious Prohibitions on Autopsies
  season_appearances:
  - 6
  local_uuids:
    1: org_da287acd40ef
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_42397305d817
  global_id: ger_organization_42397305d817
  canonical_name: Lumerians
  description: A culturally insular species whose **broader traditions**—including
    emotional detachment, diplomatic protocols, and delegation dynamics—are exemplified
    by Ambassador Alkar’s interactions with Deanna Troi and the *Enterprise* crew.
    Their customs extend beyond autopsy prohibitions to govern **all aspects of social
    and medical conduct**, as demonstrated across multiple diplomatic and medical
    events.
  sphere_of_influence: Cultural Traditions and Diplomatic Protocols
  season_appearances:
  - 6
  local_uuids:
    1: org_a3b2f2d1cf55
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_71e548764fd0
  global_id: ger_organization_71e548764fd0
  canonical_name: Lunar Five Penal Colony
  description: Lunar Five Penal Colony is an Angosian state-run high-security correctional
    facility tasked with detaining, securing, and transporting prisoners. The facility
    maintains an administrative hierarchy of custodial staff and security personnel
    and enforces containment and transport protocols. In the processed material it
    is the scene of a lethal breach and sabotage—guards killed and an inmate escaped
    by stealing a transport—triggering a political, diplomatic, and tactical crisis
    that implicates Angosian authorities and visiting Federation officers.
  sphere_of_influence: Penal Administration and Internal Security (Angosian state
    facility)
  season_appearances:
  - 3
  local_uuids:
    1: organization_a7beb1207d14
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_beee316d5d1d
  global_id: ger_organization_beee316d5d1d
  canonical_name: Lunar Five Security Facility
  description: Lunar Five Security Facility is identified in the material as a maximum-security
    detention complex and the custodial origin of a dangerous pilot/prisoner who eluded
    Starfleet sensors. The facility functions as a high-value incarceration and containment
    institution whose failure to hold the escapee triggers a diplomatic and tactical
    crisis; its custody role ties it into intergovernmental tensions and regional
    security oversight.
  sphere_of_influence: Maximum-Security Detention and Regional State Custody (High-value
    incarceration, containment, and state security implications)
  season_appearances:
  - 3
  local_uuids:
    1: organization_61a50ccacff3
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1c3efb04c969
  global_id: ger_organization_1c3efb04c969
  canonical_name: Lysian Alliance
  description: The Lysian Alliance (also referred to as the 'Lysian Faction' in some
    reports) is a genocidal military force waging covert war against the Federation.
    They deploy a powerful energy weapon capable of capturing Starfleet vessels and
    maintain a Central Command as their primary strategic hub. Their aggressive tactics—including
    unprovoked attacks on Federation ships—reveal both their hostility and potential
    strategic vulnerabilities. The Enterprise crew targets their Central Command to
    end the conflict, framing them as the primary antagonist in the war's escalation.
  sphere_of_influence: Genocidal Interstellar Warfare
  season_appearances:
  - 5
  local_uuids:
    1: org_4c6737e6d476
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_c984eeb7a102
  global_id: ger_organization_c984eeb7a102
  canonical_name: Lysian Central Command
  description: Lysian Central Command directs Lysian military operations as the Enterprise
    crew's primary mission target. It receives transmissions from destroyed destroyers,
    achieves alert status, and deploys sentry pods armed with fusion pulse lasers
    for defense. Worf and MacDuff highlight its detection capabilities, prompting
    crew tactics to evade pursuit during high-risk approaches.
  sphere_of_influence: Lysian Military Command and Orbital Defense
  season_appearances:
  - 5
  local_uuids:
    1: org_10021cb96291
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_63b1df4b4b8a
  global_id: ger_organization_63b1df4b4b8a
  canonical_name: Lysian Faction
  description: The **Lysian Faction** (also referred to as the **Lysians**) is a militarized
    political entity operating in a contested region of space. Their military consists
    of **destroyers equipped with disruptors**, and they maintain **Lysian Central
    Command**, a station housing **15,000 civilians** with minimal defenses. The faction
    has been engaged in a **decades-long war against the Satarrans**, whose weapons
    match their own technological capabilities. Their military actions include intercepting
    and firing upon the *USS Enterprise* despite Data confirming no match for Federation
    power, an act that heightens suspicions about their capabilities and the mission's
    stakes. The Lysians are later revealed to be **victims of Satarran manipulation**,
    including memory probe attribution and ship losses, which position them as pawns
    in a larger conflict.
  sphere_of_influence: Interstellar Warfare and Civilian Governance
  season_appearances:
  - 5
  local_uuids:
    1: org_c92d67a54f83
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_5580a140ea40
  global_id: ger_organization_5580a140ea40
  canonical_name: Main Bridge Crew
  description: Main Bridge Crew comprises officers and enlisted personnel who staff
    the Enterprise-D primary command center and execute the commanding officer's orders
    during routine and emergency operations. In the depicted event they close and
    hold station as a sacrificial shield, coordinate phaser and torpedo responses,
    integrate sensor and tactical data, respond to engineering warnings (antimatter
    containment), and liaise with damage-control teams to sustain ship functions under
    combat conditions. They operate under the ship's CO and first officer within a
    clear chain of command.
  sphere_of_influence: Starship Tactical and Operational Command (Bridge Operations
    during Combat and Emergencies)
  season_appearances:
  - 3
  local_uuids:
    1: organization_80286ccce114
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_6b8707287598
  global_id: ger_organization_6b8707287598
  canonical_name: Malcorian Delegation
  description: Chancellor Durken and Space Administrator Mirasta Yale lead the Malcorian
    Delegation during their first visit to the Enterprise bridge. Durken shows unease
    toward Data and Worf, then requests a private meeting with Picard. Mirasta probes
    about Riker's location, displaying foreknowledge of Federation surveillance. Their
    actions highlight cultural discomfort with alien diversity, fragile trust, and
    emerging diplomatic tensions in first contact negotiations.
  sphere_of_influence: Malcorian First Contact Diplomacy
  season_appearances:
  - 4
  local_uuids:
    1: org_8ddf93274dbb
  first_appearance_season: 4
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_ae7c98d34d57
  global_id: ger_organization_ae7c98d34d57
  canonical_name: Malcorian Federation
  description: The Malcorian Federation governs a pre-warp civilization on the cusp
    of interstellar travel. Scientists like Mirasta Yale operate high-tech labs that
    drive space exploration efforts. Picard and Troi target the Federation for first
    contact to establish diplomatic ties before warp drives spark accidental deep-space
    meetings with other species. Lupo assists in these research hubs, underscoring
    the society's scientific focus and cultural skepticism toward outsiders.
  sphere_of_influence: Pre-Warp Space Exploration and Planetary Governance
  season_appearances:
  - 4
  local_uuids:
    1: org_acebf02793e0
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_541f45cbfbe7
  global_id: ger_organization_541f45cbfbe7
  canonical_name: Malcorian Government (Cabinet)
  description: |-
    The **Malcorian Government**, also referred to as the **Malcorian Cabinet**, is the ruling body of Malcor III led by **Chancellor Durken**. It governs during a transitional phase marked by tensions between technological progress (e.g., the warp drive program) and traditionalist backlash, as well as internal divisions over Federation contact. The Cabinet includes key ministers:
      - **Minister Mirasta Yale (Science)**: Advocates for reform, first contact with the Federation, and cautious technological advancement.
      - **Minister Krola (Internal Security)**: Champions isolationism, exploits crises (e.g., Commander Riker’s exposure) to enforce hardline policies, and pushes for harsh measures like interrogations.
      Durken’s leadership is tested by public unrest, diplomatic tensions, and factional clashes, with decisions pivotal to Malcor III’s stability and interstellar relations. The Cabinet’s unity fractures during crises, often shifting Durken toward Krola’s stance amid failed negotiations (e.g., with Captain Picard).
  sphere_of_influence: Planetary Governance, Technological Development, and First
    Contact Diplomacy
  season_appearances:
  - 4
  local_uuids:
    1: org_8027eb4371b4
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_bb407ddc62dc
  global_id: ger_organization_bb407ddc62dc
  canonical_name: Malcorian Hospital Staff and Guards
  description: Malcorian hospital staff and guards manage patient confinement and
    security within the medical facility. Guards post outside rooms like Riker's to
    block escapes and enforce protocols. Nurses such as Lanel deliver care, negotiate
    with patients, and offer to divert guard attention for personal gain. Their coordinated
    oversight creates obstacles for undercover agents, blending medical duties with
    institutional control during high-stakes isolation.
  sphere_of_influence: Hospital Security and Patient Confinement
  season_appearances:
  - 4
  local_uuids:
    1: org_352391177cd3
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_daccc022d541
  global_id: ger_organization_daccc022d541
  canonical_name: Malcorian Medical Establishment
  description: Malcorian Medical Establishment directs doctors like Nilrem, Tava,
    and Berel, along with medical technicians, in emergency examinations, diagnostic
    scans, and patient identity verification. Routine procedures—stethoscope checks,
    torso probes, record searches—expose Riker's alien traits, including misplaced
    heart, absent ribs, and prehensile digits. This revelation pits professional duty
    against xenophobic fears, undermining Starfleet's first-contact efforts and sparking
    societal crisis.
  sphere_of_influence: Malcorian Healthcare Diagnostics and Identity Verification
  season_appearances:
  - 4
  local_uuids:
    1: org_d8b39325372f
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_f10052b12d35
  global_id: ger_organization_f10052b12d35
  canonical_name: Malcorian Scientific Community
  description: Mirasta Yale leads the Malcorian Scientific Community, a group of researchers
    who advance space exploration from high-tech labs on a warp-emerging world. Picard
    and Troi target her first, citing scientists' receptivity to extraterrestrial
    evidence and openness to new ideas. This makes the community the prime facilitator
    for first contact, bridging cultural gaps before political resistance solidifies.
  sphere_of_influence: Scientific Research and Space Exploration
  season_appearances:
  - 4
  local_uuids:
    1: org_079cb18fae80
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b099f7272fcc
  global_id: ger_organization_b099f7272fcc
  canonical_name: Malcorian Society
  description: Malcorian Society's general population spreads rumors of alien presence,
    fueled by xenophobic instincts. This civilian backlash endangers outsiders like
    Riker, as whispers escape the hospital and invite violent backlash. Berel highlights
    the shift from isolated suspicion to widespread peril, positioning the society
    as an antagonist force that undermines first-contact efforts through collective
    prejudice.
  sphere_of_influence: Xenophobic Civilian Populace
  season_appearances:
  - 4
  local_uuids:
    1: org_36fca29df647
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_d3f305a3013a
  global_id: ger_organization_d3f305a3013a
  canonical_name: Manitoba Journal of Interplanetary Psychology
  description: An external academic publication based in Manitoba that publishes and
    circulates research on psychological phenomena across planets and cultures. In
    the current material it acts as a source of formal research inquiries and informational
    correspondence directed to shipboard personnel, functioning as an authoritative
    scholarly interlocutor rather than an operational or governmental body.
  sphere_of_influence: Interplanetary Psychological Research and Academic Correspondence
  season_appearances:
  - 3
  local_uuids:
    1: organization_c408c49786c4
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_f8ba90f42dc6
  global_id: ger_organization_f8ba90f42dc6
  canonical_name: Maquis
  description: Federation citizens displaced by the Federation-Cardassian treaty form
    the Maquis, a rebel insurgency operating from scattered cells in the Demilitarized
    Zone. They attack Cardassian vessels with advanced weapons like photon torpedoes
    and type-8 phasers, often ignoring Starfleet orders to stand down. Leaders such
    as Macias direct operations, with members including Santos and Kalita testing
    recruits like Ro Laren, who defects after infiltrating their vulnerable settlements.
    Their shift from self-defense to organized aggression against Cardassians draws
    accusations of Starfleet support and threatens wider conflict, forcing desperate
    raids for medical supplies amid ambushes and internal distrust.
  sphere_of_influence: Demilitarized Zone Insurgency and Anti-Cardassian Militancy
  season_appearances:
  - 7
  local_uuids:
    1: org_272cc71f2635
  first_appearance_season: 7
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_539a3147a7da
  global_id: ger_organization_539a3147a7da
  canonical_name: Mariachi Band (Performing Group)
  description: An ephemeral, conjured mariachi ensemble summoned and directed by Q
    to stage an extravagant, mocking celebration aboard the bridge. The troupe provides
    live music, spectacle, and deliberate distraction—confetti and fantasy performers
    included—acting as a theatrical device and psychological diversion under Q's unilateral
    control, with no independent hierarchy.
  sphere_of_influence: Conjured Theatrical Performance and Psychological Diversion
  season_appearances:
  - 3
  local_uuids:
    1: organization_8e699b23e8ed
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0715fe143059
  global_id: ger_organization_0715fe143059
  canonical_name: Mariposan Clones
  description: The Mariposan Clones comprise the cloned populace of the colony of
    Mariposa, descended from five original progenitors and organized into functional
    roles (medical staff, armed sentries, technicians). Afflicted by accelerating
    replicative fading, their society pursues fresh genetic material to sustain viability.
    Observed behaviors include coordinated deception, clinical abduction, nonconsensual
    tissue harvesting, operation of cloning banks, and deployment of armed clones—all
    driven by an explicit survival imperative and mediated through colony leadership.
  sphere_of_influence: Population Survival via Cloning; Medical Genetics, Cloning
    Infrastructure, and Internal Security
  season_appearances:
  - 2
  local_uuids:
    1: organization_79e3bca35668
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1f314c47d0b9
  global_id: ger_organization_1f314c47d0b9
  canonical_name: Mariposan Society
  description: A planetary Mariposan society/colony governed as a closed, clone-based
    community established by original progenitors and sustained through serial cloning.
    The entity is responsible for cloning infrastructure, population governance, and
    interface with external aid; it faces replicative-fading crises and negotiates
    high-stakes interventions while maintaining cultural norms around reproduction.
  sphere_of_influence: Local Political and Cultural Governance via Cloning; Public-Facing
    Social Control and Bioethical Practice
  season_appearances:
  - 2
  local_uuids:
    1: organization_3d30eaf7ecdd
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_4c239f199974
  global_id: ger_organization_4c239f199974
  canonical_name: Mariposans
  description: The Mariposans constitute a formerly spacefaring civilization responsible
    for deploying advanced protective devices—most notably a distress satellite and
    the engineered ‘butterfly ship’—to safeguard and signal migrating colonies. Their
    material legacy functions as both guardian technology and origin myth for descendant
    communities (including the Bringloidi). The group’s internal hierarchy is not
    shown, but their engineering capability and intentional custodial actions drive
    Starfleet’s forensic deductions and reframe the refugees’ oral history into actionable
    intelligence.
  sphere_of_influence: Ancient Technological Engineering and Cultural Legacy; Interstellar
    Colonization and Protective Systems
  season_appearances:
  - 2
  local_uuids:
    1: organization_bc805b859df2
  first_appearance_season: 2
