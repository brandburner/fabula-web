- fabula_uuid: ger_organization_59c6325764d4
  global_id: ger_organization_59c6325764d4
  canonical_name: USS Phoenix (Rogue Vessel)
  description: The USS Phoenix is a Starfleet vessel commanded by Captain Benjamin
    Maxwell, which becomes rogue after the Cardassians kill Maxwell's family at Setlik
    Three. The ship executes a preemptive strike on Cardassian targets, destroying
    a Cardassian warship after it fires first and then annihilating an unarmed supply
    ship carrying civilians (600 killed on the warship, 50 on the supply vessel).
    This rogue action fractures diplomatic efforts, prompts pursuit by the USS Enterprise,
    and raises fears of renewed war amid suspicions of Cardassian rearmament. The
    Phoenix's actions expose Starfleet's trauma and the fragility of its alliances,
    while Chief Miles O’Brien, its former engineer, briefs Picard’s crew on Maxwell’s
    vendetta, fueling Cardassian accusations of vengeance.
  sphere_of_influence: Starfleet Vessel Operations (Rogue Pursuit)
