  canonical_name: Population of Bre'el Four
  description: The civilian population of Bre'el Four—numbering in the millions—functions
    as a dispersed, non‑organized stakeholder group threatened by the moon's failing
    orbit. They possess no centralized command or formal representation; their immediate
    survival shapes Starfleet priorities, compels containment and rescue efforts,
    and frames ethical and operational decisions by the Enterprise crew.
  sphere_of_influence: Humanitarian Stakeholders and Endangered Local Civilian Population
