  global_id: ger_organization_237aeb993bab
  canonical_name: Capitol Journalists (Malcor III)
  description: Capitol Journalists (Malcor III) form the press corps in Malcor III's
    capital. Durken schedules a 6.1 conference with them, exposing his administration
    to media examination. This duty highlights their function in amplifying political
    discourse and pressuring leaders during instability, as Picard’s arrival disrupts
    routine. They embody the press's watchdog presence in Malcor's governance.
  sphere_of_influence: Media Scrutiny and Political Reporting
