- fabula_uuid: ger_organization_d7d9f8cb5bd8
  global_id: ger_organization_d7d9f8cb5bd8
  canonical_name: Klingon R'uustai Tradition
  description: A ritual strand of Klingon cultural practice centered on R'uustai,
    the formal bonding rite that forges kinship through ceremonial regalia, shared
    vows, and an invoked ancestral phrase. It functions as a social mechanism to convert
    loss into chosen belonging, enacted privately by Klingon individuals (here, Worf)
    to integrate outsiders (here, Jeremy) into a durable, honor‑based familial tie.
    The tradition operates through symbolic exchange (sash, candles, recited phrase)
    and relies on personal authority and communal recognition rather than centralized
    institutions.
  sphere_of_influence: Klingon social and ritual kinship practices; cultural rites
    governing family, honor, and adoption
  season_appearances:
  - 3
  local_uuids:
    1: organization_4ec01111fce3
  first_appearance_season: 3
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_bc7aa13177dc
  global_id: ger_organization_bc7aa13177dc
  canonical_name: Klingon Rebels
  description: Klingon Rebels form an insurgent group within the Klingon Empire that
    challenges imperial authority through armed rebellion. Governor Vagh accuses the
    Federation of supplying them weapons, a charge investigated by the Klingon High
    Council. Their possession of Federation phasers heightens diplomatic tensions
    between the Klingon Empire and Starfleet, risking the alliance as Ambassador Kell
    demands answers from Captain Picard.
  sphere_of_influence: Klingon Empire Insurgency
  season_appearances:
  - 4
  local_uuids:
    1: org_c0cd3c027f3d
  first_appearance_season: 4
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_0618b8feb4c0
  global_id: ger_organization_0618b8feb4c0
  canonical_name: Klingon Religion
  description: The Klingon religion structures spiritual life through rituals on Boreth,
    such as ten-day fasts and meditations seeking visions of Kahless. Koroth, the
    Head Cleric, recites the Promise of Kahless's return and demands total devotion.
    Divok receives ecstatic visions beckoning to Sto-Vo-Kor, while Worf confronts
    failure and doubt. This faith tests lineage and resolve, forcing choices between
    heritage and duty.
  sphere_of_influence: Klingon Spiritual Rituals and Vision Quests
  season_appearances:
  - 6
  local_uuids:
    1: org_ca4a9e95e605
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_4a0db976bf53
  global_id: ger_organization_4a0db976bf53
  canonical_name: Klingon Renegades
  description: The Klingon Renegades constitute a dissident faction led by Korris
    and Konmel, vehemently opposing the corrupted Klingon leadership and the imposed
    false peace with the Federation. They uphold an idealized warrior code rooted
    in traditional Klingon honor, rejecting Starfleet integration and Federation authority.
    This faction engages in direct confrontations, including armed standoffs and sabotage
    threats aboard the Enterprise, reflecting their desperate resistance against political
    and cultural assimilation. Their structure centers around charismatic warrior
    leadership embodying romanticized Klingon values, positioning them as antagonists
    challenging both Klingon imperial corruption and Starfleet loyalties, while maintaining
    complex honor-bound interactions that complicate their outright hostility.
  sphere_of_influence: Klingon Political Dissidence and Militarized Rebellion
  season_appearances:
  - 1
  local_uuids:
    1: organization_f5debc36f5cb
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_bf8a57485229
  global_id: ger_organization_bf8a57485229
  canonical_name: Klingon School
  description: Klingon schools immerse students in rigorous physical and mental hardships
    designed to forge strength, discipline, and character. Worf proposes sending his
    son Alexander there to honor Klingon heritage and address the boy's behavioral
    struggles, framing it as the best path for growth despite Alexander's pleas and
    eventual rejection of abandonment fears. These institutions embody traditional
    Klingon expectations, contrasting with personal family bonds on the Enterprise.
  sphere_of_influence: Klingon Cultural Education and Youth Discipline
  season_appearances:
  - 5
  local_uuids:
    1: org_e1497551aaff
  first_appearance_season: 5
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_c14e2ea7a796
  global_id: ger_organization_c14e2ea7a796
  canonical_name: Klingon Self-Imposed Prison Camp (Romulan Detention Facility)
  description: A Romulan-run detention facility where Klingon elders (including L’Kor
    and Gi’Ral) voluntarily hold themselves captive to uphold a secret tradition tied
    to Mogh’s death at Khitomer. Rejects external rescue attempts, emphasizing honor-bound
    secrecy and challenging Worf’s understanding of Klingon values. Serves as the
    primary setting for *Birthright, Part I*.
  sphere_of_influence: Klingon Cultural Tradition Enforcement and Self-Imposed Captivity
  season_appearances:
  - 6
  local_uuids:
    1: org_11f2919499c5
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_6754a904828e
  global_id: ger_organization_6754a904828e
  canonical_name: Klingon Squadron Commanders
  description: 'Kurn rallies four squadron commanders stationed in strategic sectors
    of the Klingon military. They pledge loyalty and will mobilize under his lead
    to support the delayed strategy Worf imposes: wait for Gowron''s weakening by
    Duras sisters, then intervene to restore the Mogh family''s honor. These commanders
    provide essential force for the brothers'' calculated challenge to the High Council,
    blending military might with house politics.'
  sphere_of_influence: Strategic Military Command
  season_appearances:
  - 4
  local_uuids:
