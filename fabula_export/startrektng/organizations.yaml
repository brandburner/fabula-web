- fabula_uuid: ger_organization_10fe83e8a3d3
  global_id: ger_organization_10fe83e8a3d3
  canonical_name: The Firm (Ralph Offenhouse's Late Lawyer's Firm)
  description: A private legal practice once led by Ralph Offenhouse's deceased attorney,
    invoked by Ralph as an active institutional backstop. Ralph treats the firm as
    custodian of client accounts and pre-displacement financial instruments, a source
    of legal representation and leverage, and an implied ally who can validate identity
    and access assets. In the scene the firm functions primarily as a cited source
    of external authority for Ralph's claims; its internal personnel, governance,
    and actual interventions remain unspecified.
  sphere_of_influence: Private Legal Services, Wealth and Account Management, and
    Institutional Legal-Political Influence
