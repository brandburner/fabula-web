  canonical_name: Planetary Disaster Survivors
  description: A loosely organized group of approximately a dozen civilian victims
    found huddled in a flooded, blast-racked corridor. They function as recipients
    of emergency rescue and medical triage, display no formal leadership or structure,
    and include injured and deceased members. Their presence anchors the away team's
    humanitarian actions and forces ethical and tactical decisions by Starfleet personnel.
