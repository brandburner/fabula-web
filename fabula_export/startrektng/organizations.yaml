  canonical_name: Kahless’s Entourage
  description: Kahless’s entourage—Kahless, Koroth, and Torin—serves as a visiting
    Klingon delegation to the Enterprise. Kahless leads with warrior confidence, delivering
    a forceful greeting to Picard, viewing Troi as a potential gift, probing the ship's
    weapons, and demanding a tour. Koroth shows clear discomfort aboard the Federation
    vessel. Together they embody Klingon traditions and values, sparking cultural
    clashes that test Starfleet norms and force Worf to balance his heritage with
    duty.
