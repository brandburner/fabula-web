  episode_count: 1
- fabula_uuid: ger_organization_abe84f4a5df5
  global_id: ger_organization_abe84f4a5df5
  canonical_name: Taguans
  description: The Taguans, indigenous species of Tagus Three, ban outsiders from
    visiting or excavating their ancient ruins and refuse to share details of their
    origins. Picard voices frustration over this policy, which clashes with his scientific
    curiosity and demands diplomatic restraint. He warns Vash that capture during
    unauthorized activities risks severe consequences, heightening external threats
    to archaeological ventures on their planet.
  sphere_of_influence: Indigenous Cultural Preservation on Tagus Three
  season_appearances:
  - 4
  local_uuids:
