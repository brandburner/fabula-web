  canonical_name: Klingon Expedition
  description: The Klingon expedition conducted first contact with the Ventaxians
    seventy years ago. They offered advanced technology to the agrarian society, which
    rejected the proposal outright. Dr. Clark cites this encounter to Picard as a
    key factor in the Ventaxians' cultural regression and current state of technological
    abandonment, heightening their vulnerability to figures like Ardra.
