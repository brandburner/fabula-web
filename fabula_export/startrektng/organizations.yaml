  episode_count: 0
- fabula_uuid: ger_organization_6042ef9490be
  global_id: ger_organization_6042ef9490be
  canonical_name: Crew of the U.S.S. Cairo (Jellico’s Former Command)
  description: A historical reference to Captain Edward Jellico’s past crew, recalled
    during his temporary command of the *Enterprise-D*. Serves as a narrative device
    to contrast Jellico’s leadership style with Picard’s, emphasizing reliability
    and standard operations. No direct interaction with the *Enterprise-D* crew; exists
    solely as a memory or abstract entity.
  sphere_of_influence: Starfleet Starship Operations
  season_appearances:
  - 6
  local_uuids:
