  global_id: ger_organization_db77dfc4f341
  canonical_name: Planetary Mineral Survey Team
  description: A temporary Enterprise Starfleet survey/operational unit commanded
    by Ensign Wesley Crusher, functioning as an ad-hoc junior-officer team for crisis
    response and on-planet field operations. Membership includes or is associated
    with Ensigns Davies, Prixus, Hildebrant, and Alans when specified; the unit reports
    to shipboard command and tests emergent leadership under senior officer supervision.
  sphere_of_influence: Planetary Geological Survey, Resource Assessment, and Field
    Exploration under Starfleet operational command
