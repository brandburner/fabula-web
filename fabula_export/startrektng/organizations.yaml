  episode_count: 3
- fabula_uuid: ger_organization_17ba6436daf8
  global_id: ger_organization_17ba6436daf8
  canonical_name: Romulan Sleeper Agent Network
  description: The Romulan Sleeper Agent Network activates brainwashed Federation
    officers as unwitting operatives to undermine the Federation-Klingon alliance.
    Geordi La Forge, under Romulan conditioning, guides investigations toward explanations
    that protect the conspiracy, such as suggesting detailed scans of tampered memory
    chips. His actions—lacking alibi and subtly advancing sabotage—expose the network's
    method of exploiting trusted insiders to provoke interstellar conflict.
  sphere_of_influence: Covert Infiltration and Alliance Sabotage
  season_appearances:
  - 4
  local_uuids:
    1: org_d936e50c9946
  first_appearance_season: 4
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_f8c276fcfdb7
  global_id: ger_organization_f8c276fcfdb7
  canonical_name: Romulan Star Empire Battlecruisers
  description: The Romulan Star Empire Battlecruisers represent a formidable military
    force operating near the Neutral Zone, acting as a strategic external threat to
    the United Federation of Planets. These warships perform patrol and enforcement
    duties along contested border regions, leveraging their advanced technology and
    tactical presence to exert influence and challenge Starfleet operations. Their
    detection triggers heightened defensive readiness aboard the Enterprise, underscoring
    their role as antagonistic actors within interstellar geopolitical tensions. While
    their internal hierarchy is not detailed here, their deployment near Federation
    posts denotes official state military command and coordinated strategic intent.
  sphere_of_influence: Interstellar Military Operations and Border Security in the
    Neutral Zone
  season_appearances:
  - 1
  local_uuids:
    1: organization_44edcf47c56e
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_1194b1a128ff
  global_id: ger_organization_1194b1a128ff
  canonical_name: Romulan Star Empire Forces
  description: |-
    The Romulan Star Empire (also referred to as 'Romulans' in historical and political contexts) is a covert geopolitical actor with a long history of interference in Klingon affairs. Their actions include:
      1. **Strategic Betrayal at Khitomer**: Duras' father betrayed the Klingons to the Romulans during the Khitomer massacre, providing them with a critical advantage in the conflict. This event remains a historical flashpoint, fueling Worf's personal struggles and the Duras family's political ambitions.
      2. **Covert Support for the Duras Family**: The Romulan Star Empire actively backs the Duras family in their bid to overthrow Gowron's leadership, exploiting Klingon divisions to advance their own strategic interests. General Movar and Romulan agents deliver intelligence on key figures (e.g., Picard) and launch targeted attacks (e.g., the assault on Gowron's cruiser).
      3. **Long-Term Geopolitical Manipulation**: The Empire operates through a blend of intelligence operations and direct interference, avoiding open war while shaping the political landscape of the Alpha Quadrant. Their goal is to forge a potential Klingon-Romulan alliance, which poses a direct threat to Federation security.
      The Romulan Star Empire's actions are characterized by secrecy, historical opportunism, and a willingness to exploit internal conflicts in other powers to achieve their objectives.
  sphere_of_influence: Military operations and covert probing at the Neutral Zone;
    interstellar diplomacy and strategic threat projection
