  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_0bcd92df6b5d
  global_id: ger_organization_0bcd92df6b5d
  canonical_name: Remmler Array
  description: Remmler Array functions as an external system that deploys baryon sweeps
    to purge radiation buildup in Starfleet vessels from prolonged warp travel. The
    Enterprise accumulates high baryon particle levels after five years of intensive
    use, leading Geordi to warn that the Array may apply a stronger beam and risk
    system overloads. Picard authorizes the procedure and crew evacuation despite
    these concerns, balancing it against Worf's security demands.
  sphere_of_influence: Starship Radiation Decontamination and Baryon Sweep Operations
  season_appearances:
  - 6
  local_uuids:
    1: org_1f70167137a9
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_0fdc0824e300
  global_id: ger_organization_0fdc0824e300
  canonical_name: Renegade Klingons
  description: The Renegade Klingons constitute a dissident faction led by Korris
    and Konmel, opposing the official Klingon leadership's peace policies that they
    perceive as corrupting the warrior spirit. They champion the revival of authentic
    Klingon honor through militant resistance and reject the enforced pacifism, acting
    as antagonists to the established regime. Their structure centers around influential
    warrior leaders who court ideological loyalty while seeking to bridge cultural
    divides, as evidenced by their invitation to Worf to connect their worlds. This
    group embodies a cultural and ideological schism within Klingon society, advocating
    for traditional martial values over political compromise.
  sphere_of_influence: Klingon Political and Cultural Dissidence; Warrior Honor Restoration
    Movement
  season_appearances:
