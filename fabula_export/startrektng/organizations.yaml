  episode_count: 0
- fabula_uuid: ger_organization_1068a6db249b
  global_id: ger_organization_1068a6db249b
  canonical_name: Romulan Bases
  description: A network of Romulan military outposts positioned along the Neutral
    Zone, serving as tactical anchors in frontier defense and power projection. The
    bases function as strategic assets whose locations and dispositions directly influence
    events such as the Nelvana Three incident, and they are treated as military holdings
    subject to interrogation, intelligence assessment, and escalation planning by
    opposing command. Their role implies centralized Romulan military oversight, forward
    surveillance and strike capability, and political significance as levers in diplomatic
    and kinetic confrontation.
  sphere_of_influence: Border Military Defense and Strategic Deployment along the
    Neutral Zone
  season_appearances:
  - 3
  local_uuids:
    1: organization_e0f96ff60984
  first_appearance_season: 3
