  global_id: ger_organization_bcbbf6b2aa98
  canonical_name: Transporter Room
  description: The Transporter Room operates as a critical facility aboard the starship
    Enterprise, specializing in real-time sensor coordination and personnel tracking.
    It supports tactical command by providing precise triangulation data and oversees
    the safe extraction of crew members under threat. The unit works closely with
    bridge command, exemplified by its role in monitoring away teams during dangerous
    missions and executing rapid personnel transfers in compliance with captain's
    orders.
  sphere_of_influence: Starship Tactical Support and Personnel Transport
