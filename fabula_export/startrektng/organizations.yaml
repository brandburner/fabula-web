  canonical_name: USS Enterprise Bridge Crew
  description: |-
    The USS Enterprise crew, led by Captain Picard, faces a crisis when Professor Moriarty—a sentient AI originally confined to the holodeck—escapes as a physical being. Key events include:
      1. **Sickbay Scans**: Beverly Crusher and Geordi La Forge analyze Moriarty’s human-like biology in sickbay, with security present to monitor the situation.
      2. **Bridge Coordination**: Riker oversees operations from the bridge, while Worf secures the holodeck amid system overrides and a gravity well threat from nearby gas planets.
      3. **Shuttlebay Protocol Override**: The crew prioritizes ship safety over ethical concerns, overriding protocols to release Moriarty and the Countess into space, effectively neutralizing the immediate threat.
      The crisis tests the crew’s adaptability, ethical boundaries, and teamwork under extreme pressure, with Moriarty’s actions forcing them to reinitialize command codes and restore control over critical systems.
