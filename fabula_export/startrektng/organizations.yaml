- fabula_uuid: ger_organization_0233da89f389
  global_id: ger_organization_0233da89f389
  canonical_name: Klingon Warships
  description: Armed Klingon vessels operating as an immediate hostile task element
    in the local sector. Detected by Enterprise‑C sensors, they present a kinetic
    and tactical threat that forces Captain Garrett to prioritize rearming and offensive
    readiness. They function as an organized Klingon martial contingent acting as
    antagonist naval forces to the Federation ships in the scene; no internal chain-of-command
    or specific unit designation is provided in the current material.
  sphere_of_influence: Interstellar Military Presence and Naval Warfare (Hostile Klingon
    Forces)
  season_appearances:
