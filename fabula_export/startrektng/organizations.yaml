    emergency summons, commands immediate reporting for severe casualties, coordinates
    ship-to-station transfers, and contacts external specialists when cases exceed
    onboard capability. It operates in close operational partnership with nearby Starfleet
    vessels and functions as an authoritative external medical authority for urgent
    clinical treatment and personnel transfer.
