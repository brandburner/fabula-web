  global_id: ger_agent_512b884af7b0
  canonical_name: Margaret More (Meg)
  title_role: null
  description: Margaret More (commonly referred to as 'Meg'), the scholarly and dutiful
    daughter of Thomas More, serves as a key figure in the More household during Henry
    VIII's England. As a humanist scholar fluent in Latin and Greek, she translates
    classical texts for her father, reinforcing his intellectual authority while navigating
    the religious and political tensions of the era. Meg balances her obedience to
    her father with subtle independence, greeting visitors warmly (e.g., Thomas Cromwell
    and Stephen Gardiner) and assisting with household tasks, yet stepping aside during
    private discussions. Her presence embodies the intersection of the More family's
    intellectual rigor and domestic life, reflecting the era's religious upheavals
    through loyalty, curiosity, and poised defiance. She contrasts with Alice More's
    unrefined pragmatism.
