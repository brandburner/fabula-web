- fabula_uuid: ger_agent_f553506a73fb
  global_id: ger_agent_f553506a73fb
  canonical_name: Rafe Sadler
  title_role: King’s Groom
  description: Rafe Sadler serves as Thomas Cromwell's most trusted ward, apprentice,
    and enforcer in Henry VIII's court, operating as both a **domestic administrator**
    and **political operative**. Initially positioned within Cromwell's Austin Friars
    household (alongside family members like Mercy and Johane), he evolves into Cromwell's
    chief protégé, handling discreet tasks such as escorting suspects and observing
    interrogations. While embodying loyalty, professional competence, and quiet reliability,
    he also serves as Cromwell's moral counterpoint, voicing quiet doubts about bloodshed
    and political brutality. His dual role bridges household service and royal intrigue,
    making him indispensable to Cromwell's rise. Key traits include observant hesitation
    in the face of violence, dutiful compliance with Cromwell's directives, and a
    tension between personal ethics and political necessity.
