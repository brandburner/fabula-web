  canonical_name: Henry VIII
  title_role: King of England
  description: Henry VIII rules England as absolute monarch, his whims dictating marriages,
    executions, and religious upheavals. He elevates ministers like Thomas Cromwell
    for their utility, then discards them amid paranoia and old grudges, such as resentment
    over Wolsey's fall. Interactions with loyalists like Rafe Sadler and rivals like
    Norfolk and Gardiner reveal a ruler torn between fleeting sentiment and ruthless
    control. His court orbits his emotional volatility—tears one moment, cold dismissal
    the next—driving dynastic ambitions and factional strife through personal caprice
    and unyielding authority.
