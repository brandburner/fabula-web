- fabula_uuid: ger_agent_308fcc655c9d
  global_id: ger_agent_308fcc655c9d
  canonical_name: John More
  title_role: Sir
  description: Patriarch of the Seymour family and head of Wolf Hall, a knight who
    hosts King Henry VIII and positions his household as loyalists. His traditional
    values and family pride drive efforts to elevate the Seymours amid Tudor power
    struggles. Known for his pragmatic, matter-of-fact approach to court politics,
    he tracks royal signals (e.g., gifts repurposed from fallen favorites) to advance
    family prospects. Exhibits a **dismissive, opportunistic, and confrontational**
    demeanor in political maneuvering, with a focus on family advancement. Father
    to Jane, Edward, and Tom Seymour, and husband to Lady Margery. Contrasts with
    his son Thomas’s more playful approach.
