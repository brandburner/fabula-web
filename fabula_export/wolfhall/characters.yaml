- fabula_uuid: ger_agent_2144bd99b291
  global_id: ger_agent_2144bd99b291
  canonical_name: Thomas Wriothesley (Clerk to Stephen Gardiner)
  title_role: Principal Secretary
  description: Thomas Wriothesley holds the position of principal secretary on Henry
    VIII's Privy Council, rising through Thomas Cromwell's patronage before turning
    against him. He navigates Tudor court intrigues with skill in intelligence gathering,
    diplomacy, and factional maneuvering. Close ties to Cromwell once defined his
    role, but he aligns with rivals like Stephen Gardiner, the Duke of Norfolk, and
    Richard Riche, providing testimony in key interrogations. Ambitious and adaptable,
    Wriothesley balances ruthless opportunism with flashes of guilt over betrayals,
    positioning himself amid shifting alliances in the king's volatile circle.
