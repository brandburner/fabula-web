  canonical_name: Henry, Duke of Orléans
  title_role: Duke of Orléans
  description: Henry, Duke of Orléans, reigns as the second son and heir to King Francis
    I of France, anchoring Valois dynasty ambitions through strategic positioning
    in Habsburg-Valois conflicts. A key figure in European diplomacy, he is debated
    by the English Privy Council as a potential husband for Princess Mary Tudor, serving
    as a counterbalance to Spanish influence. His royal status and dynastic ties drive
    motivations around political alliances, religious schisms, and the fragile balance
    of Catholic power. Ambitious yet bound by dynastic duty, he navigates Valois court
    ambitions while serving as leverage in Tudor foreign policy, particularly under
    the influence of figures like Thomas Cromwell.
