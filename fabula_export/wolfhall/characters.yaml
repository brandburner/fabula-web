  canonical_name: Thomas Audley
  title_role: Lord Chancellor
  description: Thomas Audley, Lord Chancellor and Speaker of the House of Commons,
    serves as a key judicial and parliamentary figure in Henry VIII's court. As Speaker,
    he enforces order in legislative proceedings and advances crown agendas, while
    as Lord Chancellor, he oversees judicial interrogations (e.g., Elizabeth Barton’s
    prophecies) and mediates Privy Council debates. Known for legal pragmatism, dry
    skepticism, and diplomatic authority. **Distinct from religious figures like Thomas
    Cranmer.** Interacts closely with Thomas Cromwell, Eustace Chapuys, and the Duke
    of Norfolk, where his composed mediation contrasts with Norfolk’s bluster.
