  canonical_name: Thomas Howard, Duke of Norfolk (Uncle Norfolk)
  title_role: Duke of Norfolk
  description: Thomas Howard, Duke of Norfolk, leads Henry VIII's traditional nobility,
    clashing with reformers like Thomas Cromwell. Anne Boleyn's uncle resents her
    dominance and perceived ingratitude, driving opportunistic maneuvers to curb her
    sway. Known for his explosive temper, aggressive nature, and classist attitudes,
    he anchors the old nobility's faction while navigating court politics through
    factional supremacy, personal vendettas, and tactical alliances with Henry VIII.
    His role spans presiding over trials, brokering pleas, and testing loyalties,
    embodying the old-guard aggression amid the king's marital and religious reforms.
    Interacts with key figures such as Thomas Cromwell, Anne Boleyn, and Henry Norris.
