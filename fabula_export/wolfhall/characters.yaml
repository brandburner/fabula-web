  canonical_name: Charles V
  title_role: Holy Roman Emperor
  description: Charles V rules the Holy Roman Empire and vast Habsburg territories
    across Europe. Brother to Katherine of Aragon and patron to ambassador Eustache
    Chapuys, he directs opposition to Henry VIII's divorce and religious reforms.
    Chapuys advances his agenda at the English court, probing weaknesses and floating
    invasion threats to install Plantagenet claimants. Charles prioritizes Catholic
    unity and dynastic influence, deploying diplomacy and military potential to check
    Tudor ambitions amid continental power struggles.
