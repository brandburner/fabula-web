    traitors under Henry VIII's regime. He mans the scaffold amid jeering crowds,
    poised with his weapon until the prisoner's arrival. Nervous under scrutiny, he
    accepts a final coin from Thomas Cromwell and nods to his instruction for a clean
    strike. Dutiful to the last, he raises the axe without delay. His brief human
    exchange with the condemned reveals the strain of routine killing in service to
    royal justice, distinct from specialized swordsmen for noble executions.
