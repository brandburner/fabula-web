  canonical_name: Thomas Seymour
  title_role: null
  description: Thomas Seymour (also known as 'Tom Seymour'), the brash and opportunistic
    younger brother of Edward and Jane Seymour, operates within Henry VIII's court
    to advance his family's ambitions. He is characterized by his crude directness,
    paranoia about political rivals (particularly Anne Boleyn), and confrontational
    style, which often clashes with more subtle court figures like Thomas Cromwell.
    His heavy-handed tactics and speculative nature reveal a combative family loyalist
    driven by ambition and suspicion. He interacts closely with his siblings (Jane
    and Edward), parents (John and Margery Seymour), and key court figures, embodying
    the Seymour family's hunger for power and status.
