- fabula_uuid: ger_agent_4cf9c3aca58a
  global_id: ger_agent_4cf9c3aca58a
  canonical_name: Tower Hill Execution Spectators
  title_role: null
  description: "\n      Commoners who mass at Tower Hill for Tudor public executions,\
    \ gathering as spectators to witness state executions on Tower Hill scaffolds.\
    \ They voice the raw pulse of Tudor public sentiment: jeering and spitting at\
    \ disgraced nobles during processions to hasten humiliation, then yielding to\
    \ awe, confusion, and reverence at the block. Their volatile reactions—hostile\
    \ yet obedient, morbidly curious yet fearful—heighten the spectacle of justice,\
    \ channeling collective fear and enforced loyalty to the crown amid power's brutal\
    \ reversals. Held back by Tower Hill Guards, their excitement and communal theater\
    \ turn individual executions into displays of royal authority.\n      "
