  canonical_name: Abbess Dorothea of Shaftesbury
  title_role: Abbess of Shaftesbury Abbey
  description: The Abbess leads Shaftesbury Abbey, the ancient nunnery founded by
    King Alfred. She protects her nuns, including Dorothea, Cardinal Wolsey's daughter,
    from Thomas Cromwell's efforts to dissolve the monasteries under Henry VIII. Sharp-eyed
    and resolute, she challenges visitors' motives, upholds monastic traditions, and
    defends her community's independence against Reformation pressures. Her authority
    rests on ensuring her sisters' survival in a time of upheaval.
