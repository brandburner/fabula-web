- fabula_uuid: ger_agent_ea42231fee8e
  global_id: ger_agent_ea42231fee8e
  canonical_name: Courtiers
  title_role: null
  description: A collective of noble lords, knights, and courtiers who populate Henry
    VIII's royal household at Hampton Court, serving as the nobility and attendants
    who uphold court protocol. They form the ceremonial retinue flanking the king
    in palace processions, part for royal processions, fix stares on newcomers like
    Jane Seymour, and applaud the king's public displays of affection to affirm loyalty.
    In courtyards, they drink at wine fountains amid the throng, forming a lively
    backdrop to maneuvers by figures such as Thomas Cromwell, Rafe Sadler, and Wriothesley.
    Their deference marks power shifts from Anne Boleyn to Jane Seymour, embodying
    the court's collective alignment with monarchical will. These individuals are
    deferential, loyal, and watchful, navigating deference to the crown while attuned
    to shifting alliances and whispers of unease.
