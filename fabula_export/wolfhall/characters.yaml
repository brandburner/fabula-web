  title_role: Princess
  description: Infant daughter of Henry VIII and Anne Boleyn, born in 1533 as a symbol
    of Anne's fragile queenship and the Tudor court's break from Rome. Her birth elevated
    her to princess and potential heir, with her legitimacy contested by traditionalists
    (e.g., Elizabeth Barton) and used as a political tool by reformers (Cromwell,
    Cranmer). Her interactions include key figures like Anne Boleyn, Henry VIII, Cromwell,
    and Thomas Wyatt, with her existence serving as a pivotal symbol in the royal
    succession and court tensions.
