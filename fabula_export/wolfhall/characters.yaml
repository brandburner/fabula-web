  canonical_name: King's Halberdiers
  title_role: null
  description: King's Halberdiers form Henry VIII's elite royal guard unit, armed
    with halberds for ceremony and enforcement. They secure high-stakes venues like
    council chambers and great halls during crises, escort prominent prisoners such
    as Thomas Cromwell, and back councilors in arrests. Loyal solely to the crown,
    they cut through factional tensions, coordinating with figures like Stephen Gardiner,
    William Fitzwilliam, and William Kingston. Their armored discipline asserts royal
    dominance in volatile power plays.
