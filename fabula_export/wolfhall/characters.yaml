  canonical_name: Stephen Gardiner
  title_role: Bishop of Winchester
  description: Stephen Gardiner serves as Bishop, former secretary to Cardinal Wolsey,
    and **Secretary** in Henry VIII's court. He champions Catholic orthodoxy against
    reformers like Thomas Cromwell, managing **diplomatic, administrative, and intelligence
    duties**. His rivalry with Cromwell is central to his role, as he commands a **spy
    network** to track Cromwell's reformist advances, cultivates sources (e.g., Wriothesley),
    and relays pivotal updates on royal decisions (e.g., separations involving Queen
    Katherine and Princess Mary). Opportunistic, ambitious, and unyielding, Gardiner
    wields **information and factional alliances** as weapons to preserve Catholic
    traditions amid the king's marital crises and doctrinal shifts. His core traits—combative,
    resentful, defensive, orthodox, cunning, conservative, and strategic—reflect his
    dual roles as a **court insider, religious traditionalist, and intelligence operative**.
