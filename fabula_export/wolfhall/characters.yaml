  title_role: null
  description: Thomas Howard the Younger, half-brother to Thomas Howard, Duke of Norfolk,
    serves as a poet in Henry VIII's Tudor court. Known by the alias Thomas Truth,
    he pursues romantic verse and a secret attachment to Lady Margaret Douglas, the
    king's niece. These pursuits entangle him in noble rivalries and royal suspicions,
    pitting aristocratic privilege against reformers like Thomas Cromwell. His idealism
    clashes with court dangers, exposing him to treason charges that end in execution.
    Loyal to Howard interests, he embodies the fragile intersection of art, romance,
    and dynastic ambition.
