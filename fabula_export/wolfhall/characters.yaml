  canonical_name: Richard Cromwell
  title_role: null
  description: Thomas Cromwell's nephew and a key figure in the Austin Friars household,
    serving as a trusted political advisor, protector, and deputy. Young, assertive,
    and outspoken, Richard handles family errands (e.g., trips to Antwerp), navigates
    Tudor court dynamics alongside his cousin Gregory Cromwell, and assists in crises
    like royal medical care. Playful in family settings with brother Gregory and Rafe
    Sadler, he balances youthful mischief with steadfast reliability. Independent
    and morally principled, Richard challenges his uncle's pragmatic maneuvers while
    engaging directly with figures such as Anne Boleyn, Francis Bryan, Thomas More,
    Henry VIII, and Eustace Chapuys. His defiance and curiosity reflect a personal
    conviction that often clashes with the coercive alliances of Tudor politics.
