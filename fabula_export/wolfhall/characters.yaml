  canonical_name: Anne Boleyn's Ladies-in-Waiting
  title_role: null
  description: Anne Boleyn's ladies-in-waiting (also referred to as 'Anne's Attendants')
    form her inner circle of personal attendants at the Tudor court. They handle daily
    care, public duties, and formal rituals with precision, maintaining composure
    amid volatile royal dynamics. Bound by service to the queen, they balance loyalty
    with self-preservation, their gazes revealing the court's undercurrents of ambition
    and caution. Their role includes physical support during ceremonies, handling
    Anne's personal comfort, and navigating tensions around her pregnancy and queenship
    without drawing attention to themselves. They embody deference in the high-stakes
    environment of the Tudor court, strengthening Anne's position through steady,
    unobtrusive assistance.
