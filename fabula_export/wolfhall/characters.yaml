  title_role: null
  description: Bess Oughtred is a pivotal figure in *Wolf Hall* as the sister of Queen
    Jane Seymour and a key member of the Seymour family circle. She serves as a strategic
    informant for Thomas Cromwell in Henry VIII's court, leveraging her familial ties
    and court connections to protect Seymour interests while navigating Tudor power
    struggles. Her defiance of factional overreach—particularly against rivals like
    the Howards—is matched by her loyalty to her kin. Bess's sharp wit and personal
    autonomy allow her to challenge manipulative schemes, including dynastic matchmaking,
    while guarding family legacies such as Queen Jane's girdle book. Her interactions
    with figures like Thomas Cromwell, Norfolk, and Catherine Howard provide her with
    access to royal secrets, which she shares boldly despite personal risks. Her role
    spans multiple episodes, where she blends charm with defiance to safeguard her
    family's position in the court.
