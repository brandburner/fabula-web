  title_role: Lord Privy Seal
  description: Calculating patriarch of the Boleyn family and leader of the Boleyn
    Faction, a powerful political bloc at Henry VIII's court. The faction includes
    the Boleyn clansmen, who are the devoted retainers of the Boleyn family. These
    clansmen rally at George Boleyn's command during political crises, chanting allegiance
    to advance the family's power against rivals like Thomas Cromwell. Thomas Boleyn,
    as the patriarch, prioritizes self-preservation and strategic alliances (e.g.,
    with Cromwell, Wolsey) over loyalty, surviving the family's eventual downfall.
    The faction's influence is tied directly to royal favor, with the clansmen's aggressive
    and opportunistic loyalty driving partisan displays that highlight the faction's
    power in Tudor court intrigue.
