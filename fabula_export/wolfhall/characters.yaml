    of Catherine of Aragon and Catherine Howard, where she navigates dynastic intrigues
    with a blend of poised observation and defiant passion. As a vulnerable player
    in Tudor succession politics, she interacts with key figures like Thomas Cromwell,
    Mary Tudor, and the Howards, while her romantic entanglements (e.g., with Tom
    Truth) expose her to political threats. Her character embodies the tension between
    personal desire and survival in a court dominated by power struggles.
