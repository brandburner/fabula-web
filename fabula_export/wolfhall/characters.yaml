  canonical_name: Cuthbert Tunstall
  title_role: Bishop
  description: Cuthbert Tunstall, also known as Bishop Tunstall, serves as Bishop
    of Durham under Henry VIII. A conservative cleric and scholar, he resists reformist
    changes pushed by Thomas Cromwell while maintaining a politically astute balance
    between doctrinal fidelity and royal favor. Henry VIII considers him for key promotions,
    including the Vicegerent role over church matters, signaling a preference for
    orthodox clergy over reformers. Tunstall aligns with traditionalists like the
    Duke of Norfolk and Wriothesley, anchoring the old guard amid the factional fights
    that define England's religious realignment. His loyalty to the crown underscores
    the tension between papal allegiance and Tudor supremacy.
