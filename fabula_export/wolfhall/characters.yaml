  canonical_name: Sheriffs
  title_role: null
  description: |2-

          **Consolidated Role**: A unified entity representing the **official escorts and jailers** responsible for the **final stages of the Tudor judicial process** at the Tower of London. They handle the **internal procession** of condemned prisoners (e.g., Thomas Cromwell) from the **Great Hall to the execution site**, ensuring compliance with royal protocol. Their duties include:
          1. **Escorting prisoners** from the Tower’s interior (e.g., Great Hall) to the inner ward or handoff point.
          2. **Enforcing protocol** to prevent deviations or delays in the execution process.
          3. **Coordinating with executioners** (e.g., Tower Hill Executioner) to bridge imprisonment and public execution.
          4. **Operating anonymously** as disciplined, impersonal enforcers of state power, prioritizing routine over sentiment.

          **Key Distinctions from Other Entities**:
          - **Not Tower Hill Guards**: Those operate externally at Tower Hill, handling crowd control during executions.
          - **Not the Executioner**: The Executioner performs the beheading itself, not the escort.
          - **Not the Crowd**: The Crowd is the jeering public at Tower Hill, not part of the judicial process.

          **Narrative Function**: This entity embodies the **mechanics of Tudor justice**, transforming private confinement into public ritual through **disciplined, protocol-driven movements**. Their presence asserts state authority without personal stake, serving as a **routine extension of Henry VIII’s judicial system**.
