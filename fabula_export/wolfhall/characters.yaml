  canonical_name: Amos
  title_role: Prophet
  description: Amos stands as an 8th-century BCE Hebrew prophet from Tekoa in Judah,
    called from shepherding and tending sycamore figs to deliver God's oracles. He
    confronts the northern kingdom of Israel's elite with accusations of corruption,
    exploitation of the poor, and empty rituals. His visions pronounce inevitable
    divine judgment unless they repent. Amos embodies the outsider voice challenging
    complacency, his terse poetry blending legal indictments with apocalyptic warnings.
    His legacy shapes prophetic literature, emphasizing justice over sacrifice.
