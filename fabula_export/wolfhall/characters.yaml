  canonical_name: Walter Cromwell
  title_role: Blacksmith
  description: 'Walter Cromwell is Thomas Cromwell''s father and a blacksmith in Putney.
    Powerfully built into his sixties, he embodies the brutal working-class roots
    from which Thomas flees. Walter''s parenting is defined by extreme harshness:
    he beats his son viciously during childhood, teaches survival through painful
    endurance (ignoring Thomas''s cries during forge burns), and later protects him
    by secretly paying off the family of a young man Thomas killed—all without seeking
    acknowledgment. Estranged from Thomas as an adult, Walter remains a looming presence
    in the family''s emotional fractures, scorned by Thomas for his working-class
    roots and dismissed by Liz and Kat. He interacts with Thomas, Kat Cromwell, Anne
    Cromwell, Grace Cromwell, Rafe Sadler, Stephen Gardiner, and the Young Man''s
    Family (Putney), serving as a brutal anchor to the Cromwell family''s complex
    dynamics across multiple episodes (Wolf Hall S01E01 and S01E05).'
  traits:
