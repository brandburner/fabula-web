    her English household. They function as both personal maids of honor and cultural
    companions, clustering quietly in her bedchamber and murmuring in their native
    tongue to reinforce her foreign identity. Their presence highlights Anne's cultural
    detachment from the Tudor court while providing silent, loyal support. They participate
    in ceremonial duties (e.g., royal processions) and maintain discreet, deferential
    behavior amid political intrigue, embodying the dual roles of personal attendants
