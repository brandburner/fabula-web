  canonical_name: Henry Pattinson
  title_role: Fool
  description: Henry Pattinson serves as fool in Thomas More's Chelsea household.
    He lollops around guests like Stephen Gardiner, grinning broadly, and pelts diners
    with bread crusts from the gallery above, hooting like an owl and shouting blasphemies.
    More deems him excitable, and he obeys calls to return indoors from Cromwell or
    More. His antics disrupt formal dinners and garden talks, exposing unruly undercurrents
    in the disciplined home amid Tudor religious tensions. Playful chaos defines his
    role, puncturing pretension through licensed folly.
