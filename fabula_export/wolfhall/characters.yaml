- fabula_uuid: ger_agent_53f5785e3fc3
  global_id: ger_agent_53f5785e3fc3
  canonical_name: Courtenay Family
  title_role: Marquess of Exeter
  description: The Courtenay Family, led by Henry Courtenay, Marquis of Exeter, is
    one of England's most prominent and longstanding noble families with Plantagenet
    lineage from Edward IV's daughter. As a branch of ancient nobility, they represent
    the resilient old guard that once dominated court influence, maintaining ties
    to Catholic sympathizers and regional strongholds like Devon and Cornwall. The
    family symbolizes the traditional aristocracy that resists Tudor dominance, embodying
    the tension between entrenched elites and rising reformers. Henry Courtenay serves
    as a key figure in the Tudor court, overseeing family estates while navigating
    political tensions between conservative nobles and Henry VIII's religious reforms.
    Figures like Elizabeth Barton prophesy in their favor, drawing treason accusations
    as they cautiously navigate networks opposing Tudor rule. Their displacement at
    the hands of Thomas Cromwell underscores the broader conflict between pre-Tudor
    lineage and the emerging meritocratic order.
