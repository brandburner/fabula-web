  canonical_name: Mark Smeaton
  title_role: Lutenist
  description: Low-born lutenist in Henry VIII's court, initially serving in Wolsey’s
    household before rising to prominence at the royal court. Known for his sullen,
    opportunistic, and resentful personality, he navigates power dynamics through
    music, boasting of an affair with Anne Boleyn to gain status among courtiers like
    Norris and Weston. Provocative yet fragile, he endures humiliations from Anne
    Boleyn, provokes Thomas Cromwell with snide remarks, and ultimately delivers a
    coerced confession under interrogation, playing a pivotal role in the downfall
    of Wolsey and the Boleyn faction. Central to Cromwell’s rise and the political
    intrigues of the Tudor court.
