  canonical_name: Cromwell's Domestic Household
  title_role: null
  description: "\n      A **collective entity** comprising Thomas Cromwell's son (**Gregory\
    \ Cromwell**), nephew (**Richard Cromwell**), ward (**Rafe Sadler**), and other\
    \ close associates who share his quarters at Austin Friars.\n      **Purpose**:\n\
    \      - Provides **emotional support** (e.g., Gregory's idealism, Rafe's loyalty)\
    \ and **operational support** (schedule management, political vigilance).\n  \
    \    - Serves as a **functional unit** for Cromwell's domestic and political affairs,\
    \ balancing **affective bonds** (e.g., Gregory's questions about his father's\
    \ tactics) with **practical roles** (e.g., Rafe's absorption of political lessons).\n\
    \      - **Key Dynamics**:\n        - **Gregory Cromwell**: Son who questions\
    \ his father's ruthlessness, embodying **idealism and moral conflict**.\n    \
    \    - **Rafe Sadler**: Ward and political protégé, representing **impressionable\
    \ innocence** amid court cynicism.\n        - **Richard Cromwell**: Nephew, implied\
    \ to be part of the household collective (though not explicitly named in the target).\n\
    \        - **Other close associates**: Unnamed individuals contributing to the\
    \ household's **functional and affective fabric**.\n      **Sphere of Influence**:\
    \ Austin Friars household, with ripple effects on Cromwell's political and personal\
    \ life.\n      "
