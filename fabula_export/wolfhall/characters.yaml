  canonical_name: George Boleyn's Squire
  title_role: null
  description: George Boleyn's squire is a meticulous and loyal attendant who specializes
    in equipping his lord with armor for jousts and courtly combats at Henry VIII's
    royal tiltyards. With expert precision, he secures armor plates onto the arming
    doublet, balancing protection and mobility to support Boleyn's martial prowess.
    Working in the tense political atmosphere of the Tudor court, he remains focused
    and unobtrusive, embodying the ideal of a chivalric servant who enables nobles
    to project strength without distraction. His duties uphold the Boleyn family's
    status through precise, hands-on preparation for tournaments amid royal rivalries.
    He is also involved in broader courtly events, including interactions with figures
    like Thomas Cromwell and the Greenwich Tiltyard Pavilion.
