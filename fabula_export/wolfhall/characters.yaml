  global_id: ger_agent_31843f951a63
  canonical_name: John de Vere, 13th Earl of Oxford
  title_role: Earl of Oxford
  description: John de Vere, 13th Earl of Oxford, serves as a senior noble in the
    Tudor courts under Henry VII and Henry VIII. As Lord Great Chamberlain, he attends
    pivotal royal events, escorts princes in ceremonial duties, and provides historical
    testimonies during court proceedings. His role as a veteran peer alongside figures
    like the Earl of Shrewsbury and the Duke of Norfolk underscores his duty to uphold
    aristocratic traditions and authenticate dynastic events. Known for his observant,
    composed, and discreet nature, de Vere embodies aristocratic loyalty and continuity
    amid political shifts, navigating power dynamics through measured presence rather
    than bold intervention.
