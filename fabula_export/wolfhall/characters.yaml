    Henry VIII and Catherine of Aragon. Initially recognized as a princess, she was
    declared illegitimate after her parents' marriage was annulled, reducing her to
    the title 'Lady Mary.' She aligns with traditionalist factions like Thomas More
    and Stephen Gardiner, resisting the Reformation and Anne Boleyn's rise. Her devout
    Catholicism and loyalty to her mother's legacy make her a persistent symbol of
    the old order in Tudor politics. She plays a central role in the 1530 succession
    crisis and political maneuvering at court.
