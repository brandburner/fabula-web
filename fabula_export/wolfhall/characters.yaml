- fabula_uuid: ger_agent_02b88acf870a
  global_id: ger_agent_02b88acf870a
  canonical_name: Priest
  title_role: Priest
  description: Catholic priest active in early 1530s London and royal chapels during
    Henry VIII's break with Rome. He leads Latin Masses in parish churches and officiates
    secret weddings for the king and Anne Boleyn. Confronted by reformist disruptions
    like James Bainham's scriptural outburst, his ritual authority crumbles into shock
    amid congregational fury. Positioned at the fault line of orthodoxy and heresy,
    he embodies the old church's ceremonial role, binding hands in vows while facing
    threats to doctrinal control. His faltering response highlights vulnerability
    in an era of upheaval.
