  description: Don Diego de Mendoza acts as Spain's ambassador to Henry VIII's court.
    He champions Lady Mary Tudor's cause through discreet deliveries of letters and
    portraits from imperial allies like Dom Luis, while coordinating with Eustace
    Chapuys to counter English dominance. Proud of his lineage, he resents past humiliations
    by figures like Wolsey and Cromwell, deploying ostentatious displays and coded
    diplomacy to assert Spanish prestige. Fastidious and formal, Mendoza balances
    hostility toward English officials with calculated restraint, motivated by Catholic
    loyalty and geopolitical leverage against the Reformation.
