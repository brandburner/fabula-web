  canonical_name: Clement VII (Pope)
  title_role: Pope
  description: Medici pope and head of the Catholic Church during Henry VIII’s reign.
    His refusal to annul Henry VIII’s marriage to Catherine of Aragon directly triggers
    the English Reformation, positioning him as a **political and doctrinal obstacle**
    to Henry’s personal and royal agendas. Core traits include indecisiveness, doctrinal
    rigidity, and political caution. Represents the institutional power Henry seeks
    to circumvent, with interactions spanning key figures like Thomas Cromwell, Anne
    Boleyn, and Thomas Cranmer.
