- fabula_uuid: ger_agent_dcdc5d771fc6
  global_id: ger_agent_dcdc5d771fc6
  canonical_name: François I of France
  title_role: King of France
  description: François I of France (r. 1515–1547) rules as King of France, embodying
    a blend of regal poise, calculated vulgarity, and shrewd diplomacy. He engages
    in tense diplomatic exchanges with English envoys like Thomas Cromwell at Calais,
    probing loyalties with pointed questions and crude assessments of figures such
    as Anne and Mary Boleyn. His courtly interactions—including dancing and intimate
    conversations with Anne Boleyn—reveal a mix of charm and predation, testing allegiances
    amid Anglo-French rivalries. As a diplomatic rival to Henry VIII, he hosts envoys
    at Calais Castle, focusing on French-English relations and Reformation tensions.
    His policies prioritize expensive wars over trade-based revenue, reflecting unchecked
    royal finance and martial ambition, which serve as a foil to Tudor struggles in
    diplomatic comparisons.
