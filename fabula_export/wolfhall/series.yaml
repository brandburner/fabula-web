    - fabula_uuid: ep_sea_ser_wolf_hall_s02_e04
      episode_number: 4
      title: The Mirror and the Light Episode 4
      logline: Following Queen Jane's death and amidst growing political tensions,
        Thomas Cromwell navigates treacherous alliances, a potential invasion, and
        the King's desperate need for a new heir, all while facing personal demons
        and the resurgence of old enemies.
      high_level_summary: "Following the death of Queen Jane shortly after giving\
        \ birth to a male heir, Thomas Cromwell is tasked with securing England's\
        \ future amidst rising political tensions and King Henry VIII's vulnerability.\
        \ Norfolk pressures Cromwell to find Henry a new wife to solidify the Tudor\
        \ line and counter the growing alliance between France and the Holy Roman\
        \ Empire. Cromwell suggests a marriage to a German princess but faces resistance.\
        \ Meanwhile, Cromwell is reunited with his estranged daughter, Jenneke, and\
        \ contemplates his past, including his relationship with Cardinal Wolsey and\
        \ the accusations of betrayal leveled by Wolsey's daughter, Dorothea. \n\n\
        As Cromwell grapples with personal turmoil and the changing religious landscape,\
        \ he faces challenges to his authority. Bishop Gardiner returns from France,\
        \ stirring up religious tensions. He seeks to undermine Cromwell's influence\
        \ by discrediting his reformist policies and questioning his loyalty to the\
        \ King. Henry, grieving and anxious about the security of his reign, becomes\
        \ susceptible to Gardiner's influence. \n\nThe political climate is further\
        \ complicated by the threat of invasion from the Holy Roman Empire, fueled\
        \ by the discontent of old Plantagenet families loyal to Rome. Cromwell faces\
        \ the difficult task of suppressing internal dissent and preparing England\
        \ for potential war. To counter this threat, Cromwell sends Wyatt to the Emperor\
        \ to try and break up the alliance between the Empire and France, and navigates\
        \ the possibility of an alliance with the German princes. In a bid to control\
        \ potential traitors, Cromwell interrogates Geoffrey Pole, seeking information\
        \ about his family's dealings and their loyalty to the King.\n\nCromwell's\
        \ political and personal lives collide when he is tasked with managing the\
        \ case of John Lambert, a heretic whose views align with Cromwell's but threaten\
        \ the King's authority. Cromwell avoids taking an open stand as he must remain\
        \ in power to protect the gospel, and Lambert pays the price. This decision\
        \ haunts Cromwell, and he begins to suffer nightmares and a return of his\
        \ old fever. While ill, Gardiner uses Cromwell's absence to his advantage,\
        \ gaining King Henry's ear. \n\nAs Cromwell recovers, he finds his influence\
        \ waning and Gardiner's rising. At a dinner hosted by Cranmer, Gardiner and\
        \ Norfolk openly accuse Cromwell of being involved in Cardinal Wolsey's scheming,\
        \ questioning his past and loyalty. Cromwell, reaching his breaking point,\
        \ confronts Norfolk, resulting in a volatile scene, marking a significant\
        \ turning point in Cromwell's relationships with key figures in the court\
        \ and foreshadowing increased conflict and danger. Ultimately, though, he\
        \ returns to service to King Henry."
