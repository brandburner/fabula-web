    - fabula_uuid: ep_sea_ser_wolf_hall_s02_e06
      episode_number: 6
      title: The Mirror and the Light Episode 6
      logline: As Thomas Cromwell faces accusations of treason and heresy, he reflects
        on his rise to power and loyalty to the King while grappling with the knowledge
        that his fate rests on Henry VIII's merciless will.
      high_level_summary: "Episode 6 of *The Mirror and the Light* sees Thomas Cromwell\
        \ imprisoned in the Tower of London, facing interrogation and reflecting on\
        \ his past. Flashbacks interweave with present-day scenes, revealing his memories\
        \ of Anne Boleyn's execution, his close relationship with his family, and\
        \ key moments with Cardinal Wolsey. Accused of treason, heresy, and self-serving\
        \ ambition, Cromwell endures questioning from Norfolk, Gardiner, and Riche,\
        \ who present evidence ranging from a purple doublet to correspondence with\
        \ heretics and his relationship with Lady Mary. \n\nDespite the severity of\
        \ the charges, Cromwell remains composed, deflecting accusations and occasionally\
        \ displaying his sharp wit. Rafe visits him, bringing news and Cranmer’s supportive\
        \ but cautious letter while Wriothesley, now aligned against Cromwell, oversees\
        \ the dissolution of Cromwell's household. A letter from Henry gives Cromwell\
        \ some hope, which quickly fades. Suffolk visits, advising Cromwell to confess\
        \ to heresy. Henry reads Cromwell’s poignant letter but remains unmoved, influenced\
        \ by Gardiner’s assessment that Cromwell will never forgive him for Wolsey's\
        \ downfall.\n\nAs the interrogation intensifies, Cromwell defends his actions,\
        \ highlighting his loyalty to the King and his efforts to serve England's\
        \ interests. Nevertheless, Norfolk informs Cromwell that he will be executed,\
        \ and the King will marry Catherine Howard. Cromwell grapples with this news,\
        \ also receiving a visit from Kingston, confirming his execution by axe and\
        \ a measure of the King's mercy. Before his execution, Cromwell sees a vision\
        \ of Wolsey. On the scaffold, he asks for forgiveness from God and his former\
        \ master, Wolsey, rather than the King. The episode concludes with his execution,\
        \ followed by a vision of Cromwell in the gardens of Launde Abbey, a place\
        \ of peace he had hoped to retire to, juxtaposing his violent end with a serene\
        \ afterlife."
