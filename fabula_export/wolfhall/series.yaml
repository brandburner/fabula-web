    - fabula_uuid: ep_sea_ser_wolf_hall_s02_e02
      episode_number: 2
      title: The Mirror and the Light Episode 2
      logline: Following Cardinal Wolsey's downfall, Thomas Cromwell navigates the
        treacherous court of Henry VIII, grappling with political alliances and moral
        compromises as he rises in power while facing accusations of betraying his
        former master and risking everything with the King.
      high_level_summary: "Following the prologue, the story jumps seven years into\
        \ the past, focusing on Cardinal Wolsey's acknowledgment of Cromwell's potential\
        \ and his assignment to Wolsey's service. As Wolsey faces the King's disfavor,\
        \ Cromwell witnesses the Cardinal's final days, marked by a poignant farewell\
        \ and the gift of a silver box containing a ring which Cromwell wears from\
        \ that day forward. Cromwell then enters the King’s service where he swears\
        \ to be a true and faithful councillor. \n\nSeven years later, Cromwell, now\
        \ a lord, observes King Henry VIII in disguise at a masquerade. Henry expresses\
        \ his dissatisfaction with his daughter Mary and tasks Cromwell with finding\
        \ her a suitable husband, as well as his niece Lady Margaret Douglas, a potential\
        \ heir to the throne. Wriothesley, Gardiner’s pupil, raises suspicions about\
        \ Lady Margaret.\n\nCromwell commissions Holbein to create portraits of past\
        \ English kings for his home and seeks a ring for Lady Mary. Wriothesley discovers\
        \ Lady Margaret's secret marriage to Thomas Howard the Lesser, Norfolk's half-brother.\
        \ Cromwell confronts Lady Margaret, who confesses to the marriage. Cromwell\
        \ is angered and seeks counsel with people in and around Douglas’s household\
        \ who might have facilitated her secret trysts with Howard. Cromwell then\
        \ approaches Lady Rochford and Queen Jane for any information concerning Lady\
        \ Margaret’s actions.\n\nKing Henry VIII expresses fury over Lady Margaret's\
        \ defiance and orders Cromwell to handle the situation discreetly. Cromwell,\
        \ accompanied by Wriothesley, visits Thomas Howard in the Tower, while also\
        \ visiting Mary, attempting to offer her a gift which the King takes for himself.\
        \ He then meets with Richard Riche and Gregory at the Court of Augmentations,\
        \ where the dissolution of the monasteries is underway. Gregory expresses\
        \ concern about the poor receiving nothing from the closures, prompting Cromwell\
        \ to defend the plan as a means to secure the break from Rome.\n\nA rumor\
        \ arises that the King intends to marry Lady Mary to Cromwell, which Chapuys\
        \ has possession of some information regarding. Cromwell confronts Chapuys\
        \ and expresses his disbelief that the King would consider such a match. Later,\
        \ Wolsey's ghost is seen by Cromwell, warning caution. Cromwell then departs\
        \ for Shaftesbury to meet Dorothea, Wolsey's illegitimate daughter, later\
        \ visiting. \n\nCromwell offers support and even marriage to Dorothea, who\
        \ rebuffs him and accuses him of betraying her father, Cardinal Wolsey, by\
        \ manipulating letters to the King. Deeply affected by Dorothea's accusations,\
        \ Cromwell reflects on his past actions and seeks reassurance from Rafe, who\
        \ tells him he does not believe the accusations.The screenplay concludes with\
        \ Cromwell grappling with doubt and uncertainty, questioning his own motives\
        \ and actions in service to the King."
