  connection_type: SYMBOLIC_PARALLEL
  strength: strong
  description: Cromwell's arrival at the Tower by barge mirrors Anne Boleyn's journey
    to her execution, foreshadowing his own impending doom and emphasizing the cyclical
    nature of power and downfall in the Tudor court.  This explicitly connects to
    Cromwell's flashback to Anne's imprisonment, highlighting the parallel. This sets
    the stage for Cromwell's internal contemplation and acceptance of his fate.
- fabula_uuid: conn_3bb206b2acdd
  global_id: ger_narrativeconnection_dcff4e0ce42e
  from_event_uuid: cand_evt_scene_3da9fd012de5e40f_01
  to_event_uuid: cand_evt_scene_a74bdecf3fe71053_01
  connection_type: EMOTIONAL_ECHO
  strength: strong
  description: Cromwell's contemplation of Anne Boleyn's imprisonment directly leads
    to a flashback/nightmare of her execution, intensifying his emotional distress
    and highlighting his fears of a similar fate.  The execution serves as a reminder
    of the King's ruthlessness.
