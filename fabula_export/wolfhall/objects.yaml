- fabula_uuid: ger_object_82f606d9aed6
  global_id: ger_object_82f606d9aed6
  canonical_name: Wooden Chest of Furs Sealed with Black Tar
  description: Thomas More's voiceover guides viewers through an Antwerp warehouse
    where workers pack a sturdy wooden chest with furs, wool, and madder dye. An accomplice's
    hand slips William Tyndale’s heretical gospels between the folds, hiding them
    amid the trade goods. The chest seals shut under black tar, its glossy marker
    signaling forbidden cargo. The camera dwells on this disguised container as it
    prepares to slip through censors.
  purpose: Smuggles William Tyndale’s heretical gospels past Crown censors by concealing
    them within legitimate trade goods like furs, wool, and madder dye.
  significance: Triggers Thomas More’s discovery of the smuggling operation, igniting
    his internal conflict between duty to the Crown and doubts about persecuting reformers.
    Embodies religious dissent threading through trade routes and mirrors More’s divided
    loyalties.
  potential_owner_mention: William Tyndale
