  canonical_name: Wolsey's Wine Goblet
  description: Wolsey pours red wine from a table pitcher into a plain goblet in the
    York Place audience chamber after Cromwell flinches in surprise. He lifts the
    goblet to his lips and sips slowly, eyes fixed on Cromwell, while Boleyn, Gardiner,
    and Popely watch in the tense hush. The goblet's rim gleams faintly in evening
    light; wine sloshes gently as Wolsey sets it down, creating a tactical pause amid
    veiled threats. This goblet is used by Wolsey to steady Cromwell and buy recovery
    time during a charged exchange of secrets and alliances.
  purpose: Beverage for consumption during conversation; poured to create pause and
    comfort
  significance: Wolsey uses the pour as a deliberate stall, masking his own flinch
    and testing Cromwell's nerve in a chamber thick with power plays and hidden alliances
  potential_owner_mention: Cardinal Wolsey
