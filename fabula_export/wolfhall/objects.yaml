  canonical_name: Wolsey’s Dissolved Household Financial Assets
  description: Legal documents, financial ledgers, and property deeds stripped from
    Wolsey’s Esher manor during his household’s collapse, used for **liquidation and
    wage payment**. Serves as a **bureaucratic record** of his ruin, inventoried in
    private scenes (e.g., morning light in hollowed rooms).
