  description: Cardinal Wolsey kneels beside the bed in his Esher bedchamber and prays
    feverishly. Thomas Cromwell helps the frail cardinal settle into it, smooths the
    blankets, and adjusts them for comfort. Nobles Suffolk, Norfolk, and Boleyn observe
