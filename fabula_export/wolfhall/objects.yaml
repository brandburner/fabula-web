    in her privy chamber at Hampton Court. Discovered by Thomas Cromwell during his
    interrogation of Mary, it confirms her secret correspondence with Catholic allies
    (e.g., the Spanish ambassador) and is used to prove her disloyalty to Henry VIII.
    This letter is *separate from Diego’s diplomatic missive* and was already in Mary’s
    possession before his arrival.
  purpose: Carry clandestine message evidencing Mary's disloyalty and ties to foreign
    Catholic opposition
  significance: Exposes Mary's treasonous intent, validates Cromwell's suspicions,
