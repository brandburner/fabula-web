  canonical_name: Richard Riche’s Parliamentary Bill on the Pole-Howard Scandal (Hampton
    Court, Episode 2)
  description: A **formal parliamentary bill**, drafted by Richard Riche at the behest
    of Thomas Cromwell, proposed in the King’s Presence Chamber at Hampton Court.
    The bill outlines a **quiet parliamentary investigation** into noblewomen tied
    to Lady Margaret Pole’s secret marriage to Thomas Howard the Learner, aiming to
    avoid a public trial like Anne Boleyn’s. Henry VIII approves the bill as a **strategic
    maneuver** to frame Howard for treason while testing Cromwell’s restraint against
    Norfolk. The document serves as a **tool of institutional control**, demonstrating
    Cromwell’s political acumen and Henry’s paranoia over succession.
  purpose: Formalizes parliamentary investigation of noblewomen involved in Lady Margaret
    Pole and Thomas Howard the Lesser's scandalous marriage, enabling discreet handling
    without public trial.
  significance: Hands Cromwell leverage to bury the scandal and frame Howard for treason,
