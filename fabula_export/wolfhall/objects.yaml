  global_id: ger_object_bd792fb7cc41
  canonical_name: Norfolk's Letters to Cromwell Pleading for His Brother's Life
  description: Norfolk pens these letters to Thomas Cromwell, begging mercy for his
    brother Tom Truth amid threats of execution. Henry VIII thrusts them into the
    confrontation in Hampton Court's antechamber, waving them as proof of Cromwell's
    suspect leniency toward the Pole family. Rafe watches silently as the papers ignite
    the king's fury, exposing cracks in their alliance. Cromwell defends his restraint
    while Henry probes his loyalty.
  purpose: Plead for Norfolk's brother Tom Truth's life from execution
  significance: Spark Henry VIII's interrogation of Cromwell's political judgment,
    revealing royal paranoia and the thin line between trust and betrayal at court
