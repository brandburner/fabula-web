  description: Wriothesley pulls up this stool in Thomas Cromwell's Austin Friars
    study and sits to take notes during the interrogation of Lady Margaret Douglas
    over her secret marriage to Thomas Howard. Present agents—Margaret, Cromwell,
    Mary Fitzroy, and Thomas Howard the Lesser—watch as the stool positions Wriothesley
    at work level, ready to record claims of vows without witnesses or consummation.
    The simple furniture supports his task amid rising tension as Cromwell dismantles
    Margaret's defiance.
  purpose: Seating for Wriothesley to take notes during interrogations
  significance: Marks Wriothesley's role as Cromwell's assistant in legal proceedings,
