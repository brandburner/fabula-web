    downpour as the party reaches the ruins of Esher. The mule plods forward with
    a slow, labored gait that matches Wolsey's weary posture. Wolsey dismounts from
    Patch with visible exhaustion while Thomas Cromwell and George Cavendish watch
    in silence.
  purpose: Mount for transporting Wolsey and his party to Esher
