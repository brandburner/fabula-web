  canonical_name: Lambeth Palace Window
  description: Thomas Cromwell stares out this window after Thomas More's defiant
    refusal during the interrogation at Lambeth Palace, his rage giving way to introspection
    with Audley, Cranmer, and Gregory nearby. Wind rattles a similar window in his
    Austin Friars study as he hums alone over parchment at night. Boys Rafe and Gregory
    mime hurling Francis Weston through a hallway window at Wolf Hall until Cromwell
    halts their game. Jane Seymour stands motionless beside another in Wolf Hall's
    great hall, gazing across countryside as Cromwell hesitates to approach.
  purpose: Frames views of the outdoors from interior rooms and marks physical boundaries
    characters cross or reference
  significance: Frames moments of Cromwell's unraveling composure, solitude, paternal
    correction amid court dangers, and encounters with uncontrollable forces like
