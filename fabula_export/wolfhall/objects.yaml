  description: A simple rope noose crafted by the family of a young man Thomas Cromwell
    murdered in Putney. Stephen Gardiner invokes it during a tense confrontation outside
    Greenwich Palace, naming it as their chosen instrument of vengeance against Cromwell.
    The threat hangs over the exchange without physical presence, shattering Cromwell's
    composure as Gardiner reveals the family's unresolved grudge and Walter's cover-up.
  purpose: Execution by hanging
  significance: Serves as Gardiner's psychological weapon in blackmail, exposing Cromwell's
