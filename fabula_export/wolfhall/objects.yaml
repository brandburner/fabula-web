  global_id: ger_object_d1963632e92e
  canonical_name: Norris, Weston, and Brereton's Cards
  description: Harry Norris, Francis Weston, and William Brereton handle a deck of
    playing cards at a table in Greenwich Hall. They shuffle and deal them during
    daylight hours, using the game as cover while Henry VIII gazes at Jane Seymour
    through a window. The cards provide a mundane prop amid crude jests about her
    body, with Norris halting the banter sharply. The pasteboards lie scattered, ignored
    as tension overtakes the play.
  purpose: Card game for courtly distraction
  significance: The cards frame the courtiers' predatory mockery of Henry's infatuation,
    exposing court fractures. Their interrupted game underscores volatility, with
    Weston's glance at Rafe Sadler hinting at spied whispers turning political weapons.
