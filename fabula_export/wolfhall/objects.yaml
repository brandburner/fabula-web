  description: Cromwell draws this letter from his robes in the columned hall of Norfolk's
    Lambeth palace. He reads aloud its accusations of the Duke's marital neglect and
    domestic abandonment, forcing Norfolk to confront his wife's grievances amid witnesses
    like Wriothesley and Suffolk. Norfolk lunges in rage, but Cromwell folds the paper
    away, its contents now a public scar on the Duke's pride.
  purpose: Expose Duke of Norfolk's marital neglect to humiliate him politically
  significance: Cromwell deploys the letter to strip Norfolk of military command and
    authority, turning intimate betrayal into a weapon that cements Cromwell's dominance
    while igniting Norfolk's lasting enmity.
