  canonical_name: Morning Sunlight in Austin Friars Bedroom
  description: Sunlight streams through the window into Thomas Cromwell's bedroom
    at Austin Friars, bathing the quiet space in a warm morning glow. It casts a deceptive
    veil of peace over the room, momentarily softening the hard lines of Cromwell's
    face as he awakens, hums an Italian melody from his youth, and savors a rare unguarded
    moment before duty calls.
  purpose: Illuminates the bedroom with natural morning light
  significance: Highlights Cromwell's fleeting vulnerability and humanity, contrasting
    nostalgic warmth against the encroaching ruthlessness of court politics and foreshadowing
    the personal cost of his ambition.
