  description: A single candle, left burning without supervision, sparks a destructive
    fire in Anne Boleyn’s Windsor bedchamber. Its flame ignites the arras and fills
    the room with smoke, leaving charred remnants amid the smoldering bed hangings.
    Anne blames the unattended light, but Cromwell questions Jane Rochford outside,
    while Henry fixates on the ruined tapestry. Anne’s women hover nearby as tension
