- fabula_uuid: ger_object_c6d7665a662c
  global_id: ger_object_c6d7665a662c
  canonical_name: Wolsey’s Inventories (York Place Assets)
  description: Thick stacks of parchment inventories detailing Cardinal Wolsey’s assets
    and properties, handed by Thomas Cromwell to Anne Boleyn in York Place’s audience
    chamber during Wolsey’s political downfall. The inventories list Wolsey’s possessions
    methodically and serve as both a financial record and a political tool in the
    power struggle between Anne and Cromwell. Anne examines the documents closely,
    using them to test Cromwell’s loyalty and assert control in a charged exchange
    with her ladies—Mary Boleyn, Mary Shelton, and Jane Seymour—present. The papers
    crinkle under her fingers as yapping dogs circle underfoot, while Cromwell deploys
    their delivery as a strategic maneuver to breach Anne’s defenses and launch negotiations.
    These inventories carry the weight of political maneuvering in the tense exchange
    between Cromwell and Anne, foreshadowing Wolsey’s downfall and testing Cromwell’s
    loyalty amid court power shifts.
  purpose: Document Wolsey's financial and property holdings for review during political
    negotiations
  significance: Pretext for Cromwell's meeting with Anne Boleyn; enables her to examine
    Wolsey's weakened position and dominate Cromwell in a test of loyalties and ambitions
  potential_owner_mention: Wolsey
  potential_owner_uuid: ger_agent_76dc8adc5b32
