- fabula_uuid: ger_object_577fe7aa7133
  global_id: ger_object_577fe7aa7133
  canonical_name: Lady Mary's Gratitude Letter to Cromwell (Part of Correspondence
    with Thomas Cromwell)
  description: A politically charged letter from Princess Mary (Mary Tudor) to Thomas
    Cromwell, initially concealed in Cromwell's pocket during a tense promotion ceremony
    in the King's Presence Chamber at Hampton Court Palace. The letter captures Mary's
    defiance, questioning her exclusion from the succession and refusing to recognize
    Henry VIII as head of the Church. Cromwell later uses the same letter to manipulate
    Eustace Chapuys at Austin Friars, revealing Mary's personal address to him as
    her 'chief friend in the world' to erode Chapuys' trust and force negotiations
    for her submission. The letter serves as both a secret communication between Mary
    and Cromwell and a political tool wielded by Cromwell to manipulate allies and
    enemies. The letter is also handed to Cromwell by Wriothesley in his Austin Friars
    study, where Cromwell conceals it instantly, highlighting its volatility amid
    Wolsey's ghostly warnings and Cromwell's iron control over information. The letter's
    suppression ties to Cromwell's unfulfilled promise to Katherine of Aragon and
    Mary's defiance, foreshadowing conflicts with Gardiner and court power struggles.
  purpose: Written correspondence from Lady Mary conveying personal gratitude and
    loyalty to Cromwell
  significance: Triggers Cromwell's paranoia and iron control over information; its
    suppression ties to his unfulfilled promise to Katherine of Aragon and Mary's
    defiance, foreshadowing conflicts with Gardiner and court power struggles
  potential_owner_mention: Thomas Cromwell
