  description: A single document created in the Austin Friars study during Cromwell's
    interrogation of Mark Smeaton. The list was written under duress as Smeaton, battered
    by Richard's physical coercion, named Henry Norris, Francis Weston, William Brereton,
    and Francis Bryan as Anne Boleyn's alleged lovers. Cromwell halted the confession
    at Thomas Wyatt, deliberately excluding him to protect an ally. The document served
    as key evidence in the treason proceedings against Anne Boleyn, capturing both
    Smeaton's verbal testimony and Cromwell's orchestration of the process.
