  global_id: ger_object_605bc0e264c1
  canonical_name: Papal Bull of Excommunication
  description: Thomas Cromwell references the Papal bull during a tense dinner with
    Eustace Chapuys at Austin Friars. He describes it as a threat hanging over Henry
    VIII, embodying the Catholic Church's condemnation of the king's divorce from
    Katherine of Aragon and marriage to Anne Boleyn. Chapuys listens intently, his
    role as ambassador amplifying its weight, while Cromwell wields the mention to
    force a warning to Mary Tudor about submission or execution.
  purpose: Excommunicates Henry VIII and declares subjects absolved from oaths of
    allegiance to him
  significance: Cromwell deploys it as a symbol of papal opposition to pressure Chapuys
    into delivering an ultimatum to Mary Tudor, exposing the geopolitical risks of
    her defiance and Cromwell's ruthless strategy to secure the Reformation
