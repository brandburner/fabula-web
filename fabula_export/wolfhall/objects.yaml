  canonical_name: Lady Mary's Ring from Cromwell
  description: Richard Riche holds up this heavy ring in the Tower's Outer Royal Apartment
    during Cromwell's interrogation. Cromwell gave it to Lady Mary in 1536; she wore
    it around her neck, not her finger, due to its weight and inscription demanding
    obedience to Henry VIII. Norfolk, Gardiner, Wriothesley, and Riche brand it proof
    of Cromwell's undue influence over her. Cromwell counters that it enforces royal
    loyalty, not a lover's token.
  purpose: Enforce Lady Mary's obedience to Henry VIII
  significance: Riche wields the ring as incriminating evidence of Cromwell's manipulative
    sway over Mary, turning Cromwell's own gift against him in the climactic accusations
    of treason and betrayal.
