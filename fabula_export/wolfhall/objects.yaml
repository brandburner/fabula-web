  global_id: ger_object_301df4893d6e
  canonical_name: Neutral Allegory
  description: Servants propose this neutral allegory to paint over the blank wall
    where Wolsey’s coat of arms stood in Austin Friars. The servant suggests it amid
    hesitant brushwork, aiming to fill the void left by the court's purge. Cromwell
    stares at the empty space and rejects it outright, his silence amplifying the
    proposal's failure.
  purpose: Symbolic replacement painted on the wall to comply with court's order erasing
    Wolsey
  significance: Servant's gesture of obedience highlights Cromwell's defiance; rejection
    preserves Wolsey's memory and signals Cromwell's independence from court demands
  potential_owner_mention: Servant
