  canonical_name: Act of Succession (Bill of Succession)
  description: A parliamentary act authored by Thomas Cromwell to legally recognize
    Anne Boleyn as Henry VIII's lawful wife and their children as rightful heirs to
    the throne. The document, enforced through a mandatory oath of supremacy, is presented
    to Thomas More in Lambeth Palace, where he refuses to swear allegiance, leading
    to his arrest. Earlier, Cromwell uses the bill at Paul's Cross to pressure More
    into compliance, while Anne Boleyn scrutinizes its clauses at Windsor, including
    provisions for her potential execution and replacement if she fails to produce
    a male heir. The act's stark legal language fuels court paranoia and tensions
    between Henry VIII, Cromwell, and religious opponents like More.
  purpose: Legally recognizes Anne Boleyn as Henry VIII's lawful wife and her children
    as rightful heirs, enforced through a mandatory oath of supremacy
  significance: Triggers Anne's explosive paranoia over her mortality and Elizabeth's
    insecure claim, prompts her ruthless demand to frame Thomas More as a conspirator,
    and arms Cromwell's coercion of More, exposing ideological rifts and the regime's
    brutal enforcement of loyalty
  potential_owner_mention: Thomas Cromwell
