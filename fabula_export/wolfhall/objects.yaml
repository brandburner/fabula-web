  canonical_name: Orange Juice at Austin Friars Dinner
  description: Orange juice appears as a contextual detail during the tense private
    dinner in the back corridor/great hall of Austin Friars at night. Servants likely
    serve it to guests including Thomas Cromwell and Eustache Chapuys amid their heated
    exchange over Princess Mary's fate. The beverage contrasts the political threats
    with everyday domesticity, poured into glasses as Cromwell presses Chapuys to
    deliver the ultimatum.
  purpose: Beverage served to dinner guests
  significance: Heightens the intimacy of the confrontation, underscoring Cromwell's
    use of hospitality to mask ruthless intimidation tactics against Chapuys and,
    by extension, Mary Tudor.
