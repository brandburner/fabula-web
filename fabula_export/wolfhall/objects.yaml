- fabula_uuid: ger_object_b9740ed4d102
  global_id: ger_object_b9740ed4d102
  canonical_name: Mule (Christopher)
  description: The mule named Christopher stands steady in Putney's rain-soaked mud
    under evening skies. Wolsey struggles to mount it earlier, leaning on Cromwell
    and Cavendish for support, his weakened state clear. Wolsey later ties his fool
    Patch to Christopher's back with ropes to send as a gift to King Henry VIII. Patch
    kicks and wails in resistance as Cromwell, Cavendish, and Norris watch in the
    downpour.
  purpose: Transporting Wolsey and carrying Patch as cargo to the king
  significance: Emphasizes Wolsey's physical decline and desperate surrender of his
    last personal attachment amid his fall from power
  potential_owner_mention: Thomas Wolsey
