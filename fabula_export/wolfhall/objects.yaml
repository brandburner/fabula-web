  global_id: ger_object_d8374e0e4844
  canonical_name: Wriothesley's Evidence Paper on Howard's Secret Marriage
  description: Wriothesley hands this piece of paper to Cromwell in the Bell Tower
    interrogation cell. Cromwell reads it aloud to expose witnesses to Thomas Howard
    the Lesser's pledge in his secret marriage to Lady Margaret Douglas. The document
    contains incriminating evidence, possibly a witness statement or additional poetry.
    Howard reacts with defiance undercut by the revelation, while Cromwell, Wriothesley,
    Christophe, and an off-screen male voice witness the exchange.
  purpose: Present witness evidence implicating Howard in his secret marriage during
    interrogation
  significance: Undermines Howard's aristocratic defiance, exposes vulnerabilities
    in his romance, and escalates Cromwell's control through proof of witnesses, reinforcing
    the court's ruthless power dynamics
