  description: Soldiers load crates and sacks of provisions onto wagons in the Austin
    Friars courtyard under gray daylight. These supplies sustain the platoon heading
    north to confront the rebellion. Thomas Cromwell stands nearby with sons Richard
    and Gregory as Soldier 1 and Soldier 2 emphasize the provisions' role in readiness.
    The bustle creates chaos around Cromwell's gift of a protective medal to Richard.
  purpose: Sustain the platoon with food and essentials during the journey north
  significance: The loading frenzy underscores the rebellion's urgency and Cromwell's
