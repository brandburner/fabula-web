    of a moonless night, serving as a clandestine docking point for the unloading
    of smuggled cargo—likely Tyndale’s English Gospels—by a man and his two young
    sons. The isolated waters and surrounding darkness conceal their tense, silent
    work, punctuated by the creaking of the Flemish herring hooker’s wood and the
    lapping of water against its hull. Thomas More’s voiceover frames the site as
    a symbol of infiltrating heresy, reflecting the moral decay of the Tudor court
    and foreshadowing the political and religious tensions that will entrap Thomas
    Cromwell.
