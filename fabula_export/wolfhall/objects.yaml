  description: Earl of Shrewsbury recounts Prince Arthur requesting ale the morning
    after his wedding to Katherine of Aragon, claiming thirst from a night 'in Spain'—a
    crude joke implying non-consummation. In Legatine Court, Shrewsbury delivers testimony
    with a toothless smirk; murmurs erupt as Katherine stands defiant, Henry remains
    impassive, Wolsey averts eyes. The ale propels the anecdote into damning evidence.
  purpose: Quench Prince Arthur's thirst after his wedding night
