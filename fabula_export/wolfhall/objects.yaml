  canonical_name: Wolsey’s Entourage Wagons and Horses
  description: Wagons and horses used to transport Wolsey’s entourage away from York
    Place during his exile. The wagons carry household staff and possessions unable
    to board the crowded Thames barge, while the horses provide overland transportation
    for additional staff. Both vehicles and animals depart for France/Putney amid
    political upheaval, with Cromwell, Gardiner, Rafe, and Richard overseeing the
    dispersal. The procession symbolizes Wolsey’s fall from power as his household
    scatters. The horses are specifically coordinated by Cromwell to carry staff to
    Putney, while the wagons haul possessions past royal agents.
  purpose: Overland transportation for excess household staff and possessions during
    relocation
  significance: Enable Wolsey's household to escape confiscation and reach Esher intact,
    underscoring the chaos of his downfall and Cromwell's orchestration of survival
