      alliance
    - Via diplomatic alliances, such as the marriage to Anne of Cleves, which binds
      England to the princes’ interests
    - By providing a Protestant counterweight to the Catholic powers dominating Europe
    institutional_impact: The princes’ role in this event underscores the high stakes
