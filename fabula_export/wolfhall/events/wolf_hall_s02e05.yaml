  title: Norfolk weaponizes Catherine Howard
  description: "\n  In the Presence Chamber at Hampton Court, Norfolk confronts Cromwell\
    \ with explosive rage over the dissolution of Thetford Priory, where his ancestors\
    \ lie buried. The exchange escalates into a personal attack, with Norfolk accusing\
    \ Cromwell of disrespecting the Howard legacy and demanding the expulsion of German\
    \ diplomats—a thinly veiled strike at Cromwell’s diplomatic victory with Anne\
    \ of Cleves. Norfolk then reveals Henry’s growing infatuation with his niece,\
    \ Catherine Howard, framing it as the King’s desire to be free of his current\
    \ marriage. Cromwell’s fury nearly leads him to violence, his hand reaching for\
    \ a knife before he restrains himself. Wriothesley warns Cromwell that Norfolk’s\
    \ alliance with France threatens his position, but Cromwell dismisses the warning,\
    \ revealing his reckless confidence. This moment marks the beginning of Norfolk’s\
    \ strategic dismantling of Cromwell’s influence, using the King’s volatile desires\
    \ as his weapon.\n  "
