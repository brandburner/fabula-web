  key_dialogue:
  - 'HENRY: Could you have another child, Crumb? I think you could. You are of common
    stock. Common men have vigour.'
  - 'HENRY: Do you remember the day we rode down to the Weald? To see the ironmasters,
    and find out new ways of casting cannon? Those were brighter days. Jane did not
    like me to leave her, but she knew that we had long planned the excursion... But
    when I think about it, I recall we never made that journey.'
  - 'CROMWELL: Into Kent? No, but it was projected. Let’s say we did, sir. Let’s say
    the ironmasters gave us their best welcome, opened their minds to us, showed us
    all their secrets.'
  - 'HENRY: They must. No one could keep secrets from me. It is no use to try.'
