    - Collective blame-shifting (e.g., Fitzwilliam distancing from Cromwell).
    - Leveraging external victories (Wyatt’s triumph) to undermine internal rivals
      (Cromwell).
    - Exploiting the King’s absence to realign priorities without his direct intervention.
    institutional_impact: The Council’s actions in this event reflect the broader
      instability of Tudor governance, where policy is shaped as much by personal
      rivalries as by strategic necessity. The organization’s inability to unite behind
      a single narrative (e.g., celebrating Wyatt while abandoning Cromwell) underscores
      the fragility of Henry’s rule and the danger of factional infighting.
    internal_dynamics: Factional disagreements emerge as members prioritize their
      own survival over institutional cohesion. Norfolk’s attack on Cromwell, for
      example, is as much about personal enmity as it is about policy.
