  global_id: null
  title: Henry dismisses Cromwell’s Cleves gift
  description: In the predawn light of Henry VIII’s presence chamber, Thomas Cromwell
    receives a lavish clock from Duke Wilhelm of Cleves—a diplomatic token of gratitude
    for brokering the marriage alliance. Before Cromwell can react, Henry emerges,
    visibly irritated, and immediately undermines Cromwell’s authority by announcing
    he has already sent Anne of Cleves her *morgengabe* (morning gift) despite unresolved
    paperwork. Cromwell, sensing the King’s displeasure, hastily offers the clock
    as a conciliatory gesture, but Henry barely glances at it before dismissing it
    with a perfunctory smile and passing it to Rafe. The King’s abrupt departure and
    summons of Cromwell signal his growing impatience with the Cleves alliance and
    Cromwell’s dwindling influence. The moment underscores Henry’s volatility and
    Cromwell’s precarious position, foreshadowing the minister’s impending fall from
    power as the marriage alliance unravels under the King’s capricious disdain.
