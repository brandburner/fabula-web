  title: Lady Rochford reveals Henry’s rejection
  description: 'In the deserted Long Gallery at night, Cromwell corners Lady Rochford
    for an unfiltered assessment of Anne of Cleves’ disastrous first encounter with
    Henry. Lady Rochford’s calculated indifference—‘She keeps her own counsel’—hints
    at Anne’s political savvy, but her blunt revelation that Henry’s ‘displeasant
    airs’ stemmed from a humiliating physical examination (‘he lay on her and put
    his fingers in her’) exposes the marriage’s irreparable collapse. Cromwell’s stunned
    silence underscores the gravity: this isn’t just a failed alliance, but a personal
    affront to his authority. The exchange forces Cromwell to confront the king’s
    escalating displeasure and his own precarious position, as Lady Rochford’s departure
    leaves him isolated with the weight of this revelation. The scene pivots from
    political maneuvering to survival, with Cromwell’s survival now inextricably tied
    to Anne’s fate.'
