  title: Cromwell’s Council Defense Collapses
  description: 'In a tense council meeting at Hampton Court, Thomas Cromwell delivers
    a strategic defense of Henry VIII’s marriage to Anne of Cleves, framing it as
    a matter of national survival against French and Imperial threats. His argument
    initially rallies support from Suffolk and Riche, but Norfolk systematically undermines
    his credibility by questioning Riche’s judgment and implying Cromwell’s desperation.
    Fitzwilliam’s earlier warning—about Henry’s personal displeasure with Anne—hangs
    over the room, exposing Cromwell’s isolation as even his allies hesitate. The
    scene culminates in Henry’s off-screen voice interrupting, signaling his refusal
    to proceed with the marriage. This marks a critical turning point: Cromwell’s
    political maneuvering fails, his enemies gain momentum, and the court’s loyalty
    shifts irrevocably against him. The dialogue reveals Norfolk’s renewed ambition,
    Fitzwilliam’s self-preservation, and Cromwell’s dwindling influence, all while
    Henry’s unseen but looming displeasure looms as the ultimate threat.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 21
  sequence_in_scene: 38
  key_dialogue:
  - 'FITZWILLIAM: He’s seething inside, I know him from childhood. The papers are
    an excuse. He dislikes her or he is frightened of her... But mark this, Cromwell
    - I will not be stuck with the blame, just because it was I who was sent to meet
    her at Calais.'
  - 'CROMWELL: Let''s be clear, my lords. The King of France and the Emperor are together
    seeing in the New Year. They have not been so close in our lifetime. They have
    a fleet and funds to attack us. Our forts are still building. Ireland is against
    us. Scotland is against us. If we are not to be overrun this spring, we need the
    Princes of Germany on our side, either sending forces to our aid or engaging the
    enemy so that we can defeat him or force a truce. The King needs to make this
    marriage. England needs it.'
  - 'NORFOLK: Oh, she seems a good enough woman to you, does she? Well, perhaps you
    do not understand the requirements of a prince.'
