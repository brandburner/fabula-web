    description_of_involvement: The roaring fire in the grate of Cromwell’s Austin
      Friars sitting room is a central and deeply symbolic element of this event.
      It casts long, flickering shadows across the room, mirroring the political and
      emotional darkness now engulfing Cromwell. The fire’s light is the only illumination
      in the scene, creating an intimate yet oppressive atmosphere—one that forces
      Cromwell to confront his failures in isolation. Physically, the fire serves
      as a focal point for his gaze as he stares into it, searching for answers or
      solace. Metaphorically, it represents the heat of the political crisis, the
      flames of his ambition now threatening to consume him. The fire’s crackling
      is the only sound in the room during Gregory’s recounting, amplifying the tension
      and underscoring the weight of the silence that follows.
    status_before_event: Roaring and fully lit, casting long shadows and providing
      the sole source of illumination in the sitting room. It is a living, breathing
      entity in the scene, its flames reflecting Cromwell’s inner turmoil.
    status_after_event: The fire continues to burn, but its light now feels more like
