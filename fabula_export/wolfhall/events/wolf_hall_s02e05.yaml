  title: Henry rejects Anne of Cleves
  description: 'In the council chamber, Thomas Cromwell unveils Hans Holbein’s portrait
    of Anne of Cleves to King Henry VIII, who initially approves of her appearance.
    However, Holbein’s reluctant admission that Anne speaks no language but her own—and
    Cromwell’s subsequent revelation that German noblewomen do not sing, dance, or
    hunt—dismays Henry. Norfolk seizes the moment to mock the match, while Henry’s
    enthusiasm curdles into pity and disdain. The scene marks a critical turning point:
    Henry’s waning confidence in Cromwell’s judgment and the alliance’s viability,
    foreshadowing the marriage’s inevitable collapse. Cromwell’s carefully constructed
    political maneuver crumbles under Henry’s shifting whims, exposing the fragility
    of his position at court. The dialogue reveals Henry’s vanity, Norfolk’s opportunism,
    and Cromwell’s desperate attempts to salvage the situation, all while underscoring
    the doomed nature of the alliance and the king’s capricious authority.'
