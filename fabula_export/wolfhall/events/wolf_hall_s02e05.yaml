- fabula_uuid: act_be194a0d62d393ed
  number: 3
  summary: 'Act Three plunges Cromwell deeper into peril as the strategic rationale
    for the Cleves marriage is unexpectedly undermined by a diplomatic triumph, simultaneously
    isolating him and empowering his enemies. Following the ill-fated wedding, Henry
    continues to express his disgust with Anne, complaining of her physical attributes
    and the lack of consummation, a fact confirmed by Lady Rochford. The Council convenes
    to discuss the King''s desire for an annulment, where Fitzwilliam, once an ally,
    openly attempts to shift blame onto Cromwell, highlighting the fracturing of his
    support network. In a dramatic turn, Wriothesley arrives with news from Ambassador
    Wyatt in Spain: a diplomatic maneuver has successfully driven a significant wedge
    between France and the Holy Roman Emperor. This news, while a victory for England''s
    security, proves to be a catastrophic blow to Cromwell''s position. He immediately
    grasps the implication: with the continental powers now at odds, the urgent need
    for a German alliance, and thus the Cleves marriage, diminishes significantly.
    Norfolk, ever the astute opportunist, seizes on this, pointedly remarking that
    England no longer needs ''German friends'' or the marriage, directly linking Cromwell''s
    diplomatic success to his personal downfall. The pressure mounts on Cromwell,
    leading to a reckless and volatile confrontation with Norfolk. During this heated
    exchange, Cromwell, pushed to his breaking point, insults Norfolk''s family and
    his ''pandering'' of nieces, even considering drawing a weapon. Wriothesley, witnessing
    this, warns Cromwell of Norfolk''s deep-seated hatred and the wisdom of having
    ''broken'' him earlier, further underscoring Cromwell''s isolation and the growing
    threat from his powerful enemies. This act marks a critical turning point where
    external success directly contributes to Cromwell''s internal vulnerability, stripping
    away his last line of defense.'
