  title: Cromwell’s desperate gamble to stage Anne’s reaction
  description: 'In the tense aftermath of Henry’s impulsive decision to ride unannounced
    to Rochester, Cromwell’s anxiety peaks as he realizes the Cleves alliance—his
    political lifeline—hangs on a single, fragile moment: Anne of Cleves’s first impression
    of the King. With no time for ceremony or preparation, he confides in Wriothesley,
    revealing his fear that Anne’s German propriety will clash with Henry’s theatrical
    expectations. To mitigate disaster, Cromwell tasks Wriothesley with coaching Anne
    to feign astonishment at Henry’s unconventional arrival—a calculated deception
    that risks exposure but is necessary to manipulate Henry’s perception. The exchange
    underscores Cromwell’s precarious position: his survival depends on controlling
    an outcome he can no longer predict, while Wriothesley’s dark humor (a jab at
    Henry’s past sartorial folly) exposes the court’s brittle hierarchy and the fragility
    of Cromwell’s influence. This moment is a turning point, where Cromwell’s strategic
    brilliance becomes a gamble, and his control over the narrative begins to unravel.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 15
  sequence_in_scene: 29
  key_dialogue:
  - 'CROMWELL: Christ!'
  - 'WRIOTHESLEY: Well, we did what we could. You are afraid that he will find her
    not as reported? Because for sure, she will find him not as reported.'
  - 'CROMWELL: That''s what her people have prepared her for. In Cleves they know
    nothing of this sort of childish carry-on. Make speed to Rochester, ''Call-Me''.
    Warn her the King will come on the river with a small train - no heralds, no ceremony
    - Anna must be ready. He will enter her chamber, she must appear astonished and...
    and delighted.'
  - 'WRIOTHESLEY: Well, it could be worse. At least he''s not going to wear his Turkish
    costume.'
