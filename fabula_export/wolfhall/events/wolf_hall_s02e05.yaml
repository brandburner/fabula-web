acts:
- fabula_uuid: act_ac710c5d85b79dd5
  number: 1
  summary: 'The episode opens with a stark flashback, immediately establishing the
    deep-seated animosity between Thomas Cromwell and the Duke of Norfolk, a rivalry
    that will prove fatal. In the present, Cromwell presents Hans Holbein''s portrait
    of Anne of Cleves to King Henry VIII, an alliance he has meticulously orchestrated
    to secure England''s position against continental threats. However, Henry''s initial
    reaction is one of subtle but palpable disappointment, as he questions Anne''s
    lack of English, musical talent, and hunting skills, despite her ''well and seemly''
    appearance in the painting. This scene introduces the central conflict: Henry''s
    personal desires clashing with political necessity. Cromwell navigates the treacherous
    court, facing Norfolk''s open hostility and subtle undermining, particularly regarding
    the dissolution of Thetford Priory. The King then unexpectedly proposes a marriage
    between his daughter Mary and Duke Philip of Bavaria, a move that surprises Cromwell
    and highlights Henry''s unpredictable nature. Mary initially resists but eventually
    agrees to meet Philip, a meeting Cromwell observes with a mix of hope and trepidation.
    The act culminates in a pivotal private conversation where Henry, reflecting on
    their decade-long relationship, expresses a profound shift in his trust, comparing
    Cromwell unfavorably to the late Cardinal Wolsey. This moment serves as the inciting
    incident, signaling that Cromwell''s once unassailable position is now precarious,
    and the King''s favor, once his greatest asset, is now his most significant vulnerability.
    This sets the stage for the escalating challenges Cromwell will face, as his carefully
    constructed political edifice begins to show cracks under the weight of the King''s
    shifting affections and the machinations of his enemies.'
