  title: Cromwell confronts Jane’s ghost
  description: 'Cromwell moves through the Queen’s outer rooms at Hampton Court, his
    gaze drawn to the closed door of the bedchamber where Jane Seymour died. The tied-back
    curtain—once a barrier—now exposes the space, triggering a visceral flashback
    to Jane’s final moments. His physical stillness and the tightening of his expression
    reveal the weight of memory: Jane’s death was a failure of his political machinations,
    and the sight of her empty bedchamber forces him to confront the moral cost of
    his ambition. The moment disrupts his usual composure, exposing the fragility
    beneath his ruthless exterior. This is not just a recollection but a reckoning—one
    that foreshadows the emotional toll of his past actions as they collide with his
    present vulnerabilities. The scene underscores how Cromwell’s power is built on
    unstable foundations, where even the dead demand accountability.'
