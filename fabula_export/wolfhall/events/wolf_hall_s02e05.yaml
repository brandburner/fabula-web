  title: Jane’s final fragility in flashback
  description: In a stark flashback, the dying Jane Seymour—her body ravaged by illness—struggles
    to drink wine with Mary Shelton’s assistance. The wine spills down her napkin
    as she weakly attempts to lift the cup, her physical decline underscoring the
    inevitability of her death. The moment is intimate yet devastating, revealing
    the fragility of her reign and the fleeting nature of power. This flashback serves
    as a haunting reminder of mortality’s grip on both Jane and Cromwell, contrasting
    with the political machinations of the present. The scene lingers on her vulnerability,
    reinforcing the tragic weight of her legacy and the emotional toll of Cromwell’s
    past actions.
