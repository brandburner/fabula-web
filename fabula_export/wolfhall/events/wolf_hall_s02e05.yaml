  title: Cromwell confronts Catherine Howard’s arrival
  description: In the Long Gallery, Thomas Cromwell stumbles upon a chaotic dress-fitting
    for Anne of Cleves’ Maids-of-Honour, where Lady Rochford’s barbed observations
    about youth and age underscore Cromwell’s growing unease. His attention is abruptly
    seized by the arrival of Catherine Howard, Norfolk’s niece—a striking but vacuous
    young woman whose presence immediately sets off alarms. Rochford’s mocking commentary
    about Catherine’s attire (including rubies once belonging to Anne Boleyn) and
    her lack of maternal guidance reveals the girl’s vulnerability as a pawn in Norfolk’s
    schemes. Cromwell’s sharp reaction—‘I think we’ve had enough of Norfolk’s nieces’—exposes
    his fear of another Boleyn-like disruption, while his order to Rochford to remove
    Catherine until after the King’s marriage signals a preemptive strike to neutralize
    Norfolk’s influence. The scene’s tension escalates as Wriothesley’s alarmed interruption
    suggests an urgent crisis elsewhere, leaving Cromwell’s authority momentarily
    suspended between his rivals’ machinations and his own dwindling control over
    the court’s dynamics. The exchange lays bare the court’s predatory undercurrents,
    where youth and beauty are currency, and Cromwell’s political survival hinges
    on outmaneuvering Norfolk’s next move.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 13
  sequence_in_scene: 22
  key_dialogue:
  - |-
    CROMWELL: They seem very young.
    LADY ROCHFORD: Oh, that’s you, getting older. The Maids are the usual age.
  - |-
    LADY ROCHFORD: A simpler maid I never saw. Her mouth’s always hanging open.
    CROMWELL: ((to Lady Rochford)) A soft word, my lady.
  - |-
    LADY ROCHFORD: And those rubies - did they not once belong to Anne Boleyn.
    CROMWELL: Send her away.
    LADY ROCHFORD: Again? What shall I say to the Howards?
    CROMWELL: Say what you like. Just make sure she doesn’t show her face here again until the King is safely married.
