- fabula_uuid: cand_evt_scene_92d241df2c6cf498_02
  global_id: null
  title: Cromwell’s Council Gambit Backfires
  description: In the Council Chamber at Hampton Court, Thomas Cromwell delivers a
    forceful defense of Henry VIII’s marriage to Anne of Cleves, framing it as a critical
    diplomatic necessity to counter French and Imperial threats. He rallies support
    from Suffolk and Riche, who echo his urgency, but Norfolk seizes the moment to
    undermine Riche’s credibility and expose the council’s fractures. Cromwell’s strategic
    brilliance is met with Norfolk’s calculated undermining, revealing the court’s
    shifting loyalties and foreshadowing Cromwell’s isolation. The scene marks a turning
    point where Cromwell’s authority is openly contested, accelerating his downfall
    as the King’s favor wanes and his enemies gain ground.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 21
  sequence_in_scene: 39
  key_dialogue: &id005
  - 'FITZWILLIAM: He’s seething inside, I know him from childhood. The papers are
    an excuse. He dislikes her or he is frightened of her... But mark this, Cromwell
    - I will not be stuck with the blame, just because it was I who was sent to meet
    her at Calais.'
  - 'CROMWELL: Let''s be clear, my lords. The King of France and the Emperor are together
    seeing in the New Year. They have not been so close in our lifetime. They have
    a fleet and funds to attack us. Our forts are still building. Ireland is against
    us. Scotland is against us. If we are not to be overrun this spring, we need the
    Princes of Germany on our side, either sending forces to our aid or engaging the
    enemy so that we can defeat him or force a truce. The King needs to make this
    marriage. England needs it.'
  - 'NORFOLK: So, Cromwell. He wants to get out of it, I hear.'
  - 'NORFOLK: (to Richard Riche) Oh, she seems a good enough woman to you, does she?
    Well, perhaps you do not understand the requirements of a prince.'
