  global_id: null
  title: Henry’s Public Critique of Anne of Cleves
  description: "\n  In the courtyard of Hampton Court, Cromwell approaches Henry VIII\
    \ as the king inspects a horse, only to be met with immediate criticism of Anne\
    \ of Cleves. Henry, visibly displeased, questions the validity of the marriage\
    \ due to missing pre-contract papers and openly mocks Anne’s appearance—her height,\
    \ stiff demeanor, and painted mouth—comparing her unfavorably to his late wife\
    \ Jane Seymour. Cromwell attempts to downplay the issues, suggesting Anne’s attire\
    \ can be adjusted and the missing papers are likely a minor oversight, but Henry’s\
    \ frustration escalates, revealing his deep dissatisfaction with the alliance\
    \ Cromwell brokered. The exchange exposes the fragility of Cromwell’s political\
    \ maneuvering and foreshadows the unraveling of his carefully constructed plans.\
    \ Henry’s blunt rejection of Anne, delivered in front of courtiers, marks a turning\
    \ point in his shifting loyalties and the erosion of Cromwell’s influence at court.\n\
    \  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 19
  sequence_in_scene: 35
  key_dialogue:
  - 'HENRY: I find her nothing so well as she is spoken of. A great outlandish bonnet...
    And her height, and stiff as she is, I thought to myself, ''I am to marry the
    Cornhill Maypole''. And I believe she had painted her mouth which, if true, is
    a filty thing.'
  - 'CROMWELL: Well, her attire can be changed, sir.'
  - 'HENRY: Her complexion is sallow. When I think of Jane, so white and clear, a
    pearl.'
  - 'HENRY: It is a great matter, if I think I am married and find I am not.'
