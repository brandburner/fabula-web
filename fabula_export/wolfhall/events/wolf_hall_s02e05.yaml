  title: Wriothesley’s abrupt exit reveals courtly tensions
  description: During a breakfast at Austin Friars, Thomas Cromwell dispatches his
    son Gregory to Calais to greet Anne of Cleves, demonstrating his strategic trust
    in family over rivals. The moment is disrupted when Wriothesley—Cromwell’s ambitious
    secretary—suddenly excuses himself, citing a headache, though Gregory perceptively
    identifies his jealousy over being excluded from the mission. Richard Cromwell
    dismisses Wriothesley as an 'idiot,' but Gregory counters that Wriothesley acts
    like a 'son' desperate for Cromwell’s approval. The exchange exposes the fragile
    power dynamics within Cromwell’s household, where loyalty and ambition collide.
    Cromwell’s focus on securing Anne’s favor contrasts sharply with Wriothesley’s
    simmering resentment, foreshadowing the court’s volatility and the precariousness
    of Cromwell’s position. The scene underscores how even minor slights can escalate
    into threats, as Wriothesley’s abrupt departure signals his growing discontent
    with Cromwell’s favoritism toward Gregory and his own marginalization in the household’s
    hierarchy.
