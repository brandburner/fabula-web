  global_id: null
  title: Henry’s Nostalgia Undermines Cromwell’s Authority
  description: 'In a private audience, Henry VIII—seated in shadow—deliberately dismantles
    Cromwell’s confidence by invoking their shared history. The King’s opening critique
    of France and the Emperor’s alliance serves as a pretext to probe Cromwell’s political
    isolation, framing his enemies’ malice as a reflection of Cromwell’s own unlikability.
    When Cromwell defends his actions as loyal service, Henry pivots to a personal
    recollection of their first meeting, where Cromwell’s blunt advice (to avoid war)
    had both offended and impressed him. The King’s nostalgia for Wolsey—expressed
    with quiet bitterness—exposes a deeper truth: Cromwell’s brilliance has made him
    predictable, his utility diminished by familiarity. The exchange leaves Cromwell
    exposed, his authority eroded not by direct accusation but by Henry’s unspoken
    longing for the past. The scene underscores Cromwell’s precarious position: his
    survival now hinges on Henry’s whims, and the King’s lingering grief for Wolsey
    signals the fragility of their bond.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 11
  sequence_in_scene: 19
  key_dialogue:
  - 'HENRY: This pretended alliance between France and the Emperor. Neither man dare
    turn his back on the other. It is not friendship but its opposite.'
  - 'HENRY: We have few friends in either court. You especially. You have few friends,
    Cromwell.'
  - 'CROMWELL: If my services incurred their malice, I count it well. It was done
    for Your Majesty''s sake.'
  - 'HENRY: Are you sure about that? I think it is because of what you are. They don’t
    know how to deal with you.'
  - 'HENRY: It is a long time now since I first saw you, Tom... I remember our first
    interview. Suffolk did not know what to make of you. I knew, though. I saw your
    sharp little eyes... You told me not to go to war. Never fight, you said, you
    can’t afford it... I thought to myself... by Saint Loy, this man has some stomach.
    He has some gall.'
  - 'HENRY: I am greatly altered these ten years. You, not so much. You no longer
    surprise me like once you did... Still I miss the Cardinal of York. Still I miss
    Thomas Wolsey.'
