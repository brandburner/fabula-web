  title: Cromwell’s Violent Arrest
  description: 'In the Council Chamber at Hampton Court, Thomas Cromwell—cornered
    by his enemies—maintains a facade of calm as Gardiner and Fitzwilliam openly challenge
    his authority. When Fitzwilliam accuses him of treason, the room erupts into chaos:
    Cromwell, pushed beyond endurance, unleashes a sudden, brutal counterattack, his
    rage transforming him from a calculating politician into a physically dangerous
    force. He fights back with ferocity, shoving Fitzwilliam away and landing a punch
    on Norfolk, who vows to tear out his heart. The violence escalates until the King’s
    Halberdiers and councillors overwhelm him, stripping him of his chain of office.
    Just as Cromwell regains his footing, William Kingston steps forward to escort
    him to the Tower, marking the definitive end of his power. Gardiner’s final taunt—‘You
    are no more than God made you’—strips Cromwell of his titles and leaves him stunned,
    his fate now entirely in Henry’s hands. The scene crystallizes the fragility of
    Cromwell’s position and the court’s ruthless nature, where alliances shift in
    an instant and past enemies seize their moment of vengeance.'
