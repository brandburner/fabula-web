  scene_sequence: 38
  sequence_in_scene: 67
  key_dialogue:
  - 'HENRY: Could you have another child, Crumb? I think you could. You are of common
    stock. Common men have vigour.'
  - 'CROMWELL: My eyes are not what they were, sir. We could offer her a settlement,
    sir, but I don''t know how much we would need to find to placate her brother.
    And I do not know how to salvage Your Majesty''s reputation, if you were to renounce
    a lawful match.'
  - 'HENRY: I could come by one tomorrow. / CROMWELL: Yes, most likely some papist.
    And then I would wish myself far away.'
  - 'HENRY: Do you remember the day we rode down to the Weald? To see the ironmasters,
    and find out new ways of casting cannon? / CROMWELL: Into Kent? No, but it was
    projected. / HENRY: Let’s say we did, sir. Let’s say the ironmasters gave us their
    best welcome... / CROMWELL: It is no use to try [keeping secrets from me].'
