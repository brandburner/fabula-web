  - object_uuid: ger_object_e6a921ab976c
    description_of_involvement: 'Henry VIII’s Rochester Disguise Mask is referenced
      indirectly through Gregory’s vivid recounting of the King’s arrival at Rochester.
      Though the mask is not physically present in Austin Friars, its description—*''masked,
      dressed in some outlandish costume''*—looms large in the scene. The mask symbolizes
      the performative nature of power and the dangers of misreading it. Henry’s disguise
      was meant to be a whimsical test, a royal prank, but it became the catalyst
      for Anne’s humiliation and Cromwell’s undoing. The mask represents the King’s
      capriciousness, his ability to conceal his true intentions even as he demands
      absolute deference. Gregory’s description of Henry standing *''with his hat
      in his hand—he seemed uncertain how to proceed''* underscores the absurdity
      of the situation: a king, disguised and unrecognized, reduced to awkwardness
      by a woman who fails to see him. The mask’s absence in the room is felt acutely—it
      is the ghost of the disaster, the physical embodiment of the moment everything
      went wrong.'
    status_before_event: Worn by Henry VIII at Rochester, its role in the disaster
      is recounted by Gregory, casting a pall over the scene in Austin Friars.
    status_after_event: The mask’s symbolic weight lingers, a reminder of the King’s
      wounded pride and the irreparable damage done to Cromwell’s alliance.
    global_id: ger_object_e6a921ab976c
  - object_uuid: ger_object_898e612ccdcd
    description_of_involvement: Thomas Cromwell’s chair in the Austin Friars sitting
      room is more than a piece of furniture—it is a throne of sorts, a seat of power
      that now feels like a prison. Cromwell is frozen in it, unable to move as the
      commotion outside grows, his fingers gripping the arms as if they are the only
      things keeping him grounded. The chair anchors the scene, its solidity contrasting
      with the fragility of Cromwell’s position. When Gregory enters, Cromwell does
      not rise to greet him; instead, he remains seated, his posture collapsing inward
      as the weight of the news presses down. The chair becomes a metaphor for his
      entrapment—he is a man who has built his life on political maneuvering, yet
      now finds himself unable to act, trapped in the consequences of his own decisions.
      The firelight throws long shadows across the chair, emphasizing its role as
      a stage for his downfall.
