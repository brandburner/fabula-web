  key_dialogue:
  - 'HENRY: My lord, I have decided to make speed to Rochester and meet the bride
    in my own person.'
  - 'CROMWELL: Why, sir? It will only be a day or two before she arrives.'
  - 'HENRY: I want to nourish love.'
  - 'WRIOTHESLEY: Your Majesty, with all respect, was this not aired in Council? It
    was your Councillors'' earnest prayer that Your Majesty spare himself the journey,
    and that you greet the Queen in London. And you were pleased to accede.'
  - 'HENRY: Can I not change my mind, Wriothesley? In London there will be music and
    ordnance and we shall not speak a dozen private words to one another before we
    must ride back. And then it will be hours before we have a chance to be alone.
    No. I want to surprise her, and gladden her heart, and bid her a proper welcome.'
  - 'HENRY: It is what a king does. You cannot know, Cromwell, you are not a courtier
    born. I know it is not what we agreed, my lord, but a bridegroom must have his
    caprices and disguising always brings pleasure. The dowager, Katherine, she would
    pretend she not know me. Of course, she did but play with me because everybody
    knows the King.'
  - 'HENRY: A Russian nobleman, in great fur boots. (Off their expressions) A shepherd,
    then? Or perhaps one of the Magi?'
