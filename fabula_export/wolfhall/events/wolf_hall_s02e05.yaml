  title: Cromwell’s rivals exploit his vulnerability
  description: In the King’s Presence Chamber, Cromwell’s political enemies—Gardiner
    and Castillon—openly gloat over his failing influence, their taunts revealing
    the disastrous outcome of Anne of Cleves’s first meeting with Henry. Cromwell’s
    attempt to deflect their jabs fails, exposing his weakened position. Meanwhile,
    Olisleger subtly warns Anne about Cromwell’s significance, and Fitzwilliam’s despairing
    voiceover underscores the mounting peril. The scene underscores the court’s shifting
    loyalties and the fragility of Cromwell’s power, foreshadowing his imminent downfall.
    Cromwell’s observation of Catherine Howard still present—despite his explicit
    order to remove her—further signals the erosion of his authority and the court’s
    defiance of his control.
