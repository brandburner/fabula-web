    description_of_involvement: Anne of Cleves’ elaborate winged head-dress is a striking
      and symbolic centerpiece of the ceremony. Its size and structure force Henry
      to duck awkwardly around it as he delivers his perfunctory kisses, physically
      reinforcing the emotional and cultural barriers between them. The head-dress
      is not merely an adornment but a metaphor for the gulf between Anne’s foreign
      nobility and Henry’s English court, as well as the transactional nature of their
      union. Its presence underscores the performative aspect of the marriage, where
      even the most intimate gestures are dictated by protocol and politics.
    status_before_event: Adorned on Anne of Cleves’ head, symbolizing her noble status
      and foreign origins. It is pristine and elaborate, designed to impress the court
      and legitimize her role as queen.
    status_after_event: Remains on Anne’s head as she exits the chapel, though its
      symbolic weight has shifted. It is now a reminder of the distance between her
      and Henry, as well as the fragility of her position in the court.
