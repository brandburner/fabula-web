  global_id: null
  title: Gregory delivers Anne’s disastrous first impression
  description: 'In the tense quiet of Austin Friars, Cromwell’s unease grows as Bella’s
    barking and distant commotion signal an impending disruption. When Gregory arrives,
    his grim demeanor confirms the worst: the King’s return from Rochester and Anne
    of Cleves’s disastrous first meeting. Gregory recounts the humiliating scene—Anne’s
    failure to recognize Henry, her visible recoil, and the King’s wounded pride—exposing
    the fragility of Cromwell’s political maneuvering. The moment marks a turning
    point, as Cromwell grasps the full extent of the damage: Anne’s defiance has not
    only humiliated the King but also jeopardized the fragile alliance Cromwell spent
    years constructing, threatening his own precarious position at court. The weight
    of the failure settles over Cromwell as he stares into the fire, realizing the
    irreversible consequences of this misstep.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 18
  sequence_in_scene: 34
  key_dialogue:
  - 'GREGORY: Henry is on his way back from Rochester.'
  - 'CROMWELL: And Wriothesley, had he warned Anne? Was she ready?'
  - 'GREGORY: She was warned. She was not ready. Why didn’t you stop him from going,
    Father? You’re his Councillor.'
  - 'GREGORY: The King came in - masked, dressed in some outlandish costume - but
    she was looking out of the window. They were baiting a bull in the courtyard and
    she cast a glance over her shoulder and then turned back to the sport. I suppose
    she didn''t believe a prince would come in secret.'
  - 'GREGORY: As Christ is my Saviour, Father, the look in her eye. I will never forget
    it. Nor, I think, will the King. She recoiled from him. He could not miss it.
    Did you tell her he was old?'
  - 'GREGORY: Fitzwilliam says she is as good a woman as we will find in Europe. But
    I don''t see how she will undo that first moment.'
