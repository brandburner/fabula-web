- fabula_uuid: act_723c8826d0d530ea
  number: 4
  summary: 'Act Four presents a deceptive lull, a false dawn for Cromwell amidst the
    gathering storm, as Henry''s manipulative nature comes to the fore. The act begins
    with an ominous summons from the King, who requests a private conversation on
    a ''matter of some gravity,'' leaving Cromwell to ponder if this is the culmination
    of his life''s work or the beginning of his end. To Cromwell''s astonishment and
    the relief of his household, Henry announces a series of unprecedented elevations:
    Cromwell is made Lord Great Chamberlain and Earl of Essex, while Rafe and Wriothesley
    are promoted to Master Secretary. This moment of apparent triumph is met with
    jubilant celebration, but it is immediately undercut by Cromwell''s somber reflection.
    Alone in his study, he wishes he could share his success with his deceased father
    and Cardinal Wolsey, highlighting the profound isolation that accompanies his
    power and the ultimate emptiness of his achievements without those he loved. The
    illusion of security is shattered when Bess Oughtred, Cromwell''s daughter-in-law,
    reveals a chilling secret: King Henry is secretly visiting Catherine Howard at
    Lambeth, indicating his clear intention to replace Anne of Cleves with Norfolk''s
    niece. This revelation confirms the depth of the conspiracy against Cromwell and
    Anne. The King then engages Cromwell in a deeply unsettling private conversation,
    questioning his ability to father more children, expressing his desire to ''pay
    off'' Anne, and then bizarrely reminiscing about a fictional trip to the Weald.
    This interaction showcases Henry''s increasingly erratic and manipulative behavior,
    forcing Cromwell to play along with the King''s delusions while fully aware of
    the precariousness of his own position. This act serves as a cruel interlude,
    where Cromwell experiences a fleeting moment of professional apotheosis, only
    to have it immediately overshadowed by the stark reality of Henry''s betrayal
    and the machinations of his enemies, setting the stage for his inevitable downfall.'
