  title: Cromwell learns of Anne’s disastrous meeting
  description: 'In the tense quiet of Austin Friars, Cromwell’s unease grows as Bella’s
    barking and distant commotion signal an impending disruption. When Gregory arrives,
    his grim demeanor confirms the worst: the King’s return from Rochester and Anne’s
    disastrous first meeting with him. Gregory recounts how Anne, distracted by a
    bull-baiting spectacle, failed to recognize Henry—even when he bowed before her—and
    recoiled visibly upon realizing his identity. The moment’s humiliation, captured
    in Gregory’s horrified description, reveals the full extent of Cromwell’s political
    miscalculation. Anne’s lack of courtly awareness and Henry’s wounded pride now
    threaten to unravel Cromwell’s carefully constructed alliance, forcing him to
    confront the fragility of his position. The scene underscores the cost of Cromwell’s
    ambition: his son’s exhaustion mirrors his own, while the firelight casts long
    shadows over the wreckage of his plans.'
