  scene_sequence: 7
  sequence_in_scene: 10
  key_dialogue:
  - |-
    CROMWELL: Duke Philip of Bavaria, my lady. The King would like you to meet him.
    MARY: With a view to what?
  - |-
    MARY: He forced my cousin Meg Douglas out of marriage to a man she swore she would die for.
    CROMWELL: Philip has told the King he will make no demands. He takes you for friendship's sake, to further the alliance.
  - |-
    MARY: I have sworn to be obedient, as you so often remind me.
    CROMWELL: Well, the King is a tender father. He would never force you into a marriage with a man you cannot love.
