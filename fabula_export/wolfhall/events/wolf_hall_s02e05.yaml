    \ maid of honor, has returned to Lambeth under her uncle’s protection. More damning,\
    \ she discloses that Henry VIII has been secretly visiting Catherine in the evenings,\
    \ his barge returning long after sunset. Bess’s proof comes in the form of a personal\
    \ betrayal: she was ordered to deface a girdle book belonging to her deceased\
    \ sister Jane, only to later see Catherine wearing it—a symbolic act of erasure\
    \ and usurpation. The girdle’s reappearance underscores Catherine’s calculated\
    \ rise, her willingness to appropriate the trappings of higher-born women, and\
    \ the court’s ruthless hierarchy. Cromwell’s exhaustion is palpable; this is not\
    \ just a threat to Anne of Cleves’ position but a direct challenge to his own\
    \ political survival, as Henry’s affections shift toward a Howard ally. The scene\
    \ exposes the fragility of loyalty in Henry’s court and the lengths to which women\
    \ like Catherine will go to secure power, even at the cost of others’ dignity\
    \ and memory.\n  "
