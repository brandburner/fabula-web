  key_dialogue:
  - 'HOLBEIN: I believe she speaks no language but her own.'
  - 'HENRY: And of course, we will be able to make music together. If she does not
    know the words to English songs, I am sure she will know them in other tongues.'
  - 'CROMWELL: In Germany, I understand, great ladies do not have music masters, sir.
