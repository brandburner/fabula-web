  title: Henry’s Brutal Rejection of Anne
  description: In a tense, dawn confrontation at Hampton Court, Cromwell attempts
    to gauge Henry’s reaction to his new wife, Anne of Cleves, only to face the King’s
    vulgar and dismissive critique of her appearance. Henry’s lewd suspicions about
    her virginity—rooted in his physical revulsion—undermine Cromwell’s carefully
    orchestrated marriage alliance. As Henry abruptly departs for chapel, Cromwell
    is left isolated in the corridor, his political maneuvering exposed and his influence
    visibly eroding. The exchange foreshadows the collapse of the Cleves alliance
    and Cromwell’s impending fall, as Henry’s capricious disdain becomes the first
    domino in a chain reaction of betrayal and downfall. The scene underscores the
    fragility of Cromwell’s power, now tied to a marriage the King despises on sight.
