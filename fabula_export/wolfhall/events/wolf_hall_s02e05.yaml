      silent but pivotal props in this debate, symbolizing the marriage’s diplomatic
      necessity and Cromwell’s strategic vision. Though not physically present in
      the chamber, their existence is implied through Fitzwilliam’s earlier reference
      to ‘the papers’ in the corridor and the council’s discussion of the marriage’s
      reception. The papers represent the bureaucratic and diplomatic machinery that
      Cromwell has spent years constructing, now under siege by Norfolk’s personal
      attacks and Henry’s displeasure. Their absence from the chamber is telling—they
      are no longer the unassailable foundation of policy but a contested document,
      its authority eroding as the council’s loyalty fractures.
