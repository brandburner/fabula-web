  title: Henry insists on disguised Rochester trip
  description: In the King’s Privy Chamber at Hampton Court, Henry VIII abruptly announces
    his intention to travel to Rochester in disguise to meet Anne of Cleves, defying
    earlier council advice and Cromwell’s warnings. The exchange reveals Henry’s impulsive
    romanticism and his growing disdain for Cromwell’s authority, as he dismisses
    practical concerns about Anne’s potential embarrassment or overwhelm. When Cromwell
    and Wriothesley protest, Henry invokes Katherine of Aragon’s past disguises as
    a royal tradition, framing his decision as a courtly game rather than a reckless
    deviation. His playful yet defiant tone—suggesting costumes like a Russian nobleman
    or shepherd—underscores his desire for spontaneity, while Cromwell’s exasperation
    hints at the political risks of such theatricality. The scene foreshadows Henry’s
    volatile nature and the fragility of Cromwell’s influence, as the King’s whims
    threaten to destabilize carefully laid plans for Anne’s arrival and the alliance
    with Cleves. The dialogue’s subtext reveals Henry’s selective nostalgia for Katherine,
    contrasting with his current dissatisfaction with Anne, while Cromwell’s restrained
    objections signal his awareness of the court’s precarious balance of power.
