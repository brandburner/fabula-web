  title: Cromwell masks panic with promotion
  description: 'Cromwell returns to Austin Friars visibly shaken after receiving Wriothesley’s
    urgent warning about Henry VIII’s plot to replace him with Fitzwilliam and Tunstall.
    Though internally alarmed, he immediately pivots to strategic deception, summoning
    Rafe and Wriothesley under false pretenses of good news. In the Great Hall, he
    announces their joint elevation to Master Secretary and knighthood—a calculated
    move to bind them closer while masking his vulnerability. The scene reveals Cromwell’s
    precarious position: his survival now hinges on controlling information and manipulating
    loyalty, even as his enemies close in. The public celebration of their promotions
    contrasts sharply with the private threat looming over Cromwell’s future, underscoring
    the fragility of his power despite his outward confidence.'
