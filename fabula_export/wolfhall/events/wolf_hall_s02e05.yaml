  title: Cromwell’s Forced Departure with Wriothesley
  description: "\n  Cromwell enters the Long Gallery at Hampton Court, where the Maids-of-Honour\
    \ are being fitted for Anne of Cleves’s arrival. The scene is a tense display\
    \ of courtly power dynamics: Lady Rochford mocks the young Catherine Howard, Norfolk’s\
    \ niece, while Cromwell—already wary of Norfolk’s influence—orders her removal\
    \ from court. The exchange reveals Cromwell’s strategic paranoia and the court’s\
    \ lingering resentment toward Anne Boleyn’s legacy, as Rochford notes Catherine’s\
    \ jewels once belonged to Boleyn. Just as Cromwell asserts control, Wriothesley\
    \ arrives in a state of visible alarm, his urgency cutting through the scene.\
    \ Cromwell immediately recognizes the gravity of Wriothesley’s demeanor and exits\
    \ with him without hesitation, signaling a crisis that demands his full attention.\
    \ The abrupt departure underscores Cromwell’s precarious position—his authority\
    \ is being tested, and his enemies are closing in. The moment foreshadows the\
    \ looming threat to his survival, as Wriothesley’s alarm suggests an imminent\
    \ betrayal or political upheaval that will force Cromwell to act decisively.\n\
    \  "
