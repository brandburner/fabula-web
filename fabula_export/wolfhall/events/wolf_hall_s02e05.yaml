  title: Henry proposes Mary’s Bavarian marriage
  description: "\n  In the Long Gallery at Hampton Court, Henry VIII—having just finalized\
    \ the marriage alliance with Cleves—abruptly pivots to propose a second German\
    \ match: his daughter Mary to the Duke of Bavaria. The move catches Thomas Cromwell\
    \ off guard, exposing Henry’s impulsive and self-serving approach to diplomacy.\
    \ While Norfolk and Gardiner stand in silent disapproval, Henry frames the proposal\
    \ as a noble sacrifice for England, demanding Mary’s compliance as a matter of\
    \ duty. The scene underscores Henry’s shifting priorities, his willingness to\
    \ use his daughter as a political pawn, and Cromwell’s precarious position as\
    \ the king’s chief strategist. The virginal music playing in the background contrasts\
    \ with the tension, signaling the fragility of the court’s alliances and the looming\
    \ instability of Cromwell’s influence.\n  "
