  description: 'In the Council Chamber, Cromwell unveils Holbein’s portrait of Anne
    of Cleves to Henry VIII, who initially approves but grows increasingly disheartened
    as Holbein and Cromwell reveal her deficiencies: she speaks no language but German,
    lacks musical skill, and does not hunt. Henry’s enthusiasm curdles into resentment,
    with Norfolk’s mocking remarks amplifying his displeasure. Cromwell’s attempts
    to salvage the situation—suggesting Anne’s piety and adaptability—only highlight
    the mismatch between Henry’s expectations and reality. The scene marks a critical
    shift in Henry’s perception of the marriage, from political necessity to personal
    burden, foreshadowing his eventual rejection of Anne and Cromwell’s political
    vulnerability. The tension between Henry’s vanity and Cromwell’s pragmatic diplomacy
    becomes palpable, with Norfolk’s glee underscoring the court’s fragility and the
    looming threat to Cromwell’s position.'
