      act of his counterstroke, where he begins to transform his shock into strategic
      action.
    access_restrictions: Restricted to members of Cromwell’s household and trusted
      allies (Wriothesley, Rafe). Outsiders or rivals would not be permitted in this
      space, making it a secure environment for the exchange of sensitive information.
    key_environmental_details:
    - Crisp daylight streaming through, casting sharp shadows on the stone courtyard.
