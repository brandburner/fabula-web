      tall windows reflects coldly off the white linen tablecloth, creating an atmosphere
      of calculated formality. Cromwell removes his gloves—a symbolic gesture of transition—as
      he gathers Wriothesley and Rafe to announce their promotions. The hall, lined
      with Holbein portraits and a Queen of Sheba tapestry, becomes a stage for Cromwell’s
      performance of power and control. The household members, initially hovering
      in the background, flock in upon hearing the news, their delight transforming
      the space from one of quiet tension to jubilant celebration.
