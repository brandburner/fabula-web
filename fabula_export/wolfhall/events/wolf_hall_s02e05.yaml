  - object_uuid: ger_object_67b44b1dbba2
    description_of_involvement: 'The Hampton Court King’s Privy Chamber Window is
      referenced indirectly through Gregory’s recounting of the events at Rochester,
      where Anne of Cleves was distracted by a bull-baiting spectacle *outside* the
      window. While the window itself is not physically present in Austin Friars,
      its symbolic role in the disaster is critical: it represents the barrier between
      Anne’s perception and reality. The window frames her distraction—her gaze fixed
      on the spectacle outside rather than the King before her—highlighting the cultural
      and perceptual gulf that doomed the encounter. In Austin Friars, the absence
      of such a window (and the firelit intimacy of the sitting room) contrasts sharply
      with the public humiliation at Rochester, underscoring the private nature of
      Cromwell’s reckoning.'
    status_before_event: Not physically present in Austin Friars, but its role in
      the Rochester disaster is recounted by Gregory, casting a long shadow over the
      scene.
    status_after_event: The window’s symbolic weight lingers in the aftermath, as
