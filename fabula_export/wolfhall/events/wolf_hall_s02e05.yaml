  title: Henry tests Cromwell’s loyalty over Anne’s annulment
  description: 'In the King’s private chamber, Henry VIII—frustrated by Anne of Cleves’
    failure to produce a son—probes Cromwell’s willingness to dissolve the marriage,
    revealing his own desperation and Cromwell’s waning influence. Henry, nostalgic
    and manipulative, fabricates a shared memory of a trip to the Weald, forcing Cromwell
    into a psychological duel where compliance equals submission. Cromwell, though
    physically declining (his failing eyesight), resists outright defiance but subtly
    undermines Henry’s delusions by acknowledging the lie without engaging. The exchange
    exposes Henry’s paranoia and Cromwell’s precarious position: the King’s favor
    is slipping, and Cromwell’s survival now hinges on navigating a court where truth
    is malleable and loyalty is performative. The scene foreshadows Cromwell’s downfall
    as Henry’s patience frays and his trust in his chief minister erodes.'
