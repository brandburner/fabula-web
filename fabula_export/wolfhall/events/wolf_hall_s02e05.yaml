  object_involvements:
  - object_uuid: ger_object_f60ea9ce79cb
    description_of_involvement: 'The copy of Ambassador Castillon’s letter to the
      French King is the catalyst for the entire event. Clutched urgently by Wriothesley,
      it serves as irrefutable proof of Henry VIII’s plot to replace Cromwell with
      Fitzwilliam and Tunstall. The letter’s contents—revealed in Wriothesley’s breathless
      delivery—trigger Cromwell’s immediate pivot from vulnerability to strategic
      action. Its physical presence in the scene is fleeting but devastating, a ticking
      clock that forces Cromwell to act. The letter symbolizes the fragility of his
      position and the ever-present threat of courtly intrigue, while also providing
      the impetus for his counterstroke: the promotions of Wriothesley and Rafe Sadler.'
    status_before_event: In the possession of Castillon’s courier, later intercepted
      and copied by Wriothesley’s spy. The original remains with Castillon, but the
      copy is in Wriothesley’s hand as he rushes to Cromwell.
    status_after_event: The copy of the letter is no longer physically present in
      the scene after Wriothesley delivers it to Cromwell. Its contents, however,
      linger as the impetus for Cromwell’s actions, and its implications continue
      to drive the narrative forward.
