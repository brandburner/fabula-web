  - object_uuid: ger_object_e6a921ab976c
    description_of_involvement: 'Henry VIII’s Rochester Disguise Mask is referenced
      indirectly through Gregory’s vivid recounting of the King’s arrival at Rochester.
      Though the mask is not physically present in Austin Friars, its description—*''masked,
      dressed in some outlandish costume''*—looms large in the scene. The mask symbolizes
      the performative nature of power and the dangers of misreading it. Henry’s disguise
      was meant to be a whimsical test, a royal prank, but it became the catalyst
      for Anne’s humiliation and Cromwell’s undoing. The mask represents the King’s
      capriciousness, his ability to conceal his true intentions even as he demands
      absolute deference. Gregory’s description of Henry standing *''with his hat
      in his hand—he seemed uncertain how to proceed''* underscores the absurdity
      of the situation: a king, disguised and unrecognized, reduced to awkwardness
      by a woman who fails to see him. The mask’s absence in the room is felt acutely—it
      is the ghost of the disaster, the physical embodiment of the moment everything
      went wrong.'
