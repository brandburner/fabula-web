  title: Norfolk provokes Cromwell’s violent outburst
  description: 'During a tense dinner at Lambeth Palace, the Duke of Norfolk deliberately
    provokes Thomas Cromwell by publicly vilifying Cardinal Wolsey—a figure Cromwell
    once served and admired—while subtly equating Cromwell’s own rise with Wolsey’s
    corrupt practices. Norfolk’s calculated insults escalate from verbal barbs to
    a direct attack on Cromwell’s integrity, framing him as a scheming upstart who
    has betrayed the nobility. Cromwell, already on edge from the political pressure
    of his position, loses control and physically assaults Norfolk, shaking him violently
    before Cranmer intervenes. The outburst exposes Cromwell’s vulnerability: his
    temper, his lingering loyalty to Wolsey, and his precarious standing at court.
    Norfolk’s taunts mirror the accusations that will later lead to Cromwell’s downfall,
    while Cranmer’s intervention underscores the fragility of Cromwell’s alliances.
    The scene foreshadows the violent power struggle to come, where Cromwell’s enemies
    will exploit his emotional triggers to dismantle him.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 2
  sequence_in_scene: 2
  key_dialogue:
  - 'NORFOLK: Do you know what I think? We’re better off without cardinals and proud
    old prelates such as we used to have. Now the archbishop here at least he conducts
    himself humble-wise. You can tell by his countenance that he spends his time at
    prayer, instead of brow beating noblemen and plotting their downfall and wrangling
    and cheating and embezzling. All of which were daily proceedings with Cardinal
    Thomas Wolsey.'
  - 'NORFOLK: Yes, and promoting false knaves to positions of trust, soliciting bribes,
    falsifying deeds, bullying his betters, consorting with conjurers and generally
    thieving, lying and cheating all to the detriment and the ruin of the commonweal
    and the shame of the King.'
  - 'CRANMER: For shame, Thomas! He’s an old man!'
