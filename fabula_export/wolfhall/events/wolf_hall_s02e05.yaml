  title: Cromwell’s Violent Arrest
  description: 'In the Council Chamber at Hampton Court, Thomas Cromwell’s political
    unraveling reaches its breaking point when Gardiner’s arrival and Fitzwilliam’s
    accusation of treason trigger a violent confrontation. The councilors, led by
    Norfolk, physically assault Cromwell, stripping him of his chain of office and
    beating him in a frenzied mob. Cromwell fights back with brutal force, his rage
    momentarily restoring his dominance, but the arrival of William Kingston—Constable
    of the Tower—signals the finality of his downfall. Gardiner’s taunt, *"You are
    no more than God made you,"* strips Cromwell of his title and status, leaving
    him hollowed out as he is escorted to his arrest. The scene marks the irreversible
    shift from power to persecution in Cromwell’s arc, underscoring the court’s fragility
    and the cost of his past alliances. The violence is not just physical but symbolic:
    the council’s betrayal, Norfolk’s personal hatred, and Gardiner’s gloating all
    converge to dismantle Cromwell’s carefully constructed authority, leaving him
    exposed and vulnerable for the first time.'
