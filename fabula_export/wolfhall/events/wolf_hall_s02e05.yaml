    anxiety about the impending Rochester meeting reaches a breaking point. Wriothesley,
    ever the pragmatist, attempts to defuse Cromwell’s panic with dark humor—referencing
    the infamous Turkish costume scandal—only for Cromwell to cut through the levity
    with a sharp, strategic directive. He orders Wriothesley to race ahead to Rochester
    and coach Anne of Cleves to feign astonishment at Henry’s unceremonious arrival,
    a calculated move to manipulate the King’s perception and salvage the alliance.
    The exchange reveals Cromwell’s unraveling composure, his reliance on Wriothesley’s
    loyalty, and the court’s reliance on performative deception to maintain power.
    Wriothesley’s gallows humor, though dismissed, underscores the court’s brittle
    hierarchy and the fragility of Cromwell’s position as shifting loyalties threaten
    to unravel his carefully constructed plans.
