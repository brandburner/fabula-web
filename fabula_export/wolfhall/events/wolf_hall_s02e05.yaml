  title: Henry undermines Cromwell’s diplomacy
  description: In the King’s Presence Chamber at dawn, Cromwell receives a diplomatic
    gift—a clock from Duke Wilhelm of Cleves—symbolizing gratitude for his efforts
    in securing the alliance. Before Cromwell can acknowledge the gesture, Henry VIII
    abruptly interrupts, announcing he has already sent Anne of Cleves her *morgengabe*
    (morning gift) despite unresolved paperwork. His premature action undermines Cromwell’s
    negotiations, signaling Henry’s growing displeasure with the Cleves delegation
    and exposing the fragility of Cromwell’s political maneuvering. When Cromwell
    attempts to salvage the moment by presenting the clock as a celebratory gift,
    Henry dismisses it with a perfunctory smile, passing it to Rafe and signaling
    Cromwell to follow him—a clear rebuke that leaves Cromwell isolated and vulnerable
    in the shifting court dynamics. The exchange reveals Henry’s impatience with diplomatic
    formalities and his willingness to assert control over Cromwell’s carefully orchestrated
    plans, foreshadowing the minister’s impending loss of influence.
