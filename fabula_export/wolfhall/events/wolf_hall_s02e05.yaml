  title: Mary accepts Philip’s gift and kiss
  description: In the garden of the Abbot of Westminster’s residence, Princess Mary
    engages in a formal but intimate exchange with Duke Philip of Bavaria. Philip
    presents her with a family heirloom—a pear-studded cross—symbolizing his courtship
    and the political weight of their potential union. After a chaste kiss on the
    cheek, Mary’s demure reaction (blushing but not protesting) signals her reluctant
    compliance, which Cromwell observes from a distance. The moment is both personal
    and politically charged, as Mary’s acceptance of Philip’s gesture—however subtle—represents
    a potential foreign alliance that could destabilize Henry’s court. Cromwell’s
    internal reaction to this scene foreshadows his later confrontation with Henry,
    where the King’s jealousy and paranoia will erupt over Mary’s perceived disloyalty.
    The exchange underscores the fragility of alliances in Henry’s court and sets
    up Cromwell’s precarious position as both confidant and scapegoat in the King’s
    escalating tyranny.
