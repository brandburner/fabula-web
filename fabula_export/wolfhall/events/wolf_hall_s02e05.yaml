    barbed observations and Norfolk’s introduction of his niece, Catherine Howard,
    immediately raise his suspicions. Catherine’s youthful naivety and the conspicuous
    finery she wears—including rubies once belonging to Anne Boleyn—trigger Cromwell’s
    alarm, as Rochford’s insinuations about her ties to the Boleyn faction and Norfolk’s
    political maneuvering become impossible to ignore. Recognizing the threat Catherine
    poses to his carefully orchestrated marriage alliance, Cromwell abruptly orders
    Rochford to remove her from court until after Henry’s marriage to Anne is secured.
    The tension escalates when Wriothesley arrives with urgent news, forcing Cromwell
    to depart mid-confrontation, underscoring the precarious balance of power at court
    and the looming danger to his position. The scene reveals Cromwell’s strategic
    mind at work, his paranoia about Norfolk’s scheming, and the court’s labyrinthine
    rivalries, all while foreshadowing the political storm brewing around Catherine
    Howard’s arrival.
