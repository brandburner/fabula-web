  global_id: null
  title: Norfolk’s public challenge to Cromwell
  description: 'In the Presence Chamber at Hampton Court, the Duke of Norfolk ambushes
    Thomas Cromwell with a furious accusation over the dissolution of Thetford Priory—a
    Howard family burial site—escalating their long-standing feud. Norfolk weaponizes
    the issue as a personal and dynastic insult, then pivots to attack Cromwell’s
    German alliance, demanding the expulsion of Cleves diplomats. The confrontation
    spirals into a thinly veiled threat to Cromwell’s political survival, with Norfolk
    insinuating Henry’s growing infatuation with Catherine Howard as a direct challenge
    to the Cleves marriage. Cromwell, though outwardly composed, nearly draws his
    knife in a moment of uncharacteristic rage, revealing the fragility of his self-control.
    Wriothesley’s subsequent warning underscores the precariousness of Cromwell’s
    position: Norfolk’s French alliances and the King’s shifting affections now threaten
    to unravel Cromwell’s carefully constructed power base. The scene exposes the
    court’s simmering divisions and foreshadows Norfolk’s strategic maneuvering to
    dismantle Cromwell’s influence, using Henry’s volatile desires as his weapon.
    Cromwell’s reckless defiance—both in provoking Norfolk and dismissing Wriothesley’s
    caution—hints at his growing overconfidence, which will later prove fatal.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 33
  sequence_in_scene: 57
  key_dialogue:
  - 'NORFOLK: Thetford Priory! You’ve shut it! That''s my country! I told you, my
    forebears lie there! My father lies there! “Flodden Norfolk,” they called him
    - named after the battle! Now where is he to go? It’s an insult to the Howard
    name! My father must be prayed for, damn you!'
  - 'CROMWELL: If you want power, why don’t you get it like a man. Instead of pandaring
    your fucking nieces.'
  - 'NORFOLK: I tell you, he wants to be free! Have you not seen him looking at my
    niece? He cast a fantasy to Catherine the first time he ever did see her!'
  - 'WRIOTHESLEY: Norfolk, he may be a brute but he’s right. You told the King that
    without the Germans he was destitute of friends. Which was true. But now the alliance
    is melting away, Henry will be courted again - by France and Emperor both. I don''t
    think Norfolk has disclosed all of his dealings with the French. They hate you,
    sir – and Norfolk, he encourages them.'
