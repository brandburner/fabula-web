  title: Wyatt’s triumph fractures alliances
  description: 'In a tense Council session, Thomas Cromwell faces mounting criticism
    over the disastrous Cleves marriage alliance, with Fitzwilliam openly blaming
    him for the political misstep. The tension escalates as Wriothesley bursts in
    with a letter from Wyatt in Spain, revealing his diplomatic coup: Wyatt has deliberately
    provoked the Emperor into insulting all kings, including France, thereby fracturing
    the Franco-Imperial alliance. The Council initially rejoices at this strategic
    victory, but Norfolk seizes the moment to undermine Cromwell, suggesting the Cleves
    marriage is now unnecessary. Cromwell remains stoic, though the exchange exposes
    his vulnerability—his carefully constructed plans are now at risk of unraveling
    under Henry’s shifting favor. The scene underscores the precarious balance of
    power in the court, where even triumphs can become liabilities in the hands of
    rivals.'
