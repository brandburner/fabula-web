  title: Cromwell’s authority questioned over Mary’s defiance
  description: 'In the Council Chamber, Henry VIII publicly challenges Cromwell’s
    ability to control Princess Mary’s obedience, exposing the fragility of their
    alliance. Suffolk’s offhand remark about Mary’s refusal to permit kisses—implying
    her defiance—shifts Henry’s focus to Cromwell, who insists Mary will comply with
    the King’s commands. Cromwell’s warning about Mary’s potential as a rallying point
    for enemies if she leaves England is swiftly undermined by Norfolk, who accuses
    Cromwell of sabotaging Mary’s marriages for his own gain. Henry’s unreadable silence
    and the Council’s confusion signal a critical moment: Cromwell’s political influence
    is being eroded, and his past assurances are no longer trusted. The scene foreshadows
    Cromwell’s vulnerability as Mary’s resistance becomes a wedge between him and
    the King, while Norfolk’s insinuations plant seeds of doubt in Henry’s mind.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 9
  sequence_in_scene: 14
  key_dialogue:
  - 'SUFFOLK: Which is a good sign, by God. She never permitted any of us to kiss
    her.'
  - 'HENRY: You have not the rank. I am assured by Cromwell that she will be conformable.
    He always gives me that assurance, yet nothing ever comes of it.'
  - 'CROMWELL: Lady Mary will do as you command, sire. She has given me that assurance.
    But, in Europe, they are claiming the marriage is made against her will.'
  - 'HENRY: They think I would enforce her?'
  - 'CROMWELL: Yes. I just... I wonder if it is wise to let her leave the kingdom,
    sire. The Emperor continues to threaten the Duke’s rule. If the Duke should fall...
    Mary will always be a rallying point for your enemies.'
  - 'NORFOLK: You see, your majesty? Your daughter will never marry. Cromwell breaks
    every match proposed for her. I wonder why?'
