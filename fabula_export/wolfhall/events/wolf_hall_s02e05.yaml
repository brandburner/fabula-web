      king on matters of state, but its unity is fractured by Norfolk’s provocations,
      Cromwell’s strategic pleas, and Henry’s off-screen displeasure. The council’s
      inability to reach a consensus reflects the broader instability of Tudor governance,
      where loyalty is fluid and power is constantly renegotiated. The council’s deliberations
      are not just about the marriage to Anne of Cleves but about the future of England
      itself, with Cromwell’s vision of a Protestant alliance clashing against Norfolk’s
      aristocratic resistance.
