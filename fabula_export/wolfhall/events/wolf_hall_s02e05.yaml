  title: Norfolk challenges Cromwell over priory dissolution
  description: In the King’s Presence Chamber, Thomas Cromwell—already tense after
    Henry VIII’s displeasure over Anne of Cleves—is intercepted by the Duke of Norfolk,
    who publicly confronts him over the dissolution of Thetford Priory, a site tied
    to Norfolk’s family legacy. Fitzwilliam, attempting to mediate, forces the two
    rivals to shake hands, but the gesture is hollow, underscoring their mutual hostility.
    Norfolk’s demand that the priory remain intact—‘as long as this world endures’—is
    met with Cromwell’s dismissive, cryptic response, framing the conflict as both
    personal (Norfolk’s ancestral pride) and political (Cromwell’s ruthless enforcement
    of the King’s religious reforms). The exchange exposes Norfolk’s defiance as a
    calculated power play, while Cromwell’s equivocation reveals his pragmatic detachment
    from aristocratic sentiment, foreshadowing their escalating rivalry and the fragility
    of Cromwell’s position at court.
