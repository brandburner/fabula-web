  title: Henry seals Cleves alliance despite court opposition
  description: In the Long Gallery at Hampton Court, Henry VIII formally finalizes
    the marriage alliance with Cleves by presenting the betrothal ring to Olisleger,
    the Cleves ambassador. The act is performed with deliberate ceremony, underscoring
    Henry’s commitment to the alliance despite the visible disapproval of Norfolk
    and Gardiner, whose displeasure foreshadows Cromwell’s precarious position as
    the architect of this union. The moment is punctuated by Henry’s abrupt announcement
    of a secondary diplomatic maneuver—proposing a marriage between his daughter Mary
    and the Duke of Bavaria—catching Cromwell off guard and revealing Henry’s shifting
    priorities. The scene underscores Cromwell’s political vulnerability, as Henry’s
    impulsive decisions threaten to destabilize the carefully orchestrated balance
    of power at court. The tension between ceremonial formality and underlying resistance
    sets the stage for future conflict, particularly as Henry’s dissatisfaction with
    Anne of Cleves looms on the horizon. The virginal music playing in the background
    adds a layer of irony, hinting at the fragility of the alliances being forged.
