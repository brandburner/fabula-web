  title: Cromwell warns Rafe of Henry’s fickle favor
  description: 'In the cavernous, near-empty Great Hall of Hampton Court, Thomas Cromwell
    walks with his protégé Rafe Sadler, delivering a sharp lesson about the King’s
    unpredictable nature. Cromwell dismisses Rafe’s fear that Henry might intend to
    destroy him, instead reciting his own hard-won wisdom: never assume what the King
    will or won’t do. The exchange underscores Cromwell’s mastery of court politics—his
    ability to navigate Henry’s volatility while maintaining an air of control. However,
    the moment is abruptly interrupted by Wriothesley’s arrival, a reminder that even
    Cromwell’s private counsel is vulnerable to scrutiny. The scene serves as both
    a character study of Cromwell’s pragmatism and a foreshadowing of his precarious
    position, where trust is conditional and survival demands constant vigilance.
    The tension between Cromwell’s confidence and the looming threat of Henry’s displeasure
    drives the moment, reinforcing the court’s treacherous dynamics.'
