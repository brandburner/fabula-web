- fabula_uuid: cand_evt_scene_0df60027a94e6c69_02
  global_id: null
  title: Cromwell elevates allies amid hidden threats
  description: 'Thomas Cromwell, visibly shaken after receiving intelligence of Henry
    VIII’s plot to replace him with Fitzwilliam and Tunstall, masks his alarm and
    immediately pivots to a calculated power move. In the Great Hall of Austin Friars,
    he announces the promotion of his protégés, Rafe Sadler and Thomas Wriothesley,
    to Master Secretary and knighthood, while securing his own titles as Lord Great
    Chamberlain and Earl of Essex. The scene oscillates between triumph and tension:
    Cromwell’s public display of generosity and authority contrasts with the private
    vulnerability exposed by Wriothesley’s revelation, underscoring his precarious
    position. The household’s jubilant reaction obscures the fragility of his power,
    as the promotions serve both as a defensive maneuver against mounting political
    threats and a strategic consolidation of loyalty. The moment reveals Cromwell’s
    mastery of courtly maneuvering—his ability to turn vulnerability into opportunity—while
    foreshadowing the instability of his authority in Henry’s volatile regime.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 35
  sequence_in_scene: 63
  key_dialogue: &id011
  - 'WRIOTHESLEY: Sir. Sir, you must see this at once. It’s a copy of a letter from
    Ambassador Castillon to the French King. I um... I put a man in his train. Now
    Castillon says that King Henry means to take the Privy Seal from us and give it
    to Fitzwilliam. And that he will cast you down from your office as Vicegerent,
    and raise up Bishop Tunstall.'
  - 'CROMWELL: As you know, ever since I have been Master Secretary, I have tried
    to be with the King''s person, I am now going to divide my duties. From now on,
    you two will share the task. Each of you will be Master Secretary. You will split
    your time so if one of you is in Westminster, the other will be with the King.
    You know what I have made of this office, nothing eludes it. Nothing is beyond
    it. From now on, everything starts with you and with you everything stops.'
  - 'CROMWELL: Rafe. Yes. And... I am to be made Lord Great Chamberlain. Chief of
    the Household. The Earl of Essex died last night and well, I am to be given his
    title.'
