  title: Cromwell secures Mary’s reluctant Bavarian alliance
  description: 'In a tense, private audience, Thomas Cromwell approaches Princess
    Mary while she plays the virginals—a moment of quiet defiance before he disrupts
    it with political demands. He frames the proposed marriage to Duke Philip of Bavaria
    as a matter of national stability, but Mary’s sharp responses reveal her skepticism.
    Cromwell leverages her oath of obedience to the King, subtly threatening her with
    the consequences of refusal. Their exchange underscores the precarious balance
    of power: Mary, though legally bound to comply, tests Cromwell’s authority by
    probing the terms of the alliance (e.g., Philip’s language skills, his religious
    leanings). The scene culminates in her reluctant assent, but her hardened tone
    and reference to Meg Douglas’s forced separation signal her deep resentment of
    the court’s manipulations. The moment serves as a microcosm of Cromwell’s fading
    influence—he must now coerce even the King’s own daughter, a sign of Henry’s growing
    distrust and the shifting alliances at court.'
