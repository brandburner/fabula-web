- fabula_uuid: cand_evt_scene_dc0e963eb78bfd95_03
  global_id: null
  title: Henry’s Nostalgia for Wolsey Undermines Cromwell
  description: 'In the dimly lit privacy of his inner chamber, Henry VIII—restless
    and introspective—shifts from political analysis to a sudden, unguarded lament
    for Thomas Wolsey, the cardinal whose downfall he once orchestrated. His reflection
    on their first meeting, where Cromwell’s blunt counsel impressed him, is laced
    with bitterness: while Cromwell’s efficiency has served the crown, Henry now admits
    he misses Wolsey’s counsel, a confession that cuts deeper than any courtly intrigue.
    Cromwell, caught off-guard, can only listen as Henry’s words expose the fragility
    of their alliance—Henry no longer sees Cromwell as a surprise, but as a man whose
    usefulness has dulled. The exchange leaves Cromwell visibly unsettled, his usual
    composure fractured by the king’s unspoken disillusionment. This moment marks
    a turning point: Henry’s nostalgia for Wolsey signals a shift in his trust, foreshadowing
    Cromwell’s precarious future at court. The scene underscores the king’s volatility
    and the specter of past betrayals, which now loom over Cromwell’s political survival.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 11
  sequence_in_scene: 20
  key_dialogue:
  - 'HENRY: It is a long time now since I first saw you, Tom.'
  - 'CROMWELL: It is. More than ten years, sire.'
  - 'HENRY: I remember our first interview. Suffolk did not know what to make of you.
    I knew, though. I saw your sharp little eyes. You told me not to go to war. Never
    fight, you said, you can''t afford it. Skulk indoors like a sick child - it will
    be good for the treasury. And I thought to myself... by Saint Loy, this man has
    some stomach. He has some gall.'
  - 'HENRY: I am greatly altered these ten years. You, not so much. You no longer
    surprise me like once you did. I do not think you will surprise me again, considering
    all that you have said and done – some of it miraculous, I will not deny, Tom.
    You have worked beyond the capacities of ten ordinary men. But still I miss the
    Cardinal of York. Still I miss Thomas Wolsey.'
