  title: Bess reveals Henry’s secret visits to Catherine
  description: "\n  In the quiet intimacy of Cromwell’s private study, Bess Oughtred—his\
    \ daughter-in-law and a reluctant informant—delivers a devastating revelation:\
    \ Catherine Howard, Norfolk’s niece and a former maid of honor, has returned to\
    \ court under the guise of exile but is secretly receiving late-night visits from\
    \ King Henry. Bess’s account is personal and charged with emotion, revealing her\
    \ own humiliation when forced to deface a girdle book belonging to her late sister\
    \ Jane, only to later see Catherine Howard wearing it. This symbolic act underscores\
    \ Catherine’s calculated rise and the Howards’ ambition to replace Anne of Cleves\
    \ as the King’s wife. Cromwell’s exhaustion is palpable as he absorbs the news,\
    \ recognizing the political threat this poses to his own position and the Queen’s.\
    \ The scene operates as a turning point, exposing the fragility of Cromwell’s\
    \ influence and the court’s treacherous undercurrents. Bess’s defiance—her refusal\
    \ to be treated as a servant—contrasts sharply with the Howards’ manipulation,\
    \ highlighting the court’s ruthless hierarchy and the cost of loyalty in Henry’s\
    \ England.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 37
  sequence_in_scene: 65
  key_dialogue:
  - 'BESS OUGHTRED: Catherine Howard has left the court. She is back at Lambeth, with
    Norfolk.'
  - 'BESS OUGHTRED: He visits her. The King. He stays with her until late. His barge
    comes back after sunset. The Howards believe he might marry her. And who is to
    say he will not?'
  - 'BESS OUGHTRED: I was bidden to a piece of work. It was handed to me out of malice.
    It was something of Jane’s. Jane, my sister. It was her girdle book, her little
    prayers. I was told, to take this and to pick her initials out. I said, I will
    not. I will not do it. I am Mistress Cromwell. I am not some servant.'
