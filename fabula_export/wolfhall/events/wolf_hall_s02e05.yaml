  title: Henry insists on Rochester disguise
  description: In the King’s Privy Chamber, Henry VIII abruptly announces his intention
    to travel to Rochester in disguise to meet Anne of Cleves, defying earlier council
    advice and Cromwell’s warnings. Cromwell and Wriothesley attempt to dissuade him,
    citing logistical concerns and the potential for Anne’s embarrassment, but Henry
    dismisses their objections, invoking his royal prerogative and nostalgic memories
    of Katherine of Aragon’s courtly games. His insistence on a disguise—first as
    a Russian nobleman, then a shepherd, and finally as an anonymous English gentleman—reveals
    his impulsive nature and growing detachment from reasoned counsel. The exchange
    underscores Cromwell’s diminishing influence as Henry’s whims override political
    strategy, foreshadowing the disastrous Rochester meeting and the unraveling of
    Cromwell’s carefully orchestrated alliance. The scene also highlights Henry’s
    selective nostalgia for Katherine, contrasting his past romantic idealism with
    his current political pragmatism, while Wriothesley’s cautious interjections serve
    as a foil to Cromwell’s strategic concerns. The tension between Henry’s impulsive
    desires and the council’s pragmatic advice sets the stage for the impending crisis
    in Cromwell’s political fortunes.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 14
  sequence_in_scene: 25
  key_dialogue:
  - 'HENRY: My lord, I have decided to make speed to Rochester and meet the bride
    in my own person.'
  - |-
    CROMWELL: If you will be advised by me, sir–
    HENRY: But I will not. You have many strengths, Crumb, but you are no adept in courtship.
  - 'HENRY: I will go in disguise. It is what a king does. You cannot know, Cromwell,
    you are not a courtier born. I know it is not what we agreed, my lord, but a bridegroom
    must have his caprices and disguising always brings pleasure. The dowager, Katherine,
    she would pretend she not know me.'
