- fabula_uuid: act_d24b15583a5cbeb3
  number: 5
  summary: 'Act Five accelerates to Cromwell''s inevitable and brutal downfall, culminating
    in his arrest and imprisonment. The act opens with Cromwell''s grim realization
    of his precarious position, as he imparts a final, cynical lesson to Rafe: ''Never
    say what the King will not do.'' This statement underscores his understanding
    of Henry''s absolute and unpredictable power. A symbolic moment follows as Cromwell''s
    hat is whipped from his head by the wind in Clock Court, and his fellow councillors,
    including Norfolk and Fitzwilliam, make no move to help him, visually representing
    his complete isolation and the abandonment by his supposed peers. The tension
    reaches its peak as Cromwell enters the Council Chamber, attempting to maintain
    a facade of normalcy. However, the room is thick with hostile silence, and Gardiner,
    blocking the door, delivers a chilling pronouncement of his imminent council membership,
    signaling the trap has been sprung. Fitzwilliam then openly brands Cromwell a
    ''traitor,'' triggering a violent and chaotic arrest. King''s Halberdiers and
    the councillors, led by a furious Norfolk, physically assault Cromwell, attempting
    to strip him of his gold chain of office. Cromwell, in a moment of raw, honest
    rage, fights back fiercely, landing blows and kicks, refusing to go down without
    a struggle. This physical resistance is a final, desperate assertion of his will
    against the forces arrayed against him. The struggle ends when William Kingston,
    Constable of the Tower, calmly steps forward, and Cromwell, recognizing the finality
    of his fate, loses heart and yields. Gardiner delivers a final, cutting insult,
    stripping Cromwell of his titles and reducing him to ''no more than God made you.''
    The episode concludes with Cromwell being led to the Tower, his mind racing, attempting
    to discern the ''underlying pattern of his downfall'' even in his moment of ultimate
    defeat. This final act portrays the ruthless efficiency of Tudor politics and
    the fragility of power, as Cromwell''s once formidable influence collapses under
    the weight of betrayal and the King''s shifting will.'
