    emotional_state: 'A whirlwind of emotions: defiant rage gives way to furious dominance,
      which collapses into hollowed-out despair as the reality of his arrest sinks
      in. His pride is wounded, his authority stripped, and his future uncertain.'
    goals:
    - To fight back against his attackers, reclaiming his dignity and authority through
      physical force.
    - To delay or prevent his arrest, even if only momentarily, by asserting his dominance
      in the chaos.
    what_happened: Cromwell begins the scene with an air of composed confidence, but
      as the council turns on him, his defiance erupts into furious rage. He fights
      back with brutal force, his fists whirling as he lands solid blows on Norfolk
      and Gardiner. His chair flies as he rises, and his papers scatter—symbols of
      his administrative power now meaningless in the face of physical violence. For
      a moment, his raw strength restores his dominance, but the arrival of Kingston
      shatters his resolve. His legs tremble as he realizes the finality of his arrest,
      and Gardiner’s taunt leaves him hollowed out, his mind spinning as he is escorted
      away.
