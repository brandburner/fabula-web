- fabula_uuid: cand_evt_scene_bd84781984936e5f_01
  global_id: null
  title: Council Turns Against Cromwell
  description: "\n  In the Council Chamber, Cromwell faces a direct challenge to his\
    \ authority as Fitzwilliam—once a reluctant ally—publicly blames him for the disastrous\
    \ Cleves marriage. Fitzwilliam’s outburst, fueled by Henry’s displeasure, exposes\
    \ Cromwell’s political isolation, with the former ally now distancing himself\
    \ to avoid shared culpability. The tension escalates when Wriothesley interrupts\
    \ with news of Wyatt’s diplomatic triumph in Spain, which fractures the Franco-Imperial\
    \ alliance. While the Council initially celebrates the victory, Norfolk seizes\
    \ the moment to undermine Cromwell, arguing that Wyatt’s success renders the German\
    \ alliance—and thus Cromwell’s influence—obsolete. The shift in the room’s mood,\
    \ from cautious optimism to open hostility, marks a turning point: Cromwell’s\
    \ former allies now see him as a liability, and his enemies, like Norfolk, smell\
    \ blood. The scene underscores the fragility of Cromwell’s position, as his carefully\
    \ constructed alliances crumble under the weight of Henry’s displeasure and the\
    \ Council’s shifting loyalties.\n  "
