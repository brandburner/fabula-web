  title: Mary reluctantly agrees to meet Philip
  description: 'Mary Tudor, caught in a private moment playing the virginal, is interrupted
    by Thomas Cromwell’s arrival. His request for a meeting with Duke Philip of Bavaria
    is framed as a political necessity, but Mary’s resistance reveals her deep skepticism
    of the King’s motives. Cromwell, ever the strategist, leverages her oath of obedience
    while subtly acknowledging the power imbalance—Mary’s compliance is not a request
    but an expectation. Her question about Philip’s language skills exposes her vulnerability:
    she is being bartered in a game where she holds no cards. The moment hinges on
    her calculated assent, a fragile truce that masks the underlying tension of her
    precarious position as both royal daughter and political pawn. Cromwell’s reassurances
    about Philip’s lack of demands are undercut by Mary’s sharp reference to Meg Douglas’s
    forced separation, a reminder that the court’s ‘tenderness’ is conditional. The
    scene underscores Mary’s agency as both constrained and defiant, while Cromwell’s
    manipulation reveals the court’s transactional nature—where even ‘friendship’
    is a euphemism for alliance.'
