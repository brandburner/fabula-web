  title: Cromwell dispatches Gregory to Calais
  description: 'In the Great Hall of Austin Friars, Thomas Cromwell strategically
    assigns his son Gregory the politically sensitive task of welcoming Anne of Cleves
    upon her arrival in Calais. The scene reveals Cromwell’s meticulous planning—he
    equips Gregory with funds, practical instructions, and a mandate for kindness,
    ensuring Anne’s comfort and loyalty to the English court. The moment underscores
    Cromwell’s paternal investment in Gregory’s role, contrasting with Wriothesley’s
    abrupt departure, which exposes his simmering resentment and ambition. Gregory’s
    perceptive observation about Wriothesley’s jealousy—‘He’s like a son. He’s anxious
    to please you’—hints at the court’s fragile power dynamics, where even minor slights
    can escalate into threats. Cromwell’s focus on Anne’s needs (money, familiar food,
    paid debts) signals his awareness of the high stakes: her arrival must secure
    the alliance while mitigating diplomatic risks in a court already fraught with
    tension. The exchange also subtly foreshadows Gregory’s later role as an observer
    of Anne’s disastrous first meeting with Henry, where his report will become a
    critical piece of evidence in Cromwell’s downfall.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e05
  scene_sequence: 10
  sequence_in_scene: 16
  key_dialogue: &id001
  - 'CROMWELL: I am bringing Anne of Cleves overland to Calais. I want you there with
    Fitzwilliam, when she arrives, paying reverence on my behalf.'
  - 'GREGORY: In Calais? Am I to cross?'
  - 'CROMWELL: She’ll want ready money. I’ll give you a purse of fifty sovereigns.
    And do not embark for home without checking that all of her train''s debts are
    paid. I want Anna looking to us for anything she needs—company—'
  - 'GREGORY: He’s jealous. He wishes you would send him to Calais, not me.'
  - 'RICHARD CROMWELL: Why would you? He’s an idiot.'
  - 'GREGORY: No... He’s like a son. He’s anxious to please you. Give him a kind word,
    Father.'
