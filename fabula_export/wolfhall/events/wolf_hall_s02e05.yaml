- fabula_uuid: act_c5266cb20f70f16e
  number: 2
  summary: Act Two intensifies Cromwell's struggle as King Henry's dissatisfaction
    with Anne of Cleves escalates, directly imperiling Cromwell's standing. Despite
    the Council's advice, Henry impulsively decides to meet Anne in disguise at Rochester,
    driven by a romanticized notion of courtship. Cromwell, recognizing the potential
    for disaster, dispatches Wriothesley to warn Anne and prepare her for the King's
    eccentric approach, hoping to mitigate the inevitable awkwardness. However, the
    meeting proves catastrophic; Gregory reports back to a despairing Cromwell that
    Anne, mistaking the disguised King for a commoner, recoiled from him, leaving
    Henry deeply offended and personally humiliated. This disastrous first encounter
    solidifies Henry's aversion. The King then openly expresses his profound physical
    revulsion for Anne, describing her as a 'Cornhill Maypole' with 'slack breasts'
    and 'sallow complexion,' and questions the validity of their marriage due to missing
    pre-contract papers. Cromwell attempts to deflect blame and emphasize the political
    necessity of the alliance, but Henry's personal feelings override all rationale.
    The formal arrival and wedding of Anne of Cleves proceed, but under a cloud of
    the King's palpable resentment. During these ceremonies, Cromwell observes Catherine
    Howard, Norfolk's niece, still present at court despite his earlier instructions,
    a clear sign of Norfolk's continued machinations and a looming threat to both
    Anne and Cromwell. The wedding itself is devoid of warmth, with Henry offering
    only perfunctory kisses, leaving Cromwell watching with a growing sense of dread
    as his carefully constructed plans unravel and his enemies, like Gardiner and
    Castillon, openly revel in his predicament. This act culminates with the marriage,
    a hollow victory that signals the beginning of Cromwell's end, as the King's personal
    revulsion for his new Queen becomes an insurmountable obstacle.
