  title: Cromwell soothes Anne’s isolation with calculated reassurance
  description: In a private audience with Anne of Cleves, Thomas Cromwell arrives
    to find her still in her wedding dress, surrounded by her Cleves ladies and a
    detached Mary. The scene opens with Cromwell’s formal entry, where Olisleger translates
    his introduction. Anne, warm but subtly probing, thanks Cromwell for the cakes—a
    gesture she interprets as a personal touch—and reveals her homesickness by mentioning
    the absence of letters at Calais. Cromwell deflects her loneliness with a vague
    excuse about delayed correspondence, masking the court’s growing disdain for her.
    Anne, however, subtly tests the stability of European alliances, hinting at her
    awareness of the Emperor’s tensions with France. Her remark about war between
    the Emperor and the French King—delivered with a laugh—reveals her political astuteness
    and her brother Wilhelm’s strategic interests. Cromwell’s evasive response underscores
    his role as a manipulator, using diplomacy to shield Anne from the court’s hostility
    while ensuring her compliance. The exchange exposes Anne’s quiet resilience in
    a hostile environment and Cromwell’s strategic vulnerability as he balances her
    expectations with the King’s shifting favor. The presence of Catherine Howard,
    sewing Anne’s hem, foreshadows the looming threat to Cromwell’s political future,
    as her quiet observation of the scene hints at her eventual role in his downfall.
