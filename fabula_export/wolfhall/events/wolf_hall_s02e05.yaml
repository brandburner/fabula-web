  scene_sequence: 26
  sequence_in_scene: 46
  key_dialogue:
  - |-
    ANNE OF CLEVES: You are Lord Cromwell. Thank you for escorting me this morning.
    CROMWELL: Hmm.
    ANNE OF CLEVES: And thank you for the cakes. A taste of home. You have visited my home?
    CROMWELL: I have not. We were misinformed about your English, your grace. It is very good.
  - |-
    ANNE OF CLEVES: I hoped for letters at Calais. But there was nothing for me.
    CROMWELL: A-ha. The posts are very bad at this time of year. I myself am awaiting news from our ambassadors in France and Spain.
  - 'ANNE OF CLEVES: Ah, yes, to know whether the friendship continues. I know it
    is um... unkind to wish for war, but I know that my brother Wilhelm would be very
    happy if the Emperor and the French King would fight each other again with their
    fists and teeth.'
