      mockery—exposes factional rivalries and undermines Cromwell’s position. The
      council’s collective judgment becomes a weapon, as Henry’s disdain for Anne’s
      cultural deficiencies is amplified by the room’s growing skepticism, foreshadowing
      the alliance’s collapse and Cromwell’s downfall.
