  global_id: null
  title: Henry defies Cromwell with disguise plans
  description: In a private exchange with Cromwell and Wriothesley, Henry VIII abruptly
    announces his intention to travel in disguise to Rochester to greet Anne of Cleves,
    defying earlier council decisions. Cromwell and Wriothesley attempt to dissuade
    him, citing practical concerns—Anne’s potential embarrassment, the disruption
    of protocol—but Henry dismisses their objections, insisting on a whimsical, romantic
    gesture. He playfully suggests increasingly absurd disguises (Russian nobleman,
    shepherd, Magi), mocking Cromwell’s seriousness and revealing his resentment toward
    Cromwell’s perceived control over the court. The exchange underscores Henry’s
    capricious authority and his desire to assert personal agency, while Cromwell’s
    restrained frustration highlights the growing tension between the king’s impulsive
    nature and Cromwell’s pragmatic governance. The moment foreshadows Henry’s potential
    to undermine Cromwell’s influence through royal whims, setting up future conflicts
    where the king’s personal desires clash with political necessity.
