  title: Henry tests Cromwell’s loyalty and legacy
  description: In a private, shadowed confrontation, Henry VIII probes Cromwell’s
    political isolation and the minister’s waning influence, forcing Cromwell to defend
    his actions while revealing the King’s deepening distrust. The exchange underscores
    Cromwell’s precarious position—his survival now hinges on Henry’s shifting whims
    and the court’s mounting hostility. Henry’s nostalgic invocation of Wolsey, a
    deliberate contrast to Cromwell’s pragmatic rise, exposes his lingering resentment
    toward Cromwell’s unorthodox methods and the absence of the Cardinal’s sycophantic
    loyalty. Cromwell’s measured responses reveal his awareness of the danger but
    also his refusal to grovel, a calculated gamble that may further alienate the
    King. The scene serves as a turning point, marking the beginning of Cromwell’s
    inevitable downfall as Henry’s favor slips away like sand through his fingers.
