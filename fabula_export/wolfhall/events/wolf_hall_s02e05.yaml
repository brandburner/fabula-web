  title: Henry undermines Cromwell’s authority
  description: In a private chamber at Hampton Court, Thomas Cromwell and Thomas Wriothesley
    attempt to dissuade Henry VIII from his impulsive plan to travel to Rochester
    in disguise to meet Anne of Cleves. Henry, initially cheerful, dismisses Cromwell’s
    pragmatic objections—arguing that the Queen’s arrival should be a grand, ceremonial
    affair—with a mix of playful defiance and thinly veiled resentment. When Cromwell
    suggests a simple ‘gentleman’ disguise, Henry seizes the moment to mock Cromwell’s
    influence, whispering that ‘all the foreigners claim I am’ ruled by him. The exchange
    reveals Henry’s growing discomfort with Cromwell’s power, his desire to assert
    his own agency, and the fragile balance of their relationship. Cromwell’s compliance
    masks his frustration, while Henry’s ‘caprice’ foreshadows his future betrayal
    of his chief minister. The scene underscores the tension between political necessity
    and royal whim, with Henry’s decision to disguise himself serving as both a personal
    indulgence and a subtle rebuke to Cromwell’s authority.
