  organization_involvements:
  - organization_uuid: ger_organization_dafdaaa6ef1c
    description_of_involvement: The **House of Cleves** is the **absent but looming
      presence** in this confrontation, its diplomatic and political stakes hanging
      in the balance as Henry rejects Anne of Cleves. The missing pre-contract papers—a
      legal and symbolic link to the House of Cleves—become the **focal point of Henry’s
      critique**, serving as proof of Anne’s unsuitability and Cromwell’s incompetence.
      The house’s **reputation and alliances** are indirectly attacked, as Henry questions
      the **legitimacy of the marriage** and the **trustworthiness of the Cleves diplomats**.
      The rejection of Anne is not just a personal slight but a **diplomatic snub**
