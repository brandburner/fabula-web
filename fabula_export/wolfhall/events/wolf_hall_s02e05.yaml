  scene_sequence: 18
  sequence_in_scene: 33
  key_dialogue: &id003
  - 'CROMWELL: Gregory. What are you doing here?'
  - 'GREGORY: Henry is on his way back from Rochester.'
  - 'CROMWELL: And Wriothesley, had he warned Anne? Was she ready?'
  - 'GREGORY: She was warned. She was not ready. Why didn’t you stop him from going,
    Father? You’re his Councillor.'
  - 'GREGORY: The King came in - masked, dressed in some outlandish costume - but
    she was looking out of the window. They were baiting a bull in the courtyard and
    she cast a glance over her shoulder and then turned back to the sport. I suppose
    she didn''t believe a prince would come in secret.'
  - 'GREGORY: As Christ is my Saviour, Father, the look in her eye. I will never forget
    it. Nor, I think, will the King. She recoiled from him. He could not miss it.
    Did you tell her he was old?'
