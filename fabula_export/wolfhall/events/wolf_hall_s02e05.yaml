  title: Wriothesley warns Cromwell of Norfolk’s French betrayal
  description: 'In the tense aftermath of Norfolk’s explosive confrontation with Cromwell—where
    the Duke rages over the dissolution of Thetford Priory and threatens Cromwell’s
    life—Wriothesley seizes the moment to deliver a critical warning. He reveals that
    Norfolk has been secretly negotiating with the French, Cromwell’s most bitter
    enemies, a betrayal that could undermine his political standing and expose his
    vulnerabilities. Wriothesley’s urgency underscores the gravity of the threat:
    the French, who despise Cromwell, are now being courted by Norfolk, who has withheld
    these overtures from Cromwell. The revelation forces Cromwell to confront a looming
    betrayal that could unravel his carefully constructed power, while also testing
    the loyalty of his own allies. The scene captures Cromwell’s reckless defiance—his
    near-drawing of a knife against Norfolk—and Wriothesley’s strategic caution, highlighting
    the fragility of Cromwell’s position as the King’s favor shifts and his enemies
    close in.'
