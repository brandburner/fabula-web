  title: Cromwell confronts his ghosts alone
  description: 'In the dim, candlelit solitude of his new study at Austin Friars,
    Thomas Cromwell sits motionless, his mind unspooling the specters of his past.
    The weight of Bellowe’s brutal death—his servant’s screams still echoing in his
    memory—collapses into the older, deeper wound of Wolsey’s betrayal. The Cardinal’s
    absence is a physical ache, a void where counsel once stood. Cromwell’s fingers
    trace the edge of his desk, his breath shallow, as the faces of those he’s wronged
    (Dorothea, the Abbess, even Anne Boleyn in her final moments) flicker behind his
    eyelids. The study, once a sanctuary of order, now feels like a confessional booth
    where his sins press in from all sides. This is not mere reflection—it’s a reckoning.
    The rebellion’s whispers, the King’s volatility, the court’s shifting loyalties:
    all of it pales beside the quiet horror of realizing how thoroughly his ambition
    has hollowed him out. The scene hinges on a single, unspoken question: *Can a
    man who has built his life on betrayal still recognize truth when it stares him
    in the face?*'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 14
  sequence_in_scene: 21
  key_dialogue:
  - 'CROMWELL: (whispered, to himself) "Wolsey… you old fool. You left me with the
    ledger, and I—" (voice cracks) "I’ve been paying the interest in blood."'
