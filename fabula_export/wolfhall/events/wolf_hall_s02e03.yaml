  - object_uuid: ger_object_2c2a327baa84
    description_of_involvement: The wine Cromwell orders for the young woman is a
      gesture of political hospitality, a way to assert control and maintain the illusion
      of normalcy. However, the wine goes unconsumed, symbolizing the failure of hospitality
      to bridge the chasm between them. Its absence from the scene—Christophe fetches
      it, but it never arrives—underscores the breakdown of communication and the
      impossibility of returning to a pre-revelation dynamic. The wine becomes a metaphor
      for the emotional distance between Cromwell and his daughter, a gesture that
      cannot be reciprocated.
    status_before_event: Stored in Austin Friars’ cellars, ready to be served as part
      of Cromwell’s standard hospitality protocol for guests.
    status_after_event: The wine remains in the cellars, untouched and irrelevant.
      Its intended purpose—to ease the tension and assert Cromwell’s control—is rendered
      obsolete by the young woman’s revelation. It becomes a symbol of the hospitality
      that cannot mend what has been broken.
