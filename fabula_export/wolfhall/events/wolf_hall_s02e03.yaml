  title: Cromwell confirms Jane’s pregnancy through Rochford
  description: 'In the Long Gallery of Chester Place, Cromwell isolates Lady Rochford
    after she taunts him with Henry’s fear of a daughter. Rochford, relishing his
    discomfort, confirms Queen Jane’s pregnancy—her missed courses and swollen breasts—while
    subtly manipulating Cromwell’s ambition. She suggests he position himself to receive
    Henry’s favor when the news is revealed, exposing her own political cunning and
    the court’s fragile alliances. The exchange underscores Cromwell’s strategic vulnerability:
    he must leverage this news to secure his position, but Rochford’s knowing tone
    hints at the personal and courtly risks tied to Henry’s volatile expectations.
    The moment crystallizes Cromwell’s need to act swiftly, while Rochford’s subtext
    reveals the precarious balance of power in the Tudor court, where even a pregnancy
    becomes a weapon in the game of thrones.'
