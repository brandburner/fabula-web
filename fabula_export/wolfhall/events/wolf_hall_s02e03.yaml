  title: Cromwell deflects Bellowe’s torture with cold pragmatism
  description: 'In the rain-soaked courtyard of Austin Friars, Thomas Cromwell oversees
    Richard’s departure to suppress the northern rebellion. The moment is laced with
    paternal tension—Gregory pleads to join the fight, but Cromwell dismisses him,
    instead gifting Richard a protective medal from his Italian past, a rare gesture
    of vulnerability. The emotional weight shifts abruptly when Richard delivers the
    brutal news of Bellowe’s capture and torture: the rebels blinded him, skinned
    a bull, and sewed him into its hide before setting dogs on him. Cromwell’s response
    is chillingly detached; he acknowledges the horror with a nod, then pivots to
    logistical concerns about the rain bogging down the cannon. The deflection underscores
    his ruthless compartmentalization, reinforcing the psychological toll of his political
    maneuvering. The scene exposes the cost of his ambition—not just in the lives
    of others, but in the erosion of his own humanity. The rain, the dogs, the bull’s
    hide: all become grotesque metaphors for the rebellion’s savagery and Cromwell’s
    complicity in its escalation. The moment also foreshadows the personal reckoning
    to come, as Cromwell’s emotional armor begins to crack under the weight of his
    past betrayals and the violence now directed at those closest to him.'
