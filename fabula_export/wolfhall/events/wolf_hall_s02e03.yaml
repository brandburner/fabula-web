  title: Dorothea Confronts Cromwell’s Betrayal
  description: 'In a charged flashback within Shaftesbury Abbey’s side-chapel, Dorothea—Cardinal
    Wolsey’s daughter—directly accuses Cromwell of betraying her father, shattering
    his self-righteous facade. Cromwell’s defensive invocation of the gospel as a
    shared belief is met with Dorothea’s searing rebuttal: her father *knew* Cromwell’s
    true nature. The exchange forces Cromwell to confront the unresolved guilt that
    has haunted him since Wolsey’s fall, exposing the moral rot beneath his political
    pragmatism. This moment isn’t just a personal reckoning—it’s a thematic fulcrum,
    revealing how Cromwell’s survival depends on burying the past, even as it festers.
    The flashback’s claustrophobic setting (a chapel, of all places) underscores the
    irony: Cromwell, the architect of religious reform, is judged by the daughter
    of the man he helped destroy—a judgment he cannot escape.'
