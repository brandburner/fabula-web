  global_id: null
  title: Cromwell exposes Mary’s hidden letter
  description: "\n  Thomas Cromwell interrupts a private meeting between Lady Mary\
    \ and the Spanish ambassador Mendoza, leveraging his authority to cut short their\
    \ conversation. After Mendoza departs, Cromwell presses Mary about her loyalty\
    \ to Henry VIII, forcing her to reaffirm her acceptance of her father as head\
    \ of the Church and the invalidity of her parents’ marriage. When she hesitates,\
    \ Cromwell demands the letter Mendoza brought—then uncovers a second, hidden letter\
    \ she had concealed between the pages of a book. The discovery confirms his suspicions\
    \ of her secret correspondence with Catholic allies, exposing her as a traitor\
    \ and escalating the political stakes. The confrontation underscores Cromwell’s\
    \ ruthless efficiency in rooting out dissent while positioning Mary as a vulnerable\
    \ but dangerous figure in the court’s power struggles.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 32
  sequence_in_scene: 51
  key_dialogue:
  - 'CROMWELL: Have you brought Dom Luis’s portrait for my lady?'
  - 'MENDOZA: Just that. There are presents, of course. Which follow by mule.'
  - 'CROMWELL: I will give you a quarter of an hour, Don Diego, and then, with regret
    I shall interrupt you.'
  - 'CHAPUYS: It is hardly time enough for them to pray together.'
  - 'CROMWELL: Oh... One of the rebel leaders has implicated you. Under questioning.
    And we have letters you sent to the traitor Darcy. Going back three years.'
  - 'MARY: You know full well. If I meant it when I said that I accepted my father
    as head of the church, and that he and my mother were never truly married. I said
    that I did.'
  - 'CROMWELL: Give me the letter. No. The other one. The one he carried hidden under
    his shirt.'
