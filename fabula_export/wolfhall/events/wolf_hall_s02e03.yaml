  title: Cromwell gifts Richard a protective medal
  description: 'In the courtyard of Austin Friars, Thomas Cromwell prepares to send
    his son Richard north to confront the rebellion. Amid the chaos of soldiers loading
    provisions, Cromwell hands Richard a medal—a relic from his own past in Italy—symbolizing
    protection and paternal care. The gesture is intimate yet guarded, revealing Cromwell’s
    layered concern for his son’s safety while deflecting the brutal news of Bellowe’s
    torture. When Richard hesitates to deliver the horrific details of Bellowe’s fate—blinded,
    skinned alive, and set upon by dogs—Cromwell responds with cold pragmatism, shifting
    focus to the rain’s impact on the cannon’s journey. His emotional detachment underscores
    his political survival instincts, even as the medal’s gift betrays his deeper,
    unspoken fear for Richard’s well-being. The exchange highlights Cromwell’s paradoxical
    nature: a man who wields power ruthlessly yet clings to fragile, symbolic gestures
    of protection in a world where violence is the only language the rebels understand.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 8
  sequence_in_scene: 12
  key_dialogue:
  - 'CROMWELL: From my time in Italy. Kept me safe.'
  - 'RICHARD CROMWELL: Your man, Bellowe? John Bellowe? The rebels caught him at Louth.
    They knew he was your servant. They blinded him. Then they skinned a bull and
    sewed him into the hide. They set the dogs on him.'
  - 'CROMWELL: All this rain. You’ll be lucky if you can get these cannon north of
    Enfield before you’re bogged down.'
