    description_of_involvement: Cromwell’s Lincolnshire Rebellion Papers are a critical
      tool in his strategy to suppress the uprising. He gathers them from the council
      table as he exits, symbolizing his relentless focus on identifying the landowners
      behind the rebellion. The papers represent both the administrative machinery
      of his power and the tangible evidence of his political maneuvering. Their presence
      in the chamber reinforces Cromwell’s image as a man of action, one who leaves
      no stone unturned in securing his position and crushing his enemies.
    status_before_event: Spread across the council table, containing names, intelligence,
      and strategies for dealing with the rebellion, ready for discussion and debate.
    status_after_event: Gathered by Cromwell as he exits, the papers now serve as
      a reminder of the work ahead—identifying the landowners and ensuring their suppression.
    global_id: ger_object_534c4b5f7182
  - object_uuid: ger_object_5ec0e9a93bfa
    description_of_involvement: The Hampton Court Council Chamber Benches serve as
      a physical manifestation of the council’s rigid hierarchy and the tension among
      its members. As the councillors shift uneasily on the hard surfaces, the benches
      underscore the formality and discomfort of the setting. When Henry pounds his
      stick, the councillors flinch, their bodies reacting to the sudden violence
      in a space designed for controlled debate. The benches are not merely furniture
      but a stage for the power struggles playing out, their plain design a foil to
      the ornate canopy and the King’s volatile presence.
    status_before_event: Occupied by the councillors, their wooden surfaces reflecting
      the formality and discomfort of the council’s proceedings.
    status_after_event: Left empty as Henry storms out, the benches bear the weight
      of the unresolved tensions, their silence a stark contrast to the chamber’s
      earlier chaos.
