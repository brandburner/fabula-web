    personal anxieties. He intercepts Edward Seymour to finalize the marriage arrangement
    between Gregory and Bess Oughtred, a strategic move to bind the Seymour family
    to his faction. The tension of the negotiation is abruptly interrupted when Richard
    Cromwell, dusty from a grueling winter campaign, returns unexpectedly. The reunion
    is charged with emotional weight—Cromwell’s relief at Richard’s survival is palpable,
