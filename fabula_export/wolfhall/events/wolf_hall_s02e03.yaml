- fabula_uuid: cand_evt_scene_6839f666c246c810_01
  global_id: null
  title: Cromwell confronts his hidden daughter
  description: 'In the Great Hall of Austin Friars, Cromwell receives a veiled young
    woman from Antwerp—Anselma’s daughter—who arrives unannounced and probes his past
    through the Queen of Sheba tapestry, a coded reference to his buried history with
    her mother. The woman’s Antwerp accent and probing questions about the tapestry’s
    origins immediately unsettle Cromwell, who recognizes the connection to Anselma.
    When she reveals herself as his illegitimate daughter, the revelation fractures
    his carefully constructed identity, forcing him to confront the personal cost
    of his political machinations. The moment exposes the fragility of his ambition
    and the inescapable weight of his past, as he stares into her face and sees himself
    reflected in her. The exchange is charged with subtext: her calm demeanor contrasts
    with his growing unease, and her insistence on the truth—‘You are’—undermines
    his long-held denial of his own lineage. The scene pivots from political calculation
    to raw emotional vulnerability, marking a turning point in Cromwell’s self-perception
    and the story’s exploration of legacy and consequence.'
