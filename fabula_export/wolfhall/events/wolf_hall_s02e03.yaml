- fabula_uuid: act_7964eafad62bfaa4
  number: 2
  summary: 'Cromwell, visibly burdened by the escalating crisis and the absence of
    Wolsey''s comforting presence, engages in high-stakes diplomacy. He confronts
    the Imperial ambassador Chapuys, warning him against subverting the King and threatening
    to forge alliances with German princes if Chapuys aids the rebels. Simultaneously,
    Queen Jane subtly probes Cromwell about King Henry’s troubling dreams, which evoke
    past guilt over his brother Arthur, and expresses her own distress over the people''s
    suffering, hinting at a desire for religious tolerance. The rebellion intensifies
    with the news that Robert Aske leads the rebels and, more critically, that York,
    a major stronghold, has fallen. King Henry, in a moment of despair and anger,
    blames Cromwell for his misfortunes, including the failure to apprehend Reginald
    Pole, and reluctantly permits Norfolk to lead forces north. At a lavish court
    feast intended to project power, Cromwell endures public ridicule from the jester
    Sexton, a humiliation witnessed by his mortified son, Gregory. Later, Cromwell
    confronts Lady Mary in her bedchamber, who acknowledges his saving her life but
    subtly warns him off any perceived ambition to marry her, stating he has cared
    for her "like a father," a comment Cromwell misinterprets as a clear rejection
    of marriage. Faced with a rebel army of fifty thousand, Cromwell devises a cunning
    strategy of deception: offer a truce, promise concessions, and allow the harsh
    winter conditions to naturally quell the uprising. A significant shift in court
    dynamics occurs with the joyous announcement of Queen Jane''s pregnancy, securing
    the succession and bringing immense relief to the King. Amidst these political
    maneuvers, Cromwell arranges a strategic marriage between his son Gregory and
    Bess Oughtred, Queen Jane''s sister. During a private conversation, Bess reveals
    a profound misunderstanding: she believed Cromwell himself was the intended groom
    and desired to marry him, even expressing a wish to bear his children. Cromwell,
    shocked by this personal revelation and the potential for scandal, desperately
    tries to manage the situation, begging Bess not to inform Gregory. The arrival
    of Don Diego de Mendoza, a new Spanish envoy, reignites the marriage game for
    Lady Mary, bringing a "love letter" from the Emperor''s nephew. Cromwell deftly
    thwarts Mendoza''s influence, exposes Chapuys''s past connections to rebels, and
    extracts a hidden letter from Mary, demonstrating his continued political acumen
    despite mounting personal pressures.'
