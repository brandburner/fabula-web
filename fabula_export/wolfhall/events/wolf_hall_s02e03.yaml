    description_of_involvement: Spain is referenced indirectly through the mention
      of a potential Spanish husband for Mary, which Cromwell implies he would prefer
      to avoid due to the risk of invasion. The Spanish Court’s influence is felt
      in the way Mary challenges Cromwell’s assumptions, forcing him to acknowledge
      the geopolitical stakes of her marriage. The organization’s presence is a reminder
      of the broader European power struggles at play, where Mary’s hand is a pawn
      in the contest between Habsburg and Valois ambitions. The threat of Spanish
      invasion is used by Cromwell as a justification for controlling Mary’s fate,
      but her defiance exposes the fragility of England’s position—caught between
      foreign powers and domestic rebellion.
    active_representation: Through the mention of a potential Spanish suitor and the
      implied threat of invasion. The organization’s influence is felt in the way
      Cromwell and Mary reference it as a geopolitical risk.
    power_dynamics: Spain seeks to exert influence over England through dynastic marriages,
      positioning itself as a potential threat. Cromwell’s deflection suggests England’s
      reluctance to align with Spain, but Mary’s challenge (‘You would not wish me
      to marry a Spaniard’) exposes the vulnerability of England’s position—caught
      between Spanish ambitions and French counteroffensives.
