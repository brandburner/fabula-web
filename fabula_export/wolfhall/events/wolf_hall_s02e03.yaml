      thereby weakening his hold over her.
    - Assert her independence and survival instincts by turning his paternalistic
      care into a liability for him.
    what_happened: 'Mary stands her ground in her furred nightgown, her fingers deliberately
      toying with the fabric before extracting the ring—a move that forces Cromwell
      into a position of vulnerability. Her voice is soft but precise, her gaze unflinching
      as she turns his own gifts against him. She deflects his political probes with
      ease, instead homing in on the personal: ‘Your care of me has been so tender.
      Like that of a father.’ Her body language is a study in controlled vulnerability,
      her posture relaxed yet her words a scalpel, dissecting Cromwell’s defenses.
      She leaves him no room to retreat, forcing him to confront the debt he owes
      her.'
