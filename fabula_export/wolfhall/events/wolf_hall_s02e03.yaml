- fabula_uuid: act_524c579092a1e539
  number: 3
  summary: The wedding celebration for Gregory and Bess Oughtred, intended to secure
    loyalties, becomes a crucible for Cromwell's personal relationships. Rafe's subtle
    reminders of Cromwell's past, particularly his "standing aside" for Henry at Wolf
    Hall, evoke memories of Anne Boleyn and the sacrifices made for the King. The
    tension culminates when Gregory confronts his father, expressing deep hurt and
    resentment over the misunderstanding with Bess. Gregory implores Cromwell, "leave
    my wife to me," highlighting Cromwell's pervasive influence and his son's struggle
    for independence and dignity. This raw exchange marks a significant personal climax
    for Cromwell, revealing the emotional toll of his ambition and power. Concurrently,
    King Henry's health visibly declines, leading to a public moment of weakness where
    Cromwell must physically support him. Henry, mortified and increasingly resentful,
    dismisses Cromwell, blaming him for consistently delivering "bad news" and signaling
    a dangerous shift in their relationship. This political climax underscores Cromwell's
    precarious position at court, where his indispensable service now breeds royal
    irritation. As Cromwell navigates these treacherous waters, a startling new personal
    revelation unfolds. A young woman, dressed in green and bearing a striking resemblance
    to Cromwell, appears at Austin Friars. She speaks with an Antwerp accent and reveals
    herself to be Anselma's child. Through a series of pointed observations about
    a tapestry and her mother, she directly informs Cromwell that he is her father,
    an illegitimate daughter from his time in Antwerp. This unexpected arrival adds
    an entirely new, deeply personal layer to Cromwell's already complex and besieged
    world, introducing a fresh challenge to his identity and future, leaving him to
    grapple with this unforeseen legacy amidst his ongoing political struggles.
