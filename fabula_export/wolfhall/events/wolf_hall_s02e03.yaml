  title: Cromwell proposes Mary’s return to court
  description: In the Queen’s privy chamber, Cromwell subtly suggests bringing Lady
    Mary back to court under the pretense of improving her health, a move that immediately
    raises Lady Rochford’s suspicions. The exchange exposes the court’s deep-seated
    paranoia—Rochford accuses Cromwell of using Mary’s presence to neutralize rebel
    threats, while Jane reveals Henry’s troubled dreams of his dead brother Arthur,
    hinting at the King’s psychological unraveling. Cromwell’s calculated maneuvering
    to consolidate power clashes with Jane’s quiet moral unease, underscoring the
    court’s toxic blend of ambition and guilt. The scene also reveals Cromwell’s growing
    unease about Henry’s instability, as Jane instructs him to lie about their conversation
    if questioned, deepening the narrative’s themes of deception and survival in a
    world where trust is a liability.
