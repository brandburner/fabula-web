  title: Henry’s Vulnerability and Cromwell’s Rejection
  description: "\n  In the Long Gallery at Hampton Court, Henry VIII—pale, puffy-faced,\
    \ and visibly in pain—stands rigidly while Holbein sketches his portrait. His\
    \ false cheer about the French king’s death masks his unease, and his impatience\
    \ with Holbein’s work reveals his restlessness. Cromwell, ever observant, notices\
    \ Henry’s instability and moves swiftly to steady him as the King begins to sway.\
    \ The moment of physical support is brief but charged: Henry, humiliated by his\
    \ own frailty, lashes out in fury, ordering everyone—including Cromwell—from the\
    \ room. His rejection of Cromwell’s aid exposes the King’s fragile ego and the\
    \ precarious nature of their alliance, where even the most loyal servant is not\
    \ immune to his wrath. The scene underscores the tension between Henry’s need\
    \ for control and his vulnerability, while Cromwell’s quiet competence is met\
    \ with violent dismissal, foreshadowing the cost of their fractured trust.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
