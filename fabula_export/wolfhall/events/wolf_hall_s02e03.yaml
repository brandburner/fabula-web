  title: Cromwell shatters Gregory’s romantic illusion
  description: 'In the dimly lit Long Gallery of Hampton Court, Cromwell returns from
    a private audience with Lady Mary—an encounter Gregory has been anxiously awaiting.
    Gregory, eager for reassurance, presses his father about the nature of their meeting,
    hoping to confirm his own delusional romantic fantasies about Mary’s affections.
    Cromwell, ever pragmatic, delivers the truth with clinical detachment: Mary sought
    him only to express gratitude for his paternal care and to dispel rumors of a
    marriage proposal. The revelation forces Gregory to confront the gulf between
    his private hopes and the court’s poisonous whispers, while also exposing Cromwell’s
    emotional distance—his ability to separate personal sentiment from political necessity.
    The moment underscores the corrosive power of court gossip and the fragility of
    Gregory’s self-perception, all while reinforcing Cromwell’s role as both a father
    and a ruthless architect of perception.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 22
  sequence_in_scene: 33
  key_dialogue:
  - 'GREGORY: What did she want?'
  - 'CROMWELL: To thank me. For caring for her like a father.'
  - 'GREGORY: A father?'
  - 'CROMWELL: She’s heard the rumours that I want to marry her. She’s warning me
    off.'
