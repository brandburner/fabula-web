  title: Anne confronts Cromwell’s loyalty
  description: 'In a rare moment of unguarded desperation, Anne Boleyn—her usual poise
    shattered by the court’s whispers—physically seizes Cromwell’s arm, demanding
    to know if he believes the damning rumors swirling against her. The act is both
    a plea and a test: her grip on his sleeve is a silent admission of her vulnerability,
    while her use of his nickname (''Cremuel'') suggests an attempt to reclaim their
    old intimacy. The ladies-in-waiting, sewing in the corner, serve as passive witnesses
    to Anne’s unraveling, their presence heightening the scene’s tension. Cromwell’s
    response will determine whether he remains a neutral observer or becomes an active
    player in her downfall. The confrontation marks a turning point in their dynamic,
    exposing Anne’s paranoia and forcing Cromwell to acknowledge the court’s shifting
    loyalties—while also revealing his own complicity in the machinery that will destroy
    her.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 15
  sequence_in_scene: 22
  key_dialogue:
