  title: Court erupts over Queen’s pregnancy
  description: 'In the Council Chamber, the news of Queen Jane Seymour’s pregnancy
    triggers an explosion of jubilant celebration among Henry VIII’s courtiers. The
    Councillors pound the table in triumph, their relief and hope palpable as they
    envision the rebellion’s collapse and the birth of a male heir. Henry, seated
    under his Canopy of State, reacts with restrained pride—his expression a mix of
    boyish delight and the weight of his kingdom’s future. Cromwell stands beside
    him, observing the scene with calculated composure, his presence a reminder of
    the political maneuvering that secured this moment. Fitzwilliam’s declaration
    that the entire nation prays for the Queen’s safe delivery underscores the fragile
    stakes: this child is not just a personal triumph but a fragile bulwark against
    rebellion and Henry’s lingering paranoia. The scene serves as a turning point,
    shifting the court’s focus from crisis to fragile optimism, while reinforcing
    Cromwell’s role as the architect of this fragile stability.'
