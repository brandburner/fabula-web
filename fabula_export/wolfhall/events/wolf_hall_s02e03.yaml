  title: Henry Defends Cromwell Against Sorcery Accusations
  description: "\n  In the Council Chamber at Hampton Court, Cromwell enters with\
    \ Wriothesley, Fitzwilliam, and Richard Riche, discussing the rebels' demands—including\
    \ the restoration of Lady Mary to legitimacy. Cromwell dismisses concerns about\
    \ securing her, instead focusing on identifying the landowners behind the rebellion.\
    \ When Henry arrives, he initially suggests mercy but is quickly provoked by Fitzwilliam’s\
    \ accusation that Cromwell has bewitched the King, echoing the charges that destroyed\
    \ Wolsey. Henry’s rage erupts: he slams his stick, denounces the rebels as ignorant,\
    \ and declares Cromwell’s heirs will rule England, effectively silencing opposition.\
    \ The chamber tenses as Henry storms out, leaving Fitzwilliam to taunt Cromwell\
    \ with his newfound, precarious power. The moment cements Cromwell’s dominance\
    \ but also exposes the court’s simmering resentment, forcing him to confront the\
    \ fragility of his position.\n  "
