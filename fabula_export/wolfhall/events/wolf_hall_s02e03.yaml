    - Force the King to negotiate or remove Cromwell, whom they see as the architect
      of the monarchy’s oppressive policies (e.g., monastic dissolutions).
    influence_mechanisms:
    - Through direct military action (capturing York), which disrupts royal authority
      and undermines the Council’s credibility.
    - By exploiting grievances (e.g., religious reforms, economic hardship) to rally
      support for their cause and turn public opinion against Cromwell.
    institutional_impact: The rebellion’s success in York weakens the monarchy’s grip
      on the north and emboldens other disaffected groups. If unchecked, it could
      trigger a broader uprising, forcing Henry to concessions or risk civil war.
      Cromwell’s ability to suppress the rebellion will determine whether the monarchy
      retains its absolute authority or faces a prolonged crisis of legitimacy.
    internal_dynamics: The rebels are likely a loose coalition of nobles, clergy,
      and commoners united by opposition to Henry’s policies. Their internal cohesion
      is fragile, and Cromwell may exploit divisions among them (e.g., noble self-interest
      vs. religious zeal) to weaken their resistance.
