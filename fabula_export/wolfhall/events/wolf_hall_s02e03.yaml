  global_id: null
  title: Jane’s defiance and Cromwell’s political maneuver
  description: In the ornamental gardens of Hampton Court, Thomas Cromwell deliberately
    declines Henry VIII’s invitation to join a game of bowls, signaling his prioritization
    of the northern rebellion over courtly distractions. Meanwhile, Queen Jane seizes
    the moment to publicly plead for Lady Mary’s return and religious tolerance, forcing
    Henry to confront the escalating tensions between his personal desires and the
    political fractures threatening his reign. Cromwell, caught between his loyalty
    to Henry and his need to manage the rebellion, subtly intervenes to end Jane’s
    plea, but not before she delivers a stinging rebuke that exposes Henry’s hypocrisy
    and the court’s fragility. The scene underscores Cromwell’s shifting loyalties,
    Jane’s fragile leverage, and the high stakes of navigating Henry’s volatile temper
    and divine authority. The court’s stunned reaction and Henry’s quiet fury reveal
    the peril of dissent in his reign, while Cromwell’s calculated moves highlight
    his role as the king’s indispensable yet increasingly vulnerable advisor.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 12
  sequence_in_scene: 18
  key_dialogue:
  - 'HENRY: Join us, Crumb.'
  - 'JANE: Will you hear me, sir? Please to bring the Lady Mary back to court. That
    I may have comfort in her society, and share a confidence.'
  - 'HENRY: Are you lonely, sweetheart? Well, of course. Of course we can have her,
    if it will make you merry.'
  - 'JANE: Sir, my heart is moved by the divisions that arise between your subjects
    and your most sacred self. I am only a woman. I do not presume to be wiser than
    your majesty. But my heart misgives when honourable and devout customs are left
    off.'
  - 'HENRY: Let her be. She must be instructed. Madam, what you fail to grasp is that
    the Bishop of Rome is merely a foreign prince, out to conquer if he can. I will
    have no alien interfere with my rule, and I will allow no traitor to shelter behind
    the cross of Christ.'
  - 'JANE: They would still pray for the King, if they could pray for the Pope too.'
  - 'CROMWELL: Pardon me, your grace, but there can be no double jurisdiction. Either
    the King rules, or the Pope.'
  - 'HENRY: Jane! Understand this. A prince answers before the strait court of heaven
    for his proceedings, and when he dies will be judged by standards of which ordinary
    men are quit. I am the earthly shepherd of all God’s sheep, rich and poor. It
    is my part to provide for their corporeal welfare and their spiritual good. The
    duty is laid on me, and the world shall see me discharge it.'
  - 'HENRY: We are willing to consider all lawful petitions. However, when you are
    fruitful, that is when we will give ear to your complaints.'
