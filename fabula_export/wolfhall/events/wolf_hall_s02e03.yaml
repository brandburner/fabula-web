  object_involvements:
  - object_uuid: ger_object_b1e87eb6d2d0
    description_of_involvement: 'Cromwell’s pillow is a deceptively mundane object
      that conceals a weapon, symbolizing the duality of his role: a trusted advisor
      who must always be prepared for violence. Its softness contrasts with the knife
      hidden beneath, reflecting how Cromwell masks his paranoia and ruthlessness
      behind a facade of composure. When he jolts awake, his hand instinctively slides
      under the pillow, a reflex born of years navigating Henry’s court. The pillow’s
      disturbance—rumpled and askew—hints at his restless sleep and the subconscious
      turmoil that plagues him.'
    status_before_event: Neatly placed on the bed, concealing the knife beneath it.
    status_after_event: Rumpled and displaced from Cromwell’s abrupt movement, the
      knife returned to its hiding place as Rafe enters.
    global_id: ger_object_b1e87eb6d2d0
  - object_uuid: ger_object_1b5a60148062
    description_of_involvement: Rafe’s candle is the first tangible intrusion into
      Cromwell’s nightmare, its flame a stark contrast to the darkness of the bedroom.
      It pierces the shadows where the Three Veiled Women lurk, symbolically illuminating
      the transition from subconscious terror to the harsh realities of the rebellion.
      The candle’s light exposes Cromwell’s hidden knife and the disheveled state
      of his pillow, underscoring the vulnerability he masks. Its presence is both
      practical (allowing Rafe to navigate the room) and narrative (signaling the
      shift from dream to reality, though the nightmare’s dread lingers).
    status_before_event: Carried by Rafe outside the bedroom door, unlit or dimly
      lit in the hallway.
    status_after_event: Placed on a surface in Cromwell’s bedroom (implied by its
      continued presence as Rafe delivers his message).
    global_id: ger_object_1b5a60148062
  - object_uuid: ger_object_fd5759b2dafe
    description_of_involvement: The hidden knife under Cromwell’s pillow is a literal
      and metaphorical tool of his survival. Its presence reflects his paranoia in
      a court where betrayal is currency, and its concealment underscores his need
      to appear non-threatening even as he prepares for violence. When he grabs the
      knife upon waking, it’s a visceral reaction to the nightmare’s threat—his subconscious
      fear of retribution manifesting in physical readiness. He conceals it again
      as Rafe enters, a calculated move to maintain the illusion of control. The knife’s
      brief appearance symbolizes the ever-present danger Cromwell faces, both from
      external enemies and his own conscience.
    status_before_event: Concealed under the pillow, ready to be drawn in an instant.
    status_after_event: Returned to its hiding place under the pillow, its presence
      now a secret shared only with Cromwell (and the audience).
    global_id: ger_object_fd5759b2dafe
