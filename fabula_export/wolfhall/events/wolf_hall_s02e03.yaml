  - object_uuid: ger_object_b1e87eb6d2d0
    description_of_involvement: 'Cromwell’s pillow is a deceptively ordinary object
      that conceals a weapon, symbolizing the duality of his existence: the public
      face of a loyal servant and the private reality of a man who must always be
      prepared for violence. When Cromwell jolts awake from his nightmare, his hand
      instinctively slides under the pillow to grasp the hidden knife, revealing his
      deep-seated paranoia and the ever-present threat he perceives. The pillow’s
      role is functional—it hides the knife—but it also underscores the precariousness
      of Cromwell’s world, where even a moment of rest is laced with danger. The act
      of concealing the knife again upon Rafe’s entrance shows Cromwell’s ability
      to mask his fear, but the pillow itself remains a silent witness to his inner
      turmoil.'
    status_before_event: Placed on the bed, concealing the knife beneath it.
    status_after_event: Disturbed by Cromwell’s movement, but the knife is returned
      to its hiding place beneath it.
