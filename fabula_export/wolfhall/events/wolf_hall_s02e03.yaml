  global_id: null
  title: Henry interrogates Cromwell’s political judgment
  description: In a tense private confrontation, Henry VIII tests Cromwell’s political
    resolve by questioning his handling of Norfolk’s appeals and his past leniency
    toward the Pole family. The King’s probing reveals his own paranoia and the fragility
    of their alliance, as Cromwell defends his strategic decisions while Henry’s escalating
    anger exposes his distrust. The exchange underscores the King’s volatile nature
    and the precarious balance of power between them, foreshadowing the cost of misplaced
    trust in a court where loyalty is currency and betrayal is inevitable. Cromwell’s
    frustration with Henry’s unpredictability and his own inability to eliminate Reginald
    Pole further strains their relationship, setting the stage for future conflicts
    and potential betrayals.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 37
  sequence_in_scene: 59
  key_dialogue:
  - 'HENRY: Norfolk has been writing to you, I hear. Begging for his brother’s life?'
  - 'CROMWELL: No. It is not for pleasing him that I ask for mercy.'
  - 'HENRY: Then why should I not punish Truth? Why should I not cut off his head
    for his knavery with my niece?'
  - 'CROMWELL: Because he is young, sire, and experience will improve his judgement.
    Let him sweat a space. It''s a lesson he''ll not forget and the Howards will be
    indebted to you hereafter.'
  - 'HENRY: You always say this, Cromwell. You say, remit them, and they will behave
    better. The Pole family... whom I prospered? Whom I restored in blood, whom I
    plucked from penury and disgrace? How am I repaid? By Reginald, parading around
    Europe calling me the Anti-Christ!'
  - 'CROMWELL: Majesty, I don''t know how to intercept a man who is never where he
    is expected! My people await him in some appointed place, but then he falls from
    his horse, is carried into a refuge, is three days nursing his bruises. We anticipate
    him at the next town, then we hear he has missed his way, wandered off in a circle,
    ended up back where he began. He’s... He’s too stupid to be killed.'
  - 'HENRY: THEN LEARN TO BE STUPID TOO!'
  - 'HENRY: Always you. Always you with the bad news.'
