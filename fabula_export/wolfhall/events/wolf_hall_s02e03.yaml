  key_dialogue:
  - 'CHAPUYS: I am told you have put the Duke of Norfolk in a fury. You know, he thinks
    this affair will bring you down. The rebels demand that ''vile blood'' be drained
    from the Council. That''s your blood, I imagine?'
  - 'CROMWELL: If your master intends to send aid to the rebels, he''s left it very
    late in the year.'
  - 'CHAPUYS: Hmm. Truly Thomas, we know this game, you and I. I know what you must
    say and you know what I must say.'
  - 'CROMWELL: If your master subverts my King in his own country, I will find ways
    to make him suffer. We will unite with the princes of Germany, who are your master''s
    subjects, or so he believes.'
