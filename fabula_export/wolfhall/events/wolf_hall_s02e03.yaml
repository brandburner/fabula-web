  object_involvements:
  - object_uuid: ger_object_534c4b5f7182
    description_of_involvement: 'Henry VIII’s battle armor, though not physically
      present in the chamber, is a looming specter in the scene. Its mention—‘Send
      to Greenwich for my armor’—signals a dramatic shift from political strategy
      to martial confrontation. The armor represents the king’s resolve to crush the
      rebellion with force, its absence in the room making its eventual arrival all
      the more ominous. The councillors’ dismay at the command underscores the armor’s
      symbolic weight: it is not just a suit of metal, but a declaration of war, and
      a reminder of the king’s capacity for violence.'
    status_before_event: Packed in Greenwich, its plates cold and inert, awaiting
      the king’s command. The servants preparing it move with quiet efficiency, unaware
      of the storm brewing in Hampton Court.
    status_after_event: En route to Hampton Court, the armor’s journey mirrors the
      escalation of the conflict. By the time it arrives, it will no longer be a logistical
      detail but a weapon of royal wrath, its presence a tangible threat to the rebels.
    global_id: ger_object_534c4b5f7182
  - object_uuid: ger_object_5ec0e9a93bfa
    description_of_involvement: The Hampton Court Council Chamber Benches serve as
      a physical manifestation of the court’s hierarchy and the councillors’ rigid
      postures. As Henry erupts, the benches’ hard surfaces amplify the councillors’
      discomfort, their bodies tensing at the king’s outburst. The benches’ plain
      design underscores the chamber’s stark formality, a space where power is wielded
      through words and symbols rather than comfort. Cromwell’s gathering of his papers
      from the bench as he exits is a deliberate act, signaling his transition from
      participant to executor of the king’s will.
    status_before_event: Occupied by the councillors, their polished wood surfaces
      reflecting the chamber’s dim light. The benches creak slightly as Fitzwilliam
      leans forward to accuse Cromwell, and Richard Riche shifts uneasily at Henry’s
      commands.
    status_after_event: Empty, save for the faint imprints of the councillors’ bodies.
      The benches now feel like a stage after the performance, their surfaces bearing
      the residual tension of the meeting. Cromwell’s departure leaves them as a reminder
      of the court’s fragile unity.
    global_id: ger_object_5ec0e9a93bfa
  - object_uuid: ger_object_88438ad8d79d
    description_of_involvement: The Hampton Court Council Chamber Canopy arches over
      Henry’s seat, a rich fabric symbol of royal authority that frames his outburst.
      As he erupts in defense of Cromwell, the canopy’s deep colors and intricate
      embroidery contrast with the raw emotion of the moment, emphasizing the gulf
      between the king’s divine right and the court’s mortal tensions. The councillors’
      flinches and the canopy’s unyielding presence create a visual tension—Henry’s
      power is absolute, but his temper is fragile, and the canopy itself seems to
      bear witness to the fragility of his rule.
    status_before_event: Draped immaculately over Henry’s chair, its gold thread glinting
      in the chamber’s light, a static but imposing backdrop to the council’s deliberations.
      The councillors’ eyes flicker toward it as they kneel, a reminder of the king’s
      elevated status.
    status_after_event: Slightly disturbed by the force of Henry’s pounding stick,
      the canopy’s fabric ripples before settling back into place. It remains a silent
      witness to the council’s stunned silence, its grandeur undiminished but its
      symbolic weight now tinged with the king’s volatility.
    global_id: ger_object_88438ad8d79d
