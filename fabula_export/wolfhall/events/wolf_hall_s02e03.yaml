  title: Cromwell probes Mary’s shifting loyalty
  description: 'At the Seymour celebration, Cromwell’s sharp observation of Henry’s
    subdued mood—his envy of Edward Seymour’s newborn daughter—sets the stage for
    a loaded exchange with Lady Rochford. She subtly probes him about Lady Mary’s
    shifting allegiance, noting how Mary now avoids Cromwell’s gaze. Lady Rochford’s
    barbed remark—that Mary may no longer *need* Cromwell now that the King has restored
    her favor—lands like a dagger, forcing Cromwell to recalibrate his alliances.
    The unspoken tension reveals a critical power realignment: Mary’s restored favor
    with Henry could render Cromwell’s protection obsolete, forcing him to navigate
    a court where loyalty is currency and betrayal is inevitable. Cromwell’s immediate
    pivot to Jane Seymour, followed by his silent gesture to Lady Rochford, signals
    his strategic recalibration—he must now leverage Jane’s potential pregnancy to
    secure his own position, even as the court’s undercurrents threaten to pull him
    under. The scene crackles with subtext: every glance, every pause, every loaded
    compliment is a chess move in a game where missteps mean ruin.'
