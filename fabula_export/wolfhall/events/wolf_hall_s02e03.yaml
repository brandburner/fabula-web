  title: Riche’s veiled threat to Jane’s legitimacy
  description: At the Seymour family’s celebration of their newborn daughter, Cromwell
    observes the court’s dynamics with his usual precision. Lady Rochford’s barbed
    remark about Lady Mary’s shifting loyalty—implying Cromwell’s influence may no
    longer be needed—hints at the fragility of his position. Meanwhile, Richard Riche
    delivers a seemingly innocuous but loaded comment to Queen Jane, suggesting that
    if she bears a daughter, she risks being sent back to Wolf Hall in disgrace. The
    remark, delivered in Cromwell’s presence, exposes the court’s simmering skepticism
    about Jane’s ability to secure Henry’s legacy and forces Cromwell to confront
    the instability of his own influence as the rebellion’s whispers grow louder.
    The exchange underscores the precarious balance of power in the Tudor court, where
    loyalty is currency and betrayal is inevitable. Cromwell’s reaction—gesturing
    for Lady Rochford to follow—signals his awareness of the political undercurrents
    and his need to recalibrate his alliances.
