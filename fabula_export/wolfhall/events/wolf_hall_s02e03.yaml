  title: Henry Accuses Cromwell of Failure
  description: In a tense private confrontation, Henry VIII berates Thomas Cromwell
    for his inability to eliminate Cardinal Reginald Pole—a perceived threat to the
    king’s authority. Cromwell, visibly frustrated, defends his strategic efforts
    to intercept Pole, but Henry’s escalating fury exposes the fragility of Cromwell’s
    position as the king’s most trusted advisor. The exchange reveals Henry’s growing
    paranoia and the mounting pressure on Cromwell to deliver results in a court rife
    with betrayal. Cromwell’s attempt to justify leniency toward Norfolk’s brother
    is met with Henry’s scorn, and the king’s accusation that Cromwell always brings
    'bad news' underscores the eroding trust between them. The scene culminates in
    Henry’s explosive outburst, marking a turning point in their relationship as Cromwell’s
    influence wavers under the weight of Henry’s volatile expectations.
