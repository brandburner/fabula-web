  - character_uuid: ger_agent_44511d8052a5
    emotional_state: Coldly assertive beneath a veneer of fragility, channeling her
      fear and resentment into a weapon. Her emotional state is a calculated performance—part
      genuine gratitude, part survival instinct, part revenge. She is in control,
      but the effort to maintain that control is palpable in the way she clutches
      the ring, her knuckles whitening briefly before she releases it.
    goals:
