  global_id: null
  title: Cromwell prioritizes Seymour alliance over Mendoza’s letter
  description: 'During Evensong at Hampton Court, Cromwell spots Edward Seymour across
    the crowded chapel and immediately shifts focus from Chapuys’ news about Don Diego
    de Mendoza’s romantic overture to Lady Mary. When Chapuys interrupts to deliver
    the letter—a potential diplomatic and emotional complication—Cromwell dismisses
    it with cold pragmatism, declaring he has a ‘different marriage to make.’ He swiftly
    pivots to negotiating Gregory’s marriage to Bess Oughtred, sealing a strategic
    alliance with the Seymour family. The moment underscores Cromwell’s ruthless prioritization
    of political maneuvering over personal intrigues, even when they involve foreign
    envoys and royal heirs. His abrupt dismissal of Chapuys and the Mendoza letter
    reveals his isolation and the cost of his ambition: he cannot afford distractions,
    not even those that might sway Lady Mary’s fate or the Emperor’s favor. The scene
    also highlights his relief at Richard’s safe return, a rare personal vulnerability
    that contrasts with his political calculation.'
