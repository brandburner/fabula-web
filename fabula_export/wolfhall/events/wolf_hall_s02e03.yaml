- fabula_uuid: cand_evt_scene_ae321f2031984690_01
  global_id: null
  title: Gregory confronts Cromwell over Bess
  description: 'In the aftermath of the wedding celebrations at Austin Friars, Gregory
    approaches his father with uncharacteristic tension, revealing Bess Oughtred’s
    confession about Cromwell’s initial misrepresentation as her groom. The confrontation
    exposes the deep fracture in their relationship: Gregory, humiliated and desperate
    for autonomy, demands Cromwell cease all contact with Bess and relinquish control
    over his marriage. Cromwell, stunned and wounded, attempts to deflect blame onto
    Edward Seymour’s abruptness, but his protestations of honor ring hollow. Gregory’s
    plea—*‘grant me an inch of your broad earth’*—cuts to the core of their dynamic:
    Cromwell’s all-consuming ambition has left his son feeling powerless, his identity
    subsumed by his father’s shadow. The exchange underscores the personal cost of
    Cromwell’s political maneuvering, as even his closest relationships become collateral
    in the pursuit of power. Gregory’s departure leaves Cromwell visibly stricken,
    the weight of his son’s resentment a stark counterpoint to the festive music still
    playing in the background. This moment is both a turning point in their fractured
    bond and a thematic echo of Cromwell’s broader struggle: his ability to secure
    the King’s legacy is eroding the very foundations of his personal life.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 35
  sequence_in_scene: 55
  key_dialogue:
