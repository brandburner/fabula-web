  title: Cromwell humiliates Norfolk with private leverage
  description: 'In Norfolk’s own palace, Cromwell systematically dismantles the Duke’s
    authority by stripping him of military command—assigning it to the less threatening
    Suffolk instead. Norfolk’s outrage erupts into a volatile confrontation, where
    Cromwell wields a private letter from Norfolk’s wife to expose his marital neglect,
    triggering a brutal exchange that lays bare Norfolk’s vulnerabilities and Cromwell’s
    ruthless political leverage. The scene escalates from bureaucratic demotion to
    personal humiliation, with Norfolk’s threats of appeal to the King met by Cromwell’s
    cold, calculated exposure of his domestic failures. The power dynamic shifts visibly:
    Norfolk’s aristocratic pride is weaponized against him, while Cromwell’s lowborn
    cunning proves more effective than noble lineage. The confrontation ends with
    Norfolk storming off, his authority in tatters, and Cromwell’s dominance over
    the court further cemented—though at the cost of deepening Norfolk’s enmity. The
    exchange reveals Cromwell’s willingness to exploit even the most intimate details
    of a rival’s life to secure his position, reinforcing his reputation as a man
    who leaves no vulnerability unexploited.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 7
  sequence_in_scene: 11
  key_dialogue:
  - |-
    NORFOLK: I have six hundred armed and ready to ride, I have five cannon — five, and they are all mine! And I can whistle up another sixteen hundred men in short order–
    CROMWELL: No, my lord.
  - |-
    NORFOLK: What? That horse-keeper? By Saint Jude, what, am I to be set aside? Me, of the best blood this nation affords?
    CROMWELL: The King's pleasure, as Mister Wriothesley here hoped to explain, that you linger neither in London nor near his person. That you repair to your own country, there to ensure quietness.
  - |-
    CROMWELL: I have a letter from your wife, the duchess. She complains of scant living!
    NORFOLK: Let her family keep her.
    CROMWELL: If you set your wife aside, you could at least pension her off. She's suffered enough already, don't you think, at your hands?
  - |-
    NORFOLK: In the north parts they use your name to terrify their children. Be quiet, they say, or Cromwell will come. He will jump down your throat and bite your liver.
    CROMWELL: Lord Cromwell would be more polite.
