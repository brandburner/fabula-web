    description_of_involvement: The bloody parcel, unwound by one of the Three Veiled
      Women in Cromwell’s nightmare, is a visceral symbol of the violence he has enabled—executions,
      purges, and the rebellion’s bloodshed. Its dark stains evoke the gore of past
      betrayals (e.g., Anne Boleyn’s fall) and the immediate threat of York’s capture.
