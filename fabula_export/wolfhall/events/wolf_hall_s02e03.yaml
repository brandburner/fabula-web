  title: Cromwell assesses Bess under Holbein’s scrutiny
  description: 'In the Long Gallery at Hampton Court, Hans Holbein prepares to sketch
    Bess Oughtred for a portrait commissioned by Henry VIII. Cromwell, ostensibly
    overseeing the artistic process, becomes distracted by Bess’s presence, his gaze
    lingering on her profile as she moves into the light. Holbein, focused on his
    work, directs Bess to adjust her posture, while Cromwell interjects to insist
    on authenticity over flattery—echoing his own pragmatic loyalty to the King’s
    demands. Bess, sensing Cromwell’s attention, teases Jane Seymour about her own
    portrait, revealing the court’s undercurrent of rivalry and unspoken power dynamics.
    The scene functions as a quiet power play: Cromwell’s scrutiny of Bess is both
    personal and political, hinting at his strategic interest in her as a potential
    ally or pawn, while Holbein’s artistic direction serves as a neutral but revealing
    lens for their interactions. The moment underscores Cromwell’s dual role as a
    courtier who defers to royal favor and a manipulator who orchestrates from the
    shadows.'
