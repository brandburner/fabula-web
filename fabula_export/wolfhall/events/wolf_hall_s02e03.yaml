  title: Cromwell disrupts Mendoza’s private audience
  description: 'Thomas Cromwell strategically interrupts Don Diego de Mendoza’s clandestine
    meeting with Lady Mary at Hampton Court, leveraging his authority to assert control
    over the court’s inner circles. After first allowing Mendoza a brief, supervised
    audience—ostensibly to deliver a portrait from Dom Luis—Cromwell abruptly terminates
    the encounter, exposing Mendoza’s hostility and Mary’s frustration. The moment
    reveals Cromwell’s mastery of political theater: he uses the interruption to pressure
    Chapuys with damning evidence of his involvement in the Pilgrimage of Grace rebellion,
    then seizes the opportunity to interrogate Mary about her loyalty. When Mary reluctantly
    admits she has reaffirmed her acceptance of Henry as head of the Church, Cromwell
    demands the hidden letter Mendoza carried—a direct challenge to her compliance.
    The scene underscores Cromwell’s dominance, the fragility of Mary’s position,
    and the court’s paranoia, while foreshadowing the escalating tensions between
    imperial allies and the King’s faction. The power dynamics are clear: Cromwell
    dictates the terms of engagement, and even Mary’s defiance is met with calculated
    control.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 32
  sequence_in_scene: 50
  key_dialogue:
  - 'CROMWELL: Have you brought Dom Luis’s portrait for my lady?'
  - 'MENDOZA: Just that. There are presents, of course. Which follow by mule.'
  - 'CROMWELL: I will give you a quarter of an hour, Don Diego, and then, with regret
    I shall interrupt you.'
  - 'CHAPUYS: It is hardly time enough for them to pray together.'
  - 'CROMWELL: Oh... One of the rebel leaders has implicated you.'
  - 'CHAPUYS: What?'
  - 'CROMWELL: Under questioning. And we have letters you sent to the traitor Darcy.
    Going back three years.'
  - 'MENDOZA: My lord, go out, we are not done.'
  - 'CROMWELL: But I come to remind you, sir, of your urgent next engagement.'
  - 'MARY: He asked me if I meant what I said.'
  - 'CROMWELL: Generally? Or specifically?'
  - 'MARY: You know full well. If I meant it when I said that I accepted my father
    as head of the church, and that he and my mother were never truly married. I said
    that I did.'
  - 'CROMWELL: Give me the letter.'
  - 'MARY: No. The other one. The one he carried hidden under his shirt.'
