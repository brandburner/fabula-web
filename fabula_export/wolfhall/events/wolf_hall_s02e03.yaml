  - object_uuid: ger_object_f565f90de39d
    description_of_involvement: The horses in the courtyard are sturdy, rain-dampened
      animals waiting to haul the platoon and their provisions north. They are a practical
      necessity, but also a symbol of the physical demands of the mission—enduring
      the rain, the mud, and the long march ahead. Soldier 3’s reminder not to neglect
      the horses underscores their importance, as their well-being is critical to
      the success of the journey. Their presence in the courtyard, flank’s likely
      damp and muscles tense, adds to the atmosphere of urgency and preparation, a
      living reminder of the challenges that lie ahead.
    status_before_event: Tethered in the courtyard, saddled and ready, their flanks
      damp from the rain, awaiting the final preparations before departure.
    status_after_event: Loaded with supplies and riders, beginning the march north,
      their hooves sinking into the mud as they carry the platoon toward Louth and
      the rebellion.
    global_id: ger_object_f565f90de39d
  - object_uuid: ger_object_8cedc8b052d9
    description_of_involvement: The Duke of Norfolk’s five cannons are not physically
      present in the courtyard, but they are invoked as a logistical concern by Thomas
      Cromwell. He warns Richard that the rain will bog down the cannon before they
      reach Enfield, a practical observation that also serves as a deflection from
      the emotional weight of Bellowe’s torture. The cannons represent the military
      might at Cromwell’s disposal, but also the fragility of his plans in the face
      of nature and rebellion. Their absence in the courtyard is a reminder of the
      larger forces at play—forces that Cromwell must control, but which are ultimately
      beyond his immediate reach.
    status_before_event: Stored in London, awaiting transport north with Richard’s
      platoon, their movement dependent on the weather and the condition of the roads.
    status_after_event: Still in London or en route, their progress hindered by the
      rain, a logistical nightmare that threatens to delay the entire campaign.
    global_id: ger_object_8cedc8b052d9
  - object_uuid: ger_object_0be967e483e1
    description_of_involvement: The provisions for the journey north are a chaotic
      assortment of crates and sacks being loaded onto wagons in the rain-soaked courtyard.
      They represent the logistical backbone of Richard’s mission, ensuring his troops
      are supplied for the march and potential battle ahead. The soldiers’ focus on
      the provisions—loading them quickly, securing them against the rain—creates
      a sense of urgency and practicality that contrasts sharply with the emotional
      weight of the medal and the horror of Bellowe’s fate. The provisions are both
      a necessity and a distraction, a tangible reminder of the mission’s stakes and
      the mundane details that must be attended to even in the face of violence.
    status_before_event: Stacked in crates and sacks in the courtyard, partially loaded
      onto wagons, vulnerable to the rain.
    status_after_event: Secured onto the wagons, ready for transport north, though
      the rain threatens to bog down the entire operation.
