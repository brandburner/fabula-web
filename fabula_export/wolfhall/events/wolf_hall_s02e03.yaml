  object_involvements:
  - object_uuid: ger_object_534c4b5f7182
    description_of_involvement: Cromwell’s Lincolnshire Rebellion Papers are a tangible
      representation of the strategic and political challenges facing the council.
      He gathers them from the table as he prepares to leave, signaling his intent
      to continue his work despite the chaos of Henry’s outburst. These papers—filled
      with names of landowners, rebel demands, and potential countermeasures—serve
      as both a tool for debate and a reminder of the urgent tasks at hand. Their
      presence underscores the pragmatic, administrative side of Cromwell’s role,
      contrasting with the emotional and symbolic weight of Henry’s proclamation.
      As Cromwell exits, the papers become a symbol of his relentless focus on suppressing
      the rebellion, even as the court’s dynamics shift around him.
    status_before_event: Scattered across the council table, referenced during the
      debate on the rebellion’s demands and the need to identify landowner instigators.
    status_after_event: Gathered into a stack by Cromwell as he prepares to leave,
      now carrying the weight of the council’s unresolved tensions and the King’s
      volatile declaration.
    global_id: ger_object_534c4b5f7182
  - object_uuid: ger_object_5ec0e9a93bfa
    description_of_involvement: The Hampton Court Council Chamber Benches serve as
      a physical manifestation of the council’s rigid hierarchy and the discomfort
      of those seated upon them. As Henry erupts, the Councillors shift uneasily on
      the hard surfaces, their flinches and dismayed expressions revealing their internal
      conflict. The benches are not just furniture but a stage for the council’s collective
      tension, their unyielding wood a metaphor for the uncompromising nature of the
      decisions being made. For Cromwell, the benches represent the court’s resistance
      to his rise, while for Fitzwilliam, they are a platform from which to launch
      his barbed remarks. The benches’ plain design underscores the stark formality
      of the chamber, a space where power is wielded and loyalties are tested.
    status_before_event: Occupied by the Councillors as they listen to the debate,
      their rigid posture reflecting the formality and tension of the meeting.
    status_after_event: Left empty as the Councillors react to Henry’s outburst, their
      unease lingering in the air like a physical presence.
    global_id: ger_object_5ec0e9a93bfa
  - object_uuid: ger_object_88438ad8d79d
    description_of_involvement: The Hampton Court Council Chamber Canopy arches over
      Henry’s seat, framing him as the focal point of the council’s power dynamics.
      During Henry’s outburst, the canopy becomes a stage for his volatile assertion
      of authority, its rich fabric a stark contrast to the tension below. The canopy
      symbolizes the King’s divine right to rule, but its presence also highlights
      the fragility of his position—his rage is a desperate attempt to reassert control
      in the face of rebellion and courtly resistance. For the Councillors, the canopy
      is a reminder of the hierarchy they must navigate, while for Cromwell, it underscores
      the precariousness of his elevated status under Henry’s protection.
    status_before_event: Fixed in place above Henry’s chair, its grandeur unchallenged
      as the council convenes, a silent symbol of royal authority.
    status_after_event: Remaining in place, but now imbued with the memory of Henry’s
      outburst, its fabric a witness to the King’s volatility and the shifting loyalties
      beneath it.
    global_id: ger_object_88438ad8d79d
  - object_uuid: ger_object_6e5784320be7
    description_of_involvement: Henry’s ornamented stick is not merely a tool for
      mobility but a symbol of his royal authority and a weapon of emphasis. He pounds
      it violently on the dais during his outburst, causing the Councillors to flinch
      and underscoring the volatility of his rage. The stick serves as a physical
      manifestation of his frustration and a tool to assert dominance, reinforcing
