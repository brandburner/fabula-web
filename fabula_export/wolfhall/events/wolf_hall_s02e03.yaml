      any suggestion of weakness.
    - To publicly affirm Cromwell’s loyalty and elevate him as a symbol of his unchallenged
      power, despite the court’s resentments.
    what_happened: Henry’s physical frailty is underscored as he limps into the chamber,
      leaning on his ornamented stick. His initial contemplative demeanor shifts to
      explosive rage when Fitzwilliam accuses Cromwell of sorcery, pounding his stick
      and declaring Cromwell’s heirs will rule England. His command to send for his
      armor signals a transition from political strategy to martial confrontation,
      leaving the council in stunned silence.
