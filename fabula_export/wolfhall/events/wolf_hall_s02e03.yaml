      rising to a roar as he defends Cromwell with biblical fervor, declaring his
      minister’s heirs will rule England. His outburst—‘I made my minister, and by
      God I will maintain him’—exposes his paranoia and the fragility of his authority,
      as he rejects Norfolk’s involvement and orders his armor sent from Greenwich.
      He struggles to his feet, assisted by Rafe, and exits abruptly to go shooting,
      leaving the council in stunned silence.
