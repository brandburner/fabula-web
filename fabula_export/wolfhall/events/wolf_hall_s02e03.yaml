  global_id: null
  title: Bess confronts Cromwell’s deception
  description: 'In the Hampton Court gardens, Thomas Cromwell attempts to reassure
    Bess Oughtred about her impending marriage to his son Gregory, only for her to
    reveal she believed *she* was marrying Cromwell himself. The misunderstanding
    exposes the court’s rampant speculation about Cromwell’s marital status and his
    political ambitions—particularly his rumored pursuit of Lady Mary. Bess, initially
    playful, grows cold as she realizes Cromwell’s paternalistic assumptions about
    their relationship. She weaponizes the confusion, demanding Cromwell clarify which
    Cromwell she will marry, forcing him into a vulnerable position where his personal
    and political reputations hang in the balance. The scene escalates from a fatherly
    exchange into a high-stakes negotiation, where Bess’s agency becomes a wildcard
    that could unravel Cromwell’s carefully constructed schemes. The power dynamic
    inverts: Cromwell, usually the manipulator, is now cornered, begging Bess to preserve
    the marriage and keep the truth from Gregory. Her refusal to commit leaves Cromwell
    exposed, his control slipping as the court’s gossip threatens to undermine his
    authority.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 30
  sequence_in_scene: 46
  key_dialogue:
  - 'BESS OUGHTRED: I am offering my person to one Cromwell only, the one that I marry.
    Which Cromwell is that meant to be?'
  - 'CROMWELL: I am extremely flattered that you would even consider it, but I...
    I presume you mean to Lady Mary?'
  - 'BESS OUGHTRED: Then you would do well to be clear who you will marry and who
    you will not. Tell me when and where, and I will come in my bridal finery and
    I will marry whichever Cromwell presents himself.'
