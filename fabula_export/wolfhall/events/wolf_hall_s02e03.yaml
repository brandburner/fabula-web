  title: Cromwell’s Marriage Misunderstanding Explodes
  description: In the Hampton Court gardens, Thomas Cromwell’s paternal vulnerability
    surfaces as he discusses Gregory’s impending marriage with Bess Oughtred. The
    conversation takes a sharp turn when Bess reveals she believed *she* was marrying
    Cromwell—not Gregory—exposing a court-wide misunderstanding that threatens Cromwell’s
    reputation, Gregory’s future, and the fragile alliances he’s spent years cultivating.
    Cromwell’s shock and Bess’s hardening realization force him to confront the personal
    cost of his political maneuvering in a moment of raw, unguarded exposure. The
    revelation escalates their conflict, shifting power dynamics and forcing Cromwell
    to negotiate a delicate resolution to preserve his carefully constructed schemes.
