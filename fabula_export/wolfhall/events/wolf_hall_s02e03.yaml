  title: Abbess challenges Cromwell’s religious motives
  description: 'In the shadowed aisles of Shaftesbury Abbey, the Abbess confronts
    Cromwell with pointed suspicion, her guarded questions probing the true purpose
    of his visit. She dismisses his claim that Wolsey’s daughter is the reason for
    his presence, instead homing in on his religious beliefs as the source of her
    distrust. Cromwell’s deflection—shifting the focus to his faith—exposes the unspoken
    tension between their worldviews: the Abbess, rooted in institutional tradition,
    and Cromwell, a reformist outsider navigating a world where trust is fragile and
    betrayal lurks beneath every exchange. The scene underscores Cromwell’s precarious
    position as an outsider, where even his religious leanings are scrutinized as
    a threat to the established order. The Abbess’s veiled accusation serves as a
    microcosm of the broader resistance Cromwell faces, where his ambition and reformist
    ideals are met with deep-seated skepticism and institutional defensiveness.'
