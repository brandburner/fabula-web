    out of duty when she consented, when she thought I was the groom. And how this...
    how this muddle came about - well, Seymour, you know, he can be brisk. One gentleman
    passing another in conversation. It can happen.'
  - 'GREGORY: Other things can happen. But do not let them.'
  - 'GREGORY: So I beg you, Father, grant me an inch of your broad earth and leave
    my wife to me.'
