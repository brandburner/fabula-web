  global_id: null
  title: Mary confronts Cromwell’s paternal role
  description: 'In the intimate, charged setting of Mary Tudor’s bedchamber at Hampton
    Court, Cromwell—still stinging from public humiliation—attempts to probe Mary’s
    loyalty to the Crown and her ties to the rebels. His questions about potential
    marriages (Orléans, Spain) are thinly veiled tests of her allegiance, but Mary
    deftly inverts the power dynamic. She wields the ring Cromwell gifted her (a poetic
    token of obedience) as a weapon, forcing him to confront the unspoken paternal
    bond between them. Her calculated vulnerability—‘Your care of me has been so tender.
    Like that of a father’—exposes Cromwell’s emotional vulnerability, leaving him
    defenseless against her psychological maneuvering. The scene pivots from political
    interrogation to a raw, personal reckoning, where Mary’s survival instincts and
    Cromwell’s buried guilt collide. His deflection (‘You looked very well today’)
    fails to mask the tension: this is no longer about rebellion or marriage schemes,
    but about the cost of Cromwell’s paternalistic control over Mary’s life—and the
    debt she now demands repayment for.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 21
  sequence_in_scene: 31
  key_dialogue: &id017
  - 'MARY: The rebels may use my name, but they have no permission from me. Which
    is to say, ‘Yes, I have been approached’.'
  - 'CROMWELL: ((Low)) Careful. Careful, Mary.'
  - 'MARY: Why did you wait so long to come to Hunsdon, when you wished me to sign
    the oath?'
  - 'CROMWELL: Cardinal Wolsey used to say, ‘Show your power by your absence’. You
    would have refused if I had came earlier.'
  - 'MARY: Perhaps. And if I had, I would now be dead. Instead, I am here, at my father’s
    side.'
  - 'MARY: Your care of me has been so tender. Like that of a father.'
