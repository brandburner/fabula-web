acts:
- fabula_uuid: act_a0d940303f8cedca
  number: 1
  summary: The narrative opens with Thomas Cromwell haunted by vivid flashbacks of
    his past, specifically his perceived betrayal of Cardinal Wolsey, a sentiment
    echoed by Wolsey's daughter, Dorothea. This internal turmoil is quickly overshadowed
    by external crisis as riders from Lincolnshire arrive at Hampton Court, bearing
    news of a widespread rebellion. Rumors circulate that King Henry VIII is dead,
    and that Cromwell, accused of being a "devil" who seeks to dismantle traditional
    church practices and even marry the King's daughter, is the true target of the
    uprising. Rebels have already attacked Bishop Langland's men, escalating the threat.
    In a tense council meeting, Henry initially considers leniency but is provoked
    by Fitzwilliam's insinuation that Cromwell has bewitched him, much like Wolsey.
    Henry fiercely defends Cromwell, publicly affirming his indispensable role and
    even proclaiming his heirs as future rulers, a declaration that both solidifies
    Cromwell's position and fuels his rivals' resentment. Cromwell immediately takes
    decisive action, denying the ambitious Duke of Norfolk command of the King's forces
    and instead assigning Suffolk, effectively sidelining Norfolk. Norfolk, enraged,
    confronts Cromwell, who retaliates by exposing Norfolk's mistreatment of his wife,
    further cementing their animosity. Cromwell dispatches his son, Richard, to mobilize
    forces in the north, entrusting him with a protective medal from his own past
    in Italy. The personal cost of this escalating conflict becomes starkly clear
    when Richard reveals the brutal torture and death of Cromwell's servant, Bellowe,
    at the hands of the rebels. Cromwell, though visibly affected, maintains a stoic
    demeanor, demonstrating his resolve in the face of mounting personal and political
    pressure. This act establishes the immediate threat, Cromwell's central role,
    and the personal and political stakes he faces.
