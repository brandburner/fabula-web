  title: Norfolk’s Departure and Cromwell’s Warning
  description: "\n  In the midst of a lavish feast at Hampton Court, Norfolk delivers\
    \ a terse report to Henry VIII—sixteen hundred troops—before departing for the\
    \ north. His cold, penitential demeanor contrasts with Cromwell’s quiet vigilance,\
    \ who observes the exchange with Gregory. When Norfolk passes Cromwell, their\
    \ charged silence and Norfolk’s lingering glance at Gregory underscore their simmering\
    \ rivalry. Cromwell’s cryptic remark—‘Then grace’s rights are restored’—serves\
    \ as a veiled threat, reminding Norfolk of the precarious nature of royal favor.\
    \ Meanwhile, Fitzwilliam accuses Cromwell of orchestrating Lady Mary’s return\
    \ to court, a move that further entangles him in court intrigues. Cromwell deflects\
    \ the accusation by attributing it to Queen Jane’s request, but the tension lingers,\
    \ revealing the fragility of his position as whispers of rebellion and shifting\
    \ loyalties swirl around him. The scene highlights Cromwell’s strategic vigilance\
    \ and Norfolk’s lingering resentment, both of which threaten Cromwell’s survival\
    \ in the court.\n  "
