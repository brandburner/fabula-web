      The open space is slick with water, the stone underfoot glistening as soldiers
      load provisions onto wagons and horses shift restlessly. The courtyard is both
      a place of departure and a symbol of the Cromwell household’s vulnerability—an
      open area where the family’s defenses are literally and figuratively exposed.
      The rain pelting down adds to the atmosphere of urgency and foreboding, a natural
      force that mirrors the emotional and logistical challenges facing the characters.
      It is here that Thomas Cromwell’s rare moment of vulnerability occurs, as he
      gifts Richard the medal, and here that the brutality of the rebellion is invoked,
      a stark reminder of the world beyond the courtyard’s walls.
