      unraveling. The act of waking here—disoriented and grasping for a knife—underscores
      the inescapability of his past, while Rafe’s news of York’s fall transforms
      the room into a launchpad for crisis management. The bedroom’s atmosphere is
      claustrophobic, its mood a mix of dread and urgency.'
