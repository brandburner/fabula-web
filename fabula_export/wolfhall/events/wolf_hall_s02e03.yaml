    description_of_involvement: The English Council is the institutional backbone
      of Henry VIII’s government, but its stability is threatened by the fall of York
      and the rebellion’s demands for Cromwell’s removal. While the Council itself
      is not physically present in this event, its shadow looms over Cromwell’s actions.
      The rebellion’s capture of York directly challenges the Council’s authority,
      and Cromwell’s ability to suppress the uprising will determine whether the Council
      survives as a unified body or fractures under internal strife (e.g., Norfolk’s
      ambitions). Rafe’s news—*York has fallen*—is a direct attack on the Council’s
      legitimacy, forcing Cromwell to act as its de facto crisis manager.
    active_representation: Via the urgent news delivered by Rafe (a Council insider)
      and the implied threat to Cromwell’s position within it.
    power_dynamics: Under siege from external forces (rebels) and internal factions
      (nobles like Norfolk who may exploit the crisis). Cromwell’s role is to reassert
      the Council’s authority, but his survival depends on outmaneuvering both enemies
      and rivals within the organization.
    organizational_goals:
    - Suppress the rebellion in York to restore the Council’s control over northern
      England and prevent further uprisings.
    - Neutralize internal threats (e.g., Norfolk’s potential push to remove Cromwell)
      by demonstrating his indispensability to Henry.
    influence_mechanisms:
    - Through Cromwell’s direct access to Henry (allowing him to shape the King’s
      response to the rebellion).
    - By leveraging the King’s absolute authority to crush dissent and reassert the
      Council’s dominance.
    institutional_impact: The fall of York tests the Council’s resilience. If Cromwell
      fails to suppress the rebellion, the Council’s legitimacy will crumble, opening
      the door to noble factions (e.g., Norfolk) who seek to replace him. Success,
      however, will reinforce Henry’s reliance on Cromwell and the Council’s centralized
      power—at least temporarily.
    internal_dynamics: 'Factional tensions are implied: nobles like Norfolk may see
      the rebellion as an opportunity to weaken Cromwell and advance their own agendas.
      The Council’s unity is fragile, and Cromwell’s actions here will determine whether
      it holds or fractures.'
