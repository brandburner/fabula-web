  global_id: null
  title: Cromwell probes Chapuys’ rebellion ties
  description: Cromwell orchestrates a calculated power play at Hampton Court, using
    Don Diego de Mendoza’s meeting with Lady Mary as a pretext to isolate Chapuys
    and interrogate him about his suspected involvement in the Pilgrimage of Grace
    rebellion. After allowing Mendoza a brief, monitored audience with Mary—where
    he delivers a coded message hidden in a letter—Cromwell abruptly interrupts, revealing
    he has intercepted incriminating correspondence between Chapuys and rebel leader
    Darcy. The confrontation forces Chapuys into a defensive posture, exposing the
    fragility of Spain’s diplomatic position while reinforcing Cromwell’s control
    over court intrigues. The exchange underscores Cromwell’s mastery of psychological
    manipulation, as he balances threats with feigned clemency, ensuring Chapuys remains
    off-balance and dependent on his goodwill. Meanwhile, Mary’s reluctant admission
    that she has publicly accepted Henry’s supremacy over the Church—while secretly
    clinging to the hidden letter—reveals the court’s pervasive atmosphere of duplicity,
    where even the King’s own daughter must navigate a labyrinth of loyalty and deception.
