  title: Henry defends Cromwell against rebellion
  description: In the tense council chamber, Cromwell and his allies strategize to
    suppress the Lincolnshire rebellion by identifying landowner instigators and monitoring
    Lady Mary. Henry VIII, initially inclined toward mercy, erupts in a violent defense
    of Cromwell after Fitzwilliam reveals the rebels' demand for Cromwell's execution.
    The King's outburst—declaring Cromwell's legitimacy as his chosen heir and dismissing
    Norfolk—exposes his paranoia and the fragility of his authority. Fitzwilliam's
    barbed remark about Cromwell's 'heir presumptive' status underscores the court's
    shifting loyalties and the personal cost of Cromwell's ambition. The scene crystallizes
    the conflict between pragmatism (Cromwell's political maneuvering) and mercy (Henry's
    wavering resolve), while Henry's aggressive posture (ordering armor and rejecting
    leniency) signals a turning point in his leadership. The moment forces Cromwell
    to confront the precariousness of his position, caught between the King's volatile
    loyalty and the court's growing resentment.
