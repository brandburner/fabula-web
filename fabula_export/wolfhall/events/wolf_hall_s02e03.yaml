  global_id: null
  title: Jane defies Henry over religious dissent
  description: In the ornamental gardens of Hampton Court, Queen Jane Seymour publicly
    challenges King Henry VIII’s religious policies in a calculated but reckless plea
    for Lady Mary’s return and tolerance of Catholic traditions. As Henry and his
    court play bowls, Jane kneels before him, invoking his conscience and the burden
    of his rule. Her appeal—framed as a wife’s concern for her husband’s spiritual
    well-being—escalates into a direct confrontation with Henry’s divine authority,
    exposing the fragility of her position. Cromwell, observing the exchange, intervenes
    to defuse the tension, but Henry’s response is a chilling assertion of his absolute
    power, silencing Jane and reaffirming his refusal to compromise. The court’s reaction—murmurs
    of approval, applause—underscores the peril of dissent, while Jane’s trembling
    defiance hints at her growing influence and the personal cost of her ambition.
    The moment crystallizes the court’s shifting loyalties and the high stakes of
    religious conflict in Henry’s reign, with Cromwell caught between his loyalty
    to the King and his own political maneuvering.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 12
  sequence_in_scene: 19
  key_dialogue:
  - 'JANE: Will you hear me, sir? Please to bring the Lady Mary back to court. That
    I may have comfort in her society, and share a confidence.'
  - 'HENRY: Are you lonely, sweetheart? Well, of course. Of course we can have her,
    if it will make you merry. My Lord Privy Seal will...'
  - 'JANE: Sir, my heart is moved by the divisions that arise between your subjects
    and your most sacred self. I am only a woman. I do not presume to be wiser than
    your majesty. But my heart misgives when honourable and devout customs are left
    off.'
  - 'HENRY: Let her be. She must be instructed. Madam, what you fail to grasp is that
    the Bishop of Rome is merely a foreign prince, out to conquer if he can. I will
    have no alien interfere with my rule, and I will allow no traitor to shelter behind
    the cross of Christ.'
  - 'JANE: They are too much burdened with taxes. My lord, take care of your thoughts
    as well as your deeds. What you refuse by day will haunt you by night. Your majesty
    knows this.'
  - 'HENRY: Jane! A prince answers before the strait court of heaven for his proceedings,
    and when he dies will be judged by standards of which ordinary men are quit. I
    am the earthly shepherd of all God’s sheep, rich and poor. It is my part to provide
    for their corporeal welfare and their spiritual good. The duty is laid on me,
    and the world shall see me discharge it.'
