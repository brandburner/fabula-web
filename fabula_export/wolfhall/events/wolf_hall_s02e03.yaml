  global_id: null
  title: Jane confides in Cromwell about Henry’s dreams
  description: "\n  In the Queen’s privy chamber at Hampton Court, Cromwell and Riche\
    \ enter to find Jane surrounded by her ladies-in-waiting, including Lady Rochford,\
    \ who subtly undermines Cromwell’s suggestion to bring Lady Mary back to court.\
    \ Jane dismisses Rochford with quiet authority, then privately reveals to Cromwell\
    \ that Henry is haunted by nightmares—where his dead brother Arthur accuses him\
    \ of failing the kingdom. She admits her own distress over the people’s suffering,\
    \ while Cromwell, though unsettled, dismisses the dreams as the burden of kingship.\
    \ Jane then instructs him to lie about their conversation if questioned, exposing\
    \ the court’s culture of secrecy and the fragile trust between them. The exchange\
    \ underscores the psychological toll of Henry’s reign, the fragility of alliances,\
    \ and the moral compromises Cromwell must make to survive.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 11
  sequence_in_scene: 17
  key_dialogue:
  - 'JANE: The King tells me his dreams. Sometimes, when he has... you know, visited
    me, he falls asleep in my bed and then wakes, because of his dreams. He calls
    out ''mea culpa, mea culpa''. He says his late brother appears to him, to reproach
    him for the unrest in his kingdom. And the distress of his people.'
  - 'CROMWELL: His brother has appeared to him before, your grace, in his dreams.
    Perhaps... perhaps all princes are troubled by their conscience in such a way,
    in the late hours?'
  - 'JANE: I too am troubled by the distress of the people. If anyone asks what we
    spoke of, tell them I wanted to show you the glass and know about the Romans.'
