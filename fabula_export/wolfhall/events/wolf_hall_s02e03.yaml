  title: Cromwell wakes to rebellion and summons
  description: 'Cromwell jolts awake from a nightmare—his subconscious conjuring veiled
    women and blood, symbols of his past sins and the rebellion''s looming threat.
    His paranoia erupts into violent readiness, hand reaching for a hidden knife,
    before Rafe enters with the grim news: York has fallen to rebellion. The tension
    is immediate and palpable. Cromwell’s first question—*Have you told the King?*—reveals
    his strategic mind: he must control the narrative before Henry’s volatile temper
    turns on him. Rafe’s response, *He waits on you in the Chantry Chapel*, underscores
    Cromwell’s precarious role as the King’s crisis advisor. The scene foreshadows
    the perilous balance between loyalty, ambition, and survival in Henry’s court,
    where Cromwell’s political survival hinges on navigating the King’s rage and the
    court’s shifting loyalties. The nightmare’s imagery lingers, a reminder of the
    personal cost of his ambition and the betrayals that haunt him.'
