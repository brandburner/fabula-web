      for the council’s debate and Henry’s outburst. Though not physically present
      in the chamber, their demands—particularly the call for Cromwell’s execution
      and the restoration of Lady Mary—loom large over the proceedings. The landowners’
      role in this event is to embody the provincial resistance to Henry’s reforms
      and the threat they pose to the stability of the realm. Their influence is felt
      through the intelligence gathered by Wriothesley and the strategic discussions
      among the council members, who must decide how to suppress the uprising without
      further alienating the nobility or the common folk.
