  title: Lady-in-waiting covers Anne Boleyn’s severed head
  description: In the immediate aftermath of Anne Boleyn’s execution, a bloodstained
    lady-in-waiting—likely a former confidante—kneels beside the scaffold and drapes
    a bloodied cloth over the queen’s severed head. The gesture is both a final act
    of loyalty and a visceral acknowledgment of the court’s brutality. The cloth,
    soaked in Anne’s blood, becomes a symbol of the irreversible consequences of Henry
    VIII’s shifting alliances and the fragility of power. The lady-in-waiting’s trembling
    hands and the way she lingers suggest lingering guilt or unresolved grief, hinting
    at the personal cost of betrayal in the royal court. The scene serves as a haunting
    reminder of Cromwell’s role in orchestrating Anne’s downfall and the moral weight
    he carries as Henry’s chief minister.
