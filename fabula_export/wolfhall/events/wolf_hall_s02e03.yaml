  title: Cromwell secures Seymour alliance through marriage
  description: "\n  During Evensong at Hampton Court Palace, Thomas Cromwell spots\
    \ Edward Seymour across the crowded chapel and seizes the moment to broker a marriage\
    \ alliance between his son Gregory and Seymour’s sister Bess Oughtred. The negotiation\
    \ unfolds with calculated precision: Cromwell’s offer is framed as a fait accompli—‘We\
    \ are willing’—while Seymour, though initially surprised, pivots to financial\
    \ terms, revealing the transactional nature of courtly alliances. The exchange\
    \ is abruptly interrupted by Richard Cromwell’s return from the northern campaign,\
    \ his dusty arrival carrying the weight of survival and the symbolic luck medal\
    \ Cromwell had entrusted to him. The medal’s return—both a victory token and a\
    \ reminder of their shared fate—undercuts the political maneuvering with a rare\
    \ moment of paternal vulnerability. Cromwell’s relief at Richard’s survival contrasts\
    \ sharply with his cold pragmatism in the marriage pact, exposing the duality\
    \ of his role: a strategist who secures alliances while grappling with the personal\
    \ cost of his ambition. The scene underscores the court’s ruthless game, where\
    \ even family bonds become political currency, and where Cromwell’s emotional\
    \ armor is momentarily breached by the return of his son.\n  "
