  global_id: null
  title: Gregory demands his autonomy
  description: 'In a tense, emotionally charged confrontation at Austin Friars, Gregory
    Cromwell—wounded by his father’s covert interference in his marriage—directly
    challenges Thomas Cromwell for the first time. The scene opens with Gregory hesitating
    near Cromwell’s table, their usual awkwardness amplified by the unspoken tension.
    Cromwell, still reeling from the revelation that Bess Oughtred mistakenly believed
    *he* was her groom, attempts to deflect blame onto Edward Seymour’s abruptness,
    but Gregory cuts through the evasion. His plea—‘grant me an inch of your broad
    earth and leave my wife to me’—is a raw, desperate bid for independence, exposing
    the suffocating weight of Cromwell’s influence. The exchange lays bare the irreversible
    fracture between them: Gregory’s resentment stems not just from the marriage muddle
    but from a lifetime of being overshadowed by his father’s ambition. Cromwell’s
    stricken reaction reveals his guilt—he *is* a man of his word, but his word has
    always served his own designs. Gregory’s departure leaves Cromwell visibly shaken,
    underscoring how his political mastery has failed him in the one arena that matters:
    his son’s respect. The moment is a turning point in their relationship, where
    personal vulnerability collides with the political stakes of Cromwell’s world,
    foreshadowing the cost of his unchecked ambition.'
