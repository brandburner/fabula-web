- fabula_uuid: cand_evt_scene_72500d66cea1489d_01
  global_id: null
  title: Cromwell confronts Lincolnshire rebellion rumors
  description: Jolted awake by a nightmare, Thomas Cromwell is immediately confronted
    by two riders bearing urgent news of a violent rebellion in Lincolnshire. The
    riders report that rebels in Louth have attacked Bishop Langland’s men, killed
    a man, and spread rumors that Henry VIII is dead—with Cromwell accused of seizing
    power, dismantling parish churches, and plotting to claim the King’s daughter
    for himself. Cromwell, still disoriented from sleep, reacts with sharp defiance,
    dismissing the rumors as absurd while privately absorbing the threat. His immediate
    response—ordering the riders to bring him to the 'dead king' to beg pardon—reveals
    his instinct to turn the accusation into a spectacle of loyalty, even as the riders’
    claims expose the depth of his enemies’ propaganda. The scene escalates the political
    crisis, forcing Cromwell to publicly defend himself while privately grappling
    with the fragility of his position. The rebellion’s accusations mirror past suspicions
    against Wolsey, reinforcing the cyclical nature of courtly betrayal and the personal
    cost of Cromwell’s ambition.
