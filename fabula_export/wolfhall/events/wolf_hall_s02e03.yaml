- fabula_uuid: cand_evt_scene_c8d7fda5a167c8e2_01
  global_id: null
  title: Cromwell confronts Wolsey’s absence
  description: 'In the dead of night, Thomas Cromwell sits alone in his study, haunted
    by the memory of Cardinal Wolsey—a man he once served and later outmaneuvered.
    The weight of his past betrayals presses on him as he turns toward the window,
    where Wolsey’s spectral presence once lingered. He calls out to the empty space,
    his voice trembling with a mix of longing and guilt: *‘Master?’* The silence that
    follows is deafening, underscoring the isolation of his ambition. This moment
    of vulnerability reveals the fragility beneath his political mastery, exposing
    how deeply his rise has been shaped by the ghosts of those he has discarded. The
    absence of Wolsey’s ghost forces Cromwell to confront the moral cost of his ambition,
    a reckoning that cuts deeper than any rebellion or court intrigue. The scene serves
    as a psychological turning point, where Cromwell’s exterior control fractures
    under the weight of his past.'
