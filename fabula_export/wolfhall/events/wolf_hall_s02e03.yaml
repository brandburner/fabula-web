  title: Cromwell’s Winter Truce Strategy
  description: 'In the predawn quiet of Cromwell’s bedroom, the weight of the rebel
    threat is revealed through a letter detailing the staggering size of the rebel
    army—50,000 men. Rafe, still groggy from sleep, reacts with shock to the news,
    but Cromwell remains eerily composed, his mind already calculating. Christophe,
    kneeling by the fire, offers the first glimmer of a solution: *We lie.* Cromwell
    expands on this deceptive strategy, outlining a truce that promises concessions—Jane’s
    coronation in York, a northern parliament, and a general pardon—while leveraging
    the harshness of winter to weaken the rebels through starvation and disease. The
    scene underscores Cromwell’s ruthless pragmatism, his ability to turn apparent
    weakness into a strategic advantage, and his willingness to exploit time and circumstance
    rather than brute force. Rafe’s stunned silence highlights the moral ambiguity
    of the plan, while Christophe’s quiet complicity reinforces the idea that deception
    is now Cromwell’s most potent weapon. This moment is not just a tactical decision
    but a turning point in how Cromwell will wage this war—through psychological manipulation
    rather than direct confrontation.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 23
  sequence_in_scene: 34
  key_dialogue:
  - 'CROMWELL: Fifty thousand. The rebel army has grown. They now have fifty thousand
    men in the field.'
  - 'RAFE: Then... what do we do?'
  - 'CROMWELL: We lie. They have might, we have winter. We offer them a truce. We
    promise them Jane will be crowned in York. We promise them a parliament in the
    north. We promise them a general pardon. In the meantime, winter creeps in, food
    grows scarce, disease breaks out... Time is on our side.'
