      hidden antagonists whose actions have precipitated this crisis. Their rebellion,
      fueled by demands for Lady Mary’s restoration and Cromwell’s execution, forces
      the Privy Council into this high-stakes confrontation. While not physically
      present, their influence is palpable in Fitzwilliam’s accusations of sorcery
      and Henry’s violent defense of Cromwell. The landowners’ coordinated unrest
      exposes the court’s internal fractures and tests the king’s authority, making
      them a silent but powerful force in this event.
