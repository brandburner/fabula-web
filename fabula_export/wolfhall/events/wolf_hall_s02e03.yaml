  title: Henry publicly defends Cromwell’s power
  description: In a tense council meeting, Thomas Cromwell and his allies strategize
    to suppress the Lincolnshire rebellion, with Cromwell advocating for a hardline
    approach while Henry initially leans toward mercy. The moment shifts dramatically
    when Fitzwilliam accuses Cromwell of sorcery—echoing the charges that destroyed
    Wolsey—and demands his removal. Henry, enraged by the rebellion’s audacity and
    the suggestion that his authority is weak, erupts in a furious defense of Cromwell,
    declaring that his minister’s heirs will rule England. This explosive outburst
    silences the council, cements Cromwell’s political dominance, and marks a turning
    point in the power struggle at court. The scene reveals Henry’s volatile nature,
    Cromwell’s precarious position, and the court’s shifting loyalties as the rebellion
    escalates.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 6
  sequence_in_scene: 8
  key_dialogue: &id005
  - 'FITZWILLIAM: ''Lord Cromwell’s head is their chief demand. They believe my lord
    has practised some device or sorcery on the King. As they claim the Cardinal did
    before him.'''
  - 'HENRY: ''And, by God, I am offended too. I take it ill to be instructed by the
    folk of Lincolnshire... Let them remember this. When I choose a humble man for
    my councillor, HE IS NO MORE HUMBLE. I made my minister, and by God I will maintain
    him. If I say Cromwell is a lord, then he is a lord. And if I say Cromwell’s heirs
    are to follow me and rule England, by God they will do it.'''
  - 'FITZWILLIAM: ''Well? How does it feel? To be the heir presumptive to England?'''
