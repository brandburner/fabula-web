    description_of_involvement: The King’s Privy Council is the body that advises
      Henry VIII on matters of governance, and in this event, it is the stage for
      a high-stakes confrontation between Cromwell and Fitzwilliam. The council’s
      role is to address the Lincolnshire rebellion, but the meeting quickly devolves
      into a power struggle, with Henry’s outburst serving as a reminder of his absolute
      authority. The council’s members—Cromwell, Fitzwilliam, Riche, Wriothesley,
      and Cranmer—react with a mix of deference, unease, and strategic maneuvering,
      reflecting the institutional tensions at play. The council’s ability to function
      effectively is tested by the rebellion and the personal rivalries within its
      ranks, exposing the fragility of its unity.
