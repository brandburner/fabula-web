  title: Cromwell ambushes Chapuys with rebellion evidence
  description: 'Cromwell orchestrates a high-stakes confrontation with Chapuys by
    first allowing a brief, monitored meeting between Mendoza and Mary—ostensibly
    to maintain diplomatic appearances—before abruptly cutting it short. Once alone
    with Chapuys, Cromwell drops his veneer of civility and accuses the ambassador
    of complicity in the Pilgrimage of Grace rebellion, producing intercepted letters
    linking Chapuys to the traitor Darcy. The exchange is a calculated probe: Cromwell
    tests whether Chapuys’ diplomatic composure will crack under pressure, revealing
    his true loyalties or forcing Cromwell to escalate his countermeasures. The tension
    escalates when Cromwell interrupts Mendoza’s audience with Mary, asserting his
    control over the court’s inner circles. The scene hinges on whether Chapuys’ silence
    or defiance will expose his involvement, while Cromwell’s manipulation of the
    meeting’s timing underscores his dominance over both foreign diplomats and domestic
    politics. The moment also serves as a setup for Cromwell’s subsequent interrogation
    of Mary, ensuring he maintains leverage over her as well.'
