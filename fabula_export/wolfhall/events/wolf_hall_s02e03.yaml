  title: Cromwell’s veiled power play in Jane’s chamber
  description: 'Thomas Cromwell intrudes upon Jane Seymour’s private meal with her
    sister Bess Oughtred, using the moment to subtly acknowledge Jane’s pregnancy—a
    delicate political maneuver that signals both his awareness of the King’s favor
    and his own strategic positioning. His refusal to join them, citing Holbein’s
    presence as a pretext, underscores his dual role: a courtier who defers to royal
    authority while simultaneously asserting his influence. The exchange reveals Cromwell’s
    mastery of courtly manipulation, where even a refusal to dine becomes a calculated
    assertion of power. Jane’s warmth with Bess contrasts sharply with Cromwell’s
    cold precision, highlighting the tension between personal intimacy and political
    calculation. The scene serves as a microcosm of Cromwell’s broader strategy—securing
    his position by aligning himself with the King’s desires while maintaining control
    over the court’s narrative.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e03
  scene_sequence: 27
  sequence_in_scene: 39
  key_dialogue:
  - 'JANE: ... it was delicious. It wasn’t.'
  - 'BESS OUGHTRED: Quails. The Lisles send them from Calais by the crate. As you
    can see, she sets into them as though they had done her an injury. (LAUGHS) They
    are fed on the boat to keep them fat but, even so, she must have more.'
  - 'CROMWELL: No harm in that. The King likes a woman to show her appetite. And now,
    of course...'
  - 'JANE: Will you join us, my lord?'
  - 'CROMWELL: I cannot. Holbein is here.'
