  key_dialogue: &id007
  - |-
    LADY MARGARET DOUGLAS: He has given me a ring.
    CROMWELL: A ring is not a pledge.
  - |-
    LADY MARGARET DOUGLAS: We are pledged. You will not part us.
    MARY FITZROY: For the love of Christ, sit down, Meg... and try to comprehend what the Lord Privy Seal is telling you. He is trying to help us.
  - 'CROMWELL: We must ask ourselves, don’t we, Lady Margaret, what marriage is? It
    is not just vows, is it? It’s bed work. If there’d been promises, and witnesses,
    and then bed, you are fast married, your contract is good. You will be called
