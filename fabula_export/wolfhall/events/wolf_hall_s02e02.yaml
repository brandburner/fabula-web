  title: Wolsey warns Cromwell of Henry’s betrayal
  description: 'In the quiet solitude of his new study at Austin Friars, Thomas Cromwell
    is visited by the spectral presence of Cardinal Wolsey—a man whose political downfall
    still haunts him. Wolsey delivers a stark, prophetic warning: Henry VIII will
    claim credit for Cromwell’s successes while ensuring Cromwell bears the blame
    for any failures. The exchange underscores the precarious nature of Cromwell’s
    rise, revealing Wolsey’s bitter insight into the King’s capricious nature and
    the inevitable betrayal that awaits those who serve him. This moment serves as
    both a cautionary tale and a psychological turning point, forcing Cromwell to
    confront the moral cost of his ambition and the fragility of his position at court.
    The scene plants the seeds for Cromwell’s future downfall, framing his relationship
    with Henry as one of transactional loyalty rather than genuine trust.'
