  global_id: null
  title: Cromwell exposes Howard’s hidden ambition
  description: 'In a tense interrogation within Tom Truth’s cell, Cromwell and Wriothesley
    confront Thomas Howard the Lesser—Norfolk’s half-brother—about his secret marriage
    to Lady Margaret Douglas, the King’s niece. Cromwell, armed with a damning poem
    written by Howard, dismantles his denials by exposing the political ambition behind
    the union: Howard’s hope to become King of England. The exchange reveals Cromwell’s
    strategic mind, his ability to exploit vulnerability, and the precarious balance
    of power in Henry VIII’s court. Howard’s defiance crumbles under Cromwell’s psychological
    pressure, while Wriothesley’s threat of Cromwell’s violent reputation underscores
    the ruthlessness required to survive at court. The scene highlights Cromwell’s
    mastery of manipulation, his awareness of the court’s hidden machinations, and
    the fragility of noble status when faced with his relentless pursuit of truth—or
    control.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 23
  sequence_in_scene: 38
  key_dialogue:
  - 'CROMWELL: ''You forgot it. As any... as any man of sense would. But your fifth
    stanza there you write, *Pardon me. Pardon me, your man, Tom Truth’ Which you
    rhyme, unfortunately, with *growth.'''
  - 'THOMAS HOWARD THE LESSER: ''I know what you do, Cromwell. But the King will not
    permit you to ill-use a gentleman.'''
  - 'CROMWELL: ''So, you say to yourself, *Here I am. I''m a man of great quality,
    I... I... but I''m penniless. No one regards me other than to confuse me with
    my elder brother. I know what I’ll do—I’ll marry the King''s niece. That’ll pay,
    because odds-on then I’ll be King of England one day.* You see, I wonder who might
    have put that treacherous rhyme in your head?'''
