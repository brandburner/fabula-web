  title: Cromwell and Wriothesley dismantle Howard’s love letter
  description: 'In a claustrophobic interrogation cell, Cromwell and Wriothesley systematically
    dismantle Thomas Howard the Lesser’s poetic love letter to Lady Margaret Douglas,
    exposing its emotional vulnerability as a political liability. Cromwell feigns
    reluctance to read the verse aloud, delegating the task to Wriothesley, who mocks
    the awkward rhymes and sentimental phrasing—particularly the line ‘Tom Truth’
    rhymed with ‘growth’—while Christophe’s blunt interjection (‘Would that be the
    pain in your bollocks?’) underscores the scene’s crude, humiliating tone. The
    interrogation escalates when Wriothesley reveals witnesses to Howard’s pledge,
    forcing the nobleman to defend his aristocratic privilege against Cromwell’s implied
    threat of violence. Cromwell’s psychological maneuvering—alternating between feigned
    sympathy (‘I wonder who might have put that treacherous rhyme in your head?’)
    and cold calculation—reveals his mastery of courtly power dynamics, while Howard’s
    defiance (‘The King will not permit you to ill-use a gentleman’) exposes the fragility
    of his noble status. The scene functions as a microcosm of Cromwell’s rise: his
    ability to weaponize personal weakness (Howard’s poetry) to undermine aristocratic
    rivals, while subtly asserting his own authority through Wriothesley’s intimidation
    and Christophe’s unfiltered commentary. The exchange also foreshadows Cromwell’s
    later moral compromises, as his mockery of Howard’s ‘good intent’ mirrors the
    court’s hypocrisy in justifying political maneuvering as virtue.'
