  title: Cromwell dismantles Margaret’s marriage claim
  description: 'In Cromwell’s study at Austin Friars, Lady Margaret Douglas defiantly
    declares her secret marriage to Thomas Howard, believing her vows and love make
    it unassailable. Cromwell methodically dismantles her claim by exposing its legal
    and political fragility—no witnesses, no consummation, no royal consent—while
    subtly leveraging her fear of Henry’s wrath. Mary Fitzroy, torn between loyalty
    and self-preservation, reluctantly aids Cromwell’s interrogation, undermining
    Margaret’s defiance. The scene reveals Cromwell’s mastery of bureaucratic and
    psychological pressure: he doesn’t need to prove the marriage invalid, only to
    sow doubt and force Margaret into compliance. Her collapse at the mention of Henry’s
    treatment of his own daughter underscores the court’s brutal hierarchy, where
    love and defiance are no match for power. The exchange also exposes Fitzroy’s
    pragmatic survival instincts, contrasting with Margaret’s idealism, and foreshadows
    Cromwell’s ability to manipulate even the most personal of bonds for political
    gain.'
