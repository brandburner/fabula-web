  title: Cromwell dismisses Riche’s complaints
  description: 'In the cramped, chaotic attic of the Court of Augmentations—where
    the dissolution of monasteries is being administered—Thomas Cromwell brushes off
    Richard Riche’s grievances about the office’s squalid conditions. Riche, burdened
    with boxes of paperwork and surrounded by scurrying clerks, laments the irony
    of the space’s name ("Court of Augmentations") while Cromwell remains unmoved,
    his focus solely on executing Henry VIII’s agenda. The exchange underscores Cromwell’s
    ruthless pragmatism: bureaucratic discomfort is irrelevant when the King’s will
    is at stake. As Riche moves on, Cromwell lingers by a window, holding a crucifix—a
    silent moment that contrasts his political ruthlessness with the lingering weight
    of his past (evoked by Mary’s earlier plea for a child). The scene reveals Cromwell’s
    growing detachment from administrative concerns, signaling his shift toward unchecked
    power and the moral compromises it demands. The crucifix, a relic of his Catholic
    upbringing, hints at the tension between his ambition and the remnants of his
    conscience.'
