  title: Cromwell confronts his failure to save Wolsey
  description: In the dimly lit solitude of his study, Cromwell is consumed by grief
    and self-reproach over Cardinal Wolsey’s death, a loss he now realizes was preventable.
    The weight of Rafe’s earlier warning—*‘You should have acted sooner’*—haunts him,
    forcing him to confront the irreversible consequences of his political caution
    and the moral cost of his ambition. His monologue reveals the depth of his devotion
    to Wolsey, detailing the brutal acts he committed in the Cardinal’s name (including
