  title: Cromwell dismantles Margaret’s defiance
  description: In Cromwell’s study at Austin Friars, Lady Margaret Douglas—Henry VIII’s
    rebellious niece—confronts Cromwell with her secret marriage to Thomas Howard,
    declaring it legally binding. Cromwell, aided by the calculating Wriothesley,
    methodically dismantles her claims by exposing the lack of witnesses, formal vows,
    or consummation, reducing her defiance to a desperate bluff. Mary Fitzroy, torn
    between loyalty and self-preservation, reluctantly distances herself from Margaret’s
    assertions, further isolating the princess. Cromwell’s verbal sparring forces
    Margaret to confront the precariousness of her position, subtly invoking Lady
    Mary’s recent downfall as a warning. The exchange underscores Cromwell’s mastery
    of psychological manipulation—he doesn’t need brute force to break her spirit,
    only the cold application of legal and political reality. By the scene’s end,
    Margaret’s defiance crumbles into fear, and the threat of Henry’s wrath looms
    larger than ever. The scene serves as both a microcosm of Cromwell’s rise (his
    ability to wield power without overt cruelty) and a foreshadowing of the court’s
    brutal efficiency in crushing dissent, no matter how noble the cause.
