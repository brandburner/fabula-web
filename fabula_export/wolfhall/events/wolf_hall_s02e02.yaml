  title: Cromwell’s marriage proposal and Dorothea’s accusation
  description: In the quiet, sacred space of Shaftesbury Abbey’s quire, Thomas Cromwell
    arrives bearing gifts for Dorothea, Wolsey’s illegitimate daughter, in an attempt
    to secure her loyalty and silence her father’s lingering influence. His initial
    offer of financial security and suitors escalates into an impulsive, stammering
    marriage proposal—a moment of vulnerability that exposes his desperation to prove
    his worth. Dorothea, however, rejects him outright, her defiance rooted in her
    belief that Cromwell betrayed Wolsey by manipulating his letters to Norfolk, which
    led to the Cardinal’s downfall. Her accusation strikes Cromwell like a physical
    blow, shattering his composure and forcing him to confront the moral cost of his
    political maneuvering. The exchange crystallizes their ideological and personal
    opposition, with Dorothea’s refusal serving as both a personal rebuke and a symbolic
    challenge to Cromwell’s rising authority. The scene underscores the fragility
    of Cromwell’s power, as even those closest to Wolsey now question his loyalty
    and moral compass, leaving him wounded and exposed.
