  title: Cromwell dismisses human nature as flawed
  description: 'On Wolsey’s barge, Cavendish laments the English tendency to destroy
    great men, framing it as a national flaw. Cromwell interrupts with a blunt, cynical
    refutation: ''It''s not the English. It''s just people.'' The exchange reveals
    Cromwell’s detached pragmatism and his refusal to indulge in nationalistic or
    moralistic explanations. His response underscores his belief in human nature as
    inherently self-destructive—a philosophy that will later justify his ruthless
    political maneuvering. The moment also contrasts Cavendish’s idealism with Cromwell’s
    cold realism, foreshadowing how Cromwell will exploit the court’s fragility rather
    than lament it. The dialogue serves as a thematic pivot, shifting from Wolsey’s
    downfall to Cromwell’s emerging worldview, where power is the only reliable currency.'
