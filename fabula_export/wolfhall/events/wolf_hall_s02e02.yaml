  title: Abbess exposes Cromwell’s hidden motive
  description: 'In the sunlit cloisters of Shaftesbury Abbey, Cromwell follows the
    Abbess as she challenges his presence, revealing her suspicion that his visit
    is not merely bureaucratic but personal. When she directly names Wolsey’s daughter
    Dorothea as the true reason for his arrival, Cromwell’s silence confirms her accusation.
    The Abbess’s defiance—both of the King’s authority and Cromwell’s pretense—marks
    a turning point: she forces Cromwell to confront the intersection of his political
    mission and his unresolved past. The moment shifts from bureaucratic posturing
    to a confrontation with his own motives, as the Abbess’s refusal to yield the
    abbey becomes a mirror for Cromwell’s own moral compromises. The scene hinges
    on her ability to see through his calculated charm, exposing the vulnerability
    beneath his ambition. The Abbess’s directive to enter the doorway—where Dorothea
    awaits—propels Cromwell into a space where his past and present collide, raising
    the stakes for his emotional and political reckoning.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 34
  sequence_in_scene: 55
  key_dialogue: &id017
  - 'ABBESS: Why is Richard Riche here? I understood his business is with houses of
    lesser value.'
  - 'CROMWELL: We like to keep our figures current.'
  - 'ABBESS: I give you warning, and you can carry the warning to the King. I will
    not surrender this house. Not this year, nor next, nor any year this side of heaven.'
  - 'CROMWELL: The King has no thought of it.'
  - 'ABBESS: So, this really is the reason you have come?'
  - 'ABBESS: Wolsey’s daughter.'
