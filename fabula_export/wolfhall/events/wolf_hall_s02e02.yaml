      where Cromwell’s bureaucratic and legal power is wielded to break Margaret’s
      defiance.
    symbolic_significance: Represents the cold, impersonal machinery of the state,
      where personal bonds and emotions are irrelevant. The study is a microcosm of
      Cromwell’s rise—once Wolsey’s protégé, now the King’s enforcer, using the very
      tools of power that once belonged to his fallen mentor.
