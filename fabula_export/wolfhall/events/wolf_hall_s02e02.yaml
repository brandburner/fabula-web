  title: Cromwell learns of Margaret Douglas’s treasonous affair
  description: During a casual meeting with Hans Holbein to commission royal portraits,
    Thomas Cromwell is abruptly interrupted by Wriothesley, who reveals damning evidence
    of Lady Margaret Douglas’s clandestine marriage to Thomas Howard the Lesser—a
    politically explosive liaison that implicates Norfolk’s faction in a potential
    treasonous plot. Cromwell’s initial amusement at the idea of a secret love affair
    curdles into horror as Wriothesley confirms the truth, forcing Cromwell to confront
    the destabilizing implications of this secret alliance. The revelation not only
    threatens to undermine his own precarious position at court but also reignites
    volatile tensions between the Howard family and the Crown. Cromwell’s reaction—shifting
    from dismissive humor to cold calculation—reveals his strategic mind at work,
    already assessing how to exploit or neutralize this threat before it spirals out
    of control. The scene underscores the precarious balance of power in Henry VIII’s
    court, where even whispered rumors can ignite political wildfires, and where Cromwell’s
    survival depends on his ability to stay one step ahead of his enemies.
