- fabula_uuid: cand_evt_scene_00b86c7a4dd8b386_01
  global_id: null
  title: Cromwell’s marriage proposal and Dorothea’s accusation
  description: "\n  In the quire of Shaftesbury Abbey, Thomas Cromwell arrives bearing\
    \ gifts for Dorothea, Cardinal Wolsey’s illegitimate daughter, in a calculated\
    \ attempt to secure her loyalty and silence her father’s lingering influence.\
    \ His initial offer of financial support and suitors escalates into an impulsive,\
    \ awkward marriage proposal—an uncharacteristic moment of vulnerability that exposes\
    \ his desperation to control the narrative of Wolsey’s legacy. Dorothea, however,\
    \ rejects him outright, accusing him of betraying her father by orchestrating\
    \ the dissemination of Wolsey’s private letters to the Duke of Norfolk, which\
    \ contributed to his downfall. Cromwell’s denial crumbles under her unwavering\
    \ conviction, leaving him emotionally exposed and forced to confront the moral\
    \ weight of his political maneuvering. The confrontation crystallizes their ideological\
    \ and personal opposition, with Dorothea’s refusal serving as both a personal\
    \ rebuke and a symbolic challenge to Cromwell’s rising authority. The scene marks\
    \ a turning point in Cromwell’s self-perception, as Dorothea’s accusation forces\
    \ him to grapple with the consequences of his ambition and the fragility of his\
    \ moral compromises.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 35
  sequence_in_scene: 56
  key_dialogue:
  - 'CROMWELL: I will marry you, mistress, if you’ll have me. I am... er... I’m not
    sure know this, but I am a long time a widow. I lack graces of person, but I am
    rich and likely to grow richer. I have good houses. You would find me generous...'
  - 'DOROTHEA: It was he who brought you to the King''s notice, wasn’t it? With the
    result that we see. [...] My father understood everything. He understood you betrayed
    him. When my father was in exile, and forced to go north, he wrote certain letters,
    out of his desperation to have the King''s favour again, letters begging the King
    of France to intercede for him. You saw to it that those letters reached the Duke
    of Norfolk. You put upon them an evil construction, which they should never have
    borne.'
  - 'CROMWELL: You are much mistaken. [...] Who told you this? How long have you believed
    it? [...] You are angry. Innocence is tranquil.'
