    description_of_involvement: The treason indictment against Thomas Howard the Lesser
      is ordered by Henry VIII as a direct response to the secret marriage scandal.
      Henry demands that the indictment explicitly state that Howard the Lesser was
      'inspired by the devil,' framing the marriage as a treasonous act driven by
      supernatural malevolence. This indictment is a legal weapon, designed to justify
      the King’s wrath and provide a pretext for suppressing the Howards’ ambitions.
      Cromwell is tasked with drafting it, though he remains silent on the broader
      implication that Norfolk may be involved. The indictment is not physically present
      but is invoked as a tool of the King’s authority, symbolizing the court’s ability
      to weaponize the law against its enemies.
