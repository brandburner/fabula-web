  title: Cromwell rejects Wriothesley’s reckless provocation
  description: 'In the courtyard of Austin Friars, Wriothesley pressures Cromwell
    to exploit Norfolk’s weakened position by publicly discrediting him—a move that
    could trigger Henry’s vengeful nature. Cromwell, mounted and ready to depart,
    dismisses the scheme outright, warning that provoking the King’s wrath would be
    politically suicidal. His refusal underscores his strategic caution and growing
    distance from Wriothesley’s ruthless tactics, signaling Cromwell’s consolidation
    of power on his own terms. The exchange reveals Cromwell’s calculated restraint,
    his awareness of Henry’s volatility, and his refusal to play by Wriothesley’s
    aggressive rules, even as he consolidates influence. The abrupt departure—Cromwell
    spurring his horse away—reinforces his autonomy and the tension between his ambition
    and his need to avoid unnecessary risks. This moment highlights Cromwell’s evolving
    political identity: no longer a subordinate, but a player who dictates the terms
    of engagement.'
