      they will never return to the church’*—positions the Church as a declining force,
      its influence waning in the face of the Reformation. Gregory’s moral challenge,
      however, complicates this narrative by exposing the material benefits of the
      Dissolution, which undermine Cromwell’s ideological framing. The Church’s absence
      in the scene underscores its weakened state, but its symbolic presence looms
      large as the target of Cromwell’s reforms.
