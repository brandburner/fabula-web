  title: Cromwell confronts Wolsey’s ghost
  description: 'In the dead of night, Thomas Cromwell sits alone in his study, tormented
    by Dorothea’s accusation that he betrayed Cardinal Wolsey. The weight of her words
    forces him to question his own judgment and motives—did he prioritize ambition
    over loyalty? He turns to the window where Wolsey once stood, now empty, and calls
    out into the void, seeking absolution or confirmation. The silence that follows
    is deafening, underscoring his isolation and the irreversible consequences of
    his political maneuvering. This moment crystallizes Cromwell’s existential crisis:
    his rise has come at the cost of his moral compass, and Wolsey’s ghost—whether
    real or imagined—offers no redemption, only the hollow echo of his own guilt.
    The scene serves as a turning point, where Cromwell’s self-doubt hardens into
    a grim acceptance of the man he has become.'
