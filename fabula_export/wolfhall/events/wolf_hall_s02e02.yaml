  key_dialogue:
  - 'LADY MARGARET DOUGLAS: "Well, whatever you think, you are wrong! So don’t look
    at me like that! As if I were a harlot. Because I tell you, Thomas Howard and
    I are married! In every way. Married! So you’re too late. It is all done."'
  - 'CROMWELL: "We must ask ourselves, don’t we, Lady Margaret, what marriage is?
    It is not just vows, is it? It’s bed work. If there’d been promises, and witnesses,
    and then bed, you are fast married, your contract is good. You will be called
    Mistress Truth, and you will live with the King''s extreme displeasure. What form
    that will take I can’t tell."'
  - 'LADY MARGARET DOUGLAS: "My uncle will not punish me! He loves me as he loves
    his own daughter."'
  - 'CROMWELL: "As he loves his own daughter..." ((repeats thoughtfully, forcing Margaret
    to confront the implication))'
