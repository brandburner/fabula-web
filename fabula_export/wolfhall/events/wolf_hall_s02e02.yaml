  title: Cromwell frames Norfolk for treason
  description: 'In the King’s Presence Chamber at Hampton Court, Henry VIII erupts
    in fury over Lady Margaret Douglas’s secret marriage to Thomas Howard the Lesser,
    accusing the Howards—particularly Norfolk—of orchestrating a power grab. Cromwell,
    standing beside Rafe, listens as Henry demands a discreet resolution to avoid
    scandalizing Europe. The King orders a treason charge against Howard the Lesser,
    suggesting Norfolk’s involvement as a possible motive. Cromwell, now holding the
    power to destroy Norfolk with a single word, remains silent, demonstrating his
    calculated restraint. The scene underscores Cromwell’s rising influence and the
    precarious balance of loyalty and ambition in Henry’s court, where a single accusation
    can topple even the most powerful nobles. This moment marks a turning point in
    Cromwell’s political maneuvering, as he begins to wield the King’s wrath as a
    weapon while maintaining plausible deniability. The subtext reveals Cromwell’s
    strategic mind: he could destroy Norfolk now but chooses to withhold, likely to
    preserve the King’s trust or to use the threat later for greater leverage. The
    tension between Henry’s volatile rage and Cromwell’s cold precision highlights
    the shifting power dynamics at court, where survival depends on who controls the
    narrative of treason.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 19
  sequence_in_scene: 29
  key_dialogue:
  - 'HENRY: She defies me! Giving herself to the first man who writes her a verse!
    Giving what was mine to give! And Norfolk and these knave Howards! I’ll warrant
    our Tom Truth was not so passionate until my niece stepped closer to the throne!
    This whole business must be kept...'
  - 'HENRY: ((Finally lowering his voice)) This whole business must be kept quiet.
    I want no repeat of what happened to the Queen as was, a royal lady before a public
    court. Europe will be scandalised. Choose some... neater way.'
  - 'HENRY: As for Truth, draw up a charge of treason against him. I want it recorded
    in the indictment that he was inspired by the devil. Unless, of course, it was
    my lord of Norfolk? One of his little schemes?'
