  title: Howard’s Poem Weaponized Against Him
  description: 'In a claustrophobic interrogation cell atop the Bell Tower, Thomas
    Cromwell and Wriothesley systematically dismantle Thomas Howard the Lesser’s aristocratic
    pretense by weaponizing his own incriminating love poem to Lady Margaret Douglas.
    Cromwell, feigning reluctance, reads aloud the verse’s sentimental declarations—‘She
    knoweth my love of long time meant’—before Wriothesley’s blunt accusation (‘Have
    you tupped her?’) exposes the poem’s political stakes. Howard’s evasive denial
    (‘I do not know if I wrote this verse’) only deepens the trap, as Cromwell’s mocking
    recitation of the rhyme’s awkward meter (‘Tom Truth’/‘growth’) underscores the
    Duke’s vulnerability. The interrogation escalates when Wriothesley reveals witnesses
    to Howard’s pledge, forcing Cromwell to pivot from poetic ridicule to a calculated
    dissection of Howard’s motives: his poverty, his ambition, and his treasonous
    fantasy of marrying the King’s niece to claim the throne. The scene’s tension
    peaks when Cromwell—after a feigned moment of empathy—accuses Howard of being
    manipulated into writing the poem, implicating a shadowy third party. The exchange
    reveals Cromwell’s ruthless tactical mind, Wriothesley’s eagerness for brutality,
    and Howard’s desperate attempt to cling to his noble status, all while subtly
    exposing Cromwell’s own moral compromises in the process. The cell’s oppressive
    setting mirrors the political noose tightening around Howard, and by extension,
    the broader court’s fragility under Henry VIII’s paranoia.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 23
  sequence_in_scene: 35
  key_dialogue:
  - |-
    CROMWELL: 'She knoweth my love of long time meant, She knoweth my truth, nothing is hid. She knoweth I love in good intent, As ever man and woman did.'
    CROMWELL: 'Nothing is hid?'
  - 'WRIOTHESLEY: ''The Lady Margaret tells us that there are witnesses to this pledge.'''
  - |-
    CROMWELL: 'You say to yourself, "Here I am. I'm a man of great quality, I... but I'm penniless. No one regards me other than to confuse me with my elder brother. I know what I’ll do—I’ll marry the King’s niece. That’ll pay, because odds-on then I’ll be King of England one day."'
    CROMWELL: 'You see, I wonder who might have put that treacherous rhyme in your head?'
