  title: Wolsey sizes up Cromwell’s origins
  description: 'In a private study at Austin Friars, Cardinal Wolsey—still wielding
    authority despite his political decline—summons Thomas Cromwell for the first
    time, examining him with a mix of curiosity and condescension. Wolsey’s opening
    line, a mocking ''Come out, dog,'' establishes his dominant, almost predatory
    posture, testing Cromwell’s mettle before even acknowledging his name. The Cardinal’s
    focus on Cromwell’s humble background (''Putney. Left when I was a boy. / Blacksmith.'')
    reveals his obsession with social hierarchy, but also hints at a shared outsider
    status that will later bind them. Cromwell’s brief distraction by the tapestry
    of *King Solomon and Queen Sheba*—particularly his fixation on Sheba—subtly foreshadows
    his future role as a strategist navigating power dynamics, while Wolsey’s laughter
    at learning Cromwell’s father was a blacksmith underscores the Cardinal’s own
    insecurity about his own lowborn roots. The exchange is laced with unspoken tension:
    Wolsey’s need to assert control clashes with Cromwell’s quiet confidence, setting
    the stage for their complex mentor-protégé dynamic. This moment is pivotal in
    establishing Cromwell’s rise as a self-made man in a court that values bloodlines
    over merit, while also planting the seeds for Wolsey’s later resentment of Cromwell’s
    unencumbered ambition.'
