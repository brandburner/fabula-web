  title: Cromwell probes Shaftesbury’s Abbess
  description: Thomas Cromwell arrives at Shaftesbury Convent under the pretense of
    a casual visit, leveraging his historical ties to the institution to subtly assert
    influence. The Abbess, recognizing him from a portrait, greets him with veiled
    skepticism, noting the painter’s ‘charity’ in rendering his likeness—a subtle
    jab at Cromwell’s reputation. When Cromwell mentions his intent to see Sister
    Dorothea, the Abbess’s guarded response hints at the convent’s resistance to his
    authority. Meanwhile, Richard Riche’s impatience underscores the tension between
    Cromwell’s calculated patience and the court’s growing impatience with religious
    institutions. The scene establishes Cromwell’s ability to exploit institutional
    familiarity for political gain, foreshadowing his broader campaign to reshape
    England’s religious landscape. The Abbess’s defiance, though subtle, signals the
    coming conflict between the Crown and the Church, with Cromwell positioned as
    the architect of that clash.
