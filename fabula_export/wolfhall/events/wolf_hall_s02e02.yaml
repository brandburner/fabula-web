  key_dialogue:
  - 'GREGORY: It’s a pity that the monasteries should close and the poor get nothing.'
  - 'CROMWELL: Not all. Some of the King''s subjects still believe that Rome will
    rise again. Once these lands are given away to the King and to his gentlemen they
    will never return to the church. Prayers can be rewritten, but not leases. And
    then we''ll have change. Gregory, change. Do you understand? The English will
    discover God in daylight, not hidden in a cloud of incense. They will hear his
    word in their own language, from a minister who faces them, not turning his back
    and muttering in some obscure foreign tongue.'
  - 'CROMWELL: Riche. I want to go to Shaftesbury. The abbey. Arrange a visit.'
