- fabula_uuid: cand_evt_scene_6cbecbc100286a09_01
  global_id: null
  title: Wolsey warns Cromwell of coercion
  description: 'In the quiet of Cromwell’s new study at Austin Friars, Cardinal Wolsey—now
    a spectral figure—delivers a cryptic warning about the court’s shift from persuasion
    to brute coercion. His caution is laced with personal regret and a grim prophecy:
    Cromwell must navigate this treacherous terrain with precision, or risk repeating
    Wolsey’s fate. The moment marks a turning point, where the past’s lessons become
    the future’s burden. Cromwell, seated at his desk, reveals his intention to visit
    Dorothea at Shaftesbury, a move that shocks Wolsey and signals Cromwell’s strategic
    maneuvering to exploit his former master’s vulnerabilities. The exchange underscores
    the fragility of loyalty and the high stakes of courtly betrayal in a post-Wolsey
    power vacuum, foreshadowing Cromwell’s moral compromises and the political dangers
    ahead.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 32
  sequence_in_scene: 51
  key_dialogue:
  - 'WOLSEY: Oh, the age of persuasion has ended, I think. We’ve entered an age of
    coercion.'
  - 'WOLSEY: Be careful, Thomas.'
  - 'CROMWELL: I''m going to Shaftesbury. To see Dorothea.'
