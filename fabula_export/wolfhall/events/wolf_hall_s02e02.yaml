  title: Cromwell’s Moral Collapse and Riche’s Ruthless Pragmatism
  description: 'In the quiet solitude of Shaftesbury Abbey’s cloister, Thomas Cromwell—still
    reeling from Dorothea’s accusation of betraying Wolsey—is found in a rare moment
    of vulnerability, weeping openly. His composure shatters when Christophe and Richard
    Riche arrive, forcing him to confront his guilt. Cromwell’s raw confession reveals
    his deep-seated remorse: he believes he abandoned Wolsey in his final hours, prioritizing
    political survival over loyalty. Riche, ever the pragmatist, dismisses Cromwell’s
    guilt as sentimental weakness, delivering a chilling reminder of their true allegiance:
    *‘The King is our way.’* The exchange underscores the irreconcilable divide between
    Cromwell’s lingering moral conscience and Riche’s ruthless ambition, while the
    tolling Vespers bell serves as a haunting counterpoint to Cromwell’s unraveling.
    This moment marks a turning point in Cromwell’s psychological journey, exposing
    the cost of his political ascent and the fragility of his self-justification.
    The scene also reinforces Riche’s role as the embodiment of the court’s transactional
    morality, a foil to Cromwell’s lingering humanism.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 36
  sequence_in_scene: 60
  key_dialogue:
  - 'CROMWELL: You don’t er... you don’t think I betrayed... betrayed the Cardinal,
    do you, Riche?'
  - 'RICHARD RICHE: It never crossed my mind. You didn’t, did you?'
  - 'CROMWELL: I don’t know. I should have gone up to Yorkshire with him, I think.
    I should have been with him when he died. I shouldn’t have let the King get in
    my way.'
  - 'RICHARD RICHE: My lord, the King is not in our way. He is our way.'
