  - object_uuid: ger_object_640a1ea0aaf1
    description_of_involvement: Wolsey’s private letters to the King of France are
      the linchpin of Dorothea’s accusation against Cromwell. She cites these letters
      as evidence of his betrayal, claiming that Cromwell manipulated them to frame
      Wolsey as a traitor by delivering them to the Duke of Norfolk. The letters,
      written in desperation during Wolsey’s exile in the North, are described as
      begging the King of France to intercede on Wolsey’s behalf. Their existence
      and the manner in which they were used—according to Dorothea—are the crux of
      Cromwell’s guilt. The letters are never physically present in the scene, but
      their mention is enough to shatter Cromwell’s composure, as they represent the
      tangible proof of his betrayal. Their role is purely narrative, serving as the
      catalyst for the confrontation and the exposure of Cromwell’s moral fracture.
    status_before_event: Private and confidential, written by Wolsey in a moment of
      desperation. Their contents are known only to a few, including Cromwell, who
      allegedly used them to undermine Wolsey’s position.
