  title: Wolsey’s Omen and Cromwell’s Failed Plea
  description: In Wolsey’s dimly lit bedroom at Esher Palace, Cromwell discovers a
    litter of kittens in an open chest, one of which is black—a detail Wolsey seizes
    upon as a dire omen for his impending journey to York. The Cardinal’s fatalistic
    resignation is palpable as he compares his own downfall to Catherine of Aragon’s,
    revealing his lingering, self-destructive devotion to Henry despite the King’s
    calculated humiliation. Cromwell, torn between loyalty and self-preservation,
    pleads with Wolsey to resist the King’s demands, but Wolsey dismisses the idea
    with weary cynicism, exposing the court’s ruthless machinations and the fragility
    of power. The exchange underscores Cromwell’s moral conflict—his growing awareness
    of Henry’s cruelty and his own complicity in the system that will eventually consume
    Wolsey. The black kitten becomes a symbol of the inescapable doom hanging over
    Wolsey, while Cromwell’s plea, though sincere, is met with resignation, foreshadowing
    his own future compromises as he navigates the treacherous politics of Henry’s
    court.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 3
  sequence_in_scene: 3
  key_dialogue:
  - 'CARDINAL WOLSEY: A cat has had her litter here in my rooms. Look at it. Black
    as the devil. Born right here, under my very bed. How’s that for a bad omen before
    a journey?'
  - 'CROMWELL: Then you shouldn’t leave?'
  - 'CARDINAL WOLSEY: Marry, Thomas. The King wants me gone. He wants to humiliate
    me. He thinks it sends a sharp message to the pope. I feel like Catherine. Cast
    off. But still I love him.'
