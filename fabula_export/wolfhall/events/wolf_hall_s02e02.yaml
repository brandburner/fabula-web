  scene_sequence: 35
  sequence_in_scene: 59
  key_dialogue:
  - 'DOROTHEA: It was he who brought you to the King''s notice, wasn’t it? With the
    result that we see.'
  - 'DOROTHEA: My father understood everything. He understood you betrayed him. When
    my father was in exile, and forced to go north, he wrote certain letters, out
    of his desperation to have the King''s favour again, letters begging the King
    of France to intercede for him. You saw to it that those letters reached the Duke
    of Norfolk. You put upon them an evil construction, which they should never have
    borne. And Norfolk put them into the hand of the King, and so the damage was done.'
  - 'CROMWELL: You are much mistaken. [...] Who told you this? How long have you believed
    it? [...] You hear too much, and you listen to the wrong people!'
  - 'DOROTHEA: I have always believed it. And always shall, whatever denial you make.
    [...] I have been told, by those I trust, there is no faith or truth in Cromwell.'
  - 'CROMWELL: When those you trust abandon you, Dorothea, come to me. I loved your
    father next to God. I will never refuse you.'
