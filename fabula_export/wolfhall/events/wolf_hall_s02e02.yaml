    description_of_involvement: The tapestry that once covered the blank wall in the
      Great Hall has been removed, symbolizing Cromwell’s intent to replace it with
      portraits of past English kings. This act is both practical—aesthetic and symbolic—a
      declaration of Cromwell’s vision for his legacy and his alignment with the monarchy’s
      historical narrative. The blank wall serves as a visual metaphor for the political
      vacuum Cromwell seeks to fill, emphasizing his ambition to shape the future
      while honoring the past. The removal of the tapestry also creates a sense of
      anticipation, as the space awaits the installation of the portraits, mirroring
      Cromwell’s own rise and the potential for his downfall if his political maneuvers
      fail.
    status_before_event: Hanging on the wall, covering the space where the portraits
      of past kings are intended to be displayed.
    status_after_event: Removed and set aside, leaving the wall blank and ready for
      the installation of the portraits.
