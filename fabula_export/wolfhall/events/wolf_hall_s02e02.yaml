acts:
- fabula_uuid: act_540498a5435493b1
  number: 1
  summary: The episode opens seven years in the past, establishing Thomas Cromwell's
    humble origins and his entry into Cardinal Wolsey's service. Wolsey, facing King
    Henry VIII's disfavor, recognizes Cromwell's sharp intellect and loyalty. Cromwell
    witnesses Wolsey's decline and death, receiving a poignant silver box containing
    a ring as a final gift, symbolizing his inheritance of Wolsey's legacy and burden.
    Following Wolsey's demise, Cromwell pledges his allegiance to King Henry, transitioning
    from the Cardinal's man to the King's trusted counselor. Seven years later, Cromwell,
    now a powerful lord, observes the King at a masquerade. Henry, disguised, expresses
    dissatisfaction with his daughter Mary and tasks Cromwell with arranging marriages
    for her and his niece, Lady Margaret Douglas, who is now close to the throne.
    Wriothesley, a keen observer, immediately senses something amiss with Lady Margaret.
    Cromwell, while commissioning portraits of past English kings for his home, also
    contemplates a suitable ring for Lady Mary, one engraved with proverbs of obedience.
    The inciting incident occurs when Wriothesley, through diligent inquiry, uncovers
    Lady Margaret's secret marriage to Thomas Howard the Lesser, Norfolk's half-brother.
    This revelation thrusts Cromwell into a complex political entanglement, forcing
    him to navigate the King's expectations, court rivalries, and the potential scandal
    of a royal marriage contracted without permission. The act concludes with Cromwell
    realizing the gravity of the situation, his initial amusement turning to horror
    as he comprehends the true extent of the deception and its implications for the
    court.
