  global_id: null
  title: Jane tests Cromwell’s court loyalty
  description: 'In the Queen’s privy chamber, Jane Seymour and her ladies engage in
    seemingly innocuous domestic sewing while Cromwell and Wriothesley arrive on official
    business. Jane subtly probes Cromwell’s allegiance to the King, testing whether
    his rise has made him blind to the shifting tides of power—or whether he remains
    a calculating survivor. She deflects responsibility for unpleasant tasks (like
    interrogating Lady Margaret Douglas’s former ladies-in-waiting) onto Cromwell,
    framing him as the King’s ruthless enforcer while positioning herself as a passive,
    untouchable figure. The exchange reveals Jane’s political acumen, her awareness
    of Cromwell’s precarious position, and foreshadows their future entanglement in
    Henry’s volatile court. Cromwell, ever the master of evasion, navigates the conversation
    with careful diplomacy, but the tension underscores the court’s treacherous dynamics:
    loyalty is a currency, and even the most powerful can become expendable.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 20
  sequence_in_scene: 30
  key_dialogue:
  - 'JANE: You remember Master Secretary, sister. Although he is now Lord Privy Seal.'
  - 'BESS OUGHTRED: Instead?'
  - 'CROMWELL: As well, my lady.'
  - 'JANE: It is he who does everything in England. I never understood that until
    one of the ambassadors explained it to me. He says the King will flog him on to
    work until one day his legs go from under him, and he rolls in a ditch and dies.'
  - 'CROMWELL: Well, until that happy day, Majesty, I have a request for you, which
    perhaps you will not like. I must invite ladies who served the late Queen back
    to the court. I have questions concerning the alleged marriage of Lady Margaret
    Douglas.'
  - 'BESS OUGHTRED: Jane, you don''t want Lady Rochford near you, surely? She''s a
    traitor''s wife, and she joined with the Boleyns in mocking you. I wonder the
    King would ask such a thing of you.'
  - 'JANE: Well, he doesn’t. The King never does an unpleasant thing. Lord Cromwell
    does it for him.'
