  title: Margaret reveals forbidden marriage to Cromwell
  description: 'In Cromwell’s study at Austin Friars, Lady Margaret Douglas—Henry
    VIII’s rebellious niece—is confronted about her secret relationship with Thomas
    Howard. Under pressure, she defiantly admits to a clandestine marriage, undermining
    Cromwell’s leverage over her family’s influence. Mary Fitzroy, her friend and
    Norfolk’s daughter, initially tries to shield her but ultimately fails to prevent
    Margaret’s reckless confession. Cromwell, ever the strategist, probes the legal
    validity of the union, exposing its fragility (lack of witnesses, no consummation)
    while subtly reminding Margaret of Henry’s volatile treatment of his own daughter,
    Lady Mary. The revelation forces Cromwell to reassess his political maneuvering,
    as Margaret’s defiance threatens to escalate into a full-blown court scandal.
    The scene hinges on Margaret’s emotional outburst—her refusal to back down despite
    Fitzroy’s warnings—and Cromwell’s calculated dissection of her claims, revealing
    his mastery of psychological pressure and legal loopholes. The tension peaks when
    Margaret collapses, realizing the gravity of her situation, while Cromwell’s quiet
    repetition of her own words about Henry’s love for his daughter underscores the
    King’s potential wrath. This confrontation marks a turning point: Margaret’s secret
    is exposed, Cromwell’s control over the court’s alliances is tested, and the stage
    is set for Henry’s explosive reaction.'
