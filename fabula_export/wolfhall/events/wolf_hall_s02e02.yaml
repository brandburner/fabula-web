  title: More and Cromwell swear oaths of loyalty
  description: 'In the King’s Privy Council Chambers, Thomas More recites the formal
    oath of allegiance to Henry VIII with measured solemnity, his words carrying the
    weight of a man bound by principle. His delivery is deliberate, each phrase underscoring
    his unwavering commitment to the crown—yet also hinting at the moral calculus
    he must perform to reconcile loyalty with conscience. Moments later, Thomas Cromwell
    echoes the same oath, but his repetition is laced with subtext: his tone is smoother,
    his cadence more practiced, betraying a man for whom loyalty is a tool rather
    than a creed. The contrast between More’s gravitas and Cromwell’s calculated precision
    crystallizes their ideological divide—More’s integrity rooted in moral absolutes,
    Cromwell’s pragmatism shaped by survival. The scene serves as a microcosm of their
    future conflict: More’s refusal to compromise will eventually clash with Cromwell’s
    willingness to bend the law to serve the King’s will, foreshadowing the political
    and personal stakes that will define their relationship. The oath itself becomes
    a symbolic battleground, where words meant to unify instead reveal the fractures
    beneath the court’s facade of unity.'
