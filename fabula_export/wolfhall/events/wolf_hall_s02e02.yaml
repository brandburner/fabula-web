  title: Henry tests Cromwell’s loyalty and ruthlessness
  description: "\n  Disguised as a Turk, Henry VIII deliberately provokes Cromwell\
    \ by dismissing Queen Jane’s intelligence, gauging his reaction to assess both\
    \ his discretion and his willingness to align with the King’s disdain for his\
    \ own wife. Cromwell responds with calculated deference, deflecting criticism\
    \ while subtly reinforcing Henry’s authority. The King then shifts focus to Lady\
    \ Margaret Douglas’s secret marriage, probing Cromwell’s political instincts—whether\
    \ he will act decisively against a noble threat to the throne. Cromwell’s measured\
    \ response (suggesting God might ‘wink’ at youthful love) reveals his strategic\
    \ mind, but Henry’s abrupt pivot to ordering the assassination of Cardinal Pole\
    \ exposes the brutal cost of his favor. The scene culminates in Henry seizing\
    \ Cromwell’s gift for Lady Mary—a ring symbolizing obedience—both as a test of\
    \ Cromwell’s loyalty and a reminder of the King’s absolute control over his subjects’\
    \ lives and possessions. The exchange underscores Cromwell’s precarious position:\
    \ he must balance moral compromise with political survival, all while Henry’s\
