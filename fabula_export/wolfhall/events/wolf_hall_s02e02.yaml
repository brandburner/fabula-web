  scene_sequence: 18
  sequence_in_scene: 27
  key_dialogue:
  - |-
    WRIOTHESLEY: Well, I certainly wouldn’t like to be in Norfolk’s shoes.
    CROMWELL: No.
  - |-
    WRIOTHESLEY: You could easily pull him down now, if you wanted to.
    CROMWELL: Those are not my methods, ‘Call-Me.
  - |-
    WRIOTHESLEY: Sir? Norfolk will never be your ally. Work his discredit now with the King, my lord. Destroy him. The chance, it may not come again.
    CROMWELL: And I’d beware of putting the King in the killing vein, if I were you.
