  title: Cromwell’s private reckoning at the window
  description: 'In the cramped, chaotic attic of the Court of Augmentations, Cromwell
    dismisses Richard Riche’s bureaucratic complaints about the dissolution process
    with characteristic bluntness, reinforcing his single-minded focus on Henry’s
    agenda. As Riche departs with his papers, Cromwell lingers at a grimy window,
    staring at the London skyline while absently picking up a crucifix—a relic of
    his Catholic past. The object triggers a flashback to Mary’s quiet confession
    about her longing for a child, a desire that mirrors Cromwell’s own unspoken yearning
    for legitimacy and stability. The crucifix becomes a silent witness to his internal
    conflict: the pragmatic ruthlessness required to survive the court versus the
    lingering weight of his conscience and the moral compromises he’s making. The
    moment underscores the fragility of his position—his rise depends on Henry’s favor,
    yet his past (symbolized by the crucifix) and his personal desires (echoed in
    Mary’s words) threaten to unravel him. The scene foreshadows the cost of his ambition,
    as his private turmoil contrasts with the public facade of control he must maintain.'
