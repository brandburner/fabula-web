  scene_sequence: 35
  sequence_in_scene: 57
  key_dialogue:
  - 'CROMWELL: I will marry you, mistress, if you’ll have me. I am... er... I’m not
    sure know this, but I am a long time a widow. I lack graces of person, but I am
    rich and likely to grow richer. I have good houses. You would find me generous...'
  - 'DOROTHEA: It was he who brought you to the King''s notice, wasn’t it? With the
    result that we see.'
  - 'DOROTHEA: My father understood everything. He understood you betrayed him. When
    my father was in exile, and forced to go north, he wrote certain letters, out
    of his desperation to have the King''s favour again, letters begging the King
    of France to intercede for him. You saw to it that those letters reached the Duke
    of Norfolk. You put upon them an evil construction, which they should never have
    borne.'
  - 'CROMWELL: You are much mistaken.'
  - 'DOROTHEA: You had your men in my father’s household in the north, do you deny
    it?'
  - 'DOROTHEA: I have been told, by those I trust, there is no faith or truth in Cromwell.'
