  title: Jane probes Cromwell’s loyalty through Anne’s shadow
  description: In the Queen’s privy chamber at Hampton Court, Jane Seymour—ostensibly
    reminiscing about shared courtly rituals—uses Anne Boleyn’s Book of Hours as a
    loaded prop to subtly interrogate Cromwell’s past ties to the fallen queen. She
    begins with playful nostalgia about his past gifts of cakes, then pivots to Anne’s
    discarded book, revealing Henry’s inscription beneath a gruesome *Man of Sorrows*
    illumination. Jane’s recitation of Anne’s annotated reply—‘By daily proof you
    shall me find/To be to you both loving and kind’—hints at Anne’s failed fertility
    and Henry’s lingering obsession, while also testing Cromwell’s reaction to the
    specter of his former patron. The exchange shifts abruptly to Jane’s awkward,
    veiled questions about marital pleasure and conception, which Cromwell deflects
    with calculated ambiguity, redirecting her to her family and reinforcing his own
    unassailable position. The scene underscores Jane’s fragile authority, her dependence
    on Cromwell’s guidance, and his mastery of courtly evasion—all while the lingering
    specter of Anne Boleyn’s influence looms over the court’s power dynamics. Cromwell’s
    laughter at Jane’s crude marital anecdotes masks his discomfort, and his final
    deflection about Henry’s Turkish costume signals his awareness of the King’s volatile
    discontent. The dialogue’s subtext reveals Jane’s anxiety about her own fertility
    and Henry’s dissatisfaction, while Cromwell’s evasiveness underscores his political
    survival instincts and the court’s treacherous undercurrents.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 28
  sequence_in_scene: 44
  key_dialogue:
  - 'JANE: Empty handed? I remember when you used to bring us ladies cakes. But that
    was before you were so busy.'
  - 'CROMWELL: It was you I brought them for.'
  - 'JANE: And when the Queen was displeased with you, she threw them on the floor.
    This was hers. Anne Boleyn’s. She and the King passed it between them. He’s written
    an inscription. Under the Man of Sorrows.'
  - 'JANE: It’s in French, I can’t read it.'
  - 'CROMWELL: It says ‘I am yours. Forever.’'
  - 'JANE: Look at the Annunciation earlier. There’s a reply. By daily proof you shall
    me find/To be to you both loving and kind. Do you think she was kind to him?'
  - 'CROMWELL: Not often.'
  - 'JANE: She had hope of a son in those days. She thought she could bear a son.'
  - 'JANE: My ladies say that if a wife does not take pleasure in the act, she will
    not get a child. Is that true?'
  - 'CROMWELL: Perhaps you should consult with your lady mother, your grace? Or one
    of the dames here at court might advise you?'
  - 'JANE: They have forgotten. They are old.'
  - 'JANE: My lady sister, then? She has two fine infants. Bess put heart into me.
    She said... Say an Ave, Jane, and the King will soon spend. She says she did not
    take pleasure in her own marriage bed. With her late husband, it was like a military
    manoeuvre. Brisk.'
  - 'CROMWELL: He did not beat the drum, I hope?'
  - 'JANE: No, no. But she always knew when he was on his way.'
  - 'JANE: The infants come when they will, she says, pleasure or not. Perhaps I should
    not have asked you. If you are going to the King now, you will see that he is
    wearing his Turkish costume again. He does not feel he wore it enough at the festivities.
    My father said that Turkish princes can have a dozen wives. If the King had been
    of their sect, he could have been married to the late Queen, God rest her, and
    to Katherine, God rest her, and at the same time to me, if he wished. Or for that
    matter, he could have been married to Mary Boleyn and Mary Shelton, and had all
    the sons he wished. If he''d been of their sect.'
  - 'CROMWELL: I do not think the King will turn Turk.'
