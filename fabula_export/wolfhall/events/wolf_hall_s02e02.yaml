- fabula_uuid: act_c6de0789fcb90840
  number: 2
  summary: 'Act Two plunges Cromwell into the immediate fallout of Lady Margaret''s
    secret marriage. He confronts Lady Margaret, who defiantly confesses her union
    with Thomas Howard. Cromwell, demonstrating his strategic acumen, attempts to
    mitigate the damage by questioning the validity of the pledge and seeking to discredit
    the witnesses, highlighting the precarious nature of unchaste contracts. He then
    embarks on a series of delicate political maneuvers, first by approaching Lady
    Rochford and Queen Jane for information, subtly navigating Jane''s passive-aggressive
    nature and her veiled criticisms of his methods. The King, enraged by his niece''s
    defiance, orders Cromwell to handle the situation discreetly but demands charges
    of treason against Howard, hinting at deeper political machinations involving
    Norfolk. Cromwell visits Thomas Howard in the Tower, employing psychological tactics
    to extract information and expose the underlying ambition driving the illicit
    marriage. Concurrently, Cromwell visits Lady Mary, offering her a ring engraved
    with proverbs of obedience, a gesture of support that King Henry later appropriates,
    underscoring his absolute control and the symbolic power dynamics at play. The
    narrative then shifts to the Court of Augmentations, where Cromwell, alongside
    his son Gregory and Richard Riche, oversees the dissolution of the monasteries.
    Gregory expresses moral qualms about the poor receiving nothing, prompting Cromwell
    to articulate his vision for the reforms: a means to secure England''s break from
    Rome and foster a more accessible, English-speaking faith. This ideological defense
    serves as a midpoint, clarifying Cromwell''s core motivations. However, the rising
    action intensifies with the emergence of a dangerous rumor: the King intends to
    marry Lady Mary to Cromwell. This personal threat, confirmed by Chapuys, directly
    implicates Cromwell in a potentially treasonous aspiration, transforming him from
    problem-solver to potential target. The act culminates with Wolsey''s ghost appearing
    to Cromwell, offering a cryptic warning of caution, signaling the perilous path
    ahead and the weight of his past.'
