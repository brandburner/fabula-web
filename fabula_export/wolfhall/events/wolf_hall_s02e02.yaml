  title: Wriothesley’s abrupt exit exposes court tensions
  description: In the Long Gallery at Hampton Court, Henry VIII casually orders Cromwell
    to arrange marriages for his daughter Mary and niece Margaret Douglas, signaling
    their political value. As Henry departs to rejoin the masquerade, Wriothesley—fixated
    on Lady Margaret—suddenly announces his departure for Whitehall, his distracted
    behavior hinting at a discovery. Fitzwilliam challenges Cromwell’s trust in Wriothesley,
    echoing Wolsey’s earlier skepticism, while Cromwell deflects with a calculated
    remark about second chances. The moment escalates when Cromwell subtly adjusts
    Fitzwilliam’s chain of office, a power play that reasserts his dominance over
    the court’s shifting alliances. The scene underscores Cromwell’s strategic control,
    Wriothesley’s instability, and the fragility of rival positions in Henry’s volatile
    court.
