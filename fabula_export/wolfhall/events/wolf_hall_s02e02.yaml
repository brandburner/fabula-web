  title: Cromwell’s Ideological Justification Collapses
  description: In a rare moment of vulnerability, Cromwell attempts to justify the
    Dissolution of the Monasteries to his son Gregory, revealing a mix of pragmatic
    ambition and ideological conviction. Gregory’s moral challenge—‘So it all goes
    to Henry’—exposes the hypocrisy beneath Cromwell’s rhetoric, forcing him to articulate
    his vision of a reformed England where God is accessible in daylight, not hidden
    in incense. The exchange unsettles Cromwell, who abruptly pivots to an impulsive
    decision to visit Shaftesbury Abbey, a move that disrupts his usual political
    pragmatism. Riche’s reaction—‘My God. The revenue we could collect from them’—underscores
    the disruption, hinting at Cromwell’s uncharacteristic emotional fracture. The
    scene marks a turning point where Cromwell’s ideological resolve is exposed as
    fragile, setting up his later confrontation with Dorothea and the unraveling of
    his self-justifications.
