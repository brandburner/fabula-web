  global_id: null
  title: Henry orders Cromwell to bury Margaret Pole scandal
  description: 'In the King’s Presence Chamber at Hampton Court, Henry VIII erupts
    in fury over Lady Margaret Pole’s secret marriage to Thomas Howard the Lesser,
    accusing her of defiance and Norfolk of political scheming. The scandal risks
    international embarrassment, so Henry demands a discreet resolution—no public
    trial like Anne Boleyn’s. Cromwell, standing beside Rafe, proposes a formal parliamentary
    process through Richard Riche to investigate the noblewomen involved, ensuring
    the matter is handled quietly. Henry then orders Cromwell to draft a treason charge
    against Howard, framing the marriage as a devil-inspired plot to elevate Norfolk’s
    family closer to the throne. The moment tests Cromwell’s loyalty: he holds the
    power to destroy Norfolk with a single accusation, but remains silent, demonstrating
    his strategic restraint. The exchange underscores Henry’s paranoia, Cromwell’s
    rising influence, and the court’s ruthless political calculus—where personal loyalty
    is secondary to the Crown’s control over succession and scandal.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 19
  sequence_in_scene: 28
  key_dialogue:
  - 'HENRY: She defies me! Giving herself to the first man who writes her a verse!
    Giving what was mine to give! And Norfolk and these knave Howards! I’ll warrant
    our Tom Truth was not so passionate until my niece stepped closer to the throne!
    This whole business must be kept...'
  - 'HENRY: ((Finally lowering his voice)) This whole business must be kept quiet.
    I want no repeat of what happened to the Queen as was, a royal lady before a public
    court. Europe will be scandalised. Choose some... neater way.'
  - 'HENRY: As for Truth, draw up a charge of treason against him. I want it recorded
    in the indictment that he was inspired by the devil. Unless, of course, it was
    my lord of Norfolk? One of his little schemes?'
