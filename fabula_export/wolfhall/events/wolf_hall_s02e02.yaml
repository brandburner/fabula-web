  title: Cromwell justifies his silence to Cavendish
  description: In a private, tense exchange at Leicester Abbey, Thomas Cromwell defends
    his decision to remain at court rather than visit the disgraced Cardinal Wolsey.
    Cavendish, Wolsey’s loyal attendant, urges Cromwell to speak directly to the Cardinal
    to dispel rumors of betrayal, but Cromwell insists his presence in Henry’s inner
    circle is the only way to secure Wolsey’s eventual recall. The dialogue reveals
    Cromwell’s calculated pragmatism—he acknowledges the court’s suspicions but frames
    his silence as strategic loyalty, exposing the moral cost of his rise. The scene
    underscores the fracture between personal devotion and political survival, with
    Cavendish’s plea for honesty serving as a foil to Cromwell’s cold maneuvering.
    The exchange foreshadows Cromwell’s future betrayals and the irreversible distance
    between him and his former master’s legacy.
