  title: Abbess challenges Cromwell’s hidden motives
  description: 'In the sunlit cloisters of Shaftesbury Abbey, Cromwell follows the
    Abbess as she questions his presence, revealing her awareness of his true agenda.
    When she directly names Wolsey’s daughter as the reason for his visit, the Abbess’s
    defiance forces Cromwell into a moment of exposure—his political maneuvering is
    laid bare, and his personal vendetta against Wolsey’s legacy becomes undeniable.
    The confrontation marks a turning point: Cromwell’s strategic control over the
    abbey’s dissolution is now intertwined with his unresolved guilt over betraying
    his former mentor, raising the stakes for both his ambition and his moral reckoning.
    The Abbess’s refusal to surrender the house underscores the tension between faith
    and state authority, while her blunt accusation about Dorothea forces Cromwell
    to confront the personal cost of his rise to power. The scene shifts from political
    posturing to a raw confrontation, where Cromwell’s calculated moves are met with
    unyielding resistance, setting up his inevitable encounter with Dorothea and the
    emotional reckoning that awaits him.'
