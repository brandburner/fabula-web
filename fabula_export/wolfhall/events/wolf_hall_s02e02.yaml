  title: Cromwell dismantles Margaret’s marriage claim
  description: 'In Cromwell’s study, Lady Margaret Douglas defiantly declares her
    secret marriage to Thomas Howard, only for Cromwell to methodically dismantle
    its legitimacy through legalistic questioning. He dismisses her emotional pleas
    as naive, framing her union as a trivial "conversation" rather than a binding
    contract—undermining her credibility while exposing the fragility of her alliance
    with Mary Fitzroy, who reluctantly urges compliance. The scene reveals Cromwell’s
    mastery of bureaucratic manipulation, where truth is malleable and power dictates
    narrative. Margaret’s collapse—realizing her defiance mirrors Lady Mary’s peril—marks
    a turning point: her resistance is not just personal but politically reckless.
    Cromwell’s calculated indifference (e.g., ‘Not yet, but I’m sure it will be’)
    foreshadows the King’s wrath, while Fitzroy’s betrayal underscores the court’s
    ruthless survivalism. The exchange crystallizes the cost of defiance in a system
    where loyalty is transactional and love is a liability.'
