  global_id: null
  title: Howard’s defiance and Cromwell’s calculated threat
  description: 'In the Bell Tower’s interrogation cell, Thomas Cromwell and Wriothesley
    corner Thomas Howard the Lesser (Norfolk’s half-brother) over his secret marriage
    to Lady Margaret Douglas. Cromwell begins by mocking Howard’s love poetry, exposing
    its clumsy rhymes and desperate longing, while Wriothesley abruptly shifts the
    tone by revealing witnesses to Howard’s pledge. Howard, emboldened by his aristocratic
    privilege, challenges Cromwell’s authority, declaring the King would never allow
    a commoner to mistreat a gentleman. Wriothesley counters with a chilling reminder
    of Cromwell’s violent reputation—‘He once broke a man’s jaw with a single blow’—forcing
    Cromwell to confront his own feared capacity for brutality. The exchange reveals
    the precarious balance of power in Henry’s court: Howard’s defiance is undercut
    by Wriothesley’s threat, while Cromwell’s response exposes his strategic mind
    and the unspoken violence that sustains his rise. The scene underscores the fragility
    of status and the ruthless calculations required to navigate the court’s treacherous
    hierarchies.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 23
  sequence_in_scene: 37
  key_dialogue:
  - 'THOMAS HOWARD THE LESSER: I know what you do, Cromwell. But the King will not
    permit you to ill-use a gentleman.'
  - 'WRIOTHESLEY: I would not try Lord Cromwell’s patience. He once broke a man’s
    jaw with a single blow.'
  - 'CROMWELL: Believe me, my lord, we understand your situation. You are of a great
    family. A great family but you younger Howards are kept poor. Being of exalted
    blood you cannot soil your hands with any occupation.'
