  key_dialogue: &id005
  - |-
    WRIOTHESLEY: Sir, I have made pressing inquiries among the Lady Margaret’s folk.
    CROMWELL: Why?
    WRIOTHESLEY: Why? Well, I have been sure this long while that there is something amiss with her. Her furtive manner as if she’s afraid some mischief might be found out. And also I’ve noticed in your company that she seems to...
    CROMWELL: (Over, amused) You thought the ladies were passing secret signs to each other?
    WRIOTHESLEY: Yes, you laughed at me.
    CROMWELL: I did. What have you found out?
    CROMWELL: (Joking) Tell me it’s some secret love. Who is it?
  - 'WRIOTHESLEY: Norfolk’s half-brother. Thomas Howard the Lesser. I’m told he fancies
    himself a poet. Your man, Tom Truth.'
  - |-
    CROMWELL: Something Lady Shelton said to me at Hunsdon about Norfolk needing to find a new way to the throne.
    CROMWELL: How could she have contrived to be alone with him? They must have had some help.
    WRIOTHESLEY: Oh, yes, I’ll leave the women to you, sir.
    CROMWELL: We’ll talk to Lady Margaret first.
