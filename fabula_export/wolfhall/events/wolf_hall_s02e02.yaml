  title: Cromwell announces visit to Dorothea
  description: In the quiet of his new study at Austin Friars, Cromwell reveals to
    the spectral Wolsey his intention to visit Dorothea—a decision that carries heavy
    subtext. Wolsey, ever the cautionary figure, warns Cromwell that the court has
    shifted from persuasion to coercion, a transition that mirrors Cromwell’s own
    moral compromises. Cromwell’s announcement is framed as a calculated move, one
    that exploits his past ties to Wolsey’s illegitimate daughter while signaling
    his willingness to weaponize personal connections for political leverage. The
    moment underscores Cromwell’s ruthless pragmatism, as he navigates the treacherous
    terrain between loyalty to his former master and the ruthless ambition required
    to survive Henry’s court. Wolsey’s reaction—puzzled and wary—hints at the emotional
    and moral cost of Cromwell’s actions, foreshadowing the confrontation with Dorothea
    that will force him to confront his own betrayals.
