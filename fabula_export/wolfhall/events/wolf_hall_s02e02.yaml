  title: Cromwell identifies Wolsey’s fatal error
  description: 'In a private moment at Leicester Abbey, Cromwell and Cavendish observe
    Cardinal Wolsey’s unchecked arrogance as he paces the courtyard, his language
    shifting from collaborative (''We will do such-and-such'') to autocratic (''This
    is what I will do''). Cromwell interrupts Cavendish’s observation with a sharp
    correction: Wolsey’s true mistake was not his growing tyranny but his open antagonism
    toward Anne Boleyn—a strategic blunder that Cromwell recognizes as the catalyst
    for the Cardinal’s downfall. The exchange underscores Cromwell’s political acumen,
    revealing his ability to read power dynamics with precision while foreshadowing
    his own calculated rise in the court’s shifting loyalties. Wolsey’s self-destruction
    is framed as inevitable, but Cromwell’s intervention here marks the moment he
    begins to distance himself from his mentor’s fate, positioning himself as the
    more astute player in Henry’s court.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 5
  sequence_in_scene: 5
  key_dialogue: &id001
  - 'CAVENDISH: See, I remember when he used to say, ''The King will do such-and-such.''
    And then it was, ''We will do such and such.'' Now it''s, ''This is what I will
    do.'''
  - 'CROMWELL: No. No. The mistake was making an enemy of Anne Boleyn.'
