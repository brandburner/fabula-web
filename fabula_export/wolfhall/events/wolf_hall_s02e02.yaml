  title: Dorothea Accuses Cromwell of Betrayal
  description: In the sacred quiet of Shaftesbury Abbey’s quire, Thomas Cromwell attempts
    to secure Dorothea’s loyalty—Wolsey’s illegitimate daughter—by offering her gifts,
    financial security, and even marriage. His proposal, stumbling and awkward, reveals
    his desperation to bind her to him, both for her father’s sake and to neutralize
    any lingering threat she might pose. Dorothea, however, rejects his overtures
    with icy precision, accusing him of orchestrating Wolsey’s downfall by manipulating
    letters to Norfolk. Her refusal to accept his denials—dismissing his pleas as
    hollow—exposes a fracture in their alliance and forces Cromwell to confront the
    moral cost of his political maneuvering. The confrontation leaves him wounded,
    his self-image shaken, and his loyalty to Wolsey’s memory called into question.
    The scene underscores the irreparable damage done by Cromwell’s rise, as even
    those closest to him now question his integrity and motives. Dorothea’s unshakable
    distrust becomes a mirror, reflecting the rot at the heart of Cromwell’s ambition.
