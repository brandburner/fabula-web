- fabula_uuid: cand_evt_scene_475c191dbd796f56_01
  global_id: null
  title: Mary’s Despair Exposes Cromwell’s Hidden Compassion
  description: Thomas Cromwell visits Mary Boleyn at Hunsdon Gatehouse, where she
    is confined in a state of enforced isolation. Their exchange begins with Mary’s
    sharp frustration over her continued imprisonment, despite her compliance with
    Cromwell’s earlier demands. She probes Cromwell about her delayed return to court,
    her voice laced with bitterness, and reveals her awareness of the King’s conditional
    promises. When Cromwell asks if she wishes to marry, Mary’s response—*‘It is not’*—exposes
    her resignation to a life dictated by others. The moment shifts when she confesses
    her longing for a child, her vulnerability stripping away her usual courtly poise.
    Cromwell, caught off guard, experiences an unexpected surge of empathy for her
    plight—one that mirrors his own struggles with power and personal sacrifice. The
    scene ends with Cromwell lingering outside, visibly affected, marking the first
    crack in his political detachment and foreshadowing his eventual moral reckoning.
