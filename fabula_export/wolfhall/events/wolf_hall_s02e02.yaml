  title: Cromwell warns Rochford of court peril
  description: 'In a tense confrontation at Austin Friars, Thomas Cromwell interrogates
    Lady Rochford about her sister Margaret’s precarious position, but she deflects
    blame onto the King’s instability and Cromwell’s own influence. Rochford’s venomous
    remarks—comparing Queen Jane to a mastiff pup and Anne Boleyn’s fiery passion—reveal
    her bitterness and the court’s moral decay. Cromwell, frustrated, delivers a veiled
    threat: adapt to Anne Boleyn’s rise or risk ruin. The exchange exposes the brutal
    calculus of court survival, where loyalty is transactional and even the most powerful
    women are disposable. Cromwell’s warning underscores his ruthless pragmatism,
    while Rochford’s defiance hints at her potential as a future liability. The scene
    serves as a microcosm of the court’s shifting alliances and the personal cost
    of political maneuvering.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 21
  sequence_in_scene: 32
  key_dialogue:
  - 'CROMWELL: The King wants to know about Lady Margaret.'
  - 'LADY ROCHFORD: No, he doesn’t. Why would he want to know his niece is ruined?
    One must pity him. His friends cuckolding him, his daughter defying him, his niece
    contracting herself in marriage without his permission. And you, using him so
    roughly.'
  - 'CROMWELL: How, roughly? I gave the King what he asked for.'
  - 'LADY ROCHFORD: Yes. I wonder if he will ever forgive you for it.'
  - 'CROMWELL: I urge you Lady Rochford to forget all this. Be jocund and pleasant,
    adapt yourself to the new Queen, or you will be sent away again.'
  - 'LADY ROCHFORD: I suppose he can do the deed with pasty Jane, can he? I don''t
    envy her these nights. Anne said it was like being slobbered over by a mastiff
    pup.'
