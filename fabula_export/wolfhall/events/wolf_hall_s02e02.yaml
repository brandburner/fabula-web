  title: Cromwell confronts Chapuys over marriage rumors
  description: 'In Chapuys’ garden, Cromwell storms in to confront the imperial ambassador
    about a politically explosive rumor—that Henry VIII intends to marry him to Princess
    Mary. Chapuys feigns innocence but confirms the rumor’s plausibility, forcing
    Cromwell to invoke their shared history of protecting Mary from the king’s wrath.
    The exchange escalates into a veiled threat, exposing the fragility of their alliance
    and the high stakes of courtly betrayal in a post-Wolsey power vacuum. Cromwell’s
    anger reveals his vulnerability: the rumor isn’t just absurd, it’s a death sentence.
    Chapuys’ casual confirmation—couched in diplomatic ambiguity—underscores how easily
    Cromwell’s rise could be undone by courtly intrigue. The scene functions as a
    turning point, where Cromwell’s political maneuvering is tested by external forces
    (Chapuys’ network) and internal contradictions (his own complicity in the court’s
    machinations). The tension hinges on unspoken questions: *Who spread the rumor?*
    *Is this a test of loyalty?* *How far will Cromwell go to protect himself?*'
