  title: Wolsey awaits Cromwell’s arrival
  description: 'In the dim, oppressive confines of Wolsey’s deathbed chamber, the
    once-mighty Cardinal—now a shadow of his former self—clings to consciousness,
    his voice weak but insistent as he demands Cromwell’s presence. Cavendish, his
    loyal attendant, reassures him that Cromwell will come, though the delay only
    heightens Wolsey’s desperation. The scene crackles with unspoken tension: Wolsey’s
    plea is not just a dying man’s request but a final, fragile attempt to reclaim
    some measure of control over his protégé, whose rise now threatens to eclipse
    his legacy entirely. The exchange underscores the fractured but enduring bond
    between them, where betrayal and loyalty intertwine, and where Wolsey’s fading
    power is measured in the moments before Cromwell’s arrival—moments that will determine
    whether their history ends in reconciliation or further rupture.'
