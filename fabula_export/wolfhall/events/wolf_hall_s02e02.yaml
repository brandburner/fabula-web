  title: Cromwell shifts from reports to confrontation
  description: 'Thomas Cromwell, mid-discussion with Hans Holbein about commissioning
    royal portraits, is abruptly interrupted by Wriothesley, who reveals damning evidence
    of Lady Margaret Douglas’s secret marriage to Thomas Howard the Lesser—a politically
    explosive liaison that implicates Norfolk’s faction in treason. Cromwell’s initial
    amusement at Wriothesley’s suspicions turns to horror as the truth unfolds, forcing
    him to abandon bureaucratic maneuvering and resolve to confront Lady Margaret
    directly. The decision marks a critical pivot: Cromwell, frustrated by the ambiguity
    of reports, prioritizes personal confrontation over indirect investigation, reflecting
    his growing impatience with courtly deception and his willingness to risk direct
    conflict for clarity. The moment underscores Cromwell’s strategic adaptability
    and the high-stakes power dynamics at play, where even a private affair can destabilize
    the monarchy. Holbein’s subtle warning about the symbolic weight of a ring—‘a
    promise’—further hints at the personal and political risks Cromwell now faces.'
