  global_id: null
  title: Jane probes Cromwell’s loyalty and Henry’s discontent
  description: In a private alcove of the Queen’s privy chamber, Jane Seymour—ostensibly
    reminiscing about shared courtly rituals—subtly tests Cromwell’s loyalty by referencing
    Anne Boleyn’s discarded Book of Hours, which contains Henry’s intimate inscription.
    Jane’s questions about marital pleasure and conception reveal her anxiety over
    Henry’s dissatisfaction with their marriage, while her veiled critique of Turkish
    polygamy hints at the King’s growing disdain for Christian marital constraints.
    Cromwell deflects her probing with calculated ambiguity, redirecting her to her
    sister’s marital advice while subtly reinforcing his own unassailable position.
    The exchange underscores Jane’s fragile authority, her dependence on Cromwell’s
    guidance, and the lingering specter of Anne Boleyn’s influence over the court’s
    power dynamics. Jane’s final warning about Henry’s Turkish costume foreshadows
    the King’s capriciousness and his rejection of traditional marital norms, setting
    up Cromwell’s later confrontation with Henry’s disguised provocation.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 28
  sequence_in_scene: 45
  key_dialogue:
  - 'JANE: Empty handed? I remember when you used to bring us ladies cakes. But that
    was before you were so busy.'
  - 'CROMWELL: It was you I brought them for.'
  - 'JANE: And when the Queen was displeased with you, she threw them on the floor.
    This was hers. Anne Boleyn’s. She and the King passed it between them. He’s written
    an inscription. Under the Man of Sorrows.'
  - 'CROMWELL: It says ‘I am yours. Forever.’'
  - 'JANE: Look at the Annunciation earlier. There’s a reply. By daily proof you shall
    me find/ To be to you both loving and kind. Do you think she was kind to him?'
  - 'CROMWELL: Not often.'
  - 'JANE: She had hope of a son in those days. She thought she could bear a son.'
  - 'JANE: My ladies say that if a wife does not take pleasure in the act, she will
    not get a child. Is that true?'
  - 'CROMWELL: Perhaps you should consult with your lady mother, your grace? Or one
    of the dames here at court might advise you?'
  - 'JANE: Perhaps I should not have asked you. If you are going to the King now,
    you will see that he is wearing his Turkish costume again. He does not feel he
    wore it enough at the festivities. My father said that Turkish princes can have
    a dozen wives. If the King had been of their sect, he could have been married
    to the late Queen, God rest her, and to Katherine, God rest her, and at the same
    time to me, if he wished.'
