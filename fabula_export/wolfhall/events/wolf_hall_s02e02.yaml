  title: Henry orders Cromwell to marry off Mary and Margaret
  description: "\n  In the Long Gallery at Hampton Court, King Henry VIII—seated apart\
    \ from the masquerade revelers—casually commands Thomas Cromwell to arrange politically\
    \ advantageous marriages for his daughter Mary and niece Margaret Douglas. The\
    \ directive is delivered with cold pragmatism: Mary’s return to court is contingent\
    \ on her continued obedience, and both women are framed as ‘prizes’ to be traded\
    \ for foreign alliances or domestic stability. Cromwell, ever the strategist,\
    \ notes the shift in Henry’s tone toward Mary, a subtle but telling sign of the\
    \ King’s evolving priorities. Meanwhile, Fitzwilliam voices the court’s skepticism\
    \ about finding suitable suitors, highlighting the fragility of Tudor legitimacy\
    \ and the high-stakes nature of the task. The scene’s tension escalates when Wriothesley\
    \ abruptly departs after fixating on Lady Margaret, his behavior suggesting he’s\
    \ uncovered something—likely the secret marriage that will later explode into\
    \ scandal. Cromwell’s refusal to answer Fitzwilliam’s question about trust underscores\
    \ his isolation and the precariousness of his position, while his pointed adjustment\
    \ of Fitzwilliam’s chain of office serves as a quiet assertion of control. The\
    \ event functions as both a setup for the Margaret Douglas scandal and a microcosm\
    \ of Cromwell’s role: he must navigate Henry’s capricious demands while managing\
    \ the court’s shifting loyalties and hidden agendas.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e02
  scene_sequence: 15
  sequence_in_scene: 18
  key_dialogue:
  - 'HENRY: Let her remain at Hunsdon for the present. News of her capitulation should
    have time to reach Europe. And I want to see evidence of her supposed obedience
    before she returns.'
  - 'HENRY: Draw up a list of suitors. We should find her a prince before her bloom
    fades entirely.'
  - 'HENRY: My niece Lady Margaret should also look to a marriage. She is a great
    prize, being now so near the throne. Make a note.'
  - 'FITZWILLIAM: Good luck with that, Crumb—finding a foreigner we can trust for
    either of them. Or pick an Englishman and then, Christ, the pretension in one
    family, the resentment in all the others...'
  - 'FITZWILLIAM: Do you trust him? Gardiner’s pupil?'
  - 'CROMWELL: We all need second chances, Fitz.'
