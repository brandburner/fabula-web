    description_of_involvement: Lady Margaret Douglas’s sodden handkerchief is a powerful
      symbolic prop, embodying her emotional unraveling. She wipes her eyes savagely
      with it, a physical manifestation of her fury and defiance, before dropping
      it to the floor in a gesture of despair. Mary Fitzroy immediately passes her
      a fresh one, highlighting the contrast between Margaret’s emotional vulnerability
      and Fitzroy’s pragmatic detachment. The discarded handkerchief lies crumpled
      on the floor, a tangible remnant of Margaret’s collapsing resistance, while
      the fresh one symbolizes the court’s ability to replace and control even the
      most personal of expressions.
