- fabula_uuid: act_77edd374757333e6
  number: 3
  summary: 'Act Three initiates Cromwell''s journey to Shaftesbury, a pilgrimage driven
    by the mounting pressures and personal doubts stirred by the marriage rumor and
    Wolsey''s spectral warning. He arrives at Shaftesbury Convent, where the Abbess
    defiantly asserts her intention to resist the dissolution of her wealthy house,
    hinting at the broader challenges Cromwell faces in implementing the King''s reforms.
    The emotional core of the act unfolds as Cromwell meets Dorothea, Cardinal Wolsey''s
    illegitimate daughter. In a moment of vulnerability and perhaps a misguided attempt
    to offer security, Cromwell offers Dorothea support, a pension, and even, surprisingly,
    his hand in marriage, revealing his loneliness and desire for a familial connection.
    This overture, however, serves as the catalyst for the episode''s climax. Dorothea,
    rebuffing his offer, unleashes a devastating accusation: she firmly believes Cromwell
    betrayed her father, Wolsey, by manipulating letters to the King, thereby facilitating
    his downfall and serving Norfolk''s ambitions. This accusation shatters Cromwell''s
    carefully constructed self-image and his perception of his past loyalty. Deeply
    wounded and disoriented, Cromwell experiences a profound personal crisis, questioning
    his own motives and actions. He seeks reassurance from Richard Riche, who, while
    surprised by the accusation, offers a pragmatic, if unsettling, perspective: "The
    King is our way." Later, in a moment of raw despair, Cromwell confides in Rafe,
    recounting his past actions to protect Wolsey and expressing his agonizing doubt.
    He wonders if his ambition inadvertently led him to betray his former master,
    lamenting the impossibility of remaking his reputation with the dead. The episode
    concludes with Cromwell consumed by uncertainty, his internal world fractured
    by Dorothea''s words, leaving him to grapple with the profound implications of
    his choices and the ambiguous nature of his service to the King.'
