- fabula_uuid: cand_evt_scene_135a26973c4f793f_01
  global_id: null
  title: Cromwell’s men ransack Hunsdon House
  description: Cromwell’s agents conduct a methodical, destructive search of Mary
    Tudor’s residence at Hunsdon House, tearing through her private chambers with
    calculated brutality. The men upend chests, rip tapestries, and burn documents—all
    under Wriothesley’s supervision—while Mary watches in silent fury. The search
    is not merely procedural; it is a deliberate psychological assault, a display
    of Cromwell’s unchecked authority and a warning to Mary of her precarious position.
    When a searcher insists on burning all seized letters, Mary’s restraint shatters—she
    storms off, her custodian Lady Shelton trailing after her. The scene underscores
    the court’s shifting power dynamics post-Anne Boleyn’s execution, with Cromwell’s
    men acting as instruments of Henry’s will, while Mary’s defiance remains unbroken
    despite the humiliation. The destruction of her private space symbolizes the erosion
    of her autonomy, yet her refusal to intervene or plead only reinforces her resolve
    as a political pawn who refuses to be broken.
