  title: Cromwell and Suffolk intercept Norfolk’s plot
  description: At Hunsdon House’s gatehouse, Thomas Cromwell and Charles Brandon,
    Duke of Suffolk, arrive on foot, observing Norfolk and his half-brother Thomas
    Howard the Lesser engaged in a tense, whispered exchange. Cromwell’s sharp political
    instincts immediately detect Norfolk’s hostility—a deliberate shift in the duke’s
    demeanor that signals his covert opposition to Cromwell’s influence over Mary
    Tudor. Suffolk, oblivious to the subtext, rambles about Henry VIII’s marital misfortunes,
    his crude humor masking deeper truths about the court’s volatile dynamics. Cromwell,
    however, remains laser-focused on Norfolk’s unspoken defiance, recognizing it
    as a calculated power play to undermine his private access to Mary. The scene
    underscores Cromwell’s mastery of reading political undercurrents and his strategic
    advantage in the post-Anne Boleyn court, where alliances are fluid and betrayal
    is imminent. Norfolk’s suspicion and Cromwell’s quiet confidence set the stage
    for a high-stakes confrontation over Mary’s submission, with Suffolk’s presence
    serving as both a foil and a reluctant witness to the shifting power dynamics
    at play.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 35
  sequence_in_scene: 54
  key_dialogue:
  - 'SUFFOLK: Harry knows he did wrong. First he married his brother’s wife, and then
    he had the misfortune to marry a witch. He knows very well what witches do — they
    shrivel your member and then you die. I’ve told him — majesty, don’t brood on
    it. Fetch in the archbishop, discharge your conscience, and start again. You tell
    him. He’ll take it from you. Whereas me — he thinks I’m a fool.'
  - 'CROMWELL: Come, my lord. The Howards are twitching. They want to know what we’re
    talking about.'
  - 'SUFFOLK: Huh. You’re right. Norfolk doesn’t trust you. He doesn’t want you left
    alone with Mary.'
