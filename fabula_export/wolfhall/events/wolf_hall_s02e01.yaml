  title: Henry’s Ritual of Divine Authority
  description: In the aftermath of Anne Boleyn’s execution, Henry VIII undergoes a
    meticulously orchestrated dressing ritual in his bedchamber, transforming from
    a vulnerable man into a symbol of unassailable power. An esquire secures his collar
    chain and medallion, while Rafe Sadler presents a jewel box containing rings and
    brooches—each piece a deliberate reinforcement of Henry’s divine right to rule.
    The King’s gaze lingers on his reflection, his posture shifting from introspection
    to imperious command as the layers of regalia are added. The ritual is performative,
    a calculated display of authority meant to intimidate the court and reassert his
    dominance after the political upheaval of Anne’s fall. Rafe’s quiet efficiency
    contrasts with Henry’s growing intensity, underscoring the fragility of power
    and the performative nature of kingship in a court where perception dictates survival.
    The scene serves as a psychological and political pivot, marking Henry’s transition
    from grieving widower to unchallenged monarch, while foreshadowing the precariousness
    of his reign and the court’s shifting loyalties.
