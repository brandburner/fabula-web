  - object_uuid: ger_object_bd5b988cd5c2
    description_of_involvement: 'The submission letter is the symbolic and legal instrument
      of Mary’s coerced compliance. Cromwell produces it from his pocket, pressing
      it into her hands as she sits by the fire. He frames it as a document she can
      ‘repudiate later,’ but its immediate purpose is to extract her signature—a physical
      act of submission to Henry VIII’s authority. The letter’s unread contents and
      Cromwell’s reassurances (‘You can repudiate it later’) highlight the manipulation
      at play: Mary signs without understanding the terms, her despair making her
      vulnerable to his psychological coercion. The letter’s dry ink and rolled-up
      state after signing symbolize the finality of her surrender.'
    status_before_event: Folded in Cromwell’s pocket, its contents unknown to Mary
      but representing Henry VIII’s ‘plain will.’
    status_after_event: Signed by Mary, dried with pounce, and rolled up by Cromwell—now
      a binding document of submission.
