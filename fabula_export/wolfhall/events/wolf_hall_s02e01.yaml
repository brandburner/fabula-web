  title: Cromwell reveals Anne’s final hope
  description: 'At the Tower scaffold, Thomas Cromwell and his son Gregory stand among
    the crowd, witnessing a flashback of Anne Boleyn’s execution. Anne, cloaked in
    black, descends the scaffold steps while distributing alms to the poor, her gaze
    repeatedly lifting toward the Tower above. Gregory, puzzled, asks why she keeps
    looking up. Cromwell’s response—*Because she thinks there’s still hope*—exposes
    the brutal irony of her fate: even as she faces death, she clings to the delusion
    of a last-minute reprieve. The moment underscores the emotional cost of Cromwell’s
    political maneuvering, forcing Gregory to confront the moral weight of his father’s
    world. For Cromwell, it’s a reminder of his complicity in her downfall, a ghost
    that haunts his present actions. The scene serves as a thematic bridge, linking
    Anne’s shattered hope to Cromwell’s ongoing struggle with power and conscience,
    while reinforcing the episode’s central tension: the price of survival in a court
    where mercy is a liability.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
