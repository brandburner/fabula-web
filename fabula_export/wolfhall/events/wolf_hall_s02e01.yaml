- fabula_uuid: cand_evt_scene_a4f13a0a7cf248c5_04
  global_id: null
  title: Mary’s collapse and Cromwell’s calculated embrace
  description: 'In a private confrontation at Hunsdon House, Mary Tudor—already weakened
    by grief, illness, and isolation—unravels before Thomas Cromwell. After dismissing
    Norfolk and Suffolk, she lashes out at Cromwell’s rise to power, only to reveal
    her deep vulnerability when she stumbles into a table, shattering a Venetian jug.
    Cromwell seizes the moment, offering false reassurance: he frames her submission
    as strength, not weakness, and promises her a horse and future comforts if she
    signs a letter repudiating her defiance. Mary, emotionally shattered, signs the
    letter but then collapses into sobs, confessing her despair. Cromwell holds her
    in a manipulative embrace, exploiting her grief to deepen her dependence on him.
    The moment is interrupted by Lady Shelton, who scolds Mary and drags her away,
    exposing the fragility of Cromwell’s influence and the precariousness of Mary’s
    position. The scene underscores Cromwell’s mastery of psychological manipulation,
    Mary’s psychological unraveling, and the court’s brutal power dynamics, where
    even acts of comfort are calculated moves in a larger game of control.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 37
  sequence_in_scene: 61
  key_dialogue:
  - 'MARY: I have felt... so... alone...'
  - 'CROMWELL: In obedience, there is strength and tranquillity. And you will feel
    them. It will be like the sun after a long winter. Choose to live and you will
    thrive.'
  - 'MARY: I often think, why did I not die in the cradle or the womb, like my brothers
    and sisters? It must be that God has a design for me. Soon I too may be elevated,
    beyond what seems possible now.'
  - 'CROMWELL: Your resistance has... has injured him, it’s made him ill.'
  - 'MARY: I would give anything to ride again. They do not let me have a saddle horse.'
  - 'CROMWELL: I have a sweet dapple grey in my stables. She can be with you tomorrow.
    Her name is ‘Douceur’ (''sweetness''). But you can change it if you like.'
  - 'LADY SHELTON: Mary, stop that noise. Let go of the Lord Privy Seal and put your
    cap on.'
