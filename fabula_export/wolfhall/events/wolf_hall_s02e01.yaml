- fabula_uuid: act_e6041120f06bedd6
  number: 3
  summary: Cromwell, accompanied by Norfolk and Suffolk, arrives at Hunsdon House
    to secure Mary's submission. Lady Shelton reveals Norfolk's true agenda, exposing
    his desire for Mary's continued defiance to maintain his own political ambitions.
    Mary, having dismissed Norfolk and Suffolk, finally speaks with Cromwell alone.
    She expresses her profound loneliness and vulnerability, acknowledging Cromwell
    as her only advocate. Cromwell, leveraging this emotional connection and his earlier
    manipulation of Chapuys, persuades Mary to sign a carefully worded letter of submission,
    promising her a return to court and her father's favor. Despite her outward compliance,
    Mary subtly reasserts her identity by renaming her new horse "Pomegranate," her
    mother's emblem, and calling Jane Seymour "mother," a veiled challenge to Jane's
    youth and position. The reconciliation at Chester Place appears successful, with
    Henry embracing Mary, but Cromwell remains acutely aware of the underlying tensions
    and Mary's lingering defiance. In a private moment with his inner circle, Cromwell
    reveals a secret promise he made to Katherine of Aragon to protect Mary, adding
    a layer of moral complexity to his actions. The episode concludes with Cromwell's
    haunting conversation with Wolsey's ghost, who warns him of the enemies he has
    made and the dangers of serving a volatile king. Cromwell accepts his identity
    as the "butcher's dog," a loyal instrument willing to sacrifice his soul for his
    master and England, yet he finds himself in an even more precarious position,
    bound by conflicting loyalties and facing new, subtle threats.
