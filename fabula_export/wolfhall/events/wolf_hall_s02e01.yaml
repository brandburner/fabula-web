  - |-
    WRIOTHESLEY: You had a warning of it. Pole’s book.
    CROMWELL: I’ve been watching Reginald Pole for a year. I still have friends in Italy.
  - |-
    WRIOTHESLEY: My God, no wonder you dealt so boldly with the Poles! With this card in your hand, you could bring them down. The whole family.
    CROMWELL: I could have brought them down two years ago.
  - 'CROMWELL: Search the house. If you find copies of letters between the Lady Mary
    and Reginald Pole—any of the Poles—bring them to me. And me only, ‘Call-me’. No
    copies to our friend in France, Stephen Gardiner.'
