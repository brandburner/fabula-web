  key_dialogue:
  - |-
    CHAPUYS: The Emperor will not suffer Mary to be mistreated. He will send ships.
    CROMWELL: No, no. You know, and I know as well, come on, the Emperor in arms has no power to save Mary. Her case is urgent.
  - |-
    CHAPUYS: Mary expected to be embraced, without question, once Anne Boleyn came down.
    CROMWELL: Then she doesn’t know her father.
  - 'CHAPUYS: It is her mother. I believe she vowed to Katherine she would never give
    way. Vows to the living may be set aside, with their permission. But the dead
    do not negotiate.'
  - |-
    CROMWELL: Explain it as you like.
    CHAPUYS: You are saying to her, ‘You can live, but only as Cromwell permits’. ‘You can reign even — but only through Cromwell’s grace’.
  - 'CROMWELL: Tell her, if she does not give way now, if she will not sign the letter,
    she is dead to me. I shall never, never see her or speak to her again.'
