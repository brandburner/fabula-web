  title: Anne’s ritualistic humiliation before execution
  description: In a flashback, Anne Boleyn kneels on the scaffold as her ladies-in-waiting
    remove her ornate royal headdress—a symbol of her power and status—and replace
    it with a plain white cap, a deliberate act of degradation. The scene unfolds
    in near silence, the only sounds the rustling of fabric and the muffled sobs of
    her attendants. Anne’s face remains impassive, but her hands tremble slightly
    as the cap is tied, marking the final severance of her identity as queen. The
    camera lingers on the discarded headdress, its jewels glinting in the pale light,
    before cutting to the executioner’s shadow falling across the scaffold. This moment
    crystallizes the irreversible nature of her fall, underscoring the court’s betrayal
    and Henry’s ruthless rejection of their bond. The ritualistic nature of the act
    foreshadows the execution itself, framing it as a state-sanctioned erasure of
    her personhood rather than a mere punishment. The flashback serves as a haunting
    counterpoint to Cromwell’s present-day maneuvering, reinforcing the cost of his
    political survival and the ghosts that haunt his decisions.
