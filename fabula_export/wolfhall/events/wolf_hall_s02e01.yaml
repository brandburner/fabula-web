  title: Cromwell manipulates Mary’s despair into submission
  description: Mary Tudor, isolated and emotionally unraveling, confronts Cromwell
    after dismissing Norfolk and Suffolk, who have failed to protect her. Her vulnerability
    is exposed when she accidentally shatters a Venetian jug—a symbol of her fragile
    control—and Cromwell seizes the moment to reframe obedience as strength. He pressures
    her into signing a letter without reading it, exploiting her desperation for connection
    and her fear of abandonment. The scene culminates in Mary’s breakdown, where Cromwell
    offers her a horse as a bribe, deepening her dependence on him while masking his
    true motives. The exchange underscores Cromwell’s psychological mastery and Mary’s
    precarious position, setting the stage for her eventual submission to Henry’s
    will. The shattered glass and Mary’s unraveling hair serve as visceral metaphors
    for her fractured dignity and the court’s predatory dynamics.
