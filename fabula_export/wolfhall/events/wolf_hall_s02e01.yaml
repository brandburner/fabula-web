  title: Cromwell justifies Anne’s execution to Rafe
  description: 'In the shadow of Anne Boleyn’s execution, Thomas Cromwell meets Rafe
    Sadler outside the Tower of London, where Rafe—dusty from riding from Hampton
    Court—confronts him with quiet horror over the brutality of her death. Cromwell’s
    response is a cold, pragmatic justification: when negotiation fails, enemies must
    be destroyed before they can retaliate. The exchange reveals the emotional cost
    of Cromwell’s ruthlessness—his detachment masks a deeper unease, while Rafe’s
    moral revulsion underscores the moral erosion of those who serve him. Cromwell’s
    dismissal of Rafe to his ''new master'' (Norfolk) signals the shifting power dynamics
    at court and the isolation of a man who has sacrificed everything for survival.
    The moment is a turning point in their relationship, exposing the chasm between
    Cromwell’s cynical pragmatism and Rafe’s lingering idealism, while reinforcing
    the theme that power demands moral compromise.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 15
  sequence_in_scene: 15
  key_dialogue:
  - 'RAFE: Done?'
  - 'CROMWELL: Done.'
  - 'RAFE: Did it have to be this way? So bloody.'
  - 'CROMWELL: When negotiation and compromise fail and your only course is to destroy
    your enemy, before they wake in the morning, Rafe, have the axe in your hand.'
  - 'RAFE: Any message for the King?'
  - 'CROMWELL: No message. Back to your new master.'
