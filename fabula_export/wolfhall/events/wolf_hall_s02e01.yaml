  title: Cromwell’s Paranoia Triggered by Pole’s Stare
  description: 'Amid the opulent chaos of Henry VIII’s wedding celebration, Thomas
    Cromwell navigates the crowded Presence Chamber when Wriothesley urgently flags
    Geoffrey Pole’s unsettling fixation on him. Cromwell’s immediate suspicion—expressed
    through a sharp refusal to be summoned—reveals his hypervigilance in a court where
    loyalty is a currency and betrayal lurks behind every glance. The moment forces
    Cromwell to weigh the risks of overreaction against the danger of ignoring a potential
    threat, underscoring the precarious balance of power and paranoia that defines
    his survival. Meanwhile, Gregory’s naive musings about Henry’s marital performance
    contrast with Cromwell’s cynical worldview, highlighting the generational divide
    between idealism and the brutal realities of court politics. The scene serves
    as a microcosm of Cromwell’s dual role: a ruthless strategist calculating threats
    while suppressing his son’s innocence to shield him from the court’s moral decay.'
