    description_of_involvement: The Pole family is the primary victim of Cromwell’s
      manipulation in this event, their defiance systematically dismantled through
      threats and coercion. As a noble faction backing Princess Mary Tudor, they are
      forced to repudiate Reginald Pole’s treasonous book and urge Mary’s submission
      to Henry VIII. Geoffrey Pole’s arrogance crumbles under Cromwell’s exposure
      of his correspondence with Chapuys, while Margaret Pole’s defiance is met with
      the threat of an Act of Attainder—mirroring her father’s execution. The family’s
      submission is not voluntary but extracted through fear, their loyalty to Mary
      and the Catholic faith pitted against their desire to survive. Their involvement
      in this event underscores the fragility of noble resistance in the face of Cromwell’s
      rising power.
    active_representation: Through Margaret Pole and Geoffrey Pole, who are forced
      to comply with Cromwell’s demands under threat of attainder and seizure of their
      lands.
    power_dynamics: Being challenged by external forces (Cromwell and the English
      Court) but ultimately coerced into submission. The Poles’ power is eroded, their
      defiance neutralized through legal and psychological threats.
    organizational_goals:
    - Protect Princess Mary Tudor from Henry’s wrath and secure her restoration to
      favor.
    - Preserve the Pole family’s lands and status, even at the cost of betraying their
      own kin (Reginald Pole).
    influence_mechanisms:
    - Leveraging past aid to Cromwell (e.g., dismantling the Boleyns) to bargain for
      leniency.
    - Exploiting familial bonds (e.g., Margaret’s loyalty to her son Reginald) to
      force compliance.
    - Using the threat of attainder and seizure of property to coerce submission.
    institutional_impact: The Poles’ submission in this event marks the beginning
      of their decline as a noble faction. Their forced repudiation of Reginald’s
      book and urging of Mary’s obedience weakens their position in the court and
      undermines their ability to challenge Cromwell’s authority. The event sets a
      precedent for how noble families will be treated under Henry’s rule, with loyalty
      enforced through fear and coercion.
    internal_dynamics: The family is divided between defiance (Margaret’s initial
      resistance) and desperation (Geoffrey’s panic under threat). Their internal
      tensions are exploited by Cromwell, who pits their loyalty to Mary and Reginald
      against their survival instincts.
