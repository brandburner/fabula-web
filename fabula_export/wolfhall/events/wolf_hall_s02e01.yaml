  title: Cromwell forces Pole family submission
  description: In a tense confrontation at L’Erber, Thomas Cromwell systematically
    dismantles the Poles’ resistance by weaponizing their past loyalty and exposing
    Geoffrey Pole’s secret correspondence with Chapuys. Margaret Pole, initially defiant,
    is cornered when Cromwell threatens an Act of Attainder—mirroring her father’s
    execution—while Geoffrey’s arrogance crumbles under the revelation of his treasonous
    communications. Cromwell’s cold pragmatism is on full display as he dictates the
    exact language Margaret must use to repudiate Reginald Pole’s book, ensuring Mary’s
    survival by forcing the Poles to publicly betray their own blood. The scene underscores
    Cromwell’s mastery of psychological manipulation, where familial bonds become
    leverage and loyalty is a transactional currency. His framing of the Poles’ complicity
    in Mary’s peril—coupled with the implicit threat of their own destruction—reveals
    how deeply he’s embedded himself in the court’s power dynamics, willing to sacrifice
    old alliances to secure his (and Mary’s) future. The exchange ends with Margaret’s
    venomous insult (‘You are a snake, Cromwell’) and his chilling retort, establishing
    their adversarial relationship as a long-term chess match where every move carries
    existential stakes.
