- fabula_uuid: cand_evt_scene_be3fb4480de269f0_01
  global_id: null
  title: Cromwell deploys spies to break Mary’s defiance
  description: 'In the shadowed corridors of Hampton Court, Thomas Cromwell orchestrates
    a high-stakes gambit to secure Princess Mary’s submission to Henry VIII’s Church
    reforms. Following the public spectacle of Henry’s marriage to Jane Seymour, Cromwell
    privately dispatches his most trusted aides—Rafe Sadler and Wriothesley—on a mission
    to Hunsdon House. The task is framed as a test of loyalty, not just to the crown
    but to Cromwell’s own survival, as Mary’s defiance threatens his fragile power.
    Cromwell instructs Rafe to avoid intimidation, emphasizing Mary’s bravery and
    the need to document *everything* she says, ensuring her compliance or her ruin.
    The exchange reveals Cromwell’s strategic mind: he avoids direct confrontation
    with Mary himself, instead using intermediaries to gather incriminating evidence.
    Meanwhile, Geoffrey Pole’s desperate attempt to invoke an old bargain for Mary’s
    restoration is met with Cromwell’s cold dismissal, underscoring his ruthless prioritization
    of power over past promises. The scene establishes Cromwell’s dual role as both
    the King’s enforcer and a man haunted by his own moral compromises, while setting
    up the escalating conflict over Mary’s fate.'
