  - 'WOLSEY: Some might ask, who was the... the greatest of Wolsey’s enemies? Some
    might ask, when chance serves, what revenge will Cromwell take - on his sovereign?
    Such thoughts might reach the King. And there’s an end of it.'
  - 'CROMWELL: There are no endings. Only beginnings.'
