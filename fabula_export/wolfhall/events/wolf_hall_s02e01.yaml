  - object_uuid: ger_object_3a34e736541d
    description_of_involvement: 'The pounce is used by Cromwell to dry the ink on
      Mary’s signed submission letter. Its sprinkling and brushing away are methodical,
      almost ritualistic, mirroring the court’s bureaucratic machinery. The powder
      absorbs excess moisture, just as Cromwell absorbs Mary’s resistance—turning
      her raw emotion into a dry, official document. The act is clinical, emphasizing
      the transformation of her despair into a legal instrument of control. The pounce’s
      role is functional but symbolic: it erases the messiness of her tears, just
      as the court erases her autonomy.'
