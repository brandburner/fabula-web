  - character_uuid: ger_agent_44511d8052a5
    emotional_state: A complex mix of defiance and dread. Surface calm masks deep
      anxiety—she knows the legal and historical precedents Cromwell invokes, and
      her stillness suggests she is calculating her next move while bracing for the
      worst. Her outburst (‘You are a snake’) is a brief, desperate assertion of moral
      clarity before reality reasserts itself.
    goals:
    - Protect her family—particularly Geoffrey—from Cromwell’s threats, using past
      favors and legal arguments as shields.
    - Preserve her bond with Mary Tudor, ensuring her safety and status, even if it
      means temporary submission.
    - Maintain her dignity and noble standing in the face of Cromwell’s coercion.
    what_happened: Margaret Pole begins the scene with the composed dignity of a noblewoman,
      her hawk’s profile bent over needlework—a deliberate performance of domestic
      tranquility. Yet her sharp exchanges with Cromwell reveal a mind as keen as
      his, though trapped by the constraints of her gender and station. When Cromwell
      invokes the Treason Act, her stillness betrays the weight of her father’s fate,
      but she meets his gaze unflinchingly. Her accusation—‘You are a snake, Cromwell’—is
      the only moment of raw defiance, though even this is swiftly co-opted by his
      rhetoric. By the end, she is forced into complicity, her pen the instrument
      of her daughter’s coercion.
