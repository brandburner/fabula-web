acts:
- fabula_uuid: act_0eeb626c2bc40a0d
  number: 1
  summary: 'The episode opens with the grim aftermath of Anne Boleyn''s execution,
    depicted through Thomas Cromwell''s haunting flashbacks, as King Henry VIII prepares
    to marry Jane Seymour. Cromwell, now Henry''s principal advisor, reflects on the
    brutal necessity of his past actions while receiving a new promotion to Lord Privy
    Seal. This elevation comes with a critical, high-stakes task: securing Princess
    Mary''s submission to Henry as the supreme head of the Church of England and her
    acknowledgment of her deceased mother Katherine of Aragon''s invalid marriage.
    Cromwell''s internal world and strategic mind are revealed through his cynical
    conversations with the spectral Cardinal Wolsey, who offers cutting advice on
    navigating the treacherous Tudor court. Wriothesley reports Mary''s staunch refusal
    to take the oath, influenced by the powerful Pole family who envision her restoration
    to the line of succession and a return to Catholic allegiance. Cromwell, keenly
    aware of the King''s volatile nature and the political tightrope he walks, dispatches
    his trusted ward Rafe Sadler and Wriothesley to Hunsdon to attempt to persuade
    Mary. Simultaneously, Cromwell strategically prepares to engage Eustache Chapuys,
    the Emperor''s Ambassador, recognizing him as a crucial lever in influencing Mary.
    This act swiftly establishes the central conflict—Cromwell''s mission to force
    Mary''s compliance—and immediately raises the stakes, positioning Cromwell between
    a demanding King, a defiant princess, and ambitious factions like the Poles and
    Stephen Gardiner, all vying for influence in a newly fractured England.'
