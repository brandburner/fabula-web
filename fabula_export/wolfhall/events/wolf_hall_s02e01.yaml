      all property and lands without trial, mirroring the fate of Margaret Pole’s
      father. The Act is not a physical document in the scene but is referenced verbally,
      its mere mention suffices to instill fear and force compliance. Cromwell uses
      it to exploit the Poles’ historical trauma, leveraging their knowledge of its
      devastating consequences to coerce their submission. The Act embodies the arbitrary
      and absolute power of the Crown, a tool Cromwell deploys with ruthless efficiency.
