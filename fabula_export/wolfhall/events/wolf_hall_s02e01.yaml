      role. While the papers themselves are untouched during this event, their presence
      underscores the weight of Cromwell’s responsibilities and the constant threat
      of scrutiny. The papers act as a visual reminder of the administrative and legal
      tools at his disposal—tools he uses to manipulate and control the court. Their
      untouched state contrasts with the urgency of the letter’s arrival, highlighting
      how the unexpected can disrupt even the most meticulously planned strategies.
    status_before_event: Spread across Cromwell’s desk, untouched and symbolic of
      his administrative duties. The papers are open but ignored as Cromwell’s attention
      shifts to the letter and Wolsey’s ghostly presence.
    status_after_event: Remain untouched on the desk, now overshadowed by the letter’s
