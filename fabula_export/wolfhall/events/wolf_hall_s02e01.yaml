    description_of_involvement: L’Erber, the sunlit noble grounds of the Pole family
      estate, serves as the public stage for Cromwell’s psychological siege. The manicured
      lawns and elegant property contrast sharply with the piles of burned documents—Reginald
      Pole’s seditious writings—being destroyed in broad daylight. This juxtaposition
      transforms L’Erber from a symbol of noble prestige into a site of vulnerability
      and coercion. The open, sunlit setting amplifies the tension, as Cromwell’s
      unannounced arrival and the family’s public humiliation play out before the
      eyes of their household and gardeners. The location’s usual grandeur is undermined,
      exposing the Poles’ fragility in the face of royal power.
    observed_atmosphere: Tense and charged with unspoken hostility. The sunlit elegance
      of L’Erber clashes with the smoke-filled air and the psychological battle unfolding,
      creating a mood of forced compliance and simmering defiance.
    functional_role: Public stage for Cromwell’s confrontation with the Poles, where
      their defiance is systematically dismantled. The open setting ensures there
      are no private refuges for resistance.
    symbolic_significance: Represents the erosion of noble privilege under Cromwell’s
      rise. The burning of Reginald’s writings symbolizes the destruction of dissent,
      while the estate’s grandeur becomes a hollow facade in the face of royal authority.
    access_restrictions: Open to Cromwell and his associates, as well as the Poles’
      household and gardeners. The scene is public, with no private spaces to escape
      Cromwell’s scrutiny.
