  title: Cromwell weaponizes loyalty threats
  description: In a tense confrontation at L’Erber, Cromwell exploits the Pole family’s
    vulnerability—Geoffrey’s secret communications with Chapuys and Margaret’s maternal
    bond to Mary—to force their compliance. He dismantles their defiance by leveraging
    the Treason Act and the threat of attainder, stripping them of leverage. When
    Margaret calls him a 'snake,' Cromwell pivots to self-mythologize as a 'dog' bound
    to Henry’s will, recasting his ruthlessness as unshakable loyalty. The exchange
    cements his role as the Crown’s enforcer, where survival and ambition blur into
    a single, uncompromising purpose. The moment marks a turning point in Cromwell’s
    psychological alignment with power, where moral flexibility becomes his defining
    trait. The scene underscores the fragility of familial bonds in the face of political
    survival and the cost of defiance in Henry’s court.
