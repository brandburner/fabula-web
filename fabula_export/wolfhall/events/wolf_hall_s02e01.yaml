  title: Norfolk challenges Cromwell’s evidence
  description: In the tense aftermath of Mary’s coerced signature, Norfolk confronts
    Cromwell in Hunsdon House’s dining hall, demanding proof of her submission. Cromwell
    reluctantly produces the document, but Norfolk immediately dismisses it as insufficient,
    exposing his skepticism of Cromwell’s methods. The Duke’s probing question—*What
    did you have to promise her?*—forces Cromwell to admit he secured Mary’s compliance
    with a false assurance of her father’s love, revealing the moral compromises underpinning
    his political maneuvering. The exchange underscores Norfolk’s lingering distrust
    of Cromwell’s tactics and the fragility of their alliance, while highlighting
    the high stakes of Mary’s submission for England’s stability. The moment also
    serves as a microcosm of the court’s shifting loyalties, where even allies like
    Norfolk are willing to challenge Cromwell’s authority when it threatens their
    own interests.
