      the fine line Cromwell walks between honoring tradition and avoiding the pitfalls
      that led to Wolsey’s downfall.
    status_before_event: Arrayed on a stand by the window, a silent but potent symbol
      of Wolsey’s legacy and the political risks of Cromwell’s actions.
    status_after_event: Remains on the stand, its symbolic weight unchanged but now
