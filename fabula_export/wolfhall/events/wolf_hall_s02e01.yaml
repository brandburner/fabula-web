- fabula_uuid: act_f54f8ecced9836c5
  number: 2
  summary: Cromwell initiates his complex diplomatic game by hosting Eustache Chapuys,
    the Emperor's Ambassador. During their supper, Cromwell pressures Chapuys to convince
    Mary to submit, highlighting the severe consequences of her continued defiance,
    including the King's potential to execute his own daughter. Chapuys, though wary
    of Cromwell's methods and his own precarious position, reveals Mary's deep-seated
    loyalty to her deceased mother, Katherine of Aragon, as the root of her refusal.
    The stakes escalate dramatically when Henry, enraged by Reginald Pole's book denouncing
    his rule and calling for invasion, tasks Cromwell with finding incriminating letters
    between Mary and Pole and investigating the Pole family's involvement. Cromwell
    confronts Margaret and Geoffrey Pole, employing the chilling threat of an act
    of attainder to coerce their cooperation in influencing Mary. The tension culminates
    in a volatile Privy Council meeting where Henry, consumed by fury over Mary's
    defiance, threatens her trial and execution. When Fitzwilliam objects, Cromwell
    ruthlessly silences and removes him, demonstrating his unwavering loyalty to the
    King and his willingness to enforce Henry's will, however brutal. This act solidifies
    Cromwell's position as Henry's indispensable, yet increasingly isolated, instrument
    of power, with Mary's life hanging in the balance.
