  title: Cromwell isolates Wriothesley from Gardiner
  description: In the King’s outer privy chamber, Cromwell reveals his year-long surveillance
    of Reginald Pole and his network, exposing the family’s ties to Mary Tudor. He
    orders Wriothesley to conduct an immediate, unannounced raid on the Pole household
    to seize incriminating letters, emphasizing that the letters must be delivered
    exclusively to him—deliberately excluding Stephen Gardiner. This maneuver deepens
    Wriothesley’s dependence on Cromwell while eroding Gardiner’s influence, a strategic
    strike in Cromwell’s bid to control the court’s shifting loyalties post-Anne Boleyn’s
    fall. Wriothesley’s discomfort at the task—particularly the prospect of confronting
    Mary again—is palpable, but Cromwell’s directive leaves no room for hesitation.
    The scene underscores Cromwell’s dominance over the court’s factions and his ruthless
    consolidation of power, while the exclusion of Gardiner signals a calculated power
    play to weaken a rival and tighten his grip on Henry’s favor.
