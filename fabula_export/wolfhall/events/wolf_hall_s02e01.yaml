- fabula_uuid: cand_evt_scene_4edea5079db0190e_01
  global_id: null
  title: Norfolk’s staged aggression reveals court manipulation
  description: 'In the entrance hall of Hunsdon House, Lady Shelton greets Cromwell
    and Norfolk with thinly veiled hostility, immediately drawing attention to Norfolk’s
    destructive behavior—he has torn a valuable tapestry in a fit of rage and threatened
    Mary with violence. Cromwell, ever the strategist, observes the damage with calculated
    detachment, noting the symbolic fragility of the court’s stability. Lady Shelton
    then drops a critical revelation: Norfolk’s aggression toward Mary is a calculated
    charade. She explains that Norfolk, who once boasted of a Howard queen (Anne Boleyn),
    now benefits from Mary’s defiance, as it keeps her from being restored to the
    succession—a move that would extinguish his own dynastic ambitions. Cromwell’s
    sharp mind processes this insight, recognizing that Norfolk’s actions are not
    mere brutishness but a deliberate political maneuver. The scene underscores the
    court’s treacherous undercurrents, where even violence is performative, and power
    is a game of carefully staged moves. For Cromwell, this moment is a lesson in
    reading beyond surface tensions, reinforcing his understanding that in this world,
    nothing is as it seems—especially when it comes to Norfolk’s motives.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 36
  sequence_in_scene: 56
  key_dialogue:
  - 'LADY SHELTON: May we hope your lordship will refrain from abusing the furnishings?
    The tapestry you rent was worth a hundred pounds.'
  - 'NORFOLK: Was it so? I wouldn’t use it to wipe my arse.'
  - 'LADY SHELTON: He tried to tear it down in his fury. He threatened Lady Mary with
    a beating if she would not comply.'
  - 'CROMWELL: Well, you know what he is, Anne. He speaks to a woman as if she were
    a town wall and he has to breach her.'
  - 'LADY SHELTON: But I think it was a charade.'
  - 'CROMWELL: A charade? Really? Norfolk?'
  - 'LADY SHELTON: I do not think he wants Mary to acquiesce, not really. When Anne
    was alive, he could boast that a Howard sat on the throne. That’s not a boast
    he liked to give up. While Mary holds fast, he might still find another way to
    the throne. If Mary capitulates and Henry makes her heir, that hope is lost.'
