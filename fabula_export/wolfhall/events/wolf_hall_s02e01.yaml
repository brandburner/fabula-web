      event. Though not physically shown, its presence is implied when Henry reveals
      that Mary has sent him a defiant letter questioning her succession and refusing
      to acknowledge him as head of the Church. Cromwell, who has the letter tucked
      in his pocket, does not reveal this knowledge, instead assuring Henry that he
      will convince Mary to take the oath. The letter symbolizes Mary’s defiance and
      the high stakes of Cromwell’s dual loyalty—to Henry and to his secret vow to
      Katherine of Aragon. Its hidden existence adds a layer of secrecy and moral
      conflict to the scene, driving the power dynamics between Henry and Cromwell.
