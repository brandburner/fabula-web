  scene_sequence: 24
  sequence_in_scene: 34
  key_dialogue:
  - 'WRIOTHESLEY: Never send me there again! Sir, the house, it was full of the Poles.
    They boasted that you were nought, that Mary was returning to court, that the
    Pope would be restored and the world put to rights again! When we went in, we...
    we greeted her as Lady Mary, but she was enraged. She demanded the title of princess,
    and that we should kneel to her. She says she’ll never take the oath. She cannot
    accept her father as head of the Church.'
  - 'RAFE: I don’t think she’s as strong in her resolve as her people think. She did
    ask, ‘Why does the Lord Privy Seal not come himself?’ It’s as if she’s waiting
    for you, sir, so she can tell all of Europe you enforced her. She can take the
    oath and it be no blame to her.'
  - 'RAFE: The King has received a letter from Rome, from Reginald Pole. He just stared
    at it as if it came hot from the pit and signed by the devil. I do not know what
    it contains.'
  - 'CROMWELL: I do.'
