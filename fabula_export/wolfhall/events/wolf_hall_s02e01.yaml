  organization_involvements:
  - organization_uuid: ger_organization_1e1161857ad4
    description_of_involvement: 'The Pole family is the vulnerable faction at the
      heart of this confrontation, their noble status and past influence now counted
      for nothing in the face of Cromwell’s threats. Once a powerful faction backing
      Mary Tudor’s claim, they are now reduced to desperate pawns, forced to repudiate
      their own beliefs to survive. Their defiance is not just personal but familial—a
      legacy of loyalty to Mary and the Catholic faith that Cromwell is systematically
      dismantling. The family’s internal dynamics are laid bare: Margaret’s maternal
      protectiveness, Geoffrey’s arrogance crumbling under pressure, and their shared
      fear of attainder. Their submission in this scene marks the end of an era, where
      noble families could navigate court politics through favors and alliances. Now,
      even their name is a liability.'
