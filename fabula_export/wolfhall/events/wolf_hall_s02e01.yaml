  title: Pole’s letter fuels Henry’s rage
  description: 'Cromwell returns to Hampton Court after assessing Mary’s defiance,
    where Rafe and Wriothesley intercept him with conflicting reports: Wriothesley
    describes Mary’s unyielding resistance—her refusal to take the oath, her insistence
    on the title ‘princess,’ and the Poles’ open defiance—while Rafe suggests her
    resolve is fragile, hinting she may submit if pressured directly. The tension
    escalates when Rafe reveals Henry has received a letter from Cardinal Reginald
    Pole, which Cromwell already knows is inflammatory. The letter’s arrival—implied
    to be a direct challenge to Henry’s authority—ignites the King’s fury, forcing
    Cromwell to act swiftly to contain the fallout and protect his own position. The
    scene underscores the precarious balance of power at court, where Mary’s defiance
    and the Poles’ rebellion threaten to unravel Cromwell’s carefully constructed
    control, while also exposing the fragility of his alliance with Henry.'
