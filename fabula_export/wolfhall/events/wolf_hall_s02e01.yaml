  - object_uuid: ger_object_c96f10806b0a
    description_of_involvement: The letters between Mary Tudor and Reginald Pole are
      the primary target of Cromwell’s raid. These documents, hidden within the Pole
      household, serve as concrete evidence of treasonous correspondence and ties
      to Rome. Cromwell emphasizes their sensitivity, ordering Wriothesley to deliver
      them *exclusively* to him—a directive that underscores their value as both political
      leverage and a tool for dismantling the Plantagenet loyalists. The letters symbolize
      the fragile line between loyalty and treason in the court, and their seizure
      would deal a crippling blow to Mary’s defiance.
    status_before_event: Hidden within the Pole household at Hunsdon, likely stored
      in desks or chests. Their existence is known to Cromwell through surveillance,
      but their precise contents and locations are unknown to Wriothesley.
    status_after_event: The letters are now the object of an imminent raid. If found,
      they will be seized and delivered to Cromwell, becoming a critical asset in
      his campaign to consolidate power and neutralize opposition.
    global_id: ger_object_c96f10806b0a
