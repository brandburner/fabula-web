  title: Cromwell threatens Mary through Chapuys
  description: 'In a tense, private dinner at Austin Friars, Thomas Cromwell weaponizes
    his political leverage over Eustace Chapuys to deliver a veiled ultimatum to Princess
    Mary. Disguised as diplomatic counsel, Cromwell forces Chapuys to convey that
    Mary must abandon her claim to the throne, swear the oath of obedience to Henry
    VIII, and publicly repudiate her mother’s marriage—or face execution like Fisher
    and More. The exchange reveals Cromwell’s ruthless pragmatism and the precariousness
    of Mary’s position, while Chapuys becomes an unwilling conduit for royal intimidation.
    Cromwell’s threat underscores his willingness to eliminate even Henry’s kin to
    secure England’s future, and his own vulnerability is exposed when Chapuys mocks
    his lowborn origins and the fragility of his power. The scene escalates the conflict
    between Mary’s defiance and Henry’s demands, with Cromwell’s promise to Katherine
    of Aragon hanging unspoken over the confrontation. The tension peaks when Cromwell
    invokes the fates of executed loyalists, forcing Chapuys to confront the real
    stakes: Mary’s life depends on her submission.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 22
  sequence_in_scene: 29
  key_dialogue:
  - 'CHAPUYS: Let me be exact about what you ask of her. She must recognise that her
    mother’s marriage was of no effect and she must swear to uphold the child of a
    woman...'
  - 'CROMWELL: Old Bishop Fisher refused to take the oath and Henry executed him.
    Thomas More refused it and he too is shorter by a head.'
  - 'CHAPUYS: Henry will not kill his own daughter!'
  - 'CROMWELL: Oh, really? Who knows what Henry will do.'
  - 'CHAPUYS: I do not understand you, Cremuel. Why are you not afraid? You should
    be afraid. You are quite alone in this world. You have Henry’s favour, it’s true,
    but if he withdraws it? You know the Cardinal’s fate. And you have no affinity,
    no great family at your back, for - when all is said - you are a blacksmith’s
    son. Your whole life depends on the next beat of Henry’s heart, on his smile or
    frown.'
