  global_id: null
  title: Cromwell’s suppressed horror exposed
  description: A brutal flashback to Anne Boleyn’s execution—triggered by the French
    executioner’s call—unleashes Cromwell’s repressed trauma. The camera lingers on
    his face as the sword falls, his hand twitching toward the sign of the cross before
    he forces it into a fist. Gregory, standing beside him, witnesses this unguarded
    moment of vulnerability, his eyes widening as he realizes the depth of his father’s
    suppressed grief. The flashback fractures Cromwell’s usual composure, revealing
    the psychological toll of his political survival and the ghosts that haunt his
    ambition. The scene underscores the cost of his ruthlessness, as the past bleeds
    into the present, forcing him to confront the humanity he buries beneath his strategic
    mind.
