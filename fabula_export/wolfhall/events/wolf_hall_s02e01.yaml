  - object_uuid: ger_object_750332c0404f
    description_of_involvement: The Treason Act is referenced verbally by Margaret
      Pole as a legal tripwire criminalizing any vision of a future beyond Henry VIII’s
      reign. Cromwell seizes on this reference, using it to justify his coercion and
      frame the Poles’ defiance as treasonous. The Act serves as a narrative backdrop,
