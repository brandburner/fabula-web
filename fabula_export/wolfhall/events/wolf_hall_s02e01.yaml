  - 'MARY: I hear you are Lord Privy Seal. You are grown very grand, Lord Cromwell.
    I suspect you were always very grand, only we did not see it. Who knows God’s
    plan.'
  - 'CROMWELL: I understand Monsieur Chapuys has spoken to you. ... I hope brought
    home to you the peril in which you stand.'
  - 'MARY: I have felt... so... alone...'
  - 'CROMWELL: You have put all your strength into saying no. Now you must say yes.
    Do you think only weak people obey the law, because it terrifies them? The truth
    is far different. In obedience, there is strength and tranquillity.'
  - 'MARY: I often think, why did I not die in the cradle or the womb, like my brothers
    and sisters? It must be that God has a design for me. Soon I too may be elevated,
    beyond what seems possible now.'
  - 'CROMWELL: The will of your earthly father is plain. Your resistance has... has
    injured him, it’s made him ill.'
  - 'MARY: I believe it. It has made me ill too.'
