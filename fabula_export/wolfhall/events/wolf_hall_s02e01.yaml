  title: Henry elevates Cromwell amid Mary’s defiance
  description: 'In the King’s Presence Chamber at Hampton Court, Thomas Cromwell is
    formally elevated to Lord Privy Seal—a position once held by Anne Boleyn’s father—marking
    his official ascent as Henry VIII’s most trusted advisor. Henry, still euphoric
    from his marriage to Jane Seymour, praises Cromwell’s handling of Anne’s execution,
    calling it a delicate and firm success. The promotion is framed as a reward for
    Cromwell’s loyalty, but Henry’s mood shifts abruptly when he reveals Mary’s defiant
    letter, questioning her expectations of succession and her refusal to acknowledge
    him as head of the Church. Cromwell, caught between Henry’s volatile demands and
    his secret promise to Katherine of Aragon, assures the King he will secure Mary’s
    submission. The exchange underscores the precarious balance of power: Cromwell’s
    rise is tied to his ability to control Mary, while Henry’s paranoia about legitimacy
    and loyalty looms over the court. A subtle glance between Cromwell and Rafe hints
    at unspoken tensions beneath the surface of this public triumph, foreshadowing
    the challenges ahead in managing Mary’s defiance and the court’s shifting alliances.'
