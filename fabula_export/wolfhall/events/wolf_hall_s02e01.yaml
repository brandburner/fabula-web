  - object_uuid: ger_object_682a078b65c4
    description_of_involvement: '‘Douceur’ (Sweetness), the dapple grey mare, is a
      symbolic gift offered by Cromwell to incentivize Mary’s compliance. He describes
      her as a sweet dapple grey that can be with her tomorrow, framing the horse
      as a reward for her submission. The name ‘Douceur’ is ironic: the horse represents
      a fleeting taste of freedom, but her acceptance is contingent on Mary’s obedience.
      The horse’s role is to dangle the possibility of joy before her, making her
      submission feel like a choice rather than coercion. Her presence in Cromwell’s
      stables is a reminder of the court’s power to grant or withhold even small comforts,
      tying Mary’s desires to her compliance.'
