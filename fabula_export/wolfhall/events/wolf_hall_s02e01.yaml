    I know you agree with him... Mary knows what declaration I require of her. If
    she has entertained some notion that I will creep back to Rome, she is a greater
    fool than I thought her. So, good Privy Seal — as you love me and love my service
    — you will bring this matter to a conclusion. We will not come here to debate
    it again.'
  - 'RICHARD RICHE: Conclusion? What does that mean?'
  - 'EDWARD SEYMOUR: Christ, Cromwell. I think he wants you to kill her.'
