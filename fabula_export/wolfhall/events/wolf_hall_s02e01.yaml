  key_dialogue:
  - 'MARY: Thomas Howard. I wonder you dare. But you, you must think a woman a very
    feeble creature, if you expect her memory does not reach back a two-week. Would
    you use me as you do your wife? I mean, would you beat me?'
  - 'CROMWELL: I understand Monsieur Chapuys has spoken to you. Which disappointed
    you. I hope brought home to you the peril in which you stand.'
  - 'CROMWELL: You have put all your strength into saying no. Now you must say yes.
    Do you think only weak people obey the law, because it terrifies them? The truth
    is far different. In obedience, there is strength and tranquillity. And you will
    feel them. It will be like the sun after a long winter.'
  - 'MARY: I often think, why did I not die in the cradle or the womb, like my brothers
    and sisters? It must be that God has a design for me. Soon I too may be elevated,
    beyond what seems possible now.'
  - 'CROMWELL: When you come back to court, you can have all your heart desires. The
    King has spoken to me about what he will give you.'
