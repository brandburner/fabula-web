  title: Cromwell’s knife and diplomatic invitation
  description: 'In the quiet of his study, Thomas Cromwell removes a concealed knife
    from his coat—a silent, ever-present reminder of the court’s lethal politics—and
    places it deliberately on his desk. When Richard Cromwell questions its necessity,
    Cromwell’s response is chilling: the knife’s purpose is precisely because no circumstance
    justifies its use, underscoring the unpredictable violence of Tudor power. The
    moment shifts abruptly as Cromwell dispatches Richard to invite Chapuys to supper,
    framing the diplomatic overture as a calculated move to exploit the ambassador’s
    influence over Mary. The knife’s presence and Cromwell’s cold pragmatism reveal
    his mastery of psychological manipulation, while the invitation to Chapuys signals
    his strategic maneuvering to control the narrative around Mary’s submission. The
    scene establishes Cromwell’s dual role as both enforcer and diplomat, where every
    action—whether overt or veiled—serves his consolidation of power in Henry’s court.'
