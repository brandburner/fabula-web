  object_involvements:
  - object_uuid: ger_object_a89b06f5f900
    description_of_involvement: 'The Act of Attainder is the legal weapon Cromwell
      wields to shatter the Poles’ resistance. Though not physically present in the
      scene, its specter looms large as Cromwell describes its consequences: seizure
      of property and lands without trial. Margaret Pole’s reaction—her stillness
      and invocation of her father’s death by attainder—reveals the object’s psychological
      impact. Cromwell uses the Act as a tool of fear, leveraging its historical precedent
      to coerce the Poles into submission. The Act symbolizes the absolute power of
      the Crown and the fragility of noble status in Henry’s England.'
    status_before_event: An existing legal tool in Henry VIII’s arsenal, previously
      used to eliminate Margaret Pole’s father. Its threat is implicit but ever-present
      in the court’s power dynamics.
    status_after_event: The Act’s threat is reinforced as a means of control, ensuring
      the Poles’ compliance. Its invocation solidifies Cromwell’s dominance and the
      Crown’s authority over the nobility.
    global_id: ger_object_a89b06f5f900
  - object_uuid: ger_object_b256a11d0ede
    description_of_involvement: The letter Margaret Pole is forced to write to Mary
      Tudor is the primary instrument of Cromwell’s coercion. Dictated by Cromwell,
      it demands Mary’s obedience to Henry VIII and is designed to break her defiance.
      The letter’s authenticity is ensured by having Chapuys deliver it, preventing
      Mary from claiming it is forged. Its creation is a pivotal moment, as it forces
      Margaret to betray her own daughter, underscoring the moral cost of Cromwell’s
      manipulation. The letter embodies the theme of loyalty vs. survival, with Margaret’s
      signature sealing her compliance and Mary’s fate.
    status_before_event: Non-existent; Cromwell dictates its contents to Margaret
      Pole during the confrontation.
    status_after_event: Written and signed by Margaret Pole, the letter is entrusted
      to Chapuys for delivery to Mary. Its existence is a tangible result of Cromwell’s
      coercion, ensuring Mary’s submission and the Poles’ survival—at a cost.
    global_id: ger_object_b256a11d0ede
