  key_dialogue:
  - 'MARY: Thomas Howard. I wonder you dare. But you, you must think a woman a very
    feeble creature, if you expect her memory does not reach back a two-week. Would
    you use me as you do your wife? I mean, would you beat me?'
  - 'CROMWELL: Don’t read it. Then you can repudiate it later. If you have to.'
  - 'MARY: I often think, why did I not die in the cradle or the womb, like my brothers
    and sisters? It must be that God has a design for me. Soon I too may be elevated,
    beyond what seems possible now.'
  - 'MARY: My scalp aches. I would give anything to ride again. They do not let me
    have a saddle horse.'
