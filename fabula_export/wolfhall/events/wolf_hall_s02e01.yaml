- fabula_uuid: cand_evt_scene_a3b50ecd6d3e7d0d_02
  global_id: null
  title: Cromwell manipulates Chapuys with Mary’s letter
  description: "\n  In a tense, storm-lit confrontation at Austin Friars, Thomas Cromwell\
    \ strategically undermines Eustache Chapuys’ trust in Mary Tudor’s defiance by\
    \ revealing a letter where she addresses him as her 'chief friend in the world.'\
    \ The letter—likely planted by Cromwell—suggests a secret alliance between Mary\
    \ and Katherine of Aragon’s legacy, forcing Chapuys to question whether Cromwell’s\
    \ loyalty to Henry VIII is absolute or merely performative. Cromwell exploits\
    \ Chapuys’ unease, using the storm’s dramatic tension to unnerve the ambassador\
    \ while offering a conditional deal: Mary’s submission to Henry’s authority in\
    \ exchange for papal absolution and a restored place in the succession. The exchange\
    \ reveals Cromwell’s mastery of psychological manipulation, as he frames himself\
    \ as Mary’s only viable protector while subtly threatening her if she refuses.\
    \ Chapuys, though wary, is left questioning whether Cromwell’s offer is genuine\
    \ or another layer of deception. The scene underscores Cromwell’s dual role as\
    \ both Henry’s enforcer and Mary’s reluctant guardian, bound by a promise to Katherine\
    \ of Aragon that complicates his loyalty to the king.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 34
  sequence_in_scene: 51
  key_dialogue:
  - 'CHAPUYS: The Emperor will not suffer Mary to be mistreated. He will send ships.'
  - 'CROMWELL: She doesn’t want to live?'
  - 'CHAPUYS: Not at any price. It is her mother. I believe she vowed to Katherine
    she would never give way. Vows to the living may be set aside, with their permission.
    But the dead do not negotiate.'
  - 'CHAPUYS: She calls you her chief friend in the world! Why? Something her mother
    told her. It can only be that.'
  - 'CROMWELL: Tell her, if she ever is to compromise her conscience, now is the time,
    when she can do herself the most good.'
  - 'CHAPUYS: It seems to me you are saying to her, ‘You can live, but only as Cromwell
    permits.’ ‘You can reign even—but only through Cromwell’s grace.’'
  - 'CROMWELL: But tell her, if she does not give way now, if she will not sign the
    letter, she is dead to me. I shall never, never see her or speak to her again.'
