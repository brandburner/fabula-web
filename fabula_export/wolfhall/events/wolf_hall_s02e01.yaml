  title: Cromwell admits his existential dread
  description: 'In a rare unguarded moment during their ascent up the staircase at
    Austin Friars, Thomas Cromwell confesses to Eustache Chapuys that he feels ''in
    too deep''—a rare admission of vulnerability from a man who has spent years mastering
    the art of political survival. The flickering flashes of lightning through the
    windows mirror the instability of his position, as Cromwell acknowledges the psychological
    toll of his relentless maneuvering. This fleeting moment of honesty reveals the
    precariousness of his standing in Henry VIII’s court, where survival depends on
    calculated risk and ruthless pragmatism. The exchange underscores Cromwell’s internal
    conflict: his loyalty to the King clashes with his secret promise to Katherine
    of Aragon, and his usual confidence is momentarily eroded by the weight of his
    choices. The scene serves as a turning point, exposing the cracks in Cromwell’s
    otherwise impenetrable facade and foreshadowing the consequences of his actions.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 33
  sequence_in_scene: 49
  key_dialogue: &id023
  - 'CROMWELL: "Oh, I’m a dead man, Eustache. I’m in this matter so deep there is
    no going back."'
