      to ‘master’ its unruly members. While the Lords are not physically present in
      this scene, their influence looms large as Henry explains the need for Cromwell’s
      ‘grip’ to extend beyond the House of Commons. The organization represents the
      aristocratic resistance that Cromwell must navigate, particularly given the
      hostility of figures like Norfolk. Cromwell’s elevation to the Lords is both
      a reward for his past successes and a test of his ability to subdue noble opposition.
    active_representation: Through Henry’s direct reference to the House of Lords
      as ‘unruly’ and in need of a ‘master,’ as well as the implied challenge of managing
      noble factions (e.g., Norfolk’s disdain).
    power_dynamics: The House of Lords operates as a counterbalance to Henry’s authority,
      with its members wielding significant influence and resistance. Cromwell’s promotion
      is an attempt to bring this institution under tighter control, but his success
      is not guaranteed—especially given the entrenched rivalries and traditional
      power structures he must overcome.
