  title: Cromwell probes Pole’s defiance at L’Erber
  description: 'Thomas Cromwell arrives unannounced at L’Erber, the estate of the
    powerful Pole family, where gardeners are burning documents—likely Reginald Pole’s
    seditious writings. The scene opens with Cromwell’s voice cutting through the
    activity, demanding Reginald’s response to Henry VIII’s authority. The visual
    contrast between the Poles’ noble grounds and the destruction of their son’s work
    underscores Cromwell’s power to dismantle even the most entrenched families. His
    question—‘So, shall I tell the King that you repudiate him?’—is a direct challenge,
    framing Reginald’s silence as complicity. The moment reveals Cromwell’s strategy:
    he doesn’t just seek loyalty; he forces public submission, using the Poles’ own
    estate as a stage for their humiliation. The tension lies in what’s unspoken:
    Reginald’s absence from the scene suggests he’s already fled or been removed,
    leaving his family to face Cromwell’s wrath alone. This confrontation is a microcosm
    of Cromwell’s broader campaign to neutralize threats to Henry’s rule, where even
    noble bloodlines are not immune to his reach.'
