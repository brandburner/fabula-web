      and the blood of his ambition.
    - The open ledger ('Book Called Henry') where Cromwell transcribes Wolsey’s warnings,
      a record of his rise and the price he has paid.
    - The orange tawny garment draped by the window, a splash of color in an otherwise
      muted, tense space.
