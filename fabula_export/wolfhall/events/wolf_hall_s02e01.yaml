  title: Mary’s veiled confession to Cromwell
  description: In a tense, public procession at Chester Place, Mary Tudor—clad in
    mourning black and crimson—deliberately renames Cromwell’s gift horse *Pomegranate*,
    a direct reference to her mother Katherine of Aragon’s emblem. The act is a calculated
    provocation, signaling her defiance while acknowledging her debt to Cromwell.
    When she turns to him privately, her whispered confession—*‘I am bound to you
    now, Lord Cromwell. I am bound to pray for you during my life’*—reveals her emotional
    vulnerability and the asymmetrical power dynamic between them. Cromwell, caught
    off-guard, processes the weight of her words as she ascends the staircase, leaving
    him to grapple with the implications of her submission and the moral cost of his
    influence. The moment underscores Mary’s fragility, Cromwell’s strategic leverage,
    and the lingering specter of Katherine’s legacy, all while reinforcing the court’s
    treacherous alliances post-Anne Boleyn’s execution.
