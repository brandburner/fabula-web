  title: Wolsey’s Ghost Warns Cromwell of Political Threats
  description: 'In the solitude of his new study at Austin Friars, Thomas Cromwell
    sits alone, twisting the turquoise ring—a relic of his past—when the ghost of
    Cardinal Wolsey materializes at the window. Wolsey, dressed in his signature red,
    offers cynical but strategic advice: marriages secure kingdoms better than wars,
    and Cromwell should avoid wearing mourning colors that might provoke Henry VIII.
    Their exchange reveals Wolsey’s lingering influence and Cromwell’s unshaken confidence
    in his own political acumen. The ghost warns Cromwell of Stephen Gardiner’s lingering
    threat, a rival whose loyalties remain uncertain. Before Cromwell can respond,
    Wriothesley bursts in with a letter from Princess Mary, which Cromwell immediately
    conceals, ordering Wriothesley to forget its existence. The scene underscores
    Cromwell’s paranoia, his ruthless control over information, and the psychological
    weight of his past alliances—particularly his promise to Katherine of Aragon—while
    reinforcing the precarious balance of power in Henry’s court. The ghost’s warning
    and Cromwell’s swift suppression of Mary’s letter set up future conflicts, particularly
    the tension between strategic marriages and military threats, as well as the looming
    danger posed by Gardiner and Mary’s defiance.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 16
  sequence_in_scene: 17
  key_dialogue: &id003
  - 'WOLSEY: Good. Marriages work better than wars. If you want a kingdom, write a
    poem, pick some flowers, put on your bonnet and go wooing.'
  - 'CROMWELL: I’m not going to go before the bridegroom in mourning. Well, if he
    doesn’t, he can tell me to take it off.'
  - 'WOLSEY: You keep that man Wriothesley close. Gardiner, my old enemy.'
  - 'CROMWELL: This letter... it never came. You never saw it. Do you understand?'
