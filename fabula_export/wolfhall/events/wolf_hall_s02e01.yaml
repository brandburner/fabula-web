  object_involvements:
  - object_uuid: ger_object_3a34e736541d
    description_of_involvement: The pounce, a fine powder used to dry ink, is wielded
      by Cromwell to finalize Mary’s submission. As she signs the letter, he sprinkles
      the pounce onto the wet ink, patting it gently to absorb the moisture and prevent
      smudges. The act is methodical and clinical, underscoring the permanence of
      her signature. The pounce, ordinarily a mundane office supply, becomes a symbol
      of the irrevocability of her choice—once the ink is dry, there is no going back.
      Cromwell’s careful handling of the pounce mirrors his precise manipulation of
      Mary, ensuring that every detail is controlled and nothing is left to chance.
    status_before_event: Contained in a small pot on the table, unused and symbolic
      of the court’s administrative rituals.
    status_after_event: Used to dry the ink on Mary’s signed submission letter, its
      powder now mingled with the ink of her compliance, ensuring the document is
      legally binding.
    global_id: ger_object_3a34e736541d
  - object_uuid: ger_object_bd5b988cd5c2
    description_of_involvement: The Venetian crystal jug, a gift from John Shelton,
      serves as the emotional catalyst for Mary’s collapse. As she stumbles into the
      low table, the jug shatters at her feet, scattering glass and wine—a visceral
      metaphor for the fragility of her control. The sound and sight of the broken
      jug appall her, symbolizing the destruction of her defiance and the irreparable
      damage to her emotional state. Cromwell’s immediate offer to replace it ('I
      will send him another') is a calculated gesture, undermining the jug’s symbolic
      weight by reducing it to a replaceable object, much like Mary’s submission.
    status_before_event: Intact, placed on the low table in Mary’s privy chamber,
      a cherished possession symbolizing her connection to the court’s material world.
    status_after_event: Shattered into pieces on the floor, its fragments scattered
      amid the tension of the room. Its destruction marks the irreversible moment
      of Mary’s emotional unraveling.
    global_id: ger_object_bd5b988cd5c2
