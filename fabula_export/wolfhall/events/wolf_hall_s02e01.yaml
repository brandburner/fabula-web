      where Mary’s vulnerability is exposed and exploited. The fireplace, with its
      weak flame, underscores the coldness of her situation—both physically and emotionally.
      The room’s atmosphere is one of desperation and despair, where even the air
      feels heavy with the weight of her confinement.
