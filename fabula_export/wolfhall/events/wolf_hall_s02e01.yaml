  title: Cromwell orders Pole household raid
  description: In the King’s outer privy chamber, Cromwell reveals to Wriothesley
    his year-long surveillance of Reginald Pole and his network, exposing the family’s
    ties to Mary and the Catholic opposition. With calculated precision, he orders
    an immediate, unannounced raid on the Pole household to seize incriminating letters,
    leveraging the operation as both a tactical strike and a psychological warning
    to his enemies. The directive underscores Cromwell’s dominance over the court’s
    factions while tightening his grip on Henry’s favor in the post-Anne Boleyn power
    vacuum. Wriothesley’s discomfort at the task—particularly the prospect of confronting
    Mary again—highlights the personal stakes of Cromwell’s ruthless strategy. The
    exclusion of Gardiner from the operation further cements Cromwell’s control over
    information and loyalty within the court.
