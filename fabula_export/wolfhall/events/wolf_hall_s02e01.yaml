  global_id: null
  title: Henry’s Rage and Cromwell’s Misdirection
  description: In the King’s private chamber, Henry VIII’s fury erupts after receiving
    Reginald Pole’s treasonous book, which denounces his reign and calls for foreign
    invasion and domestic rebellion. His paranoia spirals as he connects Pole’s defiance
    to Mary Tudor’s refusal to submit, accusing her of colluding with the Pole family
    to place Reginald on the throne. Cromwell, sensing the danger of Henry’s escalating
    suspicions, deliberately downplays Mary’s agency, framing her as a naive pawn
    manipulated by her supporters. This calculated deflection—while ostensibly reassuring
    the King—subtly reinforces Cromwell’s control over the narrative of dissent, positioning
    himself as the only advisor capable of managing the crisis. The scene ends with
    Henry ordering Cromwell to uncover incriminating letters between Mary and Pole,
    setting in motion a high-stakes investigation that will test Cromwell’s loyalty
    to both the King and his secret promise to Katherine of Aragon. The tension hinges
    on Cromwell’s ability to manipulate Henry’s perception without exposing his own
    vulnerabilities, exposing the fragility of his position as the King’s most indispensable
    yet precarious advisor.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 25
  sequence_in_scene: 35
  key_dialogue:
  - 'HENRY: Pole. His book has come, out of Italy. My cousin, my trusted kin. I paid
    for his studies. I funded him to travel. How can he sleep at night? The one thing
    I cannot endure is ingratitude, disloyalty!'
  - 'CROMWELL: It must strike your majesty that such a rising cannot only be against
    somebody, but must also be for somebody.'
  - 'HENRY: There is an exchange of letters between Mary and Pole. I know it. Find
    them. And find out if Margaret Pole knew about her wretched son’s book. I want
    him back here from Italy. Promise what you like. Assure him what you like. I want
    to look him in the eye.'
