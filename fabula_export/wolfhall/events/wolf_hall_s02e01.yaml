  title: Cromwell reveals his vow to Katherine
  description: 'In the tranquil garden of Austin Friars, Thomas Cromwell and his inner
    circle—Rafe, Gregory, Wriothesley, Richard Cromwell, and Richard Riche—celebrate
    his recent political triumphs over wine. The mood is light, even familial, until
    Cromwell casually drops a bombshell: he made a private vow to Katherine of Aragon
    on her deathbed to protect her daughter, Mary. The revelation stuns his allies,
    who immediately grasp the moral and political implications of this secret. Gregory
    questions why Cromwell agreed to such a promise, while Richard Riche warns of
    the dangers of its exposure. Cromwell defends the vow as an act of kindness, though
    his metaphor of being a ''butcher’s dog'' underscores his self-awareness of his
    role as an enforcer of the state. The moment fractures the illusion of unity among
    his faction, exposing Cromwell’s isolation and the fragility of his power. The
    confession forces his allies to confront whether his loyalty lies with them—or
    with the ghosts of a fallen queen. The scene serves as a turning point, revealing
    Cromwell’s hidden vulnerability and setting up future conflicts as his allies
    grapple with this revelation.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 42
  sequence_in_scene: 70
  key_dialogue:
  - 'RAFE: Lord Cromwell could not be more to me if he were my own kin.'
  - 'CROMWELL: Yeah. And then he remembered who my parents were.'
  - 'WRIOTHESLEY: To your success, sir. Though you ran it to the danger point.'
  - 'CROMWELL: I promised her mother I would look after her.'
  - 'GREGORY: Why did you agree to it?'
  - 'CROMWELL: That’s the point of a promise, isn’t it? It wouldn’t have any value
    if you could see what it would cost you when you made it.'
  - 'RICHARD RICHE: Still, best if it goes no further. We will consign it to the shadows.'
