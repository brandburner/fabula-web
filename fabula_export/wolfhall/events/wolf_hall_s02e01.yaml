  title: Cromwell forces Pole family submission
  description: 'In a calculated confrontation at L’Erber, Cromwell dismantles the
    Pole family’s resistance by exposing Geoffrey’s secret correspondence with Chapuys,
    leveraging the threat of an Act of Attainder to coerce Margaret Pole into writing
    a letter that betrays her own daughter, Mary. The scene reveals Cromwell’s ruthless
    efficiency in dismantling opposition—using familial bonds as weapons—while Geoffrey’s
    defiance crumbles under the weight of Cromwell’s blackmail. Margaret’s insult
    (‘snake’) is repurposed by Cromwell, who recasts himself as a ‘dog’ bound to Henry’s
    will, solidifying his dominance over the court’s remaining factions. The exchange
    underscores Cromwell’s strategic mastery: he doesn’t just crush defiance; he weaponizes
    it to force compliance, ensuring Mary’s survival while consolidating his own power.
    The Poles’ capitulation marks a turning point in the court’s power dynamics, with
    Cromwell emerging as the unchallenged architect of Henry’s will.'
