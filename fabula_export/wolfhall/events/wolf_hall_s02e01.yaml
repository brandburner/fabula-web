  title: Anne’s Final Prayer on the Scaffold
  description: 'In a flashback to Anne Boleyn’s execution, the scene opens with a
    tight close-up of her face as she stands blindfolded on the scaffold, her breath
    shallow and uneven. The blindfold is adjusted by unseen hands, and Anne’s voice
    trembles as she whispers a desperate prayer—‘Christ have mercy. Jesu receive my
    soul’—revealing her raw terror beneath her usual defiance. The moment captures
    the stark contrast between her political cunning and her final, unguarded vulnerability.
    This flashback serves as a haunting reminder of the cost of Henry’s volatility
    and Cromwell’s complicity in her downfall, framing the episode’s central tension:
    the fragility of power and the irreversible consequences of betrayal. The silence
    around her prayer underscores her isolation, reinforcing the theme of abandonment
    that lingers over the court’s machinations in the present.'
