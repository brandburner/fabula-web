  global_id: null
  title: Mary renames Cromwell’s gift horse
  description: 'In a tense, ceremonial procession through Chester Place’s Lower Gallery,
    Mary Tudor—dressed in black and crimson—deliberately renames Cromwell’s gift horse
    *Pomegranate*, a direct reference to her mother Katherine of Aragon’s emblem.
    The act is a calculated defiance: public enough to assert her identity, private
    enough to signal her debt to Cromwell while subtly mocking his control. Lady Shelton’s
    discomfort and Mary’s whispered confession—*I am bound to you now*—reveal the
    fragility of their power dynamic. Cromwell, caught between his strategic indifference
    and the weight of his unspoken promise to Katherine, watches Mary ascend the staircase,
    her words lingering as a threat and a plea. The moment underscores Mary’s quiet
    resistance and Cromwell’s moral entanglement in the court’s shifting loyalties.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 40
  sequence_in_scene: 66
  key_dialogue:
  - 'LADY SHELTON: We have done our best with her. In my opinion, a gentler hue would
    have flattered her complexion, but she wished to be as regal as possible.'
  - 'CROMWELL: I’m more concerned that she doesn’t trip over her feet and land before
    her father in a heap.'
  - 'MARY: Lord Cromwell sent me a pretty mount from his own stable. Her name was
    Douceur. It is a good name, but I have renamed her. I have called her Pomegranate.
    It was my mother’s emblem.'
  - 'MARY: I am bound to you now, Lord Cromwell. I am bound to pray for you during
    my life.'
