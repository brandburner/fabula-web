  global_id: null
  title: Cromwell records Wolsey’s ghostly advice
  description: 'In the quiet of his study, Thomas Cromwell meticulously transcribes
    Cardinal Wolsey’s posthumous insights into a personal ledger—a document he calls
    *‘Book Called Henry’*—a private manual for navigating Henry VIII’s volatile nature.
    Wolsey’s ghost materializes, warning Cromwell of the ledger’s peril: knowledge
    is power, but power is also a liability. The exchange underscores Cromwell’s precarious
    position—his survival depends on mastering the art of indirect influence, yet
    the ledger itself becomes a potential weapon against him. Wolsey’s cynical advice
    (‘Never let Henry know he needs you’) reveals the court’s unspoken rules, while
    Cromwell’s methodical note-taking suggests his growing obsession with control.
    The scene serves as both a character study (Cromwell’s ruthless pragmatism) and
    a thematic warning (the dangers of wielding knowledge in a treacherous court).'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 23
  sequence_in_scene: 32
  key_dialogue:
  - 'WOLSEY: Never enter a contest of wills with the King. Don’t try to flatter him.
    Instead, give him something for which he can take credit.'
  - 'WOLSEY: Henry hates ingratitude; he hates disloyalty. He will give half his kingdom
    rather than be baulked. He refuses to be cheated of any part of his will.'
  - 'WOLSEY: Oh... a ‘Book Called Henry’! A dangerous thing to leave lying around.'
  - 'WOLSEY: Oh, never let Henry know he needs you. He doesn’t like to think he has
    incurred a debt to a subject.'
