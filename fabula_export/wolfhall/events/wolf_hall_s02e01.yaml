- fabula_uuid: cand_evt_scene_bfaf2bce3155d29d_02
  global_id: null
  title: Henry’s Promotion and Mary’s Defiance
  description: "\n  In the King’s Presence Chamber at Hampton Court, Henry VIII publicly\
    \ elevates Thomas Cromwell to Lord Privy Seal—a position once held by Anne Boleyn’s\
    \ father—while subtly probing Cromwell’s loyalty and competence. The promotion\
    \ is framed as a reward for Cromwell’s handling of Anne’s execution, but Henry’s\
    \ tone shifts abruptly when he reveals Mary’s defiant letter, accusing her of\
    \ undermining Jane Seymour’s influence and questioning Cromwell’s ability to control\
    \ her. Henry’s interrogation of Cromwell’s relationship with his own son, Gregory,\
    \ exposes his vulnerability and the king’s willingness to exploit personal bonds\
    \ for political leverage. Cromwell, sensing the trap, pledges to secure Mary’s\
    \ submission to Henry’s supremacy as head of the Church, but the exchange underscores\
    \ the fragility of his position and the volatile power dynamics at court. The\
    \ scene culminates in Henry’s cryptic question about Cromwell’s origins, hinting\
    \ at deeper suspicions and the king’s paranoia about those closest to him.\n  "
