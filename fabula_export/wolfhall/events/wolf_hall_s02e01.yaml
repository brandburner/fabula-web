  title: Cromwell reads Norfolk’s hostility
  description: 'As Cromwell and Suffolk approach Hunsdon House’s gatehouse, Cromwell’s
    sharp political instincts immediately detect Norfolk’s unspoken hostility. The
    Duke of Norfolk and his half-brother Thomas Howard the Lesser stand whispering
    together, their body language tense and suspicious. Suffolk, oblivious, rambles
    about Henry’s marital misfortunes, but Cromwell’s focus remains on Norfolk, whose
    distrust is palpable. When Suffolk notes Norfolk’s reluctance to leave Cromwell
    alone with Mary, Cromwell confirms his suspicion: Norfolk sees him as a threat
    to his own influence over the princess. The exchange underscores the fragile alliances
    at court and Cromwell’s ability to read power dynamics beneath surface courtesies.
    This moment exposes a critical fault line in their alliance, revealing Norfolk’s
    covert opposition to Cromwell’s growing sway over Mary and Henry’s decisions.
    The tension here foreshadows future conflicts, as Norfolk’s defiance will later
    manifest in more overt challenges to Cromwell’s authority.'
