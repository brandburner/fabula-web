      back at Cromwell. It becomes a mirror—not just of Wolsey’s face, but of Cromwell’s
      own fate, as if the glass is showing him a future he cannot yet see. The window’s
      role is symbolic: it is the portal through which the past intrudes, and the
      frame through which Cromwell must eventually confront his own reflection.'
