  global_id: null
  title: Wolsey’s Ghost Praises Cromwell’s Ruthlessness
  description: 'In the quiet solitude of his study, Thomas Cromwell is visited by
    the spectral figure of Cardinal Wolsey, who materializes in the candlelit darkness
    with an unsettling blend of paternal pride and mocking admiration. Wolsey begins
    by referencing Stephen Gardiner’s derisive epithet—''butcher’s dog''—not as an
    insult, but as a badge of loyalty, praising Cromwell for his ruthless elimination
    of political enemies, including Thomas More, Anne Boleyn, and others. Cromwell,
    though outwardly composed, responds with a mix of defiance and dark humor, topping
    up his wine as Wolsey’s list of the fallen grows. The ghost’s praise is laced
    with a veiled warning: he hints at the danger of Cromwell’s own ambition, suggesting
    that Henry VIII might suspect treasonous thoughts if Cromwell’s loyalty is ever
    questioned. Cromwell, however, dismisses the implication with a toast—''There
    are no endings. Only beginnings''—a declaration that underscores his unshakable
    resolve and moral detachment. The exchange forces Cromwell to confront the moral
    cost of his actions, even as he celebrates his own success in a moment of dark,
    self-aware triumph. The scene serves as a haunting reflection on power, loyalty,
    and the price of ambition, framing Cromwell’s journey as one of irreversible transformation.'
