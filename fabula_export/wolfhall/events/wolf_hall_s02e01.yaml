    description_of_involvement: The pounce is a small but critical object in the ritual
      of Mary’s submission. After she signs the letter, Cromwell sprinkles the fine
      powder onto the wet ink, patting it gently to absorb the moisture. This act
      is methodical, almost tender, but it serves to finalize her surrender. The pounce
      ensures the ink does not smudge—symbolizing that her signature, once given,
      cannot be undone. Its use is a metaphor for the irrevocability of her choice,
      no matter how coerced.
    status_before_event: Contained in a small pot on the table, unused and inert—awaiting
      the moment of Mary’s compliance.
    status_after_event: Used to dry the ink on Mary’s signed letter; now part of the
      document’s permanence, ensuring her submission is legally binding.
    global_id: ger_object_3a34e736541d
  - object_uuid: ger_object_bd5b988cd5c2
    description_of_involvement: 'The unsigned submission letter is the pivotal object
      of coercion in this scene. Cromwell produces it from his pocket, pressing it
      into Mary’s hands with the assurance that she can ‘repudiate it later’—a hollow
      promise designed to lower her guard. The letter symbolizes the erasure of her
      agency; its contents are never revealed, emphasizing that her signature is extracted
      through manipulation, not consent. When she signs, Cromwell immediately dries
      the ink with pounce, rolling it up with finality. The letter’s physical transformation—from
      folded secret to signed document—mirrors Mary’s emotional collapse: what begins
      as resistance ends in submission.'
    status_before_event: Folded and hidden in Cromwell’s pocket; a potential weapon
      of control, unseen by Mary until the moment of exploitation.
    status_after_event: Signed, dried with pounce, and rolled up—now a binding legal
      instrument in Cromwell’s possession, symbolizing Mary’s broken defiance.
    global_id: ger_object_bd5b988cd5c2
  - object_uuid: ger_object_acc4e846ae57
    description_of_involvement: The low table is a physical and symbolic obstacle
      in Mary’s unraveling. She stumbles into it, toppling the Venetian jug and shattering
      it—a moment of clumsy vulnerability that marks the beginning of her emotional
      collapse. The table’s sturdy presence contrasts with Mary’s fragility; it does
      not yield to her, just as the court will not yield to her defiance. The shattered
      jug becomes a metaphor for her broken resistance, its fragments scattering like
      her shattered dignity.
    status_before_event: Stable and unremarkable, bearing the Venetian jug; a mundane
