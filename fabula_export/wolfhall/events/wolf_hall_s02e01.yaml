- fabula_uuid: cand_evt_scene_8fea6c2c417a3e6c_01
  global_id: null
  title: Cromwell weighs Mary’s defiance through conflicting reports
  description: 'In the bustling outer courtyard of Hampton Court, Cromwell intercepts
    Rafe and Wriothesley after their mission to assess Mary’s resolve. Wriothesley,
    visibly shaken, describes Mary’s defiant refusal to accept the oath or renounce
    her title as *princess*, while her household—dominated by the Pole family—openly
    mocked Cromwell’s authority. His account paints a picture of unyielding resistance,
    with Mary demanding submission from her visitors and declaring her loyalty to
    Rome. Rafe, however, offers a more nuanced perspective: Mary’s defiance may be
    performative, a calculated act to shift blame onto Cromwell if she is forced to
    submit. His observation that she asked *why Cromwell himself did not come* suggests
    she is positioning herself as a martyr, waiting for a confrontation that would
    justify her compliance. The exchange forces Cromwell to confront a critical strategic
    dilemma: whether Mary’s resistance is genuine and requires brute force, or brittle
    and susceptible to psychological pressure. The revelation of a letter from Reginald
    Pole—received by Henry and described as ‘hot from the pit’—adds urgency, as it
    signals escalating tensions with Rome and the need for Cromwell to act decisively
    before the King’s volatility consumes them all. The scene underscores Cromwell’s
    precarious position: his power depends on controlling information, yet the court’s
    shifting loyalties and Mary’s defiance threaten to expose his vulnerabilities.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 24
  sequence_in_scene: 33
  key_dialogue:
  - 'WRIOTHESLEY: Never send me there again! Sir, the house, it was full of the Poles.
    They boasted that you were nought, that Mary was returning to court, that the
    Pope would be restored and the world put to rights again! When we went in, we...
    we greeted her as Lady Mary, but she was enraged. She demanded the title of *princess*,
    and that we should kneel to her. She says she’ll never take the oath. She cannot
    accept her father as head of the Church.'
  - 'RAFE: I don’t think she’s as strong in her resolve as her people think. She did
    ask, *‘Why does the Lord Privy Seal not come himself?’* It’s as if she’s waiting
    for you, sir, so she can tell all of Europe you enforced her. She can take the
    oath and it be no blame to her.'
  - 'CROMWELL: I do. [referring to the letter from Rome]'
