  title: Wolsey warns Cromwell of treasonous thoughts
  description: In the quiet of his study, Cromwell is visited by the ghost of Cardinal
    Wolsey, who arrives unannounced to deliver a veiled warning. Wolsey begins by
    invoking the derogatory nickname 'butcher’s dog'—a label Cromwell has embraced
    as a mark of his ruthless efficiency in eliminating the King’s enemies. The ghost
    praises Cromwell’s loyalty and the 'terrible vengeance' he has wrought on Wolsey’s
    former adversaries, including Thomas More, Anne Boleyn, and her allies. Yet beneath
    the flattery, Wolsey’s tone shifts, probing Cromwell’s own ambitions and hinting
    at the danger of treasonous thoughts reaching the King. Cromwell, undeterred,
    responds with a defiant toast—'no endings, only beginnings'—signaling his unshakable
    resolve and fatalistic acceptance of his moral corruption. The exchange underscores
    Wolsey’s lingering influence over Cromwell, even from beyond the grave, while
    revealing Cromwell’s calculated defiance and the precariousness of his position
    in Henry’s court. The scene foreshadows the divergent fates of the two men, with
    Wolsey’s spectral presence serving as both a cautionary figure and a dark mirror
    to Cromwell’s own ambitions.
