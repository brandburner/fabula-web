      to Henry’s policies and succession plans.
    influence_mechanisms:
    - The appointment of trusted advisors (e.g., Cromwell) to represent Henry’s interests
      and enforce his will.
    - The use of legal and political maneuvering to curb aristocratic resistance.
    - The threat of royal displeasure or punishment to maintain compliance.
    institutional_impact: The House of Lords’ ability to function as a check on royal
      authority or a tool for noble resistance is a direct threat to Henry’s consolidation
      of power. Cromwell’s promotion is a strategic move to align this institution
      with the King’s goals, but it also highlights the ongoing struggle between monarchical
      authority and aristocratic privilege. The event foreshadows the challenges Cromwell
      will face in managing this fractious body.
    internal_dynamics: The House of Lords is divided between those who support Henry’s
      reforms (e.g., Cromwell’s allies) and those who resist them (e.g., Norfolk and
      his faction). Internal debates over loyalty to the King versus loyalty to traditional
      noble interests create a volatile environment that Cromwell must navigate carefully.
