- fabula_uuid: cand_evt_scene_9d1afa399eaf421d_01
  global_id: null
  title: Henry’s Rage and Cromwell’s Enforcement
  description: 'In the Privy Council chamber, Henry VIII’s volatile fury erupts over
    Mary’s defiance, framing her refusal to acknowledge his authority as treason.
    His calm but menacing tone masks a dangerous instability, as he threatens to put
    his own daughter on trial—a move that would brand him a monster. Fitzwilliam,
    a trusted councillor, challenges Henry’s recklessness, warning that prosecuting
    Mary would destroy his reputation and escalate the crisis. Henry’s response is
    immediate and brutal: he orders Fitzwilliam’s removal, exposing the fragility
    of his authority and the court’s growing fear of his unpredictability. Cromwell
    seizes the moment, physically ejecting Fitzwilliam to demonstrate his loyalty
    to the King, though Henry sees through the act, recognizing Cromwell’s private
    agreement with Fitzwilliam’s concerns. The scene culminates with Henry’s chilling
    directive to Cromwell: resolve Mary’s defiance by any means necessary, leaving
    the implication of violence hanging in the air. The exchange underscores the perilous
    balance of power—Henry’s paranoia, Cromwell’s ruthless pragmatism, and the court’s
    complicity in a system where loyalty is enforced through fear and coercion. The
    moment also foreshadows Cromwell’s moral compromises, as he aligns himself with
    Henry’s will while secretly bound by his promise to Katherine of Aragon to protect
    Mary.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 31
  sequence_in_scene: 45
  key_dialogue:
  - 'HENRY: Today there is only one matter. The matter of my daughter. To be defied
    by her, to know that my own kin and cousins urge her on, to be reviled in my own
    house by that monster of ingratitude, Pole... So I warn you, if I hear so much
    as one voice raised in support of that errant creature my daughter, I shall know
    I am hearing treason. I am taking advice. I have called in the judges to consider
    what is the best way to bring her to trial.'
  - 'FITZWILLIAM: Jesus save us! Your flesh and blood? I implore you, think before
    you do this. You... you will make yourself a monster in the sight of all.'
  - 'FITZWILLIAM: You reckon with your enemies, not your friends. That you should
    consider bringing your own daughter before a court... Because what then? I’ll
    tell you now, she is guilty - what needs a judge? She will not swear the oath.
    She will say that she is not a bastard but a princess of England, and that you
    are no more head of the church than I am. And then what will you do? Cut off her
    head?'
  - 'HENRY: So, good Privy Seal — as you love me and love my service — you will bring
    this matter to a conclusion. We will not come here to debate it again.'
  - 'RICHARD RICHE: Conclusion? What does that mean?'
  - 'EDWARD SEYMOUR: Christ, Cromwell. I think he wants you to kill her.'
