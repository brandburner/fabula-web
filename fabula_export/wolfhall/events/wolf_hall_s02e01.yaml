  title: Cromwell Silences Fitzwilliam’s Defiance
  description: "\n  In the Privy Council chamber, Henry VIII’s volatile rage over\
    \ Mary’s defiance reaches a boiling point as he threatens to put his own daughter\
    \ on trial for treason. Fitzwilliam, the Duke of Richmond, risks his standing\
    \ by openly challenging Henry’s reckless plan, calling it monstrous and warning\
    \ that it will turn the King into a tyrant in the eyes of the realm. His outburst—‘You\
    \ reckon with your enemies, not your friends’—exposes the court’s deep fractures,\
    \ as Fitzwilliam predicts Mary’s inevitable execution if she refuses the oath.\
    \ Cromwell, sensing the danger of Fitzwilliam’s defiance escalating Henry’s paranoia,\
    \ physically intervenes: he trips the duke, drags him toward the doors, and forcibly\
    \ removes his chain of office, hissing a warning that Fitzwilliam’s head is at\
    \ stake. The act is a calculated display of loyalty to Henry, but also a ruthless\
