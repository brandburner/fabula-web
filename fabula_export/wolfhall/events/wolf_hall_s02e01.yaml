  object_involvements:
  - object_uuid: ger_object_a89b06f5f900
    description_of_involvement: 'The Act of Attainder is the legal specter that haunts
      the entire confrontation, a weapon Cromwell wields with chilling precision.
      He invokes it not as a physical document but as a concept—‘the common law has
      ways to protect the realm from traitors’—and its mere mention paralyzes Margaret
      Pole. The Act’s power lies in its arbitrariness: it allows Cromwell to seize
      all property and lands ‘without need of trial,’ reducing the Poles to paupers
      in an instant. Margaret’s stillness when Cromwell references it reveals her
      trauma—her father died this way—and underscores the Act’s role as a tool of
      psychological terror. It is the ultimate leverage, the reason the Poles cannot
      refuse Cromwell’s demands. The Act is not just a law; it is a guillotine, and
      Cromwell holds the rope.'
    status_before_event: A standing legal tool in Henry VIII’s arsenal, previously
      used to destroy Margaret’s father. Its existence is well-known to the court,
      but its invocation here is a calculated threat, a reminder of its power.
    status_after_event: The Act’s threat looms larger than ever, now tied to the Poles’
      immediate fate. Its invocation has forced their compliance, but the threat remains—Cromwell
      has shown he is willing to use it, and the Poles know they are one wrong move
      away from ruin.
    global_id: ger_object_a89b06f5f900
  - object_uuid: ger_object_b256a11d0ede
    description_of_involvement: 'The letter to Mary Tudor is the centerpiece of Cromwell’s
      coercion, a tool designed to turn Margaret Pole’s maternal bond into a weapon
      against her daughter. Cromwell dictates its contents with surgical precision—‘Saying
      the King is to be obeyed’—forcing Margaret to repudiate her own beliefs and
      betray Mary’s defiance. The letter is not just a message; it is a noose, a public
      repudiation that will be carried by Chapuys to avoid forgery claims. Its delivery
      ensures Mary’s submission while stripping the Poles of their last moral high
      ground. The letter’s creation is the climax of the scene, the moment where Cromwell’s
      power is absolute and the Poles’ defiance collapses. Its symbolic weight is
      immense: it represents the death of loyalty, the triumph of fear, and the erosion
      of familial bonds in the face of political survival.'
    status_before_event: Nonexistent—merely an idea in Cromwell’s mind, a demand he
      imposes on the Poles. Its contents are dictated in the moment, tailored to maximize
      psychological impact.
    status_after_event: The letter is now a tangible threat, a document that will
      be carried by Chapuys to Mary Tudor. Its existence is a victory for Cromwell
      and a defeat for the Poles, but its delivery—and Mary’s reaction—remains uncertain,
      adding a layer of tension to the aftermath.
    global_id: ger_object_b256a11d0ede
  - object_uuid: ger_object_c8cd2489ebbd
    description_of_involvement: 'Reginald Pole’s treasonous book is the inciting incident
      and the sword of Damocles hanging over the Poles’ heads. Described as ‘hot from
      the pit’ and ‘signed by the devil,’ it is the physical manifestation of the
      family’s defiance and the catalyst for Cromwell’s confrontation. The book’s
