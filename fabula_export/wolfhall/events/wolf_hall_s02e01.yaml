  global_id: null
  title: Henry tests Cromwell’s loyalty with Mary
  description: In the King’s Presence Chamber, Henry VIII abruptly shifts from praising
    Cromwell’s political acumen to probing his emotional vulnerabilities. After promoting
    Cromwell to the House of Lords and offering him Thomas Boleyn’s former office
    as Lord Privy Seal, Henry pivots to Mary’s defiance, questioning whether Cromwell
    has been secretly communicating with her. The King weaponizes paternal concern,
    asking if Cromwell’s own son Gregory defies him—a loaded question that exposes
    Cromwell’s private fears about fatherhood and loyalty. Cromwell, sensing the trap,
    quickly pledges to convince Mary to submit, but Henry’s probing about Cromwell’s
    sleep and origins hints at deeper distrust. The exchange underscores Henry’s ability
    to oscillate between reward and threat, forcing Cromwell to navigate both political
    advancement and personal scrutiny. The moment reveals the precarious balance of
    power in their relationship, where even Cromwell’s most trusted position cannot
    shield him from Henry’s volatile scrutiny or his own emotional Achilles’ heel—his
    son.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 18
  sequence_in_scene: 23
  key_dialogue:
  - 'HENRY: My daughter Mary has sent me a letter. I don’t recall giving her permission
    to write to me. Did you?'
  - 'CROMWELL: No, sire.'
  - 'HENRY: She seems to entertain expectations about her future as my heir. As if
    she believes Jane will fail in giving me a son.'
  - 'CROMWELL: The Queen will not fail you, sir.'
  - 'HENRY: Your son, Gregory - does he defy you?'
  - 'CROMWELL: No, sir.'
  - 'HENRY: Nor should any dutiful child. Yet my daughter, Mary, refuses to take the
    oath and acknowledge me as head of the church. I will not tolerate this defiance.
    Not from a child to whom I gave life.'
  - 'CROMWELL: She loves you, majesty. She loves you. I will convince her to take
    the oath.'
  - 'HENRY: Do you sleep at nights, Crumb? You bear a burden of work no other man
    has carried.'
