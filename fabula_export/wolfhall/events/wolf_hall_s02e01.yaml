  title: Cromwell reveals his secret vow
  description: 'In the tranquil garden of Austin Friars, Thomas Cromwell and his inner
    circle—Rafe, Gregory, Wriothesley, Richard Cromwell, and Richard Riche—raise a
    toast to his recent political triumphs. The moment of celebration is abruptly
    shattered when Cromwell confesses to a long-hidden promise: a deathbed oath to
    Katherine of Aragon to protect her daughter, Mary. The revelation stuns his allies,
    exposing the moral weight of his secrecy and the fragility of his power. Cromwell’s
    admission forces him to confront his own identity as a ruthless instrument of
    state (the ''butcher’s dog'') while simultaneously revealing a rare act of personal
    loyalty. The tension escalates as the group grapples with the implications of
    this secret, with Riche urging discretion and Richard Cromwell defending it as
    an act of kindness. The scene underscores Cromwell’s isolation, his strategic
    brilliance, and the moral contradictions at the heart of his ambition. His self-characterization
    as a ''good dog'' serves as both a justification and a warning—he will obey his
    master (Henry VIII) but also honor his own unspoken code, even at great personal
    risk.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 42
  sequence_in_scene: 71
  key_dialogue:
  - 'RAFE: Lord Cromwell could not be more to me if he were my own kin.'
  - 'CROMWELL: Yeah. And then he remembered who my parents were.'
  - 'CROMWELL: I promised her mother I would look after her.'
  - 'GREGORY: Why did you agree to it?'
  - 'CROMWELL: That’s the point of a promise, isn’t it? It wouldn’t have any value
    if you could see what it would cost you when you made it.'
  - 'CROMWELL: Back in the Cardinal’s day, they called me the butcher’s dog. And that’s
    what I am. I’m a good dog. You set me to guard something, I’ll do it.'
