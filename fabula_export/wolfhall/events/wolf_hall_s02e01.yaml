  title: Cromwell dismisses Gregory’s innocence
  description: In the crowded King’s Presence Chamber during Henry VIII’s wedding
    festivities, Thomas Cromwell navigates the court with his son Gregory and nephew
    Richard Cromwell. Wriothesley urgently warns Cromwell that Geoffrey Pole seeks
    a meeting, forcing Cromwell to assert his dominance by refusing to be summoned.
    Meanwhile, Gregory—naively speculating about Henry’s wedding night—reveals his
    ignorance of courtly realities, prompting Cromwell’s sharp correction. The exchange
    underscores Cromwell’s dual role as a ruthless political operator and a father
    struggling to shield Gregory from the court’s moral decay. Cromwell’s sarcastic
    remark about verifying Henry’s consummation of the marriage exposes his cynicism
    and the precarious nature of royal legitimacy, while Gregory’s innocence highlights
    the generational divide between the court’s brutal pragmatism and the idealism
    of the young. The scene serves as a microcosm of the court’s obsession with power,
    secrecy, and the fragility of loyalty, reinforcing Cromwell’s burden as both a
    strategist and a protector of his son’s fragile worldview.
