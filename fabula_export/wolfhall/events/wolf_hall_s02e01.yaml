  global_id: null
  title: Henry Orders Cromwell to Hunt Poles
  description: In a tense private audience, Henry VIII rages over Reginald Pole’s
    treasonous book, which denounces his reign and calls for foreign invasion and
    domestic rebellion. The King’s paranoia peaks as he connects Pole’s defiance to
    Mary Tudor’s refusal to submit, accusing the Pole family of plotting to marry
    Reginald to Mary and seize the throne. Cromwell, feigning surprise, subtly deflects
    blame from Mary by framing her as a naive pawn manipulated by her supporters.
    Henry, however, remains skeptical of Cromwell’s defense of Mary, revealing his
    deep-seated distrust of both his daughter and his advisor’s motives. The King
    demands Cromwell uncover incriminating letters between Mary and Reginald, probe
    Margaret Pole’s loyalty, and force Reginald’s return from Italy—orders that escalate
    the court’s atmosphere of suspicion and violence. This confrontation marks a turning
    point in Henry’s growing paranoia and Cromwell’s role as the king’s ruthless enforcer,
    while also exposing the fragility of Cromwell’s own position as he walks the tightrope
    between loyalty to Henry and his secret promise to Katherine of Aragon to protect
    Mary.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e01
  scene_sequence: 25
  sequence_in_scene: 36
  key_dialogue:
  - 'HENRY: Pole. His book has come, out of Italy. My cousin, my trusted kin. I paid
    for his studies. I funded him to travel. How can he sleep at night? The one thing
    I cannot endure is ingratitude, disloyalty!'
  - 'CROMWELL: It must strike your majesty that such a rising cannot only be against
    somebody, but must also be for somebody.'
  - 'HENRY: There is an exchange of letters between Mary and Pole. I know it. Find
    them. And find out if Margaret Pole knew about her wretched son’s book. I want
    him back here from Italy. Promise what you like. Assure him what you like. I want
    to look him in the eye.'
