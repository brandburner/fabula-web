  title: Cromwell’s Interrogation Begins
  description: 'The interrogation of Thomas Cromwell commences in the Tower’s royal
    apartments, where his accusers—Richard Riche, Norfolk, and Gardiner—arrive with
    veiled threats and a premeditated strategy to extract a confession. Cromwell,
    seated opposite Riche, immediately challenges the unnatural alliance between Gardiner
    and Norfolk, exposing their shared hostility as a calculated front. His defiance
    is met with Norfolk’s blunt warning that they will ‘have out of you’ the truth
    by any means necessary, to which Cromwell responds with cold composure, asserting
    he will offer only what he knows and believes. The tension escalates as Wriothesley
    enters, avoiding Cromwell’s accusatory gaze, and Riche pivots to the incriminating
    purple doublet—a symbolic focal point of the inquisition. The scene establishes
    the high-stakes confrontation: Cromwell’s survival hinges on his ability to outmaneuver
    his enemies, whose accusations are less about evidence than the King’s capricious
    will. The power dynamics are laid bare, with Cromwell’s wit and defiance serving
    as his only weapons against a system designed to break him.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 13
  sequence_in_scene: 16
  key_dialogue:
  - 'CROMWELL: You know, I never knew you two to be such great comrades, till lately.
    More likely to abuse each other roundly than sit together as friends.'
  - 'NORFOLK: We might not always have seen eye to eye but one thing we have in common:
    when we scent the truth, we stick on the trail. So beware, Cromwell. Whatever
    we suspect, we will have out of you, one way or the other.'
  - 'CROMWELL: It is as crude a threat as I''ve heard, my lord. But you have no need
    for it. I will tell you the truth, as I know it and believe it, and beyond that
    there is nothing for you.'
