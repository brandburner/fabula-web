  title: Cromwell’s Isolation and Sacrifice
  description: 'In the suffocating confines of the Tower, Cromwell receives Rafe’s
    report on Parliament’s silent reception of his downfall—a stark confirmation of
    his political abandonment. The revelation that even Edward Seymour, a cautious
    ally, did not speak for him underscores the depth of his isolation. When Rafe
    mentions Cranmer’s letter to the King, Cromwell’s rueful smile masks the crushing
    weight of betrayal from his closest remaining ally. His physical decline (pushing
    away his uneaten meal) mirrors his emotional collapse, while his strategic caution
    in warning Rafe to suppress Richard’s defiance reveals his lingering grasp of
    Henry’s volatile mind. The scene culminates in Cromwell’s self-sacrificial directive:
    he forbids Richard and Gregory from visiting, prioritizing their safety over his
    own desperate need for connection. The moment crystallizes his political ruin
    and the brutal cost of his ambition, as paternal instinct becomes his sole anchor
    in a world that has turned against him.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 11
  sequence_in_scene: 13
  key_dialogue:
  - 'CROMWELL: How did Parliament take it?'
  - 'RAFE: In silence.'
  - 'CROMWELL: Did anyone speak for me?'
  - 'RAFE: Yes. But I was not heard.'
  - 'CROMWELL: Not Cranmer?'
  - 'RAFE: He’s writing the King a letter.'
  - 'CROMWELL: Tell him he must not do that. He must rest quiet, and he must keep
    away from Gregory. Both of them must keep away from you. You must do nothing that
    could be thought of as conspiracy.'
