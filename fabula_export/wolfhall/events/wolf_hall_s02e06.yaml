  title: Gregory demands autonomy from Thomas
  description: 'In a private, emotionally charged confrontation at Austin Friars,
    Gregory Cromwell—overshadowed by his father’s relentless ambition—directly challenges
    Thomas for the first time. His plea is not for power or influence but for the
    most basic dignity: a small plot of land and the freedom to build a life with
    his wife, unburdened by Thomas’s legacy. The request is framed as a desperate
    bid for recognition, exposing the generational fracture between them. Thomas’s
    silence in response underscores the depth of their estrangement, where paternal
    validation has been withheld so long that Gregory must beg for scraps of autonomy.
    The scene functions as a turning point, revealing how Thomas’s obsession with
    control has starved his son of self-worth, and how Gregory’s quiet rebellion marks
    the beginning of his own path—one that will inevitably diverge from his father’s.
    The moment is raw, unmediated by Thomas’s usual political maneuvering, laying
    bare the cost of his ambition on those closest to him.'
