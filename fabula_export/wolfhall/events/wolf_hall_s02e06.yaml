  title: Cromwell’s Last Confession to Wolsey
  description: In a haunting, memory-driven flashback, Thomas Cromwell confronts the
    ghostly presence of Cardinal Wolsey in the Tower of London, seeking absolution
    for his loyalty and actions. The exchange is charged with unresolved guilt—Cromwell
    insists he never betrayed Wolsey, but his hesitation reveals deep self-doubt.
    Wolsey’s skeptical response, delivered with quiet ambiguity, forces Cromwell to
    confront the moral compromises of his rise to power. The scene underscores the
    fragility of his self-justification as he faces execution, framing his downfall
    not just as political ruin but as a reckoning with his own conscience. The memory
    serves as a thematic bridge, linking Cromwell’s past loyalty to Wolsey with his
    present abandonment by Henry VIII, reinforcing the idea that his true allegiance
    was never to the King but to the man who shaped him.
