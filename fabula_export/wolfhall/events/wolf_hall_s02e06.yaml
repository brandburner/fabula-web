  key_dialogue:
  - 'RICHARD RICHE: You wear a ring the Cardinal gave you. It possessed certain properties...'
  - 'CROMWELL: You covet it, Ricardo? I''ll give it to you. It will save you from
    drowning. It also preserves the wearer from wild beasts and secures a Prince''s
    favour. It doesn''t seem to be working very well though, does it?'
  - 'RICHARD RICHE: It also, allegedly, makes princesses fall in love with you.'
  - 'CROMWELL: I''m turning them away daily.'
  - 'RICHARD RICHE: Well, you didn’t turn away Lady Mary, did you? You presumed, and
    the King knows it, to insinuate yourself with her, to ingratiate yourself, so
    that she referred to you as... My only friend.'
  - 'CROMWELL: I was her only friend. Mary would be dead, if I hadn’t persuaded her
    to obey her father.'
  - 'GARDINER: Perhaps because you thought she would reward you.'
  - 'CROMWELL: You tell me. What makes the best story? Do I seduce her? Did I enforce
    her? Come on, Stephen—I no more meant to marry her than you did.'
  - 'GARDINER: Would you kindly address me as what I am.'
  - 'CROMWELL: I beg your pardon, my lord Bishop.'
  - 'RICHARD RICHE: You gave Mary a ring in the summer of 1536.'
  - 'CROMWELL: It wasn’t a lover’s ring. It was... it was a piece to wear around her
    neck. Because it was too heavy. There were too many words. Words enjoining obedience.'
  - 'CROMWELL: I wanted to protect her. From you, my lord Norfolk. And from your niece.'
