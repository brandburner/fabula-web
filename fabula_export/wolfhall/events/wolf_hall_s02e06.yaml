  title: Cromwell shares final quiet moment with Gregory
  description: 'In a rare, unguarded moment during Gregory’s wedding night, Thomas
    Cromwell sits beside his son in the dimly lit Austin Friars. The scene is intimate
    yet heavy with unspoken tension—Cromwell, now imprisoned and awaiting execution,
    clings to this fleeting connection with Gregory, whose future he has secured at
    the cost of his own ruin. The silence between them speaks volumes: Cromwell’s
    regret for the life he could not give his son, Gregory’s quiet grief for the father
    he is losing. This moment underscores Cromwell’s duality—a man who wielded immense
    power yet now faces his end with nothing but the fragile remnants of familial
    love. The contrast between the warmth of the wedding night and the cold certainty
    of Cromwell’s fate looms over them, making this brief respite all the more poignant.
    It is a final, wordless exchange between father and son, where duty and love collide
    in the shadow of Henry’s wrath.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 27
  sequence_in_scene: 41
  key_dialogue:
  - 'GREGORY: (softly) Father...'
  - 'CROMWELL: (quietly) You’ll be safe now. That’s all that matters.'
  - 'GREGORY: (whispering) I don’t want to be safe if it means losing you.'
