- fabula_uuid: cand_evt_scene_01dd38f37718b24b_01
  global_id: null
  title: Cromwell’s Final Walk to Execution
  description: Thomas Cromwell, stripped of his power and dignity, is paraded through
    a jeering crowd toward the scaffold at Tower Hill. The once-mighty statesman—now
    a broken man in a tattered robe—moves with deliberate slowness, his face a mask
    of stoic resignation. The crowd’s taunts and spittle mark the final humiliation
    of a man who once held the fate of England in his hands. His escort, William Kingston,
    remains impassive, fulfilling his duty without cruelty but offering no comfort.
    Cromwell’s gaze lingers on the faces around him, not with fear, but with a quiet,
    almost detached awareness of the irreversible shift from power to powerlessness.
    The scaffold looms ahead, a stark symbol of Henry VIII’s merciless will, and Cromwell’s
    fate is sealed by the weight of his past choices. This moment is not just an execution;
    it is the public erasure of a man who once reshaped a kingdom, now reduced to
    a spectacle of the King’s wrath. The crowd’s jeers fade into the background as
    Cromwell’s focus narrows on the executioner waiting above, his final act of defiance
    not in words, but in the unshaken composure of a man who has already accepted
    his end.
