  global_id: null
  title: Cromwell’s Final Command to Rafe
  description: 'In a private, emotionally charged moment within the Tower of London,
    Thomas Cromwell—now resigned to his impending execution—acknowledges Rafe’s loyalty
    and recounts the pivotal moment he rescued Rafe as a child, cementing their bond
    as family. The scene shifts from gratitude to devastation as Cromwell delivers
    a brutal directive: Rafe must ensure Gregory publicly disowns him to shield the
    family from Henry VIII’s wrath. Cromwell’s weariness with political violence (''axe-work'')
    and his defiant assertion that Henry will answer for his crimes reveal his fractured
    psyche—both broken and unbowed. The exchange underscores the cost of Cromwell’s
    ambition, the fragility of familial protection, and the irreversible collapse
    of his world. Rafe’s grief and Cromwell’s final embrace frame the scene as a heartbreaking
    farewell, where love and sacrifice are weaponized by the state’s cruelty.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 32
  sequence_in_scene: 49
  key_dialogue:
  - 'CROMWELL: You did more than I had any right to expect.'
  - 'RAFE: When I was a little child... you came for me, brought me on a journey.
    You set me by the fire and said, ''This is where you live now, Rafe. We will be
    your family now... we will be good to you, never fear.'' I had just left my mother
    that day and I did not know where I was. I had never seen London, still less your
    house, but I never cried, did I? I never cried.'
  - 'CROMWELL: It is time that Gregory wrote a letter repudiating me. He should speak
    ill of me. Say he doesn’t know how he came to be related to such a traitor. He
    should plead for the chance to redeem my errors and crimes, by serving his majesty
    in the years to come.'
  - 'CROMWELL: I couldn’t do it again, you know, Rafe. I couldn’t. The sleepless toil,
    the axe-work. When Henry dies and goes to judgment, he will answer for me. And
    he will have to account for what he did to Cromwell.'
