  title: Cromwell learns of his household’s dissolution
  description: 'In the Tower’s royal apartments, Cromwell clings to fragile hope as
    Rafe delivers Cranmer’s carefully balanced letter—a plea for mercy that also acknowledges
    Cromwell’s potential treason. The letter’s mixed tone (both defense and condemnation)
    leaves Cromwell momentarily optimistic, but Rafe’s bitter outburst reveals the
    depth of his own despair. The moment shatters when Rafe delivers the devastating
    news: Wriothesley, acting on Henry’s orders, has begun dismantling Cromwell’s
    household at Austin Friars, a calculated move to strip him of influence and resources.
    Cromwell’s initial shock gives way to defiance as he grips Rafe’s hand, urging
    him not to yield. The exchange underscores Cromwell’s refusal to surrender, even
    as his power crumbles around him. This event marks a turning point in Cromwell’s
