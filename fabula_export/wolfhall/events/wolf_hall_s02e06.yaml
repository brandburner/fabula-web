  title: Wolsey receives last rites
  description: In the dim, flickering candlelight of Leicester Abbey, Cardinal Wolsey
    lies dying, his once-powerful frame reduced to frailty. Cavendish, his loyal servant,
    stands at his bedside alongside a priest administering the Last Rites. The scene
    is intimate and solemn, underscoring the irreversible collapse of Wolsey’s ambition
    and the fragility of mortal power. Wolsey’s final moments serve as a poignant
    parallel to Cromwell’s own impending downfall, reinforcing the theme of the inescapable
    reckoning that awaits those who wield power in the service of a capricious king.
    The ritualistic nature of the Last Rites contrasts sharply with the political
    machinations that defined Wolsey’s life, highlighting the futility of his earthly
    pursuits. This moment is not just a farewell but a symbolic passing of the torch—one
    that Cromwell, now facing his own execution, cannot help but reflect upon as a
    harbinger of his fate.
