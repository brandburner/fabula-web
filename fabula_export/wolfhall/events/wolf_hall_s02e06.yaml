  title: Dorothea’s nightmare execution command
  description: "\n  In the suffocating, candlelit quire of Shaftesbury Abbey, Dorothea’s\
    \ nightmare reaches a visceral peak as the executioner’s voice—disembodied and\
    \ menacing—shatters the silence. The French command *‘A porter l’épée’* (Bring\
    \ forth the sword) echoes like a death knell, forcing her to confront the inescapable\
    \ weight of Cromwell’s impending execution. The moment is a psychological rupture:\
    \ Dorothea’s physical spin toward the camera (and the viewer) mirrors her internal\
    \ unraveling, as if the executioner’s voice is both a hallucination and an accusation.\
    \ The scene blurs the line between dream and reality, exposing her repressed guilt\
    \ over her complicity in Cromwell’s downfall. The omission of her reaction (marked\
    \ ‘OMITTED OMITTED’) heightens the tension, leaving her emotional collapse implied\
    \ but undeniable. This beat serves as a visceral manifestation of Dorothea’s fractured\
    \ psyche, where her nightmares force her to face the consequences of her choices—both\
    \ as a witness and an unwitting participant in Cromwell’s fate.\n  "
