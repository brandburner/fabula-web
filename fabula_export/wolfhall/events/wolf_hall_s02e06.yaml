  global_id: null
  title: Rafe’s Delayed Warning Reveals Betrayal
  description: 'In the claustrophobic isolation of his Tower cell, Thomas Cromwell’s
    fleeting moment of human connection—an embrace with his loyal protégé Rafe—is
    abruptly shattered when Rafe admits he was delayed by Wriothesley’s calculated
    interference. The revelation exposes the fragility of Cromwell’s remaining alliances:
    even those closest to him are now compromised by political maneuvering. Rafe’s
    shame and Cromwell’s quiet acceptance underscore the irreversible erosion of trust,
    while the subtext of Wriothesley’s sabotage foreshadows the depth of the conspiracy
    against Cromwell. The scene pivots from warmth to cold calculation, reinforcing
    the theme that Cromwell’s downfall is not merely Henry’s whim but the cumulative
    result of betrayals from all sides—including those he once trusted implicitly.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
