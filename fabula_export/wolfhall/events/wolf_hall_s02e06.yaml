  global_id: null
  title: Riche delivers damning treason testimony
  description: 'In this climactic interrogation sequence, Richard Riche escalates
    the charges against Thomas Cromwell by introducing the most explosive accusation
    yet: that Cromwell confessed to plotting armed rebellion against King Henry VIII
    if the monarch ever considered returning to Rome. The revelation arrives midway
    through a relentless cross-examination where Cromwell’s political enemies—Norfolk,
    Gardiner, and Wriothesley—systematically dismantle his reputation, exposing his
    perceived ambition to manipulate the succession through Lady Mary. Riche’s testimony,
    delivered with bureaucratic precision, transforms private ambition into public
    treason, framing Cromwell’s loyalty as a direct threat to the Crown. The moment
    marks a turning point in the trial, as Cromwell’s defiance crumbles under the
    weight of fabricated evidence and his own uncharacteristic recklessness. The interrogation
    reveals the fragility of his power, the volatility of Henry’s will, and the political
    maneuvering that will determine his fate. Cromwell’s attempts to deflect with
    wit and logic only underscore the inevitability of his downfall, as his interrogators
    exploit his past actions—his friendship with Lady Mary, his correspondence with
    Chapuys, and his alleged boasts of rebellion—to construct a narrative of treachery.
    The scene culminates in Cromwell’s admission of the treasonous words, delivered
    with a mix of defiance and resignation, sealing his fate in the eyes of the King’s
    council.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 15
  sequence_in_scene: 26
  key_dialogue:
  - 'RICHARD RICHE: ''Let me remind you. You were heard by a witness here, at the
    Tower, to utter certain treasonable words: that you would maintain your own opinion
    in religion. That you would never allow the King to return to Rome, and... these
    are the words alleged, that: ‘If he would turn, yet I would not turn; and I would
    take the field against him, my sword in my hand.'''
  - |-
    CROMWELL: 'I wanted to protect her.'
    NORFOLK: 'From whom?'
    CROMWELL: 'From you, my lord Norfolk. And from your niece.'
  - |-
    GARDINER: 'The King believes you meant to place Mary on the throne and rule through her. And to this end you cultivated your friendship with Chapuys, the Emperor’s man.'
    CROMWELL: 'I made no promises.'
    GARDINER: 'Chapuys thought you did. Mary thought you did.'
