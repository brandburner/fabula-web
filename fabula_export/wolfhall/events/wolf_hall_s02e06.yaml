  title: Cromwell pauses mid-letter to Henry
  description: In the suffocating isolation of his Tower cell, Thomas Cromwell sits
    at a desk by candlelight, drafting a final letter to Henry VIII. His quill hovers
    over the parchment as his mind unspools decades of political maneuvering, loyalty,
    and the illusions of control. The moment of suspended action—where the past and
    present collide—exposes the fragility of his power and the king’s capricious mercy.
    His face betrays a flicker of vulnerability, a rare crack in his usual composure,
    as the weight of his impending fate presses down. This pause is not just a break
    in writing; it is a reckoning with the choices that led him here, and a foreshadowing
    of the reckoning to come. The letter, meant to plead for mercy, becomes a silent
    witness to his unraveling resolve.
