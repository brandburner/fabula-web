  global_id: null
  title: Cromwell’s loyalty to Mary exposed as treason
  description: 'In a relentless interrogation, Cromwell’s political enemies—Norfolk,
    Gardiner, and Riche—unleash a coordinated assault on his character, using his
    relationship with Lady Mary as the linchpin of their accusations. They deploy
    a mix of fabricated claims (a Valentine’s ring, gloves, and private correspondence)
    and twisted truths (his protection of Mary during Henry’s jousting injury) to
    paint him as a scheming usurper who sought to manipulate the succession. Cromwell
    counters with sharp wit and legal precision, exposing the flimsiness of their
    evidence (e.g., the ring’s inscription about obedience, the King’s own approval
    of his actions), but the interrogation’s true purpose becomes clear: this is not
    a trial but a political execution, where the charges are secondary to the King’s
    will. The scene culminates in Cromwell’s chilling realization that his fate is
    sealed—not by evidence, but by Henry’s mercurial rage and the machinations of
    his enemies. The dialogue crackles with subtext: every accusation reveals as much
    about the accusers’ ambitions as it does about Cromwell’s alleged crimes. Norfolk’s
    obsession with France, Gardiner’s theological zealotry, and Wriothesley’s betrayal
    all surface as the interrogation spirals into a grotesque parody of justice, where
    loyalty is redefined as treason and power is the only currency that matters.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 15
