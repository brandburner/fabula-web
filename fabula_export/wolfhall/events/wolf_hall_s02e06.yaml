- fabula_uuid: act_775be5ee7f3eeecd
  number: 3
  summary: The final act portrays Cromwell's profound acceptance of his fate and his
    preparations for death. William Kingston delivers the news of his execution by
    axe, a "mercy" granted by the King, and confirms Henry's marriage to Catherine
    Howard, solidifying Cromwell's downfall. In his final hours, Cromwell experiences
    a poignant vision of Cardinal Wolsey, with whom he shares a quiet, introspective
    conversation, ultimately seeking forgiveness not from the King, but from his former
    master, revealing where his true loyalties and regrets lie. His journey to the
    scaffold is depicted as a somber procession through a vast, expectant crowd, interspersed
    with brief, emotional interactions and silent observations of his family's grief,
    including Gregory and Richard Cromwell. On the scaffold, Cromwell delivers a concise,
    powerful speech, acknowledging his sins before God and explicitly seeking forgiveness
    from his "Master"—Wolsey, a subtle yet profound act of defiance against Henry's
    narrative. He calms the nervous executioner, demonstrating his composure and dignity
    in the face of death. The physical act of execution is immediately followed by
    a serene, ethereal vision of Cromwell in the beautiful gardens of Launde Abbey,
    a place of peace he had once dreamed of retiring to. This final image serves as
    a powerful juxtaposition, offering a sense of spiritual release and an escape
    from the brutal realities of his political life and violent end, providing a thematic
    resolution that transcends the immediate tragedy.
