  object_involvements:
  - object_uuid: ger_object_8bdb34a31c2a
    description_of_involvement: 'The bill of attainder is the legal weapon Cromwell’s
      enemies will use to condemn him without trial. Though the document itself is
      not physically present in the room, Cromwell names it as the instrument of his
      downfall. His acknowledgment of its existence—‘You will pass a bill to make
      an end of me’—underscores the inevitability of his fate. The bill of attainder
      is a stark reminder of the power dynamics at play: Cromwell, who once wielded
      such tools to destroy his foes, now faces the same fate at the hands of his
      enemies.'
    status_before_event: Not physically present in the room, but its existence is
      implied as the legal mechanism that will seal Cromwell’s execution.
    status_after_event: Its power is acknowledged by Cromwell, who recognizes that
      his enemies will use it to bypass a trial and ensure his swift condemnation.
    global_id: ger_object_8bdb34a31c2a
  - object_uuid: ger_object_2c145b1ed090
    description_of_involvement: The French royal seal on Norfolk’s letter is the pivotal
      clue that allows Cromwell to deduce the French conspiracy against him. The gleaming
      wax seal, instantly recognizable to Cromwell, serves as tangible proof of foreign
      interference in English court politics. Its presence in the room shifts the
      power dynamics, as Cromwell uses it to expose Norfolk’s alliance with France
      and the true motives behind his downfall. The seal is not just a symbol of foreign
      diplomacy but a weapon in Cromwell’s strategic defiance.
    status_before_event: Attached to a sealed letter in the Messenger’s possession,
      unopened and unread by anyone in the room.
    status_after_event: Exposed and recognized by Cromwell, becoming a key piece of
      evidence in his deduction of the French conspiracy. The letter is opened and
      read by Norfolk, and its contents are used to accuse Cromwell of heresy and
      treason.
