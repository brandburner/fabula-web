      tactics, bureaucratic documentation, and the strategic use of Cromwell’s former
      allies (such as Wriothesley) to undermine his defenses. The Council’s power
      dynamics are on full display, as it leverages the King’s capricious will to
      justify its actions and ensure Cromwell’s compliance or downfall.
    active_representation: Through formal spokesmen (Riche, Gardiner, Norfolk) giving
      structured statements and leading the interrogation, and via institutional protocol
