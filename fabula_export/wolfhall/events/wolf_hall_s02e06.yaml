      and destroy even its most cunning servants. The scaffold’s height forces the
      crowd to look up, reinforcing their subjugation to the Crown’s justice. For
      Cromwell, it is both a place of execution and a pulpit, where he subverts the
      ritual of beheading to serve his own defiant purposes. The scaffold’s role is
      dual: it is the instrument of Henry’s vengeance, yet Cromwell transforms it
      into a site of spiritual resistance.'
    status_before_event: Standing empty but for the executioner, the scaffold looms
      over Tower Hill, its steps waiting for Cromwell’s ascent. The crowd gathers
      below, restless and anticipatory, their murmurs filling the air.
    status_after_event: Stained with Cromwell’s blood, the scaffold now bears the
