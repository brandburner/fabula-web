      are holding their breath.
    functional_role: A site of introspection and reckoning, where Cromwell is forced
      to confront the cyclical nature of power and the inevitability of his fate.
    symbolic_significance: Represents the inescapable nature of the past and the fragility
      of political power. The apartment is a prison not just for Anne’s memory but
      for Cromwell’s future.
