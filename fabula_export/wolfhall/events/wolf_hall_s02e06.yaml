      expresses her gratitude, is read aloud by Riche, who twists its meaning to imply
      a treasonous alliance. The letter is not just a personal correspondence; it
      is a political weapon, used to paint Cromwell as a scheming usurper who sought
      to control the succession through Lady Mary. Its contents are cited as proof
      of Cromwell's undue influence, despite his insistence that his actions were
      protective and loyal.
