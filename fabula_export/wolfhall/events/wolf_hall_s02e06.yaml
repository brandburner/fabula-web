  title: Lady Mary witnesses Catherine Howard’s wedding
  description: In the Queen’s Privy Chamber, Catherine Howard stands at the center
    of a flurry of activity as her ladies-in-waiting—including Lady Margaret Douglas
    and Mary Fitzroy—adjust her wedding dress for her impending marriage to Henry
    VIII. Catherine’s inaudible chatter fills the space, her excitement a stark contrast
    to the quiet tension underlying the scene. Meanwhile, Lady Mary lingers at the
    periphery, observing the preparations with a detached, contemplative gaze. Her
    unnoticed departure marks a subtle but deliberate moment of withdrawal, signaling
    her discomfort with the spectacle and the political implications of Henry’s new
    marriage. The scene underscores the fragility of Catherine’s position—her role
    as a pawn in Henry’s volatile court—and the unspoken power dynamics at play. Lady
    Mary’s silent exit serves as a quiet rebuke, hinting at her own precarious standing
    and the court’s shifting loyalties. The wedding preparations, framed by this stillness,
    become a harbinger of the instability to come, where even the most celebratory
    of royal ceremonies carries the weight of Henry’s merciless will and the looming
    specter of Cromwell’s downfall.
