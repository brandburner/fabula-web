- fabula_uuid: cand_evt_scene_a440668796af437f_02
  global_id: null
  title: Cromwell dismantles Riche’s ring accusation
  description: 'In this high-stakes interrogation, Richard Riche attempts to use Wolsey’s
    ring—a symbol of Cromwell’s past loyalty—as evidence of heresy and treason, accusing
    Cromwell of sorcery and political manipulation. Cromwell, ever the rhetorician,
    turns the accusation into a moment of vulnerability for his interrogators by exposing
    the ring’s symbolic impotence. He mocks its supposed powers (protection from drowning,
    wild beasts, and securing a prince’s favor) while subtly reminding them of their
    own precarious positions. The exchange escalates into a broader attack on Cromwell’s
    relationship with Lady Mary, where Riche and Gardiner allege he sought to control
    her for political gain. Cromwell deflects with wit and precision, revealing the
    fragility of their charges and the political theater at play. The scene underscores
    Cromwell’s rhetorical brilliance, his ability to expose his accusers’ desperation,
    and the shifting alliances that have led to his downfall. His final admission—that
    he wanted to protect Mary from Norfolk and his niece—reveals a rare moment of
    personal vulnerability, even as he maintains his strategic composure. The tension
    peaks when Riche produces a letter from Mary, but Cromwell’s calm dismantling
    of the evidence leaves his interrogators exposed, their accusations feeling hollow
    and contrived. The scene serves as a microcosm of Cromwell’s entire career: his
    rise was built on cunning and loyalty, and his fall is being orchestrated by the
    same men he once outmaneuvered.'
