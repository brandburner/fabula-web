  title: Norfolk’s Dog Metaphor and Cromwell’s Descent
  description: 'In this brutal psychological confrontation, the Duke of Norfolk reduces
    Thomas Cromwell to a ''spent hunting dog''—a metaphor that strips him of agency
    and foreshadows his execution. Cromwell, though physically broken, delivers a
    scathing indictment of his accusers’ incompetence, warning that without him, the
    court will collapse into chaos. His plea—''What will you do without me?''—reveals
    his lingering belief in his own indispensability, even as Norfolk’s dismissal
    (''A dog who has served him through the hunting season. What do you do with a
    dog at the end of the season? You hang it.'') seals his fate. The moment is charged
    with subtext: Norfolk’s lingering gaze suggests a grudging acknowledgment of Cromwell’s
    power, while Gardiner’s deliberate decision to stay behind after the others depart
    signals a personal vendetta, deepening the tension between Cromwell’s vulnerability
    and his enemies’ relentless pursuit. The exchange about Queen Jane’s fate further
    underscores Cromwell’s political acumen, even in defeat, as he and Gardiner share
    a fleeting, almost companionable silence—two men bound by the same system that
    will destroy them both.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 26
  sequence_in_scene: 39
  key_dialogue:
  - 'NORFOLK: What will we do without you? What will we do without your wisdom? Wash
    your eyes clean, Cromwell! Do you think the King ever loved you? No. To him you
    were an instrument. A device. We are no more to him than an engine of war. Or
    a dog. A dog who has served him through the hunting season. What do you do with
    a dog at the end of the season? You hang it.'
  - 'CROMWELL: You people. What will you do without me? You will read the lines as
    written, but you will never read between them. The French Ambassador will make
    fools of you, and Chapuys too, if he returns. Within a year the King will be fighting
    the Scots, or the French, or likely both, and he will bankrupt us. None of you...
    none of you... can manage matters like I can.'
  - |-
    CROMWELL: Getting the wife used to be one of my tasks. It falls to you now, does it?
    GARDINER: Giddy little creature. Very pleased with her great fortune. Still, not for me to question the King’s choice.
    CROMWELL: Bear that in mind, and you’ll go far.
