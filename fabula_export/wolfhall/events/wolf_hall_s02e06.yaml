  title: Cromwell warns Richard against reckless defiance
  description: 'In the dim, oppressive confines of the Tower, Cromwell receives Rafe’s
    report on the fallout of his arrest—Parliament’s stunned silence, Edward Seymour’s
    half-hearted defense of Gregory, and Cranmer’s calculated letter-writing. The
    exchange reveals Cromwell’s isolation: no one speaks for him, not even his former
    allies. When Rafe mentions Richard’s furious impulse to confront the King directly,
    Cromwell’s response is immediate and sharp. He knows Henry’s paranoia too well;
    any appearance of conspiracy—even a well-intentioned outburst—could doom Richard
    and Gregory. His warning is a mix of paternal urgency and strategic caution, underscoring
    the fragility of his power and the high stakes of Henry’s shifting loyalties.
    The moment is charged with unspoken grief: Cromwell’s sacrifice to protect his
    family contrasts with his own inevitable downfall, and the shared laughter at
    his self-deprecating joke only deepens the pathos. The scene crystallizes Cromwell’s
    role as a man who has spent his life navigating treacherous waters, now forced
    to watch from the shallows as the tide turns against him.'
