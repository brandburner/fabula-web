- fabula_uuid: cand_evt_scene_c2953f69d4b1b1f2_01
  global_id: null
  title: Jenneke’s desperate plea for escape
  description: 'In a quiet, sunlit chapel at Austin Friars, Jenneke—Cromwell’s estranged
    daughter—confronts him with a final, raw appeal to abandon his doomed fate and
    flee with her to Antwerp, the city he once longed for. Her voice cracks with urgency
    as she offers him a lifeline: a chance to reject Henry’s wrath and reclaim a life
    beyond politics. Cromwell’s silence is deafening. His refusal to meet her eyes,
    let alone speak, reveals his fatalistic surrender—not just to execution, but to
    the emotional distance he’s cultivated. The moment crystallizes the irreversible
    cost of his ambition: Jenneke’s plea isn’t just about survival, but about the
    father she’s lost to power. His silence is his answer. The scene underscores the
    tragedy of Cromwell’s downfall: it’s not just the King’s vengeance, but his own
    self-imposed isolation that seals his fate. The chapel’s sacred light contrasts
    with the moral darkness of his choice, framing his execution as both inevitable
    and self-inflicted.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 8
  sequence_in_scene: 9
  key_dialogue:
  - 'JENNEKE: Then come with me now, Father. To Antwerp, that you were homesick for.'
  - 'JENNEKE: But you will not.'
  is_flashback: true
  location_uuid: ger_location_7c0b03704467
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_0209fc4dcb5b
    emotional_state: A numb acceptance of his own complicity in his ruin, laced with
      a bitter undercurrent of self-disgust. His silence is not indifference but a
      punishment—both for her, for daring to hope, and for himself, for having made
      hope impossible. There’s a flicker of something unreadable in his eyes when
      she mentions Antwerp, but it is swiftly smothered.
    goals:
    - To maintain the emotional distance that has been the cornerstone of his survival
      and success, even as it destroys him.
    - To ensure that Jenneke does not witness the cracks in his armor, that she leaves
      believing him unbroken and unrepentant—sparing her the truth of his cowardice.
    what_happened: Cromwell sits rigidly beside Jenneke, his posture unyielding, his
      gaze fixed somewhere beyond her, as if she is a ghost he cannot see. His hands
      rest motionless on his knees, fingers slightly curled—perhaps the only outward
      sign of the tension coiling within him. He does not fidget, does not shift,
      does not so much as blink in response to her plea. His silence is not passive;
      it is an active refusal, a wall built brick by brick over decades of calculated
      ambition. The set of his jaw suggests a man who has already accepted his fate,
      who sees her offer not as salvation but as a distraction from the inevitable.
      His stillness is deafening, a void where words—and a father’s love—should be.
    observed_status: Cromwell sits rigidly beside Jenneke, his posture unyielding,
      his gaze fixed somewhere beyond her, as if she is a ghost he cannot see. His
      hands rest motionless on his knees, fingers slightly curled—perhaps the only
