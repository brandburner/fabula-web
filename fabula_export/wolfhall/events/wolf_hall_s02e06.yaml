  title: Cromwell counters forged treason with defiance
  description: 'In a high-stakes interrogation within the Tower’s royal apartments,
    Thomas Cromwell faces escalating accusations of treason and heresy. He begins
    by placing a ruby ring—a symbol of Henry VIII’s past favor—on the table, invoking
    his loyalty to the King. When Gardiner dismisses its relevance, Cromwell calmly
    asserts that the ring will remind Henry of his service, subtly undermining the
    interrogators’ authority. The tension escalates as Riche and Gardiner reveal forged
    letters from German princes and Luther, which Cromwell dismisses as absurd fabrications.
    He mocks their credibility, particularly targeting Wriothesley, whose discomfort
    exposes the conspiracy’s desperation. The scene culminates in Cromwell seizing
    control of the interrogation, shifting the focus to trivial accusations about
    his wardrobe—a deliberate tactic to expose the flimsiness of their case. His defiance
    underscores his precarious position: while he outmaneuvers his accusers verbally,
    his fate remains at the mercy of Henry’s volatile will. The exchange reveals the
    fragility of his power and the court’s hypocrisy, where loyalty is secondary to
    political expediency.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 14
  sequence_in_scene: 18
  key_dialogue:
  - 'CROMWELL: And when he did so, I took it to our King who, in time, was pleased
    to return it to me, saying it would be a token between us. And if I sent it to
    him, even if I did not have my seal, he would know it came from me. So, I send
    it him now, Master Secretary.'
  - 'CROMWELL: There are no such letters. They never existed, and even if they did—and
    even if they did, and if they contained seditious matter, would I really leave
    them about the house for you to find? Would I, ‘Call-Me’?'
  - 'CROMWELL: Christ, Riche, is this the best you can do?'
