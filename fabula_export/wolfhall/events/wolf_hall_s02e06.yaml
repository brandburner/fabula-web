  key_dialogue:
  - 'NORFOLK: What gave you the right to wear such a colour, hmm? It is the preserve
    of royal persons and high dignitaries of the church.'
  - 'CROMWELL: I feel the cold. Do you know, it was a gift. A gift from a foreign
    client who did not know our rules.'
  - 'CROMWELL: Christ, Riche, is this the best you can do?'
  - 'CROMWELL: Would I, ‘Call-Me’? Did we do such things?'
  - 'GARDINER: Letters have been found at Austin Friars. Highly prejudicial to your
    claims to be a loyal and quiet subject.'
  - 'CROMWELL: There are no such letters. They never existed, and even if they did—and
    if they contained seditious matter—would I really leave them about the house for
    you to find?'
