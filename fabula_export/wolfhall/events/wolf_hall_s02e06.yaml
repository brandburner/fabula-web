    description_of_involvement: The execution block is a low, rough-hewn wooden plank,
      its surface scarred by the heads of those who came before Cromwell. It serves
      as the final resting place for his head, a stark and unceremonious end to a
      life of cunning and ambition. Cromwell’s deliberate placement of his head upon
      it is an act of surrender—but also of defiance, as his gaze remains fixed on
      Wolsey’s ghost rather than the block itself. The block is more than an object;
      it is the physical manifestation of the King’s judgment, yet Cromwell’s use
      of it becomes a ritual of his own making, a final act of loyalty to a faith
      and a master beyond Henry’s reach.
    status_before_event: Waiting atop the scaffold, its surface worn smooth by prior
      use. It is a silent witness to the inevitability of Cromwell’s fate, its presence
      a reminder of the many who have knelt before it.
    status_after_event: Stained with Cromwell’s blood, the block now bears the mark
      of his execution. It remains on the scaffold, a mute testament to the King’s
      justice—and to Cromwell’s defiance in the face of it.
