  title: Riche Delivers Cromwell’s Arrest
  description: 'In a tense, fleeting encounter in the Great Hall of Hampton Court,
    Richard Riche intercepts Rafe Sadler with the devastating news of Thomas Cromwell’s
    arrest. Riche’s immediate shame—his averted gaze, the way he clutches the rolled
    parchment like a guilty secret—contrasts sharply with the cold efficiency of his
    words. The moment is a brutal pivot: Rafe’s devastation (his stunned turn toward
    the camera) signals the first public fracture in Cromwell’s alliances, while Riche’s
    complicity underscores the Council’s betrayal. The exchange is brief but loaded,
    marking the irreversible unraveling of Cromwell’s power and the fragility of his
    position—now entirely at Henry VIII’s mercy. The scene’s brevity amplifies its
    impact, leaving Rafe (and the audience) reeling from the speed of Cromwell’s fall.'
