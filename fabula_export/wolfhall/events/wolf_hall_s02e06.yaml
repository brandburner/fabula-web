  title: Cromwell’s Final Command to Rafe
  description: 'In the Tower’s inner royal apartment, Thomas Cromwell—now resigned
    to his fate—listens as Rafe recounts their shared past, including Cromwell’s rescue
    of him as a child. The memory triggers a rare moment of tenderness between them,
    but Cromwell swiftly shifts to cold pragmatism, instructing Rafe to have Gregory
    publicly disown him to shield the family from Henry’s wrath. Cromwell’s directive
    is a calculated sacrifice, ensuring his son’s survival while severing their bond.
    His final words to Rafe—both a confession of exhaustion and a defiant curse against
    Henry—reveal his fractured spirit: a man who has lost everything but clings to
    the hope that history will judge the king’s cruelty. The scene underscores Cromwell’s
    collapse from power and the irreversible fracture of his political world, as even
    his most loyal protégé must now abandon him.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 32
  sequence_in_scene: 50
  key_dialogue:
  - 'CROMWELL: You did more than I had any right to expect.'
  - 'RAFE: When I was a little child... you came for me, brought me on a journey.
    You set me by the fire and said, ''This is where you live now, Rafe. We will be
    your family now...'' I had just left my mother that day and I did not know where
    I was. I had never seen London, still less your house, but I never cried, did
    I? I never cried.'
  - 'CROMWELL: It is time that Gregory wrote a letter repudiating me. He should speak
    ill of me. Say he doesn’t know how he came to be related to such a traitor. He
    should plead for the chance to redeem my errors and crimes, by serving his majesty
    in the years to come.'
  - 'CROMWELL: I couldn’t do it again, you know, Rafe. I couldn’t. The sleepless toil,
    the axe-work. When Henry dies and goes to judgment, he will answer for me. And
    he will have to account for what he did to Cromwell.'
