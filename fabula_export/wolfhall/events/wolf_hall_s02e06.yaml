- fabula_uuid: cand_evt_scene_8d37fc19abaa1148_01
  global_id: null
  title: Cromwell’s Final Interrogation and Norfolk’s Dog Metaphor
  description: "\n  In the Tower’s royal apartments, Thomas Cromwell faces a relentless\
    \ interrogation led by Richard Riche and the Duke of Norfolk, who accuse him of\
    \ treason and heresy. Cromwell defends his household’s size and military resources\
    \ as necessary for loyalty to the King, but Norfolk brutally reduces him to a\
    \ 'spent hunting dog'—a metaphor stripping him of agency and foreshadowing his\
    \ execution. Cromwell’s despair peaks as he laments his enemies’ inability to\
    \ govern without him, warning of impending chaos. The scene culminates in a charged\
    \ silence between Cromwell and Gardiner, who remains behind, hinting at a shared\
    \ understanding of Henry VIII’s merciless nature. The distant tolling of bells\
    \ underscores the inevitability of Cromwell’s fate, while Gardiner’s reluctant\
    \ departure and the revelation of Anne of Cleves’ abandonment signal the King’s\
    \ final rejection of Cromwell’s influence.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 26
  sequence_in_scene: 38
  key_dialogue:
  - |-
    RICHARD RICHE: Your household falls little short of three thousand persons, does it not? It is the household of a prince.
    CROMWELL: Three thousand? With that number, I’d be bankrupt. Every man in England has applied to me these seven years, to take his son into my service. I take who I can. For the most part their fathers pay their keep, so you cannot say I employ them.
  - |-
    NORFOLK: Oh, you prate of loyalty! You, a manifest traitor who would have sold the King to heretics!
    CROMWELL: I, a traitor. Look to the Poles and Courtenays for treason, my lord. Not to me, who owes everything I have to the King. Look to those who think it’s their natural right to sweep him aside.
  - |-
    CROMWELL: You people. What will you do without me? You will read the lines as written, but you will never read between them. The French Ambassador will make fools of you, and Chapuys too, if he returns. Within a year the King will be fighting the Scots, or the French, or likely both, and he will bankrupt us. None of you... none of you... can manage matters like I can.
    NORFOLK: What will we do without you? What will we do without your wisdom? Wash your eyes clean, Cromwell! Do you think the King ever loved you? No. To him you were an instrument. A device. We are no more to him than an engine of war. Or a dog. A dog who has served him through the hunting season. What do you do with a dog at the end of the season? You hang it.
