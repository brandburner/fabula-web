  global_id: null
  title: Rafe’s calculated plea for Cromwell’s life
  description: In a private audience with Henry VIII, Rafe Sadler strategically edits
    Thomas Cromwell’s letter, omitting politically volatile references to the Cleves
    marriage while amplifying Cromwell’s loyalty and vulnerability. Rafe’s careful
    pacing—softly prompting Henry with *"It takes but one word, sir"*—exploits the
    King’s emotional susceptibility, momentarily moving him to tears. Henry’s conflicted
    response (*"I could free Cromwell... but he has never forgave me for Wolsey"*)
    reveals his lingering resentment, while Rafe’s subtle framing (*"The Earl is reconciled.
    He has let the Cardinal go"*) tests whether Henry’s vanity or ruthlessness will
    prevail. The scene hinges on Rafe’s tactical omission of Cromwell’s political
    missteps, leaving only his abject pleas (*"I cry for mercy, mercy, mercy"*) to
    sway the King. Cromwell’s voiceover (*"You did well, Rafe"*) underscores the futility
    of the effort, as Henry’s final dismissal (*"You can leave me now"*) signals the
    plea’s failure—yet the moment exposes Henry’s fragility and Cromwell’s lingering
    influence over him, even in defeat.
