- fabula_uuid: cand_evt_scene_5230a85a27613757_01
  global_id: null
  title: Suffolk offers Cromwell false hope
  description: In the dim candlelight of his prison cell, Thomas Cromwell is pulled
    from his memories by the arrival of the Duke of Suffolk, whose hulking presence
    casts ominous shadows. Suffolk, seated awkwardly on a small stool, notices the
    triptych Cromwell had altered to obscure Anne Boleyn’s image—a silent reminder
    of his past machinations. He urges Cromwell to confess heresy and seek Henry’s
    mercy, invoking the King’s enjoyment of Lambert’s trial as a twisted incentive.
    Cromwell’s blunt reminder that Lambert was burned silences Suffolk, exposing the
    hollowness of his advice. Their exchange shifts to dark humor about robbing houses,
    a fleeting moment of camaraderie that underscores their shared cynicism and the
    fragility of Cromwell’s position. Suffolk’s final, awkward handshake and shoulder-pummeling
    gesture feels like a hollow gesture of solidarity before he departs, leaving Cromwell
    alone with the weight of his impending fate. The scene reveals Suffolk’s conflicted
    loyalty—part genuine concern, part political pragmatism—and Cromwell’s fatalistic
    acceptance of Henry’s capricious justice, foreshadowing his refusal to beg for
    mercy.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 30
  sequence_in_scene: 44
  key_dialogue:
  - 'SUFFOLK: Is she behind there? The other one?'
  - 'CROMWELL: Boleyn? No, my lord. She lies at rest in the chapel nearby. As for
    the painting, yes, I painted her out. I changed the hair... and the eyes.'
  - 'SUFFOLK: Look here, Crumb, this is my advice. Confess you are a heretic. Say
    you were misled. Ask Harry to see you face-to-face and reason with you, bring
    you back to true religion. He’d like that, wouldn’t he? You remember how he enjoyed
    himself, at the trial of that fellow Lambert?'
  - 'CROMWELL: Lambert was burned.'
  - 'SUFFOLK: Oh. So he was.'
  - 'CROMWELL: You’re a good fellow, Charles. I’d rob a house with you, if I had to.'
  - 'SUFFOLK: Have you robbed many houses?'
  - 'CROMWELL: In my wild days... you know.'
  - 'SUFFOLK: Oh, we’ve all had those.'
