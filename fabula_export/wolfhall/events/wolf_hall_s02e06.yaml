- fabula_uuid: cand_evt_scene_7ae64cc81229f690_01
  global_id: null
  title: Cromwell clings to fragile hope
  description: 'In his Tower confinement, Cromwell receives Cranmer’s letter—a carefully
    balanced plea for mercy that both defends and condemns him, leaving his fate suspended
    in Henry’s whims. The letter’s cautious language ("*if he be a traitor*") becomes
    a lifeline, reinforcing Cromwell’s desperate hope that Henry’s permission to write
    signals a reprieve rather than a death sentence. When Rafe delivers the devastating
    news that Wriothesley has begun dismantling Cromwell’s household, the blow is
    visceral: the King’s order to dissolve Austin Friars strips Cromwell of his last
    remnants of power and autonomy. Yet even in this moment of crushing defeat, Cromwell
    rallies Rafe with a defiant mantra—*‘We do not yield. We hold on’*—revealing his
    refusal to surrender, even as the noose tightens. The scene underscores the precariousness
    of his position: every small gesture (Cranmer’s letter, Henry’s permission to
    write) becomes a fragile thread of hope, while every setback (Wriothesley’s actions)
    confirms his inevitable doom. The exchange with Rafe exposes the raw, unspoken
    fear beneath Cromwell’s bravado: his survival hinges entirely on Henry’s mercurial
    will, and even his most loyal allies cannot shield him from the King’s wrath.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 25
  sequence_in_scene: 36
  key_dialogue:
  - |-
    RAFE: I have no new instructions, sir.
    CROMWELL: But yet he permits you to visit me still. That’s a hopeful sign.
  - |-
    CROMWELL: ((Reading Cranmer’s letter)) ...he that was so advanced by your majesty; he who so loved your majesty, as I ever thought, no less than God... But now, if he be a traitor, I am sorry that I ever loved or trusted him... But, yet again, I am very sorrowful... Who will your majesty trust hereafter, if you cannot trust him?
    CROMWELL: ((To Rafe)) It’s better than I expected.
  - |-
    RAFE: ((Bitterly)) He should have got himself to the King’s presence. If the Archbishop were in peril of his life, would you have stood by? I don’t think you would.
    CROMWELL: The King has permitted me to write to him which is another hopeful sign. Will you make sure that it gets to him.
    RAFE: Call-Me’ has moved into Austin Friars. The King has ordered him to dissolve the household.
    CROMWELL: Don’t give up, Rafe. Don’t give up. We do not yield. We hold on. We hold on.
