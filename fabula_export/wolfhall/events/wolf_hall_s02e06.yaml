- fabula_uuid: cand_evt_scene_3da9fd012de5e40f_01
  global_id: null
  title: Cromwell confronts Anne Boleyn’s memory
  description: In a moment of paralyzed dread, Thomas Cromwell stands frozen in the
    Inner Royal Apartment of the Tower, his mind unspooling into a flashback of Anne
    Boleyn’s final days. The memory begins with Anne kneeling in prayer, her hands
    clasped to her throat in desperate supplication, her voice raw with pleas for
    Cromwell to believe in her innocence. The weight of her execution looms over the
    scene, her fate now a mirror for Cromwell’s own impending doom. As the flashback
    dissolves, Cromwell’s gaze lingers on a triptych of Diana the Huntress, the arrow
    drawn—a silent omen of the violence to come. The parallel between Anne’s downfall
    and his own forces Cromwell to confront the fragility of his power and the merciless
    whims of Henry VIII, deepening his existential dread. The flashback serves as
    both a warning and a reckoning, underscoring the cyclical nature of power and
    the inevitability of his fate.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 7
  sequence_in_scene: 7
  key_dialogue:
  - 'ANNE BOLEYN: "Thomas, you must believe me. I am innocent. I have never betrayed
    the King. You know this. You know me."'
  - 'ANNE BOLEYN: "They will say I am a witch. They will say I have poisoned the King’s
    heart. But you—you know the truth. You must speak for me."'
  is_flashback: true
  location_uuid: ger_location_e2898d1e5d7c
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_e6c0300a7c77
    emotional_state: A mix of terror and resignation, her pleas laced with the knowledge
      that her fate is already sealed but her pride refuses to accept it.
    goals:
    - To convince Cromwell of her innocence, hoping his influence might spare her
      life.
    - To cling to dignity in the face of certain doom, even as she begs for mercy.
    what_happened: Anne Boleyn appears in the flashback kneeling before an altar,
      her body wracked with tension as she clutches her throat in a gesture of supplication.
      Her voice is raw, her words a desperate plea for Cromwell to believe in her
      innocence. The memory captures her at her most vulnerable—stripped of her political
      armor, reduced to a woman begging for her life. Her eyes are wide with fear,
      her skin pale, and her hands tremble as she reaches out toward Cromwell, though
      he is not physically present in the memory.
    observed_status: Anne Boleyn appears in the flashback kneeling before an altar,
      her body wracked with tension as she clutches her throat in a gesture of supplication.
      Her voice is raw, her words a desperate plea for Cromwell to believe in her
