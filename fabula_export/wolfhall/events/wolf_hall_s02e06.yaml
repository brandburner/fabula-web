  description: 'Wriothesley sits alone in the hollowed-out shell of Cromwell’s study,
    now stripped of all personal effects—papers, portraits, and possessions—leaving
    only the skeletal furniture. The emptiness mirrors the collapse of Cromwell’s
    power and Wriothesley’s own moral reckoning. After a moment of stillness, Wriothesley’s
    composure fractures; he buries his face in his hands, a physical surrender to
    the weight of his complicity in Cromwell’s downfall. The scene underscores the
    irreversible shift in power dynamics and Wriothesley’s internal conflict: his
    ambition once thrived in Cromwell’s shadow, but now he is left with only the ghost
    of his mentor’s influence and the hollow victory of betrayal.'
