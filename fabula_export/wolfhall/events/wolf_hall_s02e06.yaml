      armor, reduced to a woman begging for her life. Her eyes are wide with fear,
      her skin pale, and her hands tremble as she reaches out toward Cromwell, though
      he is not physically present in the memory.
    beliefs:
    - That Cromwell, of all people, understands the machinations of the court and
      might intervene on her behalf.
    - That her downfall is not just a political maneuver but a personal betrayal by
      those she trusted.
    observed_traits:
    - Desperate
    - Fragile
    - Pleading
    - Haunted by betrayal
    importance: primary
