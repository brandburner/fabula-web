  title: Cromwell’s Violent Outburst in Council
  description: In a flashback to the Council Chamber at Hampton Court, Thomas Cromwell—pushed
    to his breaking point by years of political maneuvering and personal rivalry—physically
    confronts Fitzwilliam, shoving him in a sudden eruption of rage. The councillors
    immediately mob Cromwell, restraining him as the tension in the room escalates
    into chaos. Stephen Gardiner watches from the periphery, his detached expression
    underscoring the political stakes of Cromwell’s unraveling control. This moment
    exposes Cromwell’s vulnerability, revealing the fragility of his power and foreshadowing
    his eventual downfall at Henry VIII’s hands. The confrontation is not just a personal
    clash but a symbolic turning point, where Cromwell’s carefully constructed authority
    begins to crumble under the weight of his enemies’ scheming and the King’s shifting
    favor.
