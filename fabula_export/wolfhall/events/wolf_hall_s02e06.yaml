  title: Cromwell Uncovers French Conspiracy
  description: In a high-stakes interrogation within the Tower’s royal apartments,
    Norfolk and Gardiner escalate their accusations against Cromwell, framing his
    political maneuvering as corruption and heresy. Cromwell, ever the strategist,
    deduces a French diplomatic conspiracy when he spots a telltale letter seal—implying
    Norfolk and Gardiner have brokered a deal with France to remove him from power.
    The revelation exposes the fragility of Cromwell’s position, as his enemies refuse
    to confirm or deny the implication, leaving him to confront the shifting loyalties
    of King Henry VIII. The scene culminates in Cromwell’s sharp retorts and calculated
    defiance, revealing his awareness of the political theater at play and the precariousness
    of his fate. The tension peaks as Cromwell accuses Norfolk of being manipulated
    by the French, while his interrogators press charges of treason, heresy, and ambition,
    including his alleged influence over Lady Mary and Lady Margaret Douglas. The
    exchange underscores Cromwell’s rhetorical brilliance and the existential threat
    he faces, as his enemies move to dismantle his legacy and secure his downfall
    through a bill of attainder rather than a trial.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 15
  sequence_in_scene: 20
  key_dialogue:
  - 'NORFOLK: The French prefer to deal with me, my Lord.'
  - 'CROMWELL: I''m sure they do. Why would they not prefer a minister whom they can
    bewilder and trick? And, if need be, purchase.'
  - 'RICHARD RICHE: You gave Mary a ring in the summer of 1536.'
  - 'CROMWELL: It wasn’t a lover’s ring. It was... it was a piece to wear around her
    neck. Because it was too heavy. There were too many words.'
  - 'GARDINER: And if you had laid hands on her, what would you have done?'
  - 'CROMWELL: You tell me. What makes the best story? Do I seduce her? Did I enforce
    her? Come on, Stephen — I no more meant to marry her than you did.'
  - 'RICHARD RICHE: And you accompanied these words with certain... certain belligerent
    gestures.'
  - 'CROMWELL: If he would turn, yet I would not turn; and I would take the field
    against him, my sword in my hand.'
