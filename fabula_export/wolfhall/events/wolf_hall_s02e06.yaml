  global_id: null
  title: Cromwell’s barge ride to the Tower
  description: Thomas Cromwell is transported to the Tower of London in a barge, deliberately
    mirroring Anne Boleyn’s final journey—a visual and symbolic inversion of his former
    power. The scene opens with Cromwell seated in the same position Anne once occupied,
    now under the escort of William Kingston, who had previously overseen Anne’s imprisonment.
    The Tower looms above them, its imposing presence underscoring the fragility of
    Cromwell’s position. This deliberate parallelism serves as a stark reminder of
    the cyclical nature of power and the inevitability of his downfall. The barge
    ride is not merely a physical transition but a psychological reckoning, forcing
    Cromwell to confront the parallels between his fate and Anne’s. The silence and
    the weight of the moment are palpable, as Cromwell’s internal reflection contrasts
    sharply with the external spectacle of his humiliation. The scene establishes
    the thematic tension between loyalty and betrayal, power and vulnerability, and
    sets the stage for Cromwell’s internal monologue and eventual acceptance of his
    fate.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 5
  sequence_in_scene: 5
  key_dialogue: &id001
  - 'KINGSTON: (quietly) The King has ordered your confinement to the Tower, my lord.
    You are to be questioned on charges of treason and heresy.'
  - 'CROMWELL: (looking up at the Tower, voice low) I know this place. I’ve sent men
    here. I’ve watched them walk these corridors. And now... now it’s my turn.'
  - 'KINGSTON: (hesitant) It is not for me to say, my lord, but... the King’s will
    is absolute.'
