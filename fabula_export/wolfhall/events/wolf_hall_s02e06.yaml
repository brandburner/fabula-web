    description_of_involvement: The candlelight is the sole source of illumination
      in the cell, its flickering glow both a practical necessity and a metaphor for
      the precariousness of Cromwell’s situation. It casts long, shifting shadows
      across the walls and parchment, mirroring the instability of his thoughts. The
      light is dim but persistent, much like Cromwell’s own resilience—fading, but
      not yet extinguished. It isolates him in a pocket of time, where the past and
      present blur, and the future looms as an unlit void.
    status_before_event: Steady and bright, providing clear light for writing. The
      flame is tall, its wax barely melted, suggesting the letter-writing session
      has only just begun.
    status_after_event: The candle burns lower, its light dimmer but no less significant.
      The wax has melted further, symbolizing the passage of time and the inevitability
      of Cromwell’s fate. The shadows it casts grow longer, more ominous, as the night
      deepens.
    global_id: ger_object_e48edd8ae8c0
  - object_uuid: ger_object_5b692684886d
    description_of_involvement: The unfinished letter to Henry VIII is the physical
      manifestation of Cromwell’s desperation and the futility of his position. It
      is both a plea and a confession, a last attempt to appeal to the king’s mercy
      while acknowledging the power dynamics that have always governed their relationship.
      The letter is suspended in time, much like Cromwell himself—neither fully written
      nor discarded, but caught in the liminal space between action and acceptance.
      Its existence is a testament to his refusal to surrender entirely, even as he
      recognizes the hopelessness of his situation.
    status_before_event: Partially written, with ink still wet on the parchment. The
      quill rests mid-sentence, the words trailing off into nothingness. The letter
      is a fragment of Cromwell’s voice, cut short by the weight of his memories.
    status_after_event: The letter remains unfinished, the quill set aside. It is
      a relic of Cromwell’s struggle, a silent witness to his internal conflict. The
      parchment bears the imprint of his hesitation, the words he could not bring
      himself to write.
    global_id: ger_object_5b692684886d
