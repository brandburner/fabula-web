  - object_uuid: ger_object_dfc630393bf8
    description_of_involvement: Richard Riche’s letter-book is a damning repository
      of correspondence and records that his accusers—Norfolk, Gardiner, Wriothesley—deploy
      as proof of Cromwell’s treason, heresy, financial corruption, and meddling with
      Lady Mary and Lady Margaret Douglas. Riche leafs through its pages, reading
      aloud entries that twist Cromwell’s bureaucratic legacy into weapons for his
      destruction. The letter-book symbolizes the institutional machinery of the Privy
      Council, turning Cromwell’s own administrative practices against him.
    status_before_event: Closed and in Riche’s possession, containing incriminating
      documents and correspondence that will be used against Cromwell.
    status_after_event: Opened and referenced throughout the interrogation, with specific
      letters and entries read aloud to strengthen the case against Cromwell. Its
      contents are used to accuse him of corruption, heresy, and improper influence
      over nobles.
    global_id: ger_object_dfc630393bf8
  - object_uuid: ger_object_b5d90e774b08
    description_of_involvement: The Valentine’s gift from Cromwell to Lady Mary is
      cited by Riche as physical proof of Cromwell’s improper influence over her.
      Alongside a ring and gloves, the gift is treated as evidence of romantic overtures
      or manipulative designs on the princess’s loyalty and succession claim. Cromwell
      dismisses it as a routine courtly custom, but his accusers hold it up to allege
      a deeper, more sinister relationship. The gift becomes a symbol of the emotional
      and political entanglements that his enemies use to destroy his reputation.
    status_before_event: A past gift exchanged between Cromwell and Lady Mary, now
