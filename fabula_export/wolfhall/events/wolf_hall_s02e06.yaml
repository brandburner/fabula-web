- fabula_uuid: cand_evt_scene_2ee88d6d969ed162_01
  global_id: null
  title: Cromwell’s final absolution
  description: 'On the scaffold, Thomas Cromwell faces execution with unshakable composure,
    first reassuring the nervous executioner with a coin and a command to strike without
    hesitation. He delivers a public confession of his sins, but his gaze and words
    are directed not at the absent King Henry—who condemned him—but at Cardinal Wolsey,
    his former master, whose spectral presence materializes in the crowd. Cromwell’s
    plea for forgiveness, delivered with the sign of the cross, is a deliberate act
    of defiance: a rejection of Henry’s authority in favor of Wolsey’s spiritual primacy.
    The crowd, mistaking his address, kneels in response, while the surreal hum of
    bees underscores the moment’s eerie transcendence. Cromwell’s execution becomes
    a paradoxical act of devotion, redefining his legacy as one of loyalty to Wolsey
    over the King who destroyed him. The scene closes with the axe’s descent, leaving
    his final act—a repudiation of Henry’s power—as his enduring legacy.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 47
  sequence_in_scene: 66
  key_dialogue:
  - |-
    CROMWELL: You alright?

    CROMWELL: Don’t be afraid to strike. You’ll not help me, or yourself, by hesitating.
  - 'CROMWELL: I come here to die. Not to excuse myself. I have lived a sinner and
    offended my lord God, for the which I heartily ask for His pardon. Many of you
    will know that I have been a great traveller in this world and, being but of base
    degree, have been called to high estate... Since that time I have injured and
    offended my Master, for the which I ask heartily for his forgiveness. And beseech
    you all to pray to God, with me, that he will forgive me.'
  - 'CROMWELL: Oh, Father, forgive me.'
