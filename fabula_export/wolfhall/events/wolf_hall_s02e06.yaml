  title: Henry’s fleeting mercy and Rafe’s failed plea
  description: 'In the King’s private chamber, Rafe Sadler reads aloud Thomas Cromwell’s
    desperate letter, which begins as a formal plea for mercy but quickly becomes
    a raw, emotional entreaty. Henry VIII, initially moved to near-tears by Cromwell’s
    words—particularly the line about making him ‘live ever young’—briefly entertains
    the idea of pardoning his former minister, even musing aloud that he *could* restore
    Cromwell. However, the moment of vulnerability is fleeting. Henry’s lingering
    resentment over Wolsey’s fall and Gardiner’s warnings about Cromwell’s unforgiving
    nature resurface, hardening his resolve. When Rafe, sensing a glimmer of hope,
    subtly urges the King to act, Henry dismisses him with cold finality: ‘You can
    leave me now.’ The scene captures the precarious balance of power in Henry’s court,
    where even a glimmer of mercy is extinguished by the King’s mercurial nature and
    deep-seated paranoia. Cromwell’s voiceover, praising Rafe’s effort but acknowledging
    its futility, underscores the inevitability of his downfall. The exchange reveals
    Henry’s psychological dependence on Cromwell—he is moved by the letter, yet cannot
    bring himself to trust or forgive. For Rafe, the moment is a crushing reminder
    of the King’s capriciousness and the limits of his own influence. The scene serves
    as a turning point, confirming that Cromwell’s fate is sealed not by logic or
    justice, but by Henry’s whims and the machinations of his enemies.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e06
  scene_sequence: 31
  sequence_in_scene: 48
  key_dialogue:
  - 'RAFE: Most gracious and most merciful sovereign lord, beseeching almighty God
    to counsel you, preserve you, maintain you, remedy you and defend you, as may
    be most to the comfort of your heart’s desires. God so help me in this mine adversity,
    and confound me if ever I thought the contrary.'
  - 'HENRY: Yes, I could free Cromwell, could I not? I could restore him tomorrow.
    [...] And I have long wondered, to what extremity will sorrow lead him? Bishop
    Gardiner says the Cardinal himself might forgive but the Cardinal’s man never
    will.'
  - 'HENRY: You can leave me now.'
