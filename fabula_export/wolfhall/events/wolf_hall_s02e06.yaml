  scene_sequence: 11
  sequence_in_scene: 14
  key_dialogue:
  - 'CROMWELL: How did Parliament take it?'
  - 'RAFE: In silence.'
  - 'CROMWELL: Did anyone speak for me?'
  - 'RAFE: Yes. But I was not heard.'
  - 'CROMWELL: Tell him he must not do that. He must rest quiet, and he must keep
    away from Gregory. Both of them must keep away from you. You must do nothing that
    could be thought of as conspiracy. I know how Henry’s mind works. Well, obviously
    that’s not true or I wouldn’t be here, would I?'
  - 'RAFE: They will both wish to visit here, if the King permits.'
  - 'CROMWELL: No, they must not. They must stay away.'
