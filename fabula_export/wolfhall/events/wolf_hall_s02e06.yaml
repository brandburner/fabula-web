  key_dialogue:
  - 'RICHARD RICHE: You gave Mary a ring in the summer of 1536. / CROMWELL: It wasn’t
    a lover’s ring. It was... it was a piece to wear around her neck. / GARDINER:
    Why? / CROMWELL: Because it was too heavy. There were too many words. / NORFOLK:
    What words? / CROMWELL: Words enjoining obedience.'
  - 'NORFOLK: And if you had laid hands on her, what would you have done? / CROMWELL:
    You tell me. What makes the best story? Do I seduce her? Did I enforce her? Come
    on, Stephen—I no more meant to marry her than you did. / GARDINER: Would you kindly
    address me as what I am. / CROMWELL: I beg your pardon, my lord Bishop.'
  - 'CROMWELL: You will pass a bill to make an end of me and I cannot complain of
    the process. I have used it myself.'
