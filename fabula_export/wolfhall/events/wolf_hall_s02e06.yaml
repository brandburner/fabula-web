- fabula_uuid: act_61e186b08d62d5cd
  number: 2
  summary: 'This act plunges deeper into Cromwell''s interrogation, where the accusations
    intensify and become more directly tied to his perceived ambition and loyalty.
    The interrogators press him on his alleged influence over Lady Mary, his supposed
    ''treasonable words'' about taking the field against the King, and his substantial
    household and armaments, which they portray as a private army. Cromwell defends
    his actions as loyal service to the King and England, but his arguments fall on
    deaf ears. A critical turning point arrives when Gardiner exposes Henry''s true
    grievance: Cromwell''s failure to eliminate Reginald Pole, revealing the King''s
    deep-seated resentment and the core betrayal in Henry''s eyes. Norfolk delivers
    a brutal assessment, comparing Cromwell to a "dog" to be "hanged" after the hunting
    season, stripping away any illusion of Henry''s affection. Gardiner then reveals
    Henry''s impending marriage to Catherine Howard, signaling the complete collapse
    of Cromwell''s political standing and the finality of his downfall. Despite this,
    a flicker of hope emerges as Cromwell writes a poignant letter to Henry, which
    Rafe delivers. Henry is visibly moved by Cromwell''s pleas but ultimately, influenced
    by Gardiner''s cynical interpretation of Cromwell''s loyalty and his past with
    Wolsey, he remains unmoved. The act concludes with Cromwell''s heartbreaking decision
    to protect his family by instructing Rafe to have Gregory publicly repudiate him,
    a clear sign of his acceptance of his own impending death and a final act of self-sacrifice.
    This marks the definitive end of any real hope for reprieve.'
