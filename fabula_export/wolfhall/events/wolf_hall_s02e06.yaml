acts:
- fabula_uuid: act_f780f5da69cb1fdf
  number: 1
  summary: 'This act establishes Thomas Cromwell''s imprisonment in the Tower of London,
    immediately drawing parallels to Anne Boleyn''s prior incarceration through evocative,
    silent flashbacks. The narrative quickly moves to the present, where Rafe visits
    Cromwell, confirming his arrest and the precariousness of his situation, as even
    Archbishop Cranmer''s support proves cautious. The core of this act is the commencement
    of Cromwell''s interrogation by his adversaries: the Duke of Norfolk, Bishop Gardiner,
    and Richard Riche, with Wriothesley''s reluctant participation. Accusations range
    from the trivial, such as wearing a purple doublet, to the serious, including
    correspondence with heretics and alleged ambitions concerning Lady Mary. Cromwell,
    despite his dire predicament, maintains his composure, employing his sharp wit
    and legal acumen to deflect the charges. A pivotal moment occurs when he sends
    a ruby ring, a symbolic token from the King of France and later from Henry VIII
    himself, hoping to remind the King of his past loyal service. However, Wriothesley''s
    subtle betrayals and the increasingly personal nature of the accusations, particularly
    regarding his relationship with Lady Mary, gradually strip away Cromwell''s defenses.
    The act culminates in Cromwell''s stark realization that his fate is sealed, as
    he directly confronts his interrogators with the knowledge that there will be
    no fair trial, only a bill of attainder, a legislative process he himself has
    used. This marks the end of his active defense and the beginning of his acceptance
    of the inevitable.'
