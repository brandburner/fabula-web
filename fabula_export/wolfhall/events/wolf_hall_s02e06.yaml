  key_dialogue:
  - 'NORFOLK: The French prefer to deal with me, my Lord. Why would they not prefer
    a minister whom they can bewilder and trick? And, if need be, purchase.'
  - 'RICHARD RICHE: You gave Mary a ring in the summer of 1536. [...] What words?
    CROMWELL: Words enjoining obedience. GARDINER: You thought she should obey you?
    CROMWELL: I thought she should obey her father.'
  - 'RICHARD RICHE: Let me remind you. You were heard by a witness here, at the Tower,
    to utter certain treasonable words: that you would maintain your own opinion in
    religion. That you would never allow the King to return to Rome, and... these
    are the words alleged, that: ‘If he would turn, yet I would not turn; and I would
    take the field against him, my sword in my hand.’'
