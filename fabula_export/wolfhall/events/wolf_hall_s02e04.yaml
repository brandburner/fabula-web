  title: Dorothea’s Accusation in Nightmare
  description: In a feverish nightmare, Thomas Cromwell is confronted by Dorothea,
    Cardinal Wolsey’s daughter, whose accusatory gaze—piercing and unrelenting—exposes
    his deepest guilt over faithlessness and political betrayal. The surreal, camera-breaking
    moment forces Cromwell to confront the moral cost of his ambitions, amplifying
    his vulnerability as the political storm outside the Abbey rages on. The nightmare
    serves as a psychological reckoning, where Dorothea’s voice—‘I have been told,
    by those I trust, there is no faith or truth in Cromwell’—echoes the court’s growing
    distrust and his own self-loathing. This moment is a thematic and emotional climax,
    revealing how Cromwell’s pragmatic compromises have eroded his sense of self and
    left him morally exposed. The nightmare functions as both a setup for his eventual
    downfall and a turning point where his guilt becomes inescapable, mirroring the
    external threats closing in on him.
