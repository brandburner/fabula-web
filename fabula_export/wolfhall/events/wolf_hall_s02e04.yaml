  global_id: null
  title: Henry Threatens French Invasion
  description: "\n  In the Council Chamber, King Henry VIII erupts in fury over the\
    \ Franco-Spanish treaty, which excludes England and threatens his authority. His\
    \ outburst—fueled by personal betrayal and political humiliation—escalates into\
    \ a direct threat of invasion against France, exposing his volatile state and\
    \ the kingdom’s precarious military posture. The Council reacts with alarm, fearing\
    \ both the Franco-Imperial alliance and internal Plantagenet unrest. Cromwell,\
    \ observing the chaos, calculates his next move, subtly steering the conversation\
    \ toward Geoffrey Pole as a means to preemptively strike at the Emperor’s influence.\
    \ The scene underscores Henry’s declining rationality, the Council’s deep divisions,\
    \ and Cromwell’s strategic maneuvering amid a crisis where the King’s impulsiveness\
    \ and the realm’s fragility collide. The tension hinges on whether Cromwell can\
    \ contain Henry’s recklessness while neutralizing the Pole threat before it spirals\
    \ into open conflict.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 19
  sequence_in_scene: 30
  key_dialogue:
  - 'HENRY: Ten years! ... Read their terms... and see how little England is regarded!'
  - 'HENRY: Never mind their truce. François is in breach of his treaty obligations
    to me! He owes me four years pension. Tell the French, my Lord Privy Seal. Tell
    the French, if they do not pay up, I will invade them.'
  - 'CROMWELL: If the Emperor invades, he’ll set a Pole on the throne. They’ll marry
    Mary into their family and they’ll make her their puppet. They think they’re descended
    from emperors and angels, these people. To them, Henry Tudor is the son of Welsh
    horse-thieves.'
