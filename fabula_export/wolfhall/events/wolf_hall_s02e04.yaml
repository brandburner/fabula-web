  - character_uuid: ger_agent_2144bd99b291
    emotional_state: Professionally detached but inwardly confident; he trusts Cromwell’s
      methods and is poised to act on whatever intelligence Pole yields. His silence
      speaks volumes—he is the quiet hand of enforcement, ready to translate Pole’s
      words into actionable intelligence for the crown.
    goals:
    - Document Pole’s responses and Cromwell’s interrogation tactics for future reference,
      ensuring the crown has a record of the exchange.
    - Assess Pole’s potential value as an informant, validating Cromwell’s assertion
      that he is ‘good for a thousand pounds’ in intelligence.
    what_happened: Thomas Wriothesley stands slightly behind Cromwell, his posture
      attentive and his gaze sharp. He takes meticulous notes as Cromwell speaks,
      his quill scratching against parchment in a rhythmic counterpoint to the candle’s
      flicker. Wriothesley’s expressions are subtle—a raised eyebrow when Pole remains
      silent, a slight nod when Cromwell references the candle’s metaphor—but his
      presence is a silent reinforcement of Cromwell’s authority. He occasionally
      glances at Pole, assessing his reactions with the clinical eye of an interrogator
      who understands the value of silence as much as speech.
