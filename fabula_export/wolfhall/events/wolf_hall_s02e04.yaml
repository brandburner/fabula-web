  title: Cromwell and Gardiner Clash Before Henry’s Arrival
  description: 'In the crowded Great Hall of the Tower of London, Thomas Cromwell
    and Thomas Cranmer arrive to witness the trial of John Lambert, a reformist heretic
    whose radical views threaten their political and theological positions. Cranmer,
    visibly distressed, warns Cromwell that Lambert’s defiance could destroy them
    both, revealing the Archbishop’s moral conflict between personal conviction and
    political survival. Their tense exchange is interrupted by Stephen Gardiner, Cromwell’s
    ideological adversary, who returns from exile and immediately challenges Cromwell’s
    loyalty, accusing him of sympathizing with the Anabaptists—a sect that rejects
    temporal authority. Cromwell deflects the accusation with a calculated rebuttal,
    framing his own pragmatism as a bulwark against radicalism. The arrival of King
    Henry VIII, flanked by Rafe Sadler, shifts the room’s focus. Henry’s presence—though
    physically weakened—underscores his unassailable power, creating a stark visual
    contrast with Cromwell’s precarious standing. The scene marks a turning point:
    Gardiner’s return signals escalating ideological warfare, while Henry’s arrival
    forces Cromwell to confront his dwindling influence and the urgent need to secure
    his position amid mounting threats. The tension between Cromwell’s reformist ideals
    and his ruthless pragmatism is laid bare, setting the stage for his future moral
    compromises.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 23
  sequence_in_scene: 44
  key_dialogue:
  - 'CRANMER: Thomas. This Lambert will ruin us. I have begged him to be circumspect.
    And he said, ''Act the man, Cranmer. Stand up for the truth—as you know it to
    be in your heart.'' He said— Here’s Gardiner.'
  - 'GARDINER: I don’t know what you have been doing in my absence, Cromwell. Why
    have you tolerated an anabaptist? Unless of course you are one.'
  - 'CROMWELL: And is it likely? These people you call anabaptists, they serve no
    king. They deny the child his book. They say we live in the last days, so why
    learn anything? You know I have nothing to do with this sect.'
  - 'GARDINER: Perhaps not. After all, you lay up treasure on earth, don’t you? Indeed
    you do little else.'
