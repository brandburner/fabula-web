- fabula_uuid: cand_evt_scene_f37ed17710fb6814_01
  global_id: null
  title: Cromwell dispatches Wyatt to Spain
  description: 'In the wake of Queen Jane’s death and mounting political instability,
    Thomas Cromwell isolates Thomas Wyatt from his rival Wriothesley to deliver a
    covert directive: Wyatt must resume his role as the King’s Ambassador to the Emperor.
    The private nature of the command—delivered in Cromwell’s newly fortified study—underscores
    its urgency and the high stakes involved. Wyatt, visibly reluctant, voices his
    objections: he despises Spain, distrusts the Emperor’s inscrutable nature, and
    fears the Inquisitors’ surveillance. Cromwell dismisses these concerns with cold
    pragmatism, revealing the mission’s true purpose—to sabotage the Franco-Imperial
    alliance before it solidifies into an invasion threat against England. The exchange
    exposes Cromwell’s ruthless calculus: he prioritizes political survival and the
    King’s legacy over personal loyalty, even as Wyatt’s hesitation hints at the moral
    cost of such maneuvering. A dispatch rider’s interruption and Cromwell’s sudden
    shift in demeanor suggest an unspoken crisis looming, reinforcing the scene’s
    tension as a turning point in the power struggle.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 21
  sequence_in_scene: 35
  key_dialogue: &id011
  - 'CROMWELL: Out now, Wriothesley. Go out now. I’ll speak to Wyatt alone.'
  - |-
    WYATT: Is there no other possible assignment?
    CROMWELL: There is not.
  - |-
    WYATT: I hate Spain. The Inquisitors think all Englishmen are Lutherans. They put spies in my house. They steal my letters. And, in truth, I cannot read the Emperor at all. I hear the words he says, but nothing that lies beneath them. His face never changes.
    CROMWELL: It doesn’t matter. You have only one task—to break up this alliance between the Emperor and France.
  - |-
    WYATT: But does their pact not suit your purposes, my lord? With France and Spain at peace, will Henry not be required to seek other allies? Allies such as the German princes. Isn’t that what you want? To force the King into alliance with others who have thrown off Rome’s yoke?
    CROMWELL: Yes, and I’ll pursue those alliances in other ways. But if this pact between France and Spain endures, the Emperor will invade to put Mary on the throne and all that we've gained will be swept away. You must force them apart.
