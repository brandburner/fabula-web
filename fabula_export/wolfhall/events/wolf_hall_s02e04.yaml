  title: Gardiner Exposes Cromwell’s Legal Weakness
  description: In the King’s inner privy chamber, a visibly weakened Thomas Cromwell
    enters to find Henry VIII and Stephen Gardiner already in tense, conspiratorial
    conversation. Gardiner immediately mocks Cromwell’s pallor, suggesting rumors
    of his death—an opening salvo in their proxy war. When Cromwell attempts to discuss
    urgent diplomatic matters (the dower arrangements for Anna of Cleves and the revival
    of an old Lorraine marriage contract), Gardiner seizes the opportunity to undermine
    him. The King, amused by their rivalry, forces Cromwell to admit the existence
    of legally revoked but never formally dissolved articles from a decade-old marriage
    proposal, exposing Cromwell’s administrative oversight. Gardiner’s barbed wit
    and Henry’s shifting favor turn the exchange into a public humiliation, with the
    King dismissing Cromwell while keeping Gardiner present—a clear signal of Cromwell’s
    eroding influence. The scene underscores the fragility of Cromwell’s power, as
    Gardiner weaponizes Henry’s amusement to erode his authority, and the King’s volatile
    loyalties become the battleground for their conflict. The tension culminates in
    Henry’s decree that the two must reconcile at Cranmer’s dinner, a hollow gesture
    that only deepens Cromwell’s isolation.
