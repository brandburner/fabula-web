  sequence_in_scene: 1
  key_dialogue:
  - 'HOLBEIN: You were right that I should turn him to face us. Jesus Maria, he looks
    as if he would spring down and trample you.'
  - 'HENRY: I wish France could see this. Or the Emperor. And the King of Scots.'
  - 'HENRY: ((to Jane)) Did you see it, my darling?'
  - 'JANE: Yes.'
  - 'CHAPUYS: I hear you have a visitor?'
  - 'CROMWELL: Why don’t you tell me about it, Eustache?'
  - 'CHAPUYS: Mon cher, you must not blame me if your amours are of interest to all
    Europe. Hitherto, observers have been frustrated by your extreme discretion.'
  - 'CROMWELL: I’ll have a hard time to hide it, with you shouting about her in the
    streets.'
