  global_id: null
  title: Gardiner Accuses Cromwell of Heresy
  description: 'In the Tower of London’s Great Hall, Thomas Cromwell and Archbishop
    Cranmer discuss the theological threat posed by John Lambert’s radical Anabaptist
    views, which risk destabilizing the fragile religious consensus. Cranmer, visibly
    distressed, warns Cromwell that Lambert’s unchecked rhetoric could undermine their
    position at court. Before Cromwell can respond, Stephen Gardiner arrives, immediately
    seizing the moment to accuse Cromwell of heretical sympathies. Gardiner’s attack
    is calculated: he frames Cromwell’s pragmatic governance as moral corruption,
    suggesting his tolerance of reformist ideas is not political strategy but ideological
    complicity. The tension escalates as Gardiner mocks Cromwell’s materialism, implying
    his loyalty to the Crown is secondary to personal ambition. The confrontation
    is abruptly interrupted by the King’s grand entrance, flanked by Rafe, which shifts
    the court’s focus from theological strife to the looming political crisis. This
    moment underscores Cromwell’s precarious standing—caught between Gardiner’s ideological
    assault and the King’s unassailable authority. The scene reveals Cromwell’s vulnerability:
    his reformist ideals are now a liability, and his survival depends on navigating
    this ideological minefield while maintaining the King’s favor. Gardiner’s accusation
    is not just a personal attack but a strategic move to weaken Cromwell’s influence,
    exploiting the court’s growing unease with religious radicalism. The King’s arrival
    forces Cromwell to pivot from defense to damage control, highlighting the high
    stakes of the political game he must now play.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 23
  sequence_in_scene: 43
  key_dialogue:
  - 'CRANMER: Thomas. This Lambert will ruin us. I have begged him to be circumspect.
    And he said, ''Act the man, Cranmer. Stand up for the truth—as you know it to
    be in your heart.'' He said— Here’s Gardiner.'
  - 'GARDINER: I don’t know what you have been doing in my absence, Cromwell. Why
    have you tolerated an anabaptist? Unless of course you are one.'
  - 'CROMWELL: And is it likely? These people you call anabaptists, they serve no
    king. They deny the child his book. They say we live in the last days, so why
    learn anything? You know I have nothing to do with this sect.'
  - 'GARDINER: Perhaps not. After all, you lay up treasure on earth, don’t you? Indeed
    you do little else.'
