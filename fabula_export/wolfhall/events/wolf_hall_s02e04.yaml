  global_id: null
  title: Cromwell confronts his moral failure
  description: 'In the dim candlelight of his study, Cromwell sits with Rafe and Cranmer,
    grappling with the fallout of John Lambert’s condemnation—a man whose reformist
    views he privately shares. His outburst reveals the depth of his disillusionment:
    he had remained silent during Lambert’s trial, unable to defend him without risking
    his own position. Cranmer’s pragmatic counsel—that survival is necessary to preserve
    their reformist cause—fails to console him. Cromwell’s repeated lament, *‘I should
    have spoke,’* underscores his existential crisis: his pragmatism has cost him
    his moral compass, and the weight of this betrayal threatens to unravel his carefully
    constructed self-justification. The scene culminates in his raw admission that
    if Lambert can burn, *any of us* can, exposing the fragility of his power and
    the hollow nature of his political victories. The moment is a turning point, where
    Cromwell’s guilt begins to manifest as a physical and psychological unraveling,
    foreshadowing his later breakdowns and nightmares.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 25
  sequence_in_scene: 50
  key_dialogue:
  - 'CROMWELL: ... Gardiner has been seeing the King behind my back, pulling at his
    sleeve, telling him how the French are disgusted by our reformation and the Emperor
    is appalled. Telling him how he must prove himself a good Roman at heart. As if
    his great cause, his great cause is some silly quarrel that can be patched in
    a fortnight, and seven years'' work—seven years'' work—dismissed—'
  - 'CROMWELL: How could I speak in support of the King? And condemn a man whose views
    I entirely share.'
  - 'CROMWELL: But... But Thomas, what good is my rule if I cannot save John? If he
    can burn John Lambert he can burn any of us. Any of us.'
  - 'CROMWELL: I should have spoke.'
