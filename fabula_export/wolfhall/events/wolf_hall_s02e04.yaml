  title: Cromwell reveals the true stakes of Wyatt’s mission
  description: 'In Cromwell’s private study, Thomas Wyatt resists the order to return
    to Spain as the King’s Ambassador to the Emperor, citing personal and political
    risks—including the Inquisition’s hostility and his inability to decipher the
    Emperor’s intentions. Cromwell dismisses Wyatt’s objections with cold pragmatism,
    revealing the mission’s hidden purpose: sabotaging the Franco-Spanish alliance
    to prevent an imperial invasion that would restore Mary to the throne and undo
    England’s religious reforms. The revelation underscores Cromwell’s ruthless calculus—prioritizing
    political survival and reform over personal loyalty or Wyatt’s safety. The tension
    escalates as Cromwell’s urgency becomes clear: this mission is not just diplomatic
    but existential, a gambit to secure Henry’s reign and his own future. The moment
    is interrupted by a dispatch rider delivering news (omitted), but the core exchange
    exposes the brutal reality of Cromwell’s maneuvering—where trust is transactional
    and every pawn is expendable in the service of the greater game.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 21
  sequence_in_scene: 36
  key_dialogue:
  - |-
    CROMWELL: I hear you did great deeds against the rebels, Tom.
    WYATT: Not really. Half the time they ran away at night.
  - |-
    WYATT: I hate Spain. The Inquisitors think all Englishmen are Lutherans. They put spies in my house. They steal my letters. And, in truth, I cannot read the Emperor at all. I hear the words he says, but nothing that lies beneath them. His face never changes.
    CROMWELL: It doesn’t matter. You have only one task—to break up this alliance between the Emperor and France.
  - |-
    WYATT: But does their pact not suit your purposes, my lord? With France and Spain at peace, will Henry not be required to seek other allies? Allies such as the German princes. Isn’t that what you want? To force the King into alliance with others who have thrown off Rome’s yoke?
    CROMWELL: Yes, and I’ll pursue those alliances in other ways. But if this pact between France and Spain endures, the Emperor will invade to put Mary on the throne and all that we've gained will be swept away. You must force them apart.
