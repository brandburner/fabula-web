- fabula_uuid: cand_evt_scene_a857cf44065c324d_02
  global_id: null
  title: Cromwell confronts his hidden daughter
  description: 'In the quiet intimacy of his study, Thomas Cromwell is confronted
    by Jenneke, his estranged daughter whose existence he only learned of that morning.
    Their exchange reveals the depth of Anselma’s deliberate secrecy—her refusal to
    burden Cromwell with fatherhood—and the emotional void this has left in both their
    lives. Jenneke’s composed demeanor contrasts with Cromwell’s stunned vulnerability
    as he grapples with the revelation of Anselma’s death and the realization that
    he has missed her entire childhood. The candlelit study becomes a charged space
    where political pragmatism collides with personal reckoning, and Cromwell’s usual
    composure fractures under the weight of this unexpected legacy. Jenneke’s presence
    forces him to confront not just his past, but the fragility of his present—his
    political survival hinging on the very alliances that have kept him from knowing
    his own blood. The scene hinges on their shared physical resemblance, a silent
    testament to the bloodline Cromwell has unknowingly carried forward, and the raw,
    unspoken question of whether this connection could offer him something his power
    cannot: redemption or belonging.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue:
  - 'JENNEKE: Law books. It is your trade?'
  - 'CROMWELL: You are aware, aren’t you, that until this morning, I did not know
    you existed?'
  - 'JENNEKE: My mother is dead. A cold on her chest last winter. She said that she
    did not want you to regard me as a mistake you would have to pay for.'
  - 'CROMWELL: I would have come back. I would have married her.'
  - 'JENNEKE: Are you glad to see me?'
  - 'CROMWELL: I am... I’m astonished.'
