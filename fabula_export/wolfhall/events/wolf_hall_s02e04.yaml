  title: Henry’s mural and Jane’s fragility
  description: 'In the King’s Privy Chamber, Henry VIII stands before Holbein’s grand
    mural—a gilded, idealized depiction of himself, Jane, and his parents—marveling
    at its diplomatic power. His physical presence, however, contrasts sharply with
    the mural’s vitality: he leans heavily on a stick, his frailty betraying the illusion
    of strength. Jane, visibly pregnant, stiffens under his touch as he rests his
    hand on her belly, her discomfort subtly revealing her unease and fragility. Meanwhile,
    Holbein quietly acknowledges Cromwell’s influence over the mural’s composition,
    hinting at the minister’s behind-the-scenes control. The scene underscores the
    tension between Henry’s self-mythologizing and the fragility of those around him,
    particularly Jane, whose discomfort foreshadows her impending decline. Chapuys’
    probing about Cromwell’s personal life further exposes the minister’s vulnerabilities,
    reinforcing the political and personal pressures at play. The mural’s grandeur
    serves as a symbol of Henry’s unassailable authority, while Jane’s physical reaction
    underscores the fragility of those caught in his orbit.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
