  - object_uuid: ger_object_2f6ce9e19c49
    description_of_involvement: 'The candle is the centerpiece of Cromwell’s psychological
      gambit, a tangible metaphor for the inevitability of Pole’s choice. Lit by Martin
      at Cromwell’s command, its flame casts long, wavering shadows on the cell walls,
      amplifying the tension in the confined space. The candle’s slow burn is both
      a timer and a symbol: its wax represents the melting away of Pole’s resistance,
      while its flame embodies the fragile, fleeting nature of his life. Cromwell
      uses it to structure his ultimatum, tying Pole’s fate to the candle’s extinction.
      The object is more than a tool—it is a silent participant, its presence a constant
      reminder of the stakes. As the wax drips and the flame gutters, the candle becomes
      a physical manifestation of the pressure Cromwell exerts, its light dimming
      in parallel with Pole’s defiance.'
    status_before_event: Unlit, stored among Martin’s gaoler supplies in the Tower,
      its wax intact and flame dormant—a neutral object awaiting its role in the drama.
    status_after_event: Partially burned, its wax melted and flame extinguished (implied),
      leaving behind a charred wick and a pool of hardened wax—a silent witness to
      Pole’s resistance and Cromwell’s coercion.
    global_id: ger_object_2f6ce9e19c49
  - object_uuid: ger_object_5315bf9eaa7a
    description_of_involvement: 'Cromwell’s Pole family treason papers are the bureaucratic
      heart of his coercion, a stack of documents that transform abstract accusations
      into tangible threats. He flips through them with deliberate slowness, reading
      aloud passages that shatter Pole’s defiance. The papers are not just evidence—they
      are weapons, each word a blade aimed at Pole’s loyalty. Their presence in the
      cell is a reminder that Cromwell’s power extends beyond the Tower’s walls, into
      the realm of records and statecraft where Pole’s family’s fate is already sealed.
      The papers symbolize the inevitability of Cromwell’s victory: even if Pole resists,
      the evidence will outlive him, ensuring his family’s downfall. Their rustling
      as Cromwell turns the pages is a sound of impending doom.'
    status_before_event: Neatly bound in Cromwell’s possession, their contents meticulously
      organized and ready to be deployed as leverage.
    status_after_event: Still in Cromwell’s hands, now slightly disheveled from being
      read aloud, their power undiminished. They remain a looming threat, a promise
      of further coercion if Pole does not yield.
    global_id: ger_object_5315bf9eaa7a
