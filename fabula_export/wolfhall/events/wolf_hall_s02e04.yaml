  title: Cromwell confesses Wolsey’s daughter’s betrayal
  description: In a rare moment of vulnerability, Thomas Cromwell—observing his half-brother
    Gregory and Jenneke laughing together in the gardens of Austin Friars—approaches
    Jenneke and offers her protection and a future in England, including a marriage
    of her choosing. When she resists his overtures, Cromwell abruptly shifts the
    conversation, confessing his long-suppressed guilt over Dorothea Wolsey, Cardinal
    Wolsey’s illegitimate daughter. He reveals how her accusation of betrayal has
    haunted him, admitting he no longer knows if he truly betrayed Wolsey or if the
    guilt has simply ‘undone’ him. Jenneke, sensing his desperation, suggests he abandon
    his political life entirely, prompting Cromwell to fantasize aloud about retiring
    to Launde Abbey—a monastic retreat he envisions as a sanctuary from his past and
    present sins. The exchange exposes Cromwell’s existential crisis, his fear of
    abandonment, and his deep longing for redemption, all while foreshadowing his
    eventual reckoning with power and morality. The moment underscores his fragility
    beneath the political mastermind’s facade, revealing how his past failures continue
    to shape his present actions and decisions.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 7
  sequence_in_scene: 11
  key_dialogue: &id005
  - 'JENNEKE: Of course you’ll stay. When my father is King and married to Meg Douglas
    and Lady Mary both, then you shall be Princess Jenneke, and we will speed through
    Whitehall in our silver chariot—and throw buns to the populace. What can Antwerp
    offer, next to that?'
  - 'CROMWELL: Did you know I had another master before the King? Wolsey, the prelate?
    He had a daughter, Dorothea—illegitimate. I offered her comfort and a home. I
    offered her my own hand in marriage—all for love of her father. But she rejected
    me. She said I had betrayed her father, my master, at the end of his days.'
  - 'JENNEKE: Did you? Betray him?'
  - 'CROMWELL: I don’t know. I don’t think so. But it has undone me, Jenneke. Her
    accusation. I have lost my way.'
  - 'JENNEKE: Then leave this life. Leave it. Won’t your King release you, after everything
    you’ve done for him?'
  - 'CROMWELL: There is an abbey—Launde, in the heart of England—that will shortly
    come down. It is a blessed place. The bees there, they make honey scented with
    thyme. I have thought of it for myself, once the abbot surrenders it. That I might
    live there when I’m old and all this is over. You could live there too. Don’t
    laugh, you could. You have come so far, Jenneke. You won’t abandon me, will you?'
