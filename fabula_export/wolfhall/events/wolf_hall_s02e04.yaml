  title: Cromwell confronts his unknown daughter
  description: 'In the candlelit intimacy of his study, Thomas Cromwell is confronted
    by Jenneke, a composed young woman whose existence he never suspected. Her revelation—that
    her mother deliberately concealed her to spare Cromwell the burden of fatherhood—unveils
    a hidden legacy that collides with his present political fragility. Cromwell’s
    emotional response is layered: shock at her arrival, grief over Anselma’s death,
    and a surprising lack of feeling for his former lover, now replaced by a visceral
    connection to Jenneke. The scene forces Cromwell to confront the cost of his ambition,
    as Jenneke’s calm demeanor and physical resemblance to him underscore the life
    he abandoned. Her arrival becomes a mirror to his past, revealing how his relentless
    pursuit of power has isolated him from personal connections. The moment is charged
    with subtext—Jenneke’s presence is both a reckoning and a potential escape, hinting
    at Cromwell’s longing for a simpler life beyond the court’s treachery. The political
    backdrop (the Queen’s pregnancy, lingering unrest) looms, but here, the focus
    is on the raw, unguarded exchange between father and daughter, a rare vulnerability
    for Cromwell.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'JENNEKE: Law books. It is your trade?'
  - 'CROMWELL: You are aware, aren’t you, that until this morning, I did not know
    you existed?'
  - 'JENNEKE: My mother is dead. A cold on her chest last winter. She said that she
    did not want you to regard me as a mistake you would have to pay for.'
  - 'CROMWELL: I am... I’m astonished.'
  - 'JENNEKE: Are you glad to see me?'
