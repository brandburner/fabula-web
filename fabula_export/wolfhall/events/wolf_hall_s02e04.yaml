    description_of_involvement: The candlelight in Cromwell’s study serves as both
      a literal and symbolic element, casting long shadows that mirror the psychological
      darkness of his guilt. It illuminates the desk where Cromwell sits, his hands
      gripping the edge as he grapples with his complicity in Lambert’s condemnation.
      The flickering light sharpens the intimacy of the moment, emphasizing the vulnerability
      in Cromwell’s expression as he unravels. In the flashback to Shaftesbury Abbey,
      the absence of candlelight (replaced by moonlight) underscores the shift from
      the private, confined space of Cromwell’s study to the vast, haunting expanse
      of his guilt. The candlelight is a tactile reminder of the precariousness of
      his position—both physically (the flicker of flame) and metaphorically (the
      fragility of his moral compass).
    status_before_event: Steady and bright, casting a warm but tense glow over Cromwell’s
      desk and the faces of Rafe and Cranmer. The flames are undisturbed, symbolizing
      the relative stability of Cromwell’s study as a sanctuary.
    status_after_event: The candlelight remains, but its symbolic weight has shifted—now
      it feels more like a dying ember, reflecting Cromwell’s emotional state. The
      flickering intensifies slightly, as if reacting to the turbulence of his thoughts,
      and the shadows it casts grow longer and more pronounced.
