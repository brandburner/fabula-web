    beliefs:
    - Betrayal of his family would be a sin worse than death, and his loyalty is the
      last vestige of his honor in this godforsaken place.
    - Cromwell’s offers of mercy are hollow; survival on his terms would be a living
      death, stripped of integrity and purpose.
