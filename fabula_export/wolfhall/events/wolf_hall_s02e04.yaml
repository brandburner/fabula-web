  title: Cromwell Abandons Lambert at Trial
  description: 'In the Great Hall of the Tower of London, King Henry VIII publicly
    interrogates John Lambert, a radical Protestant whose theological views—denying
    Christ’s physical presence in the Eucharist and advocating for priestly marriage
    and female teaching—mirror Cromwell’s own reformist beliefs. Lambert, resolute
    but visibly overwhelmed, defends his positions with scriptural precision, only
    to be met with Henry’s scorn and the outraged murmurs of the conservative clergy.
    The tension peaks when Henry turns to Cromwell, his vicegerent in spiritual matters,
    demanding his verdict. Instead of defending Lambert’s reformist stance, Cromwell—after
    a deliberate pause—publicly aligns with Henry’s conservative position, declaring,
    ''I do not think anything is wanting.'' The hall erupts in shock. Cranmer, a fellow
    reformer, drops his eyes in disappointment, while Lambert stares at Cromwell in
    betrayal. Gardiner, Cromwell’s ideological adversary, seizes the moment to provoke
    him, accusing him of secretly agreeing with Lambert. Cromwell’s calculated silence
    and eventual retreat from the debate expose his ruthless pragmatism: he sacrifices
    Lambert to preserve his own political survival in the volatile post-Queen Jane
    court. The scene underscores the fragility of Henry’s religious authority, the
    volatility of theological fault lines, and Cromwell’s willingness to abandon principle
    for power—fore shadowing his later betrayal of other reformers and the cost of
    his ambition.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 24
