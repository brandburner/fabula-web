  title: Cromwell dispatches Richard through fever
  description: 'In the throes of a debilitating fever, Thomas Cromwell—physically
    weakened but politically unyielding—dispatches his half-brother Richard on a critical
    mission to deliver a letter to King Henry. The scene underscores Cromwell’s duality:
    his body betrays him, yet his ambition remains undimmed. As he shakes uncontrollably,
    Dr. Butts attends to him, while Richard Cromwell leans in, alarmed by his condition.
    Despite his physical state, Cromwell insists on sending the letter, grasping at
    it weakly before Richard retrieves it. Christophe enters to help restrain Cromwell,
    urging him to lie still, but Cromwell persists, mumbling his urgency. The exchange
    reveals Cromwell’s desperation to maintain control over the political landscape,
    even as his body fails him. His insistence on seeing the King soon underscores
    his refusal to acknowledge his own vulnerability, a trait that will later prove
    fatal. The scene also highlights the tension between Cromwell’s public persona
    and his private fragility, as his loyal servants—Richard and Christophe—attempt
    to care for him while he clings to his duties. This moment foreshadows his eventual
    downfall, as his absence from court allows his enemies to gain ground.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 29
  sequence_in_scene: 54
  key_dialogue:
  - 'DR BUTTS: By the mass, I have never known a living man so chilled.'
  - 'CROMWELL: Richard! ... This letter! Take it to... to the King. Go yourself. Ride..
    Ride.. to him.'
  - 'RICHARD CROMWELL: I will. I will. I will. Rest. Rest. I will go.'
  - 'CROMWELL: Tell him I''ll see him soon.'
  - 'CHRISTOPHE: You have to be still, master.'
  - 'CROMWELL: I know.'
