  title: Cromwell’s Dismissal Under Gardiner’s Gaze
  description: 'In the King’s privy chamber, a visibly weakened Thomas Cromwell enters
    to find Henry VIII and Stephen Gardiner already in tense consultation, their physical
    proximity signaling an alliance that excludes him. Gardiner immediately needles
    Cromwell with a veiled insult about his rumored death, while Henry’s cold indifference—refusing
    to dismiss Gardiner despite Cromwell’s subtle hints—exposes the shifting power
    dynamics. Cromwell attempts to address urgent matters (Cleves’ dower arrangements
    and a revoked marriage contract), but Gardiner’s barbed interjections and Henry’s
    amusement at their conflict reveal Cromwell’s precarious position. The King’s
    command that they attend Cranmer’s dinner together as reconciled rivals underscores
    Cromwell’s humiliation: he is dismissed while Gardiner remains, his authority
    eroded in real time. The scene’s subtext—Gardiner’s smugness, Henry’s enjoyment
    of their strife, and Cromwell’s physical frailty—hints at the political storm
    brewing, where Cromwell’s survival now hinges on navigating this new, hostile
    courtly landscape.'
