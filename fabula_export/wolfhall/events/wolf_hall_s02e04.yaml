- fabula_uuid: cand_evt_scene_d4065d8c6d35dcc3_01
  global_id: null
  title: Cromwell Defies Council to Confront Henry
  description: 'In the wake of Queen Jane Seymour’s death, the political council—led
    by Norfolk and Seymour—pressures Thomas Cromwell to secure a new royal bride for
    Henry VIII, exposing the fragile balance of power and Cromwell’s precarious position.
    The council’s blunt demands (Norfolk’s warning about the fragility of Prince Edward’s
    life, Seymour’s subtle maneuvering) force Cromwell into a corner, where his survival
    depends on delivering both a heir and political stability. His abrupt exit—declaring
    he will bypass the council and confront the King directly—signals a critical shift:
    Cromwell’s authority is now the only currency that matters, and his defiance marks
    the end of council consensus. The moment is charged with subtext: Norfolk’s pursuit
    of Cromwell hints at deeper factional tensions, while Cromwell’s decision to confront
    Henry directly reveals his desperation to regain control of the narrative before
    his enemies can exploit his vulnerability. The scene underscores Cromwell’s isolation—he
    is both indispensable and expendable, a man whose power rests on the King’s favor
    and nothing else.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 10
  sequence_in_scene: 15
  key_dialogue:
  - 'NORFOLK: It’s down to you to get him through this, Cromwell. Through it and out
    the other side a married man again. That’s all that’s important now. I mean, no
    disrespect to our lord Prince but we all know how easily a babe is snuffed out.'
  - 'EDWARD SEYMOUR: I suppose you could feel out the terrain, Crumb?'
  - 'CROMWELL: To ask him. That''s what you want, isn''t it?'
