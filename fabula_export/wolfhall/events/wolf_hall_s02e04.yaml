  - character_uuid: ger_agent_3cd0b8ae8c29
    emotional_state: Resigned indifference with undercurrents of discomfort; he performs
      his duties without question, but the weight of the Tower’s atrocities presses
      on him. His silence is not complicity but survival—he knows better than to interfere
      in Cromwell’s games.
    goals:
    - Carry out his orders without drawing attention to himself, ensuring the interrogation
      proceeds smoothly.
    - Avoid becoming entangled in the political machinations unfolding before him,
      prioritizing his own safety and anonymity.
    what_happened: Martin, the gaoler, moves with the weary efficiency of a man long
      accustomed to the Tower’s grim routines. He unlocks the cell door with a heavy
      key, his expression impassive as he takes in Pole’s bloodied state. When Cromwell
      asks for a candle, Martin’s surprise is fleeting—he exits and returns swiftly,
      lighting the candle with practiced hands. He assists Pole to the stool, his
      touch impersonal but not unkind. Throughout the interrogation, Martin stands
      near the door, a silent sentinel. His presence is a reminder of the Tower’s
      inescapable authority, but his lack of engagement suggests a man who has learned
      to dissociate from the horrors he facilitates.
