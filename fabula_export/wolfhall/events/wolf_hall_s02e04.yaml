  title: Cromwell pitches Cleves alliance to Henry
  description: 'In the dimly lit antechamber of Henry VIII’s bedchamber at Hampton
    Court, Thomas Cromwell arrives to find the king gravely ill—his leg wound festering,
    his face gaunt, and his temper short. Despite Dr. Butts’ warnings, Henry insists
    on conducting business, revealing his desperate grip on power. Cromwell seizes
    the moment to propose a strategic marriage alliance with Anna of Cleves, framing
    it as both a political necessity and a personal triumph for the king. He employs
    flattery, emphasizing the princess’s beauty and the alliance’s potential to secure
    England’s future against looming threats. However, the moment is undercut by Henry’s
    impulsive decision to publicly debate John Lambert, a heretic whose reformist
    views mirror Cromwell’s own. Cromwell’s reluctance to endorse the debate exposes
    his political vulnerability, as Henry—ever eager to assert his authority—seizes
    the opportunity to demonstrate his theological prowess. The exchange underscores
    Cromwell’s precarious position: he must balance Henry’s volatile ego with the
    urgent need to secure England’s alliances, all while navigating the king’s growing
    distrust of reformist ideas. The scene sets up the Cleves marriage as a potential
    solution to England’s isolation but foreshadows the dangers of Henry’s unchecked
    impulses and Cromwell’s moral compromises.'
