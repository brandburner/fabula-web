      between Cromwell and Jenneke. It is where Cromwell’s vulnerability is laid bare,
      and where Jenneke’s calm resistance to his overtures is most palpable. The bench
      grounds their conversation, providing a neutral yet intimate space for Cromwell
      to confess his guilt over Dorothea Wolsey and to fantasize about retiring to
      Launde Abbey. Its solid, unyielding presence contrasts with the fluidity of
      their emotions, symbolizing the weight of Cromwell’s past and the stability
      he craves but cannot find.
