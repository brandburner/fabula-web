  title: Henry demands public debate with Lambert
  description: In the King’s bedchamber at Hampton Court, Cromwell arrives to find
    Henry VIII gravely ill—his leg wound festering, his face gaunt, and his temper
    volatile. Despite Dr. Butts’ warnings, Henry insists on conducting business, dismissing
    medical advice with a chilling reminder of his authority. Cromwell cautiously
    presents the Cleves marriage alliance, which Henry accepts with cautious interest,
    though his focus quickly shifts to the more volatile issue of John Lambert, a
    reformist priest whose heretical teachings mirror Cromwell’s own reformist leanings.
    When Cromwell hesitates, fearing the political fallout of a public debate, Henry
    seizes the opportunity to assert his theological dominance, declaring he will
    personally debate Lambert in front of the court. The exchange reveals Henry’s
    desperate need to project strength—both physically and ideologically—while exposing
    Cromwell’s precarious position as the King’s chief minister, caught between reformist
    sympathies and the necessity of political survival. The scene sets up a high-stakes
    confrontation that could either reaffirm royal authority or fracture the fragile
    religious consensus Cromwell has worked to maintain.
