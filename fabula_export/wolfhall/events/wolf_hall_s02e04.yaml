  title: Cromwell exploits Council’s fear of Pole
  description: In the wake of Henry VIII’s explosive threat to invade France over
    the Franco-Imperial treaty, the Council remains stunned by the King’s volatility
    and the kingdom’s precarious position. Cromwell seizes the moment, exploiting
    the Council’s collective fear of a Plantagenet-backed invasion to justify a preemptive
    strike. He frames Geoffrey Pole—a known ally of the Emperor—as an immediate threat,
    leveraging the Council’s paranoia about the Pole family’s ties to the imperial
    cause. His calculated move to interrogate Pole isn’t just about extracting information;
    it’s a strategic demonstration of control, reinforcing his dominance over the
    King’s inner circle while neutralizing a potential rival claimant to the throne.
    The Council’s nervous reactions (Rich’s panic, Seymour’s hesitation) underscore
    the high stakes, as Cromwell positions himself as the only one capable of safeguarding
    the Tudor dynasty from internal and external threats. The scene reveals his mastery
    of psychological manipulation, turning fear into action and consolidating his
    power in the process.
