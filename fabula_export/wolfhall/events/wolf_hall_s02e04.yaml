  scene_sequence: 23
  sequence_in_scene: 42
  key_dialogue:
  - 'CRANMER: Thomas. This Lambert will ruin us. I have begged him to be circumspect.
    And he said, ''Act the man, Cranmer. Stand up for the truth—as you know it to
    be in your heart.'' He said— Here’s Gardiner.'
  - 'GARDINER: I don’t know what you have been doing in my absence, Cromwell. Why
    have you tolerated an anabaptist? Unless of course you are one.'
  - 'CROMWELL: And is it likely? These people you call anabaptists, they serve no
    king. They deny the child his book. They say we live in the last days, so why
    learn anything? You know I have nothing to do with this sect.'
