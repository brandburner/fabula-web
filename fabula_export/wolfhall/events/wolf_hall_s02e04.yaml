    description_of_involvement: Henry VIII’s festering leg wound is the most visceral
      symbol of his mortality in the scene, a raw and livid open sore that oozes and
      smells foul. The surgeon rebinds it as Cromwell enters, the fresh bandages a
      temporary reprieve from the decay beneath. The wound is not just a medical concern;
      it is a *political* concern, a reminder that the King’s body is betraying him
