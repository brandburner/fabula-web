- fabula_uuid: act_a77244a737f729f8
  number: 3
  summary: This act delves into Cromwell's profound personal and political unraveling,
    marked by a period of severe vulnerability and escalating opposition. Plagued
    by vivid, terrifying nightmares that resurrect the specters of past betrayals,
    particularly those surrounding Anne Boleyn and Wolsey, and gripped by a debilitating
    fever, Cromwell is rendered physically and emotionally incapacitated. His enforced
    absence from court proves catastrophic, allowing Bishop Gardiner, his cunning
    rival, to skillfully exploit the vacuum and solidify his influence with King Henry.
    Upon his recovery and return, Cromwell finds himself marginalized, facing a peevish
    Henry who openly favors Gardiner and seems to derive perverse enjoyment from the
    visible 'strife' among his councillors. Cromwell's attempts to advance the Cleves
    marriage are met with Gardiner's relentless, public undermining, as Gardiner meticulously
    picks apart the proposed contract and resurrects the contentious issue of Anne
    Boleyn's pre-contract, all designed to discredit Cromwell. The tension culminates
    in a highly charged and public dinner at Lambeth Palace, orchestrated by Gardiner
    and Norfolk. Here, they launch a coordinated, insidious attack on Cromwell's character
    and loyalty, dredging up old, thinly veiled accusations of complicity in Cardinal
    Wolsey's alleged corruption and even murder. Norfolk's vicious, prolonged denunciation
    of Wolsey, clearly aimed at Cromwell, pushes him beyond his breaking point. In
    a shocking and dangerous display of raw, 'blissful anger,' Cromwell physically
    assaults Norfolk, grabbing him by the coat and throwing him back into his chair.
    This volatile, public confrontation exposes the immense pressure Cromwell is under
    and the precariousness of his position, marking a dramatic and irreversible escalation
    of the animosity against him, despite the narrative foundation stating his ultimate
    return to service.
