  global_id: null
  title: Gardiner and Norfolk publicly smear Wolsey
  description: At Cranmer’s dinner, Stephen Gardiner and the Duke of Norfolk orchestrate
    a calculated attack on Thomas Cromwell’s reputation by reviving the scandal of
    Cardinal Bainbridge’s poisoning—a crime they imply was orchestrated by Wolsey
    (and by extension, Cromwell). Gardiner methodically reconstructs the timeline,
    naming Wolsey’s ally Bishop Gigli and insinuating Cromwell’s involvement in Rome,
    while Norfolk escalates the provocation with a vicious tirade against Wolsey’s
    legacy. Cromwell, already weakened by Henry’s recent dismissal and the return
    of his debilitating headaches, initially resists rising to the bait, but Norfolk’s
    relentless insults push him to a breaking point. He physically assaults Norfolk,
    hauling him from his chair in a rare loss of control, before Cranmer intervenes.
    The scene ends with Gardiner’s smug remark about the ‘peace conference,’ underscoring
    the political maneuvering that has just unfolded. This event marks a critical
    escalation in the court’s factional warfare, with Gardiner and Norfolk using Wolsey’s
    tarnished legacy as a weapon to isolate Cromwell and force him into a defensive
    posture. The attack also foreshadows their broader strategy to discredit Cromwell’s
    reformist agenda by associating him with Wolsey’s corruption and heresy.
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 41
  sequence_in_scene: 68
  key_dialogue:
  - 'STEPHEN GARDINER: I was trying to remember, Cranmer... when was it? 1514? Something
    like that? In Rome, when Cardinal Bainbridge died. It was given out at the time
    that one of his own household poisoned him.'
  - 'STEPHEN GARDINER: This was all before your time, of course. Bainbridge took ill
    at the dinner table. A powder in his broth. Like when Bishop Fisher was poisoned.
    When the cook was boiled alive.'
  - 'NORFOLK: He was no lord in those days.'
  - 'NORFOLK: Yes, and promoting false knaves to positions of trust, and soliciting
    bribes, falsifying deeds, bullying his betters, consorting with conjurers and
    generally thieving, lying and cheating... all to the detriment and ruin of the
    commonweal and the shame of the King.'
  - 'STEPHEN GARDINER: Well, I don’t know when I’ve enjoyed a peace conference as
    much as I’ve enjoyed this one.'
