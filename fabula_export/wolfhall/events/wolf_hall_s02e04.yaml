  key_dialogue:
  - 'MARY: I am told you are unhappy with my expenditure.'
  - 'CROMWELL: The King is building a navy, my lady. Coastal fortifications. There
    are many calls on his exchequer. Some of your costs are hard to justify.'
  - 'MARY: She has lost two mothers in a year. She is quite alone in the world. You
    assisted me to return, my lord. You instructed the Court to treat me as a princess
    in all but name. You must not be surprised if I behave like one.'
  - 'MARY: I hear that my Father brings our ambassador, Stephen Gardiner, back from
    France.'
  - 'MARY: You did not know?'
