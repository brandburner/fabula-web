  title: Henry demands governance from his sickbed
  description: In the wake of Queen Jane’s death and his own near-fatal illness, Henry
    VIII—propped up in bed with a festering leg wound—refuses medical advice and insists
    on ruling despite his frailty. Thomas Cromwell arrives to find the King visibly
    weakened but defiant, his authority tested by physical decline and political instability.
    Henry dismisses Dr. Butts’ warnings, asserting his right to govern even as his
    body betrays him. Cromwell seizes the moment to pitch a strategic marriage alliance
    with the German princess Anna of Cleves, framing it as both a political and personal
    triumph. However, the King’s insistence on publicly debating the heretic John
    Lambert—despite Cromwell’s reluctance—reveals Henry’s need to assert his religious
    and political dominance, even at the risk of provoking controversy. The scene
    underscores Henry’s desperate grip on power amid shifting alliances and Cromwell’s
    precarious position as the King’s indispensable yet expendable advisor. The tension
    between Henry’s vulnerability and his refusal to yield control sets the stage
    for Cromwell’s high-stakes maneuvering to secure England’s future while navigating
    the King’s volatile temperament.
