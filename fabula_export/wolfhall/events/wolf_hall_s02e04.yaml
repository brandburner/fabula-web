      is not just a physical object but a symbol of the divide between Jane’s fading
      life and the future she is leaving behind—a future that now rests, in part,
      on Cromwell’s shoulders. Its role is both practical, offering a view of the
      procession, and deeply symbolic, representing the legacy Jane is entrusting
      to others.
