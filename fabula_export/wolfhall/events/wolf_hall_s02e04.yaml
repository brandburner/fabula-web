  global_id: null
  title: Cromwell’s Fevered Vulnerability
  description: 'Thomas Cromwell lies bedridden in his chambers at Austin Friars, his
    body wracked by fever and his mind unmoored by delirium. The scene opens with
    him shivering violently under the covers, his usual sharp intellect and political
    cunning reduced to a state of raw physical and emotional exposure. The fever strips
    away his defenses, leaving him vulnerable—not just to the political machinations
    of his enemies, but to the resurgence of his own repressed guilt and trauma. This
    moment of weakness underscores the precariousness of his position: with Queen
    Jane dead, the King desperate for an heir, and his adversaries circling like wolves,
    Cromwell’s absence from court creates a critical power vacuum. The delirium forces
    him to confront the fragility of his carefully constructed world, where one misstep
    could unravel everything he’s built. The scene is a turning point, revealing the
    human cost of his ambition and setting up the external and internal threats that
    will define the next phase of his struggle for survival.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 34
  sequence_in_scene: 59
  key_dialogue:
  - 'CROMWELL: (delirious, whispering) ''Wolsey... Wolsey, I swear it... I did not...'''
  - 'CROMWELL: (gasping, half-lucid) ''The King... the King will not... he cannot...'''
  - 'CROMWELL: (suddenly lucid, voice breaking) ''Jenneke... my daughter... I never
    knew...'''
