- fabula_uuid: cand_evt_scene_f040cae4329fcf09_03
  global_id: null
  title: Cromwell’s monastic fantasy with Jenneke
  description: "\n  In the sunlit gardens of Austin Friars, Cromwell observes Jenneke\
    \ and Gregory laughing together before joining them. Their conversation reveals\
    \ Jenneke’s blunt, unfiltered nature as she questions Cromwell’s personal life—his\
    \ lack of remarriage, his relationships with women—challenging his usual evasiveness.\
    \ When Cromwell offers to arrange a marriage for her in England, Jenneke subtly\
    \ resists, exposing his desperation to control and protect her. His vulnerability\
    \ deepens as he confesses his unresolved guilt over betraying Cardinal Wolsey’s\
    \ daughter, Dorothea, and his existential crisis: *‘It has undone me, Jenneke.\
    \ Her accusation. I have lost my way.’* Jenneke’s response—*‘Then leave this life’*—triggers\
    \ Cromwell’s fleeting fantasy of retreat to Launde Abbey, a monastic escape where\
    \ he imagines a serene, shared existence with her. The moment reveals his longing\
    \ for redemption and simplicity, contrasting sharply with his ruthless political\
    \ reality. The scene functions as a rare crack in Cromwell’s armor, exposing his\
    \ fragility and the cost of his ambition.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 7
  sequence_in_scene: 12
  key_dialogue:
  - 'JENNEKE: Of course you’ll stay. When my father is King and married to Meg Douglas
    and Lady Mary both, then you shall be Princess Jenneke, and we will speed through
    Whitehall in our silver chariot - and throw buns to the populace. What can Antwerp
    offer, next to that?'
  - 'CROMWELL: I’ll make you a marriage here, if you think you could love an Englishman.'
  - 'JENNEKE: You chose Gregory’s bride for him. Would it be the same with me?'
  - 'CROMWELL: I don’t know. I don’t think so. But it has undone me, Jenneke. Her
    accusation. I have lost my way.'
  - 'JENNEKE: Then leave this life. Leave it. Won’t your King release you, after everything
    you’ve done for him?'
  - 'CROMWELL: There is an abbey - Launde, in the heart of England - that will shortly
    come down. It is a blessed place. The bees there, they make honey scented with
    thyme. I have thought of it for myself, once the abbot surrenders it. That I might
    live there when I’m old and all this is over. You could live there too.'
