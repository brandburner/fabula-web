      casting long shadows that dance across the walls. They create an atmosphere
      of uncertainty and tension, mirroring the precariousness of Jane’s condition
      and the political stakes at play. The fire crackles softly, a steady but insufficient
      counterpoint to the heavy silence that permeates the room. As Jane struggles
      to the window, the light from the candles and fireplace seems to recede, emphasizing
      the contrast between the warmth of the bedchamber and the cold reality of her
      impending death. The objects serve as both a practical necessity and a metaphor
      for the fragile hold on life that Jane and those around her are clinging to.
    status_before_event: Burning steadily, casting a dim but warm glow across the
      bedchamber, their light barely penetrating the heavy shadows.
