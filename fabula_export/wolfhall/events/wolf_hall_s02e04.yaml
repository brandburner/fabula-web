  global_id: null
  title: Cromwell abandons council to confront Henry
  description: 'In the council chamber, the nobles—still in mourning for Queen Jane—press
    Cromwell to secure Henry VIII’s next marriage, their urgency revealing their fear
    of political instability. Norfolk bluntly frames the task as Cromwell’s sole responsibility,
    while Edward Seymour suggests a cautious approach. Cromwell, visibly frustrated,
    abruptly stands and declares he will ask the King directly, bypassing the council’s
    collective pressure. His defiance signals a power shift: he no longer defers to
    their consensus but asserts his authority as the King’s sole intermediary. Norfolk’s
    hasty pursuit underscores the high stakes—Cromwell’s move is a calculated risk,
    positioning himself as the only one who can navigate Henry’s grief and the kingdom’s
    future. The moment marks the end of council unity and the beginning of a direct,
    high-stakes confrontation between Cromwell and the King, where personal loyalty
    and political survival hang in the balance.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 10
  sequence_in_scene: 16
  key_dialogue:
  - 'NORFOLK: It’s down to you to get him through this, Cromwell. Through it and out
    the other side a married man again. That’s all that’s important now. I mean, no
    disrespect to our lord Prince but we all know how easily a babe is snuffed out.'
  - 'EDWARD SEYMOUR: I suppose you could feel out the terrain, Crumb?'
  - 'CROMWELL: To ask him. That''s what you want, isn''t it?'
