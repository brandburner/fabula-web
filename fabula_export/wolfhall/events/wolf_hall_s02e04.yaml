  title: Gardiner’s Accusation in the Great Hall
  description: In the Tower of London’s Great Hall, Archbishop Cranmer urgently warns
    Cromwell that Nicholas Lambert’s radical theological views threaten the fragile
    religious consensus, revealing Cranmer’s moral conflict between personal conviction
    and political survival. Before Cromwell can respond, Stephen Gardiner arrives,
    immediately pivoting the conversation into an ideological attack. Gardiner’s pointed
    accusation—‘Why have you tolerated an anabaptist?’—exposes Cromwell’s vulnerability,
    forcing him to publicly distance himself from Lambert’s heresy while Gardiner
    subtly undermines his authority. The exchange sharpens the court’s ideological
    divisions, with Gardiner positioning himself as the defender of orthodoxy and
    Cromwell as a pragmatist whose loyalty to the King is now under scrutiny. The
    tension escalates as the King’s entrance interrupts the confrontation, leaving
    Cromwell’s political position precarious and the ideological fault lines of the
    court exposed.
