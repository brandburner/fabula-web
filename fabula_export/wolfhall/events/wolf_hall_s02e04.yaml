- fabula_uuid: cand_evt_scene_2dadcac9942dbe5e_02
  global_id: null
  title: Cromwell’s candle ultimatum to Pole
  description: "\n  In the grim confines of the Tower’s Bell Tower, Thomas Cromwell\
    \ orchestrates a psychological siege on the broken Geoffrey Pole, who lies bloodied\
    \ after a failed suicide attempt. Cromwell feigns concern but swiftly pivots to\
    \ a calculated interrogation, exploiting Pole’s desperation to extract information\
    \ about his family’s treasonous dealings. The scene escalates when Cromwell introduces\
    \ a French merchant’s custom—*la vente à la bougie*—where Pole’s life is auctioned\
    \ off against the burning candle’s flame. The tactic forces Pole into a corner,\
    \ with Cromwell’s offer of conditional reprieve (life in exchange for betrayal)\
    \ serving as both a test of loyalty and a demonstration of Cromwell’s ruthless\
    \ efficiency. Wriothesley’s presence underscores the stakes, while Pole’s defiant\
    \ silence highlights the power struggle at play. The candle’s slow burn becomes\
    \ a ticking clock, amplifying the tension and reinforcing Cromwell’s mastery of\
    \ psychological manipulation. This moment is a microcosm of Cromwell’s broader\
    \ strategy: leveraging fear, urgency, and conditional mercy to break resistance\
    \ and secure leverage in Henry’s court.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 20
  sequence_in_scene: 33
  key_dialogue:
  - 'CROMWELL: I thought you and I understood each other.'
  - 'GEOFFREY POLE: Who can understand you, Cromwell?'
  - 'CROMWELL: The French merchants are funny, don’t you think? The French merchants
    have a custom. They call it, ‘la vente à la bougie.’ Suppose you have something
    for sale. It might be a bale of wool, or books, or a castle. All the interested
    parties are gathered together, there is some discussion, perhaps there’s a glass
    of wine, and then the bidding begins, and lasts until the candle burns down. When
    the candle burns out, the bidding ceases and the deal is done. Now, you answer
    my questions before this candle dies and I will offer you your life. It will be
    on my terms but still it''ll be your life.'
