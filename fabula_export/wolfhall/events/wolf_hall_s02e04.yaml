- fabula_uuid: cand_evt_scene_2dadcac9942dbe5e_01
  global_id: null
  title: Cromwell’s candle ultimatum to Pole
  description: 'In the grim confines of the Tower’s Bell Tower, Thomas Cromwell—accompanied
    by Wriothesley and the gaoler Martin—confronts the bloodied and broken Geoffrey
    Pole, who has just attempted suicide. Cromwell feigns concern but swiftly pivots
    to psychological manipulation, exploiting Pole’s desperation with a calculated
    ultimatum: his life in exchange for betraying his family’s secrets before a candle
    burns down. The tactic mirrors a French merchant custom, ‘la vente à la bougie,’
    where bidding ceases when the candle extinguishes, symbolizing the finality of
    Pole’s choice. Cromwell’s cold precision contrasts with Pole’s defiant silence,
    revealing his mastery of coercion while underscoring the high stakes of loyalty
    and survival in the Tudor court. The scene serves as a microcosm of Cromwell’s
    ruthless pragmatism, where even mercy is a weaponized tool for extracting leverage.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 20
  sequence_in_scene: 32
  key_dialogue: &id009
  - 'WRIOTHESLEY: How is he?'
  - 'MARTIN: Well enough. For a man with a hole in him.'
  - 'CROMWELL: Geoffrey. Geoffrey Pole. I hear you’ve tried to kill yourself. Dear
    God.'
  - 'GEOFFREY POLE: Who can understand you, Cromwell?'
  - 'CROMWELL: The French merchants are funny, don’t you think? The French merchants
    have a custom. They call it, ‘la vente à la bougie.’ Suppose you have something
    for sale. It might be a bale of wool, or books, or a castle. All the interested
    parties are gathered together, there is some discussion, perhaps there’s a glass
    of wine, and then the bidding begins, and lasts until the candle burns down. When
    the candle burns out, the bidding ceases and the deal is done. Now, you answer
    my questions before this candle dies and I will offer you your life. It will be
    on my terms but still it''ll be your life.'
  - 'CROMWELL: Your life in return for information about your family. Now, so far
    you’ve offered us, well, a scant few pence worth, haven’t you? But Wriothesley,
    he thinks you''re good for a thousand pounds. So, have a think, dig deep in your
    pockets and see what you can come up with to persuade me.'
