    - By creating a sense of urgency that contrasts with Cromwell’s emotional stagnation,
      highlighting the gap between his public role and private failures.
    - Via Rafe’s warnings, which serve as a conduit for the alliance’s indirect influence
      over Cromwell’s decisions.
    institutional_impact: The Franco-Spanish Alliance’s potential actions force Cromwell
      to reckon with the consequences of his emotional evasions. If he cannot address
      his personal crises, his ability to protect England from external threats is
      compromised. The alliance thus becomes a catalyst for Cromwell’s eventual confrontation
      with his own failures, both as a father and as a statesman.
    internal_dynamics: The alliance’s threat is exacerbated by the internal divisions
      within England’s court, divisions that Cromwell’s household mirrors. His inability
      to address Gregory’s fear is a microcosm of his broader inability to unite the
      kingdom against external enemies. The alliance’s power lies in its ability to
      exploit these internal weaknesses, making it a direct antagonist to Cromwell’s
