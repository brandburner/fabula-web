  title: Cromwell’s fractured trust with Gregory
  description: 'In the dim, late-night privacy of his study, Cromwell grapples with
    two crises: the looming Franco-Spanish alliance and his son Gregory’s unspoken
    fear of him. Rafe urges Cromwell to take the geopolitical threat seriously, warning
    that a Franco-Spanish peace would redirect their aggression toward England. Cromwell,
    distracted, deflects by exposing Gregory’s absence—his son had entered the room
    only to retreat, sensing his father’s disinterest. Cromwell admits, ‘He’s frightened
    of me. I don’t know why,’ revealing a rare moment of vulnerability. Instead of
    addressing Gregory’s fear, Cromwell pivots to a financial ledger, detailing Mary’s
    extravagant spending (100 pearls, 300 pounds for clothes, gambling debts) as a
    way to avoid emotional confrontation. The scene underscores Cromwell’s reliance
    on political maneuvering to evade personal reckoning, while Gregory’s fear symbolizes
    the cost of his ruthless ambition—his family’s emotional withdrawal. The moment
    crystallizes Cromwell’s dual crises: his public role as the King’s architect of
    survival and his private failure as a father, both of which threaten to unravel
    his carefully constructed power.'
