      of candles and the fireplace. When Jane pulls back one of the curtains to gaze
      down at her son’s christening procession, the sudden influx of daylight is jarring,
      illuminating her pale face and the stark contrast between the lively ceremony
      below and the oppressive atmosphere of the bedchamber. The tapestries and curtains
      serve as a physical manifestation of Jane’s isolation, both from the world outside
      and from the life she is leaving behind. Their presence underscores the finality
      of her condition and the fragility of the moment.
