  title: Cromwell confronts his moral failure
  description: 'In the quiet of his study, Cromwell grapples with the fallout of abandoning
    John Lambert—a reformist ally—to political expediency. His frustration with Gardiner’s
    sabotage of the reformation and his own complicity in Lambert’s condemnation leave
    him uncharacteristically vulnerable. Cranmer’s pragmatic counsel—that maintaining
    power is the only way to advance the gospel—clashes with Cromwell’s guilt over
    betraying a man whose beliefs he shares. The exchange reveals Cromwell’s existential
    crisis: his ruthless pragmatism has eroded his moral compass, forcing him to question
    whether his ambition has always been a facade for self-interest. The moment underscores
    the cost of his political survival as the weight of his choices threatens to unravel
    his carefully constructed self-justification. A later flashback to Shaftesbury
    Abbey (now at night) hints at the psychological toll of his decisions, blurring
    the line between memory and guilt.'
