    description_of_involvement: The ledger of Lady Mary’s expenditures is a physical
      manifestation of Cromwell’s emotional evasion. It is not merely a document but
      a shield, a distraction from the raw vulnerability of admitting his son’s fear.
      Cromwell’s fingers grip the paper as if it were a lifeline, his voice taking
      on a clinical precision as he recites the sums—100 pearls, 300 pounds, gambling
      debts—as though the cold, hard numbers could somehow justify his avoidance of
      Gregory. The ledger becomes a symbol of the bureaucratic armor Cromwell dons
      to protect himself from the messiness of human connection. Rafe’s horror at
      the figures is not just about the waste of resources; it is a visceral reaction
      to the rot creeping into Cromwell’s household, a rot that the ledger both exposes
      and conceals.
    status_before_event: Resting on Cromwell’s desk, untouched but present—a silent
      witness to the evening’s earlier conversations. Its contents are known to Cromwell
      but not yet weaponized as a distraction.
