    - To fulfill his professional duty without overstepping his bounds (knowing his
      place in the court hierarchy)
    what_happened: Dr. Butts enters the scene as the voice of medical reason, his
      demeanor deferential but his words urgent. He describes the King’s wound with
      clinical precision (‘a massive, livid, open sore’) and advises a spare diet
      and watered wine, his tone betraying his concern. Yet when Henry dismisses his
      advice with a cutting remark (‘Then who will rule, Doctor Butts?’), Butts steps
      back, bowing in submission. His interaction with Cromwell is brief but pointed;
      he confirms the gravity of Henry’s condition, his expression grave. Butts is
      caught between his professional duty to heal and his understanding of the King’s
      unyielding will—he knows his advice will be ignored, but he must speak it nonetheless.
