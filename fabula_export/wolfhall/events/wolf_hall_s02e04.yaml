  key_dialogue:
  - 'CROMWELL: The Duke of Norfolk wants an audience. He threatens to talk to you
    like a father.'
  - 'HENRY: I could well be content to live chaste my remaining days.'
  - 'CROMWELL: Parliament will also petition your majesty.'
  - 'HENRY: I shall not get such a pearl as Jane again.'
  - 'HENRY: Talk to me again in a week, my lord. I shall try to have a better answer
    for you.'
