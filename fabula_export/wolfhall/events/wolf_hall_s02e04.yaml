- fabula_uuid: cand_evt_scene_16afa0a186c38b84_03
  global_id: null
  title: Cromwell’s Violent Outburst at Gardiner’s Trap
  description: During a tense dinner at Lambeth Palace, Stephen Gardiner and the Duke
    of Norfolk orchestrate a calculated attack on Thomas Cromwell, using veiled accusations
    about Cardinal Wolsey’s alleged involvement in the poisoning of Cardinal Bainbridge.
    Gardiner’s insinuations—paired with Norfolk’s escalating verbal assaults—are designed
    to provoke Cromwell, exploiting his known loyalty to Wolsey and his volatile temper.
    Cromwell initially resists, but Norfolk’s relentless, public humiliation of Wolsey’s
    legacy pushes him to a breaking point. In a sudden, explosive moment, Cromwell
    physically hauls Norfolk from his chair, nearly choking him before Cranmer intervenes.
    The outburst is a strategic victory for Gardiner, who calmly observes that the
    confrontation has exposed Cromwell’s volatility, undermining his political composure.
    The scene underscores the fragility of Cromwell’s position, the orchestrated nature
    of his enemies’ attacks, and the dangerous intersection of personal rage and political
    vulnerability. The moment also reveals Cromwell’s deep-seated guilt over his past
    actions and his struggle to maintain control in the face of relentless provocation.
