  title: Mary challenges Cromwell’s authority
  description: In Mary’s private chamber, Princess Mary confronts Thomas Cromwell
    about her spending, asserting her royal status with calculated precision. She
    begins by acknowledging his oversight of her finances but pivots to remind him
    of his own role in restoring her position at court. The tension escalates when
    she reveals—with a knowing smile—that her father, King Henry, has recalled Stephen
    Gardiner from France, a move Cromwell clearly did not anticipate. Mary’s revelation
    is a deliberate provocation, exposing Cromwell’s vulnerability and signaling the
    return of a formidable political adversary. The exchange underscores Mary’s growing
    confidence and Cromwell’s precarious position as the court’s power dynamics shift
    beneath him. The scene functions as both a character moment (Mary’s assertion
    of agency) and a plot catalyst (Gardiner’s return), forcing Cromwell to confront
    a resurgent threat to his influence.
