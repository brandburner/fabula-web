  title: Cromwell coaxes Henry toward remarriage
  description: In a private chess game within the King’s inner chamber, Thomas Cromwell
    subtly pressures Henry VIII to remarry by invoking both Norfolk’s paternalistic
    demands and Parliament’s impending petition. Henry, still grieving Jane Seymour’s
    death, resists the idea of another marriage, even as Cromwell strategically concedes
    the advantage in their game to soften the blow. The King’s melancholy is palpable—he
    laments that no woman could replace Jane—yet Cromwell’s calculated moves (both
    on the board and in conversation) reveal his urgency to secure a political alliance
    and an heir. The scene underscores Cromwell’s mastery of manipulation, using Henry’s
    vulnerability to advance his agenda while masking his own desperation. The King’s
    reluctant concession—‘I shall try to have a better answer for you’—marks a turning
    point, as Cromwell’s influence over the monarchy’s future begins to solidify despite
    Henry’s lingering grief and resistance.
