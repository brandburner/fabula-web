    description_of_involvement: The Queen’s bedchamber at Hampton Court Palace is
      a claustrophobic, oppressive space where the weight of impending death hangs
      heavy in the air. Heavy tapestries and curtains block out daylight, trapping
      shadows around Jane’s great bed of state. The room is stuffy and dimly lit,
      the atmosphere thick with the scent of sickness and the unspoken fear of what
      is to come. This is a space of private grief, where the King’s usual authority
      is stripped away, and even Cromwell—one of the most powerful men in England—is
      reduced to a silent witness. The bedchamber is not just a physical location
      but a metaphor for the confinement of human emotion and the inescapability of
      mortality.
    observed_atmosphere: Oppressive, suffocating, and heavy with grief. The air is
      thick with the scent of sickness, and the dim lighting casts long shadows, amplifying
      the sense of dread and inevitability. The room feels like a liminal space—neither
      fully part of the living world nor yet the realm of the dead, but a threshold
      where the two intersect.
