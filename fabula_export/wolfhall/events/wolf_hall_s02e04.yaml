  title: Cromwell observes Mary’s reckless gambling
  description: In Mary’s sunlit privy chamber, Lady Mary and her aristocratic companions
    engage in a frivolous card game, their laughter masking the tension of the court.
    Thomas Cromwell and Lady Rochford observe from the periphery, with Rochford’s
    pointed remarks about Mary’s gambling habits revealing her impulsive nature—a
    flaw that could prove politically exploitable in the volatile aftermath of Queen
    Jane’s death. The scene underscores Mary’s defiance and vulnerability, while Cromwell’s
    silent observation hints at his strategic assessment of her as both a liability
    and a potential pawn in the court’s power struggles. The moment serves as a subtle
    foreshadowing of Mary’s later confrontation with Cromwell over her spending and
    authority, reinforcing the theme of recklessness as a political weakness in an
    era where every move is scrutinized for its consequences.
