  title: Cromwell rejects Norfolk’s French marriage gambit
  description: In a tense, power-laden exchange along Hampton Court’s cloister corridor,
    the Duke of Norfolk pressures Thomas Cromwell to secure a French marriage alliance
    for Henry VIII, framing it as a strategic necessity to fracture the Franco-Imperial
    alliance. Norfolk dismisses Cromwell’s preference for a German bride—calling it
    dishonorable and politically weak—while subtly undermining Cromwell’s authority
    by questioning his willingness to act alone. Cromwell, ever the pragmatist, counters
    by insisting on parliamentary and council backing, a move that forces Norfolk
    to retreat. The confrontation culminates in the deserted Presence Chamber, where
    Cromwell firmly rejects Norfolk’s attempt to accompany him into the King’s presence,
    signaling his strategic independence and the widening rift between the factions
    vying to shape England’s future. The moment underscores Cromwell’s political acumen—he
    refuses to be maneuvered into a vulnerable position, even as Norfolk’s insistence
    reveals the depth of his own desperation to regain influence over the King’s marriage
    plans. The exchange also foreshadows the escalating factional warfare in the court,
    where alliances are fluid and loyalty is transactional.
