  - object_uuid: ger_object_4c0fb252cd4c
    description_of_involvement: 'The pillows propping Henry VIII upright in bed are
      more than mere support—they are a visual metaphor for his precarious grip on
      power. Their abundance contrasts sharply with his gaunt, sunken face, underscoring
      the fragility of his physical state. Yet they also serve a practical purpose:
