  global_id: null
  title: Cromwell Abandons Lambert
  description: 'In the Great Hall of the Tower of London, John Lambert—a reformist
    thinker whose views align with Cromwell’s own—stands trial before Henry VIII for
    heresy. Lambert, resolute but visibly overwhelmed, defends his beliefs: the Eucharist
    is symbolic, women may teach in necessity, and priests should marry. The bishops
    react with outrage, and Gardiner goads the King to condemn him. When Henry defers
    to Cromwell as his spiritual deputy, Cromwell—after a tense pause—publicly abandons
    Lambert, declaring nothing is ''wanting'' in the King’s reasoning. The hall erupts
    in shock. Cranmer avoids Cromwell’s gaze, Lambert stares in horror, and Gardiner
    smirks in triumph. The moment marks Cromwell’s calculated betrayal of a reformist
    ally, prioritizing political survival over ideological loyalty. The scene underscores
    the fragility of Cromwell’s position as Henry’s power wanes and his enemies circle,
    while also revealing the cost of his pragmatism on those who trusted him.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 24
  sequence_in_scene: 47
  key_dialogue:
  - |-
    HENRY: And the body of Christ. Is it present in the sacrament?
    JOHN LAMBERT: No, sire. It is not Christ’s flesh.
  - 'GARDINER: May as well set fire to him now.'
  - |-
    HENRY: The vicegerent, who is my deputy in all matters spiritual, will speak now.
    CROMWELL: Majesty, having heard your reasoning, I do not think anything is wanting.
