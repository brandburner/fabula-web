    - 'The stacks of law books and financial ledgers, symbolizing the dual pillars
      of Cromwell’s power: intellect and control'
    - The window overlooking the garden, a fleeting connection to the natural world
      amid the artificiality of court life
    - The quiet, almost suffocating stillness of the room, broken only by the low
      murmur of voices and the occasional crackle of the candle flame
