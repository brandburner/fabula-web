- fabula_uuid: act_1aa7c61b9e2311d9
  number: 2
  summary: 'Following Queen Jane''s death, this act propels Cromwell into a relentless
    struggle to secure England''s future and King Henry''s succession amidst escalating
    internal and external threats. He faces immediate, conflicting pressures regarding
    Henry''s remarriage: Norfolk vehemently advocates for a French alliance to counter
    the burgeoning Franco-Imperial pact, while Cromwell strategically champions a
    German Protestant union, aligning with his reformist agenda. The looming threat
    of invasion from the Holy Roman Empire, fueled by discontented Plantagenet families
    loyal to Rome, forces Cromwell to employ his ruthless pragmatism. He initiates
    a chilling interrogation of Geoffrey Pole in the Tower, using psychological torture
    to extract vital information about the conspirators, demonstrating his willingness
    to dismantle England''s oldest noble houses ''like skittles.'' Simultaneously,
    he dispatches Wyatt to the Emperor, tasking him with the delicate and critical
    mission of fracturing the Franco-Imperial alliance. A brief respite in Henry''s
    health crisis offers Cromwell a window to propose Anna of Cleves, a potential
    strategic victory. However, the return of Bishop Gardiner, a staunch conservative
    and Cromwell''s ideological adversary, immediately shifts the political tide.
    The public trial of John Lambert, a heretic whose reformist views mirror Cromwell''s
    own, becomes a crucible for Cromwell''s principles. Faced with Henry''s unwavering
    orthodoxy and Gardiner''s machinations, Cromwell makes the agonizing decision
    to remain silent, effectively abandoning Lambert to his fate. This profound moral
    compromise, made for the sake of maintaining his power and protecting the broader
    gospel cause, leaves him dejected and acutely aware of the personal cost of political
    survival, foreshadowing the increasing isolation and danger he faces.'
