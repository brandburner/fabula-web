- fabula_uuid: cand_evt_scene_f040cae4329fcf09_01
  global_id: null
  title: Cromwell offers Jenneke refuge and reveals his guilt
  description: 'In the sunlit gardens of Austin Friars, Cromwell observes Jenneke
    and Gregory laughing together, their easy camaraderie momentarily softening his
    guarded demeanor. He approaches and interrogates Jenneke about her past in Antwerp,
    probing her resilience and loyalty while subtly testing her potential as a political
    asset. Their conversation shifts from playful banter to raw vulnerability when
    Cromwell abruptly confesses his long-buried guilt over betraying Cardinal Wolsey’s
    daughter, Dorothea—a moment that exposes his existential crisis and desperation
    for redemption. He then pivots to a calculated offer: protection in England, a
    strategic marriage, and a future at Launde Abbey, framing it as both paternal
    concern and a shrewd maneuver to bind her to his ambitions. Jenneke’s calm resistance
    forces Cromwell to confront his own contradictions—his need for control clashing
    with his rare moments of emotional exposure. The exchange underscores Cromwell’s
    duality: a master manipulator who also craves genuine connection, and Jenneke’s
    unwitting role as both a pawn and a mirror for his unresolved past. The scene
    serves as a turning point, revealing Cromwell’s fragility beneath his political
    armor and setting up Jenneke’s reluctant entanglement in his high-stakes games
    of power and survival.'
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 7
  sequence_in_scene: 10
  key_dialogue:
  - 'GREGORY: Of course you’ll stay. When my father is King and married to Meg Douglas
    and Lady Mary both, then you shall be Princess Jenneke, and we will speed through
    Whitehall in our silver chariot - and throw buns to the populace. What can Antwerp
    offer, next to that?'
  - 'JENNEKE: Did you know I had another master before the King? Wolsey, the prelate?
    CROMWELL: He had a daughter, Dorothea - illegitimate. I offered her comfort and
    a home. I offered her my own hand in marriage - all for love of her father. But
    she rejected me. She said I had betrayed her father, my master, at the end of
    his days. JENNEKE: Did you? Betray him? CROMWELL: I don’t know. I don’t think
    so. But it has undone me, Jenneke. Her accusation. I have lost my way.'
  - 'CROMWELL: Don’t go back, Jenneke. I can protect you better here. I’ll make you
    a marriage here, if you think you could love an Englishman. JENNEKE: You chose
    Gregory’s bride for him. Would it be the same with me? CROMWELL: Gregory is my
    heir, it is not the same. I will give you your choice of bridegroom, of course
    I will. And then I’ll make you a good settlement. This place must seem strange
    to you now but you will soon come to feel it’s home.'
