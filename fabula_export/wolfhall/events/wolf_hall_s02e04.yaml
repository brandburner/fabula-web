  key_dialogue:
  - 'CROMWELL: Jenneke. If you need me, if you ever need me, send a message over the
    sea. It will reach me.'
  - 'JENNEKE: When I was little, I used to ask my mother, ''Where did my father go?''
    and she would say, ''Gone over the sea.'' I thought you had sailed to the new-found
    lands, and would bring back treasure. I used to watch for your ship coming up
    the Scheldt.'
  - 'JENNEKE: Then come with me now, Father. To Antwerp, that you were homesick for.'
  - 'JENNEKE: But you will not.'
