  key_dialogue:
  - |-
    HENRY: And the body of Christ. Is it present in the sacrament?
    JOHN LAMBERT: No, sire. It is not Christ’s flesh.
  - |-
    HENRY: What about women? Is it lawful for a woman to teach?
    JOHN LAMBERT: In case of necessity, yes.
  - |-
    HENRY: And may priests marry?
    JOHN LAMBERT: Yes. Any man should, if he has not the gift of chastity. St Paul is clear in the matter.
  - |-
    HENRY: The vicegerent, who is my deputy in all matters spiritual, will speak now.
    CROMWELL: Majesty, having heard your reasoning, I do not think anything is wanting.
  - 'GARDINER: What? Nothing is wanting? Go on, Cromwell, reason the case. You think
    no one wants to hear you? I want to hear you. You agree with him, don''t you?'
