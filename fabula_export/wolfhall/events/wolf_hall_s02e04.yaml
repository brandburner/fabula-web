      space within the gardens of Austin Friars.
    status_after_event: Now imbued with the emotional weight of Cromwell’s confession
      and Jenneke’s firm but empathetic response. The bench remains physically unchanged
      but carries the residue of their exchange, a silent witness to Cromwell’s unraveling.
