  number: 1
  summary: 'The episode opens with King Henry VIII admiring a grand Holbein mural,
    a stark, almost ironic, contrast to his own visibly ailing and increasingly frail
    physical state. This scene immediately establishes the precariousness of the Tudor
    court, despite its outward display of power. Cromwell, ever the astute observer,
    notes Queen Jane''s marble-pale face and her subtle stiffening under Henry''s
    touch, a quiet foreshadowing of her own impending fragility. His personal world
    is then unexpectedly shaken by the arrival of Jenneke, his estranged daughter,
    whose existence he was unaware of. Her calm demeanor and direct questions about
    his past, including his relationship with Wolsey and accusations of betrayal,
    force Cromwell into a rare moment of introspection, revealing his deep-seated
    vulnerabilities and a fleeting, almost wistful, desire for a simpler life away
    from the court''s relentless demands. This personal turmoil is abruptly overshadowed
    by the central, devastating event: Queen Jane''s death shortly after giving birth
    to the longed-for male heir, Prince Edward. Her passing plunges the court into
    a complex mix of jubilation for the heir and profound grief for the Queen. Cromwell''s
    raw, public outburst of rage and sorrow, coupled with his dangerous assertion
    that he could have managed her survival, underscores his immense emotional investment
    and the perilous nature of his position. The act culminates with the Council,
    led by Norfolk, immediately and unceremoniously demanding that Cromwell secure
    a new marriage for the King, thrusting him into the heart of a new political maelstrom
    before the mourning period has even truly begun. This sets the urgent, high-stakes
    agenda for the subsequent narrative.'
