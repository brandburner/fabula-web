    to court, escorted by the Duke of Norfolk. The scene crackles with political tension
    as Gardiner’s reentry, orchestrated by Norfolk, becomes a deliberate provocation
    against Cromwell’s reformist influence. The crowd’s deference to Gardiner underscores
    his resurgent power, while Cromwell and Rafe observe from the periphery, their
    expressions betraying the gravity of this maneuver. Gardiner’s return is not merely
    personal; it signals a strategic realignment of forces at court, forcing Cromwell
    to recalibrate his alliances amid Henry’s growing instability and the looming
    threat of a Franco-Spanish alliance. The moment is a turning point, exposing the
    fragility of Cromwell’s position and the escalating stakes of the power struggle
    between reformists and conservatives.
