  participations:
  - character_uuid: ger_agent_83363f1e96db
    emotional_state: A storm of fear, loyalty, and despair; his defiance is a fragile
      shield against the inevitability of Cromwell’s demands. The candle’s flame mirrors
      the flicker of hope in his chest—hope that he can endure, that his family’s
      secrets will remain safe, that death might be preferable to betrayal.
    goals:
    - Protect his family’s secrets at all costs, even if it means facing execution.
    - Maintain his dignity and loyalty in the face of Cromwell’s psychological torture,
      refusing to be broken.
    what_happened: Geoffrey Pole is a study in battered defiance. Bloodstains mar
      his tunic, and his hollow-eyed gaze flickers between Cromwell, the candle, and
      the stool he distrusts. He scrambles to his feet when the cell door opens, his
      movements betraying both weakness and a stubborn refusal to be cowed. As Cromwell
      speaks, Pole’s jaw tightens, his silence a wall against the onslaught of words.
      He flinches when Cromwell mentions burning him, but his defiance hardens as
      the candle is lit. His body language is rigid, his hands clenched—physical manifestations
      of his internal struggle between survival and loyalty to his family. When Cromwell
      finishes his ultimatum, Pole’s silence is deafening, a final act of resistance
      in the face of inevitable coercion.
