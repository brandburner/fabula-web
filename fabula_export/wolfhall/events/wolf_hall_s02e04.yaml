  title: Cromwell’s impossible choice with Jenneke
  description: 'In the quiet of Austin Friars’ chapel, Cromwell and Jenneke share
    a fragile, heartbreaking exchange that exposes the gulf between his political
    obligations and his personal longing. Jenneke reveals her childhood fantasy of
    him as a heroic explorer—now shattered by his prolonged absence—while Cromwell,
    visibly moved, offers her a lifeline: a message sent over the sea if she ever
    needs him. When she invites him to flee England with her, the moment hangs in
    the air, raw with possibility. His hesitation and eventual silence speak volumes:
    he cannot abandon his post, even for the daughter he never knew. The scene underscores
    Cromwell’s self-imposed exile from personal happiness, his guilt over past failures,
    and the inescapable weight of his role in the Tudor court. The choir’s distant
    singing underscores the irony—beauty and order exist in his world, but he is forever
    excluded from them.'
