      despite his illness. The pillows are a silent witness to the tension between
      Henry’s defiance and his vulnerability, a physical manifestation of the court’s
      desperate need for stability in the face of his decline. Cromwell’s arrival
      finds Henry already propped up, a signal that the King is determined to rule,
      no matter the cost.'
