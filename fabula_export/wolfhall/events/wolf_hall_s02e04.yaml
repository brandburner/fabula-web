  title: Cromwell’s Grief and Treasonous Outburst
  description: "\n  In the King’s presence chamber, Thomas Cromwell receives silent\
    \ confirmation of Queen Jane Seymour’s death from Rafe Sadler, a moment that immediately\
    \ unravels his carefully constructed composure. His grief spirals into a public,\
    \ volatile outburst, where he levels accusations of negligence against the court—claiming\
    \ Jane’s death could have been prevented if she had married him instead of Henry.\
    \ The treasonous undertones of his statements (implying he could have managed\
    \ her care better than the King) shock the assembled courtiers, including Fitzwilliam,\
    \ and expose the depth of his emotional investment in Jane. His half-brother Richard\
    \ and Wriothesley exchange concerned glances, recognizing the political danger\
    \ of his words. This scene marks a critical fracture in Cromwell’s facade, revealing\
    \ his vulnerability and planting seeds for his eventual downfall as his enemies\
    \ seize on his unguarded moment of rage and grief.\n  "
  episode_uuid: ep_sea_ser_wolf_hall_s02_e04
  scene_sequence: 9
  sequence_in_scene: 14
  key_dialogue:
  - 'CROMWELL: "That’s just negligence. Negligence. They have suffered her to take
    cold. They have suffered her to eat things she should not have eaten."'
  - 'CROMWELL: "If she''d married me she''d be alive. She’d be alive now."'
  - 'CROMWELL: "I would have managed it. I would have managed it better!"'
