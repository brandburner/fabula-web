  title: Cromwell learns the heir’s survival
  description: 'In the tense aftermath of Queen Jane’s death, Thomas Cromwell descends
    into the dimly lit Great Hall of Austin Friars, where his nephew Richard Cromwell
    and household servants await him in anxious silence. The moment is charged with
    unspoken dread—Cromwell’s immediate question, *Alive?*, cuts through the tension,
    revealing his singular focus on the newborn heir’s survival. Richard’s confirmation,
    *Alive*, is met with Cromwell’s sharp follow-up: *Maid or man?*, exposing the
    political stakes of the child’s gender. The exchange is terse, functional, and
    laden with subtext: Cromwell’s urgency betrays his awareness that a male heir
    would secure Henry’s legacy, while a female would reignite succession crises.
    The scene hinges on this fragile hope, a turning point that could either stabilize
    the Tudor dynasty or plunge England into further instability. The servants’ hushed
    demeanor underscores the gravity of the moment, framing it as a pivot between
    grief and opportunity in Cromwell’s precarious world.'
