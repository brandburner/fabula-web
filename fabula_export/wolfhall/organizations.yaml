  global_id: ger_organization_5b1ab71879e6
  canonical_name: Papists
  description: Cromwell warns that the Papists, a Catholic faction, threaten to seize
    Princess Mary during Henry VIII's crisis. They would proclaim her queen, ignite
    civil war, and undermine the king's authority. This external antagonistic force
    underscores the precarious balance of Reformation-era loyalties and power struggles.
  sphere_of_influence: Catholic Political Agitation Against Tudor Supremacy
  season_appearances:
