- fabula_uuid: ger_organization_b4d337ef5e88
  global_id: ger_organization_b4d337ef5e88
  canonical_name: Orthodox Church
  description: The Orthodox Church enforces religious orthodoxy through public burnings
    of heretics, such as Joan Boughton. Crowds jeer during these executions, amplifying
    the Church's authority and the spectacle's brutality. This method suppresses dissent
    and instills fear, positioning the Church as the dominant antagonist force in
    religious persecution. Young Thomas Cromwell witnesses the event, highlighting
    its societal impact.
  sphere_of_influence: Religious Orthodoxy Enforcement
  season_appearances:
