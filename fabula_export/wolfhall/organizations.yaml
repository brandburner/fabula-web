  description: The Yeomen of the Guard (also referred to as the Yeoman Guard) are
    ceremonial enforcers and royal guards who assemble at the Tower of London execution
    site during Anne Boleyn's beheading. They blend into the crowd to maintain order
    and security, serving as both royal guards and official witnesses to the event.
    Their presence symbolizes state power and reinforces the public, official character
    of the ritual, heightening its ritualistic atmosphere. Key figures such as Thomas
    Cromwell and Francis Bryan observe the proceedings, ensuring the state's spectacle
