- fabula_uuid: ger_organization_af2583f6b5f2
  global_id: ger_organization_af2583f6b5f2
  canonical_name: French Royal Court & Diplomatic Mission (King François I’s Delegation)
  description: |-
    The **French Royal Court & Diplomatic Mission** represents the official French interests at Henry VIII’s Tudor court, led by King François I’s ambassadorial delegation. Operating from key sites like **Greenwich Palace** and **Westminster Hall**, this entity engages in high-stakes diplomatic maneuvering, including:
      - **Marriage negotiations** (e.g., pairing Princess Mary with the Dauphin or Henry with a French princess).
      - **Countering Imperial influence** (e.g., rivalries with Eustace Chapuys).
      - **Strategic gift-giving** and verbal exchanges with key figures like **Thomas Cromwell** and **Anne Boleyn**.
      - **Monitoring political tensions**, particularly around **Katherine of Aragon’s status**.

      The mission’s activities fuel court rivalries, with Anne Boleyn accusing the French of laughing behind her back and rejecting matches for her daughter Elizabeth. Thomas Cromwell ultimately rejects their overtures, asserting English control over marital strategy. The delegation’s presence is central to the **diplomatic and political tensions** depicted in *Wolf Hall* (Episodes 3 and 5).
  sphere_of_influence: Diplomatic Influence at the English Royal Court
  season_appearances:
  - 1
  - 1
