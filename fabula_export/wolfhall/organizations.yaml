- fabula_uuid: ger_organization_e4ef13a2af57
  global_id: ger_organization_e4ef13a2af57
  canonical_name: Monastic Orders
  description: Thomas Cromwell dissolves the Monasteries, including Battle Abbey,
    by citing scandals among monks such as selling relics and sexual misconduct. Eustace
    Chapuys accuses Cromwell of plundering their wealth to bolster his political and
    economic power. These religious houses stand at the heart of Reformation tensions,
    where royal policy dismantles longstanding Catholic institutions amid charges
    of corruption and opportunism.
  sphere_of_influence: Catholic Monastic Institutions and Ecclesiastical Wealth
