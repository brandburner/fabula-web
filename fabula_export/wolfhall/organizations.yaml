- fabula_uuid: ger_organization_ec47baeb750a
  global_id: ger_organization_ec47baeb750a
  canonical_name: Percy Family
  description: Percy Family commands northern estates and retainers. Cromwell crushes
    Harry Percy's defiance through bankers calling debts at the Mark and the Lion
    Inn, forcing silence on Anne Boleyn and affirmation of Henry's rule. Later, he
    exposes their rebel ties via Robert Aske's past business at Gray’s Inn, marking
    them as dissent hubs amid Grace uprising. Their submission underscores Cromwell's
    grip on old aristocracy.
  sphere_of_influence: Tudor Court Nobility and Marriage Alliances
  season_appearances:
