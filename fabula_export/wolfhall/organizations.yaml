- fabula_uuid: ger_organization_1a3d3b2818be
  global_id: ger_organization_1a3d3b2818be
  canonical_name: Plantagenet Faction
  description: Noble families including the Poles and Courtenays unite as Plantagenet
    descendants to plot against Tudor rule. They recruit Lady Margaret Pole, Reginald
    Pole, Lord Exeter, and Sir Nicholas Carew to crown a Pole king, wed Lady Mary
    into their line, restore Catholic ties to Rome, and support Emperor-backed invasions.
    Cromwell surveils Reginald's network tied to Princess Mary, raids Pole homes for
    seditious letters, and brands them arrogant traitors to spark Council fears and
    justify arrests like Geoffrey Pole's. In his Tower confrontation with Norfolk,
    Gardiner, Riche, and Wriothesley, Cromwell names the Poles and Courtenays as true
    conspirators against Henry VIII, deflecting treason charges against himself.
  sphere_of_influence: Tudor Court Dynastic and Religious Opposition
  season_appearances:
