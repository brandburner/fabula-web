  episode_count: 0
- fabula_uuid: ger_organization_f51db16dc104
  global_id: ger_organization_f51db16dc104
  canonical_name: The Emperor’s Embassy (Imperial Court)
  description: The Emperor’s Embassy, represented by Eustache Chapuys, serves as the
    diplomatic arm of the Holy Roman Empire in England. It channels secret correspondence
    for English Catholic opposition figures (e.g., Geoffrey Pole) and orchestrates
    intrigues against Henry VIII’s religious reforms. Cromwell exploits its covert
    communications to dismantle Pole family resistance, using it as a lever in factional
    court politics. The embassy functions as both a foreign power hub and a conduit
    for Catholic alliances, with Chapuys acting as the primary liaison between the
    Imperial Court and English rebels.
  sphere_of_influence: Imperial Diplomacy and Treasonous Correspondence Networks
  season_appearances:
  - 2
  local_uuids:
    1: org_148efc7c6f6a
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_11ab4bde9a43
  global_id: ger_organization_11ab4bde9a43
  canonical_name: The English Crown (Henry VIII’s Monarchy)
  description: The English Crown, representing the supreme royal authority of Henry
    VIII’s monarchy, embodies England’s divine-right absolutism and political power.
    It deploys agents (e.g., Harry Percy, Thomas More) to execute royal warrants (e.g.,
    arresting Cardinal Wolsey for treason) and enforces legal judgments against fallen
    courtiers. The Crown’s legitimacy is reinforced through theological manipulation
    (e.g., Thomas Cromwell’s reinterpretation of Arthur’s tombstone inscription) and
    its dual role in political and religious orthodoxy. It suppresses heretical texts
    (e.g., William Tyndale’s gospels) by intercepting contraband shipments and directly
    intervenes against dissenters, reflecting its centralized power structure. The
    Crown’s authority is further defended by advisors like Thomas Cromwell and Archbishop
    Cranmer, positioning it as the fulcrum of England’s power amid religious and political
    challenges.
  sphere_of_influence: Royal Religious Censorship and Heresy Suppression
  season_appearances:
  - 1
  - 1
  local_uuids:
    1: org_0de557254a49
    2: org_e409b6048594
  first_appearance_season: 1
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_1361571725ba
  global_id: ger_organization_1361571725ba
  canonical_name: The English Reformation (Protestant Movement)
  description: "\n  A drawn-out campaign for religious change in England, framed by\
    \ Thomas Cromwell, Archbishop Cranmer, and Rafe Sadler as a multi-generational\
    \ push for Protestant reform. Cromwell advances the movement from his Austin Friars\
    \ home by promoting smuggled English Bibles (e.g., Tyndale's New Testament and\
    \ German scriptures) as accessible alternatives to Latin liturgy, despite household\
    \ resistance (e.g., his wife Liz's rejection of the texts). The movement grapples\
    \ with moral and political struggles, including Cromwell's guilt over the burning\
    \ of John Lambert—a martyr to the cause—and the enduring tension between its vision\
    \ of gospel progress and the personal costs of its leadership. Cranmer and Cromwell\
    \ prioritize the movement's endurance over individual risks, even as threats from\
    \ figures like Stephen Gardiner (e.g., Lambert's execution) jeopardize its gains.\n\
    \  "
  sphere_of_influence: Religious Reform Through Political Power
  season_appearances:
  - 2
  local_uuids:
    1: org_bd7d1b15a4d0
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_448b9043d4bf
  global_id: ger_organization_448b9043d4bf
  canonical_name: The Jury (Londoners in More’s Treason Trial)
  description: A body of London citizens selected as jurors in Thomas More’s treason
    trial, composed of individuals with preexisting resentment toward More. Their
    biases are exploited by Thomas Cromwell to ensure a guilty verdict, making them
    a critical—yet manipulated—component of the trial’s outcome.
  sphere_of_influence: Local Judicial Decision-Making in Political Treason Trials
  season_appearances:
  - 1
  local_uuids:
    1: org_768f3ec71f2b
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_2c4aa05e8f07
  global_id: ger_organization_2c4aa05e8f07
  canonical_name: The King's Arms
  description: A local inn and tavern near Austin Friars in Tudor London, serving
    as a key labor recruitment hub for Thomas Cromwell's logistical operations. The
    establishment was tapped by Cromwell to draft temporary staff for scrubbing the
    Archbishop’s palace ahead of Cardinal Wolsey’s return, demonstrating how civilian
    establishments like taverns and inns functioned as informal labor pools for elite
    households during periods of political transition. Its role underscores the interconnectedness
    of everyday commerce and courtly logistics in Tudor society.
  sphere_of_influence: Local Innkeeping and Labor Provision
  season_appearances:
  - 1
  local_uuids:
    1: org_f1446261d769
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_8fe28b9f162d
  global_id: ger_organization_8fe28b9f162d
  canonical_name: The King's Military Forces (Henry VIII's Royal Army)
  description: A tactical military organization under Henry VIII, distinct from the
    royal government. Equipped with cannon and provisions, it is led by commanders
    like Richard Cromwell and deployed to suppress rebellions through direct engagement
    and deception. Operates as an arm of the Crown but with its own chain of command
    and logistical infrastructure.
  sphere_of_influence: Royal Military Suppression and Political Command Authority
  season_appearances:
  - 2
  local_uuids:
    1: org_4a09df68a668
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a71ec0a6592e
  global_id: ger_organization_a71ec0a6592e
  canonical_name: The Monasteries
  description: Thomas Cromwell dissolves the Monasteries, including Battle Abbey,
    by citing scandals among monks such as selling relics and sexual misconduct. Eustace
    Chapuys accuses Cromwell of plundering their wealth to bolster his political and
    economic power. These religious houses stand at the heart of Reformation tensions,
    where royal policy dismantles longstanding Catholic institutions amid charges
