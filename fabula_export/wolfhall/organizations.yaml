- fabula_uuid: ger_organization_ddc0384f08f1
  global_id: ger_organization_ddc0384f08f1
  canonical_name: King’s Council
  description: The King’s Privy Council, also known as Henry VIII’s English Council,
    convenes in Hampton Court Palace’s council chamber to address royal crises, assess
    marriage alliances, and manage court politics. The council includes key figures
    such as Thomas Cromwell, the Duke of Norfolk, the Duke of Suffolk, William Fitzwilliam,
    and Rafe Sadler, who debate matters of succession, loyalty, and diplomacy. The
    council’s deliberations expose factional rivalries, shifting alliances, and the
    king’s authority amid shifting loyalties. Key events include the assessment of
    Anne of Cleves’ suitability as a royal bride, the defiance of Princess Mary, and
    the public humiliation of ministers like Cromwell by rivals such as Lord Essex.
    The council’s decisions shape royal policy and navigate the complexities of Henry
    VIII’s reign.
  sphere_of_influence: Royal Advisory on Succession, Political Crises, and Dynastic
    Loyalty
