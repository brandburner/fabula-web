  global_id: ger_organization_3d28d91abaec
  canonical_name: Peers of the Court (George Boleyn’s Trial Jury)
  description: Temporary legal body assembled for George Boleyn’s treason/adultery
    trial, delivering a guilty verdict under Cromwell’s influence. Distinct from the
    broader Royal Court, this group’s role is limited to procedural adjudication in
    a single high-stakes event.
  sphere_of_influence: Judicial Verdicts in Royal Treason Trials
