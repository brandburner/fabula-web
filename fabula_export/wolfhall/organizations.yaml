  episode_count: 1
- fabula_uuid: ger_organization_627b35432ac1
  global_id: ger_organization_627b35432ac1
  canonical_name: The Boleyn Family
  description: Rival faction to the Seymours, targeted by Cromwell's divide-and-conquer
    tactics to dismantle Anne Boleyn's influence and pave the way for Jane Seymour's
    rise.
  sphere_of_influence: Tudor Court Noble Influence
  season_appearances:
