  global_id: ger_organization_114647ae117b
  canonical_name: Percy Household (Mark and the Lion Inn)
  description: A *specific group of retainers* loyal to Harry Percy, distinguished
    by their livery and drunken behavior. They appear in the Mark and the Lion Inn,
    where they witness Cromwell dismantle Percy’s defiance, symbolizing the household’s
    submission to Tudor power.
  sphere_of_influence: Tudor Noble Household Retainers
