  episode_count: 2
- fabula_uuid: ger_organization_a89d092b4c48
  global_id: ger_organization_a89d092b4c48
  canonical_name: Franco-Spanish Alliance (French-Spanish Truce)
  description: A *looming, potential alliance* between France and Spain (Charles V’s
    Spanish kingship), warned about by Rafe Sadler as a *future geopolitical threat*
    to England. Unlike the Franco-Imperial Alliance, this pact is not yet sealed but
    represents a *redirected aggression* from France/Spain toward England, exploiting
    Tudor vulnerabilities through *coordinated imperial pressure*.
  sphere_of_influence: Geopolitical Threat and European Alliance Against England
  season_appearances:
  - 2
  local_uuids:
    1: org_1a473c764cfc
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_186cc0492f95
  global_id: ger_organization_186cc0492f95
  canonical_name: French Anti-English Mob (Calais Occupation)
  description: Unofficial, antagonistic French crowd in Calais under English rule,
    used as a psychological weapon against Anne Boleyn in a single scene.
  sphere_of_influence: Local Civil Unrest and Anti-English Propaganda
  season_appearances:
