- fabula_uuid: ger_organization_5273286ec83a
  global_id: ger_organization_5273286ec83a
  canonical_name: French Monarchy (Valois Court)
  description: Centralized sovereign authority under King François I, directly intervening
    in English politics through agents like Rafe Sadler. Operates from Calais lodgings
    to test loyalties and exploit geopolitical tensions.
  sphere_of_influence: Monarchical Diplomacy and Geopolitical Strategy
  season_appearances:
  - 1
  local_uuids:
