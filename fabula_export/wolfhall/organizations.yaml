  episode_count: 1
- fabula_uuid: ger_organization_4f39cd6cbfed
  global_id: ger_organization_4f39cd6cbfed
  canonical_name: Spanish Embassy (Hampton Court Mission)
  description: A localized diplomatic mission led by Don Diego de Mendoza, operating
    within Tudor England to advance Spain's interests through secret correspondence
    and gifts. This entity is confined to a single scene at Hampton Court and serves
    as a tactical extension of the broader Spanish Court.
  sphere_of_influence: Catholic Diplomatic Support Against Tudor Reforms
