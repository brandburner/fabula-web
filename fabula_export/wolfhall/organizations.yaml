  canonical_name: Lisles of Calais
  description: Jane Seymour and Bess Oughtred discuss quails sent by the Lisles of
    Calais during a private meal. This noble house supplies luxury goods, strengthening
    ties between French families in English-held Calais and Tudor courtiers through
    gift exchanges. The conversation highlights their role in courtly reciprocity
    amid political tensions.
  sphere_of_influence: Noble Luxury Gift Exchanges
