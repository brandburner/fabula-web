  global_id: ger_organization_5f613b79ee9d
  canonical_name: Northern Clergy
  description: Cardinal Wolsey convenes the Northern Clergy, church officials from
    northern England, in an unauthorized convocation lacking royal permission. George
    Cavendish describes this gathering to Thomas Cromwell as evidence of Wolsey's
    returning boldness, yet it invites charges of rebellion against King Henry VIII.
    The act generates court tension, positioning the clergy as unwitting tools in
    Wolsey's bid to reclaim influence amid his downfall.
