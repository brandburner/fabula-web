  global_id: ger_organization_605655d221de
  canonical_name: Imperial Embassy (Holy Roman Empire)
  description: The Imperial Embassy advances Holy Roman Empire interests in Henry
    VIII's England through Ambassador Eustace Chapuys. Chapuys confronts Thomas Cromwell
    outside the Tower of London, reveals the king's secret French executioner for
    Anne Boleyn, probes Cromwell's loyalty to Princess Mary, and critiques royal actions.
    As provocateur and observer, the embassy safeguards Mary's status amid Reformation
    tensions and monitors England's political stability to counter Tudor shifts.
  sphere_of_influence: Diplomatic Advocacy and Political Intrigue in Tudor England
  season_appearances:
