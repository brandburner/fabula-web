- fabula_uuid: ger_organization_29541dea3882
  global_id: ger_organization_29541dea3882
  canonical_name: Scottish Forces
  description: Cromwell warns Harry Percy that King Henry VIII will strip him of title
    and lands if he fails to defend northern England against Scottish incursions.
    These forces pose a persistent border threat, enabling Cromwell to coerce Percy's
    submission by invoking royal expectations of military readiness. Percy men witness
    the exchange, highlighting how external dangers amplify internal political leverage
    against northern lords.
  sphere_of_influence: Northern Border Military Incursions
