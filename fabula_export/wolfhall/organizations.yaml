- fabula_uuid: ger_organization_e4531529997b
  global_id: ger_organization_e4531529997b
  canonical_name: Court of Henry VIII (Hampton Court Palace)
  description: "\n  The **Court of Henry VIII** is the political and social nexus\
    \ of Tudor England, centered at **Hampton Court Palace**, where royal authority\
    \ is wielded through intricate power struggles, factional alliances, and dynastic\
    \ maneuvering. As the king’s inner circle, it operates as a high-stakes arena\
    \ where influence is currency—gained through loyalty, manipulation, or calculated\
    \ betrayal. Key figures like **Thomas Cromwell, Cardinal Wolsey, and the Duke\
    \ of Norfolk** navigate its treacherous currents, where survival depends on mastering\
    \ Henry’s volatile whims. The court’s function is both ceremonial and coercive:\
    \ it enforces royal decrees, dissolves institutions, and reshapes England’s religious\
    \ and political landscape. Its atmosphere is one of **opulence, paranoia, and\
    \ performative devotion**, where every gesture—from a whispered counsel to a public\
    \ display of fealty—carries weight. Hampton Court Palace itself embodies this\
    \ duality: a gilded stage for royal spectacle and a fortress of statecraft, where\
    \ the fate of nobles, clergy, and the realm is decided behind closed doors.\n\
    \  "
  sphere_of_influence: Royal Governance and Coercive Enforcement
  season_appearances:
  - 2
  - 2
  local_uuids:
    1: org_cd04e8e1597e
    2: org_552e9169aacd
