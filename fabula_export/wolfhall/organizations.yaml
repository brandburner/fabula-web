  global_id: ger_organization_897ed675e699
  canonical_name: Royal Court (King’s Court) [Permanent Institutional Body]
  description: Permanent political and social nerve center of Tudor power, operating
    as an indirect antagonist through unspoken demands and royal will. Unlike the
    Peers of the Court (a temporary trial jury), this entity drives the episode’s
    thematic arc of ambition, betrayal, and power transitions, with influence extending
    beyond legal proceedings (e.g., Tower interrogations).
  sphere_of_influence: Monarchical Politics and Power Transitions
