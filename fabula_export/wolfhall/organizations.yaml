- fabula_uuid: ger_organization_d6ad3be95f16
  global_id: ger_organization_d6ad3be95f16
  canonical_name: English Diplomacy
  description: English Diplomacy operates through ambassador Thomas Wyatt's mission
    in Spain, where he fractures the alliance between France and the Holy Roman Empire.
    The Council at Hampton Court hails this as proof of England's superior diplomatic
    skill, deploying the victory to discredit Cromwell's German alliance push and
    erode his influence amid Henry VIII's growing displeasure. Wyatt's success delivers
    vital leverage in court power struggles, showcasing targeted foreign interventions
    that protect English reforms from continental threats.
  sphere_of_influence: Geopolitical Diplomacy and Alliance Disruption
  season_appearances:
  - 2
  local_uuids:
    1: org_aa1a4fabd288
  first_appearance_season: 2
