  global_id: ger_organization_f4766bd1f51d
  canonical_name: Roman Catholic Church (Rome)
  description: Foreign-based papal institution and primary adversary to Henry VIII’s
    reforms, representing the old order and exiled loyalist resistance (e.g., Mary
    Tudor, Reginald Pole).
