  first_appearance_season: 2
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_0a877c40ec78
  global_id: ger_organization_0a877c40ec78
  canonical_name: Rebel Army
  description: 'The Rebel Army fields 50,000 organized men who directly threaten King
    Henry VIII''s authority through armed insurrection. Their rapid growth and insurmountable
    size block conventional royal military responses, forcing Cromwell to devise deception:
    a false truce offering Jane''s coronation in York, a northern parliament, and
    general pardons, while winter inflicts attrition through starvation and disease.'
  sphere_of_influence: Armed Insurrection Against the Crown
  season_appearances:
  - 2
  local_uuids:
