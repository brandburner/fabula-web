- fabula_uuid: ger_organization_3585431e0943
  global_id: ger_organization_3585431e0943
  canonical_name: Monastic Order of Launde Abbey
  description: Monks of Launde Abbey live cloistered lives of contemplation, humility,
    and service to God within the abbey's golden-lit cloisters, where chants rise
    amid incense and damp stone. In Cromwell's Tower vision, they embody the serene
    monastic path he rejected for ambition, offering a bittersweet symbol of unattainable
    redemption amid his downfall. Their presence contrasts the court's machinations,
    highlighting spiritual peace lost to power.
  sphere_of_influence: Catholic Monastic Refuge Targeted for Dissolution
  season_appearances:
