  global_id: ger_organization_cea8db718690
  canonical_name: French Army (Battle of Garigliano)
  description: Military force in the Italian Wars where Thomas Cromwell served as
    a soldier; referenced as a political liability in Henry VIII's court (Episode
    1).
  sphere_of_influence: French Military Forces in Wars Against England
  season_appearances:
