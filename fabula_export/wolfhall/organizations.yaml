- fabula_uuid: ger_organization_169490e4bf01
  global_id: ger_organization_169490e4bf01
  canonical_name: Conservative Religious Establishment (English Church Faction)
  description: A faction within the English Church comprising clergy (including Stephen
    Gardiner) and noblemen who defend orthodox doctrines against radical Protestant
    reforms. This group opposes Thomas Cromwell and Thomas Cranmer's reformist agenda,
    with Gardiner accusing Cromwell of heresy in the Tower of London's Great Hall,
    framing his pragmatism as ideological corruption. During John Lambert's heresy
    trial, they occupy seats at Henry VIII's right hand, voicing conservative opposition
    to Lambert's views on the Eucharist, priestly marriage, and female teaching. Their
    actions—murmuring outrage, backing Henry VIII's conservative judgment, and pressuring
    Thomas Cromwell—safeguard traditional authority while amplifying tensions between
    reformers and traditionalists at court. Their sphere of influence includes orthodox
    theological defense and royal court influence, positioning them as guardians of
    doctrinal purity.
  sphere_of_influence: Conservative Ecclesiastical Authority in Tudor Court Politics
