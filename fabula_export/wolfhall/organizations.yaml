- fabula_uuid: ger_organization_40f160f6993b
  global_id: ger_organization_40f160f6993b
  canonical_name: Privy Council (Henry VIII's Executive Body)
  description: The *permanent* executive body of Henry VIII's court, distinct from
    temporary factions. It includes senior nobles (Norfolk), bishops (Gardiner), and
    legal officials (Riche, Wriothesley), who enforce treason laws, heresy trials,
    and royal decrees. While the King's Councillors are a faction within this body,
    the Privy Council itself is the *institutional mechanism* for royal authority,
    appearing in 48 events across multiple episodes (e.g., Cromwell's arrest, Tower
    interrogations).
  sphere_of_influence: Tudor Royal Governance and Treason Enforcement
  season_appearances:
  - 2
  local_uuids:
