- fabula_uuid: ger_organization_6af9e3a7ab27
  global_id: ger_organization_6af9e3a7ab27
  canonical_name: Catholic Church (Papal Authority & English Church Faction)
  description: "\n    The **Catholic Church** (pre-reform institution) wields papal\
    \ authority, overseeing ecclesiastical appeals (e.g., Katherine of Aragon’s defense)\
    \ and resisting Tudor reforms. It serves as the *external adversary* to Henry\
    \ VIII’s centralization, with key conflicts including:\n    - **Papal Appeals**:\
    \ Cromwell’s legal challenge to Rome’s jurisdiction (e.g., *Wolf Hall Episode\
    \ 3*).\n    - **Heretic Persecutions**: Pressure on holdouts like Thomas More\
    \ and James Bainham.\n    - **Symbolic Resistance**: Norfolk’s papal medal test\
    \ of Cromwell’s loyalty (*Wolf Hall Episode 4*).\n    - **Internal Faction**:\
    \ The bloc of **bishops and old aristocracy** in the House of Lords, aligned with\
    \ the Church, who resist Henry VIII’s reforms. This faction leverages ecclesiastical\
    \ authority and noble influence to challenge the king’s break from papal control,\
    \ as warned by Stephen Gardiner to Thomas Cromwell.\n\n    **Narrative Role**:\
    \ The Church of Rome (*external papal apparatus*) and the English Church Faction\
    \ (*internal bloc of bishops/aristocracy*) are **two facets of the same pre-reform\
    \ Catholic resistance** to Tudor power. Merging consolidates their shared identity\
    \ as the *pre-reform, Rome-aligned authority* opposing Henry VIII’s reforms.\n\
    \  "
  sphere_of_influence: Papal Religious Authority and Tudor Reform Resistance
