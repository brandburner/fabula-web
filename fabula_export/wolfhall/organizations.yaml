    3: org_649042e6cecc
  first_appearance_season: 1
  tier: anchor
  episode_count: 6
- fabula_uuid: ger_organization_8cde405b8ae6
  global_id: ger_organization_8cde405b8ae6
  canonical_name: French and Spanish Courts
  description: A *thematic abstraction* representing the **ten-year truce between
    France and Spain**, serving as a **geopolitical backdrop** for Tudor tensions
    rather than a direct plot actor. Distinct from the **active French Court** led
    by François I, which engages in hostile diplomacy.
  sphere_of_influence: Geopolitical Diplomacy and European Truces
  season_appearances:
