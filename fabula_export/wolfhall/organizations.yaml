  global_id: ger_organization_86200ede6052
  canonical_name: Duke of Norfolk's Political Bloc
  description: A conservative faction tied to the Duke of Norfolk, mentioned in the
    context of William Brereton's interrogation to highlight the unreliable nature
    of court alliances.
  sphere_of_influence: Tudor Court Factional Politics
  season_appearances:
