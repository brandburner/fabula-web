  global_id: ger_organization_b4e4c47c5e35
  canonical_name: Reformist Faction (Cromwell’s Alliance)
  description: Led by Thomas Cromwell to *defend* reformist policies in Henry VIII's
    court, this faction is the primary target of the Conservative Faction's challenges.
    Their strategy emphasizes *cold restraint* and institutional control, contrasting
    with the Conservative Faction's confrontational tactics.
