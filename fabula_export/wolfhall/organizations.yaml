  canonical_name: Cromwell’s Faction (King’s Administration)
  description: Thomas Cromwell leads this faction, supported by Fitzwilliam and Audley,
    as the embodiment of King Henry VIII's authority. They wield administrative power
    to orchestrate Anne Boleyn's downfall, deploying arrest warrants as legal tools.
    In hallway confrontations, they extract compliance from rivals like the Duke of
    Norfolk, securing documents that bind nobles to the king's will. Their methods
    favor strategic calm over bluster, dominating court through institutional leverage.
  sphere_of_influence: Royal Administration and Boleyn Opposition
