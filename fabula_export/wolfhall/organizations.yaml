  episode_count: 6
- fabula_uuid: ger_organization_4c60f8c31beb
  global_id: ger_organization_4c60f8c31beb
  canonical_name: Plantagenet Loyalists
  description: Dynastic opposition group recruiting **Plantagenet descendants** (e.g.,
    Lord Exeter, Courtenay family, Lady Margaret Pole) and led by **Sir Nicholas Carew**.
    Aims to **challenge Anne Boleyn**, install **Jane Seymour**, and restore **Catholic
    practices aligned with Rome**. **Thomas Cromwell surveils but does not lead**
    them, downplaying their pretender claims amid stronger dissent (e.g., Elizabeth
    Barton).
  sphere_of_influence: Tudor Court Dynastic and Religious Opposition
  season_appearances:
