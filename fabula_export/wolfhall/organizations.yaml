  episode_count: 1
- fabula_uuid: ger_organization_37ecc9cb306a
  global_id: ger_organization_37ecc9cb306a
  canonical_name: Reformist Faction (Associated with William Tyndale)
  description: Thomas More accuses Thomas Cromwell of secret correspondence with William
    Tyndale, charging him with alignment to this reformist faction. The group champions
    religious reform against Catholic orthodoxy, sheltering figures like James Bainham,
    whom Cromwell tried to save from torture and recantation. More deploys the accusation
    as a weapon to expose Cromwell's alliances, framing the faction as a heretical
    threat that undermines traditional faith and fuels England's ideological divide.
  sphere_of_influence: Religious Reform and Heretical Networks
  season_appearances:
