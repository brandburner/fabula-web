  global_id: ger_organization_454e35c38690
  canonical_name: Legatine Court (Blackfriars Annulment Tribunal)
  description: Ecclesiastical tribunal at Blackfriars under papal authority handles
    Henry VIII's annulment trial against Katherine of Aragon. Cardinals Wolsey and
    Campeggio preside over a bench of bishops. Katherine delivers her virginity oath
    defense; Earl of Shrewsbury testifies crudely about her first marriage night.
    Wolsey negotiates for the king as proceedings near collapse amid papal treaties
    with Charles V. Court exposes moral tensions and power struggles driving the divorce.
  sphere_of_influence: Papal Annulment Proceedings and Ecclesiastical Justice
