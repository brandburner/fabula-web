- fabula_uuid: ger_organization_2a3c9e1cb27c
  global_id: ger_organization_2a3c9e1cb27c
  canonical_name: Schmalkald League
  description: The Schmalkald League unites German Protestant princes against Holy
    Roman Emperor attacks. Cromwell pitches it to Henry VIII as England's key ally,
    secured through marriage to Anna of Cleves, whose brother Duke Wilhelm heads a
    faction. This counters Catholic threats during England's religious changes. At
    Hampton Court, their diplomats prompt Norfolk's expulsion demand, which he casts
    as a security risk to attack Cromwell; Cromwell counters that the alliance remains
    politically essential.
  sphere_of_influence: Protestant German Alliances, Dynastic Diplomacy, and Anti-Imperial
    Coalitions
