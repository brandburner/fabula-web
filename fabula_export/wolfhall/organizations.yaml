- fabula_uuid: ger_organization_9fd94b1072b7
  global_id: ger_organization_9fd94b1072b7
  canonical_name: Lincolnshire Rebels (Lincolnshire Rebellion)
  description: The Lincolnshire Rebels are a militant faction opposing King Henry
    VIII’s rule and Thomas Cromwell’s Reformation policies, rooted in the rural discontent
    of Lincolnshire. Led by local gentry and commoners, they rally against perceived
    church dismantlement and economic hardship, framing their rebellion as a defense
    of traditional faith and royal legitimacy—though their methods include brutal
    violence, such as the public execution of John Bellowe. While they attempt to
    co-opt Lady Mary as a symbolic figurehead without her consent, their actions reflect
    broader resistance to Cromwell’s reforms, forcing the crown to confront regional
    unrest and the fragility of its authority. Their defiance exposes the tensions
    between royal power, religious change, and grassroots opposition in early Tudor
    England.
  sphere_of_influence: Regional Anti-Reformation Insurrection
  season_appearances:
