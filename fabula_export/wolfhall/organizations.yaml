  global_id: ger_organization_0bbd72de720a
  canonical_name: Men of the King’s Privy Chamber
  description: Elite courtiers who serve as Henry VIII’s private attendants and execute
    his confidential directives, including raids and investigations. Operates in secrecy,
    with mixed awareness among members (e.g., Rafe Sadler and Wriothesley). Distinct
    from the King’s Council, which handles public political and judicial matters.
