  global_id: ger_organization_5b59e5939ca8
  canonical_name: London Guilds
  description: Officers of the London Guilds occupy seats in the Tower of London’s
    Great Hall during John Lambert’s public heresy trial. These representatives embody
    the city’s trade and craft guilds, which anchor London’s economy and social order.
    Their attendance draws civic society into the kingdom’s theological and political
    conflicts, signaling broad implications without direct participation. This passive
    role underscores the trial’s national significance amid gathered dignitaries.
  sphere_of_influence: Civic and Economic Representation in London
