  global_id: ger_organization_fc7aa0210215
  canonical_name: Louth Rebels
  description: A localized, brutal rebel faction in Louth known for extreme atrocities
    (e.g., torture/murder of John Bellowe) as terror tactics, operating reactively
    to Tudor authority and opportunistically exploiting Princess Mary’s name for legitimacy.
    Their actions are confined to Louth and serve as background tension rather than
    a direct threat to the crown.
  sphere_of_influence: Northern Insurrection and Anti-Reformation Violence
