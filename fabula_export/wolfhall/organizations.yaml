  episode_count: 0
- fabula_uuid: ger_organization_45aa839305dd
  global_id: ger_organization_45aa839305dd
  canonical_name: Spanish Inquisition
  description: 'The Spanish Inquisition enforces Catholic orthodoxy in Spain through
    spies who infiltrate homes, steal private letters, and target Englishmen as presumed
    Lutherans. Wyatt refuses the ambassadorship to the Emperor because Inquisitors
    make Spain intolerable: they monitor his every move and treat all English as heretics.
    This surveillance body undermines diplomatic trust and endangers agents like Wyatt
    in service to Henry VIII.'
  sphere_of_influence: Religious Orthodoxy Enforcement and Foreign Surveillance
  season_appearances:
  - 2
  local_uuids:
