  global_id: ger_organization_4955c6f0ac4e
  canonical_name: Cromwell’s Reformist Inner Circle
  description: A **closed political faction** of Cromwell’s most trusted advisors,
    focused on **ideological consolidation** and **reformist strategy** post-Jane
    Seymour’s marriage. Their dynamics reveal **internal tensions** over loyalty (e.g.,
    Cromwell’s secret vow to protect Mary Tudor). Operates as a **decision-making
    body**, distinct from Cromwell’s broader administrative household.
  sphere_of_influence: Tudor Court Power Consolidation and Reformist Politics
