  global_id: ger_organization_b88e5915258b
  canonical_name: King’s Halberdiers
  description: King’s Halberdiers act as royal guards who enforce the Crown's authority
    during violent court confrontations. They flood the Council Chamber at Hampton
    Court Palace, pin Thomas Cromwell to the ground alongside councillors, strip his
    chain of office, and secure his arrest under William Kingston's lead for transport
    to the Tower. Their rapid intervention crushes resistance from fallen statesmen,
    underscoring the king's unyielding control through armed presence.
  sphere_of_influence: Royal Palace Security and Arrest Enforcement
