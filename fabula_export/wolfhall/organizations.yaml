    for channeling Cromwell’s authority, distinct from his **inner political circle**.
    Key functions include **alliance tracking, threat assessment, and royal portrait
    logistics** (e.g., Holbein’s commissions).
  sphere_of_influence: Tudor Household Administration and Political Operations
  season_appearances:
