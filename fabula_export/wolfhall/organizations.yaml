- fabula_uuid: ger_organization_6828da9dbd7c
  global_id: ger_organization_6828da9dbd7c
  canonical_name: Master of the Rolls
  description: Thomas Cromwell cites the Master of the Rolls as the sole legitimate
    recipient of the Great Seal, blocking the Dukes of Norfolk and Suffolk from seizing
    it directly from Cardinal Wolsey. This judicial office enforces procedural rules
    requiring a written royal request for Seal transfer, creating a legal barrier
    that forces the dukes' temporary retreat from York Place and preserves Wolsey's
    authority momentarily amid the King's decree.
  sphere_of_influence: Judicial Custodianship of Official Seals
  season_appearances:
