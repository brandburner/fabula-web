- fabula_uuid: ger_organization_c9d778f020e0
  global_id: ger_organization_c9d778f020e0
  canonical_name: Howard Family
  description: |-
    The Howard Family, led by the Duke of Norfolk, operates as a cohesive political faction (the 'Norfolk Faction' or 'Conservative Faction') to advance dynastic ambitions through strategic marriages, court intrigues, and calculated alliances. This faction includes key allies like Stephen Gardiner and leverages ancestral pride (e.g., Flodden triumphs, Thetford Priory burials) to frame priory dissolutions as personal insults. Their primary pawn is Catherine Howard, deployed to seduce King Henry VIII, undermine Thomas Cromwell's influence, and challenge Anne of Cleves' queenship. The faction's tactics include:
            - **Calculated introductions**: Positioning Catherine under Norfolk's Lambeth protection.
            - **Secret royal visits**: Enabling Henry VIII's clandestine nighttime encounters with Catherine.
            - **Symbolic usurpation**: Catherine wears a defaced girdle book (originally Bess Oughtred's sister Jane's) to appropriate higher-born status.
            - **French negotiations**: Pursuing alliances to bolster their court dominance.
            - **Public confrontations**: Directly challenging Cromwell's lowborn origins and lordly title (e.g., accusations in his Austin Friars study).
            - **Diplomatic leverages**: Using events like the Franco-Spanish truce to strengthen their position.
          Their actions reflect a unified, ruthless strategy to seize power, with Norfolk as the faction's de facto leader and Catherine as its most visible instrument. The faction embodies class conflict against reformist upstarts and serves as a direct antagonist to Cromwell's bloc in Henry VIII's court.
  sphere_of_influence: Tudor Court Politics and Dynastic Maneuvering
  season_appearances:
