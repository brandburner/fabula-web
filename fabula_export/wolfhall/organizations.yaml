  description: A faction within Henry VIII's Privy Council, physically and politically
    opposed to Thomas Cromwell. This group's violent confrontation with Cromwell in
    the Council Chamber at Hampton Court Palace foreshadows his 1540 downfall through
    treason and heresy accusations. Unlike the broader Privy Council, this faction
