  canonical_name: Cardinal Wolsey’s Legal Defense and Loyalty Faction (Including His
    Service)
  description: "\n        A pro-Wolsey faction led by Thomas Cromwell that *defends\
    \ Wolsey’s interests* through legal maneuvers (e.g., the Great Seal gambit) and\
    \ sustained loyalty, even after his fall. This includes:\n        1. **Wolsey’s\
    \ Service**: Cromwell’s early role as Wolsey’s lawyer and courtier, which pulls\
    \ him from manual labor into court influence and underscores his ambition (e.g.,\
    \ Walter Cromwell’s contempt in the Putney blacksmith yard).\n        2. **Post-Execution\
    \ Loyalty**: The faction maintains allegiance through Wolsey’s correspondence\
    \ (e.g., letters from Katherine of Aragon) and resists Henry VIII’s dismissal,\
    \ provoking opposition from rivals like the Duke of Norfolk.\n        **Key Activities**:\n\
    \        - Legal defense (Great Seal gambit).\n        - Maintenance of loyalty\
    \ via correspondence.\n        - Resistance to Henry VIII’s dismissal of Wolsey.\n\
    \        - Testing of Cromwell’s allegiance by Norfolk’s faction (e.g., Greenwich\
    \ gardens ambush).\n        **Narrative Role**: The faction’s activities heighten\
    \ tensions in Anne Boleyn’s circle and underscore Cromwell’s shifting loyalties,\
    \ from early service to post-Wolsey independence.\n      "
  sphere_of_influence: Tudor Court Legal Resistance and Political Intrigue
