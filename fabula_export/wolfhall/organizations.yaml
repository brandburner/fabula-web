  episode_count: 1
- fabula_uuid: ger_organization_a25d86b28ae0
  global_id: ger_organization_a25d86b28ae0
  canonical_name: Scottish Royal Family
  description: Henry VIII directs Thomas Cromwell to arrange a marriage for Lady Margaret
    Douglas, his niece and representative of the Scottish Royal Family. He deems her
    a 'great prize' due to her proximity to the throne, making her a key asset in
    dynastic politics. This order, issued amid Hampton Court tensions with Wriothesley
    and Fitzwilliam present, underscores the family's role as a source of leverage
    in Tudor alliances and succession strategies.
  sphere_of_influence: Dynastic Marriage Alliances
