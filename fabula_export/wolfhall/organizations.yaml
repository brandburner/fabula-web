- fabula_uuid: ger_organization_1e1161857ad4
  global_id: ger_organization_1e1161857ad4
  canonical_name: Pole Family (The Poles)
  description: The Pole Family (also referred to as 'The Poles') is a faction of disloyal
    nobles in Henry VIII's court who face suspicion of treason. Thomas Cromwell strategically
    excludes them from royal pardons (e.g., the pardon for Lady Exeter) to isolate
    them politically, placing them under direct scrutiny. This exclusion highlights
    their opposition to royal reconciliation efforts and positions them as adversaries
    in Cromwell's power struggles. The family's political maneuvering is central to
    the court's factional dynamics, particularly in their interactions with Cromwell,
    Henry VIII, and other noble families like the Seymours.
  sphere_of_influence: Tudor Opposition Faction and Dynastic Rebellion
  season_appearances:
