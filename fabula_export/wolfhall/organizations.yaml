  episode_count: 1
- fabula_uuid: ger_organization_3e7d9ea99d09
  global_id: ger_organization_3e7d9ea99d09
  canonical_name: English Nobility
  description: English Nobility functions as a political faction of aristocrats in
    Henry VIII's court. Dukes of Norfolk and Suffolk represent their interests, debating
    succession, rejecting Mary Tudor as heir, and voicing opposition to reformers
    like Thomas Cromwell. Nobles express prejudice against Anne Boleyn's rise, boycott
    court, and betray Henry through disloyal acts. Cromwell proposes pardoning most
    disloyal nobles—excluding the Poles—to monitor them closely, while Suffolk urges
    against forgiveness to maintain pressure.
  sphere_of_influence: Tudor Court Aristocratic Politics
  season_appearances:
  - 1
  local_uuids:
    1: org_80cb420a67db
  first_appearance_season: 1
  tier: planet
  episode_count: 4
- fabula_uuid: ger_organization_9aa779bd961b
  global_id: ger_organization_9aa779bd961b
  canonical_name: English Parliament
  description: Richard Riche drafts bills to prosecute treason and scandals. Cromwell
    channels royal demands through legislation, securing approval for Henry VIII's
    marriage amid noble opposition. Parliament now receives Cromwell's arrest and
    downfall in stunned silence, abandoning him politically and confirming his isolation
    as institutional support evaporates.
  sphere_of_influence: Tudor Parliamentary Legislation, Royal Investigations, Marriage
    Legitimation, and Political Endorsement
  season_appearances:
  - 2
  local_uuids:
    1: org_e8cd732fffb8
  first_appearance_season: 2
  tier: planet
  episode_count: 3
- fabula_uuid: ger_organization_3389f23441be
  global_id: ger_organization_3389f23441be
  canonical_name: English Rebellion
  description: The English Rebellion threatens Henry VIII's rule by exploiting the
    lack of a male heir, gaining momentum amid dynastic fears. Courtiers in the Council
    Chamber celebrate Queen Jane Seymour's pregnancy as the force to collapse it,
    pounding tables in relief while Cromwell observes. This antagonist group underscores
    the court's fragile optimism, tying national stability to royal fertility.
  sphere_of_influence: Dynastic Insurrection Against Tudor Succession
  season_appearances:
  - 2
  local_uuids:
    1: org_7cb89d707688
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_2b4d0acca2b8
  global_id: ger_organization_2b4d0acca2b8
  canonical_name: English Royal Army (Henry VIII’s Forces)
  description: Henry VIII's permanent military institution, responsible for both external
    conquests (e.g., the 1513 capture of Therouanne) and internal repression through
    imprisonment, torture, and brutal enforcement of regime authority. Operates as
    a structured military force distinct from aristocratic factions, with conflicts
    centered on war strategy, fiscal debates, and royal prestige. Criticized by Thomas
    Cromwell for fiscal waste and excess, while enforcing the crown's authority through
    actions like seizing Richard Bainham from the Tower of London for interrogation.
  sphere_of_influence: Royal Military Campaigns and Domestic Repression
  season_appearances:
  - 1
  local_uuids:
    1: org_010961399c8a
  first_appearance_season: 1
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_3eed6c3fec10
  global_id: ger_organization_3eed6c3fec10
  canonical_name: Europe
  description: Europe functions as the critical external audience for Thomas More's
    arrest and defiance of the Act of Succession. Thomas Cromwell warns that More's
    stance will cast him as a martyr across Europe, painting England as an oppressive
    regime persecuting principled Catholics. This perception threatens the Tudor government's
    international legitimacy, as European observers judge Cromwell and the reformers
    as villains in the unfolding narrative. Cromwell's frustration stems from More's
    success in seizing the moral high ground before foreign eyes.
  sphere_of_influence: International Public Opinion and Geopolitical Perception
  season_appearances:
  - 1
  local_uuids:
    1: org_986c4cacdce8
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_0334e66bf104
  global_id: ger_organization_0334e66bf104
  canonical_name: European Bankers
  description: Thomas Cromwell commands a network of European bankers to call in Harry
    Percy's debts on demand. This financial leverage forces Percy's submission by
    threatening total ruin—loss of lands, title, and status. Cromwell deploys the
    threat during a tense confrontation at the Mark and the Lion Inn, turning hypothetical
    debt collection into a weapon that shatters Percy's defiance and secures his silence
    on Anne Boleyn's pre-contract.
  sphere_of_influence: International Finance and Debt Enforcement
  season_appearances:
  - 1
  local_uuids:
    1: org_f7074ba5b932
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_9b38c27db287
  global_id: ger_organization_9b38c27db287
  canonical_name: Fisher's Foreign Printers
  description: A network of overseas printing presses originally directed by Bishop
    John Fisher to produce and disseminate anti-Henry VIII writings. After Thomas
    Cromwell seizes control, the presses are repurposed to undermine Fisher by producing
    copies of his own writings, which Cromwell weaponizes during interrogations at
    Austin Friars. This bureaucratic maneuver strips Fisher of his propaganda channel,
    demonstrating Cromwell's ability to neutralize resistance through control of foreign
    printing operations.
  sphere_of_influence: Overseas Printing and Propaganda Dissemination
  season_appearances:
  - 1
  local_uuids:
    1: org_7ebc7c1a0d34
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_d40e5dc8290f
  global_id: ger_organization_d40e5dc8290f
  canonical_name: Flemish Guards
  description: The Flemish Guards escort Don Diego de Mendoza's elaborate carriage
    into Hampton Court's Base Court. Their mud-splattered uniforms mark the long journey,
    underscoring the deliberate arrival of Spain's new envoy. They project foreign
    military strength, bolstering Spain's diplomatic weight against England's court
    and provoking tension among Cromwell, Riche, and Chapuys. This escort symbolizes
    imperial support and disrupts local power dynamics.
  sphere_of_influence: Diplomatic Escort and Foreign Military Projection
  season_appearances:
  - 2
  local_uuids:
    1: org_24613138ceed
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_af68ebc1004f
  global_id: ger_organization_af68ebc1004f
  canonical_name: Florentine Banks
  description: Florentine Banks form a network of international financiers where Thomas
    Cromwell honed his skills in finance, law, and fiscal management during his time
    abroad. He cites this experience to Cardinal Wolsey and King Henry VIII to affirm
    his expertise on England's gold reserves, war costs, and resource limits. In current
    dealings, Cromwell taps his contacts there to arrange a high-risk loan for the
    Duke of Norfolk, underscoring their role in bridging foreign capital to Tudor
    court needs amid volatile politics.
  sphere_of_influence: International Banking and Fiscal Expertise
  season_appearances:
  - 1
  local_uuids:
    1: org_36b099f7f28a
  first_appearance_season: 1
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_e7c615a6a88e
  global_id: ger_organization_e7c615a6a88e
  canonical_name: Franciscan Monks
  description: Franciscan Monks escort Elizabeth Barton through crowds at Canterbury
    Cathedral, shielding her from harm during confrontations with Henry VIII and his
    courtiers. They defend her status as a holy figure and prophetic voice against
    Anne Boleyn, amplifying her authority amid chaos. The monks consult Barton on
    Cromwell's request to contact Wolsey's soul, negotiate terms, and pursue pragmatic
    gains like donations, blending devotion to her mission with self-interest.
  sphere_of_influence: Religious Protection and Prophetic Escort
  season_appearances:
  - 1
  local_uuids:
    1: org_4bfe14096634
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3bc18d4572ad
  global_id: ger_organization_3bc18d4572ad
  canonical_name: Franco-Imperial Alliance
  description: A real-world historical Franco-Imperial treaty between France (François
    I) and the Holy Roman Empire (Charles V), posing a direct geopolitical threat
    to England's Protestant reforms. Fractured by Wyatt's diplomatic mission to Spain,
    where Charles V's insult to all kings—including France—weakens the alliance, delighting
    Henry VIII's Council.
  sphere_of_influence: European Diplomatic and Military Alliances Threatening England
  season_appearances:
