  global_id: ger_organization_0a20e4c13312
  canonical_name: Seymour Family
  description: Central antagonists in Episodes 2–5, directly opposing Anne Boleyn
    and Cromwell by positioning Jane Seymour as Henry VIII’s next queen. Aligned with
    conservative factions and Rome’s restoration, with Edward and Tom Seymour as key
    strategists.
  sphere_of_influence: Tudor Court Politics and Dynastic Ambition
