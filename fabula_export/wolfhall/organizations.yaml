- fabula_uuid: ger_organization_c13b2bf6501c
  global_id: ger_organization_c13b2bf6501c
  canonical_name: The Crown (Henry VIII’s Government)
  description: The Crown enforces Henry VIII’s will through agents like Thomas Cromwell,
    who strip nobles such as Harry Percy of lands and titles, plunder their estates
    after death, and coerce confessions or betrayals to dismantle rivals like Anne
    Boleyn. It wields trial authority and queenly replacement power amid court intrigues
    involving Norris, Weston, and Boleyns, blending legal ruin with political maneuvering.
  sphere_of_influence: Royal Governance and Coercive Enforcement
  season_appearances:
  - 1
  local_uuids:
    1: org_cd04e8e1597e
  first_appearance_season: 1
