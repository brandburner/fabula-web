  canonical_name: Norfolk’s Men
  description: Norfolk’s Men serve as the Duke of Norfolk's enforcers during Cardinal
    Wolsey’s downfall. They enter York Place and strip it of valuables—including wardrobe,
    plate, and other possessions—symbolizing the court's abrupt power transition.
    Acting as antagonists, they heighten tension among Wolsey’s panicked staff like
    Gascoigne and Cavendish, while Cromwell organizes the household's response. Their
    actions mark the enforcement of shifting court dynamics.
