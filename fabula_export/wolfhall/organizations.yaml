  canonical_name: The Papacy (Pope Clement VII's Administration)
  description: The Papacy, under the administration of Pope Clement VII, asserts centralized
    ecclesiastical authority over marriage annulments in the Catholic Church. Cardinal
    Campeggio represents the Papacy at the Legatine Court in Blackfriars, where papal
    legitimacy grants the court judicial power. The Papacy directly opposes Henry
    VIII's annulment bid against Katherine of Aragon, blocking English royal ambitions.
    Pope Clement VII's administration orders a treaty with Emperor Charles V to further
    undermine Cardinal Wolsey's leverage during the Blackfriars proceedings. This
    diplomatic and ecclesiastical maneuvering highlights the Papacy's role as a central
    antagonist to the English court's ambitions, with key interactions involving Thomas
    Cromwell, Stephen Gardiner, and Cardinal Campeggio.
