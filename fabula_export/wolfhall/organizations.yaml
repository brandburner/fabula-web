  episode_count: 1
- fabula_uuid: ger_organization_b45a7e0da3a7
  global_id: ger_organization_b45a7e0da3a7
  canonical_name: German Mercenaries
  description: German mercenaries form a tight-knit faction operating in Italy, where
    they impose brutal initiation rituals to test recruits like young Thomas Cromwell.
    By the Garigliano River, they surround him with guttural chants as he grips a
    venomous snake, probing endurance and nerve. This reveals their hierarchical command,
    ruthless methods, and culture of unyielding loyalty that foreshadows alliances
    with cutthroat courts.
  sphere_of_influence: Mercenary Recruitment Rituals and Combat Discipline
  season_appearances:
  - 1
  local_uuids:
    1: org_0dcd3660b5d8
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3c803dd2d2c9
  global_id: ger_organization_3c803dd2d2c9
  canonical_name: German Princes and Lutherans
  description: German Princes and Lutherans face accusation as co-conspirators with
    Thomas Cromwell in forged letters from Martin Luther and Philipp Melanchthon.
    Duke of Norfolk, Stephen Gardiner, and Richard Riche wield this charge during
    Cromwell's Tower interrogation to paint his Protestant ties as disloyalty to King
    Henry VIII. Cromwell rejects the letters as obvious fakes, exposing the ploy as
    aristocratic sabotage amid his rivals' coordinated attack.
  sphere_of_influence: German Protestant Reform Networks and Anti-Catholic Alliances
  season_appearances:
  - 2
  local_uuids:
    1: org_c5f8f0c2efa0
  first_appearance_season: 2
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_aa94ebe1d671
  global_id: ger_organization_aa94ebe1d671
  canonical_name: German Principalities (Diplomatic Entity)
  description: Broad collection of German states considered by Henry VIII for dynastic
    alliances, distinct from religious factions. Serves as a diplomatic tool for marriage
    negotiations (e.g., Mary Tudor to the Duke of Bavaria) and reflects Henry’s personal
    realpolitik, not tied to Protestantism.
  sphere_of_influence: Dynastic Diplomacy and Marriage Alliances with English Crown
  season_appearances:
  - 2
  local_uuids:
    1: org_a2ea700fe801
  first_appearance_season: 2
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_63d5e5a14f85
  global_id: ger_organization_63d5e5a14f85
  canonical_name: German Protestant Princes (Military-Faction Entity)
  description: Specific faction of German princes aligned with Protestantism, framed
    by Cromwell as a **military counterbalance** to the Franco-Imperial alliance.
    Their support is pitched as essential for England’s survival, tied to Anna of
    Cleves’ marriage and urgent council debates at Hampton Court.
  sphere_of_influence: Dynastic Alliances and Military Counterbalance to Franco-Imperial
    Forces
  season_appearances:
  - 2
  local_uuids:
    1: org_2133794703be
  first_appearance_season: 2
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_8b73b72c0c9e
  global_id: ger_organization_8b73b72c0c9e
  canonical_name: Gray’s Inn Reformist Circle (Tyndale’s Public Followers)
  description: A **public, court-adjacent reformist group** meeting at Gray’s Inn,
    led by Little Bilney, which promotes Tyndale’s English Bible through sermons and
    ideological debate. Unlike the clandestine smuggling network, this circle operates
    openly—though recklessly—risking legal persecution (Tower imprisonment) by figures
    like Stephen Gardiner. Serves as a narrative device to escalate religious tensions
    at court, particularly during Wolsey’s absence.
  sphere_of_influence: Grassroots Religious Reform and Banned Scripture Advocacy
  season_appearances:
  - 1
  local_uuids:
    1: org_04f351e4e2c8
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_4a2ea6b08b48
  global_id: ger_organization_4a2ea6b08b48
  canonical_name: Henry VIII's Government (Tudor State Apparatus)
  description: The bureaucratic and legal machinery of Henry VIII's regime, distinct
    from the royal court. Focuses on enforcement of the Bill and Act of Succession,
    suppression of dissent, and state-sanctioned prosecutions (e.g., Thomas More,
    Bishop Fisher). Operates through Thomas Cromwell and allies (Audley, Cranmer,
    Riche, Norfolk) to consolidate Henry's supremacy over church and state.
  sphere_of_influence: Royal Government and Enforcement of Succession Oaths and Religious
    Reforms
  season_appearances:
  - 1
  local_uuids:
    1: org_e20fb1562721
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a6db66df9349
  global_id: ger_organization_a6db66df9349
  canonical_name: Holy Maid’s Followers
  description: Holy Maid’s followers, supporters of Elizabeth Barton, form a growing
    network of dissent that circulates prophecies targeting Henry VIII’s reign. They
    invoke figures like Elizabeth of York and Mary Magdalene to heighten royal paranoia
    over Anne Boleyn and dynastic issues. Cromwell views their visitors' list as evidence
    of threat, ordering Barton’s arrest to suppress the group. Nobles and Cromwell
    discuss the predictions on The Swallow’s deck, where he discredits them as delusions
    demanding political action.
  sphere_of_influence: Prophetic Dissent and Threats to Royal Stability
  season_appearances:
  - 1
  local_uuids:
    1: org_2ea9a2e14346
  first_appearance_season: 1
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_d109e38f38cc
  global_id: ger_organization_d109e38f38cc
  canonical_name: Holy Orders
  description: Stephen Gardiner invokes his status in Holy Orders to deflect Thomas
    Cromwell's questions about marriage and women during tense barge conversations.
    This clerical institution provides moral and institutional authority, enforcing
    vows like celibacy that Gardiner uses as a shield against personal scrutiny. Cromwell
    challenges this evasion, underscoring conflicts between religious obligations
    and political ambitions in the Tudor court.
  sphere_of_influence: Ecclesiastical Authority and Clerical Vows
  season_appearances:
  - 1
  local_uuids:
    1: org_47c4656e6fac
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_dd6e9d6814e1
  global_id: ger_organization_dd6e9d6814e1
  canonical_name: Holy Roman Emperor’s Fleet (Algiers Expedition)
  description: A *specific naval expedition* (40,000 armed men) cited as a crisis
    in Episode 5, serving as an external military threat to Henry VIII’s court. Part
    of the broader Holy Roman Empire’s power but not the Empire itself.
  sphere_of_influence: Imperial Naval Expeditions
  season_appearances:
  - 1
  local_uuids:
    1: org_c8bdfdb62170
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_20c3598c354c
  global_id: ger_organization_20c3598c354c
  canonical_name: Holy Roman Empire (Charles V’s Imperial Court)
  description: The Holy Roman Empire under Emperor Charles V, represented in England
    by his Imperial Court and ambassadors like Eustache Chapuys. This faction is allied
    with Pope Clement VII and actively opposes Henry VIII’s divorce from Katherine
    of Aragon. The court engages in diplomatic maneuvers—including treaties, leverage-stripping,
    and elite dinners—to undermine English reformers and assert Imperial influence.
    It operates as a permanent governing body distinct from ecclesiastical institutions,
    with a focus on statecraft and geopolitical strategy.
  sphere_of_influence: Foreign Diplomacy and Court Antagonism
  season_appearances:
  - 1
  local_uuids:
    1: org_ded14f1b332b
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a0965c72bc91
  global_id: ger_organization_a0965c72bc91
  canonical_name: Holy Roman Empire (Imperial Court)
  description: The Holy Roman Empire, governed by Emperor Charles V, advances its
    political and religious interests in England through its Imperial Court. Key diplomats
    include Eustace Chapuys and Don Diego de Mendoza, who engage in diplomatic correspondence,
    negotiations, and marriage proposals (e.g., for Lady Mary) to counter English
    reforms and secure imperial influence over succession. Cromwell's accusers cite
    these overtures as evidence of treasonous plotting, framing the Empire as a potential
    adversary threatening English control over religious and dynastic policy. The
    court's actions, such as Chapuys's alleged talks with Cromwell about Lady Mary's
    future, are rejected to preserve domestic alliances (e.g., Cromwell's son's marriage).
  sphere_of_influence: Imperial Diplomacy, Succession Intrigue, and Catholic Advocacy
    in Tudor England
  season_appearances:
  - 2
  local_uuids:
    1: org_2c11043b4882
  first_appearance_season: 2
  tier: anchor
  episode_count: 5
- fabula_uuid: ger_organization_b41deddb6ca6
  global_id: ger_organization_b41deddb6ca6
  canonical_name: Holy Roman Empire (under Charles V)
  description: A sovereign geopolitical power under Charles V, distinct from its military
