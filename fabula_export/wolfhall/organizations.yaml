  canonical_name: House of Valois (France)
  description: Anne Boleyn courts the House of Valois, France's ruling dynasty, through
    a proposed marriage between Princess Elizabeth and a French prince. She presents
    this to Thomas Cromwell to solidify Tudor claims post-Elizabeth's birth and fend
    off Chapuys and imperial forces. Tom Seymour later warns she might leak Henry's
    secrets to these allies; Edward Seymour counters that the alliance has collapsed,
    exposing her vulnerability.
