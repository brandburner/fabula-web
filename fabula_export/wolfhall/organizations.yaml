- fabula_uuid: ger_organization_bc0336e3400b
  global_id: ger_organization_bc0336e3400b
  canonical_name: Tudor Court (Henry VIII's Royal Court)
  description: The Tudor Court, also known as Henry VIII's Royal Court, serves as
    the political and social epicenter of Tudor England, primarily operating from
    sites like Hampton Court Palace. This institution is the arena for dynastic strategy,
    factional conflict, and royal authority displays, where Thomas Cromwell navigates
    rebellion threats, the Queen's pregnancy, and pressures to secure Henry's remarriage
    for alliances and heirs. The court's shifting loyalties and scandals demand constant
    political maneuvering, isolating ambitious figures amid raw power struggles. Key
    locations include the privy chamber (where Princess Mary confronts Cromwell over
    finances) and other royal residences, where personal rivalries, diplomatic maneuvers,
    and status negotiations unfold among nobles, ministers, and royal family members.
    The court's environment fuels Cromwell's guilt over past betrayals (e.g., Wolsey's
    fall) and sparks his fantasies of escape to Launde Abbey.
