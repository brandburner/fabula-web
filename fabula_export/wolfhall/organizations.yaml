  global_id: ger_organization_0d7a8231a1c8
  canonical_name: Scottish Court
  description: Cromwell invokes the Scottish Court during his Tower interrogation
    as one of the enemies King Henry VIII must confront without Cromwell's leadership.
    He lists it alongside other threats to warn of chaos under weaker governance.
    This casts the court as a northern royal center driving opposition, where decisions
    fuel border risks and political instability amid Tudor power struggles.
  sphere_of_influence: Foreign Royal Court Intrigue and Northern Threat
