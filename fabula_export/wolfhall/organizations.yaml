- fabula_uuid: ger_organization_b1bed1c517f5
  global_id: ger_organization_b1bed1c517f5
  canonical_name: Parliament of England (Commons)
  description: Parliament of England (Commons) convenes burgesses to debate and pass
    bills affirming royal authority, including spiritual jurisdiction over the King.
    Sessions at Blackfriars Priory create a formal space for policy clashes, factional
    rivalries, and royal decrees, apart from court schemes. Cromwell faces its imminent
    opening in a fortnight, which demands preparation for legislative deadlines and
    risks resistance to bills targeting figures like Thomas More, who holds sway with
    members, as Audley notes.
  sphere_of_influence: Legislative Authority and Royal Legislation
  season_appearances:
