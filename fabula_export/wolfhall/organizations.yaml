- fabula_uuid: ger_organization_701daae76753
  global_id: ger_organization_701daae76753
  canonical_name: English Bishops
  description: Religious collective body observing Queen Katherine's annulment trial
    in the Legatine Court at Blackfriars, embodying the conflict between church doctrine
    and Henry VIII's political ambitions.
  sphere_of_influence: Ecclesiastical Oversight in Royal Matrimonial Courts
  season_appearances:
