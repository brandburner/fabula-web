[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py createsuperuser --noinput || true && python manage.py createcachetable && python manage.py collectstatic --noinput && gunicorn fabula_web.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 60"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
